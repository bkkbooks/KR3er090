body:
  text: 卷第二十七針灸中肝病第一五十一法治眼目法攢竹主目視不明䀮䀮目中熱痛及瞤針入一分留二呼瀉三吸徐徐出之忌灸宜出血塗鹽膚翳白膜覆瞳仁目暗及眯雀目冷淚目視不明胬肉出皆針睛明入一分半留三呼瀉五吸冷者先補後瀉復補之雀目者可久留十吸然後速出視眼喎不正口喎目瞤面動葉葉然眼赤痛目䀮䀮冷熱淚目瞼赤皆針承泣在目下七分匡骨中當瞳子直下陷中入二分半得氣即瀉忌灸目暗不明針中渚入二分留三呼瀉五吸灸七壯炷如雀矢大在手小指次指本節後間眯目偏風眼喎通睛耳聾針客主人一名上關入一分久留之得氣即瀉亦宜灸日三七壯至二百壯炷如細竹筋大側臥張口取之眼暗灸大椎下第十節正當脊中二百壯唯多佳可以明目神良灸滿千日不假湯藥肝勞邪氣眼赤灸當容一百壯兩邊各爾在眼後耳前三陰三陽之會處以手按之有上下橫脈是與耳門相對也肝俞主目不明灸二百壯小兒寸數斟酌灸可一二七壯治風翳灸手中指本節頭骨上五壯炷如小麥大逐病左右灸之治風癢赤痛灸人中鼻柱二壯仰臥灸之治目卒生翳灸大指節橫紋三壯逐左右灸之治眼暗若一眼暗灸腕後節前陷中兩眼暗兩手俱灸隨年壯治溫病後食五辛即不見物遂成雀目灸第九椎名肝俞二百壯永瘥治腳轉筋法治腳轉筋針內崑崙穴在內踝後陷中入六分氣至瀉之又灸承山隨年壯神驗第二十一椎主腰背不便筋轉痹灸隨年壯治筋攣轉筋十指筋攣急不得屈伸灸足外踝骨上七壯治失精筋攣陰縮入腹相引痛灸中封五十壯又下滿灸五十壯兩腳一百壯此二穴亦主喉腫厥逆五臟所苦鼓脹悉主之老人加之五十以下及小兒並隨年壯治轉筋脛骨痛不可忍灸屈膝下廉橫筋上三壯腹脹轉筋灸臍是一寸二七壯治癥瘕法小腹堅大如盤盂胸腹中脹滿飲食不消婦人症聚瘦瘠灸三焦俞百壯三報之灸內踝後宛宛中隨年壯灸氣海百壯久冷及婦人症癖腸鳴泄痢繞臍絞痛灸天樞百壯三報之勿針臍兩旁各二寸積聚堅滿痛灸脾募百壯章門是也治瘕癖患左灸左患右灸右第一屈肋頭近第二肋下即是灸處第二肋頭近第三肋下向肉翅前亦是灸處初日灸三次日五後七周而復始至十止惟忌大蒜余不忌又灸關元五十壯又灸臍上四指五十壯膏肓俞兩穴主無病不療方先令病人正坐曲脊伸兩手以臂著膝前令正直手大指與膝頭齊以物支肘勿令臂得動也從胛骨上角摸索至胛骨下頭其間當有四肋三間灸中間依胛骨之裡去胛骨容側指許摩呂去表肋間空處按之自覺牽引肩中灸兩胛內各一處至六百壯多至千壯數百壯當氣下磐磐然如流水當有所下若停痰宿疾亦必下也此灸無所不治主諸羸弱瘦損虛勞夢中失精上氣咳逆及狂惑妄誤皆有大驗若病人已困不能正坐當令側臥挽上臂令前索孔穴灸之求穴大較以右手從左肩上住指頭表所不及者是也左手亦然及以前法灸若不能久正坐伸兩臂者亦可伏衣幞上伸兩臂令人挽兩胛骨使相遠不爾甲胛覆穴不可得也所伏衣幞當令大小有常不爾則前卻失其穴也此穴灸訖後令人陽氣盛當消息自養令得平復其穴近第五椎相準望求索治頭重臂肘重法頭重風勞灸腦戶五壯針入三分補之頭重不能勝灸腦戶下一寸半身體重四肢不能自持灸脾俞隨年壯針入五分補之身重嗜眠不自覺灸天府五十壯針入三分補之身重灸水分百壯針入一寸補之體重四肢不舉灸天樞五十壯忌針身重腫坐不欲起風勞腳疼灸三里五十壯針入五分補之又灸足太陽五十壯針入三分補之臂重不舉灸肩井隨年壯可至百壯針入五分補之又灸足澤三十壯針入三分補之第一椎名大杼無所不主俠左右一寸半或一寸二分主頭項痛不得顧胸中煩急灸隨年壯諸煩熱時氣溫病灸大椎百壯針入三分瀉之橫三間寸灸之心煩上氣灸肺俞針入五分心煩短氣灸小腸俞又灸巨闕期門各一百壯針入五分又灸心俞百壯針入五分頭身熱灸胃管百壯勿針煩悶憂思灸大倉百壯煩熱頭痛針虎口入三分煩躁恍惚灸間使三十壯針入三分骨熱煩胸滿氣悶針三里入五分身體煩熱針中府又灸絶骨五十壯膽病第二一十二法左手關上陽絶者無膽脈也苦口中無味一云苦眯目恐畏如見鬼多驚少力刺足厥陰治陰在足大指間或刺三毛中左手關上陽實者膽實也苦腹中不安身軀習習刺足少陽治陽在足第二指本節後一寸俠膽俞旁行相去五寸名濁浴主胸中膽病隨年壯膽虛灸足內踝上一夫名三陰交二十壯治吐血法虛勞吐血灸胃管三百壯亦主嘔逆吐血少食多飽及多睡百病凡口鼻出血者名曰腦衄灸上星五十壯吐血唾血灸胸堂百壯忌針吐血腹痛雷鳴灸天樞百壯吐血唾血上氣咳逆灸肺俞隨年壯吐血酸削灸肝俞百壯吐血嘔逆灸手心主五十壯大陵是吐血頸項上二七壯心病第三一十八法心俞各灸二七壯主心病老小減之不能食胸中滿膈上逆氣悶熱皆灸之卒心疝暴痛汗出刺大敦左取右右取左男左女右刺之出血立已俠巨闕兩邊相去各半寸名曰上門主胸中痛引腰背心下嘔逆面無滋潤各灸隨年壯凡顏色焦枯勞氣失精肩背痛手不得上頭灸肩髃百壯穴在肩外頭近後以手按之有解宛宛中當心下一寸名巨闕主心悶痛上氣引少腹冷灸二七壯脈不出針不容兩穴在幽門兩旁各一寸五分健忘忽忽針間使入五分掌後三寸心中懊憹徹背痛煩逆灸心俞百壯心痛如錐刀刺氣結灸膈俞七壯心痛冷氣上鳩尾上二寸半名龍頷灸百壯不針心痛惡氣上肋痛急灸通谷五十壯在乳下二寸心痛暴惡氣叉心灸巨闕百壯心痛胸脅滿灸期門隨年壯心痛堅煩氣結灸大倉百壯心痛曝絞急欲絶灸神府百壯附鳩尾正當心有忌胸痹心痛灸膻中百壯忌針兩乳間心痛灸臂腕橫紋三七壯心痛灸兩虎口白肉際七壯小腸病第四八十一法訣二首左手關前寸口陽絶者無小腸脈也苦臍痹少腹中有疝瘕主月即冷上搶心刺手心主治陰在掌後橫紋中入一分左手關前寸口陽實者小腸實也苦心下急熱痹小腸內熱小便赤黃刺手太陽治陽在手第二指本節後一寸動脈俠中管兩邊相去半寸名曰陰都灸隨年壯主小腸熱病俠臍兩邊相去一寸名魂舍灸一百壯主小腸泄利膿血小兒減之又灸小腸俞七壯灸風眩法以繩橫度口至兩邊既得度口之寸數便以繩一頭更度鼻盡其兩邊兩孔間得鼻度之寸數中屈之取半合於口之全度中屈之先覓頭上回發當回發中灸之以度度四邊左右前後當繩端而灸前以面為正並依年壯多少一年凡三灸皆須瘡瘥又更灸之壯數如前若速灸火氣引上其數處回發者則灸其近當鼻也若回發近額者亦宜灸若指面為瘢則闕其面處然病重者亦不得計此也治卒癲法灸陰莖上宛宛中三壯得小便通即瘥當尿孔上是穴又灸陰莖頭三壯又灸乳頭三壯又灸足大指上聚毛中七壯又灸督脈三十壯在直鼻人中上入髮際三報之又灸天窗百會各漸灸三百壯炷惟小作又法灸耳上髮際各五壯治卒中邪魅恍惚振噤法鼻下人中及兩手足大指爪甲令艾炷半在爪上半在肉上七炷不止十四壯炷如雀矢大作之狂鬼語針其足大拇指爪甲下入少許即止治大人癲小兒驚癇法灸背第二椎及下窮骨兩處以繩度中折繩端一處是脊骨上也凡三處畢復斷此繩作三折令各等而參合如某字以一角注中央灸下二角俠脊兩邊便灸之凡五處也以丹注所灸五處各百壯削竹為度勝繩也狂風罵詈撾斫人名為熱陽風灸口兩吻邊燕口處赤白際各一壯又灸陰囊縫三十壯令人立以筆正注當下己臥卻核卵令上乃灸之勿令近前中卵核恐害於陽氣也卒發狂言鬼語法以甑帶急合縛兩手大指便灸左右脅當對屈肘頭兩處火俱下各七壯須臾鬼語自道姓名乞去徐徐語問乃解其手狂癇不識人癲病眩亂灸百會九壯狂走瘛瘲灸玉枕上三寸一法頂後一寸百壯狂邪鬼語灸天窗九壯又灸口吻十五壯狂癲哭泣灸手逆注三十壯在手腕後六寸狂走驚癇灸河口五十壯在手腕後陷中動脈此與陽明同也狂癲風癲吐舌灸胃管百壯不針又灸大幽一百壯又灸間使三十壯千金云治狂走癲癇狂言恍惚灸天樞百壯又灸間使三十壯千金云治狂言妄語狂走喜怒悲泣灸巨覺隨年壯在背上俠內側反手不及者骨芒穴上六分捻之痛是也一云巨闕俞狂邪驚癇灸承命三十壯在內踝後上行三寸動脈上又灸巨太陽五十壯千金云治狂癲風驚厥逆心煩又灸巨太陽五十壯千金云治狂癲鬼語又灸足少陽隨年壯千金云治狂癲癇狂易又灸足陽明三十壯千金云治狂走驚恍惚狂走癲闕如死人灸足大敦九壯千金云灸足大指三毛中狂走罵詈灸八會隨年壯在陽明下五分狂癲驚走風恍惚瞋喜罵笑歌哭鬼語吐舌悉灸上星腦戶風池手太陽陽明太陰足太陽陽明陽蹺少陽太陽陰蹺足跟悉隨年壯驚怖心忪少力灸大橫五十壯邪鬼妄語灸懸命一十四壯在口唇里中央絃絃者是一名鬼祿一法以鋼刀決斷絃絃乃佳狂邪鬼語灸伏兔百壯又灸慈門五十壯千金云治悲泣邪語鬼忙歌笑悲泣鬼語灸天府五十壯狂邪發無常披頭大喚欲殺人不避水火者灸間使男左女右隨年壯狂走刺人或欲自死罵詈不息稱鬼神語灸口吻頭赤白際一壯又灸兩肘內屈中五壯又灸背脾中間三壯報之驚狂走灸內踝上三寸近後動脈上七壯邪病四肢重痛諸雜候尺澤主之一名鬼堂邪病語不止及諸雜候人中主之一名鬼市千金云一名鬼客廳凡人中惡先掐鼻下足也邪病臥冥冥不自知風府主之一名鬼穴邪病大喚罵詈走十指端去爪一分主之一名鬼城邪病鬼癲胸上主之一名鬼門並主四肢重邪病大喚罵走三里主之一名鬼邪勞宮一名鬼路陽澤一名鬼臣耳前髮際宛宛中一名鬼床尺中動脈名鬼受足太陽名鬼路癲狂二三十年者灸天窗次肩井次風門次肝俞次腎俞次手心主次曲池次足五趾次湧泉各五百壯日七壯針邪鬼病圖訣法凡百邪之病源起多途其有種種形相示表癲邪之端而見其病或有默然而不聲或復多言而謾語或歌或哭或笑或吟或眠坐溝渠啖食糞穢或裸露形體或晝夜遊走或嗔罵無度或是飛蟲精靈手亂目急如斯種類癲狂之人今針灸與方藥並主治之扁鵲曰百邪所病者針有十三穴凡針之體先從鬼宮起次針鬼信便至鬼壘又至鬼心未必須並針止五六穴即可知矣若是邪蟲之精便自言説論其由來往驗有實立得精靈未必須盡其命求去與之男從左起針女從右起針若數處不言便遍針也依訣而行針灸等處並備主之第一初下針從人中名鬼宮在鼻下人中左邊下針出右邊第二次下針手大指爪甲下三分名鬼信入肉三分第三次下針足大指爪甲下入肉二分名鬼壘五指皆針第四次下針在掌後橫紋入半解名鬼心第五次下針在外踝下白肉際火針七鋥鋥三下名鬼路第六次下針入髮際一寸大椎以上火針七鋥鋥三下名鬼枕第七次下針去耳垂下五分火針七鋥鋥三下名鬼床第八次下針承漿從左刺出右名鬼市第九次下針從手橫紋三寸兩筋間針度之名鬼路此名間使第十次下針入髮際直鼻上一寸火針七鋥鋥三下名鬼堂第十一次下針陰下縫灸三壯女人玉門頭三壯名鬼藏第十二次下針尺澤橫紋中內外兩紋頭接白肉際七鋥鋥三下名鬼臣此名曲池第十三次下針去舌頭一寸當舌中下縫刺貫出舌上仍以一板橫口吻安針頭令舌不得動名鬼封上以前若是手足皆相對針兩穴若是孤穴即單針之治風邪法灸間使隨年壯又灸承漿七壯三報之又灸心俞七壯又灸三里七壯治鬼魅灸入髮際一寸百壯灸間使手心各五十壯野狐魅合手大指急縛大指灸合間二七壯當狐鳴而愈脾病第五三十二法脾俞主四肢寒熱腰疼不得俯仰身黃腹滿食嘔舌根直並灸椎上三穴各七壯治老小大便失禁法灸兩腳大指去甲一寸三壯又炙大指奇間各三壯大小便不通灸臍下一寸三壯又灸橫紋百壯治大便難法灸第七椎兩旁各一寸七壯灸俠玉泉相去二寸半名腸遺隨年壯一云二寸又灸承筋二穴三壯又灸大都隨年壯又灸大敦四壯腹中熱閉時大小便難腰痛連胸灸團岡百壯在小腸俞下二寸橫三間寸灸之大便閉塞氣結心堅滿灸石門百壯大小便不利欲作腹痛灸榮衛四穴各百壯在背脊四面各一寸大小便不利灸八窖百壯在腰目下三寸俠脊相去四寸兩邊各四穴小兒大小便不通灸魃口兩吻各一壯小便不利大便數泄注灸屈骨端五十壯又灸天樞百壯在俠臍相去各二寸魂魄之舍不可下針一名相去三寸治痢法大便下血灸第二十椎隨年壯恐是中膂肉俞赤白下痢灸窮骨頭百壯多多益佳食不消化泄痢不作肌膚灸脾俞隨年壯泄注五痢便膿血重下腹痛灸小腸俞百壯泄痢久下失氣勞冷灸下腰百壯三報之在八魁正中脊骨上灸多益佳三宗骨是忌針少腹絞痛泄痢不止灸丹田百壯三報之在臍下二寸針入五分不痢不嗜食食不消灸長谷五十壯三報之在俠臍相去五寸一名循際下痢赤白灸足太陰五十壯三報之久冷五痔便血灸脊中百壯五痔便血失屎灸回氣百壯在脊窮骨上赤白下灸窮胸惟多益佳久痢百治不瘥灸足陽明下一寸高骨之上中去大指奇間三寸灸隨年壯又灸關元三百壯十日灸並治冷痢腹痛又先屈竹量正當兩胯脊上點記下量一寸點兩旁各一寸復下量一寸當脊上合三處一灸三十壯灸百壯以上一切痢皆瘥亦主疳濕脊上當胯點處不灸又灸臍中稍稍至二三百壯胃病第六三十四法治胃補胃灸胃俞百壯主胃中寒不能食食多身羸瘦腸鳴腹滿胃脹灸三焦俞主五臟六腑積聚心腹滿腰背痛飲食不消吐逆寒熱往來小便不利羸瘦少氣隨年壯又灸心下二寸名胃管百壯至千壯佳小腸俞主三焦寒熱灸隨年壯治胃中熱病膝下三寸名三里灸三十壯反胃食即吐出上氣灸兩乳下各一寸以瘥為限又灸臍上一寸二十壯又灸內踝下三指稍斜向前有穴三壯外臺祕要云一指灸胸脅脹滿法臚脹脅腹滿灸膈俞百壯三報之脹滿水腫灸脾俞隨年壯三報之脹滿雷鳴灸犬腸俞百壯三報之脹滿氣聚寒冷灸胃管在心鳩尾下三寸百壯三報之脹滿繞臍結痛堅不能食灸中守百壯在臍上一寸一名水分脹滿瘕聚滯下疼灸氣海百壯在臍下一寸忌針脹滿氣如水腫狀少腹堅如石灸膀胱募百壯在中極臍下四寸脹滿腎冷瘕聚泄痢灸天樞百壯胸滿心腹積聚痞疼痛灸肝俞百壯灸乾嘔法乾嘔不止所食即吐不停灸間使三十壯若四厥脈沉絶不至者灸之便通此法起死人又灸心主尺澤亦佳又灸乳下一寸三十壯凡噦令人惋恨灸承漿炷如麥七壯又灸臍下四指七壯治卒噦灸膻中中府胃管各數十壯灸尺澤巨闕各七壯灸吐法吐逆不得食灸心俞百壯吐逆不得下食今日食明日吐灸膈俞百壯卒吐逆灸乳下一寸七壯吐變不下食灸胸膛百壯又灸巨闕五十壯又灸胃管百壯三報之又灸脾募百壯一名章門在大橫外直臍季肋端三報之嘔吐宿汁吞酸灸神光一名膽募百壯三報之甲乙經云日月膽募也在期門下五分嘔吐咳逆霍亂吐血灸手心主五十壯噫噦膈中氣閉塞灸腋下聚毛下附肋宛宛中五十壯神良噫噦嘔逆灸石關百壯肺病第七四十五法肺脹氣搶脅下熱痛灸俠胃管兩邊相去一寸名陰都隨年壯又刺手太陰出血主肺熱氣上咳嗽寸口是也肺脹脅滿嘔吐上氣等灸大椎並兩乳上第三肋間各三壯凡肺風氣痿絶四肢脹滿喘逆胸滿灸肺俞各兩壯肺俞對乳引繩度之肺俞主喉痹氣逆咳嗽口中涎唾灸七壯亦隨年壯可至百壯嘔吐上氣灸尺澤在肘中不三則七腹中雷鳴相逐食不化逆氣灸上管下一寸名太倉七壯治奔豚上氣法章門一名長平二穴在大橫外直臍季肋端主奔豚腹腫灸百壯又灸氣海百壯在臍下一寸半又灸關元五十壯亦可百壯在臍下三寸中極一名玉泉在臍下四寸主奔豚搶心不得息灸五十壯心中煩熱奔豚胃氣脹滿不能食針上管入八分得氣即瀉若心痛不能食為冷氣宜先補後瀉神驗灸之亦佳日二七至百止不瘥倍之不忌房室奔豚冷氣心間伏梁狀如覆杯冷結諸氣針中管入八分留七呼在上管下一寸瀉五吸疾出針須灸日二七壯至四百止慎忌房室又中府二穴主奔豚上下腹中與腰相引痛灸百壯又期門二穴直乳下二肋端旁一寸五分主奔豚灸百壯又四滿俠丹田兩旁相去三寸灸百壯一云三十壯主奔豚氣上下搶心腹痛凡上氣冷發腹中雷鳴轉叫嘔逆不食灸太衝不限壯數從痛至不痛止炷如雀矢大第四椎名巨闕俞主胸膈中氣灸隨年壯太倉一穴一名胃募心下四寸主心腹諸病堅滿煩痛憂思結氣寒冷霍亂心痛吐下食飲不消腸鳴泄痢灸百壯肓募二穴在乳頭斜度至臍中屈去半從乳下行盡度頭是主結氣囊裹針藥所不及灸隨年壯臍下結痛流入陰中發作無時此冷氣灸關元百壯又灸天井百壯氣短不語灸大椎隨年壯又灸肺俞百壯又灸肝俞百壯又灸尺澤百壯又灸小指第四指間交脈上七壯又灸手十指頭各十壯少年房多短氣灸鳩尾頭五十壯又灸臍孔中二七壯乏氣灸第五椎下隨年壯下氣灸肺俞百壯又灸太衝五十壯此穴並主肺痿灸飛尸法以繩量病人兩乳間中屈又從乳頭向外量使肋𤜮於繩頭灸隨年壯主一切注千金云三壯或七壯男左女右胃管主五毒注不能食飲百病灸至千壯忤注灸手肘尖隨年壯尖一作紋又第七椎灸隨年壯又灸心下一寸三百壯食注灸手小指頭隨年壯男左女右水注口中湧水出經云肺來乘腎食後吐水灸肺俞及三陰交隨年壯瀉肺補腎灸一切注無新久者先仰臥灸兩乳兩邊斜下三寸名注市隨年壯第二肋間名期門灸隨年壯凡中尸者飛尸循尸風尸尸注也今皆取一方治之其狀皆腹脹痛急不得氣息上衝心胸兩肋或踝腫起或攣引腰脊灸乳後三寸男左女右可二七壯不止者多其壯數即愈又兩手大指頭各灸七壯乳下一寸逐病所在灸之病瘥止一切惡注氣急不得息欲絶者及積年不瘥者男左手虎口紋於左乳頭並四指當小指節下間灸之婦人以右手也大腸病第八二十二法論一首大腸俞主脹中臚脹食不消化灸四十壯俠巨闕相去五寸名承滿主腸中雷鳴相逐痢下兩邊一處各灸五十壯治咳嗽法肝咳刺足太衝心咳刺手神門脾咳刺足太白肺咳刺手太泉腎咳刺足大溪膽咳刺陽陵泉厥陰咳刺手太陰嗽灸兩乳下黑白肉際各一百壯即瘥又以蒲當乳頭周匝圍身令前後正平當脊骨解中灸十壯又以繩橫度口中折繩從脊灸繩兩邊各八十壯三報之三日畢兩邊者口合度也又灸大椎下數下行第五節下第六節上穴中間一處並主上氣呀嗽灸兩屈肘裹大橫紋下頭隨年壯上氣咳逆短氣氣滿食不下灸肺募五十壯上氣咳逆短氣風勞百病灸肩井二百壯上氣短氣咳逆胸背徹痛灸風門熱府百壯上氣咳逆短氣胸滿多唾唾血冷痰灸肺俞隨年壯千金云五十壯上氣氣悶咳逆咽塞聲壞喉中猜猜灸天瞿五十壯一名天突上氣胸滿短氣灸雲門五十壯上氣咳逆胸痹徹背痛灸胸堂百壯忌刺上氣咳逆灸膻中五十壯上氣咳逆胸滿短氣牽背徹痛灸巨闕期門各五十壯灸咳手屈臂中有橫紋外骨捻頭得痛處二七壯又內踝上三寸絶骨宛宛中灸五十壯主咳逆虛勞寒損憂恚筋骨攣痛又主心中咳逆泄注腹痛喉痹項頸滿腸痔逆氣痔血陰急鼻衄骨瘡大小便澀鼻中乾燥煩滿狂易走氣凡二十二種病皆當灸之也論曰凡上氣有服吐藥得瘥亦有針灸得除者宜深體悟之治痰飲法諸結積留飲澼囊胸滿飲食不消灸通谷五十壯又灸胃管三百壯三報之心下堅積聚冷熱腹脹灸上管百壯三報之腎病第九二十四法對臍當脊兩邊相去各一寸五分名腎俞主腎間風虛各灸百壯治小便失精法灸第七椎兩旁三十壯又灸第十椎兩旁三十壯又灸陽陵泉陰陵泉各隨年壯灸第十九椎兩旁各三十壯男女夢與人交泄精三陰交灸五壯喜夢泄神良丈夫夢失精小便濁難灸腎俞百壯男子陰中疼痛尿血精出灸列缺五十壯失精五臟虛竭灸屈骨端五十壯陰上橫骨中央宛曲如卻月中央是也一名橫骨男子失精陰上縮莖中痛灸大赫三十壯在俠屈骨端三寸男子腰脊冷疼小便白濁灸脾募百壯男子失精膝脛疼冷灸曲泉百壯男子失精失縮灸中封五十壯第二十二椎主腰背不便筋攣痹縮虛熱閉塞灸隨年壯兩旁各一寸五分小腸俞主小便不利少腹脹滿虛乏灸隨年壯骨髓冷疼灸上廉七十壯三里下三寸治腰疼法腰卒痛去窮脊上一寸灸七壯腎俞主五臟虛勞少腹弦急脹熱灸五十壯老小損之若虛冷可至百壯橫三間寸灸之腰痛不得動者令病人正立以竹杖柱地度至臍取杖度背脊灸杖頭處隨年壯良灸訖藏竹杖勿令人得之丈夫痔下血脫肛不食常泄痢婦人崩中去血帶下淋露去赤白雜汁皆灸之此俠兩旁各一寸橫三間寸灸之腰痛灸足跟上斜紋中白肉際十壯又灸巨陽十壯巨陽在外踝下又灸腰目窖在尻上約左右是又灸八窖及外踝上骨約中膀胱病第十三十二法灸轉胞法玉泉主腰痛小便不利若胞轉灸七壯第十七椎灸五十壯又灸臍下一寸又灸臍下四寸各隨年壯第四椎名厥陰俞主胸中膈氣積聚好吐隨年壯灸之俠屈骨相去五寸名水道主三焦膀胱腎中熱氣隨年壯屈骨在臍下五寸屈骨端水道俠兩旁各三寸半俠臍旁相去兩邊各二寸半名大橫主四肢不可舉動多汗洞痢灸之隨年壯第十五椎名下極俞主腹中疾腰痛膀胱寒澼飲注下隨年壯灸之小腸俞主膀胱三焦津液下大小腸寒熱赤白泄洞痢腰脊痛又主小便不利婦人帶下灸之各五十壯小腸俞主三焦寒熱一如灸腎法治霍亂法凡霍亂灸之或雖未即瘥終無死憂不可逆灸或但先腹痛或先下後吐當隨病狀灸之納鹽臍中灸二七壯並主脹滿治霍亂轉筋令病人正合面臥伸兩手著身以繩橫兩肘尖頭依繩下俠脊骨兩旁相去一寸半灸一百壯無不瘥者肘後云此華他法若先心痛先吐灸巨闕二七壯不瘥更二七壯若先腹痛灸太倉二七壯不瘥更二七壯若先下痢灸谷門在臍旁二寸男左女右一名大腸募灸二七壯不止更灸二七壯吐痢不禁三陰三陽但數者灸心蔽骨下三寸又灸臍下三寸各六七十壯霍亂上下吐瀉灸臍下十四壯又灸關元三七壯手足逆冷灸三陰交各七壯不瘥更七壯轉筋灸湧泉三七壯不止灸足腫聚筋上白肉際七壯立愈又灸慈宮二七壯走哺轉筋灸腫踝白肉際左右各二十一壯又灸少腹下橫骨中央隨年壯轉筋四厥灸兩乳根黑白際各一壯轉筋在兩臂及胸中灸手掌白肉際七壯又灸膻中中府巨闕胃管尺澤又灸承山一百壯下若不止灸大都在足大拇指本節內側白肉際各七壯若轉筋入腹欲死四人持其手足灸臍上一寸十四壯四五壯自不動勿持之又中管建里二穴皆主霍亂腸鳴腹痛脹滿弦急上氣針入八分留七呼瀉五吸疾出針可灸百壯日二七壯
