炙乾薑三兩細辛三兩桂心五兩桔梗三兩附子炮去皮二兩人參甘草炙各三兩上一十一味搗篩為末煉蜜和丸如梧子酒服七丸日三加至十五丸轉脾丸主大病後至虛羸瘦不能食食不消化方小麥曲四兩蜀椒一兩去目及閉口汗乾薑吳茱萸大黃各三兩附子炮去皮厚朴炙當歸桂心甘草炙各二兩上一十味搗篩為末煉蜜和丸如梧子酒服十五丸日三溫脾丸主胃氣弱大腹冷則下痢小腹熱即小便難防響腹滿喘氣虛乏乾嘔不得食溫中消穀治脾益氣方法曲小麥糵各五合吳茱萸三合枳實三枚炙人參桔梗麥門冬去心乾薑附子炮去皮細辛各二兩桂心厚朴炙當歸茯苓甘草炙各三兩上一十五味搗篩為末煉蜜和丸如梧子空腹飲服七丸日三亦可加大黃二兩平胃湯主胃中寒熱嘔逆胸中微痛吐如豆羹汁或吐血方阿膠炙芍藥各二兩乾地黃乾薑石膏碎人參黃芩甘草炙各一兩上八味㕮咀以水酒各三升煮取三升分三服胃脹湯主胃氣不足心氣少上奔胸中憒悶寒冷腹中絞痛吐痢宿汁方人參一兩茯苓橘皮乾薑甘草炙各二兩上五味搗篩為末煉蜜和要搗五百杵丸如梧子以水二升銅器中火上煮二十丸一沸不能飲者服一升日三可長將服一名胃服丸又名補臟湯和胃丸主胃痛悁煩噫逆胸中氣滿腹脅下邪氣寒壯積聚大小便乍難調六腑安五臟導達腸胃令人能食並主女人絶産方大黃細辛黃連蜀椒去目閉口者汗皂莢炙去皮子當歸桂心各一分杏仁去皮尖雙仁熬黃芩各一兩半葶藶熬阿膠炙芒硝各半兩厚朴二分炙甘遂一兩半夏五分洗上一十五味搗篩為末煉蜜和丸如梧子空腹酒服五丸日三稍加至十丸試和丸主嘔逆腰以上熱惕惕驚恐時悲淚出時復喜怒妄語夢寤灑灑淅淅頭痛少氣時如醉狀不能食噫聞食臭欲嘔大小便不利或寒熱小便赤黃惡風目視䀮䀮耳中凶凶方防風澤瀉白朮蛇床子吳茱萸細辛菖蒲烏頭炮去皮五味子各一分當歸遠志去心桂心各半兩乾薑三分上一十三味搗篩為末煉蜜和丸空腹吞五丸如梧子日三加至十丸華他方補腎湯主腎氣不足心中忙忙而悶目視䀮䀮心懸少氣陽氣不足耳聾目前如星火消渴疽痔一身悉癢骨中疼痛小弱拘急乏氣難咽咽乾唾如膠色黑方磁石生薑切五味子防風牡丹皮玄參桂心甘草炙各二兩附子一兩炮去皮大豆二十四枚上一十味㕮咀以水一斗二升銅器中揚之三百遍納藥煮取六升去滓更煎得二升八合分為三服腎著湯主腰以下冷痛而重如帶五千錢小便不利方茯苓白朮各四兩乾薑二兩甘草一兩炙上四味㕮咀以水六升煮取三升分三服治腎間有水氣腰脊疼痛腹背拘急絞痛方茯苓白朮澤瀉乾薑各四兩上四味㕮咀以水八升煮取三升分三服又方茯苓白朮各四兩飴糖八兩乾薑甘草炙各二兩上五味㕮咀以水一斗煮取三升納飴糖煎之令煬分為四服大補腎湯主腎氣腰背疼重方磁石石斛茯苓橘皮麥門冬去心芍藥牛膝棘刺桂心各三兩地骨皮三升人參當歸五味子高良薑杜仲各五兩炙紫菀乾薑各四兩遠志一兩半去心乾地黃六兩甘草二兩炙上二十味㕮咀以水四升煮取一斗分十服腎氣丸主五勞七傷臟中虛竭腎氣不足陰下癢小便餘瀝忽忽喜忘悲愁不樂不嗜食飲方薯蕷石斛各三分蓯蓉黃耆各三兩羊腎一具茯苓五味子遠志去心當歸澤瀉人參巴戟天防風附子炮去皮乾薑天雄炮去皮乾地黃獨活桂心棘刺杜仲炙菟絲子各二兩上二十二味搗篩為末煉蜜和丸如梧子空腹酒服十丸日三稍加至二十丸腎瀝散主五勞男子百病方防風黃芩山茱萸白蘞厚朴炙芍藥薯蕷麥門冬去心天雄炮去皮甘草炙各五分獨活菊花秦艽細辛白朮枳實炙柏子仁各一兩當歸芎藭菟絲子蓯蓉桂心各七分石斛乾薑人參各二兩鍾乳研蜀椒汗去目閉口者附子炮去皮白石英各一兩烏頭三分炮去皮羊腎一具黃耆二兩半上三十二味搗篩為散酒服方寸匕日二加至二匕日三瀉腎散主男子諸虛不足腎氣乏方硝石礬石各八分上二味搗篩為散以粳米粥汁一升納一方寸匕攪令和調頓服之日三不知稍增五臟氣虛第五方九首五補湯主五臟內虛竭短氣咳逆傷損鬱郁不足下氣復通津液方麥門冬去心小麥各一升粳米三合地骨皮薤白各一斤人參五味子桂心甘草炙各二兩生薑八兩切上一十味㕮咀以水一斗二升煮取三升分三服口乾先煮竹葉一把減一升去滓納藥煮之人參湯主男子五勞七傷胸中逆滿害食乏氣嘔逆兩脅下脹少腹急痛宛轉欲死調中平臟氣理傷絶方人參茯苓芍藥當歸白糖桂心甘草炙各二兩蜀椒去目及閉口汗生薑前胡橘皮五味子各一兩枳實三分炙麥門冬三合去心大棗十五枚擘上一十五味㕮咀以東流水一斗五升漬藥半日以三歲陳蘆微微煮取四升去滓納糖令消二十以上六十以下服一升二十以下六十以上服七八合久羸者服七合日三夜一治手足厥寒脈為之細絶其人有寒者當歸茱萸四逆湯方當歸芍藥桂心各三兩吳茱萸二升生薑半斤切細辛通草甘草各二兩炙大棗二十五枚擘上九味㕮咀以酒水各四升煮取三升分四服治下痢清穀內寒外熱手足厥逆脈微欲絶身反惡寒其人面赤或腹痛乾嘔或咽痛或痢止脈不出通脈四逆湯方甘草一兩炙大附子一枚生去皮破八片乾薑三兩強人可四兩上三味㕮咀二味以水三升煮取一升二合分再服脈即出也面赤者加蔥白九莖腹痛者去蔥白加芍藥二兩嘔者加生薑二兩咽痛者去芍藥加桔梗一兩痢止脈不出者去桔梗加人參二兩復脈湯主虛勞不足汗出而悶脈結心悸行動如常不出百日危急者二十一日死方生地黃一斤細切生薑三兩切麥門冬去心麻子仁各三兩阿膠三兩炙大棗三十枚擘人參桂心各二兩甘草四兩炙上九味㕮咀以水一斗煮取六升去滓分六服日三夜三若脈未復隔日又服一劑力弱者三日一劑乃至五劑十劑以脈復為度宜取汗越公楊素因患失脈七日服五劑而復仲景名炙甘草湯一方以酒七升水八升煮取三升見傷寒中大建中湯主五勞七傷小腸急臍下彭亨兩脅脹滿腰脊相引鼻口乾燥目暗䀮䀮憒憒不樂胸中氣逆不下食飲莖中策然痛小便赤黃尿有餘瀝夢與鬼神交通失精驚恐虛乏方人參龍骨澤瀉黃耆各三兩大棗二十枚芍藥四兩遠志去心甘草炙各二兩生薑切飴糖各八兩上一十味㕮咀以水一斗煮取二升半去滓納飴糖令消一服八合相去如行十里久千金有當歸三兩小建中湯所主與前方同芍藥六兩桂心三兩生薑三兩切飴糖一升甘草二兩炙大棗二十枚擘上六味㕮咀以水七升煮取三升去滓納飴糖一服一升日三服已載傷寒中此再見之茯苓湯主虛損短氣咽喉不利唾如稠膠凝塞方茯苓前胡桂心各二兩麥門冬五兩去心大棗四十枚擘人參乾地黃芍藥甘草各一兩炙上九味㕮咀以水一斗煮麥門冬及八升除滓納藥煮取三升分三服三劑永瘥一名凝唾湯黃耆湯主虛勞不足四肢頓瘵不欲食飲食即汗出方黃耆當歸細辛五味子生薑切人參桂心甘草各二兩炙芍藥三兩前胡一兩茯苓四兩半夏八兩洗麥門冬二兩去心大棗二十枚擘上一十四味㕮咀以水一斗四升煮取三升去滓一服八合日三補虛丸散第六方二十二首菴䕡散主風勞濕痹痿厥少氣筋攣關節疼痛難以屈伸或不能行履精衰目瞑陰陽不起腹中不調乍寒乍熱大小便或澀此是腎虛所致主之方菴䕡子酸棗仁大豆卷薏苡仁車前子蔓荊子菥蓂子冬瓜子菊花秦椒汗去子並閉目者各一升阿膠一斤炒上一十一味各搗絹下為散合和搗令相得食後服三合日再若苦筋攣骨節痛難以屈伸倍酸棗仁菴䕡菥蓂瓜子各三升久服不老益氣輕身耳目聰明大五補丸主五臟勞氣七傷虛損不足冷熱不調飲食無味薯蕷石龍芮覆盆子乾地黃五味子各二兩石楠秦艽五加皮天雄炮去皮狗脊人參黃耆防風山茱萸白朮杜仲炙桂心各一兩麥門冬去心巴戟天各一兩半遠志二兩半去心石斛菟絲子天門冬各七分去心蛇床子萆薢各半兩茯苓五分乾薑三分肉蓯蓉三兩上二十八味搗篩為末煉蜜和丸如梧子空腹以酒服十丸日三稍加至三十丸翟平薯蕷丸補諸虛勞損方薯蕷牛膝菟絲子澤瀉乾地黃茯苓巴戟天赤石脂山茱萸杜仲炙各二兩蓯蓉四兩五味子一兩半上一十二味搗篩為末煉蜜和丸如梧子酒服二十丸日一夜一瘦者加敦煌石膏二兩健忘加遠志二兩少津液加柏子仁二兩慎食蒜醋陳臭等物薯蕷散補虛風勞方薯蕷牛膝續斷巴戟天菟絲子茯苓枸杞子五味子杜促各一兩炙蛇床子山茱萸各三分蓯蓉一兩上一十二味搗篩為散酒服方寸匕日二夜一惟禁蒜醋健忘加遠志茯神體澀加柏子仁各二兩服三劑益肌肉亦可為丸薯蕷散主頭面有風牽引眼睛疼痛偏視不明方薯蕷五兩細辛一兩半天雄炮去皮秦艽各二兩桂心羌活山茱萸各二兩半上七味搗篩為散酒服方寸匕日三十味腎氣丸主補虛方桂心牡丹皮澤瀉薯蕷芍藥各四兩玄參茯苓山茱萸各五兩附子三兩炮去皮乾地黃八兩上一十味搗篩為末煉蜜和丸如梧子以酒服二十丸稍加至三十丸以知為度張仲景八味腎氣丸方乾地黃八兩澤瀉二兩桂心二兩薯蕷四兩山茱萸四兩牡丹皮茯苓各三兩附子炮去皮二兩上八味搗篩為末煉蜜和丸如梧子以酒服七丸日三稍加至十丸長久可服常服大補益散方肉蓯蓉干棗肉石斛各八兩枸杞子一斤菟絲子續斷遠志各五兩去心天雄三兩炮去皮乾地黃十兩上九味搗篩為散酒服方寸匕日二無所忌補虛主陽氣斷絶不起方白石英陽起石磁石蓯蓉菟絲子乾地黃各二兩半五味子石斛桔梗白朮各二兩巴戟天防風各五分蛇床子半兩桂心上一十四味搗篩為末煉蜜和丸如梧子酒服十五丸日三稍加至二十丸以知為度小秦艽散主風虛疥瘙癢方秦艽三兩茯苓牡蠣熬附子炮去皮黃芩各半兩人參三分乾薑細辛各五分白朮三兩半蜀椒去目閉口者汗桔梗防風桂心各一兩上一十三味搗篩為散酒服方寸匕日再治陽氣衰微終日不起方蛇床子三分菟絲子草汁二合上二味和如泥塗上日五遍三日大驗又方車前根葉上一味曝乾搗為散酒服方寸匕日三服又方原蠶蛾末連者一升上一味陰乾去頭足翅搗篩為末煉蜜和丸如梧子夜臥服一丸又方蛇床子菟絲子杜仲各五分炙五味子一兩肉蓯蓉二兩上五味搗篩為末煉蜜和丸如梧子酒服十四丸日二夜一又方陽起石上一味以酒三斗漬二七日服三合日三夜一又方特生礜石火煉一伏時上一味搗末酒漬二七日服五合日三夜一淮南八公石斛散主風濕痹疼腰腳不遂方石斛防風茯苓乾薑細辛雲母杜仲炙遠志去心菟絲子天雄炮去皮人參蓯蓉萆薢桂心乾地黃牛膝蛇床薯蕷巴戟天續斷山茱萸白朮各一兩菊花附子炮去皮蜀椒去目閉口者汗五味子各二兩上二十六味搗篩為散酒服方寸匕日再琥珀散主虛勞百病陰痿精清力不足大小便不利如淋腦間寒氣結在關元強行陰陽精少餘瀝治腰脊痛四肢重咽乾口燥飲食無味乏氣少力遠視䀮䀮驚悸不安五臟氣虛上氣悶滿方琥珀二兩石葦乾薑滑石牡丹皮茯苓芎藭石斛續斷當歸人參遠志去心桂心各三兩蓯蓉千歲松脂牡蒙橘皮各四兩松子柏子仁荏子各三升車前子菟絲子菴䕡子各一升枸杞子一兩牛膝三兩通草十四兩胡麻子蕪菁子蛇床子麥門冬各一升去心上三十味各異搗合搗兩千杵重絹下合和盛以葦囊先食服方寸匕日三夜一用牛羊乳煎令熟常服令人志性強輕身益氣力消穀能食耐寒暑百病除愈久服老而更少發白更黑齒落更生矣禿雞散方蛇床子菟絲子遠志去心五味子巴戟天防風各半兩蓯蓉三分杜仲一分炙上八味搗篩為散酒服方寸匕日一服三仁九子丸主五勞七傷補益方酸棗仁柏子仁薏苡仁蛇床子枸杞子五味子菟絲子菊花子菴䕡子蔓荊子地膚子烏麻子乾地黃薯蕷桂心上一十五味各二兩加蓯蓉二兩搗篩為末煉蜜和丸如梧子酒服二十丸日二大主腎虛勞療氣及虛方千金方云治氣及補五勞七傷無所不治明目利小便白石英十兩成煉者石斛蓯蓉各一兩半菟絲子三兩茯苓澤瀉橘皮各一兩上七味先取白石英無多少以鐵錘砧上細打去暗者及惡物黶翳惟取向日看明徹者搗絹篩於銅盤中水研之如米粉法三度研訖澄之漸漸卻水曝令浥浥然看上有不淨之物去之取中心好者在下有惡物亦去之所得好者更研令熟以帛練袋盛置瓷甕合上以三斗米下蒸之飯熟下懸袋日中干之取出更研然後搗諸藥下篩總於瓷器中研令相得酒服方寸匕日二不得過之忌豬魚鵝鴨蒜生冷醋滑治腰痛方鹿角末酒服方寸匕日二服
