body:
  text: 卷第十二養性養性禁忌第一論曰張湛稱養性繕寫經方在於代者甚衆嵇叔夜論之最精然辭旨遠不會近余之所言在其義與事歸實録以貽後代不違情性之歡而俯仰可從不棄耳目之好而顧眄可行使旨約而贍廣業少而功多所謂易則易知簡則易從故其大要一曰嗇神二曰愛氣三曰養形四曰導引五曰言論六曰飲食七曰房室八曰反俗九曰醫藥十曰禁忌過此已往未之或知也列子曰一體之盈虛消息皆通於天地應於物類故陰氣壯則夢涉大水而恐懼陽氣壯則夢涉大火而燔焫陰陽俱壯則夢生殺甚飽則夢與甚飢則夢取是以浮虛為疾者則夢揚沉實為疾者則夢溺藉帶而寢者則夢蛇飛鳥銜發者則夢盡心躁者夢火將病者夢飲酒歌舞將衰者夢哭是以和之於始治之於終靜神滅想此養生之道備也彭祖曰每施瀉訖輒導引以補其虛不爾血脈髓腦日損犯之者生疾病俗人不知補瀉之義故也飲酒吐逆勞作汗出以當風臥濕飽食大呼疾走舉重走馬引強語笑無度思慮太深皆損年壽是以為道者務思和理焉口目亂心聖人所以閉之名利敗身聖人所以去之故天老曰丈夫處其厚不處其薄當去禮去聖守愚以自養斯乃德之源也彭祖曰上士別床中士異被服藥百裹不如獨臥色使目盲聲使耳聾味使口爽苟能節宣其宜適抑揚其通塞者可以增壽一日之忌者暮無飽食一月之忌者暮無大醉一歲之忌者暮須遠內終身之忌者暮常護氣夜飽損一日之壽夜醉損一月之壽一接損一歲之壽慎之清旦初以左右手摩交耳從頭上挽兩耳又引發則面氣通流如此者令人頭不白耳不聾又摩掌令熱以摩面從上向下二七過去皯氣令人面有光又令人勝風寒時氣寒熱頭痛百疾皆除真人曰欲求長生壽考服諸神藥者當須先斷房室肅齊沐浴薰香不得至喪孝家及産乳處慎之慎之古之學道者所以山居者良以此也老子曰人欲求道勿起五逆六不祥凶大小便向西一逆向北二逆向日三逆向月四逆仰視日月星辰五逆夜半裸形一不祥旦起嗔心二不祥向灶罵詈三不祥以足納火四不祥夫妻晝合五不祥盜師父物六不祥旦起常言善事天與之福勿言奈何及禍事名請禍慎勿床上仰臥大凶臥伏地大凶飽食伏地大凶以匙箸擊盤大凶大勞行房室露臥發癲病醉勿食熱食畢摩腹能除百病熱食傷骨冷食傷肺熱無灼唇冷無冰齒食畢行步蜘蹰則長生食勿大言大飽血脈閉臥欲得數轉側冬溫夏涼慎勿冒之大醉神散越大樂氣飛揚大愁氣不通久坐傷筋久立傷骨凡欲坐先解脫右靴履大言用精令人氣乏多睡令人目盲多唾令人心煩貪美食令人泄痢沐浴無常不吉沐與浴同日凶夫妻同日沐浴凶說夢者凶凡日月蝕救之吉活千人除殃活萬人與天地同功日月薄蝕大風大雨虹霓地動雷電霹靂大寒大霧四時節變不可交合陰陽慎之凡夏至後丙丁日冬至後庚辛日皆不可合陰陽大凶凡大月十七日小月十六日此各毀敗日不可交會犯之傷血脈凡月二日三日五日九日二十日此生日也交會令人無疾凡新沐遠行及疲飽食醉酒大喜大悲男女熱病未瘥女子月血新産者皆不可合陰陽熱疾新瘥交者死老子曰凡人生多疾病者是風日之子生而早死者是晦日之子在胎而傷者是朔日之子生而母子俱死者是雷霆霹靂日之子能行步有知而死者是下旬之子兵血死者是月水盡之子又是月蝕之子雖胎不成者是弦望之子命不長者是大醉之子不癡必狂者是大勞之子生而不成者是平曉之子意多恐悸者是日出之子好為盜賊貪欲者是禺中之子性癡行不良者是日中之子命能不全者是日昳之子好詐反妄者是晡時之子不盲必聾者是人定之子天地閉氣不通其子死夜半合陰陽生子上壽賢明夜半後合會生子中壽聰明智惠雞鳴合會生子下壽克父母此乃天地之常理也天老曰不稟五常形貌而尊卑貴賤不等皆由父母合會稟氣壽也得合八星陰陽各得其時者上也即富貴之極得合八星陰陽不得其時者中也得中宮不合八星陰陽得其時者下也得下宮不合此宿不得其時者則為凡人矣合宿交會者非惟生子富貴亦利身大吉八星者室參井鬼柳張房心一云凡宿也是月宿所在此星可以合陰陽老子曰人生大限百年節護者可至千歲如膏用小炷之與大炷衆人大言而我小語衆人多繁而我小記衆人悖暴而我不怒不以事纍意不臨時俗之儀淡然無為神氣自滿以此為不死之藥天下莫我知也勿謂暗昧神見我形勿謂小語鬼聞我聲犯禁滿千地收人形人為陽善人自報之人為陰善鬼神報之人為陽惡人身治之人為陰惡鬼神治之故天不欺人示之以影地不欺人示之以響人生天地氣中動作喘息皆應於天為善為惡天皆鑑之人有修善積德而遭凶禍者先世之餘殃也為惡犯禁而遇吉祥者先世之餘福也故善人行不擇日至凶中得凶中之吉入惡中得惡中之善惡人行動擇時日至吉中反得吉中之凶入善中反得善中之惡此皆目然之符也老子曰謝天地父母法常以辰巳日黃昏時天晴日淨掃宅中甲壬丙庚之地燒香北向稽首三過口勿語但心中言耳舉家皆利謝默云曾孫某乙數負黃天之氣象上帝之始願閣家男女大小前後所犯罪過請為削除凶惡在後進善人某家大小身神安生氣還常以此道大吉利除禍殃老子曰正月朔曉亦可於庭中向寅地再拜咒曰洪華洪華受大道之恩太清玄門願還某去歲之年男女皆三過自咒常行此道可以延年論曰神仙之道難致養性之術易崇故善攝生者常須慎於忌諱勤於服食則百年之內不懼於夭傷也所以具録服餌方法以遺後嗣云養性服餌第二方三十七首茯苓酥主除萬病久服延年方取山之陽茯苓其味甘美山之陰茯苓其味苦惡揀得之勿去皮去皮刀薄切曝乾蒸令氣溜以湯淋之其色赤味苦淋之不已候汁味甜便止曝乾搗篩得茯苓三斗取好酒大斗一石蜜一斗和茯苓未令相得納一石五斗甕中熟攪之百遍密封之勿令泄氣冬月五十日夏月二十一日酥浮於酒上接取酥其味甘美如天甘露可作餅大如手掌空屋中陰乾其色赤如棗飢食一餅終日不飢此仙人度荒世藥取酒封閉以下藥名茯苓酥杏仁酥主萬病除諸風虛勞冷方取家杏仁其味甜香特忌用山杏仁山杏仁慎勿用大毒害人也家杏仁一石去尖皮兩仁者揀完全者若微有缺壞一顆不得用微火炒搗作細末取美酒兩石研杏仁取汁一石五斗上一味以蜜一斗拌杏仁汁煎極令濃與乳相似納兩頂甕中攪之密封泥勿令泄氣與上茯苓酥同法三十日看之酒上出酥也接取酥納瓷器中封之取酥下酒別封之團其藥如梨大置空屋中作閣安之皆如飴餔狀甚美服之令人斷谷地黃酒酥令人發白更黑齒落更生髓腦滿實還年卻老走及奔馬久服有子方粗肥地黃十石切搗取汁三石麻子一石搗作末以地黃汁研取汁二石七斗杏仁一石去皮尖兩仁者搗作末以麻子汁研取汁二石五斗曲末三斗上四味以地黃等汁浸曲七日候沸以米三石分作三分投下饙一度以藥汁五斗和饙釀酒如家醒酒法三日一投九日三投熟訖蜜封三七日酥在酒上其酥色如金以物接取可得大升九升酥然後下亞王不取酒封之其糟令服藥人食之令人肥悅百病除愈食糟盡乃服藥酒及酥一服酒一升一匙酥溫酒和服之惟得吃白飯芫菁忌生冷酢滑豬雞魚蒜其地黃滓曝使干更以酒三升和地黃滓搗之曝乾作餅服之造草酥方杏仁一斗去皮尖兩仁者以水一斗研絞取汁粗肥地黃十斤熟搗絞取汁一斗麻子一斗末之以水一斗研絞取汁上三味汁凡三斗著曲一斤米三斗釀如常酒味是正熟出以甕盛之即酥凝在上每服取熱酒和之令酥消盡服之彌佳真人服杏子丹玄隱干學道斷谷以當米糧方上粳米三斗淨淘沙炊作飯干曝磑紗篩下之杏仁三斗去尖兩仁者曝乾搗以水五升研之絞取汁味盡止上二味先煎杏仁汁令如稀麵糊置銅器中納粳米粉如稀粥以煻火煎自旦至久攪勿停手候其中水氣盡則出之陰乾紙貯欲用以暖湯二升納藥如雞子大置於湯中停一炊久敢食任意取足服之服天門冬丸方凡天門冬苗作蔓有鉤刺者是採得當以酢漿水煮之濕去心皮曝乾搗篩以水蜜中半和之仍更曝乾又搗末水蜜中半和之更曝乾每取一丸含之有津液輒咽之常含勿絶行亦含之久久自可絶谷禁一切食惟得吃大麥服黃精方凡採黃精須去苗下節去皮取一節隔二日增一節十日服四節二十日服八節空腹服之服訖不得漱口百日以上節食二百日病除二年四體調和忌食酒肉五辛酥油得食粳米糜粥淡食除此之外一物不得入口山居無人之地法服時臥食勿坐食坐服即入頭令人頭痛服訖經一食須乃起即無所畏凡服烏麻忌棗粟胡桃得食淡面余悉忌行道持甬作勞遠行端坐三百日一切病除七日內宜數見穢惡於後即不畏損人矣服蕪菁子主百疾方蕪菁一斗四升薤白十兩上二味煮蕪菁子曝乾搗篩切薤白和蒸半日下搗一千一百三十杵捻作餅重八兩欲絶谷先食乃服三日後食三餅以為常式盡更合食勿使絶也華他雲母丸於三人丸方雲母粉石鐘乳煉白石英肉蓯蓉石膏天門冬去心人參續斷菖蒲菌桂澤瀉秦艽紫芝五加皮鹿茸地膚子薯蕷石斛杜仲炙桑上寄生細辛乾地黃荊花柏葉赤箭酸棗仁五味子牛膝菊花遠志去心萆薢茜根巴戟天赤石脂地黃花枸杞桑螵蛸菴䕡子茯苓天雄炮去皮山茱萸白朮菟絲子松實黃耆麥門冬去心柏子仁薺子冬瓜子蛇床子決明子菥蓂子車前子上五十三味皆用真新好者並等分隨人多少搗下細篩煉白蜜和為丸如梧子先食服十丸可至二十丸日三藥無所忌當勤相續不得廢缺百日滿愈疾久服延年益壽身體輕強耳目聰明流通榮衛補養五臟調和六腑顏色充壯不知衰老茜根當洗去土陰乾地黃荊花至時多采曝乾欲用時相接取二石許乃佳也吾嘗服一兩劑大得力皆家貧不濟乃止又時無藥足缺十五味仍得服之此藥大有氣力常須預求使足服而勿缺又香美易服不比諸藥周白水侯散主心虛勞損令人身輕目明服之八十日百骨間寒熱除百日外無所苦氣力日益老人宜常服之大驗方遠志五分去心白朮七分桂心一兩人參三分乾薑一兩續斷五分杜仲五分炙椒半兩汗天雄三分炮茯苓一兩蛇床仁三分附子三分炮去皮防風五分乾地黃五分石斛三分肉蓯蓉三分栝蔞根三分牡蠣三分熬石葦三分去皮鍾乳一兩煉赤石脂一兩桔梗一兩細辛一兩牛膝三分上二十四味搗篩為散酒服錢五匕服後飲酒一升日二不知更增一錢匕三十日身輕目明濟神丸方茯神茯苓桂心乾薑各四兩菖蒲遠志去心細辛白朮人參各三兩甘草二兩炙棗膏八兩上一十一味皆搗篩煉蜜和更搗萬杵每含一丸如彈丸有津咽之盡更含之若食生冷宿食不消增一丸積聚結氣嘔逆心腹絞痛口乾脹酢咽吐嘔皆含之絶谷者服之學仙道士含之益心力神驗彭祖松脂方松脂五斤灰汁煮三十遍漿水煮三十遍清水煮三十遍茯苓五斤灰汁煮十遍漿水煮十遍清水煮十遍生天門冬五斤去心皮曝乾搗作末真牛酥三斤煉三十遍白蜜三斤煎令沫盡蠟三斤煉三十遍上六味搗篩以銅器重湯上先納酥次下蠟次下蜜候消訖次下諸藥急攪之勿住手務令大勻訖納瓷器中密封勿令泄氣先一日不食欲服須吃好美食令大飽然後絶食即服二兩二十日後服四兩又二十日服八兩細丸之以得咽中下為度第二度服四兩為初二十日又服八兩又二十日服二兩第三度服八兩為初以後二十日服二兩又二十日服四兩合二百八十日藥成自余服三丸將補不服亦得常以酥蜜消息美酒一升為佳又合藥須取四時王相特忌刑殺厭及四激休廢等日大凶守中方白蠟一斤煉之凡二升酒為一度煎卻惡物凡煎五遍丹砂四兩細研蜜一斤煉之極淨上三味合丸之如小棗大初一日服三丸三日服九丸如此至九日止茅山人服質多羅方出益州導江縣並茂州山中此有三種一者紫花根八月採二者黃花根亦黃四月採三者白花九月採上三種功能一種不別依法採根干已搗篩且暖一合酒和方寸匕空腹服之待藥消方食日一服不可過之忌晝日眠睡三十匕為一劑一月服第二方蜜半合酥半合上二味暖之和方寸匕服之一法蜜多酥少一方以三指撮為定主療諸風病禁豬肉豉等食之即失藥力第三方取散五兩生胡麻脂三升投之微火暖之勿令熱旦接取上油一合暖空肚服之日一服油盡取滓服之主偏風半身不遂並諸百病延年不老第四方暖水一合和三指撮空腹日一服主身羸瘦及惡瘡癬疥並諸風第五方暖牛乳一升和方寸匕服之日一服主女人絶産無子發白更黑第六方暖濃酪漿五合和方寸匕服之日一服主膈上痰飲水氣諸風第七方以牛尿一合暖和方寸匕服之遣四人搦腳手令氣息通流主五種癲若重者從少服漸加至一匕若候身作金色變為少年顏若桃李延年益壽上件服藥時皆須平旦空腹服之以靜密室中不得傷風及多語戲笑作務等事所食桃李粳米新舂粟禁一切魚肉豉陳臭等物得食乳酪油其藥功說不能盡久服神仙八十老人狀如少年若觸藥發時身體脹滿四肢強直俱赤脫卻衣裳向火灸身得汗出瘥服地黃方生地黃五十斤上一味搗之以水三升絞取汁澄去滓微火上煎減半即納好白蜜五升棗脂一升攪令相得乃止每服雞子大一枚日三服令人肥美色又方上一味細切以淳酒二斗浸經三宿出曝令乾又浸酒中直令酒盡又取甘草巴戟天厚朴乾漆覆盆子各一斤各搗下篩和之飯後酒服方寸匕日三服加至二匕使人老者還少強力無病延年千金無甘草作熟乾地黃法別采地黃去須葉及細楊搗取汁以漬肥者著甑中土及米無在以蓋其上蒸之一時出暴燥更納汁中又蒸之一時出暴以汁盡止便乾之亦可直切地黃蒸之半日數數以酒灑之使周匝至夕出曝乾可搗蜜丸種地黃法並造先擇好肥地黃赤色虛軟者選取好地深耕之可於臘月預耕凍地彌佳擇肥大地黃根切斷長三四分至一二寸許一斛可種一畝二月三月種之作畦畤相去一尺生後隨後鋤壅及數藝之至九月十月視其葉小衰乃掘取一畝得二十許斛擇取大根水淨洗其細根及剪頭尾輩亦洗之日曝令極燥小䐢乃以刀切長寸余白茅覆甑下蒸之密蓋上亦可囊盛土填之從旦至暮當日不盡者明日又擇取蒸之先時已搗其細碎者取汁於銅器中煎之可如薄飴將地黃納汁中周匝出曝乾又納之汁盡止率百斤生者合得三十斤取初八月九月中掘者其根勿令太老強蒸則不消盡有筋脈初以地黃納甑中時先用銅器承其下以好酒淋灑地黃上令匝汁後下器中取以並和煎汁最佳也王喬輕身方茯苓一斤桂心一斤上二味搗篩煉蜜和酒服如雞子黃許大一服三丸日一服不老延年方雷丸防風柏子仁上三味等分搗篩為散酒服方寸匕日三六十以上人亦可服二匕久服延年益精補腦年未六十太盛勿服餌黃精法取黃精以竹刀剔去皮自仰臥生服之盡飽為度則不頭痛若坐服則必頭痛難忍少食鹽及一切滷物佳餌術方取生術削去皮炭火急炙令熱空肚飽食之全無藥氣可以當食不假山糧得飲水神仙祕之勿傳服齊州長石法主羸瘦不能食療百病方馬牙石一名乳石一名牛腦石本草名長石上取黃白明淨無瑕纇者搗密絹下勿令極篩恐太粗以一石米合納一石水中於銅器中極攪令濁澄時接取上汁如清漿水色置一大器中澄如水色去水納滓於白練袋中盛經一宿瀝卻水如造煙脂法出日中曝之令乾仍白練袋盛之其袋每一如掌許大厚薄亦可於三鬥米下蒸之再遍曝乾以手挼之令衆手研之即成擎出每以酒服一大匙日三服即覺患瘥若覺觸以米汁滓石一雞子大煮三沸去滓頓服之夏月不能服散者服湯亦佳石出齊州厲城縣藥療氣痰飲不下食百病羸瘦皆瘥服杏仁法主損心吐血因即虛熱心風健忘無所記憶不能食食則嘔吐身心戰掉萎黃羸瘦進服補藥入腹嘔吐並盡不服余藥還吐至死乃得此方服一劑即瘥第二劑色即如初也杏仁一升去尖皮及兩仁者熬令色黃末之茯苓一斤末之人參五兩末之酥二斤蜜一升半上五味納銅器中微火煎先下蜜次下杏仁次下酥次下茯苓次下人參調令均和則納於瓷器中空肚服之一合稍稍加之以利為度日再服忌魚肉有因讀誦思義坐禪及為外物驚恐狂走失心方酥二兩薤白一握切上二味搗薤千杵溫酥和攪以酒一盞服之至三七日服之佳得食枸杞菜羹薤白亦得作羹服訖而仰臥至食時乃可食也忌面得力者非一鎮心丸主損心不能言語心下懸急苦痛舉動不安數數口中腥客熱心中百病方防風五分人參五分龍齒五分芎藭一兩鐵精一兩當歸一兩乾地黃五分黃耆一兩麥門冬五分去心柏子仁一兩桂心一兩遠志五分去心白蘚皮三分白朮五分雄黃一兩研菖蒲一兩茯苓一兩桔梗一兩乾薑五分光明砂一兩研鍾乳半兩研上二十一味搗篩煉蜜和飲服梧子大五丸漸加至十五丸日二服稍加至三十丸慎腥臭等常宜小進食為佳宜吃酥乳倍日將息先須服湯湯方如下玄參三兩乾地黃三兩黃耆三兩地骨皮三兩蓯蓉三兩丹參五兩牛膝三兩五味子三兩麥門冬三兩去心桔仁二兩去皮尖細辛三兩磁石五兩生薑三兩切茯苓三兩橘皮二兩韭子半升柴胡二兩去苗上一十七味㕮咀以水三斗煮取三升分為三服後三日乃更進丸時時食後服服訖即仰臥少時即左右臥及數轉動須腰底安物令高亦不得過久斟酌得所不得勞役身心氣力服藥時干食即且停一日食訖用兩三口漿水飲壓之服藥時有異狀貌起勿怪之服丸後二日風動藥氣動頭兩眼赤痛久而不瘥者依狀療之法取棗根直入地二尺者白皮一握水一升煮取半升一服即愈五參丸主治心虛熱不能飲食食即嘔逆不欲聞人語方人參一兩苦參一兩半沙參一兩丹參三分玄參半兩上五味搗篩煉蜜和為丸食訖飲服十丸如梧子大日二漸加至二十丸治損心吐血方芎藭二兩蔥白二兩生薑二兩切油五合椒二合汗桂心一兩豉三合白粳米四合上八味㕮咀芎桂二味以水四升煮取二升納米油又煎取一升去滓頓服慎面正禪方春桑耳夏桑子秋桑葉上三味等分搗篩以水一斗煮小豆一升令大熟以桑末一升和煮微沸著鹽豉服之日三服飽服無妨三日外稍去小豆身輕目明無眠睡十日覺運智通初地禪服二十日到二禪定百日得三禪定纍一年得四禪定萬相皆見壞欲界觀境界如視掌中得見佛性服菖蒲方二月八日採取肥實白色節間可容指者多取陰乾去毛距擇吉日搗篩百日一兩為一劑以藥四分蜜一分半酥和如稠糜柔弱令極勻納瓷器中密封口埋谷聚中一百日欲服此藥須先服瀉藥吐利訖取王相日旦空肚服一兩含而咽之有力能消漸加至三二服藥至辰巳間藥消訖可食粳米乳糜更不得吃飲食若渴惟得少許熟湯每日止一服藥一頓食若直治病瘥止若欲延年益壽求聰明益智者宜須勤久服之修合服食須在靜室中勿喜出入及晝睡一生須忌羊肉熟葵又主癥癖咳逆上氣痔漏病最良又令人膚體肥充老者光澤發白更黑面不皺身輕目明行疾如風填骨髓益精氣服一劑壽百歲天竺摩揭陀國王舍城邑陀寺三藏法師跋摩米帝以大業八年與突厥使主至武德六年七月二十三日為洛州大德護法師淨土寺主矩師筆譯出養老大例第三論三首論曰人之在生多諸難遘兼少年之時樂遊馳騁情敦放逸不至於道悠然白首方悟虛生終無所益年至耳順之秋乃希餐餌然將欲頤性莫測據依追思服食者於此二篇中求之能庶幾於道足以延齡矣語云人年老有疾者不療斯言失矣緬尋聖人之意本為老人設方何則年少則陽氣猛盛食者皆甘不假醫藥悉得肥壯至於年邁氣力稍微非藥不救譬之新宅之與故舍斷可知矣論曰人年五十以上陽氣日衰損與日至心力漸退忘前失後興居怠惰計授皆不稱心視聽不穩多退少進日月不等萬事零落心無聊賴健忘瞋怒情性變異食飲無味寢處不安子孫不能識其情惟云大人老來惡性不可咨陳是以為孝之道常須慎護其事每起速稱其所須不得令其意負不快故曰為人子者不植見落之木淮南子曰木葉落長年悲夫栽植卉木尚有避忌況俯仰之間安得輕脫乎論曰人年五十以去皆大便不利或常苦下痢有斯二疾常須預防若祕澀則宜數食葵菜等冷滑之物如其下痢宜與姜韭溫熱之菜所以老人於四時之中常宜溫食不得輕之老人之性必恃其老無有藉在率多驕恣不循軌度忽有所好即須稱情即曉此術當宜常預慎之故養老之要耳無妄聽口無妄言心無妄念此皆有益老人也又當愛情每有誦念無令耳聞此為要妙耳又老人之道常念善無念惡常念生無念殺常念信無念欺養老之道無作博戲強用氣力無舉重無疾行無喜怒無極視無極聽無大用意無大思慮無吁嗟無叫喚無吟訖無歌嘯無垃啈啼無悲愁無哀慟無慶弔無接對賓客無預局席無飲興能如此者可無病長壽斯必不惑也又常避大風大雨大寒大暑大露霜霰雪旋風惡氣能不觸冒者是大吉祥也凡所居之室必須大周密無致風隟也夫善養老者非其書勿讀非其聲勿聽非其務勿行非其食勿食非其食者所謂豬豚雞魚蒜膾生肉生菜白酒大酢大咸也常學淡食至如黃米小豆此等非老者所宜食故必忌之常宜輕清甜淡之物大小麥面粳米等為佳又忌強用力咬齧堅硬脯肉反致折齒破斷之弊人凡常不飢不飽不寒不熱善行住坐臥言談語笑寢食造次之間能行不妄失者則可延年益壽矣養老食療第四方一十七首論五首論曰衛汜稱扁鵲云安身之本必須於食救疾之首惟在於藥不知食宜者不足以全生不明藥性者不能以除病故食能排邪而安臟腑藥能恬神養性以資四氣故為人子者不可不知此二事是故君父有疾期先命食以療之食療不愈然後命藥故孝子須深知食藥二性其方在千金方第二十六卷中論曰人子養老之道雖有水陸百品珍饈每食必忌於雜雜則五味相撓食之不已為人作患是以食敢鮮肴務令簡少飲食當令節儉若貪味傷多老人腸胃皮薄多則不消彭亨短氣必致霍亂夏至以後秋分以前勿進肥羹臛酥酒酪等則無他矣夫老人所以多疾者皆由少時春夏取涼過多飲食太冷故其魚膾生菜生肉腥冷物多損於人宜常斷之惟乳酪酥蜜常宜溫而食之此大利益老年雖然卒多食之亦令人腹脹泄痢漸漸食之論曰非但老人須知服食將息節度極須知調身按摩搖動肢節導引行氣行氣之道禮拜一日勿住不得安於其處以致壅滯故流水不腐戶樞不蠹義在斯矣能知此者可得一二百年故曰安者非安能安在於慮亡樂者非樂能樂在於慮殃所以老人不得殺生取肉以自養也耆婆湯主大虛冷風羸弱無顏色方一云酥蜜湯酥一斤煉生薑一合切薤白三握炙令黃酒二斤白蜜一斤煉油一升椒一合汁胡麻仁一升橙葉一握炙令黃豉一升糖一升上一十一味先以酒漬豉一宿去滓納糖蜜油酥於銅器中煮令勻沸次納薤姜煮令熟次下椒橙葉胡麻煮沸下二升豉汁又煮一沸出納瓷器中密封空腹吞一合如人行十里更一服冷者加椒服烏麻方純黑烏麻及旃檀色者任多少與水拌令潤勿使太濕蒸令氣遍即下曝乾再蒸往返九蒸九暴訖搗去皮作末空肚水若酒服二方寸匕日二服漸漸不飢絶谷久服百病不生常服延年不老耐寒暑蜜餌主補虛羸瘦乏氣力方白蜜二升臘月豬肪脂一升胡麻油半升乾地黃末一升上四味合和以銅器重釜煎令可丸下之服如梧桐子三丸日三稍加以知為度久服充益壽服牛乳補虛破氣方牛乳三升蓽茇半兩末之綿裹上二味銅器中取三升水和乳合煎取三升空肚頓服之日一二七日除一切氣慎面豬魚雞蒜生冷張淡云波斯國及大秦甚重此法謂之悖散湯豬肚補虛羸乏氣力方肥大豬肚一具洗如食法人參一兩椒一兩汗乾薑一兩半蔥白七兩細切粳米半升熟煮上六味下篩合和相得納豬肚中縫合勿令泄氣以水一斗半微火煮令爛熟空腹食之兼少與飯一頓令盡可服四五劑極良論曰牛乳性平補血脈益心長肌肉令人身體康強潤澤面目光悅志氣不衰故為人子者須供之以為常食一日勿缺常使恣意充足為度也此物勝肉遠矣服牛乳方鍾乳一斤上者細研之如粉人參三兩甘草五兩炙乾地黃三兩黃耆三兩杜仲三兩炙蓯蓉六兩茯苓五兩麥門冬四兩去心薯蕷六兩石斛二兩上一十一味搗篩為散以水五升先煮粟採七升為粥納散七兩攪令勻和少冷水牛渴飲之令足不足更飲水日一余時患渴可飲清水平旦取牛乳服之生熟任意牛須三歲以上七歲以下純黃色者為上余色者為下其乳常令犢子飲之若犢子不飲者其乳動氣不堪服也其乳牛淨潔養之洗刷飽飼須如法用心看之慎蒜豬魚生冷陳臭等物有人頻遭重病虛羸不可平復以此方補之甚效其方如下生枸杞根細切一大斗以水一大石煮取六斗五升澄清白羊骨一具上二味合之微火煎取五大升溫酒服之五日令盡不是小小補益一方單用枸杞根慎生冷酢滑油膩七日補五勞七傷虛損方白羊頭蹄一具以草火燒令黃赤以淨綿急塞鼻胡椒一兩蓽茇一兩乾薑一兩蔥白一升切香豉二升上六味先以水煮羊頭蹄骨半熟納藥更煮令大爛去骨空腹適性食之日食一具滿七具止禁生冷鉛丹瓜果肥膩及諸雜肉濕面白酒黏食大蒜一切蓄血仍慎食大酢滑五辛陳臭豬雞魚油等七日療大虛羸困極方取不中水豬肪一大升納蔥白一莖煎令蔥黃止候冷暖如人體空腹平旦頓服之令盡暖蓋覆臥至日晡後乃食白粥稠糜過三日後服補藥其方如下羊肝一具細切羊脊骨𦟘肉一條細切曲末半升枸杞根十斤切以水三大斗煮取一大斗去滓上四味合和下蔥白豉汁調和羹法煎之如稠糖空腹飽食之三服時慎食如上補虛勞方羊肝肚腎心肺一具以熱湯洗余細切之胡椒一兩蓽茇一兩豉心半升蔥白兩握去心切犁牛酥一兩上六味合和以水六升緩火煎取三升去滓和羊肝等並汁稍口皆納羊肚中以繩急系肚口更別用一絹袋稍小於羊肚盛肚煮之若熟乘熱出以刀子並絹袋刺作孔瀝取汁空肚頓服令盡余任意分作食之若無羊五臟羊骨亦可用之其方如下羊骨兩具碎之上以水一大石微火煎取三斗依食法任性作羹粥麵食不食肉人油麵補大虛勞方生胡麻油一升浙粳米泔清一升上二味微火煎盡汁清乃止出貯之取三合鹽汁七合先以鹽汁和油令相得溲麵一斤如常法作餺飪煮五六沸出置冷水中更漉出盤上令乾乃更一葉擲沸湯中煮取如常法十度煮之麻油熱乃盡以油作臛澆之任飽食烏麻脂主百病虛勞久服耐寒暑方烏麻油一升薤白一斤上二味微火煎薤白令黃去滓酒服一合百日充肥二百日老者更少三百日諸病悉愈服石英乳方白石英十五兩搗石如米粒以綿裹密帛盛上一味取牛乳三升水三升煎取三升頓服之日一度可二十遍煮乃一易之搗篩以酒三升漬二七日服之常令酒氣相接勿至於醉以補人虛勞更無以加也有力能多服一二年彌益凡老人舊患眼暗者勿以酒服藥當用飲下之目暗者能終不與酒蒜即無所畏耳論曰上篇皆是食療而不愈然後命藥藥食兩攻則病無逃矣其服餌如下大黃耆丸主人虛勞百病夫人體虛多受勞黃耆至補勞是以人常宜將服之方黃耆柏子仁天門冬去心白朮乾地黃遠志去心澤瀉薯蕷甘草炙人參石斛麥門冬去心牛膝杜仲炙薏苡仁防風茯苓五味子茯神乾薑丹參肉蓯蓉枸杞子車前子山茱萸狗脊萆薢阿膠炙巴戟天菟絲子覆盆子上三十一味各一兩搗篩煉蜜丸酒服十丸日稍加至四十丸性冷者加乾薑桂心細辛二兩患風者加獨活防風芎藭二兩老人加牛膝杜仲萆薢狗脊石斛鹿茸白馬莖各二兩無問長幼常服勿絶百日以內慎生冷酢滑豬雞魚蒜油膩宿郁浥百日後惟慎豬魚蒜生菜冷食五十以上雖暑月三伏時亦忌冷飯依此法可終身常得藥力不退藥有三十一味合時或少一味亦得且服之彭祖延年柏子仁丸久服強記不忘方柏子仁五合蛇床子菟絲子覆盆子各半升石斛巴戟天各二兩半杜仲炙茯苓天門冬去心遠志各三兩去心天雄一兩炮去皮續斷桂心各一兩半菖蒲澤瀉薯蕷人參乾地黃山茱萸各二兩五味子五兩鍾乳三兩成煉者肉蓯蓉六兩上二十二味搗篩煉蜜和丸如桐子大先食服二十丸稍加至三十丸先齊五日乃服藥服後二十日齒垢稍去白如銀四十二日面悅澤六十日瞳子黑白分明尿無遺瀝八十日四肢偏潤白髮更黑腰背不痛一百五十日意氣如少年藥盡一劑藥力周至乃入房內忌豬魚生冷酢滑紫石英湯主心虛驚悸寒熱百病令人肥健方紫石英十兩白石英十兩白石脂三十兩赤石脂三十兩乾薑三十兩上五味㕮咀皆完用二石英各取一兩石脂等三味各取三兩以水三升合以微火煎宿勿食分為四服日三夜一服後午時乃食日日依前稱取昨日藥乃置新藥中共煮乃至藥盡常然水數一準十新藥盡訖常添水去滓服之滿四十日止忌酒肉藥水皆用大升稱取汁亦用大升服湯訖即行勿住坐臥須令藥力遍身百脈中行若大冷者春秋各四十九日服令疾退盡極須澄清服之論曰此湯補虛除痼冷莫過於此能用之有如反掌恐文子者謂是常方輕易而侮之若一劑得瘥即止若服多令人大熱即須服冷藥壓之宜審而用之
