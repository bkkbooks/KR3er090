body:
  text: 卷第三本草中草部下品之上三十五味大黃將軍味苦寒大寒無毒主下瘀血血閉寒熱破癥瘕積聚留飲宿食蕩滌腸胃推陳致新通利水穀調中化食安和五臟平胃下氣除痰實腸間結熱心腹脹滿女子寒血閉脹小腹痛諸老血留結一名黃良生河西山谷及隴西二月八月採根火干桔梗味辛苦微溫有小毒主胸脅痛如刀刺腹滿腸鳴幽幽驚恐悸氣利五臟腸胃補血氣除寒熱風痹溫中消穀療喉咽痛下蠱毒一名利如一名房圖一名白藥一名梗草一名薺苨生蒿高山谷及冤句二月八月採根曝乾甘遂味苦甘寒大寒有毒主大腹疝瘕腹滿面目浮腫留飲宿食破症堅積聚利水穀道下五水散膀胱留熱皮中痞熱氣腫滿一名甘藁一名陵藁一名陵澤一名重澤一名主田生中山川穀二月採根陰乾葶藶味辛苦寒大寒無毒主癥瘕積聚結氣飲食寒熱破堅逐邪通利水道下膀胱水伏留熱氣皮間邪水上出面目浮腫身暴中風熱痱癢利小腹久服令人虛一名丁歷一名蕇蒿一名大室一名大適生藁城平澤及田野立夏後採實陰乾得酒良芫花味辛苦溫微溫有小毒主咳逆上氣喉鳴喘咽腫短氣蠱毒鬼瘧疝瘕癰腫殺蟲魚消胸中痰水喜唾水腫五水在五臟皮膚及腰痛下寒毒肉毒久服令人虛一名去水一名毒魚一名杜芫其根名蜀桑根療疥瘡可用毒魚生淮源川穀三月三日採花陰乾澤漆味苦辛微寒無毒主皮膚熱大腹水氣四肢面目浮腫丈夫陰氣不足利大小腸明目輕身一名漆莖大戟苗也生太山川澤三月三日七月七日採莖葉陰乾大戟味苦甘寒大寒有小毒主蠱毒十二水腹滿急痛積聚中風皮膚疼痛吐逆頸腋癰腫頭痛發汗利大小腸一名邛巨生常山十二月採根陰乾蕘花味苦辛寒微寒有毒主傷寒溫瘧下十二水破積聚大堅癥瘕蕩滌腸胃中留癖飲食寒熱邪氣利水道療痰飲咳嗽生咸陽川穀及河南中牟六月採花陰乾旋覆花味鹹甘溫微溫冷利有小毒主結氣脅下滿驚悸除水去臟間寒熱補中下氣消胸上痰結唾如膠漆心脅痰水膀胱留飲風氣濕痹皮間死肉目中眵䁾利大腸通血脈益色澤一名戴椹一名金沸草一名盛椹其根主風濕生平澤川穀五月採花曬乾二十日成鉤吻味辛溫有大毒主金瘡乳澼中惡風咳逆上氣水腫殺鬼疰蠱毒破症積除腳膝痹痛四肢拘攣惡瘡疥蟲殺鳥獸一名野葛折之青煙出者名固活甚熱不入湯生傅高山谷及會稽東野藜蘆味辛苦寒微寒有毒主蠱毒咳逆瀉痢腸澼頭瘍疥瘙惡瘡殺諸蟲毒去肌療噦逆喉痹不通鼻中息肉馬刀爛瘡不入湯一名蔥苒一名蔥菼一名山蔥生太山山谷三月採根陰乾赭魁味甘平無毒主心腹積聚除三蟲生山谷二月採及己味苦平有毒主諸惡瘡疥痂瘻蝕及牛馬諸瘡烏頭味辛甘溫大熱有大毒主中風惡風洗洗出汗除寒濕痹咳逆上氣破積聚寒熱消胸上痰冷食不下心腹冷疾臍間痛肩胛痛不可俯仰目中痛不可久視又墮胎其汁煎之名射罔殺禽獸射罔味苦有大毒療尸疰症堅及頭中風痹痛一名奚毒一名即子一名烏喙烏喙味辛微溫有大毒主風濕丈夫腎濕陰囊癢寒熱歷節掣引腰痛不能行步癰腫膿結又墮胎生朗陵山谷正月二月採陰乾長三寸以上為天雄天雄味辛甘溫大溫有大毒主大風寒濕痹歷節痛拘攣緩急破積聚邪氣金瘡強筋骨輕身健行療頭面風去來疼痛心腹結積關節重不能行步除骨節痛長陰氣強志令人武勇力作不倦又墮胎一名白幕生少室山谷二月採根陰乾附子味辛甘溫大熱有大毒主風寒咳逆邪氣溫中金瘡破症堅積聚血瘕寒濕踒躄拘攣膝痛腳疼冷弱不能行步腰脊風寒心腹冷痛霍亂轉筋下痢赤白堅肌骨強陰又墮胎為百藥長生犍為山谷及廣漢冬月採為附子春採為烏頭側子味辛大熱有大毒主癰腫風痹歷節腰腳疼冷寒熱鼠瘻又墮胎羊躑躅味辛溫有大毒主賊風在皮膚中淫淫痛溫瘧惡毒諸痹邪氣鬼疰蠱毒一名玉支生太行山川穀及淮南山三月採花陰乾茵芋味苦溫微溫有毒主五臟邪氣心腹寒熱羸瘦如瘧狀發作有時諸關節風濕痹痛療久風流走四肢腳弱一名莞草一名卑共生太山川穀三月三日採葉陰乾射干味苦平微溫有毒主咳逆上氣喉痹咽痛不得消息散結氣腹中邪逆食飲大熱療老血在心脾間咳唾言語氣臭散胸中熱氣久服令人虛一名烏扇一名烏蒲一名烏翣一名烏吹一名草薑生南陽川穀田野三月三日採根陰乾鳶尾味苦平有毒主蠱毒邪氣鬼疰諸毒破癥瘕積聚大水下三蟲療頭眩殺鬼魅一名烏圓生九疑山谷五月採貫衆味苦微寒有毒主腹中邪熱氣諸毒殺三蟲去寸白蟲破癥瘕除頭風止金瘡花療惡瘡令人瀉一名貫節一名貫渠一名百頭一名虎卷一名扁符一名伯萍一名藥藻此謂草鴟頭生玄山山谷及冤句少室山二月八月採根陰乾半夏味辛平生微寒熟溫有毒主傷寒寒熱心下堅下氣喉咽腫痛頭眩胸脹咳逆腸鳴止汗消心腹胸膈痰熱滿結咳嗽上氣心下急痛堅痞時氣嘔逆消癰腫墮胎療痿黃悅澤面目生令人吐熟令人下用之湯洗令滑盡一名守田一名地文一名水玉一名示姑生槐里川穀五月八月採根曝乾由跋主毒腫結熱虎掌味苦溫微寒有大毒主心痛寒熱結氣積聚伏梁傷筋痿拘緩利水道除陰下濕風眩生漢中山谷及冤句二月八月採陰乾莨菪子味苦甘寒有毒主齒痛出蟲肉痹拘急使人健行見鬼療癲狂風癇顛倒拘攣多食令人狂走久服輕身走及奔馬強志益力通神一名橫唐一名行唐生海濱川穀及雍州五月採子蜀漆味辛平微溫有毒主瘧及咳逆寒熱腹中症堅痞結積聚邪氣蠱毒鬼疰療胸中邪結氣吐出之生江林山川穀及蜀漢中常山苗也五月採葉陰乾恆山味苦辛寒微寒有毒主傷寒寒熱熱發溫瘧鬼毒胸中痰結吐逆療鬼蠱往來水脹灑灑惡寒鼠瘻一名互草生益州川穀及漢中八月採根陰乾青葙子味苦微寒無毒主邪氣皮膚中熱風瘙身癢殺三蟲惡瘡疥蝨痔蝕下部𧈟瘡子名草決明療唇口青一名草蒿一名萎蒿生平谷道旁三月採莖葉陰乾五月六月採子牙子味苦酸寒有毒主邪氣熱氣疥瘙惡瘍瘡痔去白蟲一名狼牙一名狼齒一名狼子一名犬牙生淮南川穀及冤句八月採根曝乾中濕腐爛生衣者殺人白蘞味苦甘平微寒無毒主癰腫疽瘡散結氣止痛除熱目中赤小兒驚癇溫瘧女子陰中腫痛下赤白殺火毒一名菟核一名白草一名白根一名崑崙生衡山山谷二月八月採根曝乾白芨味苦辛平微寒無毒主癰腫惡瘡敗疽傷陰死肌胃中邪氣賊風鬼擊痱緩不收除白癬疥蟲一名甘根一名連芨草生北山川穀又冤句及越山蛇含味苦微寒無毒主驚癇寒熱邪氣除熱金瘡疽痔鼠瘻惡瘡頭瘍療心腹邪氣腹痛濕痹養胎利小兒一名蛇銜生益州山谷八月採陰乾草蒿味苦寒無毒主疥瘙痂癢惡瘡殺蝨留熱在骨節間明目一名青蒿一名方潰生華陰川澤雚菌味鹹甘平微溫有小毒主心痛溫中去長蟲白癬蟯蟲蛇螫毒癥瘕諸蟲疽蝸去蛔蟲寸白惡瘡一名雚蘆生東海池澤及渤海章武八月採陰乾草部下品之下六十八味連翹味苦平無毒主寒熱鼠瘻瘰癧癰腫惡瘡癭瘤結熱蠱毒去白蟲一名異翹一名蘭華一名折根一名軹一名三廉生太山山谷八月採陰乾白頭翁味苦溫無毒有毒主溫瘧狂易寒熱癥瘕積聚癭氣逐血止痛療金瘡鼻衄一名野丈人一名胡王使者一名奈何草生高山山谷及田野四月採亦療毒痢䕡茹味辛酸寒微寒有小毒主蝕惡肉敗瘡死肌殺疥蟲排膿惡血除大風熱氣善忘不樂去熱痹破癥瘕除息肉一名屈據一名離婁生代郡川穀五月採根陰乾黑頭者良苦芺微寒主面目通身漆瘡作灰療金瘡大驗羊桃味苦寒有毒主熛熱身暴赤色風水積聚惡瘍除小兒熱去五臟五水大腹利小便益氣可作浴湯一名鬼桃一名羊腸一名萇楚一名御弋一名銚弋生山林川穀及生田野二月採陰乾羊蹄味苦寒無毒主頭禿疥瘙除熱女子陰蝕浸淫疽痔殺蟲一名東方宿一名連蟲陸一名鬼目一名蓄生陳留川澤鹿藿味苦平無毒主蠱毒女子腰腹痛不樂腸癰瘰癧瘍氣生汶山山谷牛扁味苦微寒無毒主身皮瘡熱氣可作浴湯殺牛蝨小蟲又療牛病生桂陽川穀陸英味苦寒無毒主骨間諸痹四肢拘攣疼酸膝寒痛陰痿短氣不足腳腫生熊耳川穀及冤句立秋採蒴藋味酸溫有毒主風瘙癮疹身癢濕痹可作浴湯一名堇草一名芨生田野春夏採葉秋冬採莖根藎草味苦平無毒主久咳上氣喘逆久寒驚悸痂疥白禿瘍氣殺皮膚小蟲可以染黃作金色生青衣川穀九月十月採夏枯草味苦辛寒無毒主寒熱瘰癧鼠瘻頭瘡破症散癭結氣腳腫濕痹輕身一名夕句一名乃東一名燕面生蜀郡川穀四月採烏韭味甘寒無毒主皮膚往來寒熱利小腸膀胱氣療黃疸金瘡內塞補中益氣好顏色生山谷石上蚤休味苦微寒有毒主驚癇搖頭弄舌熱氣在腹中癲疾癰瘡陰蝕下三蟲去蛇毒一名蚩休生山陽川穀及冤句虎杖根微溫主通利月水破留血症結石長生味鹹苦微寒有毒主寒熱惡瘡大熱闢鬼氣不祥下三蟲一名丹草生咸陽山谷鼠尾草味苦微寒無毒主鼠瘻寒熱下痢膿血不止白花者主白下赤花者主赤下一名葝一名陵翹生平澤中四月採葉七月採花陰乾馬鞭草主下部𧈟瘡胡桐淚味鹹苦大寒無毒主大毒熱心腹煩滿水和服之取吐又主牛馬急黃黑汗水研二三兩灌之立瘥又為金銀焊藥出肅州以西平澤及山谷中形似黃礬而堅實有夾爛木者云是胡桐樹滋淪入土石鹼鹵地作之其樹高大皮葉似白楊青桐桑輩故名胡桐木椹器用又名胡桐律西域傳云胡桐似桑而曲馬勃味辛平無毒主惡瘡馬疥一名馬疕生園中久腐處雞腸草主毒腫止小便利蛇莓汁大寒主胸腹大熱不止療溪毒射工傷寒大熱甚良苧根寒主小兒赤丹其漬苧汁療渴菰根大寒主腸胃固熱消渴止小便利狼跋子有小毒主惡瘡蝸疥殺蟲魚弓弩弦主難産胞衣不出舂杵頭細粳主卒噎敗天公平主鬼疰精魅半天河微寒主鬼疰狂邪氣惡毒洗諸瘡用之地漿寒主解中毒煩悶敗蒲席平主筋溢惡瘡敗船茹平主婦人崩中吐痢血不止燒作灰服之敗鼓皮平主中蠱毒燒作灰水服屋遊味甘寒主浮熱在皮膚往來寒熱利小腸膀胱氣生屋上陰處八月九月採赤地利味苦平無毒主赤白冷熱諸痢斷血破血帶下赤白生肌肉所在山谷有之赤車使者味辛苦溫有毒主風冷邪疰蠱毒症瘕五臟積氣劉寄奴草味苦溫主破血下脹多服令人痢生江南三白草味甘辛寒有小毒主水腫腳氣利大小便消痰破癖除積聚消丁腫生池澤畔牽牛子味苦寒有毒主下氣療腳滿水腫除風毒利小便豬膏莓味辛苦平無毒主金瘡止痛斷血生肉除諸惡瘡消浮腫搗封之湯漬散傅並良紫葛味甘苦寒無毒主癰腫惡瘡取根皮搗為末醋和封之生山谷中不入方用萆麻子味甘辛平有小毒主水症水研二十枚服之吐惡沫加至三十枚三日一服瘥則止又主風虛寒熱身體瘡癢浮腫尸疰惡氣榨取油塗之葉主腳氣風腫不仁搗蒸傅之葎草味甘苦寒無毒主五淋利小便止水痢除瘧虛熱渴煮汁及生汁服之生故墟道旁格注草味辛苦溫有大毒主蠱疰諸毒痛疼等生齊魯山澤獨行根味辛苦冷有毒主鬼疰積聚諸毒熱腫蛇毒水磨為泥封之日三四立瘥水煮一二兩取汁服吐蠱毒狗舌草味苦寒有小毒主蠱疥瘙殺小蠱烏蘞莓味酸苦寒無毒主風毒熱腫遊丹蛇傷搗敷並飲汁豨蘞味苦寒有小毒主熱𧈟煩滿不能食生搗汁服三四合多則令人吐狼毒味辛平有大毒主咳逆上氣破積聚飲食寒