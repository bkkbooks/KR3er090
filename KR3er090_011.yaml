body:
  text: 卷第十一小兒養小兒第一合八十九條方二十首灸法二首論一首凡兒在胎一月胚二月胎三月有血脈四月形體成五月能動六月諸骨具七月毛髮生八月臟腑具九月谷入胃十月百神備則生矣生後六十日瞳子成能咳笑應和人百五十日任脈成能自反覆百八十日髖骨成能獨坐二百一十日掌骨成能扶伏三百日臏骨成能立三百六十日膝臏成能行也若不能依期者必有不平之處兒初生落地口中有血即當去之不去者兒若吞之成痞病死治兒生落地不作聲法取暖水一盆灌浴之須臾即作聲小兒始生即當舉之舉之遲晚則令中寒腹中雷鳴先浴之然後乃斷臍斷臍當令長至足趺短則中寒令腹中不調當下痢若先斷臍後浴之則令臍中水中水則發腹痛若臍中水及中冷則腹絞痛天糾啼呼面目青黑此是中水之過當炙粉絮以尉之不時治護臍至腫者當隨輕重重者便灸之乃可至八九十壯輕者臍不大腫但出汁時時啼呼者但搗當歸末粉敷之炙粉絮日日尉之至百日乃愈以啼呼止為候若兒尿清者冷也與臍中水同凡初生斷兒臍當令長六寸臍長則傷肌臍短則傷臟不以時斷臍若臍汁不盡者即自生寒令兒風臍也裹臍法椎治帛令柔軟方四寸新綿厚半寸與帛等合之調其緩急急則令兒吐哯兒生二十日乃解視臍若十許日兒怒啼似衣中有刺者此或臍燥還刺其腹當解之易衣更裹臍時當閉戶下帳燃火左右令帳中溫暖換衣亦然仍以溫粉粉之此謂冬之時寒也若臍不愈燒絳帛末作灰粉之若過一月臍有汁不愈燒蝦蟆灰治末粉臍中日三四度若臍未愈乳兒太飽令兒風臍也兒新生不可令衣過厚熱令兒傷皮膚肌肉血脈發雜瘡及黃凡小兒始生肌膚未成不可暖衣暖衣則令筋骨緩弱宜時見風日若不見風日則令肌膚脆軟便易中傷皆當以故絮衣之勿用新綿也天和暖無風之時令母將兒於日中嬉戲數令見風日則血凝氣剛肌肉牢密堪耐風寒不致疾病若常藏在幃帳中重衣溫暖譬猶陰地之草不見風日軟脆不堪當風寒也兒生十日始得哺如棗核大二十日倍之五十日如彈丸大百日如棗大若乳汁少不從此法當用意少少增之若三十日乃哺者令兒無疾兒若早哺之及多者令兒頭面身體喜生瘡瘥而復發亦令兒尪弱難食小兒生滿三十日乃當哺之若早哺之兒不勝穀氣令兒病則多肉耗三十日後雖哺勿多若不嗜食勿強與強與不消覆成疾病哺乳不進者腹中皆有痰澼也當以四物紫丸微下之節哺乳數日便自愈也小兒寒熱亦皆當爾要當下之然後乃瘥凡乳母乳兒當先以手極挼散其熱勿令乳汁奔出令兒咽輒奪其乳令得息息已復乳之如是十反五反視兒飢飽節度知一日之中幾乳而足以為常又常捉去宿乳兒若臥乳母當臂枕之令乳與兒頭平乃乳之如此令兒不噎母欲寐則奪其乳恐填口鼻又不知飢飽也兒生有胎寒則當腹病痛者偃啼時時吐哯或腹中如雞子黃者按之如水聲便沒沒已復出此無所苦爾宜早服當歸丸黃耆散即愈當歸丸方見千金方中黃耆散方本闕凡乳兒不欲大飽飽則令吐凡候兒吐者是乳太飽也當以空乳乳之即消夏若不去熱乳令兒嘔逆冬若不去寒乳令兒咳痢母新房以乳兒令兒羸瘦交脛不能行母患熱以乳兒令兒發黃不能食母怒以乳兒令兒喜驚發氣疝又令兒上氣癲狂母新吐下以乳兒令兒虛羸母醉以乳兒令兒身熱腹滿凡小兒不能哺乳當服紫丸下之凡浴小兒湯極須令冷熱調和冷熱失所令兒驚亦致五臟疾凡兒冬不可久浴浴久則傷寒夏不可久浴浴久則傷熱凡兒又不當數浴背冷則令發癇若不浴又令兒毛落小兒生輒死治之法當候視兒口中懸壅前上齶上有赤胞者以指摘取決令潰以少綿拭去勿令血入咽入咽殺兒急急慎之凡兒生三十二日一變六十四日再變變且蒸九十六日三變百二十八日四變變且蒸百六十日五變百九十二日六變變且蒸二百二十四日七變二百五十六日八變變且蒸二百八十八日九變三百二十日十變變且蒸積三百二十日小蒸畢後六十四日大蒸蒸後六十四日復大蒸蒸後百二十八日復大蒸積五百七十六日大小蒸畢凡變者上氣蒸者體熱凡蒸平者五日而衰遠者十日而衰先變蒸五日後五日為十日之中熱乃除爾兒生三十二日一變二十九日先期而熱便治之如法至三十六七日蒸乃畢爾恐不解了故重說之審計變蒸之日當其時有熱微驚不得灸刺也得服藥及變且蒸之時不欲驚動勿令旁多人兒變蒸時或早或晚不如法者多兒變蒸時壯熱不欲食食輒吐哯若有寒加之即寒熱交爭腹腰夭糾啼不止尉之當愈也凡小兒身熱脈亂汗出者蒸之候也兒變蒸時目白者重赤黑者微變蒸畢目精明矣兒上唇頭小白疱起如死魚目珠子者蒸候也初變蒸時有熱者服黑散發汗熱不止服紫丸熱瘥便止勿復與丸自當有餘熱變蒸盡乃除爾兒身壯熱而耳冷髖亦冷者即是蒸候慎勿治之兒身熱髖耳亦熱者病也乃須治之紫丸治小兒變蒸發熱不解並挾傷寒溫壯汗後熱不歇及腹中有痰澼哺乳不進乳則吐哯食癇先寒熱方代赭石赤石脂各一兩巴豆三十枚去心皮熬杏仁五十枚去皮尖熬上四味末之巴豆杏仁別搗為膏和更搗二千杵當自相得若硬入少蜜同搗密器中收之三十日兒服如麻子一丸與少乳汁令下食頃後與少乳勿令多至日中當小下熱除若未全除明旦更與一丸百日兒服如小豆一丸以此准量增減夏月多熱喜令發疹二三十日輒一服佳此丸無所不治難下不虛人黑散治小兒變蒸中挾時行溫病或非變蒸時而得時行方麻黃去節桔仁去皮尖熬各半兩大黃一分上三味搗為散一月兒服小豆大一枚以乳汁和服抱令得汗汗出溫粉粉之勿使見風百日兒服如棗核大小量之相兒命長短法兒生枕骨不成者能言而死膝骨不成者能倨而死掌骨不成者能扶伏而死踵骨不成者能行而死臏骨不成者能立而死生身不收者死魚口者死股間無生肉者死頤下破者死陰不起者死囊下白者死赤者死相法甚博略述十數條而已兒初生額上有旋毛者早貴妨父母兒初生陰大而與身色同者成人兒初生叫聲連延相屬者壽聲絶而復揚急者不壽兒初生汗血者多厄不壽兒初生目視不正數動者大非佳人兒初生自開目者不成人兒初生通身軟弱如無骨者不成人兒初生髮稀少者強不聽人兒初生臍小者不壽兒初生早坐早行早語早齒生皆惡性非佳人兒初生頭四破者不成人兒初生砂毛不周匝者不成人啼聲散不成人啼聲深不成人汗不流不成人小便凝如脂膏不成人常搖手足者不成人無此狀候者皆成人也兒初生臍中無血者好卵下縫通達而黑者壽鮮白長大者壽論曰兒三歲以上十歲以下觀其性氣高下即可知其夭壽大略兒小時識悟通敏過人者多夭則項托顏回之流是也小兒骨法成就威儀回轉遲舒稍費人精神鵰琢者壽其預知人意回旋敏速者亦夭則楊修孔融之流是也由此觀之夭壽大略可知也亦由梅花早發不睹歲寒甘菊晚榮終於年事是知晚成者壽之兆也凡小兒之癇有三種有風癇有驚癇有食癇然風癇驚癇時時有爾十人之中未有一二是食癇者凡是先寒後熱發癇者皆是食癇也驚癇當按圖灸之風癇當與豚心湯下之食癇當下乃愈紫丸佳凡小兒所以得風者緣衣暖汗出風因而入也風癇者初得之時先屈指如數乃發作此風癇也驚癇者起於驚怖先啼乃發作此驚癇也驚癇微者急持之勿復更驚之或自止也其先不哺乳吐而變熱後發癇此食癇也早下之則瘥四味紫丸逐澼飲最良去病速而不虛人赤丸瘥快病重者當用之小兒衣甚寒薄則腹中乳食不消其大便皆酢臭此欲為癖之漸也便將紫丸以微消之服法先從少起常令大便稀勿使大下也稀後便漸減之矢不酢臭乃止藥驚癇但灸及摩生膏不可下也驚癇心氣不定下之內虛益令甚爾驚癇甚者特為難治故養小兒常當慎驚勿令聞大聲抱持之間當安徐勿令怖也又天雷時須塞其耳但作余小聲以亂之也凡小兒微驚者以長血脈但不欲大驚大驚乃灸驚脈小兒有熱不欲哺乳臥不安又數驚此癇之初也服紫丸便愈不瘥更服之兒立夏後有病治之慎勿妄灸不欲吐下但以除熱湯浴之除熱散粉之除熱赤膏摩之又臍中以膏塗之令兒在涼處勿禁水漿常以新水飲之兒眠時小驚者一月輒一以紫丸下之減其盛氣令兒不病癇也小兒氣盛有病但下之必無所損若不時下則將成病痼難治矣凡下四味紫丸最善難下不損人足以去疾爾若四味紫丸不時下者當以赤丸下之赤丸不下當更倍之若已下而餘熱不盡當按方作龍膽湯稍稍服之並摩赤膏凡小兒冬月下無所畏夏月下難瘥然有病者不可不下下後腹中當小脹滿故當節哺乳數日不可妄下又乳哺小兒常令多少有常劑兒漸大當稍稍增之若減少者此腹中已有小不調也便微服藥停哺但與乳甚者十許日微者五六日止哺自當如常若不肯哺而欲乳者此是有癖為疾重要當下之無不瘥者不下則致寒熱或反吐而發癇或更致下痢此皆病重不早下之所為也為難治但先治其輕時兒不耗損而病速愈凡小兒屎黃而臭者此腹中有伏熱宜微將服龍膽湯若白而酢者此挾寒不消也當服紫丸微者少與藥令內消甚者小增令小下皆須節乳哺數日令胃氣平和若不節乳哺則病易復復下之則傷其胃氣令腹脹滿再三下之尚可過此傷矣凡小兒有癖其脈大必發癇此為食癇下之便愈當候掌中與三指脈不可令起而不時下致於發癇則難治也若早下之此脈終不起也脈在掌中尚可早治若至指則病增也凡小兒腹中有疾生則身寒熱寒熱則血脈動血脈動則心不定心不定則易驚驚則癇發速也龍膽湯治小兒出腹血脈盛實寒熱溫壯四肢驚掣發熱大吐哯者若已能進哺中食實不消壯熱及變蒸不解中客人鬼氣並諸驚癇方悉主之十歲以下小兒皆服之小兒龍膽湯第一此是出腹嬰兒方若日月長大者以次依此為例若必知客忤及魅氣者可加人參當歸各如龍膽多少也一百日兒加半分二百日加一分一歲兒加半兩余藥皆準爾龍膽鉤藤柴胡去苗黃芩桔梗芍藥茯神甘草炙各一分蜣螂二枚炙大黃一兩上一十味㕮咀以水二升煮取五合為一劑也取之如後節度藥有虛實虛藥宜足數合水也兒生一日至七日分一合為三服兒生八日至十五日分一合半為三服兒生十六日至二十日分二合為三服兒生二十日至三十日分三合為三服兒生三十日至四十日盡以五合為三服十歲亦准此皆溏下即此勿復服也治少小心腹熱除熱丹參赤膏方凡參雷丸芒硝戎鹽大黃各三兩上五味切以苦酒半升浸四種一宿以成煉豬脂一斤煎三上三下去滓納芒硝膏成以摩心下冬夏可用一方但丹參雷丸治少小新生肌膚幼弱喜為風邪所中身體壯熱或中大風手足驚掣五物甘草生摩膏方甘草炙防風各一兩二十銖雷丸二兩半桔梗二十銖上五味切以不中水豬肪一斤微火煎為膏去滓取彈丸大一枚炙手以摩兒百過寒者更熱熱者更寒小兒無病早起常以膏摩囟上及手足心甚闢風寒礬石丸主小兒胎寒偃啼驚癇臚脹滿不嗜食不便青黃並治大人虛冷內冷或有實不可吐下方馬齒礬石一斤燒半日上一味末之刺膏和丸大人服如梧子二枚日三服小兒減之以意增損以腹中溫暖為度有實亦去神良小兒客忤慎忌法凡小兒衣裳帛綿中不得令有頭髮履中亦然凡白衣青帶青衣白帶者皆令兒中忤諸遠行來馬汗未解行人未澡洗及未易衣而見兒者皆中客忤見馬及馬上物馬氣皆忌之小兒中客之為病吐下青黃汁腹中痛及反倒偃側似癇狀但目不上插少睡面色變五色脈弦急若失時不治小久則難治治之法以水和豉搗令熟丸如雞子大以轉摩兒囟上及手足心各五遍又摩心腹臍上下行轉摩之食頃破視其中有細毛棄圓道中病愈矣若吐不止灸手心主間使大都隱白三陰交各三炷又可用粉丸如豉法並用唾之唾之咒如下咒曰摩家公摩家母摩家兒若客忤從我始扁鵲雖良不如善唾良唾訖棄丸於道中又方取一刀橫著灶上解兒衣撥其心腹訖取刀持向兒咒之唾輒以刀擬向心腹曰啡啡曰煌煌日出東方背陰向陽葛公葛母不知何公子來不視去不顧過與生人忤梁上塵天之神戶下二鬼所經大刀環犀對灶君二七唾客愈兒驚唾啡啡如此二匕啡啡每唾以刀擬之咒當三遍乃畢用豉丸一如上法五六遍訖取此丸破看其中有毛棄丸於道中即愈矣治小兒卒客忤法取銅鏡鼻燒令赤著少許酒中大兒飲之小兒不能飲者含哺之愈又方取馬矢三升燒令煙絶以酒三升煮三沸去滓浴兒即愈千金湯主小兒暴驚啼絶死或有人從外來邪氣所逐令兒得病衆醫不治方蜀漆一分一云蜀椒左顧牡蠣一分熬上二味㕮咀以酢漿水一升煮取五合一服一合良治小兒新生客忤中惡發癇發熱乳哺不消中風反折口吐舌並注忤面青目上插腹滿癲癇羸瘦疰及三歲不行雙丸方上麝香二兩牛黃二兩黃連二兩宣州者丹砂一兩特生礜石一兩燒附子一兩炮去皮雄黃一兩巴豆六十枚去皮心熬桂心一兩烏賊魚骨一兩赤頭蜈蚣一兩熬上十一味各異搗篩別研巴豆如膏乃納諸藥煉蜜和搗三千杵密塞之勿泄氣生十日二十日至一月日服如黍米大二丸四十日至百日服如麻子大二丸一歲以上以意增加有兒雖小而病重者增大其丸不必依此丸小兒病客忤率多耐藥服藥當汗出若汗不出者不瘥也一日一夜四五服以汗出為瘥凡候兒中人者為人乳子未了而有子者亦使兒客忤口中銜血即月客也若有此者當尋服此藥即兒可全也口聚唾腹起熱者當灸臍中不過二七壯並勤服此藥若喜失子者産訖兒墮落地聲未絶便即以手指刮舌上當得所銜血如韭葉者便以藥二丸如粟米大服之作七日乃止無不痊也若無赤頭蜈蚣赤足者亦得三枚皆斷取前兩節其後分不可用也小兒雜治法第二方五十七首論一首竹葉湯主五六歲兒溫壯腹中急滿氣息不利或有微腫亦主極羸不下飲食堅痞手足逆冷方竹葉切一升小麥半升甘草炙黃芩栝蔞根澤瀉知母人參茯苓白朮大黃各一兩生薑一兩半切麥門冬二兩去心桂心二銖半夏二兩洗當歸三兩分上十六味㕮咀以水七升煮麥竹葉取四升去滓納諸藥煮取一升六合分四服治小兒連壯熱實滯不去寒熱往來微驚方大黃黃芩各一兩栝蔞根三分甘草炙牡蠣熬人參各半兩桂心二兩龍骨凝水石白石脂各半兩滑石二兩碎硝石半兩上十二味㕮咀加紫石英半兩以水四升煮取一升半分服三合一日令盡治小兒寒熱咳逆膈中有澼乳若吐不欲食方乾地黃四兩麥門冬半升去心五味子半升大黃一兩硝石一兩蜜半升上六味㕮咀以水三升煮取一升去滓納硝石蜜更煮令沸服二合日三胸中當有宿乳一升許出兒大者服五合射干湯主小兒咳逆喘息如水雞聲方射干二兩麻黃二兩去節紫菀一兩甘草一兩炙桂心五寸半夏五枚洗去滑生薑一兩切大棗四枚擘上八味㕮咀以水七升煮取一升半去滓納蜜半斤更煮一沸飲三合日三服又方半夏四兩洗桂心二兩生薑二兩切紫菀二兩細辛二兩阿膠二兩甘草二兩炙蜜一合款冬花二合右九味㕮咀以水一斗煮半夏取六升去滓納諸藥更煮取一升五合五歲兒飲一升二歲兒服六合量大小加減之治小兒咳逆短氣胸中吸吸呵出涕唾咳出臭膿亦治大人燒淡竹瀝煮二十沸小兒一服一合日五服大人服一亦日五服不妨食息乳哺杏仁丸主小兒大人咳逆上氣方杏仁三升去尖皮兩仁熬令黃上一味熟搗如膏蜜一升為三分以一分納杏仁搗令強更納一分搗之如膏又納一分搗熟止先食已含之咽汁多少自在量之治小兒火灼瘡一身皆有如麻子小豆戴膿乍痛乍癢熱方甘草生用芍藥白蘞黃芩各三分黃連黃柏各半兩上六味搗篩以白蜜和塗上日再亦可作湯浴之千金有苦參治小兒火瘡方熟煮大豆濃汁溫浴之亦令無瘢又方以蜜塗之日十遍苦參湯主小兒頭面熱瘡方苦參八兩大黃三兩蛇床子一升芍藥三兩黃芩二兩黃柏五兩黃連三兩菝葜一斤上八味切以水三斗煮取一斗半洗之日三度大良千金治上下偏身生瘡又方大黃黃芩黃柏澤蘭礬石石楠各一兩戎鹽二兩蛇床子三合上八味切以水七升煮取三升以絮納湯中洗拭之日三度又方熬豉令黃末之以敷瘡上不過三度愈治二百日小兒頭面瘡起身體大熱方黃芩三分升麻一兩柴胡一兩去苗石膏一兩碎甘草二分半炙大黃三兩當歸半兩上七味㕮咀以水四升煮取二升分為四服日三夜一多煮洗瘡佳治小兒身體頭面悉生瘡方取榆白皮灼令燥下篩酢和塗綿覆上蟲出自瘥治小兒手足身體腫方以小便溫暖漬之良又方並治癮疹巴豆五十枚去心皮上一味以水三升煮取一升以綿納湯中拭病上隨手減神良治小兒風瘡癮疹方蒴藋一兩防風一兩羊桃根一兩石楠一兩茵芋一兩茺蔚一兩礬石一兩蒺藜一兩上八味切以酢漿水一斗煮取五升去滓納礬石煎令小沸溫浴之千金有秦椒苦參蛇床枳實升麻為十三味治小兒丹數十種皆主之拓湯方大黃一兩甘草一兩炙當歸一兩芎藭一兩白芷一兩獨活一兩黃芩一兩芍藥一兩升麻一兩沉香一兩青木香一兩芒硝三兩木蘭皮一兩上十三味切以水一斗二升煮取四升去滓納芒硝令煬以綿搵湯中適寒溫拓之干則易取瘥止治小兒丹發方生慎火草搗絞取汁以拭丹上日十遍夜三四治小兒丹腫方棗根升麻白蘞黃柏黃連大黃梔子甘草生用各二兩生地黃汁一升上九味切以水一斗四升煮取七升去滓納地黃汁煎三沸以故帛兩重納湯中以拓丹上小暖即易之常令溫澤蘭湯主丹疹入腹殺兒方澤蘭芎藭附子炮去皮莽草藁本細辛茵芋各半兩上七味㕮咀以水三升煮取一升半分四服服此湯然後作余湯洗之治小兒半身皆紅赤漸漸長引者方牛膝甘草生用上二味細銼各得五升以水二斗煮取三五沸去滓和灶下黃土塗之治小兒頭髮不生方取楸葉中心搗絞取汁塗之生治小兒禿瘡無發苦癢方野葛一兩末豬脂羊脂各一兩上三味合煎略盡令凝塗之不過三數敷即愈治小兒禿瘡方取雄雞矢陳醬清和洗瘡了敷之三兩遍瘥治小兒白禿方取芫花末臘月豬肪脂和如泥先以灰汁洗拭塗之日二遍治小兒頭瘡方胡粉一兩黃連二兩上二味搗為末洗瘡去痂拭乾敷之即愈發即如前再敷亦治陰瘡又方胡粉二兩水銀一兩白松脂二兩豬肪脂四兩上四味合煎去滓納水銀胡粉攪令和調塗之大人亦同治小兒頭無發方燒鯽魚作末醬汁和敷之即生治小兒囟開不合方防風一兩半白芨半兩柏子仁半兩上三味搗為散乳汁和以塗囟上日一度十日知二十日合治小兒臍瘡方燒甑帶灰敷之愈治小兒鼻塞不通有涕出方杏仁半兩去皮尖椒一分附子一分半炮去皮細辛一分半上四味切以酢五合漬一宿明旦以豬脂五兩煎之附子色黃膏成去滓以塗絮導於鼻中日再又摩囟上治小兒口瘡不能取乳方大青三分黃連二分上二味㕮咀以水二升煮取一升二合一服一合日再夜一又方取礬石如雞子大置酢中研塗兒足下三七遍立愈治小兒重舌方取三屠家肉各如指許大切摩舌兒立能乳便啼又方衣魚燒作灰以敷舌上又方重舌舌強不能收唾者取鹿角末如大豆許安舌上日三即瘥又方取蛇皮燒灰末和大酢以雞毛取之以掠舌上日三遍治小兒重舌舌生瘡涎出方以蒲黃敷舌上不過三度愈又方取田中蜂房燒之以淳酒和敷喉咽下立愈治小兒咽痛不得息若毒氣哽咽及毒攻咽喉方生薑二兩切橘皮一兩升麻二兩射干二兩上四味㕮咀以水六升煮取二合分為三服亦治大人治小兒喉痹咽腫方以魚膽二七枚和灶底黃土以塗咽喉立瘥雀矢丸主小兒卒中風口噤不下一物方取雀矢如麻子大丸之飲服即愈大良雞矢白亦良治小兒數歲不行方葬家未閉戶時盜取其飯以哺之不過三月即行勿令人知之治小兒食土方取肉一斤上一味以繩系肉曳地行數里勿洗火炙啖之不食土矣治小兒遺尿方瞿麥龍膽石葦皂莢炙去皮子桂心各半兩人參一兩雞腸草一兩車前子五分上八味末之煉蜜和先食服如小豆五丸日三加至六七丸治小兒羸瘦有蛔蟲方雚蘆五兩黍米泔二升上二味切以納泔中以水三升五合煮取二升五歲兒服五合日三服兒大者服一升治小兒三蟲方雷丸芎藭上二味等分為散服一錢匕日三服治小兒陰瘡膿水出方煮狼牙汁洗之愈治小兒氣㿗方土瓜根一兩芍藥一兩當歸一兩上三味㕮咀以水二升煮取一升服五合日二服治小兒狐疝傷損生㿗方桂心三分地膚子二兩半白朮五分上三味末之煉蜜和白酒服如小豆七丸日三服亦治大人又方芍藥三分茯苓三分大黃半兩防葵半兩半夏一分洗桂心一分椒一分汗乾薑一分上八味末之煉蜜和如大豆每服一丸日五服可加至三丸千金無干姜治小兒核腫壯熱有實方甘遂三分麝香三銖大黃前胡各一兩黃芩半兩甘草半兩炙青木香三分石膏三分碎上八味㕮咀以水七升煮取一升九合服三合日四夜二服治小兒誤吞針方吞磁石如棗核大針立下論曰文王父母有胎教之法此聖人之道未及中庸是以中庸養子十歲以下依禮小學而不得苦精功程必令兒失心驚懼及不得苦行杖罰亦令兒得癲癇此事大可傷怛但不得大散大漫令其志蕩亦不得稱讚聰明尤不得誹毀小兒十一以上得漸加嚴教此養子之大經也不依此法令兒損傷父母之殺兒也不得怨天尤人眼病第三合一百三十三方炙法二首論一首真珍散主目翳覆瞳睛不見物方上光明硃砂半兩貝子五枚炭火燒末之白魚七枚炙乾薑末半分上四味研之如粉以熟帛三篩為散仰臥遣人以小指爪挑少許敷眼中瘥亦主白膚翳七寶散主目翳經年不愈方琥珀一分白真珠一分珊瑚一分紫貝一分馬珂一分硃砂二分蕤仁半兩決明子一分石膽一分上九味下篩極細敷目中如小豆日三大良礬石散主目翳及胬肉方礬石上上白者末納如黍米大於翳上及胬肉上即令淚出以綿拭之令得惡汁盡日一其病逐惡汁出盡日日漸自薄便瘥好上上礬石無過絳礬色明淨者慎如療眼當法也去翳方貝子十枚燒末上一味搗篩取如胡豆著翳上日再正仰臥令人敷之如炊一石米久乃拭之息肉者加珍珠如貝子等分研如粉治眼漠漠無所見決明洗眼方決眼子二十五枚千金作一合蕤仁秦皮黃連宣州者佳各半兩千金作十八銖螢火蟲七枚上五味以水八合微火煎取三合冷以綿注洗目日三度治五臟客熱上熏一作衡眼外受風寒令眼病不明方地膚子半兩千金作二合柏子仁一合半大黃二兩決明子五合藍子瓜子仁蕤仁茺蔚子青葙子蒺藜子各二合菟絲子一合千金作二合黃連一兩半宣州者細辛一合千金一兩六銖桂心七分螢火一合千金作六銖上一十五味搗篩煉蜜和丸如梧子每服十五丸食後日三服治肝膈上大熱目暗不明方升麻大青黃柏各三兩射干生玄參四兩薔薇根白皮各四兩蜜一升上七味㕮咀以水七升煮取一升半去滓下蜜兩沸細細含咽之治眼暮無所見方豬肝一具上細切以水一斗煮取熟置小口器中及熱以目臨上大開勿閉也冷復溫之取瘥為度治熱病瘥後百日內食五辛目暗方以鯽魚作臛熏之如前法良兔肝散主失明方兔肝炙石膽貝齒芒硝蕤仁黃連礬石燒松葉螢火菊花地膚子決明子各一分上十二味食後為散服半錢匕不知稍稍加服藥不可廢若三日停則與不服等愈後仍可常服之治風痰胸滿眼赤暗方決明子竹葉千金二兩杏仁去皮尖雙仁熬防風黃芩枳實炙千金作二兩澤瀉各三兩芍藥柴胡去苗梔子仁各四兩一方無千金作二兩細辛芒硝各二兩上一十二味㕮咀以水九升煮取二升半去滓分三服千金有大黃四兩升麻三兩無芒硝防風細辛名瀉肝湯眼暗方蔓荊子一斗上一味淨淘以水四斗煮自旦至午去汁易水又煮至晚去汁易水又煮至旦曝乾以布袋貯之一度搗三升以粥汁服三方寸匕日三服美酒等任性所便補肝湯主肝氣不足方甘草炙黃芩人參桂心各二兩上四味㕮咀以水六升煮取二升去滓分三服瀉肝湯主臟中痰實熱沖眼漠漠暗方苦竹根八兩半夏四兩洗乾薑茯苓枳實白朮各三兩杏仁去皮尖兩仁乾地黃各一兩細辛甘草炙各二兩上十味㕮咀以水一斗二升煮取二升七合去滓分三服瀉肝湯主漠漠無所見或時痛赤腹有痰飲令人眼暗方大黃白朮各二兩甘草炙芍藥當歸茯苓桂心人參黃芩細辛各一兩半生薑三兩切半夏四兩洗上十二味㕮咀以水一斗煮取三升分四服補肝湯主肝氣不足兩脅拘急痛寒熱目不明並婦人心痛乳癰脛熱消渴爪甲枯口面青皯方甘草三兩炙柏子仁二兩防風三兩大棗二十枚擘烏頭二兩炮細辛二兩茯苓一兩蕤仁一兩桂心一兩上九味㕮咀以水八升煮取三升分為三服蕪菁子主明目病益肌膚方蕪菁子三升上一味淘高著水煮二十沸出著水盆中淘之令水清接取以別釜煮之水盡即添益時嘗看味美漉出曝乾搗篩酒飲等任意和服三方寸匕日惟服七合飽食任性酒服服無限時慎生冷百日身熱瘡出不久自瘥治青盲方長尾蛆淨洗曝乾作末納眼中瘥決明丸主眼風虛勞熱暗運內起方石決明燒石膽光明砂芒硝蒸空青黃連不用漬青葙子決明子以苦酒漬經三日曝乾蕤仁防風鯉魚膽細辛上十二味等分搗蜜絹篩石研令極細以魚膽和丸如梧子曝乾研碎銅器貯之勿泄每取黃米粒大納眥中日一夜一稍稍加以知為度補肝丸主明目方地膚子二合藍子二合蒺藜子二合細辛五合桂心五分車前子二合菟絲子二合瓜子二合螢火蟲五合黃連一兩半茺蔚子二合青葙子二合大黃二兩決明子五合上十四味搗篩煉蜜和飲服如梧子十五丸可加至二十丸慎熱麵食生冷酢滑油蒜豬雞魚蕎麥黃米眼暗神方也治目赤痛方雄黃一銖細辛一銖乾薑一銖黃連四銖上四味細篩綿裹以唾濡頭注藥納大眥必閉目目中淚出須臾自止勿手近勿用冷水洗又方雄黃一分乾薑一分黃連一分礬石一分燒半日上四味合用之如前方可加細辛一分治目赤口乾唇裂方石膏一斤碎生地黃汁一斤赤蜜一升淡竹葉切五升上四味以水一斗二升煮竹葉取七升去滓澄清煮石膏取一升半去滓下地黃汁兩沸下蜜取三升細細服之治赤眼方取杏仁四十九顆末之絹袋裹飯底蒸之熱絞取脂以銅青胡粉各如大豆乾薑鹽各如半大豆熟研之以雞毛沾取掠眼中眥頭日二不過三瘥赤眼方杏仁脂一合鹽緑棗核大印成鹽三顆上三味取杏仁脂法先搗杏仁如脂布袋盛蒸熱絞取脂置蜜器中納諸藥直坐著其中密蓋二七日夜臥注目四眥不過七度瘥止治赤眼不問久遠方碙砂三兩上一味以酢漿垍器中浸日中曝之三日藥著器四畔乾者取如粟米大夜著兩眥頭不過三四度永瘥並石鹽石膽等尤佳治眼赤運白膜翳方麻燭一尺薄批豬脂裹使匝燃燭以銅器承取脂納蕤仁三十枚研胡粉少許合和令熟夜納兩眥中又方枸杞汁洗目日五度良煮用亦得治赤眼方石膽蕤仁鹽緑細辛各一兩生驢脂一合上五味為末以乳汁和夜點兩眥治眯目不明方椎羊鹿筋擘之如披筋法納筋口中熟嚼擘眼納著瞳子瞼上以手當瞼上輕挼之若有眯者二七過挼便出之視眯當著筋出來即止未出者復為之此法常以平旦日未出時為之以瘥為度出訖當以好蜜注四眥頭鯉魚膽亦佳若數挼目痛可間日挼之鼻病第四論一首方八首治鼻不利香膏方當歸薰草一方用木香通草細辛蕤仁各三分芎藭白芷各半兩羊髓四兩上八味切合煎微火上三上三下以白芷色黃膏成去滓取如小豆大納鼻中日三大熱鼻中赤爛者以黃芩梔子代當歸細辛治鼻中窒塞香膏方白芷芎藭各半兩通草一分當歸細辛薰草各三分千金作莽草辛夷仁五分上七味切以苦酒漬一宿以不中水豬肪一升煎三上三下以白芷色黃膏成去滓綿裹取棗核大納鼻中日三一方加桂心十八銖治鼻齆方通草一分細辛一分附子一分炮去皮上三味下篩蜜和綿裹納鼻中良治鼻中息肉通草散方通草半兩礬石一兩燒真珠一銖上三味下篩裹綿如棗核取藥如小豆納綿頭入鼻中日三度一方有桂心細辛各一兩治鼽鼻鼻中息肉不得息方礬石燒藜蘆各半兩瓜蒂二七枚附子半兩炮上四味各搗下篩合和以小竹管取藥如小豆大納鼻孔中吹之以綿絮塞鼻中日再以愈為度一方加葶藶半兩治鼻中息肉塞鼻不得喘息方取細辛以口濕之屈頭納鼻中旁納四畔多著日十易之滿二十日外以蒡藶子一兩松蘿半兩二味搗篩以綿裹薄如棗核大納鼻中日五六易之滿二十日外以吳白礬上上者二兩納瓦杯裹相合令密置窖中燒之待瓦熱取搗篩以面脂和如棗核大納鼻中日五六易盡更和不得頓和二十日外乃瘥慎行作勞及熱食並蒜面百日治齆鼻有息肉不聞香臭方瓜蒂細辛各半兩上二味為散絮裹豆大塞鼻中須臾即通羊肺散主鼻中息肉梁起方羊肺一具干之白朮四兩蓯蓉二兩通草二兩乾薑二兩芎藭二兩上六味為散食後以粥汁服五分匕日二服加至方寸匕論曰凡人往往有鼻中肉塞眠食皆不快利得鼻中出息而俗方亦衆而用之皆無成效惟見本草云雄黃主鼻中息肉此言不虛但時人不知用雄黃之法醫者生用故致困斃曾有一人患鼻不得喘息余以成煉雄黃日納一大棗許大過十日肉塞自出當時即得喘息更不重發其煉雄黃法在仙丹方中具有之宜尋求也斯有神驗口病第五論二首方十七首凡口瘡忌食鹹膩及熱面干棗等宜純食甜粥勿食鹽菜三日即瘥凡口中面上生息肉轉大以刀決潰去膿愈治積年口瘡不瘥薔薇湯方薔薇根一升上一味以水七升煮取三升去滓含之久久極即吐之定更含少少入咽亦佳夜未睡以前亦含之三日不瘥更令含之瘥為度驗祕不傳也治口中瘡身體有熱氣痱瘰薔薇丸方薔薇根一兩黃芩一兩鼠李根一兩當歸一兩葛根一兩白蘞一兩栝蔞根二兩石龍芮一兩黃柏一兩黃耆一兩芍藥一兩續斷一兩黃連一兩上十三味末之煉蜜和服如梧子十丸日三服千金無黃連治熱病口爛咽喉生瘡水漿不得入膏方當歸一兩射干一兩升麻一兩附子半兩炮去皮白蜜四兩上五味切以豬膏四兩先煎之令成膏下著地勿令大熱納諸藥微火煎令附子色黃藥成絞去滓納蜜復火上令相得盛器中令凝取如杏子大含之日四五輒咽之瘥治口中瘡咽喉塞不利口燥膏方豬膏一斤白蜜一斤黃連一兩切上三味合煎去滓令相得含如半刺日四五夜二治口吻生白瘡名曰燕口方取新炊甑下飲訖以口兩吻銜甑唇乘熱柱兩口吻二七下瘥口旁惡瘡方亂髮灰故絮灰黃連末乾薑末各等分上四味合和為散以粉瘡上不過三度治口臭方濃煮細辛含汁久乃吐卻三日當愈又方井花水三升漱口吐廁中又方橘皮五分木蘭皮一兩桂心三分大棗四十枚蒸之去皮上四味末之以棗肉丸如梧子服二十丸日二服稍稍至三十丸一方有芎十八銖又方桂心甘草炙等分上二味細末三指撮酒服二十日香又方蜀椒汗桂心各一兩上二味服如前方治口乾方豬脂若羊脂如雞子大擘之苦酒半升中漬一宿絞取汁含之又方石膏五合碎蜜二升上二味以水三升煮石膏取二升納蜜煮取一升去滓含如棗核大咽汁盡即含之又方含一片梨即愈夜睡當時即定又方羊脂雞子大酒半升大棗七枚上三味合漬七日取棗食之瘥又方禁夜勿食酸食及熱面治口卒噤不開方搗附子末納管中開口吹口中良唇病第六方四首緊唇方以亂髮蜂房及六畜毛燒作末敷瘡上豬脂和亦佳又方緊卷故青布燒令燃斧上柱取斧上熱汁塗之並治沉唇治唇黑腫痛癢不可忍方取四文大錢於磨石上以臘月豬脂磨取汁塗之不過數遍即愈又方以竹弓彈之出其惡血立瘥齒病第七方二十七首含漱方主齒痛方獨活三兩黃芩三兩芎藭三兩當歸三兩細辛蓽茇各一兩丁香一兩上七味㕮咀水五升煮取二升半含漱之食頃乃吐更含之一方有甘草二兩又方含白馬尿隨左右含之不過三口瘥治裂齒痛方腐棘針二百枚上一味以水二升煮取一升含瀨之日四五瘥止又方取死蛐蟺末敷痛處即止治齒痛方夜向北鬥手拓地灸指頭地咒曰蠍蟲所作斷木求風蟲所作灸便休疼痛疼痛北斗收即瘥又方人定後向北鬥咒曰北斗七星三臺尚書某甲患齦若是風斷閉門戶若是蟲齦盡收取急急如律令再拜三夜作治牙疼方蒼耳子五升上一味以水一斗煮取五升熱含之疼則吐吐復含不過二劑愈無子莖葉皆得用之又方莽草五兩上一味切以水一斗煮水五升含漱之一日令盡又方納藜蘆末於牙孔中勿咽汁神良又方取門上桃橛燒取𣿉汁少少為納孔中以蠟固之針牙疼方隨左右邊疼手大指次指掌間入一寸得氣絶補三十九息灸牙疼方取桑東南引枝長一尺余大如匙柄齊兩頭口中柱著痛牙上以三姓火灸之咒曰南方赤帝子教我治蟲齒三姓灸桑條條斷蠍蟲死急急如律令大效治蟲食齒疼痛方閉氣細書曰南方赤頭蟲飛來入某姓名裂齒裹今得蠍蟲孔安置耐居止急急如律令小片紙納著屋柱北邊蠍蟲孔中取水一杯禹步如禁法還誦上文以水沃孔以淨黃土泥之勿令泄氣永愈治蟲食齒根肉黑方燒腐棘取𣿉塗之十遍雄黃末敷即愈若齒黑者以松木灰揩之細末雄黃塗齦百日日再塗之七日慎油豬肉神效治齒蟲方以檐一枚令病人存坐橫檐於膝上引兩手尋使極住手伸中指灸中指頭檐上三壯兩頭一時下火病人口誦咒曰啖牙蟲名字鶻莫啖牙莫啖骨灸人亦念之齒根腫方松葉一握鹽一合好酒三升上三味煎取一升含之齒根動痛方生地黃三兩獨活三兩上二味切以酒漬一宿含之又方常以白鹽末封齦上日三夜二又方叩齒三百下日一夜二即終身不發至老不病齒治齒牙根搖欲落方生地黃大者一寸綿裹著牙上嚼咽汁汁盡去之日三即愈可十日含之更不發也治齒根空腫痛困弊無聊賴方獨活四兩酒三升上二味於器中漬之爐火煨之令暖稍稍沸得半去滓熱含之不過四五度又方取地黃如指大長一寸火灸令大熱著木椎之以綿裹著齒上嚼之咽汁盡即三易瘥止又方燒松柏槐枝令熱柱病齒死須臾蟲緣枝出治牙齦疼痛方杏仁一百枚去皮尖兩仁者鹽末方寸匕上二味以水一升煮令沫出含之味盡吐卻更含不過再三瘥治牙車急口眼相引舌不轉方牡蠣熬伏龍肝附子炮去皮礬石燒上四味等分末之以白酒和為泥敷其上干則塗之取瘥止治齒齲方切白馬懸蹄可孔塞之不過三度治齒血出不止方刮生竹茹二兩酢漬之令其人解衣坐乃別令一人含噀其背上三過並取竹茹濃煮取汁勿與鹽適寒溫含漱之終日為度治失缺頰車脫臼開張不合方以一人捉頭著兩手指牽其頤以漸推之令復入口中安竹筒如指許大不爾齧傷人指舌病方第八治舌卒腫如吹胞滿口溢出氣息不得再通須臾不治殺人方急以指刮破潰去汁即愈亦可以鈹刀於前決破之千金云兩邊破之又方以苦酒一升煮半夏十枚令得八合稍稍含漱吐之半夏戟人咽須熟洗去滑盡用之勿咽汁也加生薑一兩佳治舌上黑有數孔出血如湧泉此心臟病也方戎鹽五兩黃芩五兩黃柏五兩大黃五兩人參二兩桂心二兩甘草一兩炙上七味末之煉蜜和丸飲服十丸如梧子日三服仍燒鐵烙之治舌卒腫起如吹胞狀滿口塞喉氣息欲不復須臾不治殺人治之方以刀鋒決兩邊第一大脈出血勿使刺著舌下中央脈血出不止殺人血出數升以燒鐵令赤尉瘡數過以絶血也又方含甘草汁佳喉病第九十四首治喉卒腫不下食方韭一把搗熬敷之冷即易之佳又方含荊瀝稍稍咽之又方含上好酢口舌瘡亦佳治喉痹咽唾不得方半夏上一味細破知棋子十四枚雞子一枚扣其頭如栗大出卻黃白納半夏於中納酢令滿極微火上煎之取半小冷飲之即愈喉痹方取附子一枚去皮蜜塗火炙令乾復塗蜜炙須臾含之咽汁愈又方含蜀升麻一片立愈治喉痹方以繩纏手大指刺出血一大豆以上瘥小指亦佳治馬喉痹方燒馬蘭根灰一方寸匕燒桑枝瀝汁和服治咽痛不得息若毒氣哽咽毒攻咽喉方桂心半兩杏仁一兩去尖皮熬之上二味為散以綿裹如棗大含咽其汁又方刺小指爪紋中出血即瘥左右刺出血神祕立愈治尸咽語聲不出方酒一升乾薑十兩末之酥一升上三味酒二合酥一匙薑末一匕和服之日三食後服之亦治肺病治尸咽咽中癢痛吐之不出咽之不入如中蠱毒方含生薑五十日瘥治咽中腫垂肉不得食方先以竹筒納口中熱燒鐵從竹中柱之不過數度愈治懸壅垂下暴腫長方乾薑半夏等分末少少著舌本半夏洗之如法用又方鹽末筋頭張口柱之日五自縮噎病第十方二首酥蜜生薑汁合一升微火煎二沸每服兩棗許納酒中溫服又方以手巾布裹舂杵頭糠拭齒耳病第十一方二十四首治耳聾方生地黃極粗大者長一寸半杏仁七枚燒令黑印成鹽兩顆巴豆七枚去皮熬令紫色頭髮雞子大炙之上五味搗作末以發薄裹納耳中一日一夜若少損即卻之直以發塞耳耳中黃水及膿出漸漸有效不得更著若未損一宿後更納一日一夜還去藥一依前法治勞聾氣聾風聾虛聾毒聾如此久聾耳中作聲補腎治五聾方山茱萸二兩乾薑巴戟天芍藥澤瀉桂心菟絲子黃耆乾地黃遠志去心蛇床子茯苓石斛當歸細辛蓯蓉牡丹皮人參甘草炙附子炮去皮各二兩防風一兩半菖蒲一兩羊腎二枚上二十三味搗篩煉蜜和為丸如梧子大服十五丸日三加至三十四十丸又方萆麻五分杏仁一兩去尖皮桃仁四分去尖皮巴豆仁一分去心皮熬石鹽三分附子半兩炮菖蒲一兩磁石一兩薰陸香一分松脂二兩半蠟二兩通草半兩上十二味先搗諸石等令細別搗諸物等加松脂及蠟合搗數千杵令可丸乃止取如棗核大綿裹塞耳一日四五度出之轉捻不過三四度日一易之又湯方磁石四兩牡荊子二兩一云牡蠣石菖蒲三兩山茱萸二兩芎藭二兩茯神二兩白芷二兩枳實二兩炙地骨皮三兩天門冬三兩去心甘草三兩炙橘皮二兩生薑二兩切竹瀝二升上十四味㕮咀以水八升煮取減半下竹瀝煮取二升半分為三服五日服一劑三劑後著散又散方石菖蒲二兩山茱萸二兩磁石四兩土瓜根二兩白蘞二兩牡丹皮二兩牛膝二兩上七味搗篩為散綿裹塞耳日一易仍服大三五七散一劑又方硫黃雌黃一云雄黃上二味等分末之綿裹塞耳數日聞聲又方以童子尿灌耳中三四度瘥赤膏主耳聾齒痛方丹參五兩蜀椒二升大黃一兩白朮一兩大附子十枚炮去皮細辛一兩乾薑二兩巴豆十枚去皮桂心四寸芎藭一兩上十味切以淳苦酒漬一宿納成煎豬膏三斤著火上煎三上三下藥成去滓可服可摩耳聾者綿裹膏納耳中齒冷痛著齒間諸痛皆摩若腹中有病以酒和服如棗許大咽喉痛吞如棗核一枚治二十年聾方成煎雞肪五兩桂心野葛各半兩上三味切膏中銅器內微火煎三沸去滓密貯勿泄以葦筒盛如棗核大火炙令少熱仰傾耳灌之如此十日耵聹自出大如指長一寸久聾不過三十日以發裹膏深塞勿使泄氣五日乃出之又方以器盛石鹽飯底蒸令消以灌耳中驗治聤耳出膿汁方礬石三兩燒龍骨一兩黃連一兩烏賊魚骨一兩上四味下篩取如棗核大綿裹塞耳日三易一方用赤石脂無龍骨治底耳方礬石燒之石鹽末之上二味先以紙繩紝之展卻汁令乾以鹽末粉耳中令通次下礬石末粉上須臾臥勿起日再治耳疼痛方附子炮去皮菖蒲上二味等分裹塞之治蟲入耳方末蜀椒一撮納半升酢中灌之行二十步蟲出瘥治百蟲入耳方搗韭汁灌之耳中立出又方灌蔥涕須臾蟲出瘥又方以木葉裹鹽炙令熱以掩耳冷即易之出又方薑汁滴耳中又灌牛乳良又桃葉塞耳治蚰蜒入耳方牛乳灌之蚰蜒自出若入腹者空腹服酢酪一升不出更服仍以和麵燒餅乘熱坐上須臾出又方以油灌之又方灌驢乳於耳中即變成水入腹飲之即瘥又方桃葉汁灌之又方打銅碗於耳邊又方炒胡麻以布袋盛枕頭
