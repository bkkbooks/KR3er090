body:
  text: 卷第二十一萬病總療萬病第一論曰後生志學者少但知愛富不知愛學臨事之日方知學為可貴自恨孤陋寡聞所以憫其如此忘寢與食討幽探微輯綴成部以貽未悟有能善斯一卷足為大醫凡膈上冷少腹滿腸鳴膀胱有氣冷利者當加利藥服訖當利出泔澱青黃水青泥輕者一兩度加利藥去病即止重者五六度加利藥得日三頻大利方得盡其根源病乃永愈其利法至已時以來兩行三行即定亦自如舊終不成利病也凡病在上膈久冷痰癊積聚疝瘕癥結宿食堅塊咳逆上氣等固病終日吐唾逆氣上衝胸脅及咽喉者此皆胃口積冷所致當吐盡乃瘥輕者一二度重者五六度方愈其吐狀初唾冷沫酸水次黃汁重者出赤紫汁若先患注人當出黑血下吐藥大吐吐時令人大悶須臾自定不令人虛惙得冷飲食已耳不虛聾手足不痹亦有人當吐時咽中有一塊物塞喉不能得出者飲一二合藥酒須臾即吐出一物如拳許大似段雞子中黃重者十塊輕者五六枚上件等疾狀病之根本若今日不出此根本之疾雖得名醫與一二劑湯藥押定於後食觸其病還發善醫者當服此藥一出根本即終身無疾矣吐利出疾法凡長病人虛羸人老人貴人此等人當少服積日不已病當內消也不須加吐利藥凡加吐利藥傷多吐利若不止者水服大豆屑方寸匕即定卒無豆屑嚼藍葉及烏豆葉亦得定丈夫五勞七傷陽氣衰損羸瘦骨立者服之即瘥旬月之間肌膚充悅腦滿精溢仍加補藥加法在後章中療風方用藥多少法歷節風二十兩酒五斗賊風熱風大風用藥與歷節同偏風猥退癱瘓風十二兩酒三斗上以上風皆帶熱須加冷藥仍須利藥得利佳也賊風掣縱八兩酒二斗濕風周痹八兩酒二斗腳腰攣痛十二兩酒三斗筋節拘急八兩酒二斗食熱如針刺八兩酒二斗熱病後汗不出初覺三服一服一盞年久服一升口喎面戾一目不合四兩酒一斗年久十二兩酒三斗起即頭眩四兩酒一斗頭面風似蟲行八兩酒二斗心悶欲嘔吐項強欲陰雨即發者八兩酒二斗因瘡得風口噤脊背反張如角弓五服一服一盞療冷病方積冷痰癊瘦者四兩酒一斗強者六兩酒一斗半痰飲疝癖六兩酒一斗半宿食吐逆四兩酒一斗症癖腸鳴噫八兩酒二斗㿗痔癖塊咳嗽上氣二十兩酒五斗奔豚冷氣六兩酒一斗半噎噦嘔痢六兩酒一斗半久疰八兩酒二斗卒中惡忤心腹脹滿氣急垂死三服一服一盞當大吐吐出血瘴氣三服蠱毒五服溫瘧五服痎瘧五服冷痢六兩酒二斗半久勞八兩酒二斗療婦人方其風冷等准前帶下十二兩酒三斗崩中六兩酒一斗半月水不通六兩酒一斗半冷病絶産六兩酒一斗半斷緒八兩酒二斗産後諸疾八兩酒二斗月水不調月前月後乍多乍少四兩酒一斗落身後病六兩酒一斗半重者子宮下垂十二兩酒三斗大排風散主一切風冷等萬病方芫花狼毒欒荊天雄去皮五加皮麻花白芷紫菀烏頭去皮附子去皮莽草茵芋栝蔞荊芥躑躅蕘花大戟王不留行赤車使者麻黃各二十分石斛半夏石楠薯蕷長生各十四分藜蘆七分狗脊人參牛膝蓯蓉蛇床子菟絲子萆薢車前子秦艽各七分薏苡五味子獨活藁本柴胡牡丹柏子仁芎藭芍藥吳茱萸桔梗杜仲桂心橘皮續斷茯苓細辛乾薑厚朴茯神山茱萸防己黃耆蜀椒巴戟天高良薑紫葳黃芩當歸菖蒲乾地黃通草各四分上六十七味勿熬煉直置振去塵土即搗粗篩下藥三兩黍米三升曲末二升上酒一斗五升淨淘米以水五升煮米極熟停如人肌下曲末熟搦次下散搦如前次下酒攪之百遍貯不津器中以布片蓋之一宿旦以一淨杖子攪三十匝空腹五更溫一盞服之以四肢頭面習習為度勿輒加減非理造次必大吐利欲服散者以絹篩下之一服方寸匕只一服勿再也水飲漿酒皆得服之丸服者蜜和服如梧子七丸唯不得湯服也須補者藥少服令內消即是補也千金方有白朮食茱萸無麻花半夏赤車使者高良薑紫葳止六十四味名芫花散一名登仙酒又名三建散按後加減法中有遠志而此方中無疑此脫遠志也凡服此藥法先多服令人大吐下利三五度後乃少服方可得益也其加增藥法如下麻花烏頭王不留行赤車使者麻黃躑躅茵芋芫花五加皮白芷莽草附子栝蔞荊芥天雄芎藭藁本薯蕷巴戟天細辛獨活當歸黃耆乾薑厚朴防己山茱萸大戟萆薢桔梗牡丹柏子仁狗脊薏苡秦艽菖蒲上三十六味並主風多者患之者准冷熱加減之蓯蓉芎藭續斷蛇床子王不留行桔梗芫花天雄附子躑躅茵芋當歸秦艽芍藥乾薑狗脊萆薢石楠蜀椒乾地黃菖蒲薯蕷石斛牛膝細辛紫胡車前子桂心柏子仁五加皮杜仲薏苡上三十二味主濕痹腰脊患之者准冷熱加減之秦艽蒿本狗脊萆薢通草石楠芎藭續斷牛膝乾地黃石斛薏苡菟絲子杜仲天雄去皮附子去皮上十六味主攣急軃曳患之者准冷熱加減之莽草防己藜蘆上三味主身癢疥瘙患之者准冷熱加減之紫菀牡丹茯苓茯神柏子仁蕘花人參遠志細辛上九味主驚癇患之者准冷熱加減之蜀椒長生躑躅上三味主鬼魅患之者准冷熱加減之紫菀芫花藜蘆上三味主蠱毒患之者准冷熱加減之高良薑桔梗芫花山茱萸茯苓人參紫胡牡丹蕘花蓯蓉巴戟天芍藥乾薑附子烏頭去皮麻黃莽草上一十七味主痼冷積聚腹痛堅實患之者准冷熱加減之厚朴橘皮桔梗大戟藜蘆半夏乾薑藁本人參吳茱萸上一十味主腹痛脹滿吐逆患之者准冷熱加減之茯苓厚朴芫花半夏細辛烏頭黃芩紫胡山茱萸上九味主痰實患之者准冷熱加減之厚朴乾薑紫菀茯苓桔梗蕘花烏頭人參細辛柴胡上一十味主胸滿痛患之者准冷熱加減之紫菀薯蕷石斛細辛巴戟天牡丹當歸人參菖蒲五味子桔梗柏子仁吳茱萸山茱萸乾地黃上一十五味主補五臟虛損患之者准冷熱加減之柏子續斷黃耆薯蕷芍藥巴戟天五味子上七味主益氣患之者准冷熱加減之肉蓯蓉蛇床子五味子附子天雄萆薢栝蔞薯蕷遠志巴戟天菟絲子牛膝柴胡車前子細辛茯苓杜仲五加皮石斛上一十九味主益精髓患之者准冷熱加減之乾地黃菟絲子天雄附子上四味主補骨髓患之者准冷熱加減之當歸藁本白芷乾地黃五加皮石斛菟絲子薯蕷五味子厚朴上一十味主長肌肉患之者准冷熱加減之五加皮杜仲續斷上三味主陰下濕癢患之者准冷熱加減之茯苓人參栝蔞上三味主消渴患之者准冷熱加減之栝蔞茯苓芍藥橘皮秦艽山茱萸車前子上七味主利小便患之者准冷熱加減之菖蒲栝蔞山茱萸上三味止小便利患之者准冷熱加減之人參細辛菟絲子狗脊上四味生明目患之者准冷熱加減之芎藭白芷上二味主止淚患之者准冷熱加減之細辛益肝氣遠志人參補心氣上三味補益氣患之者准冷熱加減之石楠萆薢狗脊車前子石斛上五味補養腎氣患之者准冷熱加減之蜀椒當歸麻黃桂心吳茱萸紫菀蕘花藜蘆附子半夏烏頭菖蒲遠志細辛芫花五味子上一十六味主咳嗽上氣患之者准冷熱加減之蛇床子石斛細辛薯蕷橘皮上五味主下氣患之者准冷熱加減之附子乾薑人參桂心橘皮厚朴上六味主霍亂患之者准冷熱加減之黃耆通草主漏厚朴山茱萸莽草主三蟲紫菀當歸白芷主崩中帶下黃芩蛇床子主寒熱漏芎藭牛膝栝蔞紫葳上一十四味主月閉患之者准冷熱加減之麻黃栝蔞柴胡桂心芍藥主傷寒通草菖蒲遠志人參主健忘附子黃芩乾薑蜀椒主下痢紫菀茯苓芎藭上一十六味主唾稠如膠患之者准冷熱加減之論曰所加之藥非但此方所須普通諸方學者詳而用之阿伽陀丸主萬病第二阿伽陀藥主諸種病及將息服法久服益人神色無諸病方紫檀小蘗茜根鬱金胡椒各五兩上五味搗篩為末水和納臼中更搗一萬杵丸如小麥大陰乾用時以水磨而用之諸咽喉口中熱瘡者以水煮升麻取汁半合研一丸如梧子大旦服之二服止禁酒肉五辛宜冷將息諸下部及隱處有腫以水煮牛膝乾薑等取汁半合研一丸如梧子大旦服之四服止禁酒肉五辛生冷醋滑諸面腫心悶因風起者以水煮防風取汁半合研一丸如梧子旦服之二服止不須隔日禁酒五辛醋肉諸四體痠疼或寒或熱以水煮麻黃取汁半合研一丸如梧子旦服止禁酒肉及面五辛諸䗪下部有瘡吞一丸如梧子大又煮艾槐白皮取汁半合研一丸灌下部二度禁酒肉諸卒死服者多活看其人手腳頭面腹腫觀其顏色無定若有此色而加痢者並不堪治以冷水弱半合研二丸如小豆灌口一服不瘥更與一服若損唯得食白粥鹽醬禁酒肉五辛諸被魘禱當心常帶一丸又以水一酸棗許研一丸如小豆服之三服止無所禁忌諸被蛇及惡獸等毒若未被其毒直須闢除隨身帶行便即遠離入草已被毒者以麝香一相思子大又以水一酸棗許共藥一丸如小豆於水內研服並以紫檀以水研取汁用研藥塗其瘡毒處禁酒肉五辛諸被一切鬼神及龍毒氣者其人飢渴寒熱時來時去不知痛處或恍惚龍毒者其人昏昏似醉膚體斑駁或青取藥一丸如梧子以水酸棗許共藥研灌鼻及服二服止無所禁諸被鬼繞糾失心癲狂莫問年月遠近以艾汁一酸棗許研藥二丸如小豆服之若無青艾取干艾水浸搦取汁用亦得四服止並帶一丸常可隨身口味無所禁忌諸傳尸復連夢想顛倒身體瘦損不知病所乍起乍臥先以水研雄黃一梧子大取汁酸棗許研二丸如小豆大服之二服止並掛一丸著病者門上及帶一丸隨身口味無忌諸消渴者以朴硝少許以水攪硝取汁半合許研二丸如面小豆服之七服止禁五辛酒肉諸患淋不問遠近以芒硝少許以水攪取一酸棗許汁研藥二丸如小豆大服之便止禁酒肉諸患疔腫以水一升煮玄參取汁研藥服三服止又以水半合研玄參根取汁和藥塗上三遍不須隔日唯食白粥飯自外鹽以上皆不食諸卒胸膈熱眼暗口臭以水煮苦竹葉取汁半合研藥一丸如梧子二服止禁酒肉諸難産以蓀將二七水煮取汁半合研藥一丸服之若無蓀將研薑黃取汁研藥吞一丸空吞亦得將息如産時諸熱瘡無問遠近以水煮大黃取汁半合研藥一丸如梧子服之二服止又水研大黃取汁以藥一丸研塗瘡上日三遍禁房面五辛宜令將息諸吐血若因熱吐者不問遠近服之並瘥冷吐者不治以葛蒲汁一酸棗許研藥二丸如小豆服之四服止須微暖將息忌酒肉五辛諸鼻中血不止以刺薊汁一酸棗許研二丸如小豆服之並研灌鼻二服灌止若無刺薊之時取乾者水煮取汁依前法服禁酒肉五辛諸噎病以水研栝蔞取汁一雞子大研藥一丸如小豆服之四服止忌生冷諸赤白帶下以牡丹皮刺薊根各二分以水二升煮取一升分五服研藥一丸如梧子服之五服止禁生冷五辛酒肉後補法地榆二分桑螵蛸二分一云桑耳上二味水二升煮取汁一合分作二服取汁一合研藥一丸服之諸得藥毒以冷水半合研藥一丸如梧子服之二服止禁酒肉五辛宜五日冷將息諸卒得惡忤以人乳汁半合研藥一丸如梧子大灌鼻以水半合研藥一丸如梧子灌口三日禁食諸寒瘧以水一升煮恆山一兩取汁半合研藥一丸如梧子大服之二服止先取藥如麻子大以冷水研灌鼻中三四嚏病者垂頭臥便得痛癢又更灌一邊令相續然後服藥七日少食禁如前諸䘌甘濕以生犀角白檀香以水煮取汁一雞子殼許研藥二丸如小豆並蚺蛇膽一丸共研服之三服止若甘濕藥及蚺蛇膽各丸之以綿裹納於下部中三度止諸益神色除病辟惡氣每日以白蜜如棗核大研藥一丸如小豆服長帶少許亦禁如前諸草藥毒迷悶以泥裹冬瓜燒絞取汁半合研一丸如梧子服之若無冬瓜用水服之三日慎食諸眠驚恐常帶藥一丸如梧子夜臥安頭邊不得著身每夜欲臥服一丸如梧子以水一升煮牡蒙二分取汁半升分三服七日慎食諸心勞虛弱以水煮茯神人參取汁半合研一丸服之十服以上止慎生冷諸心風虛熱以竹瀝漬防風搗絞取汁半合研一丸如梧子服之七服止慎酒肉五辛醋面諸心驚戰悸以水一升切茯苓牡蒙遠志各二分煮取汁半升分三服一服研一丸服之五服止諸多忘恍惚以水煮人參取汁半合研一丸服之五服止亦可七服慎如前諸溫疫時氣以水煮玄參取汁一合研一丸如小豆服之四服止量宜緩急唯得食粥及冷食余皆禁若患勞家遞相染煮服時並取艾作炷長三寸門閫當心灸七壯即解諸嘔吐水煮白檀生薑取汁半合研一丸如梧子服三服止七日慎食如前諸噦病水一升煮通草橘皮各半兩取汁三合分再服研二丸如小豆服之二服止慎生冷諸小心驚啼以水煮牡蒙取汁半合研一丸如梧子塗乳上令兒飲乳母慎酒肉五辛諸産後血結以生地黃汁半合研一丸如梧子服之二服止血便消下忌食酒肉諸熱風痹風氣相擊令皮膚厚澀關節不通以防風牡荊子各一分蓽茇一分以水一升煮取汁三合分三服每旦一服研一丸如梧子大服之十服止慎酒肉五辛諸熱風上衝頭面上癢鼻中癢兼時行寒熱若食嘔吐以人參一分防風生薑各二分以水一升五合煮取汁三合分三服取汁一合研一丸如梧子服之七服止慎如上法諸黃疸病以黃芩苦參各二分以水一升煮取五合分三服一服研一丸如梧子服之若渴納茯苓栝蔞各二分依前以水煮服唯得與粥諸卒失瘖不語以防風一兩和竹瀝搗絞取汁半合研一丸如梧子二服止即語重者不過五服禁酒肉醋面生冷等諸懷孕三月以上至臨産不問月日多少忽染種種疾或好傷落及至水腫天行時氣此醫人不許服藥唯得此藥三服以上重者不過十服即瘥母子不損平安分解前件諸病可作湯斫藥服之甚良諸産後先痢鮮血後雜膿及腹中絞痛橘皮桔梗各二分生薑一兩水一升煮取半升分三服一服研一丸如梧子服之七日慎生冷油膩醋面諸小兒新得風癇以竹瀝半合研一丸如梧子服之二服止慎如前諸女子數傷胎帶一丸如酸棗大夜即解安頭邊不得著身每旦服一丸如梧子三日止無忌諸卒腹脹水煮當歸取汁半合旦服一丸如梧子二服止慎生冷諸臍下絞痛以水煮芎藭取汁半合研一丸如梧子三服止七日慎食生冷諸蛇蠍蜈蚣毒以水磨鬱金取汁半合研一丸如梧子服之二服止並研一丸如小豆遍塗瘡上忌如前諸霍亂因宿食及冷者吐逆腹中絞痛吐痢若冷者以桔梗乾薑以水煮取汁一酸棗研二丸如小豆二服止因熱者用梔子仁以水煮取汁依前法服皆慎生冷諸注病以水煮細辛取汁一酸棗許研二丸如小豆服之五服止冷者溫將息諸中惡以水煮甲香取汁一酸棗許研二丸如小豆服之耆婆治惡病第三方一十一首論七首論曰疾風有四百四種總而言之不出五種即是五風所攝云何名五風一曰黃風二曰青風三曰白風四曰赤風五曰黑風其風合五臟故曰五風五風生五種蟲黃風生黃蟲青風生青蟲白風生白蟲赤風生赤蟲黑風生黑蟲此五種蟲食人五臟若食人脾語變聲散若食人肝眉睫墮落若食人心遍身生瘡若食人肺鼻柱崩倒鼻中生息肉若食人腎耳鳴啾啾或如車行雷鼓之聲若食人皮皮膚頑痹若食人筋肢節墮落五風合五臟蟲生至多入於骨髓來去無礙壞於人身名曰疾風疾風者是癩病之根本也病之初起或如針錐所刺名曰刺風如蟲走名曰遊風遍身掣動名曰瞤風不覺痛癢名曰頑風肉起如桃李小棗核從頭面起者名曰順風從兩腳起者名曰逆風如連錢團丸赤白青黑斑駁名曰𤻪風或遍體生瘡或如疥癬或如魚鱗或如榆莢或如錢孔或癢或痛黃汁流出肢節壞爛悉為膿血或不癢不痛或起或滅青黃赤白黑變易不定病起之由皆因冷熱交通流入五臟通徹骨髓用力過度飲食相違房室不節虛動勞極汗流遍體因茲積熱風熱徹五臟飲食雜穢蟲生至多食人五臟骨髓皮肉筋節久久壞散名曰癩風是故論曰若欲療之先服阿魏雷丸散出蟲看其形狀青黃赤白黑然後與藥療千萬無有不瘥胡云迦摩羅病世醫拱手無方對治名曰正報非也得此病者多致神仙往往人得此疾棄家室財物入山遂得疾愈而為神仙今人患者但離妻妾無有不瘥阿魏雷丸散方阿魏紫雷丸雄黃紫石英各三分硃砂滑石石膽丹砂蘘蘆白蘞犀角各半兩斑蝥去足翅芫青去足翅各四十枚牛黃五分紫鉚一兩上十一五味搗篩為散空腹服一錢匕清酒二合和藥飲盡大飢即食小豆羹飲為良莫多食但食半腹許即止若食多飽則蟲出即遲日西南空腹更一服多少如前若覺小便似淋時不問早晚即更服藥多少亦如前大飢即食若覺小便時就盆子中出看之蟲從小便出當日即出或二日三日乃出或四日五日出或殺藥人七日始出其蟲大者如人指小者大如小麥或出三四枚或五六枚或七八枚或十枚或三二十枚黃蟲似地黃色赤蟲似碎肉凝血色白蟲似人涕唾或似魚腦或似姜鼓汁青蟲似緑或似芫青色黑蟲似墨色或似爛椹又似黑豆豉其蟲得藥者死死者即從小便中出大便中亦有出者不淨不可得見若出黑色蟲即是黑風不可理之無方可對若出黃蟲即是黃風當用小便七八升大甕盛之如灶法安甕不津者盛小便中常令使暖入中浸身一日再三度一入中坐浸如炊二三斗米頃若心悶即出湯數食莫令飢虛則於人無力七七四十九日即為一徹以瘥為度或一年二年忌房室房室脈通其蟲得便病即更加其患非冷熱風治如此此是橫病非正報也若出青蟲即是青風患起由冷風至多其蟲皆青即是東方木中毒風青蟲宜服自身小便亦名花水亦名清湯亦名還中水服法空腹服一七日一服六合旦起日初出即服服不過一升飢即食不得食五辛豬肉雞犬穢食臭惡之食大嗔怒房室皆忌之服法第一忌之至二七日一日再服服別四合小便常取空腹服之則不過一升三七日一日三服至四七日小便出即服乃至周年以瘥為度服之不過一升百日外小便至少一日之中止可一度二度服之服大香美好羹如漿忌法三年犯則難瘥不犯永愈青蟲如此是橫病非正報也出白蟲者即是白風赤蟲者即是赤風同為一等療二風由熱為根蟲皆赤白乃是南風西風入五臟通徹骨髓成患為疾此之二風與苦參硝石酒飲之除患最疾熱去其患即愈苦參硝石酒方浸酒法在後苦參硝石好清酒上三味先與清酒下硝石浸之二七日或三七日然後與苦參同入酒甕中盛浸之七日漸漸服之飲法空腹服之一日三服初七日中一服如半雞子許七日後可飲一升任情飲之多則為善患去則速風動亦多勿使醉吐寧漸少飲不用多飲赤白二風此藥至日無有不愈余非難治何以故熱為根本故苦參能治熱硝石除熱消蟲赤白二蟲但聞硝石氣皆為水能去熱根本若患赤白二風不問年月多者五年以外加黃硝石加酒苦參乃至三四兩無有不愈乃至三十年無鼻柱肢節墮落者但非黑蟲皆悉永愈第一忌房室大瞋怒大熱食禁黏食五辛生冷大醋酪白酒豬魚雞犬驢馬牛羊等肉皆為大忌其餘不禁此為對治非正報也若人頑痹不覺痛癢處者當作大白膏藥摩之一日三四度七日徹或二三七日徹乃至七七日四十九日名曰一大徹頑痹即覺癢平復如本即止摩若不平復但使摩之以瘥為限不過兩大徹三大徹無有不愈針刺灸燒割劫亦不及摩之為良乃至身上多有瘡痕生摩之悉愈大白膏方白芷白朮前胡吳茱萸各一升芎藭二升蜀椒細辛各三兩當歸桂心各二兩苦酒四升上一十味以苦酒浸藥經一宿取不中水豬脂十斤銅器中煎令三沸三上三下候白芷色黃膏成貯以瓶中隨病摩之即愈若遍體生瘡膿血潰壞當作大黑膏摩之大黑膏方烏頭芎藭雄黃胡粉木防己升麻黃連雌黃藜蘆礬石各半兩杏仁去皮尖巴豆各四十枚黃柏一分松脂亂髮各如雞子大上一十五味搗篩為末以豬脂二升合藥煎亂髮消盡膏成用塗瘡上日三敷先以鹽湯洗然後塗之勿令婦女小兒雞犬見若患人眉睫墮落不生者服藥後經一百日外即以鐵漿洗其眉睫處所一日三度洗之生毛則速出一大徹眉睫如本與不患時同也浸酒法苦參去上黃皮薄切曝乾搗令散莫使作末稱取三十斤取不津甕受兩斛者甕底鑽作孔甕中底頭著二三十青石子如桃李雞子許大過底孔上二三寸然後下苦參下硝石末酒一時著甕中遣童子小兒年十三四者和合調停然後即與五六重故紙系甕口用小甕口合上泥之莫使漏氣取酒服時法孔中出酒服之一日一服或再服亦得還如法密塞孔勿漏泄不得開甕口取酒酒欲盡時開甕口取苦參滓急絞取酒其滓去卻其酒密處盛之莫使漏氣服酒法一一如前無有不愈若患不得瘥除者皆由年多十年者更作此藥酒至兩劑無有不愈依法如前雖用良醫治之亦須好酒須行忠直不得不孝不義患除則速矣論曰苦參處處有之至神良黃硝石出龍窟其狀有三種一者黃硝石二者青硝石三者白硝石其形如鹽雪體濡燒之融似曲蟺見鹽為水硝石真者燒煉皆融真僞可知三種硝石黃者為上青者為中白者為下用之殺蟲皆不如黃者最良黃硝石立殺人身中橫蟲去蟲至速除大風大強藥青硝石者至神大藥出在鳥場國石孔中自然流出氣至惡大臭蜂蛇飛蟲皆共宗之其氣殺蟲硝石與苦參酒相入治熱至良去風至速方稀有用時乃勝於白硝石此青硝石體狀也如似世間膠漆成時亦如陳蜜亦如餳餔少必枯體澤又似塵汗脂蜜氣味至惡此藥道士貴服則去人身中橫蟲不能得用時先與三升酒浸之二十日多日為佳其勢倍效皆大驗然後與苦參同浸論曰黃青白硝石等是百藥之王能殺諸蟲可以長生出自鳥場國採無時此方出耆婆醫方論治疾風品法中黃力三歲譯後演七卷治疾風品法云服藥時先令服長壽延年符大驗蕩除身中五臟六腑遊滯惡氣皆出盡然後服藥得力其疾速驗無疑符力亦是不思議神力先服藥者無有不效又生造藥入甕中時令童子小兒和合訖即告符書鎮藥符鎮在甕腹令藥不壞久久為好一切神鬼不可近之矣論曰疑師不治病疑藥不服之服之即不得力決意不疑者必大神驗一切藥有從人意即神疑人必失及久多必損不疑久者有益治病當有愈醫論如此說是以令知服藥先服藥符大驗遣諸惡氣藥勢必當有效朱書空腹服之訖即服藥一如前說朱書此符先服此符然後服藥一服之後更不須再服書符用六合日勿令小兒女子六畜雞犬等見之符成不忌論曰病起從上者名為順病病則易治治則病疾愈從下起者名為逆病難治倍藥可瘥論曰患在五臟骨髓者非湯藥不愈患在皮膚肉脈中者針刺可瘥湯藥益人精神久有益患易除愈盡其根源針灸雖得目下解急於人神濁養性延年要是湯藥非針灸之所及也湯丸散酒延年益壽燒灸針刺於身不利論云疾有多種所患不同有蟲癩疥癩風癩金癩木癩水癩火癩土癩酒癩面癩此皆作癩蟲癩者得即生瘡膿血潰爛眉發墮落三年爛壞蟲如馬尾此患難治加藥乃愈疥癩者狀如癬瘙身體狂癢十年成大患加藥乃愈風癩者風從體入或手足刺痛風冷痹癡不療二十年後成大患加藥乃愈金癩者是天所為長差功德崇初得眉落三年食鼻鼻柱崩倒難治加藥乃愈木癩者初得先落眉睫面目癢如復生瘡三十年成大患宜急治之加藥乃愈水癩者先得水病因卻留停風觸發動落人眉須宜急治之經年病成加藥乃愈火癩者先於身體生瘡如火燒瘡或斷人肢節七年落眉睫八年成大患難治加藥乃愈土癩者身體㾦瘰如雞子彈丸許宜急治之六年成大患加藥乃愈酒癩者飲酒大醉不覺臥黍穰中經夜方起遂即成疾眉須墮落速治可瘥面癩者遍身有瘡生蟲其蟲形如面舉體艾白此病難治加藥乃愈凡三十九種病或面皰起身體頑痹不覺痛癢或目丸失光或言音粗重或瞑蒙多睡或從腰寬或從足腫種種不同莫能識者病非一般或所得各異若眉須墮落皆由風冷因濕得之或因汗入水冷氣太過或飲酒大醉濕地而臥或立當風沖樹下露坐或房室過度流汗極體取冷風入五臟遂成斯患是故論出患之所根本藥之分劑未來病者按而用之無有不愈浸湯方桃柳各十斤莨菪藜蘆烏頭去皮茵芋丹參楮葉白羊羶柏葉柏皮大黃鬼扇桑甲藁本棗葉松葉食茱萸各二斤鹽五斤上一十八味細銼納大釜中以水七斛煎取汁四斛去滓納槽中令病者臥浸旦至食時便出日中時復入日西復出其湯常欲得暖以自消息出湯即用十種粉粉之不得使風入被覆溫臥使身汗流病即瘥若風多可加藥如下蒴藋艾葉瓜根虎掌各三斤菟絲木防己狐骨各五兩礬石二兩大鹽一升馬牙硝三兩上一十味搗篩為散出湯用粉粉身使風不入諸癩病生瘡一切諸惡瘡止用粉粉之立瘥矣又作酒法茵芋烏頭去皮天雄去皮附子去皮蜀椒防風石楠乾薑桂心躑躅花莽草甘草各一兩上一十二味㕮咀絹袋盛之清酒一斗漬之春秋七日夏五日冬十日一服三合日三服以知為度不知漸增禁如藥法仙人黃靈先生用天真百畏丸治一切癩病方淳酒二斗以銅器中煮之減半然後納藥丹砂水銀桂心乾薑藜蘆烏頭炮去皮蜀椒汗菖蒲柏子仁各一兩上一十味搗篩為散納酒中訖復下淳漆二升攪令相得可丸如梧子作九百丸日服一丸日三十日眉須生三十日復本也九霄君治十種大癩不可名狀者服之病無不愈方用三月庚寅日取蔓荊花四斤陰乾末之五月辛酉日取兩井水一斗納銅器中煎之令濃然後納桂心末附子末炮去皮藜蘆末各一兩乾漆末四合石榴末一升上五味藥末攪使相和煎令成丸如彈丸大服一丸即愈若不瘥者不過三四丸即愈大驗此方出九霄君守朴經仙人治癩病神驗方取松葉不問多少煮三五遍令苦味盡曝乾搗末如面先食服二方寸匕日三漸增之或可至四兩隨人多少至一斤飢即服之能愈萬病又益壽延年殺三蟲食人五臟動發若病難忍四肢重不仁婦人産後余疾月水往來不得續男女少者藥悉主之礬石釀酒方礬石燒石膏代赭恆山蜀椒去目閉口者汗遠志去皮狼毒半夏洗芒硝礬石煉玄參麻黃去節防風桔梗秦艽石楠石葦去毛黃連莽草乾地黃凝水石菟絲子甘草炙各一兩白石英一兩半杏仁二十枚去皮尖熬上二十五味搗篩盛韋囊中以時曲三斤米三斗作酒酒熟合藥封之冬十日春七日夏三日秋五日出藥去滓服酒如一雞子酒勢盡復進之所治無有不愈日再十日知三十日愈百日面白如桃李花色耳目聰明邪氣蕩除去魂還復服藥當齊戒有效驗矣踏曲療冷第四方六首鹽曲主一切風冷氣等萬病方曲末五升鹽末一升五合上二味熟搗分作五袋旦取二袋炒令熱以薄袋各受一升納藥於中更遞盛之於室內臥以腳踏袋以被覆之取汗其藥冷即易初一日一夜以十度炒之於後連日連夜數炒頻踏不得暫停其藥既易多無力即棄之別取新者唯候遍體汗盡其病方瘥特須細心多日久候汗盡乃止末盡時間數有悶亂唯食香漿粥飯特忌生冷所臥床上數白熟羊皮刺風汗並盡然後乃補之三部脈微弱者勿用之補酒方石葦十兩去毛石楠三兩炙仙靈脾十四兩細辛五兩上四味切和以水一斗煎取二升去滓經宿澄杏仁一升去皮尖及雙仁搗以水八升研取汁煎取二升半經一宿以二汁合之計得四升半以干曲一斗五升先以五加皮汁浸曲停一宿其次下石葦等汁一時合和以上黍米七升分為七酘三日下酘凡三十九日即熟取麻子一升淨擇炒令香熟搗作末以絹袋盛納酒中經三日量力稍稍服之以知為度其補日與踏曲日等盡補以來大小便不得出屋忌房室喜怒若犯忌後發難瘥其無酒可補者別補方如下羊肚肝腎心肺一具以熱湯淨洗肚白餘臟皆生細切犛牛酥胡椒蓽茇各一兩豉心半升蔥白三握去須細切上五味合和以水六升緩火煎取三升絞去滓和臟等並余汁並納肚中以繩急系口更別作絹袋一口稍小於羊肚煮之若熟乘熱出以刀子並絹袋刺作孔瀝取汁空腹服令盡余者任意分作羹粥食之其無五藏可得用羊骨以補之其方如下生羊骨兩具打碎上以水一石微火煎取三升依食法任意作羹粥食之其不食肉者以油麵補之方如下生烏麻油一升折粳米泔清汁一升上二味合和微火煎盡泔清汁唯有油在即止停冷以用作食補法如下以上油三合鹽汁七合上二味先以鹽汁和油攪令鹹淡得所即用以溲麵一升依常法作餺飥煮五六沸漉出置冷水中更漉出置盤上令乾後更一葉葉擲釜中又煮如常法十度煮之面毒乃盡以油隨意多少和豉令味足以澆食大好內釀法主婦人絶産及冷結氣宿食不消男子五勞方生地黃五升細切以水洗漉干搗取汁曲末二升上二味合和納小甕子中密塞口勿泄春夏秋三十日冬埋入地三尺四十九日出之曝乾搗篩以糯米作粥一升以散二方寸匕和服之日三任意服之不限時節便以為常食取飽足而已更不得餘食也服盡以來其病並瘥七日後任如常食
