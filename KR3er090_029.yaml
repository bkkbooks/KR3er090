body:
  text: 卷第二十九禁經上論曰夫清濁未分無間眠曉玄黃肇判乃見溫涼四時攸分降生寒暑三光照爛日景虧盈人稟五常腠理通塞故老子曰吾所以有大患者為吾有身及吾無身吾有何患由此觀之形質既著則疴瘵與焉靜言思之惟無形者可得遠於憂患矣夫天地聖人尚不能無患況如風燭者乎古有調針切脈之君嘗藥煉石之帝憂勞庶類不遑寧處者亦以衆矣自時厥後窮神極智之士抽心盡思之賢相與贊成其業者不可勝紀是以醫方千卷未盡其性故有湯藥焉有針灸焉有禁咒焉有符印焉有導引焉斯之五法皆救急之術也何者病起無端醫療萬呂閭瘤之內猶有矢枉之哀朝野之中尚致膏肓之疾誠可悲夫方今醫者學不稽古識悟非深各承家技便為洞達自負其長競稱彼短由斯對執卒不得挹其源流也余早慕方技長崇醫道偶逢一法豈吝千金遂使名方異術莫能隱祕且此書也人間皆有而其文零疊不成卷軸縱今有者不過三章兩章既不專精探其至績終為難備斯之一法體是神祕詳其辭采不近人情故不可推而曉也但按法施行功效出於意表不有所緝將恐零落今編為兩卷凡二十二篇名曰禁經其於條例後科詳悉博雅君子無或隱焉持禁齊戒法第一神仙經曰凡欲學禁先持知五戒十善八忌四歸皆能修治此者萬神扶助禁法乃行五戒者一曰不殺二曰不盜三曰不淫四曰不妄語五曰不飲酒嫉妒十善者一濟扶苦難二行道見死人及鳥獸死者皆埋之三敬重鬼神四不行殺害起慈憫心五不憐富憎貧六心行平等七不重貴輕賤八不食酒肉五辛九不淫聲色十調和心性不乍嗔乍喜八忌者一忌見死尸二忌見斬血三忌見産乳四忌見六畜産五忌見喪孝哭泣六忌抱小兒七忌共女人同床八忌與雜人論法四歸者一不得著穢汙不淨潔衣服即神通不行二不得惡口咒詛罵詈三不得共人語詐道稱聖四不得飲酒食肉殺害無道又云又之不得與不信人行禁又不得向人說禁法不得與信人行禁又不得向人說禁法又云不得穢處誦禁文又云不得穢汙手執禁文又不得與雜人喧戲又不得輕說神明又不得嗔打六畜及人不得乘車馬有犯此滿三事則禁道不行能不犯者其禁大驗經曰若履城邑汙穢者當用此方竹葉十兩桃白皮四兩柳白皮四兩上三味以水一石二斗煮之一沸去滓浴身百穢消除又闢溫瘴瘡瘍此法天仙下游既返之日未嘗不用此方解穢也至於符水咒漱及外舍之近術皆不及此方若能常用此湯澡浴者益佳惟不可洗目也紫微王夫人敕水洗目得清淨法咒曰濁不穢形死不妨生摩掌蘇目三遍令我長生青龍在吾左白虎在吾右朱雀在吾前玄武在吾後神禁敕水除塵垢急急如律令一法解穢禁水曰東流之水滑如苔中有主君與三臺某甲汙穢蕩除急急如律令受禁法第二神仙經曰陽道強堅而易歇陰道微軟而久長聖人閉口萬物可藏回轉清白改易陰陽應言不言神明相傳應語不語神明相與故萬法閉口藏身之禁法流行五臟神明衆人遊戲而我獨住衆人浩浩而我獨靜衆人言說而我獨默此行禁之道異矣仙經曰凡受禁之法當先齊戒百日精心不行淫欲惟得清淨水浴著鮮淨衣口常不出惡言罵詈精思靜念勿生異想一如前章仍更七日之中閉口不共人語乃可受之正月一日三月三日五月五日七月七日九月九日三年之中三遍於此月日受之並一心持齊戒不犯則行禁其驗如神正月一日受法正月一日平旦寅時清淨澡漱在無人清淨之處著鮮淨衣不得令人輒見燒衆名香正面向東禹步三匝勿回轉長跪讀啓度文曰上啓三師神童玉女天醫慮醫一切諸師太上老君諸仙神王日月五星二十八宿北斗三臺諸神仙官屬諸大神王咸知弟子某甲受持符禁之法願濟拔衆生苦難除毒消邪闢卻奸惡萬事如敕急急如太上老君律令都受禁文曰想東方木禁在吾肝中想南方火禁在吾心中想西方金禁在吾肺中想北方水禁在吾腎中想中央土禁在吾脾中想左青龍右白虎前朱雀後玄武天師禁駕無事不苦東王公西王母道吾禁有隨當止急急如太上老君律令訖還誦所得禁文各三遍禮一十二拜仍更七日勿共人作一言及惡罵詈等語七日勿洗手三月三日受法三月三日平旦寅時至東流水上正面向東立端心正意讀前啓度文如正月法並啓江河四瀆一切水官四海大龍正願知弟子某甲受持禁法願大神王立契訖誦所得禁文各六遍禮九拜五月五日受法五月五日正中午時在靜處燒香正面向南立讀啓度文訖誦所得禁文各三遍禮十二拜七月七日受法七月七日雞鳴丑時在靜處燒香正面向西立讀啓度文訖誦所得禁文各三遍禮七拜九月九日受法九月九日人定亥時在靜處正面向北立盆盛水口銜刀讀啓度文投香火長跪誦所得禁文各三遍禮九拜此五日處法用一如正月法惟所向方及拜數不同耳太白仙人受法四月一日齊戒至八日立道場四面懸咒蓋燒香燃燈啓醮五方五帝五方禁師五方吞精啖毒夜義神王願知弟子某甲受持禁法咒訖誦所得禁文各三遍七日齊戒同力受禁法候初雷時舉目看電右手把刀以左手摩之咒曰助我行禁振聲如雷吼萬毒伏閉氣待雷聲盡訖七日齊戒不出言一本云候初雷時眼所見物隨便把取唱言聲如雷萬邪皆怖畏待雷聲盡乃棄之一云口銜刀手捉大斧摩之言口如毒手如毒聲如雷吼云云神仙王受禁法候燕初來時仰頭看之以手按地云口如毒以燕去不見乃止此等潔淨齊戒一如正月不別乃至七日不洗手天帝太一受禁法初受禁時在寂靜無人之處敷坐設案燒香正面向北閉口並足正立左手持刀依式思存青龍在左白虎在右朱雀在前玄武在後北斗七星覆頭上柄指前次思東治大禁師願持兵萬石趙候驃騎大將軍蘇平南公八部將軍七十二禁師陳師趙師直符小吏直日童子護直今日不得以左為右以前為後若有倒錯即依使者法律科罪之急急如律令如此陰念三遍然後禹步三匝至香水前叩齒三遍咒曰東方青龍銜水來南方赤龍銜水來西方白龍銜水來北方黑龍銜水來中央黃龍銜水來悉投杯水三臺三臺此水非常水洗除天穢地穢三十六穢某甲身穢淨除之急急如律令三遍咒訖以水洗目並噀四方上下余水自飲之洗腹內令淨想又讀前啓度文然後長跪誦所得禁文各三遍訖禮四方各再拜即成神驗刀子水盆不得用曾經酒肉五辛者又一法正月一日東方明星出時洗浴在清淨無人之處白茅為藉置坐設案燒香火井花水洗面目正面東向並足立先舉左手呼青龍次舉右手呼白虎前行呼朱雀後行呼玄武訖依前左手持刀次第思神師日符禁同法更無別法也若欲受符印者以帛若袋子盛掛著左手指句之而擎水盆閉氣禹步依法次第咒請有效也七星受咒法正月一日三月三日五月五日七月七日九月九日先以香湯洗浴取東流水未經用瓦器盛之以誦所得禁文咒一遍受人自洗浴於曠野無人之處以淨草為坐以瓦器盛水七盞作七星形北向云謹啓七聖真君弟子某乙願持禁法禁斷邪惡鬼毒之氣救理人民伏願降真氣流布臣身令臣所行符禁應聲除瘥應手除愈次第飲前件水各少許余洗手不得手捻不淨之物即有大驗一云七佛咒法下又有觀自存咒法今並不取黃帝越禁受法黃帝曰凡受符禁者皆清淨齊潔百日不得近死亡産乳房室三年之中三度正月一日三月三日五月五日七月七日九月九日以夜衆星之下置神座設案燒香盆盛水臨刀北面叩齒捻三師目次第思神訖禹步三匝長跪讀啓度文又誦所得禁文各三遍神驗水盆不得用曾盛酒肉五辛者臨欲越時朱書帛素上左手持之捻目陰誦咒之欲行禁時閉氣朱書帛素上右手持之捻目陰誦咒之雜受禁法第三正月一日日未出寅時三月三日寅時五月五日午時七月七日丑時九月九日寅時一云丑時正月受一年用三月受一春用五月受一夏用七月受一秋用九月受一冬用上年年常依此日受之法不得飲酒食肉五辛藝臺乳酪酥蜜心如藥王藥上願救護一切衆生不作艱難不求財物但作此心下口即瘥萬不失一受法用前月日先以清淨井花水沐浴上下衣服一切鮮淨清齊七日至其日先以井花水澡浴漱口燒香禮五方五帝各五拜訖正面向東燒香端立淨器盛井花水置傍誦所得禁文各二七遍訖口含水仰噀五方承取洗手面訖向東方吸青氣想入口中七吸次向南方吸赤氣次向西方吸白氣次向北方吸黑氣次吸中央黃氣皆作七吸入腹想訖更禮五方各五拜訖後作兩月持齊戒作得禁想不得作一切諸惡行受訖即成禁法器物不得用曾經盛酒肉五辛者受禁腫法古冢北桑樹陰內有艾者五月五日平旦日未出時從冢北向南步取五十四步至艾作禹步北斗七星訖還閉氣將取艾葉拭手使汁入手中七日勿洗手持齊過七日以外即成禁五十四步之中標記使分明一步七尺登取艾時面向西方咒願我此手一切癰腫一切諸毒乃至一切病手著即瘥作法訖還勿反顧受時以五月四日作齊標記步數亦四日使記先從艾東置魁因北向為尾向北五十四步作標記五日旦從北向南步之作法了齊至十一日上桑樹在冢北從地三尺於冢上生者佳亦於四日在冢東宿五日旦即作法禹步法閉氣握固若治病時作想此手作熱鐵又想前人病如雪手著病即散又治病時常在病人生氣上若病人頭面上有浮腫不得頓治使盡即傷人必當留少許明日更治北去大業六年琅邪郡宮縣令梁闊送擅持山善寂道場靈法師所行神驗不傳受禁瘧法候燕初來時以紙一張濃點筆於紙上望燕與點燕沒乃止後若瘧病人來向云我患瘧即語我與你治你但去陰押取一點塞壁孔中即愈又法正月元日呼牛馬時火下將筆閉氣多書紙上作鬼字氣盡乃止瘧病欲發時押取一鬼字與吞之即瘥受禁腫都禁法正月元日東方動時以淨席一領於寂靜無人之地以井花水沐浴漱口三遍手持香炷禮五方五帝君咒願曰弟子某甲今日受天神咒願救一切衆生苦四方各禮三拜訖想取東方青氣入口滿七咽南方赤氣西方白氣北方黑氣中央黃氣等各七咽訖向南東方閉氣誦咒各七遍七日持齊戒咒曰天之所圓地之所方受天神符可以長生二十八宿其色亭亭五色變化與符合並急急如律令次咒曰無根肉本生無留停大腫如山小腫如粟登高山臨海水旦起生向暮死急急如律令須紫檀把刀子以刀把按腫上其腫疼痛用前禁文若不疼痛用此禁禁之然此二禁皆是正禁腫文凡是惡腫皆用此二文其大腫日別四五度禁五日瘥小者當日瘥大總禁法咒曰朝日不良為物所傷上告天公下告地皇地皇夫人教我禁瘡仙人持水玉女持漿一唾止毒二唾止瘡三唾以後平復如常天雷馬鳴瘡亦不驚天雷地動瘡亦不恐皮相連肉相當不疼不痛不腫不膿急急如律令用法以刀子一枚先吸一口水捻鹽著口中和水噀病上若小兒驚恐當噀地上二三過快唾病上以口附近病上誦禁每一遍三唾每七遍一遍鹽水漱口三七遍成一禁也若不瘥多加遍數取瘥為限若百遍不瘥者此病大重不可救也慎勿與治禁時氣病法頭痛以刀隱痛處唾禁如前緣但有患疼痛處皆用刀背隱而禁之若金瘡從高墮下六畜狼虎毒蛇所傷手足卒攣躄凡百一切痛苦不如意處並用此法禁咒之悉得除愈不可具載男女並得受持論曰此之雜法由禁師不能具美大法所以須受輕法易者約者若受大法此亦不須禁法大例第四論曰用禁大例誦禁文必不得出聲令自耳聞聲若聞之咒即禁法不得行之無益慎之慎之受禁之時不得令人畜等一切見之見之即不成受法時刀及水盆皆不得曾經酒肉五辛用者神仙經曰對治禁萬病擊同類逢水難土王擊之逢土難木王擊之逢刀難陽精擊之逢鬼精桃湯擊之逢虎難五常氣擊之萬病擊同類對治皆持刀持桃持火持鑑持水持繩持藥持符持戟持弓持箭持駑持食持坐持粉持意持神持想持氣持書持石持土持鹽持幡持脂持肉持血持面持金持玉持印故其法皆禁擊之所須用禁之法有請有告有祭有害善神即飲食祭之住之惡鬼即克之卻之有殺有畏有愛有喜有惡有死有走有住有滅是故對治用時各各條例仙經曰用禁有六法一牙齒禁意存氣至牙齒二營目禁開一目閉一目三意想禁存意以去想諸疾以除四捻目禁謂手上有一十五日五氣道禁謂吹呼呵噓嘻呬六存神禁存諸神在以食醮祭之感天靈氣至又鳴天鼓叩齒是也凡為人請療疾出門三步咒曰天殺黃黃地殺正方千鬼萬神誰復敢藏飛步一及百鬼滅亡急急如律令若至主人家先當解穢即作五龍水法手持水碗咒曰東方青龍含水來南方赤龍含水來西方白龍含水來北方黑龍含水來中央黃龍含水來五方五龍吐水沒殺邪鬼急急如律令訖叩齒三百遍咒曰神水解天穢地穢生穢死穢人穢鬼穢身穢病人之穢速除去之立令清淨急急如律令三噓三叱以刀右攪三回以右足跟蹴地三下含水四方噴之及噴病人上盡令清潔然後按法思神行禁又存氣至牙齒令住閉一目存意已去即捻目然後用存七星在其頂上存青龍白虎朱雀玄武來護身存大神在其前後五星存之腹內吐氣存如雲擊彼處令如徐行行步法乾坤如此行按即外邪不入五臟神明自通仍皆須審之萬不失一又法欲向病人家當須存想作白虎吐火燒病人家屋舍皆令蕩盡又作龍舐病人身肉令盡還作充滿悅澤然後用氣急治之欲擊物一一皆如是此令行禁神明萬物皆神效驗須精審之若唾熱病以冷氣吹之二七然後禁之若唾冷病以熱氣呵之二七然後禁之三唾之後行禁禁後三唾乃放之仙經曰受符禁同法先當修身潔己安魂定魄口勿妄言潔齊百日可致神仙避逆惡氣除滅災祥可以長生掌訣法第五天師曰若欲修之先持齊戒一如正月法斷口味絶房室先取龍骨烏頭附子犀角各一兩以水三斗煮取二斗遍身澡浴有餘者明日更洗手面訖以盆盛水燒香禹步三匝口銜刀北面長跪讀前啓度文訖誦所得禁文各三遍一依正月戒忌即成神驗天師曰得吾法者上士升仙下士遷官庶人得之益壽延年父子兄弟不得相傳傳必賢人非賢勿傳殃及子孫又受禁法咒曰女口噙艾一日誦七遍七日止凡禁病大例禁一切病先須口嚼楊枝去口中穢氣訖又嚼鹽乃咒唾之若凡一切口味者即燒牛烘灰淋取汁飲漱服之此除腹中諸穢並作解穢符水法還得清淨此是掌訣解穢法也凡遊行人間有所犯穢者皆亦如之凡欲行禁者皆須先捻鬼目若與男禁捻左手目若與女禁即捻右手目一云男子行禁捻左手目女人行禁捻右手目並逐四時王相正面向月建正心定意閉氣三捻目左營目順天道即成禁法用之神效左營目者開左目閉右目右營目者開右目閉左目凡禁訖須解禁法假令禁虎須存作師子捻虎目若欲解之還存作虎一云男番捻右手虎目女番捻左手虎目若欲禁狗存作虎捻狗目若欲解之還存作狗以此為例觸類長之皆須仿此大指第一節是生人蛇虎頭若有惡人侵犯己身罵詈不止者緩即捻之急即閉氣押之左營目惡人即怒止也若不止則押喉向官府門亦如之一百步外預作之乃入官官見不瞋欲禁虎蛇亦依此法即虎蛇避人入草畏見人也大指第二節是生人蛇虎喉若惡人罵詈不止與人爭者閉氣捻之急即押之左營目令彼吃訥不能言也第二指第一節是蛇虎目治蛇虎瘡閉氣捻之己身及他人同若見蛇虎便捻之急即嗔怒而押之第二指第二節是鬼目欲見鬼去鬼擊鬼皆捻之急則閉氣押之左營目九氣則鬼神立至矣呼即去吸即來治病捻之第二指第三節是生人目欲藏身翳己與人鬥爭及在深山曠野皆須捻之以伏衆人之言急則閉氣押之左營目人不見己也第三指頭甲下是蜂蠍及百鳥飛蟲之目若人被蜂蠍蜇捻之七左營目五氣則解之若不瘥押蠍目及人天二道並捻掌心即瘥第三指第一節是地獄治鬼目若欲禁諸神不令來去閉目向王閉氣五十息捻之急即左營目押之第三指第二節下是天獄目欲禁鬼攝鬼卻鬼殺鬼皆向王閉氣捻之急則押之左營目若為鬼魅所著或惡夢魘押之第三指第三節是鼠目一名天地獄治鬼目若住鬼定鬼住神皆向王閉氣五十息捻之左營目第四指次甲下是蚊子蚤蝨之目欲除之閉氣捻之第四指第二節是都監目一名神都目都監者監領一切諸神都管一切諸鬼欲召鬼神問其意向王閉氣五十息捻之左營目鬼神立至矣第四指第三節是禁鬼目一名蛇胎欲行考鬼令鬼住鬼問鬼捻之閉氣若入山澤畏逢蛇蟒當押蛇胎令不來見人及已逢亦押之蛇口禁不得開第五指頭是天心欲求天神向王閉氣押之神自來奉賽大佳第五指第一節是遊師目第五指第二節是天師目第三節是三師目此皆是初學符禁法時向王閉氣捻之九十息左營目啓請即有神驗此皆是初學符禁法時向王閉氣捻之九十息左營目啓請即有神驗掌中一理是鬼道欲誅符破壙斷鬼魍魎惡氣伐神樹皆向月建閉氣五十息押之左營目神驗凡欲咒敕符皆須捻斷鬼道使鬼常敬之掌中一理一名鬼舍亦名地軸亦名左都監鬼道目欲誅符破廟除社公社地或召諸鬼神須有請問及治病並欲解鬼皆押左都監鬼道目鬼神立至若田野中浪宿押地軸令鬼賊及神皆不敢近人若入神屋止宿恐怕不安押鬼舍即不魘夢掌中一理斜文名食地食地上一紋名天紋下一紋名人道若入山澤畏逢虎狼向王閉氣押手虎口中即不來若已逢亦押之令虎狼閉口不開第四指第一節名左金堂若遠行求財押之萬倍第三指第一節名玉堂欲求官覓職押之必遂意第二指第一節亦名玉堂欲求官押之論曰此掌訣直用閉氣左營目捻之無咒文也禁病則皆須禹步誦禁文捻而用之急則瞋而押之緩則捻之禁男用左手禁女用右手禁手之用勿失左右也凡禹步法移步左右腳前後不同凡欲作法必先取二三光氣又禹步然後作法驗矣三光者日月星禹步者或三步七步九步不定若欲受三光氣者極晴明日向日兩腳並立先所願事隨意多少小咒之然後取禹步三步也所欲步時先舉頭看日光剩開口吸取日光明即閉口塞氣至三步始得放氣也三步者從立處兩過移兩腳始成一步三步即是六過移腳也向日光禹步時左腳先移右腳後移若向月星二光禹步時並右腳先移左腳在後也但步數不同耳若向星禹步時須滿九步也九步者向日中三步更足六步耳三三步合九步也星者即是北斗七星也星中最須殷勤所以須九步也於日月中或用三步或所用七步也咒願及閉氣方法並如日中作也受三光氣時日必須明亮好晴日也日是陽月與星是陰又左是陽右是陰是故受日氣時左腳先移受月星氣時右腳先移也又向星移步作九步時既長久若一氣不得度是以三步作一閉氣則九步即三過閉氣也咒願亦須三過願之又須識北斗下三臺星男識免獄厄女識免産厄問曰雖云兩過移兩腳成一步猶未可好其狀云何釋曰先兩腳正並立先舉左腳進前往次舉右腳就左腳處正齊並立此猶未一步次第二又先舉左腳進往次舉右腳就左腳住方始在一步也如此六過雙移兩腳成三步此是步法也禁鬼客懺氣第六咒曰吾上太山府謁拜皇老君交吾卻鬼語我神方上呼玉女收攝不祥登天左契佩戴印章頭戴華蓋足躡魁剛左呼六甲右呼六丁前皇神後越章神師誅罰不避豪強先斬小鬼後殺遊光何神敢住何鬼敢當一鬼不出斬付魁剛急急如律令一云吾上太山道逢東王父教吾殺鬼語我有神禁上帝王子捕收飛祥登天左契佩戴印章頭戴華蓋足蹈天罡先殺小鬼後殺遊光何神敢住何神敢當縛汝正身煮汝護湯三日一治五日一量門丞收縛皂君上章吾含天地之氣讀咒殺鬼之方唾天自裂唾地自缺唾山自崩唾水自竭唾癰自潰唾火自滅唾邪自走唾鬼自殺急急如律令又吾為天師祭酒為天地所使身佩乾靈之兵百千萬億在吾前後羅列左右何神敢住何鬼敢當正神當住邪鬼速去急急如律令又六甲六乙邪鬼自出六丙六丁邪鬼入冥六戊六己邪鬼自止六庚六辛邪鬼自分六壬六癸邪鬼自死急急如律令又神師所唾嚴如雪霜唾殺百鬼不避豪強當從十指自出前出封候後出斬頭急急如律令七遍咒之先咒水噴病人然後咒之欲東鬼然後下刀不瘥更咒看之手十指頭毛出若咒病人時當單被籠病人頭更遣兩人捉被單兩頭以遮前病人洗手莫拭合手胡跪然後咒之禁溫疫時行第七禁時氣溫疫病法一日十禁自防難為人施無限也天封吾以德地封吾以道吾奉天威取地武吾遇石石爛按症症散左達右貫貫骨達體追病所在何邪敢進進者斬死北斗七星飲汝血叱叱滅天下急急如律令禁時氣法亦禁水沐浴身體令淨法溫疫惡鬼九真行道邪氣敢當元氣洞達百邪消亡伏羲女媧五疽地主流入四肢主作千病萬病上氣虛寒皆以風邪鬼所為急按急按滅絶手下急急如律令便以左手書背後地因去勿反顧禁疫鬼文吾上知天文下知地理天地夫人教吾禁名能禁疫鬼汝從東來名曰狗入人身中倚於心口神師咒汝汝自走汝從南來名曰羊入人身中倚於肝腸神師咒汝汝自亡汝從西來名曰雞入人身中倚於皮神師咒汝汝自衰汝從北來名曰蛇入人身中倚於百脈神師咒汝汝自厄科斗七枚在吾目前口是天門不得枉開若唾東方甲乙木木折若唾南方丙丁火火滅若唾西方庚辛金金缺若唾北方壬癸水水竭若唾中央戊己土土裂六甲六乙疫鬼自出六丙六丁知鬼姓名六戊六己疫鬼自死六庚六辛知鬼東西六壬六癸疫鬼自死六亥六戌百鬼速出急急如律令禁時氣溫疫法東方青溫吾肝中之氣南方赤溫吾心中之氣西方白溫吾肺中之氣北方黑溫吾腎中之氣中央黃溫吾脾中之氣五方五溫悉在吾身中不得動作即歸在實急急如律令度惡世禁法東方青帝甲乙君南方赤帝丙丁君西方白帝庚辛君北方黑帝壬癸君中央黃帝戊己君千乘萬騎護衛吾身前有萬石桃湯後有萬隊將軍主斬黃奴之鬼欲行我者吾祭酒父長甲母奇仲語我吾萬厄之中不近我急急如律令一日十念度惡世也禁時氣卻疫法一日十念萬惡不近人也吾是天師祭酒當為天師驅使頭戴日月北斗七星吾有乾靈之兵十萬人從吾左右前後吾有太上老君天地父母在吾身中左手持節右手持幢何鬼不役何神不走何邪不去何鬼敢往急急如律令禁時氣溫疫法吾頭戴朱雀足履玄武左挾青龍右挾白虎前有萬石鑊湯後有虎賁猛士天驅甲卒在吾前後黃奴之鬼去我萬里急急如律令又禁溫疫法存青龍白虎朱雀玄武逐後禁之咄汝黃奴老古知吾否吾初學道出於東方千城萬仞上紫宮靈鋼百鍊之劍利如鋒芒斬殺凶咎梟截不祥叱汝黃奴老古先出有禮後出斬你叱叱急急如律令唾時行頭痛法南越太公還故鄉壬申之唾自有方神師所唾上白太一皇天使者督察不祥威若山海唾若雪霜當吾者死值吾者亡妖精魍魎自受其殃急急如律令敕水逐鬼法習習詳詳便生水光直符使者住立水傍真正補虛邪氣消亡吾左手捉鬼右手持鉞斧斬鬼死急急如律令禁唾惡鬼法禁住亦得吾從狼毒山中來飢食真珠渴飲武都戎鹽一把冷水一盂口含五毒常與唾居但老君之唾唾殺飛鳥唾河則竭唾木則折唾左徹右唾表徹里銅牙鐵齒嚼鬼兩耳速去千里不得留止急急如律令禁病敕粉大法禁住亦得粉在紙中為神粉舉手以摩體百鬼走出精魅魍魎應聲散走出天皇老教我唾粉腹中跳踉五臟安穩録保三氣道保精神急急如律令禁溫鬼法天門亭長外都使欲得九鄉縛鬼士非子法住左手持刀右手持斧斫黃奴溫度之鬼何不走去前出封候後出斫頭急急如律令禁瘧病第八咒瘧鬼法登高山望海水水中有一龍三頭九尾不食諸物惟食瘧鬼朝食三千暮食八百食之不足差使來索符藥入五臟瘧鬼須屏跡不伏去者縛送與河伯急急如律令一云登高山望海水天公下捕瘧鬼咄汝不疾去吾家有貴客子各破頭如東山軀如東澤不食五穀但食百鬼朝食三千暮食八百一食未足摧捉來索急急如律令禁瘧病法連年不瘥治之即愈若治之須在淨處平地以手小指畫地作鬼字口中陰道病人生時年月日姓名以磚覆之勿令知之至三七日不開永瘥如三七日內開其病還復發若治必須知發時逆前預治勿使患人知之大良若丈夫左手畫之女人右手畫之陰為之勿使人知靜作大驗禁瘧病法唾瘧鬼翁字園一作周母字欲大兒羸長矣小兒如石大女杹甑炊小女魯子因玉道將軍取瘧鬼不得留停速出速去不得停住急急如律令禁瘧鬼法南山一神字銅柱出門入戶口有語捉得瘧鬼大鑊煮南山一神字長丘早起至門繞家遊捉得瘧鬼斬卻頭南山一神字辟邪銅作髑髏鐵頷車斧鑿作齒金鋼作牙生吞瘧鬼三萬車北斗七星知汝姓字不得住家急急如律令禁瘧鬼法登高山望海水使螳螂捕瘧鬼朝時來暮時死暮時來朝時死捕之不得與同罪急急如律令禁瘧鬼法將狗上山下使入海中有一蟲不食五穀只食瘧鬼朝食三千暮食八百一食不足下符更索速出速去可得無殃急急如律令禁瘧鬼法日正中時正南立取西北桃枝結項兩手腳灰繞三匝中心立刀曰頭上戴九天兩手把九弓兩腳履九江腹安四神皆出自然吾生食天育養四神上得精禁能轉人身蜈蚣蟒蛇只殺汝身並鬼子孫急急如律令禁瘧鬼法先取一平磚令病人在無人處不得見人大從月建向月破以磚磨地令平以手按磚四角使不動還以手發磚立在前可磚下書北斗傍置三臺外盡孤虛直取旬孤虛其北斗中畫作小鬼患人姓名年幾置下在斗柄中咒曰小鬼字某甲年若干你從臺入鬥瘧鬼斷後若患人時頭上先下若非愚人時頭下先下若無逆順平下磚訖若患人日一發以手二七下打磚若隔日發三七下打磚三日一發以上四七下打磚訖取磚傍土擁磚即復左手取一把土散磚上而上慎勿反顧大驗又以故筆畫六尺方中畫作北斗形皆以北斗相應其魁衡必令開門以身左行向斗魁閉氣並足俱前而立咒曰小鬼吾令出天門入地戶不得從我去住遂出建上之門急去不得反顧即瘥三七日不發與人治患還得此患必用此治欲令患人還發二七日內發之法還取患人發以足蹴磚咒曰小鬼爾從鬥入臺瘧疾還回即發咒禁瘧鬼法書桃枝一尺欲發即用噀病人面誦咒文二七遍系著頭底天姓張地姓皇星月字長日字紫光南山有地地中有蟲赤頭黃尾不食五穀只食瘧鬼朝食三千暮食八百少一不足下符請索語你速去即得無殃汝若不去縛送魁剛急急如律令禁瘡腫第九咒曰先奄腫上閉右目左目營之三匝然後唾之三乘車四獄吏載癰神棄都市登高山臨海水呂河伯捕癰鬼大腫如斗小腫如粟吾唾一腫百腫屏跡唾汝三七毒自出急急如律令禁唾癰法禁唾一遍一度刀割一二三四五六七皆陰向陽吾朝晨行女媧相逢教我唾癰從甲至乙癰疽速去從乙至丁癰疽不生從丁至癸癰疽皆死青癰赤癰白癰黑癰黃癰血疽肉疽兄弟八人吾皆知汝姓名徒忍割汝汝須急去急急如律令禁癰腫法正面向東以手把刀按其邊令匝以墨點頭重重圍訖然後急唾之即愈日出東方乍赤乍黃牽牛織女教我唾方若是癰應鉀空若是座應鉀碎若是癤應鉀滅若是腫應鉀壟不疼不痛速去速去急急如律令又法取東壁土三丸向井東置一丸三咒曰赫赫洞洞日出東方上有崑崙之山下有清冷之泉某甲患某處上有發癰土入井中天公當爛石癰當散七星北斗光織女教我方唾汝急出不得留藏急急如律令又噓三七遍置土井中三九三禁三噓之也禁五毒法禁蛇亦得吸東方青毒南方赤毒西方白毒北方黑毒中央黃毒天毒地毒水毒火毒霧毒塵毒死生毒百毒之精知汝姓名天毒上升地毒下藏百毒之精知汝姓名天毒上升地毒下藏百毒止息五毒滅亡惡毒須出毒腦破毒腹出毒腸止不止不已拘汝牙折汝齒吸吸叱叱急急如律令禁腫法三七遍骨肉皮膚血氣空虛遠入江海急去無留大腫如山小腫如粟唾一腫千腫滅急急如律令滅一作死禁腫法七重右回一氣朱書皆以右手封之指七過周於五指右手持禁如法咒封山山法封石石爛封湖湖決封火火滅上白東王公西王母教我神方白刃封汝大腫如山小腫如米封一腫萬腫死急急如律令先以手按之久令痛次以金刀按之四邊令散以氣七呵令熱然後急氣七吹令冷陰陽氣定然後卻唾之禁天下大腫法別室中以木屐相背令以繩系定上安一拼一禁一打拼令沒以三七遍東方青帝攝青精之毒氣南方赤帝攝赤精之毒氣西方白帝攝白精之毒氣北方黑帝攝黑精之毒氣中央黃帝攝黃精之毒氣五方毒氣開及五精納吾腹中天下最尊者莫大於五帝天下最神者莫及於五精天下大惡者莫過於五毒吾舍五帝五精五毒與禁共居其聲如雷禁如風霜經口即死逢禁即亡吾禁東方木木折禁南方火火滅禁西方金金缺禁北方水水竭吾上禁飛鳥落下下禁井泉枯竭吾禁一腫百腫滅吾禁盤石開深澗契天架摧地柱折曉停光夜星滅冬變雨夏積雪冷腫熱腫速消滅急急如律令禁水腫方咒曰天陽在上人陽在中陰陽在地水從下流唾腫消化急急如律令太白仙人禁腫法先向王方三噓三吹以刀約之以手握之訖然後三噀之禁曰日出東方雷起西南蝦蟆白兔食月中心營月帶日無所不通大腫如山小腫如珠吾唾二腫百腫自除急急如律令又法一二三四五六七百腫皆疾出急急如律令又法日出東方如懸鼓似白虎吾能唾腫散唾毒爛急急如律令又法東方青帝禁駕青毒南方赤帝禁駕赤毒西方白帝禁駕白毒北方黑帝禁駕黑毒中央黃帝禁駕黃毒吾有苦口唾十瘥九急急如律令禁一切腫法咒曰吾口如天雷唾山崩唾木折唾金缺唾水竭唾火滅唾鬼殺唾腫滅池中大魚化為鱉雷起西南不聞音大腫如山小腫如氣浮游如米吾唾一腫百腫皆死急急如律令禁癰腫法先叩齒三七遍急噀左營目即唾咒曰雷起地中一聽其音月生東盛蟾蜍白兔食月中心榮衛不通結成癰大腫如山小腫如粟唾咒一腫百腫散死急急如律令又法日出東方赫赫煌煌威威容容天門亭長來捕癰腫山多石海多龍天門亭長來捕摩得便斬殺莫聞羅一唾當心再唾都愈急急如律令禁疔瘡法一云初得之時逆以禁即除俞當三七遍唾之訖咒曰日出東方乍赤乍黃天上織女教我唾方瘡公疔母元出南方疔公死疔母亡北斗真氣能治疔瘡吾口如天門不可枉張唾山崩唾石裂唾金缺唾火滅唾水竭急急如律令禁疔瘡法用水一碗置棗樹南令搏樹以刀子一枚安碗上刀向樹三指漫撮臨著刀刃上胡跪咒曰上啓伏奴將軍伏奴將軍能治疔瘡今是某年月日姓字某甲年若干患某處生疔瘡或是浮漚疔或是麻子疔或是雄疔或是雌疔或是羊角疔或是蛇眼疔或是爛疔或是三十六疔或是驅失瘡或是水洗瘡或是刀鐮瘡三頭著體於人不量清淨七寸棗樹下之水洗之伏藏急急如律令禁疔瘡法先閉氣三遍叩齒三十六遍閉氣禁之三七遍即瘥東海大神三女郎療疔有神方以藥塗此瘡必使丁公死丁母亡丁男丁女自受殃星滅即愈大吉良過時不去拔送北方急急如律令一云東海大神三女郎三萬細米簸去糠三稱行捶灸疔瘡云云禁喉痹第十吸喉痹父喉痹母喉痹婦喉痹孫天生汝時緣上百草露誰使汝著人喉里拘汝牙折汝齒破汝頭破汝脅神不得動不得留停北斗知汝名汲汲急急如律令又法吸日出陽陽吸為喉痹腫毒所傷莫癰莫痛吸吸愈急急如律令禁牙齒法用桃板長一尺二寸正面南向閉氣書曰某州某縣鄉里女某甲年若干患口中左右若干齒痛三讀訖埋三路頭以石子蓋之勿反顧南山有一蟲名赤松子不食五穀但食口中齒埋汝三路頭塞汝用石子埋汝著樹東千年萬歲不得起急急如律令又禁牙齒法用一枚杖長三握復取兩指團艾三柱灸杖頭止柱牙上咒曰登高水望海水中有一蟲黃頭赤尾不食五穀專食牙齒吾欲治之握兩指神灸三壯蟲死矣急急如律令禁哽法南山大虎北山狐貍江中大獺海中鸕鷀共來食哽速消除橫者即入順者即出急急如律令又禁哽法四海蕩蕩滑如苔上五虎四獺三鸕鷀共來食哽速消除橫者即入順者即出急急如律令禁目痛法以呵之三七遍然後禁之日出東方赤如紫陽兒子目痛父母心傷吾口一唾明見四方百藥千治不如吾湯若唾唾汝汝眼毒消亡急急如律令禁目痛法神師所唾自有方日出東方右陰左陽瞳子生肉瞻視無光吾能誅罰不避鑊湯唾目二遍還復故常大吉神師西嶽靈方急急如律令咒禁産運第十一取蒜七瓣正月一日正面向東令婦人念之一遍夫亦誦一遍次第丈夫吞蒜一瓣吞麻子七枚便止丈夫正面向東行誦滿七遍不得見穢惡受持之法不用見尸喪見即無驗吾躡天剛遊九州聞汝産難故來求斬殺不祥衆喜投母子長生相見面不得久停留急急如律令唾運鬼法丈夫從婦人口中受取婦人從男夫口中受取天無梁地無柱五騎三龍使九虎押運鬼汝身長少許或在人心肝或在人心肺或在人心膂吾受東海王禁故來追捉汝急急如律令禁運鬼法先禹步三匝左手持刀右手持水努目急氣然後禁之噴之曰唾東方青運鬼字青姬年七十南方赤運鬼字赤姬年六十西方白運鬼字白姬年五十北方黑運鬼字黑姬年四十中央黃運鬼字黃炬年三十唾天皇地皇六律九章是公運子之鬼未嫁之女頭亂如産腹脹如莒克害忠良唾汝急出不得留藏汝若不去吾遣張丞伯捉汝縛送鑊湯急急如律令一云運子之鬼未嫁之女頭亂如筐腹脹如莒但行人間不見運女唾之還本主速出速出更不見汝張丞伯王問驅殺運鬼數萬千速斷因緣東唾無辜惡見運來相呼南唾無極惡見運鬼來相逼唾三寸刀二寸刃先治反支卻治運唾太山東門一把葦舉高十丈治運鬼初來如闢蜂不著余處當眉聚一杯水唾運去須臾不去當自死急急如律令禁産難方先禁水一杯與服之乃禁曰天有餘陽地有五行星辰列布日月精明四時變化不失其常骨肉已成四體已強毛髮已就今是生時生遲何望河伯在門司命在庭日月已滿何不早生若男若女司命須汝促出無遲並持胞衣急急如律令
