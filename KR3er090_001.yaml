body:
  text: 卷第一藥録纂要採藥時節第一論曰夫藥採取不知時節不以陰乾曝乾雖有藥名終無藥實故不依時採取與朽木不殊虛廢人功卒無裨益其法雖具大經學者尋覽造次難得是以甄別即日可知耳葳蕤立春後採陰乾菊花正月採根三月採葉五月採莖九月採花十一月採實皆陰乾白英春採葉夏採莖秋採花冬採根絡石正月採飛廉正月採根七八月採花陰乾藁本正月二月採曝三十日成通草正月採陰乾女菀正月二月採陰乾烏頭烏喙正月二月採春採為烏頭冬採為附子八月上旬採根陰乾蒴藋春夏採葉秋冬採莖根柏葉四時各依方面採陰乾枸杞春夏採葉秋採莖實冬採根陰乾茗春採桃梟正月採天門冬二月三月七月八月採曝麥門冬二月三月八月十月採陰乾術二月三月八月九月採曝黃精二月採陰乾乾地黃二月八月採陰乾薯蕷二月八月採曝甘草二月八月採曝乾十日成人參二月四月八月上旬採曝乾無令見風牛膝二月八月十月採陰乾細辛二月八月採陰乾獨活二月八月採曝升麻二月八月採日乾柴胡二月八月採曝龍膽二月八月十一月十二月採陰乾巴戟天二月八月採陰乾白蒿二月採防風二月十月採曝黃連二月八月採沙參二月八月採曝王不留行二月八月採黃耆二月十月採陰乾杜若二月八月採曝茜根二月三月採曝當歸二月八月採陰乾秦艽二月八月採曝芍藥二月八月採曝前胡二月八月採曝知母二月八月採曝栝蔞二月八月採根曝三十日成石龍芮五月五日採子二月八月採皮陰石葦二月採陰乾狗脊二月八月採曝萆薢二月八月採曝菝葜二月八月採曝白芷二月八月採曝紫菀二月三月採陰乾百合二月八月採曝牡丹二月八月採陰乾防己二月八月採陰乾地榆二月八月採曝莎草根二月八月採大黃二月八月採火干桔梗二月八月採曝甘遂二月採陰乾赭魁二月採天雄二月採陰乾貫衆一月八月採陰乾虎掌二月八月採陰乾白蘞二月八月採曝羊桃一月採陰乾狼毒二月八月採陰乾鬼臼二月八月採茯苓茯神二月八月採陰乾桂二月八月十月採陰乾杜仲二月五月六月九月採商陸二月八月採曬乾丁香二月八月採榆皮二月採皮曝乾八月採實豬苓二月八月採陰乾秦皮二月八月採陰乾石楠二月四月採葉八月採實陰乾藍葉二月三月採曝本草無赤箭三月四月八月採曝防葵三月三日採曝芎藭三月四月採曝徐長卿三月採黃芩三月三日採陰乾大青三月四月採陰乾玄參三月四月採曝苦參三月八月十月採曝杜蘅三月三日採曝紫草三月採陰乾白薇三月三日採陰乾紫參三月採火干澤蘭三月三日採陰乾王瓜三月採陰乾垣衣三月三日採陰乾艾葉三月三日採曝水萍三月採曝芫花三月三日採陰乾澤漆三月三日七月七日採陰乾藜蘆三月採陰乾羊躑躅三月採陰乾茵芋三月三日採陰乾射干三月三日採陰乾青葙子三月採莖葉陰乾五月六月採子紫葛三月八月採曬乾白附子三月採桑上寄生三月三日採陰乾厚朴二月九月十月採陰乾蕪荑三月採陰乾黃環三月採陰乾烏芋三月三日採曝桃花三月三日採陰乾苦菜三月三日採陰乾遠志四月採陰乾菥蓂子四月五月採曝景天四月四日七月七日採陰乾蒲黃四月採蘭草四月五月採蘼蕪四月五月採曝白頭翁四月採夏枯草四月採溲疏四月採鼠尾草四月採葉七月採花陰乾菖蒲五月十二月採陰乾卷柏五月七月採陰乾澤瀉五月六月八月採陰乾葉五月採實九月採車前子五月五日採陰乾茺蔚子五月採石龍芻五月七日採曝丹參五月採曝天名精五月採肉蓯蓉五月五日採陰乾蛇床子五月採陰乾茵陳蒿五月及立秋採陰乾旋花五月採陰乾葛根五月採曝酸漿五月採陰乾蠡實五月採陰乾大小薊五月採葒草五月採實旋覆花五月採曬乾鳶尾五月採半夏五月八月採曝莨菪子五月採蜀漆五月採陰乾䕡茹五月採陰乾萹蓄五月採陰乾生漆夏至後採蕤核五月六月採曬乾松蘿五月採陰乾五加皮五月七月採莖十月採根陰乾莽草五月採陰乾郁李根五月六月採攣華五月採覆盆子五月採梅實五月採火干杏核仁五月採蘩蔞五月五日採葫五月五日採蒜五月五日採青蘘五月採本草無紫芝六月八月採茅根六月採蕘花六月採陰乾昨夜何草夏採曬乾松脂六月採五木耳六月採曝乾石斛七月八月採陰乾蒺藜子七月八月採曝續斷七月八月採陰乾薇銜七月採麻黃立秋採陰乾瞿麥立秋採陰乾海藻七月七日採曝陸英立秋採菌桂立秋採槐實七月七日十月巳日採桃核仁七月採陰乾瓜蒂七月七日採陰乾水蘇七月採麻蕡七月七日採腐婢七月採陰乾蓍實八月九月採曬乾薏苡仁八月採實根無時地膚子八月十月採陰乾漏蘆八月採陰乾營實八月九月採陰乾五味子八月採陰乾敗醬八月採恆山八月採陰乾牙子八月採曝蛇含八月採陰乾雚菌八月採陰乾連翹八月採陰乾屋遊八月九月採女青八月採陰乾牡荊實八月九月採陰乾酸棗八月採陰乾楮實八月九月採曬乾秦椒八月九月採衛矛八月採陰乾巴豆八月採陰乾蜀椒八月採陰乾雷丸八月採曝大棗八月採曝藕實八月採雞頭實八月採白瓜子八月採菟絲子九月採曝藎草九月十月採乾薑九月採松實九月採陰乾辛夷九月採曝枳實九月十月採陰乾山茱萸九月十月採陰乾吳茱萸九月九日採陰乾梔子九月採曝皂莢九月十月採陰乾栗九月採荏九月採陰乾麻子九月採大豆九月採菴䕡子十月採決明子十月十日採陰乾百日雲實十月採曝貝母十月採曝女貞立冬採橘柚十月採款冬花十一月採陰乾棘刺冬至後一百二十日採莧實十一月採忍冬十二月採陰乾大戟十二月採陰乾木蘭十二月採陰乾冬葵子十二月採白蘚四月五月採陰乾葶藶立夏後採陰乾論曰凡藥皆須採之有時日陰乾曝乾則有氣力若不依時採之則與凡草不別徒棄功用終無益也學者當要及時採掇以供所用耳藥名第二論曰有天竺大醫者耆婆云天下物類皆是靈藥萬物之中無一物而非藥者斯乃大醫也故神農本草舉其大綱未盡其理亦猶咎由創律但述五刑豈卒其事且令後學者因韋典法觸類長之無窮竭則神農之意從可知矣所以述録藥名品欲令學徒知無物之非藥耳玉泉玉屑丹砂空青緑青曾青白青扁青石膽雲母朴硝硝石芒硝滑石石鐘乳紫石英礬石馬齒礬絳礬黃礬青礬白石英五石脂太一餘糧紫禹餘糧石中黃子禹餘糧黃禹餘糧金屑銀屑水銀汞粉附雄黃雌黃殷孽孔公孽石腦石硫黃熏黃陽起石凝水石石膏磁石玄石理石長石膚青石黛鐵落生鐵鐵鋼鐵鐵精鐵漿食鹽光明鹽緑鹽蜜陀僧桃花石珊瑚石花乳床青琅玕礜石特生礜石握雪礜石方解石蒼石土殷孽代赭滷鹼大鹽戎鹽青鹽赤鹽白堊鉛丹錫粉錫銅鏡鼻銅弩牙金牙石灰冬灰炭鍛灶灰伏龍肝東壁土半天河地漿硇砂姜石赤銅屑銅礦石銅青白瓷瓦屑烏古瓦石燕梁上塵不灰木青芝赤芝黃芝白芝黑芝紫芝赤箭天門冬麥門冬術女萎葳蕤黃精乾地黃菖蒲遠志小草澤瀉葉實附薯蕷菊花甘草人參石斛牛膝卷柏細辛獨活升麻柴胡防葵蓍實菴䕡子薏苡仁車前子葉附菥蓂子茺蔚子木香龍膽菟絲子巴戟天白英白蒿肉蓯蓉地膚子忍冬蒺藜子防風葉附石龍芻絡石千歲虆黃連沙參丹參藍實景天天名精王不留行蒲黃蘭草決明子芎藭香蒲蒲根附蘼蕪續斷雲實黃耆徐長卿杜若蛇床子茵陳蒿漏蘆茜根飛廉營實薔薇根薇銜五味子旋花白菟藿鬼督郵白花藤當歸秦艽黃芩芍藥藁本實附乾薑生薑附麻黃根子附葛根汁葉花附前胡知母大青貝母栝蔞實莖葉附玄參苦參石龍芮石葦狗脊萆薢菝葜通草瞿麥敗醬白芷杜衡紫草紫菀白蘚皮白薇葈耳茅根百合酸漿王參女萎淫羊藿蠡實花葉附款冬花牡丹防己女苑澤蘭地榆王孫爵床白前百部根王瓜薺苨高良薑馬先蒿蜀羊泉積雪草惡實莎草大小薊垣衣艾葉水萍海藻昆布葒草陟釐蔛草鳧葵井中苔萍藍附鱧腸蒟醬百脈根蘿摩子白藥蘹香子鬱金薑黃百兩金阿魏大黃桔梗甘遂葶藶芫花澤漆大戟蕘花旋覆花鉤吻藜蘆赭魁及己天雄烏頭附射罔烏喙附子側子羊躑躅茵芋射干鳶尾貫衆花附半夏由跋虎掌莨菪子蜀漆恆山青葙子牙子白蘞白芨蛇含草蒿雚菌連翹白頭翁䕡茹苦芺羊桃羊蹄鹿藿牛扁陸英蒴藋藎草夏枯草烏韭蚤休虎杖石長生鼠尾草馬鞭草馬勃松脂實葉根節花等附蛇莓苧根菰根狼踆子弓弩弦敗天公敗蒲席敗船茹屋遊赤地利赤車使者三白草牽牛子豬膏母劉寄奴草紫葛萆麻子葎草格注草獨行根狗舌草烏蘞莓豨蘞狼毒鬼臼蘆根甘蕉根萹蓄酸漿草莔實蒲公草商陸女青水蓼角蒿白附子鶴蝨魚網馬絆繩昨夜何草破扇破故紙甑帶灰鬼蓋屐屧鼻繩雀麥茯苓茯神附琥珀玉附柏實葉皮等附麻布叩幅頭菌桂牡桂桂杜仲故麻鞋底楓香脂皮附乾漆生漆附蔓荊實牡荊女貞實蕤核五加皮沉香薰陸香雞舌香藿香詹糖香楓香等附丁香柏木根附辛夷木蘭桑上寄生榆皮花附酸棗槐實枝皮等附枸杞楮實葉皮莖白汁附蘇合香龍眼厚朴豬苓竹葉根汁實瀝皮茹筍附枳實刺茹附山茱萸吳茱萸根附秦皮梔子檳榔合歡秦椒衛矛紫葳蕪荑食茱萸椋子木折傷木每始王木茗苦荼蜀桑根松蘿桑根白皮葉耳五木耳桑灰等附白棘安息香龍腦菴摩勒棘刺花實棗針附毗梨勒紫𨥥麒麟竭胡桐淚黃環石楠實附巴豆蜀椒莽草郁李仁根附鼠李攣華杉材楠材釣樟根皮棐實蔓椒雷丸溲疏櫸樹皮白楊皮水楊葉欒荊小柏莢蒾釣藤藥實根皂莢楝實根附柳華葉實汁附桐葉花附梓白皮蘇方木接骨木枳椇木天蓼烏臼木赤瓜木訶梨勒楓柳皮賣子木大空紫真檀胡椒椿木葉樗木附橡實無食子楊櫨木槲若鹽膚子紫荊發皮亂髮人乳汁頭垢尿溺龍骨白龍骨齒角等附牛黃麝香象牙齒睛等附馬乳牛乳羊乳酥熊脂膽附白膠阿膠醍醐底野迦酪犀角羚羊角鹿茸羖羊角髓肺骨肉齒骨頭血肚脂靨蹄屎附牛角䚡髓膽腎心肝齒眼尾脂肉喉嚨口中毛耳中垢屎溺屎中豆等附獐骨肉髓等附豹肉狼牙貍骨肉陰莖等附虎骨膏爪肉尾等附兔頭骨腦肝肉等附筆頭灰六畜毛蹄甲鼺鼠麋脂角附豚卵蹄心腎膽肚肺毛筋齒膏肉耳中垢等附鼴鼠獺肝肉屎附狐陰莖五臟腸屎等附貒膏肉胞等附野豬黃驢屎屎乳軸垢等附豺皮野駝脂敗鼓皮白馬莖頭蹄齒心肝肺肉骨鬐膏鬐毛溺通乳汁屎中粟等附狗陰莖腹心腦齒血肉糞中骨等附丹雄雞白雄雞黃雄雞脂烏雄雞肉膽心血冠血肪肝屎白腸肶胵里黃及左右翹毛黑雌雞黃雌雞雞子卵中白皮雞喙東門上雞頭等附白鵝膏毛肉子等附鶩肪雁肪鷓鴣雉肉喉下白毛附鷹屎白脂雕屎附鸛骨雄鵲鴝鵒燕屎雀卵腦頭血屎附伏翼天鼠屎孔雀鸕鷀屎頭附鴟頭石蜜蜜蠟白蠟附牡蠣桑螵蛸蜂子黃蜂土蜂附海蛤文蛤魁蛤石決明真珠秦龜龜甲蠡魚鮑魚鯉魚膽肉骨附鮧魚鱔魚血附鯽魚黃魚膽蝟皮石龍子露蜂房樗雞蚱蟬白殭蠶木虻蜚虻蜚蠊䗪蟲蠐螬蛞蝓蝸牛水蛭水馬鱉甲肉附鮀魚甲肉附蟹爪附螈蠶蛾屎附蠶子紙烏賊魚骨鰻鱺魚鮫魚皮紫貝蝦蟆蛙牡鼠肉糞附蚺蛇膽肉附蝮蛇膽肉附陵鯉甲蜘蛛蜻蛉石蠶蛇蛻蛇黃烏蛇蜈蚣馬陸蠮螉雀甕鼠婦螢火衣魚螻蛄蜣螂白頸蚯蚓斑蝥芫青地膽馬刀葛上亭長貝子甲香珂田中螺汁豆蔻葡萄蓬虆覆盆子大棗生棗及葉附藕實莖雞頭實芰實