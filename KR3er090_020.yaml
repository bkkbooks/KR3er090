body:
  text: 卷第二十雜病下備急第一方二十七首論一首阿魏藥主一切尸疰惡氣療人有親近死尸惡氣入腹終身不愈遂至死亡醫所不療亦主一切疰神效方阿魏藥三兩碎之如麻子大上一味以餛飩麵裹半兩熟煮吞之日三服之服滿二七日永瘥忌五辛油麵生冷酢滑以酒服之即瘥玉壺方主萬病皆用之雄黃二兩八角附子二兩炮藜蘆二兩丹砂二兩礜石二兩燒巴豆仁二兩去皮上六味以王相日童子齊戒天晴明時合先搗巴豆三千杵次納礜石又三千杵次納藜蘆又三千杵次納雄黃又三千杵次納丹砂又三千杵次納附子又三千杵次納白蜜又三千杵訖更治萬杵佳無丹砂用真朱四兩代之每納藥即下少蜜恐藥飛揚盛密器中封之勿瀉氣安清淨處大人丸如小豆許服藥下病者宿勿食旦服二丸不知者暖粥飲發之在膈上者吐膈下者利或但噫氣而已即愈一切萬病量之不過一丸二丸莫不悉愈必以王相天晴明日合之大有神驗若非此日合之極不中用徒事苦耳倉公散主萬病方礬石燒皂莢炙去皮子雄黃研藜蘆熬上四味等分為散主猝鬼打鬼排鬼刺心腹痛吐下血便死不知人及臥魘齧腳踵不覺者諸惡毒氣病取藥如大豆納竹管中吹鼻得嚏則氣通便活未嚏更吹之以嚏為度備急方主暴病脹滿方大黃乾薑巴豆去皮心熬上三味等分先搗大黃乾薑下篩研巴豆如脂納散中合搗一千杵即用之蜜和為丸亦佳密器貯之勿令歇主心腹暴病若中惡客忤心腹脹滿刺痛口噤氣急停尸卒死者以水若酒服大豆許三四枚捧頭起令得下喉須臾不瘥更服三枚腹中轉鳴得吐利即瘥千金丸主百鬼病風注夢與鬼神交通邪病腹脹惡腫氣卒中忤方礜石二兩燒附子二兩炮去皮雄黃二兩真朱二兩巴豆仁二兩藜蘆二兩蜈蚣二枚炙麝香半兩犀角三分上九味搗三千杵每一服二丸如小豆不知至三丸五更一點服至日中解解乃食白米粥忌熱食酒肉五辛一切皆忌之真珠附著散主諸風鬼注毒氣貓鬼所著方真珠雄黃丹砂各半兩乾薑一兩蜈蚣一枚炙桂心一兩天雄半兩炮莽草半兩細辛一兩蜀椒半兩汗去目閉口者上一十味為散酒服方寸匕日再大附著散主一切蜚尸鬼注風痹百處痛如針刀刺痛嘔逆澼飲五勞七傷萬病方附子七分炮去皮烏頭七分炮去皮蜈蚣二枚炙芫菁八分雄黃七分硃砂七分乾薑七分細辛七分蜥蜴二枚人參七分莽草七分鬼臼七分上一十二味搗散酒服半錢匕日再太一神明陷冰丸主諸病破積聚心下脹滿寒熱鬼疰長病咳逆唾噫闢除衆惡殺鬼逐邪氣鬼擊客忤中惡胸中結氣咽中閉塞有進有退繞臍絞痛惻惻隨上下按之挑手心中慍慍如有蟲狀毒疰相染滅門方雄黃二兩芫菁五枚桂心二兩真珠一兩半麝香一兩附子一兩半炮去皮烏頭八枚炮去皮犀角一兩鬼臼一兩巴豆仁一分蜈蚣一枚炙人參一兩杏仁三十枚去尖皮兩仁熬射罔一兩丹砂二兩蜥蜴一枚斑蝥七枚去翅足熬當歸二兩藜蘆一兩大黃二兩礜石二兩燒樗雞七枚地膽七枚牛黃一兩上二十四味搗末蜜為丸搗三萬杵丸如小豆先食服二丸日再服不知稍稍加以藥二丸著門上令衆惡不近傷寒服之無不即愈若至病家及視病人夜行獨宿服二丸衆邪不近亦可佩之蜥蜴丸主症堅水腫蜚尸遁尸寒尸喪尸尸注骨血相注惡氣鬼忤蛄毒邪氣往來夢寤存亡流飲結積虎狼所齧猘犬咬鴆毒入人五臟服藥殺其毒即消婦人邪鬼忤之亦能遣之方蜥蜴兩枚蜈蚣二枚炙地膽五十枚䗪蟲三十枚熬杏仁三十枚去尖皮雙仁蜣螂十四枚炙虻蟲三十枚去翅足熬朴硝七分澤瀉半兩芍藥五分虎骨一兩半炙甘草一兩炙桃奴半兩犀角半兩巴豆仁七分鬼督郵半兩赤桑雞半兩乾薑一兩款冬花三分甘遂五分上二十味治巴豆杏仁如膏納藥末研調下蜜搗二萬杵丸如麻子未食服三丸日一不下加之不取吐下者一丸日一有人風冷注癖堅二十年亦得愈金牙散主鬼注風邪鬼語尸注或在腰脊胸脅流無常處不喜見人意志不定面目脫色目赤鼻張唇乾甲黃等並治之方蜈蚣一枚炙人參一兩蜣螂七枚炙雄黃一分徐長卿十四枚蜥蜴一枚桔梗三分鐵精三分桂心一兩鬼臼半兩金牙一分燒野葛一分附子一枚炮去皮毒公三枚芎藭半兩石長生半兩椒目半兩大黃一分甘草一分炙芫菁十四枚鬼督郵半兩蜂房一分熬曾青一分真珠一分蛇蛻皮一分熬丹砂一分烏頭半兩炮去皮狼毒半兩斑蝥四枚熬石膏五分䕡茹一分蕪荑半兩鬼箭半兩藜蘆半兩貍骨一分雷丸半兩狼牙一兩乾漆一分熬亭長貝母一分凝水石五分牛黃一兩胡燕屎一兩鱉甲半兩炙滑石半兩上四十五味為散酒服一刀圭日再稍加如有蟲皆隨大小便出矣大金牙散主南方百毒瘴氣疫毒腳弱腫痛濕痹風邪鬼疰方金牙燒雄黃丹砂龍膽防風玉支大黃曾青茯苓桂心松脂乾薑烏頭炮去皮斑蝥去翅足熬亭長細辛硝石野葛大戟商陸蛇蛻熬芫青鸛骨芫花附子炮去皮寒水石人參貫衆龍骨蜀椒汗去目閉口者露蜂房熬巴豆去皮心蜥蜴蜈蚣炙礜石燒天雄貍骨炙石膽莽草上三十九味各等分為散以絳囊佩帶之男左女右未食以漿水或酒隨意服一刀圭以知為度小金牙散主南方瘴氣疫毒腳弱風邪鬼注方金牙五分燒女萎三分莽草三分乾薑桂心天雄炮去皮細辛萆解各三分犀角屑烏頭炮去皮麝香虎杖黃芩雄黃硃砂蜀椒半兩汗去目閉口者黃連一兩牛黃一分蜈蚣一枚七寸者炙上一十九味為散訖納牛黃麝香更搗三千杵溫酒服一錢匕日三夜二以知為度絳囊盛帶之闢不祥弔喪問病皆塞鼻良一方用由跋無虎杖又大金牙散方所主與前方同傳尸骨蒸病家合佳金牙二兩燒大黃一兩鱉甲一兩炙梔子仁一兩鬼督郵一兩鼉甲一兩炙一作龜甲桃白皮一兩銅鏡鼻一兩乾漆一兩熬桂心半兩芍藥半兩射干半兩升麻半兩徐長卿三分鳶尾半兩由跋三分蜂房半兩熬細辛半兩乾薑半兩芒硝半兩莽草半兩龍膽狼牙雄黃真珠各三分白朮一兩半射罔一分羚羊角半兩屑馬目毒公半兩犀角半兩屑甘草半兩炙狼毒半兩蜣螂七枚炙地膽七枚樗雞七枚蕪青七枚雷丸七分龍牙一兩半杏仁一兩半去尖皮雙仁熬巴豆十四枚去皮心桃奴十四枚鐵精一合赤小豆一合烏梅七枚胡燕屎一兩半鸛骨二兩石膏二兩蛇蛻一尺熬斑蝥七分活草子一兩半上五十味為散酒服一刀圭加至兩刀圭日三夜一以知為度絳囊盛帶之男左女右一方寸匕省病問孝夜行途中晨昏霧露亦如此密封勿瀉氣清齊七日合之一一如法童子沭浴寂靜無人處合勿令人知之買藥勿爭價太一神明丸主腹中癥瘕積聚支滿寒熱鬼疰長病咳逆吐血殺鬼邪氣蠱注胸中結氣咽中如有物宿食久寒方雄黃四兩真珠二兩丹砂二兩藜蘆一兩半附子一兩半去皮炮斑蝥二十枚熬杏仁八十枚去尖皮雙仁熬地膽二七枚礬石一兩燒赤足蜈蚣二枚炙巴豆七十枚去皮心鬼臼三兩特生礜石五兩燒上一十三味下篩㕮咀礜石令如麥大桑白皮如錢大十四枚令於鐵器中熬桑白皮焦黑止搗二千杵納丹砂雄黃諸藥合搗四千杵白蜜和為丸服如小豆大縱不知病進退繞臍相逐上下不定按之挑手心中慍慍如有蟲者病走皮中相次即取一丸摩病上急挼手下皮青不青當白黑若有赤病死皮中也右為蜂蛇所中中惡服一丸一丸著瘡中若不知更加至三丸卒得飛尸腹中切痛服三丸破一丸敷瘡上即愈夜夢寤驚恐問病臨喪服一丸漬一丸塗之止惡邪氣不敢近人卒中鬼魅狂言妄語一丸塗其脈上一丸塗人中即愈鬼魅逐人以一丸塗門戶上鬼不敢前蠱毒病一宿勿食明旦服一丸不知增至二丸至三丸以知為度癥結宿物勿食服四丸但欲症消服一丸日三病下如雞子白或下蛇蟲下後以肥肉精作羹補之狐鳴以一丸向擲之狐即於其處死神祕不妄傳桔梗丸主諸注萬病毒注鬼注食注冷注痰飲宿食不消並酒澼方藜蘆二兩熬皂莢二兩炙去皮子巴豆仁二兩熬桔梗二兩附子二兩炮去皮上五味末之蜜和搗萬杵欲服宿勿食旦服兩丸如梧子仰臥勿眠至食時若膈上吐膈下利去惡物如蝌蚪蝦蟆子或長一尺二尺下後大虛作羹補之三四日將養病不盡更服如初十疰丸主十種注氣注勞注鬼注冷注生人注死注尸注水注食注土注等方雄黃一兩人參一兩甘草一兩炙藁本一兩巴豆一兩去皮心熬桔梗一兩附子一兩炮去皮皂莢一兩炙去皮子蜀椒一兩汗麥門冬一兩去心上一十味末之蜜和空腹服一丸如小豆大日二稍加以知為度極效大麝香丸主鬼注飛尸萬病方生麝香半兩牛黃半兩蜈蚣一枚炙丹砂半兩雄黃一兩巴豆仁五十枚去心熬杏仁五十枚去尖皮雙仁熬桂心半兩地膽七枚芫菁七枚亭長七枚蜥蜴一枚獺肝半兩炙大黃半兩犀角半兩屑礜石半兩燒細辛半兩藜蘆半兩斑蝥七枚去翅足熬鬼臼礬石燒附子炮去皮真珠各半兩上二十三味搗為末蜜和搗三千杵飲服如小豆一丸日二蛇蜂蠍所中以摩之愈一方地膽作蚺蛇膽蜈蚣湯主惡注邪氣往來心痛徹胸背或走入皮膚移動不定苦熱四肢煩疼羸乏短氣方蜈蚣一枚炙牛黃一分大黃三分丹砂三分細辛一兩鬼臼一兩黃芩半兩當歸一兩桂心一兩人參三分麝香一分附子一兩炮去皮乾薑一兩上一十三味㕮咀以水一斗煮十一味取三升去滓下牛黃麝香末攪令均分三服鸛骨丸主遁尸飛尸積聚脅下痛連背走無常處或在臟或在腹中或奄然而痛方鸛脛骨三分雄黃一兩藜蘆半兩野葛半兩莽草一兩芫青十四枚斑蝥十四枚熬巴豆四十枚去皮心熬丹砂二分牡蠣一兩熬桂心半兩蜈蚣一枚炙上一十二味搗篩蜜丸服如小豆大二丸日三以知為度一方丹砂作丹參江南度世丸主萬病症堅積聚伏尸長病寒熱注氣流行皮中久病著床肌肉枯盡四肢煩熱嘔逆不食傷寒時氣惡注忤口噤不開心痛方麝香一兩細辛二兩大黃一兩甘草二兩炙蜀椒三兩汗去目閉口者紫菀一兩半人參二兩乾薑一兩茯苓二兩附子一兩半炮去皮真珠一兩丹砂一兩烏頭半兩炮去皮野葛一兩牛黃半兩桂心一兩蜈蚣二枚炙雄黃一兩鬼臼一兩巴豆六十枚去皮心熬上二十味搗末蜜丸飲服如小豆大二丸稍加至四丸日二加獺肝一兩大良大度出丸主萬病與前同方牛黃一兩大黃一兩雄黃一兩細辛一兩附子一兩炮去皮真珠一兩甘草一兩炙人參一兩射罔一兩丹砂一兩鬼臼一兩莽草一兩鬼箭二兩桂心二兩蜀椒一兩汗去目閉口者紫菀二兩巴豆仁八十枚去心熬乾薑二兩野葛一尺蜥蜴一枚蜈蚣一枚炙地膽十五枚芫青二十枚樗雞三十枚茯苓一兩麝香二兩上二十六味搗末蜜丸飲服二丸如小豆日二丸先食後服之細辛散主風入五臟悶絶常自燥痛或風注入身冷注鬼注飛尸惡氣腫起或左或右或前或後或內或外針灸流移無有常處驚悸腹脹氣滿又心頭痛或恍惚悲懼不能飲食或進或退陰下濕癢或大便有血小便赤黃房中勞極方附子二分炮去皮秦艽三分人參三分牡蠣三分熬蜀椒三分汗去目閉口者乾薑五分桂心五分茯苓一兩桔梗一兩防風一兩半白朮一兩當歸一兩獨活一兩柴胡五分黃芩三分烏頭半兩炮去皮甘草三分炙麻黃三分去節芎藭三分石南半兩莽草半兩牛膝半兩天雄半兩炮去皮栝蔞半兩杜仲半兩炙細辛二分上二十六味搗篩為散仍別稱之合和也旦以清酒服五分匕訖如行十里久勢欲歇更飲酒五合佳芥子薄主遁尸飛尸又主暴風毒腫流入四肢頭面諸風方芥子一升蒸熟上一味搗下篩以黃丹二兩攪之分作兩處疏布袋盛之更蒸使熱以敷痛處當更迭蒸袋常使熱敷之如此三五度即定太一備急散主卒中惡客忤五尸入腹鬼刺鬼排及中蠱毒注吐血下血及心腹卒痛腹滿寒熱毒病六七日方雄黃二兩丹砂一兩桂心一分藜蘆七銖附子五分炮去皮蜀椒半兩汗去目閉口者野葛二十一銖芫花十銖巴豆仁三十五個去心熬上九味惟巴豆別治如脂餘下篩以巴豆合和更搗之令和調瓷器中貯之密封勿瀉氣有急疾水服錢五匕可加至半錢匕老小半之病在頭當鼻衄在膈上吐在膈下利在四肢當汗出此所謂如湯沃雪手下皆驗祕之千金非賢勿傳也治暴心痛面無色欲死方以布裹鹽如彈子燒令赤置酒中消服之利即愈還魂湯主卒忤鬼擊飛尸諸奄忽氣無復覺或已死口噤拗口不開去齒下湯湯入口活不下者分病人發左右捉踏肩引之藥下復增取盡一升須臾立蘇方麻黃四兩去節桂心二兩甘草一兩炙杏仁七十枚去尖皮雙仁上四味㕮咀以水八升煮取三升分三服治卒中鬼擊及刀兵所傷血漏腹中不出煩滿欲絶方雄黃粉以酒服一刀圭日三血化為水論曰凡諸大備急丸散等藥合和時日天晴明四時王相日合之又須清齊不得汙穢於清淨處不令一切雜人貓犬六畜及諸不完具人女人等見則藥無靈驗不可具言若不能如法則必不須合之徒棄財力用之與朽木不殊余以武德中合玉壺丸時值天陰其藥成訖後卒不中用終棄之此等多是上古仙聖憫苦厄人遂造此方以救之皆云買藥不可爭價當知其深意云爾蠱毒第二論一首方七首炙法一首論曰亦有以蠱涎合作蠱藥著食飲中與人者惟此一種令人積年乃死治人中蠱人有行蠱毒以病人者若服藥蠱主姓名當使呼喚將去方凡中蠱之狀令人心腹切痛如物齧或吐血下血不急治食人五臟盡則死驗之法唾至水中沉者是也取敗鼓皮燒作末水服方寸匕須臾自呼蠱主姓名可語令知則愈矣治人有中蠱毒腹內堅如石面目青黃小便淋瀝變狀無常方牡羊皮方廣五寸犀角一兩屑芍藥一兩黃連一兩梔子七枚擘蘘荷四兩半牡丹皮一兩上七味㕮咀以水五升煮取一升半分三服治蠱毒方槲木北陰白皮一大握長五寸以水三升煮取一升空腹服之即吐出又方燒蝟皮灰以水服方寸匕瘥又方槲木北陰白皮桃根皮各五兩蝟皮灰亂髮灰各方寸匕生麻子汁五升上五味先以水濃煮槲皮桃根取汁一升和麻子汁著灰等一方寸匕令病人少食訖服一大升行百步須臾著盆吐出水中以雞翎擲吐水盆中當有如牛涎犢胎及諸蠱形並出即愈治貓鬼方燒臘月死貓兒頭作灰末以井花水服一錢匕日一立瘥大驗治貓鬼方相思子一枚巴豆一枚去皮萆麻子一枚硃砂半兩峭粉三分上五味搗作末以蜜蠟和為丸帶之即不著人先著者酒服麻子大一枚良又方多灸所痛處千壯自然走去甚妙藥毒第三方一十二首野葛毒方雞子一枚打破併吞之須臾吐野葛又方煮甘草汁冷飲之又方服雞屎汁解諸藥毒雞腸散方雞腸草三分薺苨升麻各一兩藍子一合坌土一分芍藥當歸甘草各二分炙上八味搗篩為散水服方寸匕多飲水為佳若蜂蛇等衆毒蟲所螫以針刺螫上血出著藥如小豆許於瘡中令濕瘥藥箭所中削竹如叉股長一尺五寸以綿纏繞水沾令濕取藥納瘡中趁瘡深淺令至底止有好血出即休也若服藥有毒水服方寸匕毒解病愈野葛毒口噤方取青竹去兩節注臍上納冷水注中暖即易之須臾口開開即服藥立活忌酒數易水解一切諸毒方甘草炙三兩粱米粉一合蜜半兩上一味以水五升煮取二升去滓納粉一合更煎又納蜜半兩服七合須臾更服之鉤吻衆毒困欲死面青口噤逆冷身痹方薺苨八兩上一味以水六升煮取三升冷如人肌服五合日三服夜二服又方煮桂汁飲之又方煮藍汁飲之凡六畜五臟著草自動搖得諸醋鹽不變色及墮地不汙又與犬不食者皆有毒殺人凡食飲有毒者澆地地墳起者殺人凡肉汁在器中蓋密氣不瀉者皆殺人凡脯肉熟肉皆不用深藏密不瀉氣殺人若中此毒者皆大糞灰水服方寸匕良治惡毒藥方狗舌草一把去兩頭上一味以水五升銅器中煮取汁搜面作粥食之藥毒不止解煩方甘草二兩粱米粉一升蜜四兩上三味以水三升煮甘草取二升去滓歇大熱納粉湯中攪令調納白蜜煎令熟如薄粥適寒溫飲一升從高墮下第四方一十一首膠艾湯主男子絶傷或從高墮下傷損五臟微者唾血甚者吐血及金瘡傷經內絶者方阿膠炙艾葉熬芍藥乾地黃各三兩當歸乾薑芎藭甘草炙各二兩上八味㕮咀以八七升煮取三升去滓納膠令煬分再服羸人三服此湯正主婦人産後及崩中傷下血多虛喘欲死腹痛下血不止者服之良千金一方只四味墜馬落車及樹間崩血腹滿短氣方大豆五升上一味以水一斗煮取二升半去豆一服令盡劇者不過三作之千金云治人墜落車馬心腹積血唾吐血無數落馬墮車及諸踠折臂腳痛不止方芎藭一兩半熬澤蘭一分蜀椒去目及閉口者汗當歸桂心附子炮去皮各半兩甘草三兩炙上七味微熬令香搗篩為散酒服方寸匕日三凡是傷至骨皆服之十日愈小兒傷損亦同又方黃耆芍藥各三兩蜀椒一合去目及閉口者汗烏頭半兩去皮炮大黃一兩當歸附子炮去皮乾薑桂心續斷乾地黃通草各二兩上一十二味搗篩為散先食訖溫酒服一方寸匕日三生地黃湯主因損小便血出方生地黃八兩柏葉一把黃芩阿膠炙甘草炙各一兩上五味㕮咀以水七升煮取三升去滓納膠取二升五合分三服治瘀血腹中奧瘀不出滿痛短氣大小便不通方荊芥半兩大黃芎藭各三兩䗪蟲三十枚熬桂心當歸甘草炙各二兩蒲黃五兩桃仁四十枚去皮尖及雙仁者上九味㕮咀以水一斗煮取三升分三服治折踠瘀血蒲黃散方蒲黃一升當歸二兩上二味搗篩為散酒服方寸匕日三先食訖服之又方虻蟲去足翅熬牡丹皮等分上二味搗篩為散酒服方寸匕血化為水又方菴䕡草汁服之亦可散服之日三又方大麻根若葉上一味搗取汁數升飲之即血下氣通蘇息無青者乾者煮汁亦得千金云治踠傷骨痛不可忍並主瘀血心腹脹滿短氣又方茅根切搗絞取汁溫和酒服一升日三良金瘡第五方六十二首金瘡止血散方釣樟根三兩當歸芎藭乾地黃續斷各一兩鹿茸半兩炙龍骨二兩上七味搗篩為散以敷血即止酒服一錢匕日五夜三治金瘡箭在肉中不出方白蘞半夏洗去滑各三兩上二味搗篩為散水服方寸匕日三淺者十日出深者二十日出終不住肉中效金瘡腸出令入方磁石燒滑石各三兩上二味搗細篩為散白飲服方寸匕日五夜二三日當入治刀斧所傷及冷瘡牛領馬鞍瘡方續斷松脂各一兩鹿角牛骨腐者亂髮燒各二兩上五味搗篩細為散以豬脂半斤並松脂合煎令和下鐺於地納藥攪令冷凝用之瘡有汁散敷之金瘡煩悶方白芷芎藭甘草炙各二兩上三味熬令變色搗篩為散水服方寸匕日五夜二硝石散主金瘡先有石發煩悶欲死大小便不能方硝石寒水石栝蔞澤瀉白蘞芍藥各一兩上六味搗篩為散水服方寸匕日三夜一稍加之以通為度琥珀散主弓弩所中悶絶無所識方琥珀上一味隨多少搗篩為散以童男小便服之不過三服瘥弩筋散主弓弩所中筋急不得屈伸方故敗弩筋五分燒作灰秦艽五分杜仲半兩炙大棗三枚乾地黃二兩半附子炮去皮當歸各一兩上七味搗篩為散以溫酒服一方寸匕日三稍加至二匕以知為度續斷筋主金瘡筋骨續絶方續斷三兩半芎藭蓯蓉當歸各一兩半細辛半兩附子炮去皮乾薑蜀椒汗去目閉口者桂心各三分蛇銜草乾地黃各二兩芍藥人參甘草炙各一兩上一十四味搗篩為散酒服方寸匕日三夜一千金有地榆古今録驗又有杜蘅藍子散主金瘡中藥箭解毒方藍子五合升麻八兩甘草炙各四兩王不留行各四兩上四味搗篩為散水服二方寸匕日三夜二水和方寸匕如泥塗瘡上干易毒即解澤蘭散主金瘡內塞方澤蘭防風石膏乾薑蜀椒去目閉口者汗附子炮去皮細辛辛夷芎藭當歸各半兩甘草一兩炙上一十一味搗篩為散酒服方寸匕日三夜一膿多倍甘草渴加栝蔞半兩煩熱加黃芩半兩腹滿短氣加厚朴三分瘡中瘀血更加辛夷半兩蒲黃散主被打腹中有瘀血方蒲黃一升當歸桂心各二兩上三味搗篩為散酒服方寸匕日三夜一甘菊膏主金瘡癰疽止痛生肉方甘菊花防風大戟黃芩芎藭甘草各一兩芍藥細辛黃耆蜀椒去目閉口者汗大黃杜仲各半兩炙生地黃四兩上一十三味搗篩以臘月豬膏四升煎五上五下芍藥色黃膏成綿布絞去滓敷瘡上日三桃仁湯主金瘡瘀血方桃仁五十枚去皮尖及雙仁虻蟲去翅足熬水蛭熬各三十枚大黃五兩桂心半兩上五味切以酒水各五升煮取二升服一合日三服明日五更一服馬蹄散主被打腹中瘀血方白馬蹄燒令煙盡上一味搗篩為散酒服方寸匕日三夜一亦主女人病血消之為水金瘡內漏方還自取瘡中血著杯中水和盡服愈金瘡腹中有瘀血二物湯方大麻仁三升蔥白二七枚上藥使數人各搗令熟著九升水中煮取一升半頓服之若血去不盡腹中有膿血更令服之當吐膿血耳金瘡內漏血不出方牡丹上一味為散服三指撮五日尿出血治金瘡因房驚瘡方燒婦人褌襠作灰敷之金瘡方取馬鞭草搗篩薄瘡一宿都瘥冬用干葉末麥門冬散主金瘡乳癰諸腫煩滿方麥門冬去心石膏研柏子仁甘草炙各半兩桂心一分上五味搗篩為散酸漿和服方寸匕日三夜一煩滿氣上脹逆長服之佳治金瘡出血多虛竭內補散方蓯蓉芍藥當歸芎藭乾薑人參黃芩厚朴炙桑白皮吳茱萸黃耆桂心甘草炙各一兩蜀椒三分去目及閉口者汗上一十四味搗篩為散飲服方寸匕日三治金瘡煩滿方赤小豆一升以苦酒浸之熬燥復漬之滿三度色黑治服方寸匕日三治金瘡苦不瘥方白楊木白皮熬令燥末服方寸匕日三服又以末敷瘡中即愈治金瘡刺痛不可忍百方不瘥方蔥一把水三升煮數沸漬瘡即止治金瘡煩痛大便不利方大黃黃芩等分上二味搗篩為末煉蜜和丸先食飲服如梧子七丸日三金瘡以桑白皮裹令汁入瘡中或石灰封並妙凡金瘡出血必渴當忍啖燥食不得飲粥及漿犯即血出殺人凡出血不止粉龍骨末於瘡上立止又方割取人見著鞋上有斷乳十枚布瘡上立止又方末雄黃敷瘡當沸汁出即瘥又方刮貝子末服一錢匕又方煮葛根食之如食法務令多兵瘡方搗車前汁敷之血即止又方以人精塗之瘥又方以柳絮裹敷之血便止又方以熟艾急裹數日乃解又方以人尿屎相和絞取汁飲三升頓服令盡金瘡驚而堅腫劇者殺人方搗生地黃蠐螬蟲敷之燒丸尉其外令溫地黃燥則易瓦冷則易凡刺在肉中不出方牛膝根莖搗敷之即出雖已合猶出也正觀中有功臣遠征被流矢中其背𦛗上矢入四寸舉天下名手出之不得遂留在肉中不妨行坐而常有膿出不止永徽元年秋令余診看余為處之瞿麥丸方瞿麥二兩雄黃一兩半研乾地黃王不留行各五分麻黃去節茅根敗醬防風雀李根皮牛膝大黃藍實石龍芮薔薇根皮各兩上一十四味搗篩為末煉蜜和丸如梧子酒服十丸日二稍稍加至二十丸以知為度忌豬魚生冷等可直斷口味凡箭鏃及折刺入身中四體皆急當合此藥服之令四體皆緩緩則其鏃必自跳出余常教服此藥與斷肉遂日日漸瘦其鏃遂跳出一寸戴衣不得行因即錯卻乃得行動已覺四體大緩不比尋常終冬至春其鏃不拔自然而落取而量之猶得三寸半是以身必須斷口味令瘦肉緩刺則自出矣故以記之又方磁石末敷之止痛斷血凡金瘡深不用早合若合則以滑石末粉則不合治凡竹木刺在肉中方以羊矢和豬脂塗之出矣又方鹿角末水和塗之即出治因風水腫方卒刺涉水成腫取韭並鹽搗置上以火炙藥上熱徹即愈火燒瘡方取新牛矢承熱塗之又方燒桃葉鹽和煮作湯洗之又方以醬汁塗立愈又方桑灰水敷干則易又方井底青泥塗之佳又方青羊髓塗之佳無青羊白黑羊亦得治灸瘡及湯火所損晝夜啼呼不止兼滅瘢方羊脂半兩豬脂一分松脂半兩蠟一分上四味於松明上以小銚火燒豬脂等皆消以杯承取汁敷之松明是服松木節也治灸瘡膿壞不瘥方臘月豬脂一斤薤白十枚胡粉一兩上三味先煎薤令黃去之綿裹石灰一兩煎數沸去之入胡粉膏中令調塗故帛上貼之日三度又方白蜜一兩烏賊魚骨二枚一方作一兩上二味搗末相和塗上三五度瘥治火瘡方柏白皮半兩竹葉一兩甘草二兩上三味以豬膏一斤煎三沸三上三下藥成去滓待冷塗之集驗有地黃四兩治漆瘡方湯漬芒硝五兩令濃塗干即為勿住又方取市上磨刀石槽中泥津塗之又方取礬石納湯中洗之又方羊乳汁塗之又方漆姑草挼敷之又方末貫衆塗之沙蝨第六方三十一首治沙蝨毒方以麝香大蒜合搗以羊脂和著小筒中帶之又方雄黃硃砂常山等分上三味五月五日午時童子合之又治水毒方凡水毒中人似射工初得之惡寒頭微痛目眶疼心中煩懊四肢振焮腰背百節皆強筋急兩膝疼或吸吸而熱但欲睡旦醒暮劇手足逆冷二三日則腹中生蟲食人下部肚中有瘡不痛不癢令人不覺急治之過六七日下部出膿潰蟲上食五臟熱盛煩毒下痢不禁八九日名工不能醫救矣覺得之當早視若瘡正赤如截者為陽毒若瘡如鱧魚齒者為陰毒猶小緩不過二十日殺人欲知是中水毒當作五六斗湯以小蒜五升㕮咀投湯中消息勿令大熱去滓以浴若身體發赤斑文者則非他病也水毒方搗蒼耳取汁服一升以綿沾汁滓導下部中日三又方取蓼一把搗取汁服一升不過三服又方取藍一把搗水解以洗面目身令遍又方取大莓根末水飲之並導下部生蟲者用汁夏月常多齎此藥屑入水浴以方寸匕投水上流無所畏又闢射工凡洗浴以少許投水盆中即無復毒也蠼螋尿瘡方取茱萸東引根下土以醋和塗又方燒鹿角末和醋敷上已有瘡汁出者燒道邊故蒲席敷之瘡表裡相當一名浸淫取豬牙車骨年久者捶破燒令脂出熱塗之蠼螋尿瘡方取小豆末醋和塗之干即易小兒以水和又方取棟木枝若皮燒灰敷上乾者膏和亦治小兒禿及諸惡瘡又方取槐白皮半斤切醋浸半日去痂洗之日五六狐尿刺方凡諸螳螂之類盛暑之時多有孕育著諸物上必有精汁其汁干久則有毒人手觸之不王相之間則成其疾名曰狐尿刺日夜磣痛不識眠睡百方治之不瘥但取蒲公英莖葉根中斷之取白汁塗之令厚一分塗即瘥神驗凡熱傷瘡及狐尿刺腫痛不可忍並風寒者皆燒馬屎若生桑木趣得煙多熏之汁出即愈惡刺方五月蔓荊子搗末和烏牛乳封之無即凡牛乳亦得又方取野狐矢燒灰臘月豬膏和封孔上又方取桑灰汁熱漬冷即易又方以針砂和膠清塗之又方取故鞋網如棗大婦人中衣有血者如手掌大到勾棘針二七枚三味合燒作灰以臘月豬膏和塗之蟲出又方蔓荊子五升上一味微熬末研小兒尿一升合納瘡口中周回厚一寸以煻火燒一升投納瘡於中漬之立愈又方煮槐白皮取湯漬之又方以苦瓠煮作湯漬之又方取五月五日蛇皮燒灰臘月豬膏和敷之又方取故鞍韉旃燒灰臘月豬膏和封之蟲出又方取樗根白皮切一升泔漬煮三沸納孔中亦可漬之肉刺方割頭令血出內鉛丹如米許曝之又方以刀割卻以好墨塗遍瘥狗咬方即以冷水洗瘡任血出勿止之水下血斷以帛裹即愈蛇齧方以人屎厚塗以帛裹縛登時毒消蛇毒方重臺末唾和封瘥大驗蛇蜂毒方取瓦子摩其上唾二七訖然後拋瓦子卻安舊處癭病第七方九首治五癭方取鹿靨酒漬令沒火炙乾納於酒中更炙令香含咽汁味盡更易盡十具即愈又方小麥面一斤特生礜石十兩燒海藻一斤上三味取三年酢一升漬小麥面曝乾更浸令酢盡各搗為散每服兩方寸匕日四五服藥含乃咽之忌姜辛豬魚生菜辛菜吹火讀誦及大語用氣又方昆布三兩海蛤二兩松蘿二兩海藻三兩白蘞二兩通草二兩桂心二兩上七味搗為散每以酒服方寸匕日三服又方小麥一升醋一升夜浸晝曝昆布洗海藻洗各二兩上三味搗為散食後飲服方寸匕日三以瘥為度又方昆布一兩海藻一兩海蛤二兩半夏一兩洗細辛一兩土瓜一兩松蘿一兩通草二兩白蘞二兩龍膽二兩上一十味搗篩酒服方寸匕日再不得作生活勞動也又方昆布二兩上一味切如指大酢漬含咽汁盡愈又方海藻一斤小麥面一升上二味以三年酢一升以溲麵末曝乾往反令酢盡合搗散酒服方寸匕日三忌怒陷脈散主二十三十年癭瘤及骨瘤石瘤肉瘤膿瘤血瘤或大如杯盂十年不瘥致有漏潰令人骨消肉盡或堅或軟或潰令人驚惕寐臥不安體中掣縮愈而復發治之方千金云陷腫散烏賊魚骨一分白石英半兩石硫黃一分紫石英半兩鍾乳半兩粉乾薑一兩丹參三分琥珀一兩大黃一兩蜀附子一兩炮去皮上一十味搗為散貯以韋囊勿令瀉氣若瘡濕即敷無汁者以豬膏和敷之日三四以干為度若汁不盡者至五劑十劑止勿惜意不作也著藥令人不疼痛若不消加芒硝二兩益佳千金有胡燕屎一兩治癭方菖蒲二兩海蛤一兩白蘞一兩續斷一兩海藻一兩松蘿一兩桂心一兩蜀椒一兩汗去目閉口者羊靨二百枚炙神麯三兩半夏一兩洗倒掛草一兩上一十二味各搗下篩以醬清牛羊髓脂丸之一服三丸如梧子日一服陰病第八方一十四首治丈夫陰下癢濕方以甘草一尺水五升煮洗之生用又方以蒲黃粉之不過三治丈夫陰腫大如斗核中痛方雄黃一兩研粉礜石二兩研甘草一尺生用上三味以水一斗煮取二升洗之神良治丈夫陰頭癰腫師所不能醫方鱉甲一枚上一味燒焦末之以雞子白和敷之治丈夫陰頭生瘡如石堅大者方刀刮虎牙及豬牙末豬脂煎令變色去滓日三塗之又方烏賊魚骨末粉之良治妒精瘡方丈夫在陰頭節下女人在玉門內似疳瘡作臼蝕之大痛其疳即不痛以銀叉綿纏臘月豬脂熏黃火上暖以叉烙瘡上令熟取干槐枝㶆塗之以麝香敷瘡上令香黃礬青礬末敷之小便後即敷之不過三度治男女卒陰中生瘡癢濕方黃連梔子各二兩甘草一兩蛇床子二分黃柏一兩上五味下篩粉之乾者以豬脂和塗上深者綿裹納中日三治下部痛癢生瘡槐皮膏方槐白皮五兩赤小豆一小合白芷二兩楝實五十枚桃仁五十枚去皮尖雙仁甘草二兩生當歸二兩上七味切以苦酒漬一宿旦以豬膏一升微火煎白芷黃即成去滓摩上日再並納下部中三寸瘥治陰莖頭瘡方當歸三分黃連半兩桃仁二兩去皮雙仁小豆一分槐子半兩上五味作末粉瘡上日三治陰頭生瘡方蜜煎甘草塗之即瘥大良效治陰瘡黃汁出方煮黃柏汁冷漬敷蛇床黃連末極效又方桃仁二七枚熬令黃去皮尖雙仁末之酒服良又方生地黃一把並葉搗取汁飲之良
