body:
  text: 卷第二本草上論曰金石草木自有本經而條例繁富非淺學近識所能悟之忽逢事逼豈假披討所以録之於卷附之於方使忠臣孝子急遽之際造次可見故録之以冠篇首焉玉石部上品二十二味玉泉味甘平無毒主五臟百病柔筋強骨安魂魄長肌肉益氣利血脈療婦人帶下十二病除氣癃明耳目久服耐寒暑不飢渴不老神仙輕身長年人臨死服五斤死三年色不變一名玉札生藍田山谷採無時玉屑味甘平無毒主除胃中熱喘息煩滿止渴屑如麻豆服之久服輕身長年生藍田採無時丹砂味甘微寒無毒主身體五臟百病養精神安魂魄益氣明目通血脈止煩滿消渴益精神悅澤人面殺精魅邪惡鬼除中惡腹痛毒氣疥瘻諸瘡久服通神明不老輕身神仙能化為汞作末名真朱光色如雲母可析者良生符陵山谷採無時空青味甘酸寒大寒無毒主青盲耳聾明目利九竅通血脈養精神益肝氣療目赤痛去膚翳止淚出利水道下乳汁通關節破堅積久服輕身延年不老令人不忘志高神仙能化銅鐵鉛錫作金生益州山谷及越巂山有銅處銅精熏則生空青其腹中空三月中旬採亦無時緑青味酸寒無毒主益氣療鼽鼻止瀉痢生山之陰穴中色青白曾青味酸小寒無毒主目痛止淚出風痹利關節通九竅破症堅積聚養肝膽除寒熱殺白蟲療頭風腦中寒止煩渴補不足盛陰氣久服輕身不老能化金銅生蜀中山谷及越巂採無時白青味甘酸鹹平無毒主明目利九竅耳聾心下邪氣令人吐殺諸毒三蟲久服通神明輕身延年不老可消為銅劍闢五兵生豫章山谷採無時扁青味甘平無毒主目痛明目折跌癰腫金瘡不瘳破積聚解毒氣利精神去寒熱風痹及丈夫莖中百病益精久服輕身不老生朱崖山谷武都朱提採無時石膽味酸辛寒有毒主明目目痛金瘡諸癇痙女子陰融痛石淋寒熱崩中下血諸邪毒氣令人有子散症積咳逆上氣及鼠瘻惡瘡煉餌服之不老久服增壽神仙能化鐵為銅成金銀一名畢石一名黑石一名棋石一名銅勒生羌道山谷羌里勾青山二月庚子辛丑日採雲母味甘平無毒主身皮死肌中風寒熱如在車船上除邪氣安五臟益子精明目下氣堅肌續絶補中療五勞七傷虛損少氣止痢久服輕身延年悅澤不老耐寒暑志高神仙一名云珠色多赤一名雲華五色具一名雲英色多青一名雲液色多白一名云砂色多黃一名磷石色正白生太山山谷齊廬山及琅邪北定山石間二月採石鐘乳味甘溫無毒主咳逆上氣明目益精安五臟通百節利九竅下乳汁益氣補虛損療腳弱疼冷下焦腸竭強陰久服延年益壽好顏色不老令人有子不煉服之令人淋一名公乳一名蘆石一名夏石生少室山谷及太山採無時朴硝味苦辛寒大寒無毒主百病除寒熱邪氣逐六腑積聚結固留癖胃中食飲熱結破留血閉絶停痰痞滿推陳致新能化七十二種石煉餌服之輕身神仙煉之白如銀能寒能熱能滑能澀能辛能苦能咸能酸入地千歲不變色青白者佳黃者傷人赤者殺人一名硝石朴生益州山谷有鹹水之陽採無時硝石味苦辛寒大寒無毒主五臟積熱胃脹閉滌去蓄結飲食推陳致新除邪氣療五臟十二經脈中百二十疾暴傷寒腹中大熱止煩滿消渴利小便及瘻蝕瘡煉之如膏久服輕身天地至神之物能化成十二種石一名芒硝生益州山谷及武都隴西西羌採無時芒硝味辛苦大寒主五臟積聚久熱胃閉除邪氣破留血腹中痰實結搏通經脈利大小便及月水破五淋推陳致新生於朴硝礬石味酸寒無毒主寒熱瀉痢白沃陰蝕惡瘡目痛堅骨齒除固熱在骨髓去鼻中息肉煉餌服之輕身不老增年岐伯云久服傷人骨能使鐵為銅一名羽𥔄一名羽澤生河西山谷及隴西武都石門採無時滑石味甘寒大寒無毒主身熱瀉澼女子乳難癃閉利小便蕩胃中積聚寒熱益精氣通九竅六腑津液去留結止渴令人利中久服輕身耐飢長年一名液石一名共石一名脫石一名番石生赭陽山谷及太山之陰或掖北白山或卷山採無時紫石英味甘辛溫無毒主心腹咳逆邪氣補不足女子風寒在子宮絶孕十年無子療上氣心腹痛寒熱結氣邪氣補心氣不足定驚悸安魂魄填下焦止消渴除胃中久寒散癰腫令人悅澤久服溫中輕身延年生太山山谷採無時白石英味甘辛微溫無毒主消渴陰痿不足咳逆胸膈間久寒益氣除風濕痹療肺痿下氣利小便補五臟通日月光久服輕身長年耐寒熱生華陰山谷及太山大如指長二三寸六面如削白徹有光其黃端白稜名黃石英赤端名赤石英青端名青石英黑端名黑石英二月採亦無時青石赤石黃石白石黑石脂等味甘平主黃疸瀉痢腸澼膿血陰蝕下血赤白邪氣癰腫疽痔惡瘡頭瘍疥瘙久服補髓益氣肥健不飢輕身延年五石脂各隨其色補五臟生南山之陽山谷中青石脂味酸平無毒主養肝膽氣明目療黃疸瀉痢腸澼女子帶下百病及疽痔惡瘡久服補髓益氣不飢延年生齊區山及海崖採無時赤石脂味甘酸辛大溫無毒主養心氣明目益精療腹痛瀉澼下痢赤白小便利及癰疽瘡痔女子崩中漏下産難胞衣不出久服補髓好顏色益智不飢輕身延年生濟南射陽及太山之陰採無時黃石脂味苦平無毒主養脾氣安五臟調中大人小兒瀉痢腸澼下膿血去白蟲除黃疸癰疽蟲久服輕身延年生嵩高山色如鶯雛採無時白石脂味甘酸平無毒主養肺氣厚腸補骨髓療五臟驚悸不足心下煩止腹痛下水小腸澼熱溏便膿血女子崩中漏下赤白沃排癰疽瘡痔久服安心不飢輕身長年生太山之陰採無時黑石脂味鹹平無毒主養腎氣強陰主陰蝕瘡止腸澼瀉痢療口瘡咽痛久服益氣不飢延年一名石涅一名石墨出潁川陽城採無時太一餘糧味甘平無毒主咳逆上氣癥瘕血閉漏下除邪氣肢節不利大飽絶力身重久服耐寒暑不飢輕身飛行千里神仙一名石腦生太山山谷九月採石中黃子味甘平無毒久服輕身延年不老此禹餘糧殼中未成餘糧黃濁水也出餘糧處有之陶云芝品中有石中黃子非也禹餘糧味甘寒平無毒主咳逆寒熱煩滿下赤白血閉癥瘕大熱療小腹痛結煩疼煉餌服之不飢輕身延年一名白餘糧生東海池澤及山島或池澤中玉石部中品二十九品金屑味辛平有毒主鎮精神堅骨髓通利五臟除邪毒氣服之神仙生益州採無時銀屑味辛平有毒主安五臟定心神止驚悸除邪氣久服輕身長年生永昌採無時水銀味辛寒有毒主疥瘻痂瘍白禿殺皮膚中蝨墮胎除熱以傅男子陰陰消無氣殺金銀銅錫毒熔化還復為丹久服神仙不死一名汞生符陵平土出於丹砂雄黃味苦甘平寒大溫有毒主寒熱鼠瘻惡瘡疽痔死肌療疥蟲𧈟瘡目痛鼻中息肉及筋絶破骨百節中大風積聚癖氣中惡腹痛鬼疰殺精物惡鬼邪氣百蟲毒勝五兵殺諸蛇虺毒解藜蘆毒悅澤人面煉食之輕身神仙餌服之皆飛入人腦中勝鬼神延年益壽保中不飢得銅可作金一名黃食石生武都山谷敦煌山之陽採無時雌黃味辛甘平大寒有毒主惡瘡頭禿痂疥殺毒蟲蝨身癢邪氣諸毒蝕鼻中息肉下部𧈟瘡身而白駁散皮膚死肌及恍惚邪氣殺蜂蛇毒煉之久服輕身增年不老令人腦滿生武都山谷與雄黃同山生其陰山有金金精熏則生雌黃採無時殷孽味辛溫無毒主爛傷瘀血瀉痢寒熱鼠瘻癥瘕結氣腳冷疼弱一名薑石鍾乳根也生趙國山谷又梁山及南海採無時孔公孽味辛溫無毒主傷食不化邪結氣惡瘡疽瘻痔利九竅下乳汁男子陰瘡女子陰蝕及傷食病常欲眠睡一名通石殷孽根也青黃色生梁山山谷石腦味甘溫無毒主風寒虛損腳腰疼痹安五臟益氣一名石飴餅生名山土石中採無時石硫黃味酸溫大熱有毒主婦人陰蝕疽痔惡血堅筋骨除頭禿療心腹積聚邪氣冷癖在脅咳逆上氣腳冷疼弱無力及鼻衄惡瘡下部𧈟瘡上血殺疥蟲能化金銀銅鐵奇物生東海牧羊山谷中及太山河西山礬石液也陽起石味鹹微溫無毒主崩中漏下破子臟中血癥瘕結氣寒熱腹痛無子陰痿不起補不足療男子莖頭寒陰下濕癢去臭汗消水腫久服不飢令人有子一名白石一名石生一名羊起石雲母根也生齊山山谷及郎邪或云山陽起山採無時凝水石味辛甘寒大寒無毒主身熱腹中積聚邪氣皮中如火燒煩滿水飲之除時氣熱盛五臟伏熱胃中熱煩滿止渴水腫小腹痹久服不飢一名白水石一名寒水石一名淩水石色如雲母可析者良鹽之精也生常山山谷又水中縣及邯鄲石膏味辛甘微寒大寒無毒主中風寒熱心下逆氣驚喘口乾舌焦不能息腹中堅痛除邪鬼産乳金瘡除時氣頭痛身熱三焦大熱皮膚熱腸胃中膈氣解肌發汗止消渴煩逆腹脹暴氣喘息咽熱亦可作浴湯一名細石細理白澤者良黃者令人淋生齊山山谷及齊廬山魯蒙山採無時磁石味辛鹹寒無毒主周痹風濕肢節中痛不可持物洗洗酸痟除大熱煩滿及耳聾養腎臟強骨氣益精除煩通關節消癰腫鼠瘻頸核喉痛小兒驚癇煉水飲之亦令人有子一名玄石一名處石生太山川穀及慈山山陰有鐵處則生其陽採無時玄石味鹹溫無毒主大人小兒驚癇女子絶孕小腹冷痛少精身重服之令人有子一名玄水石一名處石生太山之陽山陰有銅銅者雌玄者雄理石味辛甘寒大寒無毒主身熱利胃解煩益精明目破積聚去三蟲除榮衛中去來大熱結熱解煩毒止消渴及中風痿痹一名立制石一名肌石如石膏順理而細生漢中山谷及廬山採無時長石味辛苦寒無毒主身熱胃中結氣四肢寒厥利小便通血脈明目去翳眇下三蟲殺蠱毒止消渴下氣除脅肋肺間邪氣久服不飢一名方石一名土石一名置石理如馬齒方面潤澤玉色生長子山谷及太山臨淄採無時膚青味辛鹹平無毒主蠱毒蛇菜肉諸毒惡瘡不可久服令人瘦一名推青一名推石生益州川穀鐵落味辛甘平無毒主風熱惡瘡瘍疽瘡痂疥氣在皮膚中除胸膈中熱氣食不下止煩去黑子一名鐵液可以染皂生牧羊平澤及祊城或析城採無時鐵主堅肌耐痛生鐵微寒主療下部及脫肛鋼鐵味甘無毒主金瘡煩滿熱中胸膈氣塞食不化一名跳鐵鐵精平微溫主明目化銅療驚悸定心氣小兒風癇陰㿉脫肛光明鹽味鹹甘平無毒主頭面諸風目赤痛多眵淚生鹽州五原鹽池下鑿取之大者如升皆正方光徹一名石鹽緑鹽味鹹苦辛平無毒主目赤淚出膚翳眵暗密陀僧味鹹辛平有小毒主久痢五痔金瘡面上瘢皯面膏藥用之桃花石味甘溫無毒主大腸中冷膿血痢久服令人肌熱能食珊瑚味甘平無毒主宿血去目中翳鼻衄末吹鼻中生南海石花味甘溫無毒酒漬服主腰腳風冷與殷孽同一名乳花石床味甘溫無毒酒漬服與殷孽同一名乳床一名逆石玉石部下品三十一味青琅玕味辛平無毒主身癢火瘡癰傷白禿疥瘙死肌浸淫在皮膚中煮煉服之起陰氣可化為丹一名石珠一名青珠生蜀郡平澤採無時礜石味辛甘大熱生溫熟熱有毒主寒熱鼠瘻蝕瘡死肌風痹腹中堅癖邪氣除熱明目下氣除膈中熱止消渴益肝氣破積聚痼冷腹痛去鼻中息肉久服令人筋攣火煉百日服一刀圭不煉服則殺人及百獸一名青分石一名立制石一名固羊石一名白礜石一名太白石一名澤乳一名食鹽生漢中山谷及少室採無時特生礜石味甘溫有毒主明目利耳腹內絶寒破堅結及鼠瘻殺百蟲惡獸久服延年一名蒼礜石一名鼠毒生西域採無時握雪礜石味甘溫無毒主痼冷積輕身延年多食令人熱方解石味苦辛大寒無毒主胸中留熱結氣黃疸通血脈去蠱毒一名黃石生方山採無時蒼石味甘平有毒主寒熱下氣瘻蝕殺禽獸生西域採無時土殷孽味鹹無毒主婦