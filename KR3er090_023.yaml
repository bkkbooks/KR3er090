body:
  text: 卷第二十三瘡癰上黃父相癰疽論第一九江黃父相癰疽論黃帝問於歧伯曰余聞腸胃受谷上焦出氣以溫分肉而養骨節通腠理中焦出氣如霧上注溪谷而滲孫脈津液和調變化赤而為血血和則孫脈先滿乃注於絡脈絡脈皆盈乃注於經脈陰陽已張因息乃行行有綱紀周有道理與天合同不得休止切而調之從虛去實瀉則不足疾則氣減留之先後從實去虛補則有餘血氣已調形神乃持余已知血氣之平與不平未知癰疽之所從生成敗之時死生之期或有遠近何以度之可得聞乎歧伯曰經脈流行不止與天同度與地合紀故天宿失度日月薄蝕地經失紀水道流溢草蘆不成五穀不植徑路不通民不往來巷聚邑居別離異處血氣猶然請言其故夫血脈榮衛固流不休上應星宿上應經數寒氣客於經絡之中則血泣血泣則不通不通則衛氣歸之不得復反故癰腫也寒氣化為熱熱勝則肉腐肉腐則為膿膿不瀉則爛筋筋爛則傷骨骨傷則髓消不當骨空骨空不得泄瀉則筋骨枯虛枯虛則筋骨肌肉不相營一作親經脈敗漏重於五臟臟傷故死矣診癰疽發起處第二方一首黃帝曰願盡聞癰疽之形與忌日名歧伯曰略說癰疽極者有十八種癰發於咽中名曰猛疽不急治則化為膿膿不瀉塞咽半日而死其化為膿者膿瀉已則含豕膏無食三日已一云無冷食發於頸名曰夭疽其疽大而赤黑不急治則熱氣下入淵腋前傷任脈內熏肝肺則十餘日而死陽氣大發消腦流項名曰腦爍疽其色不樂一作余項痛如刺以針心煩者死不可治發於肩及臑名曰疵疽其狀赤黑不急治此令人汗出至足不害五臟發四五日逆𤋲之逆一作逞發於腋下赤堅者名曰朱疽治之用砭石欲細而長疏啓之塗以豕膏六日已勿衰衰一作裹其疽堅而不潰者為馬刀挾嬰急治之發於胸名曰井疽其狀如大豆三四日起不早治下入腹中不治七日死發於膺名曰甘疽其狀如谷實栝蔞常苦寒熱急治之去其寒熱不治十歲死死後膿自出發於脅名曰改訾改訾者女子之病也久之其狀大癰膿其中乃有生肉大如赤小豆治之方銼䔖翅草及根各一斗以水一斗六升煮取二升即強飲厚衣坐釜上令汗出足已發於股胻名曰股脫疽其狀不甚變色癰膿內搏於骨不急活三十日死發於股陰名曰赤弛不急治六十日死在兩股內者不治六日死發於尻名曰鋭疽其狀赤堅大急治之不治三十日死發於膝名曰疵疽其狀大癰色不變寒熱而堅勿石之石之即死須其色異柔乃石之生也諸癰發於節而相應者不可治也發於陽者百日死發於陰者三十日死一云四十日死發於脛名曰兔齒其狀如赤豆至骨不急治殺人發於踝名曰走緩其狀色不變數石其輸而止其寒熱不死發於足上下名曰四淫其狀大癰不急治百日死發於足旁名曰癘疽其狀不大初從小指發急治之去其黑者不消輒益不治百日死發於足指名曰脫復疽其狀赤黑則死不赤黑不死治之不衰急斬去之活也不斬去者死黃帝曰夫子言癰疽何以別之歧伯曰榮氣稽留於經脈之中則血泣而不行不行則衛氣歸之歸之而不通壅遏不得行故曰熱大熱不止熱勝則肉腐肉腐則為膿然不能陷肌膚於骨髓骨髓不為焦枯五臟不為傷故命曰癰何謂疽答曰熱氣純盛下陷肌膚筋髓骨肉內連五臟血氣竭盡當其癰下筋骨良肉皆無餘故命曰疽疽者其上皮天瘀以堅如牛領之皮癰者其上皮薄以澤此其候也黃帝曰善帝曰有疽死者奈何歧伯曰身有五部伏兔一腓二一云縛背三五臟之輸四項五五部有疽死也帝曰身形應九宮奈何歧伯曰請言身形應九野左足應立春其日戊寅己丑左胸應春分其日己卯左手應立夏其日戊辰己巳膺喉頭首應夏至其日丙午左手應立秋其日戊申己未右胸應秋分其日辛酉左足應立冬其日戊戍己亥腰尻下窮應冬至其日壬子六腑及膈下二臟應中州大禁太一所在之日及諸戊巳也凡候此九者善侯八正所在之處所主左右上下身體有癰腫者欲治之無以其所直之日潰治之是謂天忌日也凡五子日夜半五丑日雞鳴五寅日平旦五卯日日出五辰日食時五巳日禺中五午日日中五未日日昳五申日晡時五酉日日入五戍日黃昏五亥日人定上以此日時遇疾發癰者不起也候癰疽色法第三論曰夫癰疽初發如微人多不以為急此實奇患唯宜速治之治之不速病成難救以此致禍能不痛哉且述所懷以悟後賢謹按黃父癰疽論論癰所著緩急之處死生之期如下發皮肉淺腫高而赤貼即消不治亦愈發筋肉深腫下而堅其色或青黃或白黑或脫復微熱而赤宜急治之成消中半發附骨者或未覺肉色已殃已殃者癰疽之甚也發背外皮薄為癰皮厚為疽如此者多見先兆宜急治之皮堅甚大者多致禍也夫癰壞後有惡肉者當以豬蹄湯洗去穢次敷食肉膏散惡肉盡乃敷生肉膏散及摩四邊令善肉速生當絶房室慎風冷勿自勞動須筋脈平復乃可任意耳不爾新肉易傷傷則重潰發則禍至慎之慎之診知是癰疽法第四癰疽之發未辨是非飢渴為始始發之時或發自疽或似小癤或復大痛或復小痛或發米粒大白膿子皆是微候宜善察之欲知是非重按其處是即便隱痛覆按四邊比方得失審實之是即灸第一使灸其上二三百壯又灸四邊一二百壯小者灸四邊中者灸六處大者灸八處壯數不慮多也亦應即薄貼令得即消內須服解毒冷藥令毒氣出外外須薄貼熱藥法當瘡開其口令泄熱氣故也診癰疽有膿法第五凡癰按之大堅者未有膿半堅半軟者半有膿當上薄者都有膿有膿便可破之不爾侵食筋骨也破之法應在下遞上破之令膿易出用鈹針膿深難見肉厚而生者用火針若不別有膿者可當其上數按之內便隱痛殃堅者未有膿泄去熱氣不爾長速則不良候人年得疽法第六歧伯曰赤疽發於額不瀉十餘日死可刺也其膿赤多血死未有膿可治人年二十五三十一六十九十五人神在額不可見血見者死杼疽發項若兩耳下不瀉十六日死其六日可刺其色黑見膿而癰者死不可治人年十九二十三三十五四十九五十一五十五六十一八十七九十九神在兩耳下不可見血見者死蜂疽發背起心俞若肩髃二十日不瀉死其八日可刺也其色赤黑膿見者死不治人年六歲十八二十四三十五五十六六十七七十二九十八神在肩不可見血見者死刺疽發肺俞若肝俞不瀉二十日死其八日可刺發而赤其上肉如椒子者死不可治人年十九二十五三十三四十九五十七六十八七十三八十一九十七神在背不可見血見者死俠榮疽發脅起若兩肘頭二十五日不瀉死其九日可刺發赤白間其膿多白而無赤可治年十六二十六三十二四十八五十八六十四八十九十六神在脅不可見血見者死勇疽發股起太陰若伏兔二十五日不瀉死其十日可刺發青膿赤黑者死白者尚可治年十一十五二十三十一四十三四十六五十九六十三七十五九十一神在尻尾不可見血見者死標叔疽發熱同同耳聾後六十日腫如水狀如此可刺之但出水後乃有血血出即除也年五十七六十五七十三八十九十七神在背不可見血見者死旁疽發足趺若足下三十日不瀉死其十二日可刺發赤白膿而不大多其上癢赤黑死不可治年十三二十九三十五六十一七十三九十三神在足不可見血見者死相五色疽死生法第七禽疽發如軫者數十處一云四日腫食飲疼痛其狀若變十日可刺其內發方根寒齒如噤俞若坐如是十五日死俞若生未詳釘疽發兩肩此起有所逐惡血結流內外榮衛不通發為釘疽三日身腫痛甚七日噤如痓狀十日可刺不治二十日死陰疽發髀若陰股始發腰韁內不能自止數飲不能多五日堅痛如此不治三歲死脈疽發環項一云頸始痛身隨而熱不欲動愪愪或不能食此有所大畏恐怖而不精上氣頦其發引耳不可以腫二十日可刺不刺八十日死龍疽發背起胃俞若腎俞二十日不瀉死其九日可刺其上赤下黑若青黑者死發血膿者不死首疽發背發熱八十日大熱汗頸引身盡如咳身熱同同如沸者皮澤頗腫處淺刺之不刺入腹中二十日死行疽發如腫或復相往來可要其所在刺之即愈沖疽發小腹痛而振寒熱冒五日愪愪六日而變十日死敦疽發兩指頭若五指頭十八日不瀉死其四月可刺其發而黑癰不甚赤過節可治疥疽發腋下若臂兩掌中振寒熱而咽乾者飲多則嘔煩心愪愪或卒疹反有合者此則可汗不汗當死筋疽發背俠脊兩邊大筋其色蒼八日可刺其癰在肌腹中九十日死陳干疽發兩臂三四日痛不可動五十日方身熱而赤六十日可刺如刺脈無血三四日死一云病已蚤疽發手足五指頭起即色不變十日之內可刺過時不刺後為食癰在腋三歲死倉疽發身癢後痛此故傷寒氣入臟篤發為倉疽九日可刺九十日死赤疽發身腫堅核而身熱不可以坐不可以行不可以屈伸成膿刺之即愈赤疽一云白疽發膊若肘後癢目痛傷精及身熱多汗五六日死赤疽發胸可治赤疽發髀樞六月可治不治出歲死赤疽發陰股堅死濡可治赤疽發掌中者可治赤疽發脛死不可治黑疽發腫在背大骨上八日可刺過時不刺為骨疽膿出不可止出碎骨六十日死黑疽發腋淵死黑疽發耳中如米此名文疽死黑疽發肩死黑疽發缺盆中名曰伏癰死黑疽發肘上下不死可治黑疽發腓腸死黑疽發膝臏堅死濡可治黑疽發趺上堅死足下久癰色赤死手心主脈有腫癰在股脛六日死發膿血六十日而死脅少陽脈有腫癰在頸八日死發膿血十日死腰太陽脈有腫交脈來於陽明癰在頸十日而死發膿血七日死尻太陽脈有腫癰在足心少陽脈八日死發膿血八十日死頭陽明脈有腫癰在尻六日死發膿血六十日死股太陽脈有腫癰在足太陽七十日死發膿血百日死肩太陽太陰脈有腫癰在脛八日死發膿血四百日死足少陽脈有腫癰在脅八日死發膿血六百日死手陽明脈有腫癰在腋淵一歲死發膿血二歲死敷貼第八方三十一首松脂貼主癰疽腫方煉松脂採松脂法附松脂二斤成煉者膒脂三兩細辛半兩黃柏白芷芎藭白蘞芍藥莽草白蠟黃耆黃芩黃連大黃當歸防風各一兩上一十六味切先以火暖銅鐺令熱以蠟拭鐺使通濕銼松脂令破納鐺中次下膒脂都消盡訖乃納藥以竹萆攪令調仍於微火一煎急攪令勿息十沸下之沸止更上預作十個濕土堆一下置一堆上遍十堆則成及熱以新幕生布上四面又安火灸作絞子絞澄去滓挑取向火塗紙依病處大小剪取貼之周時易此法稍難好好用心作之乃可成矣煉松脂法取大麻仁三升研之令細水三升淘之生布絞去滓松脂二升以水三升半煮令消盡及熱新布絞令脂出納麻汁中待小冷取松脂牽挽令白乃依法稱取採松脂法取深山大松本有露根脂自流出白黏者佳火燒黑疆者不堪用亦可五月六月大暑時破作痕三五日待出取之須多者多破根取之升麻敷主癰疽方升麻大黃黃耆芎藭龍骨白芨各一兩黃芩六兩白蘞牡蠣熬甘草各半兩上一十味搗篩為散以蜜和之如泥塗布敷癰上干即易之痛微用此令消方黃耆青木香梔子乾地黃升麻龍骨大黃黃柏黃芩麻黃黃連芎藭生犀取末白蘞羚羊角上一十五味等分搗篩為散以醋和之如泥塗故布上開口如小豆以泄熱氣干則易之瘥止白蘞敷主癰疽方白蘞大黃黃芩並等分上三味搗篩為散以雞子白和如泥塗布上敷腫上敷干則易之亦可以三指撮藥末納三升水中煮三沸絞注汁拭腫上數十遍以塞水石末和塗腫上以紙覆之干則易之輒以煮汁拭之日夜二十易食惡肉散方真朱藜蘆各一分半䕡茹半兩馬齒礬燒硫黃雄黃麝香各三分上七味搗篩為散粉瘡上亦可膏和敷之著兌瘡孔中佳生肉膏主癰疽金瘡方大黃黃耆芍藥獨活當歸白芷各一兩薤白二兩生地黃三兩取汁上八味搗篩為散切薤白以地黃汁成煎豬膏三升煎之二上三下以綿布絞去滓以敷瘡多少隨人意升麻敷主癰疽結核種種色不異時時牽痛或經年腫勢不消方升麻青木香白蘞芒硝射干當歸黃芩桂心芍藥防風大黃芎藭乾葛各二兩莽草一兩上一十四味搗以酒和令調微火熬令黃以敷腫上日再易乾者添酒更搗之隨後敷腫上寒水石敷方寒水石黃柏黃耆黃連大黃石膏梔子各二兩白蘞四兩上八味搗篩為末粉粥和如泥塗故布上敷腫上干則易之當歸貼諸腫方當歸一作當陸黃芩黃連大黃莽草白芷白蘞白芨各二兩上八味搗篩為散消膠汁稍稍和如泥塗紙貼腫上干則易之有患癰破下膿訖著兌藥塞瘡痛煩悶困極有人為去兌藥以楸葉十重貼之以布帛裹令緩急得所日再三易之痛悶即止腫消此極甚大良無比勝於衆貼此主癰疽潰後及凍瘡有刺不出者用之甚良冬無楸葉當早收之臨時以鹽湯沃之令釋用之亦佳薄削楸白皮用亦得貼楸葉後不復煩悶腫消減膿血惡汁出瘡陷下漸瘥治腦瘻諸癤諸癰腫牢堅治之方削附子令如棋子厚正著腫上以少唾濕附子艾灸附子令熱徹附子欲干輒令唾濕之常令附子熱徹附子欲干輒更氣入腫中無不愈者此法絶妙不傳治萬種癰腫方蒺藜蔓淨洗三寸截之取得一斗以水三升煮取二升去滓納銅器中煮取一升納小器中煎如稠糖下取塗瘡腫上大良治癰腫方伏龍肝以大醋和作泥塗布上貼之干即易之消矣又和蒜搗如泥塗之凡癰無問大小亦覺即取膠一片如掌水清令軟納納然心開一孔如錢孔大貼腫上若已潰者膿當被膠急撮皆出盡若未有膿者當自消矣又方燒鯉魚作灰醋和敷之一切腫用之皆愈以瘥為限至良蛇銜生肉膏主癰疽金瘡敗壞方蛇銜當歸各一兩半生地黃三兩黃連黃耆黃芩大黃續斷芍藥芎藭莽草附子炮去皮細辛蜀椒去目閉口白芷白芨一作白蘚皮薤白甘草炙各一兩上一十八味切以大醋漬兩宿以臘月豬脂七升煎三上三下白芷色黃下去滓敷之又方生地黃一斤薤白五兩辛夷芎藭獨活當歸黃耆白芷續斷芍藥黃芩大黃各一兩上一十二味切以臘月豬脂四升煎白芷黃色下去滓敷之野葛貼主癰疽痔瘻惡瘡婦人妒乳瘡方野葛芍藥薤白通草各半兩當歸三分附子一分上六味切之醋浸半日先煎豬脂八合令煙出納乳發半兩令消盡下令熱定乃納松脂二兩蠟半兩更著火上令和乃納諸藥令沸三上三下去滓冷之浣故帛去垢塗貼腫上干即易之春去附子其亂髮淨洗去垢不爾令瘡痛又方煎地黃汁如膠作餅貼之日四易三日瘥千金云食惡肉紫葛貼癰腫方紫葛二兩半大黃五分白蘞玄參黃連黃芩由跋升麻榆白皮各三分青木香半兩赤小豆半合上一十一味搗篩為散以生地黃汁和之如泥敷之干即易之大醋和亦得治癰疽瘡久不瘥方松脂薰陸香上二味等分搗入少許鹽為餅貼瘡上惡汁出盡即瘥諸卒腫方取芥子細末豬膽和如泥塗病上日三蕪青子封癰腫方取蕪青子一升搗作細末大醋和如泥封之干則易之芥子亦大佳又方槐子半升慎火草一把搗細水和塗之又方搗蔚臭汁服一雞子以滓封癰上暖即易之頭面腫更良蔥白療癰疽瘻有數孔積年不瘥方蔥白一斤細切搗如泥淨洗瘡拭乾封塗之厚一分日三夜一取瘥止八味黃耆薄方黃耆芎藭大黃黃連莽草黃芩梔子芍藥等分上八味為散以雞子白和如泥塗布上隨腫大小薄之燥則易之瘡上開孔令得泄氣拓湯主丹癰疽始發焮熱浸長進方兼主小兒丹長忌近陰升麻黃連大黃芎藭羚羊角當歸甘草各二兩黃芩三兩上八味以水一斗煮取五升去滓又還鐺中納芒硝三兩上火令一沸則帛拓腫上數過腫熱便隨手消盡王練甘休祕之拓湯方大黃黃芩白蘞各三兩芒硝一兩半上四味以水六升煮取二升以故帛四重內汁中以拓腫上暖復易晝夜為之又方凡癰以梁上塵灰葵莖等分醋和敷之干則易之石癰堅如石不作膿者方生商陸根貼軟布帛貼之數易之亦可搗敷燥即易癰當消濡處療癰疽第九論一首方三十三首論曰諸癰狀多種不同無問久近皆五香連翹湯主之先刺去熱小豆薄之其間數數針去血若已失療潰爛者猶常服五香漏蘆等湯下之當下大針入五分者則速愈凡癰高而光者不大熱其肉正平無尖而紫色者不須治但以竹葉黃耆湯申其氣耳其肉正平為無膿也癰卒痛用八物黃耆薄大癰七日小癰五日其有堅疆者診寧生破發背及髮乳若熱手不可得近者內先服王不留行散外摩發背膏若背生破無苦在乳者宜令極熟熟之候手按之隨手即起者便熟須針之針法要得著膿以意消息之胸背不可過一寸酌量不得膿以食肉膏散著兌頭內癰口中如人身熱氣歇服木占斯散五日後癰欲瘥者服排膿內塞散凡破癰之後病人便綿惙欲死內寒外熱腫自有似癰而非者當以手按腫上無所連即是風毒耳勿針可服升麻湯外摩膏破癰口當令上留三分近下一分針唯令極熱極熱便不痛破癰後敗壞不瘥者作豬蹄湯洗之日再夏湯二日可用冬六七日湯半劑亦可用胸中痛短氣者當入暗中以手中指按左眼視若見光者胸中有結癰若不見光者熛疽內發針傷脈血不出住實不瀉當成癰也凡脈來細而沉時直者身有癰疽脈來大漸小者陰結苦肌肉痹癰癤尋寸口如此來大而漸小也漏蘆湯方漏蘆白蘞黃芩枳實炙芍藥升麻麻黃甘草炙各二兩大黃三兩上九味㕮咀以水一斗煮取三升分三服無藥處單服大黃下之一方白薇二兩連翹五香湯方連翹青木香薰陸香麝香沉香射干獨活桑寄生通草升麻各二兩丁香一兩大黃三兩別浸上一十一味㕮咀以水九升煮取減半納竹瀝二升煮取三升分三服未瘥中間常服佳王不留行散主癰疽及諸雜腫已潰皆服之方王不留行子一升五色龍骨二兩野葛皮半分栝蔞六合當歸二兩乾薑桂心各一兩上七味搗篩為散食訖溫酒服方寸匕日三以四肢習習為度不知漸稍加之此浩仲堪方隋濟暗梨所名為神散癰腫即消極安穩千金云治癰腫不能潰困苦無聊賴黃耆竹葉湯治胸背遊熱癰疽方黃耆三兩生地黃八兩甘草三兩炙芍藥三兩黃芩三兩人參二兩麥門冬去心三兩石膏二兩半芎藭二兩當歸二兩生薑五兩切大棗三十枚擘半夏四兩洗淡竹葉切一斤上一十四味以水一斗二升先煮竹葉取九升去滓納諸藥煮取三升分四服相去如人行二十里間食日三夜一之服黃耆湯主癰腫熱盛口乾除熱止渴方黃耆升麻栝蔞乾地黃麥門冬去心各三兩黃芩芍藥各一兩梔子二十枚擘上八味㕮咀以水一斗煮取三升分三服溫中湯主癰疽取冷過多寒中下痢食完出方甘草炙乾薑附子炮各一兩半蜀椒二百四十枚汗上四味㕮咀以水六升煮取二升分三服黃耆散主癰疽撮膿方黃耆五分膿多倍之小豆一分熱口乾倍之芎藭半兩肉大生倍之芍藥二分癰不止倍之栝蔞二分渴小便利倍之白蘞三分有膿不合倍之上六味搗篩為散酒服方寸匕日三廣濟有甘草三分瞿麥散主諸癰潰及未潰瘡中疼痛膿血不絶不可忍之方瞿麥白芷黃耆當歸細辛芍藥芎藭薏苡仁赤小豆各一兩上九味先以清酒漬豆出於銅器中熬之干復漬漬熬五過止然後治末之合下篩溫酒服方寸匕日夜各五三日後痛者肌肉生一方以苦酒漬小豆多痛倍瞿麥瘡未開倍白芷膿多倍黃耆薏苡芍藥黃耆湯主癰腫虛弱方黃耆四兩升麻三兩桂心冷用二分黃芩一兩竹葉切一升茯苓生薑切甘草各二兩炙上八味㕮咀以水二斗煮竹葉減五升去之澄取九升納諸藥煮取三升去滓分三服日三諸惡腫失治有膿者方燒刺榆針作灰水服之經宿即頭出服一針作一頭多針多頭無刺榆者燒蛇蛻皮灰水和封上一日即孔出仍別服五香湯以筋作綖任孔中勿令合使引膿血若已成大瘡去血盡煮小兒餔塗之上著乾薑末以漸自消五利湯主年四十已還強壯常大患熱發癰疽無定處大小便不通方大黃升麻各三兩黃芩二兩梔子十五枚芒硝一兩上五味㕮咀以水五升煮取三升四合去滓下芒硝分四服快利即止癰疽潰膿大多里虛方黃耆麥門冬去心各三兩生薑四兩切五味子四兩桂心芎藭茯苓遠志去心當歸人參各二兩大棗二十兩去核甘草六兩炙上一十二味㕮咀以水一斗煮取四升分六服乾地黃丸主壯熱人長將服之終身不發癰疽令人肥悅耐勞苦方乾地黃五兩天門冬去心四兩大黃三兩巴戟天肉蓯蓉栝蔞人參各一兩芍藥桂心當歸黃芩黃耆遠志去心石斛甘草炙各二兩上一十五味搗篩為末煉蜜和丸如梧子酒服十丸日二加至二十丸乾地黃丸主虛熱消瘡癤方乾地黃四兩大黃六兩芍藥茯苓各三兩遠志去心升麻桂心黃芩麥門冬去心人參王不留行子甘草各二兩炙上一十二味搗篩為末煉蜜和丸如梧子酒服拾丸日三加至二十丸長服令人肥健千金有枳實二兩乾地黃丸主虛勞客熱數發癰腫瘡癤經年不除者悉主之方乾地黃四兩天門冬去心五兩人參一兩黃耆黃連大黃黃芩各三兩芍藥細辛茯苓澤瀉乾漆熬桂心甘草炙各二兩上一十四味搗篩為散煉蜜和丸如梧子酒服拾丸日三夜一加至二十丸長服延年益壽終身不發癰癤凡大黃皆薄切五升米下蒸之曝乾熱多者倍大黃排膿內塞散主大瘡熱已退膿血不止瘡中肉虛疼痛方防風茯苓白芷遠志去心芎藭桔梗人參當歸黃耆甘草炙各一兩厚朴炙桂心各二兩附子炮二枚赤小豆三合熬上一十四味搗篩為散酒服方寸匕日三夜一服瞿麥散主排膿止痛利小便方瞿麥麥門冬去心黃耆當歸白蘞各一兩芎藭赤小豆米合桂心半兩芍藥二兩上九味搗篩為散先食溫酒服方寸匕日三服薏苡仁散主癰腫令自潰長肌肉方薏苡仁乾地黃肉蓯蓉白蘞當歸桂心各一兩上六味搗篩為散先食以溫酒服方寸匕日三夜二服五香湯主惡氣毒腫方沉香丁香麝香湯成入薰陸香青木香各一兩上五味切以水五升煮取二升分三服不瘥更合服以湯滓薄腫上兌疽膏方當歸芎藭白芷松脂烏頭各二兩巴豆三十枚去皮豬脂三升上七味切納膏中微火煎三沸納松脂耗令相得以綿布絞去滓以膏著綿絮兌頭尖作兌兌之隨病深淺兌之膿自出食惡肉盡即生好肉瘡淺者勿兌著瘡中日三惡肉盡止干癰瘡凡是瘡瘍皆用之方雄黃雌黃硫黃白礬燒胡粉松脂各二兩水銀三兩上七味細研如粉以水銀不見為度納後膏中以十隻筋攪之數千匝冷密貯勿泄藜蘆漏蘆狼牙羊蹄根青葙地榆當歸萹蓄䕡茹各二兩白蘞蛇床子各一兩半上一十一味搗篩為散以醋浸一宿以成煎豬膏四升煎三上三下膏成絞去滓以極微火煎之凡一切惡瘡癬疽瘻瘑疥患悉敷之勿令近目及陰其石等研之如粉膏欲凝仍下攪令勻摩之逐手瘥矣食惡肉散方硫黃雄黃雌黃漆頭䕡茹麝香礬石燒各半兩馬齒礬石燒兌三分上七味細作散敷之兌食惡肉令盡千金有丹砂半兩滅瘢膏主百癰疽惡瘡赤疽皆先以布揩作瘡以塗之鼻中息肉如大豆納鼻中痢血酒服如棗核大病痔以綿裹梅子大納下部中中風塗摩取愈婦人崩中産後中風皆主之方烏頭礬石燒女萎狼毒躑躅附子野葛烏賊骨皂莢炙赤石脂天雄芍藥芎藭當歸石膏莽草地榆鬼臼續斷蜀椒白朮巴豆去皮大黃細辛白芷乾地黃上二十七味各一兩搗篩以成煎豬脂四升和藥以此為率三沸三下納三指撮鹽其中下之須服摩之妊娠婦人勿服其藥絹篩豬膏臘月當多合用之神效別取一升和鷹屎白三兩調和使熟敷之滅瘢大驗豬蹄湯主癰疽及惡瘡有息肉方豬蹄一具治如食法白蘞白芷狼牙芍藥各三兩黃連黃芩大黃獨活各二兩上九味切以水三斗煮豬蹄取一斗二升去蹄納藥煮取五升分洗瘡日三良治癤腫方生椒曲末釜月下土末之上三味末之以大醋和敷上干則易之禁癰方咒曰癰非癰癤非癤土塊失癰即滅三七遍取一土塊摩腫上敷與病人男左女右割一切腫方凡人身上有腫腫在左割左在右割右足出少血即消在足小指下橫紋內畔稜上此極良禁一切腫方凡一切腫亦覺陰咒曰上有太山下有大海內有大魚主食癰疽四嶽使者於我所須癰疽小鬼隨手消除急急如律令七遍又方取紫檀細研大醋和之塗並治遊腫療身體手足卒腫方取驢脂鹽末敷之又方取大醋和蚯蚓矢敷之又方搗蒼耳敷之冬用子春用心又方取大醋和土消末敷之
