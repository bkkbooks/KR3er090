body:
  text: 卷第二十八針灸下消渴第一一十二法論一首消渴咽喉干灸胃下俞三穴各百壯在背第八椎下橫三間寸炙之消渴口乾不可忍小腸俞百壯橫三間寸灸之消渴咳逆灸手厥陰隨年壯消渴口乾灸胸堂五十壯又灸足太陽五十壯消渴口乾煩悶灸足厥陰百壯又灸陽池五十壯建氏灸消渴法初灸兩手足小指頭及項椎隨年壯又灸膀胱俞橫三間寸灸之各三十壯五日一報之又灸背脾俞下四寸俠脊梁一寸半二穴隨年壯論曰灸上諸穴訖當煮白狗肉作羹汁飲食不用薑醬豉可用蔥薤隨意當煮肉骨汁作淡羹可食肉當稍漸進忌食豬肉法須二百日乃善又灸腎俞二穴並腰目在腎俞下三寸俠脊兩旁各一寸半以指按陷中又關元俠兩旁各二寸一處又陰市二穴在膝上當伏兔上三寸臨膝取之曲泉陰谷陰陵泉復溜凡此諸穴斷小便利大佳不損陽氣亦云止遺尿也太溪中封然谷太白大都趺陽行間大敦隱白湧泉凡此諸穴各一百壯腹背兩腳凡三十七穴其腎俞腰目關元水道可灸三十壯五日一報之各得一百五十壯佳湧泉可灸十壯大敦隱白行間可灸三壯余者悉七壯皆五日一報之滿三灸可山也若灸諸陰不瘥可灸諸陽諸陽在腳表宜審用之無有不驗造次則並灸肺俞募按流注孔穴壯數如灸陰家法灸小便數而少且難用力輒失精此方萬驗也令其人舒兩手合掌並兩大指令齊急逼之令兩爪甲相近以一炷灸兩爪甲本肉際際方後自然有角令炷當兩角中小侵入爪上此兩指共當一炷也亦灸腳大指與手同法各三炷經三日又灸之此法甚驗淋病第二二十三法著鹽臍中灸三壯五淋不得尿灸懸泉二七壯在內踝前一寸斜行小脈間是中封之別名五淋灸大敦三十壯氣淋灸關元五十壯又俠玉泉相去一寸半灸三十壯勞淋足太陰百壯在內踝上三寸三報之石淋臍下三十六種疾不得小便灸關元三十壯一云百壯血淋灸丹田隨年壯血淋灸腹溜五十壯卒淋灸外踝尖七壯失禁尿不自覺知針陰陵泉入五分灸隨年壯莖中痛灸行間三十壯屈骨端主腹中滿小便數灸二七壯小兒以意量之不得尿灸太衝五十壯失尿不禁法灸大敦七壯又灸行間七壯小兒遺尿灸臍下一寸半隨年壯又大敦一壯尿床灸法垂兩手髀上盡指頭上陷處灸七壯又臍下橫紋七壯遺尿針遺道入二寸補之在俠玉泉五寸灸隨年壯又灸陰陵泉隨年壯又灸陽明隨年壯針入三分尿血第三七法第七椎兩邊各五寸主尿血又灸大敦各隨年壯虛勞尿血白濁灸脾俞百壯又灸三焦俞百壯又灸腎俞百壯又灸章門百壯尿黃灸石門五十壯水病第四一十五法灸足第二指上一寸隨年壯又兩手大指縫頭各灸七壯虛勞浮腫灸太衝百壯灸腎俞百壯主百病水腫灸胃倉隨年壯水腫灸陷谷隨年壯水腫氣上下灸陰交百壯水腫脹灸曲骨百壯大腹灸陰市隨年壯人中滿唇腫及水腫大水灸臍中石門各百壯風水灸上廉隨年壯水腫不得臥灸陰陵泉百壯石水灸然谷氣衝四滿章門水分主水腫脹滿不能食堅硬灸日七壯至四百即止忌針針水出盡即死水病灸至瘥止在下管下一寸鼓脹灸中封二百壯癰疽第五七法論一首卒疽著五指急不得屈伸灸踝尖上數壯亦可至百壯凡卒患腰腫附骨腫癰疽癤腫風遊毒熱腫此等諸疾但初覺有異即急灸之立愈遇之腫成不須灸從手掌後第一橫紋後兩筋間當度頭灸五壯立愈患左灸右患右灸左當心胸中者灸兩手俱下之疔腫在左灸左臂曲肘紋前取病人三指外手於臂上處中灸之兩筋間從不痛至痛腫在右從右炙不過三四日瘥又灸掌後橫紋從五指男左女右七壯即驗已用得效論曰疔腫灸法稍多然此一法亦甚效驗出於意表也癮疹灸曲池二穴隨年壯神良頭痛癮疹灸天窗七壯白癜白駮浸淫瀝瘍著頭及胸前灸兩乳間隨年壯立瘥痔漏第六十八法針漏法少海在臂曲側肘內橫紋頭屈手向頭取之主腋下瘰癧漏臂疼屈伸不得風痹瘙漏針入三分留七呼瀉五吸針癧瘰先拄針皮上三十六息推針入內之追核大少勿出核三上三下乃拔出針灸漏法頸漏灸天池百壯穴在乳後一寸腋下著脅直腋屈肋間又灸兩耳後髮際直脈七壯又灸背後兩邊腋下後紋頭隨年壯又灸心鳩尾下宛宛中七十壯又兩胯內有患癧處宛宛中百壯又灸章門臨泣支溝陽輔各百壯又以艾炷繞四畔周匝灸七壯即止又灸肩井隨年壯一去二百壯諸惡漏中冷息肉出灸足內踝上各三壯二年者六壯針痔法長強在窮脊骨下宛宛中主下漏五痔疳蟲食下部針入三寸伏地取之以大痛為度灸亦良不及針灸日三十壯至七日止特忌房室針足太陰穴在內踝上一夫一名二陰交亦主大便不利針入三分飛揚商丘復溜勞宮會陰承筋扶承委陽委中並主之灸腸癰法屈兩肘正尖頭骨各灸百壯則下膿血者愈灸乳癰妬乳法灸兩手魚際各二七壯斷癰脈也又以繩橫度口以度從乳上行灸度頭二七壯指忽掣痛不可忍灸指端七壯脫肛第七四十法灸尾翠骨七壯立愈主脫肛神良又灸臍中隨年壯灸癭法灸風池俠項兩邊兩穴耳上髮際百壯又大惟百壯大椎兩邊相去各一寸半小垂下各三十壯又頸沖在兩伸手直向前令臂著頭對鼻所住處一各臂臑灸隨年壯凡五處共九穴又垂兩手兩腋上紋頭各灸三百壯針亦良灸癭肩髃左右廂宛宛中男左十八壯右十七壯女右十八壯左十七壯再三以瘥止癭上氣短氣灸肺俞一百壯癭上氣胸滿灸雲門五十壯癭惡氣灸胸堂百壯又灸天府五十壯又灸大椎橫三間寸灸之又灸衝陽隨年壯在肘外屈橫紋外頭據此是曲池穴衝陽在足趺上五寸癭灸天瞿三百壯橫三間寸灸之癭氣面腫灸通天五十壯癭灸中封隨年壯灸㿗卵法以蒲橫度口如橫折之一倍增之以布著少腹橫理令度中央上當臍勿令偏僻灸度頭及中央合二處隨年壯好自養勿勞動作役大言大怒大笑又牽陰頭正上行灸頭所極牽向左右髀直下行皆仿此隨年壯又灸足厥陰在右灸左在左灸右各三壯厥陰在足大指本節間男㿗有腸㿗卵㿗氣㿗水㿗四種腸㿗卵㿗難瘥氣㿗水㿗針灸易瘥卵偏大入腹灸三陰交隨年壯在內踝上八寸又肩井肩臂接處灸隨年壯又灸關元百壯又灸手小指端七壯在左灸右在右灸左㿗卵偏大炙玉泉百壯報之又灸泉陰百壯三報之在橫骨邊三寸凡㿗病陰卒腫者令並足合兩拇指爪甲相併以一艾炷兩爪端方角上七壯陰腫欲潰困灸足大拇指本節橫紋中五壯又灸足太陽五十壯報之又灸足太陰五十壯在內踝上一夫又灸大敦在足大指三毛中隨年壯又灸足大指內側去端一寸白肉際隨年壯甚驗若雙㿗灸兩處又橫骨兩邊二七壯俠莖灸之又足大指下理中十壯隨腫邊灸之神驗小兒㿗先時將兒至碓頭咒之曰坐汝令兒某甲陰囊㿗故灸汝三七二十一灸訖便牽兒令雀頭向下著囊縫當陰頭灸縫上七壯即消已用有驗艾炷如蝟簪頭大凡男㿗當騎碓軸以莖中置軸上齊陰莖頭前灸軸木上隨年壯即愈卵腫如瓜入腹欲死灸足大指下橫紋中隨年壯灸汁法多汗寒熱灸玉枕五十壯針入三分多汗瘧病灸譩嘻五十壯盜汗寒熱惡寒灸肺俞隨年壯針入五分又灸陰都各一百壯針入八分補之穴在俠胃管相去三寸多汗四肢不舉少力灸橫紋五十壯在俠臍相去七寸又灸長平五十壯在俠臍相去五寸不針卒死第八十三法針間使百息又灸人中灸魘不覺法灸兩足大指聚毛中二十一壯治卒忤法灸人中三十壯又灸肩井百壯又灸間使七壯又灸巨闕百壯又灸十指爪甲下各三壯治鬼擊法夫鬼擊之為病卒著人如刀刺狀胸脅及心腹絞切急痛不可按抑或即吐血或即鼻中出血或下血一名鬼排灸人中一壯立愈若不止更加灸臍上一寸七壯又灸臍下一寸三壯一云七壯中惡灸胃管五十壯治蛇毒灸毒上三七壯無艾以火頭稱瘡孔大小爇之治熱暍灸兩乳頭七壯治狂犬咬人令人吮去惡血盡灸百壯以後日日灸一百日乃止瘥血不出慎酒豬肉一生慎之雜法第九用針法凡用針者虛則實之滿則泄之宛陳則除之邪勝則虛之大要徐而疾則實疾而徐則虛言實與虛若有若無察其後先若存若立為虛為實若得若失虛實之要九針最妙補瀉之時以針為主重則為補輕則為瀉雖有分寸得氣即止明堂偃側針訖皆無不灸凡病皆由血氣壅滯不得宣通針以開道之灸以溫暖之灸已好須將護生冷醋滑等若不謹慎之反增疾矣黃帝曰五臟五行五時病何以故岐伯曰假令春月和暢條芳水淥心蕩意盈神亂於內而形病於外卒有西方飄風凜然毛聳因腠理開不復得散便居孫脈孫脈滿流入絡脈絡脈入大經大經注腑腑歸臟四時同然故風病多歸於心也手心主灸刺血出多令人心驚三里刺入四分令人氣上湧泉刺深殺人陰交灸多絶孕凡諸孔穴名不徒設皆有深意故穴名近於木者屬肝穴名近於神者屬心穴名近於金玉者屬肺穴名近於水者屬腎是以神之所藏亦各有所屬穴名府者神之所集穴名門戶者神之所出入穴名宅舍者神之所安穴名臺者神所遊觀穴名所主皆有所況以推百方庶事皆然穴名五臟原缺脾凡孔穴者是經絡所行往來處引氣遠入抽病也故經云灸三壯者即為足數也禁忌法凡灸頭與四肢皆不欲少須熟宜令灸計壯滿三百足以愈病頭手足肉薄若並灸則血氣絶於下宜時歇火氣少時令血氣遂通使火氣流行積數大足自然邪除疾瘥也乃止火耳本經多雲刺入三分灸三壯茲乃舉其大綱未盡聖心且手足皮薄炷小數少腹背肉厚炷大肉多斯皆以意商量也背欲熱即為佳也凡灸生熟候人盛衰老少肥盛灸之凡微數之脈及新汗後並忌灸凡孔穴皆遂人大小取手中指第一節為寸男左女右一云三寸者蓋一中指也人年三十以上若灸頭不灸三里穴令人氣上眼暗所以三里穴下氣也一切病皆三里三壯每日常灸下氣氣止停也凡灸法先發於上後發於下先發於陽後發於陰凡針刺大法在午時後不欲午時前治冷痹脛膝疼腰腳攣急足冷氣上不能久立有時厭厭嗜臥手腳沉重日覺羸瘦此名復連病令人極無情地常愁不樂健忘嗔喜有如此候即宜灸之當灸懸鐘穴在足外踝上三指當骨上各灸隨年壯一灸即愈不得再灸也取法以草從手指中紋橫三指令至兩畔齊將度外踝從下骨頭與度齊向上當骨點之兩腳令三姓人灸之候天晴日午後在門外四達道上灸之神良若年月久更發依法更灸若意便欲多者七日外更灸七壯巨厥可百壯上管可二百壯中管可千壯下至五百壯下管可一百壯中守可一百壯陰交可三百壯中極可五百壯大椎可三百壯風門可二百壯魂門可五壯陽綱可五壯意舍可百壯肓門胞門可各一百壯懸樞可五壯命門可七壯白環俞可三壯又云一壯心俞肝俞肺俞脾俞腎俞小腸俞膽俞大腸俞胃俞膀胱俞三焦俞膈俞上五臟六腑俞皆得滿一百壯肺募中府心募巨闕肝募期門膽募日月脾募章門腎募京門小腸募關元三焦募石門大腸募天樞膀胱募中極胃募中管上五臟六腑募亦得滿百壯鳩尾三十三壯三報之巨闕五十壯上管胃管建里下管水分臍中各五十壯三報之陰交氣海石門關元五十壯中極五十壯上從鳩尾下第一行皆得百壯以此為大率自外諸穴或中病乃止或取隨年壯以意商量也頭維腦戶風府絲竹空下關耳中瘛脈人迎喑門承泣經渠脊中氣衝鳩尾地五會陰市陽關乳中泉腋伏兔承光天府白環俞石門女人忌灸上二十四處禁不可灸大忌上關左角乳中鳩尾五里承筋復溜顱息缺盆臍中神庭雲門伏兔三陽絡然谷上十五穴禁不可刺大凶玉枕維角睛明舌根結喉胡脈天窗神符巨覽一作覺血海足太陰丘墟上十二穴無病不可灸刺針灸宜忌第十論曰凡欲針灸必先診脈知醫須看病者行年本命禍害絶命生氣所在又須看破除開日人神取天醫若事急卒暴不得已者則不拘此也既得吉辰當知忌穴乃以繩量依圖朱點並疏患穴及壯數然後用心乃療之則無不愈矣其分寸法取病人男左女右手中指第一節為寸宜忌等列之如下治病服藥針灸法訣凡針灸服藥皆須審知病人生年月日推其行年遊宮生氣絶命訖乃處斷之舊法男避除女避破又男忌戊女忌己假令木命人行年又在木則不宜針及服青色藥火命人行年又在火則不宜發汗及服赤色藥土命人行年又在土則不宜吐及服黃色藥金命人行年又在金則不宜灸及服白色藥水命人行年又在水則不宜下及服黑色藥凡醫者不知此法下手即困若遇病人年命厄會深者下手即死矣凡入月六日十五日十八日二十二日二十四日小盡日治病令人長病戊午甲午此二日大忌針刺出血服藥及灸不出月凶甲辰庚寅乙卯丙辰辛巳此日灸刺大凶壬辰此一日大忌針灸甲辰己巳丙午丁巳此日男子特忌針灸甲寅乙卯乙酉乙巳此日女人特忌針灸丙子壬子甲子丙辰丁巳辛卯癸卯乙亥以上日切忌針灸立春春分脾立夏夏至肺立秋秋分肝立冬冬至心四季十二日後腎上以前日並不得治療凶凡五臟王時不得治及針灸其經絡凶凡春左脅秋右腎夏臍冬腰以上人神皆不宜針灸凡五辰五酉五未等日及八節先一日後一日皆不得針灸建日申時頭除日酉時膝滿日戌時腹平日亥時腰背定日子時心執日丑時手破日寅時口氣日卯時鼻成日辰時唇收日巳時足開日午時耳閉日未時目上件其時並不得犯其處殺人一日足大指二日外踝三日股內及腳腨四日腰及髀五日中齒舌根咽懸壅及足指六日手小指少陽及臍下七日內踝八日足腕一云腳九日尻尾手陽明十日腰眼及足拇指十一日鼻柱及眉十二日面髮際十三日牙齒十四日胃管咽喉足陽明十五日遍身十六日胸乳十七日氣衝及脅十八日股內及腨腸十九日足趺足下及項二十日膝以下一云內踝及膊二十一日唇舌足小指二十二日伏兔外踝一云胸臆中二十三日肝俞足趺兩腋二十四日足陽明兩脅及小腸二十五日足陽明心腹一云膝足二十六日手足胸二十七日膝骨踝一云膝肩臍膈下及兩足並陰囊中二十八日內踝玉莖一云陰中及耳頰二十九日膝頭顳顬兩手足三十日關元下至足一云趺上及頰膝頭又云遍身上人神並須依之吉肝神丁卯心神庚辰肺神癸酉腎神庚子脾神戊巳此五神之日特須避之餘日不假避諱也余以此論為得之近矣必須依而行之余者猥碎徒費辭難領固非君子之言諸忌之法以施俗士通人達道豈拘此哉月忌正二三四五六七八九十十一十二血忌醜未寅申卯酉辰戌巳午子忌針灸月厭戌酉申未午巳辰卯寅醜子亥忌針灸四激戌戌戌醜醜醜辰辰辰未未未忌針灸月殺醜戌未辰醜戌未辰醜戌未辰忌針灸千金法不同月刑巳子辰甲午醜寅酉未亥卯戌忌針灸六害巳辰卯寅醜子亥戌酉申未午忌針灸天醫卯寅醜子亥戌酉申未午巳辰宜尋醫取藥呼師上呼師宜天醫上來療病吉若刑害上來及針灸大凶又行年天醫法人年至子醜寅卯辰巳午未申酉戌亥天醫卯戌子未酉亥辰寅巳午醜申推歲天醫法常以傳送加大歲太一下為天醫推月天醫法陽月以大吉陰月以小吉加月建功曹下為鬼道傳送下為天醫避病法以小吉加月建癸明下為天醫療病法以月將加時天醫加病人年上療之瘥日天醫法甲乙丙丁戊己庚辛壬癸天醫卯亥丑未巳行年人神所在法年一歲十三二十五三十七四十九六十一七十三八十五神在心辰年二歲十四二十六三十八五十六十二七十四八十六神在喉卯年三歲十五二十七三十九五十一六十三七十五八十七神在頭寅年四歲十六二十八四十五十二六十四七十六八十八神在肩醜年五歲十七二十九四十一五十三六十五七十七八十九神在背子年六歲十八三十四十二五十四六十六七十八九十神在腰亥年七歲十九三十一四十三五十五六十七七十九九十一神在腹戌年八歲二十三十二四十四五十六六十八八十九十二神在頭酉年九歲二十一三十三四十五五十七六十九八十一九十三神在足申年十歲二十二三十四四十六五十八七十八十二九十四神在膝未年十一歲二十三三十五四十七五十九七十一八十三九十五神在陰午年十三歲二十四三十六四十八六十七十二八十四九十六神在股巳十日人神所在甲日在頭乙日在項丙日在肩臂丁日在胸脅戊日在腹乙日在背庚日在膝辛日在脾壬日在腎癸日在足十二日人神所在子日在目丑日在耳寅日在胸一云面及口卯日在鼻一云在脾辰日在腰巳日在手一云在頭口午日在心腹未日在足一云兩足心申日在頭一云在肩額又云在腰酉日在背一云在脛戌日在頸一云在咽喉亥日在項一云在臂頸又云兩膝十二時人神所在子時在踝丑時在頭寅時在耳一云在目卯時在面一云在耳辰時在項一云在口巳時在乳一云在肩午時在胸脅未時在腹申時在心酉時在膝一云在背脾戌時在腰一云在陰左右亥時在股上件人神所在血不可針灸損傷慎之慎之
