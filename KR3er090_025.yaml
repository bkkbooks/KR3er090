body:
  text: 卷第二十五色脈診氣色法第一夫為醫者雖善於脈候而不知察於氣色者終為未盡要妙也故曰上醫察色次醫聽聲下醫脈候是知人有盛衰其色先見於面部所以善為醫者必須明於五色乃可決生死定狐疑故立候氣之法冠其篇首焉肝受病色青心受病色赤脾受病色黃肺受病色白腎受病色黑皆先視於本色春面色青目色赤新病可療至夏愈夏面色赤目色黃新病可療至季夏愈季夏面色黃目色白新病可療至秋愈秋面色白目色黑新病可療至冬愈冬面色黑目色青新病可療至春愈論曰此四時王相本色見故療之必愈夫五臟應就五行若有病則因其時色見於面目亦猶灼龜於裡吉凶之兆形於表也扁鵲云病人本色青欲如青玉之澤有光潤者佳面色不欲如青藍之色若面白目青是謂亂常以飲酒過多當風邪風入肺絡於膽膽氣妄泄故令目青雖云夭救不可復生矣病人本色赤欲如雞冠之澤有光潤者佳面色不欲赤如赭土若面赤目白憂恚思慮心氣內索面色反好急求棺槨不過十日死病人本色黃欲如牛黃之澤有光潤者佳面色不欲黃如灶中黃土若面青目黃者五日死病人著床心痛氣短脾竭內傷百日復愈欲起倣徨因坐於地其亡倚床能治此者是謂神良病人本色白欲如璧玉之澤有光潤者佳面色不欲白如堊若面白黑無復生理也此謂酣飲過度榮華已去血脈已盡雖遇歧伯無如之何病人本色黑欲如重漆之澤有光潤者佳面色不欲黑如炭若面黑目白八日死腎氣內傷也病人色青如翠羽者生青如草滋者死赤如雞冠者生赤如衃血者死黃如蟹腹者生黃如枳實者死白如豕膏者生白如枯骨者死黑如鳥羽者生黑如炲煤者死凡相五色面黃目青面黃目赤面黃目白面黃目黑皆不死病人目無精光及齒黑者不治病人面失精光如土色不飲食者四日死病人及健人面色忽如馬肝望之如青近之如黑必卒死論曰夫五色者五臟之華也故天晴明時睹萬物辨白黑審長短若五色不分長短乖錯此為錯亂故人亦然黃帝問伯高曰察色知病何如伯高曰白色起於兩眉間薄澤者病在皮膚唇色青黃赤黑者病在肉榮氣需然者病在血脈目色青黃赤白黑者病在筋耳焦枯受塵垢者病在骨問曰病狀如是取之奈何伯高曰皮有部肉有柱氣血有輸筋有結骨有屬經曰皮部在於四肢肉柱在於臂胻諸陽分肉之間及少陰分肉之間氣血之輸在於諸經絡脈氣血留居則盛而起筋部無陰陽左右唯疾之所在骨之屬骨空之間所以受津液而溢腦髓若取之者必須候病間甚者也間者淺之少之甚者深之多之隨變而調之故曰上工經言知一臟為下工知二臟為中工參而知之為上工上工十全九中工十全六下工十全三此之謂也雷公問曰人有不病而卒死者何以知之黃帝曰大氣入於臟腑者不病而卒死矣雷公問曰病少愈而卒死者何以知之黃帝曰赤色出於兩顴上大如拇指者病雖少愈必卒死矣黑色出於顏貌大如拇指者必卒死顏貌者面之首也顏當兩目下也貌當兩目上眉下也扁鵲曰察病氣色有赤白青黑四氣不問大小在人年上者病也惟黃氣得愈年上在鼻上兩目間如下黑氣細如繩在四墓發及兩顴骨上者死或冬三月遠期至壬癸日逢年衰者不可理病者死四墓當兩眉坐直上至髮際左為父墓右為母墓從口吻下極頤名為下墓於此四墓上觀四時氣春見青氣節盡死夏見赤氣節盡死夏秋見白氣節盡死春見白氣至秋死夏見白氣暴死黑氣至冬死秋見赤氣節盡死冬至後甲子日死冬見赤氣暴死見黃氣至長夏死論曰凡病黃色入鼻從口入井灶百日死井在鼻孔上曲中是灶在口吻兩旁上一寸是若入者丙丁日死凡人死色易驗但看年上有黑色橫度者此人不出百日死若天中從髮際兩墓皆發黑色此人三年死天中當鼻直上至髮際是也若顴骨上發黑色應之者二百日死目下有黑色橫度年上者不出三十日死黑色入口應天中者不出一年死若天中發死色年上命門上並黃色者未好半惡也以天中為主五年內死天中發黑色法三年內死所以然者有二處得主故五年內死凡天中發黑色兩顴上發赤色應之者不出六十日兵死若年上發赤色應之者不出三十日死若命門上發赤色應之者不出百日市死婦人産死兵死同氣從命門入耳年上死赤色從眉衝下入目五日死或丙丁日死黑色在左右眉上一日死或壬癸日死若白色亦死或庚辛日或二三日死赤色入口三日死遠期丙丁日死黑色從天中及年上入目三日死或壬癸日死或二三日死或百日半年死青色如針在目下春死或甲乙日死黃色入目匝四邊戊己日死黑色准上行或入目期壬癸日死遠期二十日死若入耳鼻三日死准上者當鼻上也行謂在壽上年上下降接相次黃色橫兩顴入鼻一年死黑色如拇指在眉上不出一年暴死一云三年赤色如馬黑馬如烏見面死在口傍左右也右名馬左名烏黑色從眉繞目死赤色在口兩旁死黑色如深漆繞口或白色皆死黃帝問扁鵲曰人久有病何以別生死願聞其要對曰按明堂察色有十部之氣知在何部察四時五行王相觀其勝負之變色入門戶為凶不入為吉白色見沖眉上者肺有病入闕庭者夏死黃色見鼻上者脾有病入口者春夏死青色見人中者肝有病入目者秋死黑色見顴上者腎有病入耳者六月死赤色見頤者心有病入口者冬死所謂門戶者闕庭肺門戶目肝門戶耳腎門戶口心脾門戶若有色氣入者皆死黃帝曰善問曰病而輒死甚可傷也寧可拯乎對曰臟實則腑虛腑實則臟虛以明堂視面色以針瀉調之百病即愈鼻孔呼吸氣有出入出為陽入為陰陽為腑陰為臟陽為衛陰為榮故曰人一日一夜一萬三千五百息脈行五十周於其身漏下二刻榮衛之氣行度亦周身也夫面青者虛虛者實之補虛瀉實神歸其室補實瀉虛神舍其墟衆邪並進大命不居黃帝曰善五實未見六虛者皮虛則熱脈虛則驚肉虛則重骨虛則痛腸虛則泄溏髓虛則惰仲景曰鼻頭色青者腹中冷若痛者死鼻頭色微黑者有水氣色白者無血色黃者胸上有寒色赤者為風色青者為痛色鮮明者有留飲又仲景曰病人語聲寂然喜驚呼者骨節間病言聲喑喑然不徹者心膈間病言聲啾啾細而長者頭中病一作痛診脈大意第二問曰手足三陰三陽十二經皆有動脈而獨取寸口者何也扁鵲曰晝夜漏水下百刻凡一刻一百三十五息十刻一千三百五十息百刻一萬三千五百息脈行五十度周於身漏下一百刻榮衛行陽二十五度行陰二十五度合五十度為一周而復會於手太陰手太陰者寸口也寸口者五臟六腑氣血之所終始故法取於寸口也脈有尺寸者從關至尺是尺內陰之所治從關至魚際是寸內陽之所治寸口位八分關上位三分尺中位八分合三部一寸九分寸口關上為陽陽脈常浮而速尺中為陰陰脈常沉而遲初持脈如三菽之重與皮毛相得者肺脈也如六菽之重與血脈相得者心脈也如九菽之重與肌肉相得者脾脈也如十二菽之重與筋平者肝脈也按之至骨舉指來疾者腎脈也凡診脈當視其人大小長短及性氣緩急稱其形性則吉與本性相乘則凶何則人大而脈細人細而脈大人樂而脈實人苦而脈虛性急而脈緩性緩而脈躁人壯而脈細人羸而脈大此皆為逆逆則難治反則為順則為易治凡婦人脈常欲濡弱於丈夫也小兒四五歲者脈自疾快呼吸八至也凡春脈細弦而長夏脈洪浮而長來疾而去遲秋脈微浮而散冬脈沉滑而實季夏脈洪而遲凡心肺二脈大率俱浮何以別之浮而大者心也浮而短者肺也凡肝腎二脈俱沉何以別之牢而長者肝也按之濡舉指來實者腎也遲緩而長者脾也夫人受氣於谷谷成於胃乃傳於五臟六腑五臟六腑皆受氣於胃其清者為榮濁者為衛榮行脈內衛行脈外陰陽相貫如環之無端故胃為水穀腑主稟四方皆以胃氣為本也凡人病脈不病名曰內虛脈病人不病名曰行尸死不治夫平和之脈不緩不急不澀不滑不存不亡不長不短不低不昂不縱不橫此為平也無病尺欲小大關欲小實老人脈欲微陽羸於陰者平也夫按之不足舉之有餘名曰浮浮陽也按之去來促急名曰數數陽也按之如琴瑟弦三關通病梗梗無有屈撓名曰弦弦陽也王函經為陰按之如動珠子名曰滑滑陽也按之實強其脈有似沉伏名曰牢牢陽也按之浮大在指下而滿名曰洪洪陽也按之洪大牢強隱指名曰實實陽也脈見於關上無頭尾大如豆厥厥搖名曰動動陽也上件八條皆陽脈也按之有餘舉之不足名曰沉沉陰也按之無舉之來兩旁實而中央空名曰芤芤陰也按之遲小名曰細細陰也按之短實而數有似切繩狀名曰緊緊陰也按之依依名曰緩緩陰也按之大而遲名曰虛虛陰也按之短小不至動搖若有若無或復浮薄而細急輕手乃得重手不得名曰微微陰也按之乃得舉之無有濡而細名曰弱弱陰也按之盡牢舉之無有不前不卻但出不入如魚之接食動中名曰遲遲陰也按之無有舉之有餘或如帛衣在水中輕手與肌肉相得而軟名曰濡濡陰也按之促數浮短如刮竹皮輕手乃得重手不離其處或多入而少出名曰澀澀陰也按之來數時一止名曰促促陰也脈來動而中止按之小數中能還者舉指則動名曰結結陰也不死脈動而止不能自還因而復動名曰代代陰也代者死上件一十四條皆陰脈也脈有相薄者寸口微而尺中弦此為相薄也或但寸口微而弦亦為相薄也沉與伏相類濡與弱相類弦與緊相類浮與芤相類牢與實相類微與澀相類遲與緩相類滑與數相類凡脈出為陽入為陰來往之間為脾大陰凡脈浮滑長皆為陽沉澀短皆為陰也脈有一陰一陽者脈來沉而滑也一陰二陽者脈來沉滑而長也一陰三陽者脈來浮滑而長時一沉也一陽一陰者脈來浮而澀也一陽二陰者脈來長而沉澀也一陽三陰者脈來沉澀而短時一浮也脈有伏匿者謂陰陽更相乘伏也若脈居陰部反陽脈見為陽乘陰也雖陽脈時沉澀而短者此為陽中伏陰也脈居陽部反陰脈見為陰乘陽也雖陰脈時浮滑而長者此為陰中伏陽也故重陰者癲重陽者狂脈有太過有不及有陰陽相乘有覆有溢有關有格關之前者陽之動也脈當見九分而浮過者謂之太過減者謂之不及遂上魚為溢為外關內格此陰乘之脈關之後者陰之動也脈當見一寸而沉過者謂之太過減者謂之不及遂入尺為覆為內關外格此陽乘之脈是真臟之見也得此諸脈人不病自死寸脈下不至關為陽絶尺脈上不至關為陰絶此皆死不治欲決死生當以月節期之脈有相乘有縱有橫有逆有順何以知之水行乘火金行乘木名曰縱火行乘水木行乘金名曰橫水行乘金火行乘木名曰逆金行乘水木行乘火名曰順也夫欲知人病將愈當診其三部之脈大小遲疾浮沉正等雖有寒熱不解然陰陽已平知當愈也夫病者發熱身體疼痛此為表有病其脈當浮大今脈反沉遲故知當愈病卒腹中急痛此為里有病其脈當沉細今脈反浮大故知當愈然此二脈其人不即愈者必當死以其病與脈相反也夫脈者血之腑也長則氣治短則氣病數則煩心大則病進上盛則氣高下盛則氣脹代則氣衰細則氣少短而急者病在上長而緩者病在下弦而沉者病在內浮而洪者病在外脈實者病在內脈虛者病在外滑而微浮病在肺下堅上虛病在脾胃長而弦者病在肝脈小血少病在心大而緊者病在腎凡脈腑為陽主熱臟為陰主寒陽微自汗陰浮自下陽數即口瘡陰數即惡寒陽數出血陰澀下血脈與肌肉相得久持之至者可下之夫脈有三部陰陽相乘榮衛氣血任人體躬呼吸出入上下於中因息遊布津液流通隨時動作效象形容春弦秋浮冬沉夏洪察色觀脈大小不同一時之間變無經常尺寸參差或短或長上下乖錯或存或亡病輒改易進退低昂心迷意惑動失紀綱願為具陳令得分明師曰子之所問道之根源脈有三部尺寸及關榮衛流行不失衡銓腎沉心洪肺浮肝弦此自經常不失銖分出入升降漏刻周旋水下百刻一周循環當復寸口虛實見焉變化相乘陰陽相干風則浮虛寒則牢堅沉潛水畜支飲急弦動則為痛數即熱煩設有不應知有所緣三部不同病各異端太過可怪不及亦然邪不空見終必有奸審察表裡三焦別焉知其所舍消息珍看料度臟腑獨見若神為子條記傳與賢人凡療病當察其形氣色澤脈之盛衰病之新故乃可療之形氣相得色澤以浮脈順四時此為易治形氣相失色夭不澤脈實堅甚脈逆四時此為難療夫形盛脈細少氣不足以息者危形瘦脈大胸中氣多者死形氣相得者生三五不調者病夫關前為陽關後為陰陽出陰入以關為界陽數則吐陰數則下陽弦頭痛陰弦腹痛診四時脈第三春肝木王其脈弦細而長者平脈也反得微浮而短澀者是肺之乘肝金之剋木為賊邪大逆十死不治反得浮大而洪者是心之乘肝子之乘母為實邪不治自愈反得沉濡而滑者是腎之乘肝母之歸子為虛邪雖病自愈反得大而緩者足脾之乘肝土之畏木為微邪雖病不死夏心火王其脈浮大而洪者是平脈也反得沉濡而滑者是腎之乘心水之剋火為賊邪大逆十死不治反得大而緩者是脾之乘心子之乘母為實邪不治自愈反得弦細而長者是肝之乘心母之歸子為虛邪雖病當愈反得微浮而短澀者是肺之乘心金之畏火為微邪雖病不死季夏六月脾土王脈大穰穰而緩者為平脈也反得弦細而長者是肝之乘脾木之剋土為賊邪大逆十死不治反得微浮而短澀是肺之乘脾子之乘母為實邪不治自愈反得浮大而洪者是心之乘脾母之歸子為虛邪雖病自愈反得沉濡而滑者是腎之乘脾水之畏土為微邪雖病不死凡脾脈王則不見衰時即見秋肺金王其脈微浮而短澀者是平脈也反得浮大而洪者是心之乘肺火之剋金為賊邪大逆十死不治反得沉濡而滑者是腎之乘肺子之乘母為實邪不治自愈反得大而緩者是脾之乘肺母之歸子為虛邪雖病自愈反得弦細而長者是肝之乘肺木之畏金為微邪雖病不死冬腎水王其脈沉濡而滑者是平脈也反得大而緩者是脾之乘腎土之剋水為賊邪大逆十死不治反得弦細而長者是肝之乘腎子之乘母為實邪不治自愈反得微浮而短澀者是肺之乘腎母之歸子為虛邪雖病自愈反得浮大而洪者是心之乘腎火之畏水為微邪雖病不死診寸口脈第四寸口緊者中風風頭痛亦為傷寒頭痛寸口沉而橫者脅下有積腹中有橫積痛寸口浮大而實宿食不消浮滑亦然寸口沉而緊寒結在心下痛千金云沉而緊若心下有寒時時痛有積邪寸口沉滑胸中有水氣面目腫有微熱名為風水寸口沉而弱寒熱疝瘕少腹痛寸口微而弱氣血俱虛男子吐血婦人下血嘔汁出寸口弱而弦胸中脅下腰背並痛寸口雙弦脅下拘急而痛澀澀而寒寸口弦緊而細痛在心下寸口洪而大傷寒熱病並胸脅下滿痛寸口細沉滑者有積聚在脅下左右皆滿背相引痛寸口細而數數即發熱細即反吐寸口緩而數者中風寸口沉而喘則寒熱寸口盛而緊者傷於食也寸口急疝瘕少腹痛寸口浮大而疾者名曰陽中之陽病苦煩滿身熱頭痛腹中熱寸口沉細者名曰陽之陰病苦悲傷不樂惡聞人聲少氣時汗出陰氣不通臂不能舉寸口脈壯大尺中無有此為陽干陰病苦腰背痛陰中傷足脛寒寸口偏絶者則臂偏不用其人兩手俱絶者不治寸口脈弱而遲弱即衛氣微遲即榮中寒榮為血血寒即發熱衛為氣氣微即心中飢飢而虛滿不能食寸口脈弱而緩弱則陽氣不足緩即胃氣有餘噫而吞酸食卒不下氣填於膈上一作下寸口脈微而弱微即無氣弱即血不足血不足即不能呼氣不足則不能吸呼吸不足則脅滿短氣寸口脈微而澀微即衛氣不得澀即榮氣不逮榮衛不能相將三焦無所仰身體痹不仁榮氣不足即疼而煩滿口即難言衛氣虛即惡寒而數缺寸口脈微而澀微即衛氣衰澀即榮氣不足衛衰其色黃榮不足其色青榮為根衛為葉榮衛俱微即根葉枯槁而寒栗咳逆唾腥吐涎沫寸口脈微而緩微即衛氣疏疏即膚空緩即胃氣足足即谷消而水化谷入於胃脈道乃地水入於經其血乃成榮盛則其膚必疏三焦絶經名曰血崩寸口脈微而數微即為風數即為熱微為風風即汗出數為熱振而寒栗寸口脈微而遲尺脈沉即為血滑即為實血實內結入絡胸臆肺痿色薄不能喘息而心堅脫色口不能言肝舉筋厥四逆不識人寸口脈微而濡濡即為弱微即為寒濡即惡寒弱即發熱濡即厥逆微濡相薄即為煩其氣在心寸口脈微尺中緊其人虛損多汗知陰常在絶不見陽寸口諸微為無陽諸濡為無血諸弱為發熱諸緊為寒微濡為血不足診關上脈第五關上浮而數胃中熱關上浮大風在胃中腹脹急心下淡淡然羸瘦不能食千金云關上浮大風有胃中弱口肩息心下淡淡食欲嘔關上細微而絶者腹中癖少氣不能食關上微而芤唾血亦吐血關上弦緊而細症在胃管關上緊而滑者蛔蟲動關上微浮積熱在胃中關上滑而大小不均是為病方欲來不出一二日內復欲發動其人欲多飲飲即注痢如痢止者生不止者死關上弦大有痛在臍左右上下脈經云關脈弦長者積在臍左右上下診尺中脈第六尺中緊數而弦下痢病遲中浮數小便不利尿黃尺中微而滑帶下病尺中微而芤尿血遲中弦而細症在臍下尺中細而急筋攣疼痹不能行尺中細而滑婦人欲産尺中虛小者足脛痿寒痹腳疼尺中虛者漏血小便不禁尺中沉細者名曰陰中之陰病苦兩腳疼酸不能久立陰氣衰小便有餘瀝陰下濕癢尺脈滑而浮大者名曰陰中之陽病苦少腹痛滿不能尿尿則陰中痛大便亦熱尺中牢長關上無有此為陰乾陽病苦兩脛重少腹引腰痛尺寸俱數有熱俱遲有寒尺寸俱濡發熱汗出尺寸俱浮直下此為督脈腰皆強痛不得俯仰大人癲病小兒風癇尺寸俱微血氣不足其人短氣尺寸俱牢直上直下此為通衝脈胸中有寒疝診雜病脈第七熱病大汗後脈不安靜者此段死熱病脈盛大而快不得汗此熱發也寒熱瘛瘲脈絶代者死熱病未得汗脈盛大者生細小者死熱病多汗脈虛小者生緊實者死熱病得汗脈常喘而熱不退者死汗出而衄其脈小滑者生大躁者死一云微細為難治傷寒脈浮而洪大者易治譫言妄語身熱脈洪大者生沉細而微手足四逆者死咳而尿血羸瘦脈大者死咳而羸瘦脈堅大者死上氣注液脈虛慢伏匿者生牢弦者死寒疰上氣脈虛濡者生牢急而疾者死上氣喘息脈滑手足溫者生澀而四肢寒者死上氣面浮腫肩息脈浮大者死上氣喘息脈滑者生大而快者死唾血脈沉弱者生一云緊強者死滑者生吐血脈牢實者死吐血鼻衄脈沉細者生浮大而牢者死中惡腹大脈緊實細者生浮大者死金瘡出血不斷脈大而止者七日死金瘡出血太多脈虛細者生大數者死金瘡所傷在陽處者去血四五升脈弱微緩而遲者生急疾者死人被笞榜內有結血脈實大者生虛小者死從高墮下及金瘡內有瘀血腹脹脈牢大者生沉細者死心腹痛脈沉細者生浮大而長者死腹脹脈浮者生虛小者死下痢脈微細者生浮大者死下痢脈代絶者不死腸澼便膿血脈沉細虛遲者生疾大而有熱者死腸澼下白沫脈沉者生浮者死腸澼下赤白脈細微而遲身體溫暖可治腸澼其脈滑者生浮者死懸絶者死泄痢脈緩時小結者生浮大而數者死洞泄或去膿血食不化者脈微小者生實急者死泄痢脈細微而澀者生緊大而滑者死泄痢寸關脈不見尺中時一見此腎氣見為難治下痢脈絶手足寒晬時脈還手足溫者生脈不還不溫者死霍亂脈大可治微細難治霍亂吐下脈微遲氣息劣口不欲言者不治病手足厥逆脈當沉細而澀反得堅大而滑者死水病脈洪大者生微細者死消渴脈數大者生細小浮短者死卒中風四肢不收唇口僻語言不正脈浮遲者生癲病卒忤脈堅弦實大者生虛伏濡小者死癲狂恍惚脈實牢者生沉細者死中風口噤不能言四肢不收其脈浮遲者生實大數急者死病風痹不仁痿厥脈虛數者生牢急者死目䀮䀮脈大緩者死閉目不欲見人脈得肝脈者生反得肺脈者死耳聾脈大者生沉遲細者難治堅積泄痢脈微細者生浮者死頭痛脈短澀者死浮滑者生中毒藥陽脈洪大而速者生微細者死脈經速作遲暴病脈微細者生大急洪直者死大人得小人脈者死脈但出不能入者死將死之脈如群鳥之聚一馬之馭系木交緊一作馳之狀如懸石之落出筋之上藏筋之下堅關之裡不在榮衛伺候交射不可知也困病脈如蝦之遊如魚之翔者死蝦游者冉冉而起尋復退沒不知所在久而復起起輒遲而沒去甚速是也魚翔者似魚不行而但掉尾動身其動疏而住久是也脈病人不病脈如屋漏雀啄者死屋漏者其脈既絶而止時復一起不相連屬也雀啄者脈來甚數而急疾絶止久已復頓來脈來如彈石去如解索者死彈石脈辟辟急也解索脈動數而隨散亂無次緒也脈來湧湧不去者死脈如轉豆者死脈如偃刀者死脈怒來忽去暫止復來者死脈中移者死脈久絶者死脈有表無里者死婦人尺脈按之不絶者胎也産後寸口焱疾不調者死沉微附骨不絶者生新産後渴熱病脈細而四脈冷者死三部脈沉浮正等不斷絶者有娠也妊娠脈滑疾重手按之不散者胎已三月也但疾不滑者五月也妊娠七八月脈實大牢強弦緊者生沉細者死欲産者其脈細而滑也婦人欲産其脈離經者曰生也新産脈小緩滑者生實大弦急者死已産脈沉虛小者生實牢堅者死婦人月經不通脈絶小實者生浮虛者死婦人脈寸關調如故而尺脈絶不至者月經不利當患少腹引腰絞痛氣積聚上叉胸脅也漏下赤白脈急疾者死遲滑者生婦人脈遲寸俱微弱則絶子不産也小兒脈沉者乳不消也小兒弦急者客忤氣也凡按人脈五十至而不止者五臟皆受氣足吉也四十動而一止一臟無氣四歲死三十動而一止者二臟無氣三歲死二十動面一止者三臟無氣二歲死一十動而一止者四臟無氣歲中死凡脈一動一止或三動一止或十動一止投數無常此死脈也命雖未盡正當小引日月耳凡脈一呼再至一吸再至呼吸定息其脈五至不大不小為平若一呼三至一吸三至始為得病也夫脈前大後小則為頭痛目眩前小後大則為胸滿短氣問曰何謂損至答曰脈有損至謂一呼再至曰平三至曰離經四至曰奪精五至曰死六至曰命絶此謂至脈也一呼一至曰離經二呼一至曰奪精三呼一至曰死四呼一至曰命絶此謂損脈也至脈從下上也損脈從上下也損脈之為病也一損損於皮毛皮聚而毛落二損損於血脈血脈虛少不能榮於五臟三損損於肌肉肌肉消瘦飲食不為肌膚四損損於筋筋緩不能自扶持五損損於骨骨痿不能起於床反此者至於收病從上下者骨痿不能起於床者死從下上者皮聚而毛落者死損其肺者益其氣損其心者調其榮衛損其脾者調其飲食適其寒溫損其肝者緩其中損其腎者益其精氣也凡脈一息再至為平無病也一息三至名離經離失也經常也其人榮衛已虧將欲病也一息四至為奪精其人已病也一息五至為絶命有大有小為難治一息六至為將滅一息七至為命盡一息八至為無魂一息九至為無魄一息十至為今死一息一至其人雖行當著床其人血脈已病諸氣皆不足也二息一至為危三息一至為困四息一至為行尸將死五息一至為定死
