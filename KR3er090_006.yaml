body:
  text: 卷第六婦人二產後心悶第一方四首治產後心悶眼不得開方當產婦頭頂上取發如指大令人用力挽之眼即開單行羚羊角散治產後心悶是血氣上衝方羚羊角一枚燒成灰上一味搗篩為散取東流水服方寸匕若不瘥須臾更服取瘥止單行羖羊角散治產後心悶方羖羊角燒作灰上一味搗篩為散以溫酒服方寸匕若不瘥須臾更服取瘥止亦治產難單行生赤小豆散主產後心悶方赤小豆上一味搗篩為散以東流水服方寸匕不瘥須臾更服即愈產後虛煩第二方一十三首薤白湯治產後胸中煩熱逆氣方薤白切半夏洗去滑人參甘草炙知母各二兩麥門冬半升去心石膏四兩打碎綿裹栝蔞三兩上八味㕮咀以水一斗三升煮取四升分為五服日三夜再熱甚加石膏知母各一兩竹根湯主產後虛煩方竹根細切一斗五升上以水二斗煮取七升去滓納小麥二升大棗二十枚復煮麥熟又納甘草一兩炙麥門冬一升去心湯成去滓溫服五合不瘥更服取瘥若短氣亦服之極佳人參當歸湯主產後煩悶不安方人參當歸芍藥麥門冬去心粳米一升乾地黃桂心各一兩大棗二十枚去核淡竹葉切三升上九味㕮咀以水一斗二升先煎竹葉及米取八升去滓納藥煮取三升適寒溫分三服若煩悶不安者當取豉一升以水三升煮取一升盡服之甚良甘竹茹湯主產後內虛煩熱短氣方甘竹茹人參茯苓黃芩甘草炙各一兩上五味㕮咀以水六升煮取二升分三服知母湯主產後乍寒乍熱通身溫熱胸心煩悶方知母三兩黃芩芍藥各二兩桂心甘草各一兩上五味㕮咀以水五升煮取二升五合分為三服一方不用桂心加生地黃竹葉湯主產後心煩悶不解方生淡竹葉切麥門冬去心小麥各一升大棗十四枚擘茯苓生薑各三兩切甘草二兩炙上七味㕮咀以水一斗先煮竹葉小麥取八升納諸藥煮取三升分為三服若心中虛悸者加人參二兩若其人食少無氣力者可更加白粳米五合氣逆者加半夏二兩淡竹茹湯主產後虛煩頭痛短氣欲死心中悶亂不起方生淡竹茹一升麥門冬五合去心小麥五合大棗十四枚一方用石膏生薑三兩切一方用乾薑甘草炙一兩上六味㕮咀以水八升煮竹茹小麥減一升仍納諸藥更煮二升分為二服羸人分為三服若有人參納一兩若無人參納茯苓一兩半亦佳人參茯苓皆治心煩悶及心驚悸安定精神有即為良無自依本方服一劑不瘥更作服之若逆氣者加半夏二兩洗去滑單行白犬骨散主產後煩悶不食方白犬骨燒之搗篩以水服方寸匕單行小豆散治產後煩悶不能食虛滿方小豆三七枚燒作屑以冷水和頓服之單行蒲黃散治產後苦煩悶方蒲黃上一味以東流水和服方寸匕極良治產後虛熱往來心胸中煩滿骨節疼及頭痛壯熱晡時輒甚又似微瘧方蜀漆葉黃芩桂心甘草炙各一兩生地黃一斤黃耆蝭母各三兩芍藥二兩上八味㕮咀以水一斗先煮地黃取七升去滓下諸藥煮取二升五合分三服湯治寒熱不損人芍藥湯治產後虛熱頭痛方白芍藥乾地黃牡蠣各五兩熬桂心三兩上四味㕮咀以水五升煮取三升半分三服湯不損人無毒亦治腹中急痛若通身發熱更加黃芩二兩大熱即除鹿角屑豉湯主婦人墮身血不盡去苦煩悶方鹿角屑一兩香豉一升半上二味以水三升先煮豉三沸去滓納鹿角屑攪令調頓服須臾血下陰脫第三方八首石灰坐漬法主產後陰道不閉方石灰一升熬令能燒草上一味以水二斗投灰中適寒溫入汁中坐漬之須臾復易如常法此是神秘方不傳已治人有驗當歸散治婦人陰脫當歸黃芩各二兩芍藥五分蝟皮半兩牡蠣二兩半熬上五味搗篩為散酒服方寸匕日三服禁舉重良黃芩散治婦人陰脫黃芩蝟皮各半兩芍藥一兩當歸三分牡蠣熬松皮及實百日陰乾燒灰一方用狐莖竹皮各二兩半上七味搗篩為散飲服方寸匕日三服禁勞勿冷食硫黃散治婦人陰脫硫黃半兩烏賊魚骨半兩五味子三銖上三味搗下篩以粉其上良日再三粉之治婦人陰脫鐵精羊脂傅方羊脂煎訖適冷暖塗上以鐵精傅脂上多少令調以火炙布溫以熨上漸推納之末磁石酒服方寸匕日三服亦治脫肛治婦人陰癢脫方礬石熬上一味末之每旦空腹酒和服方寸匕日三服又方取車𨊧脂傅之即愈當歸湯治婦人產後臟中風陰重洗方當歸獨活各三兩白芷地榆皮礬石各二兩熬上五味㕮咀以水一斗五升煮取一斗二升以洗浴之惡露第四方一十八首治產後瘕病燒秤錘酒方鐵秤錘燒令極赤投於酒一升中浸令無聲出錘頓服之不瘥更作紫湯治產後惡露未盡又兼有風身中急痛取大豆一升先取新布揩之令光生熬令豆不復聲才斷以清酒一升投豆中停三沸漉出滓每服一升日三夜一服乾地黃湯治產後惡露不盡除諸疾補不足乾地黃三兩芎藭桂心黃耆當歸各三兩細辛人參茯苓防風芍藥甘草炙各一兩上一十一味㕮咀以水一斗煮取三升分為三服日再夜一桃仁湯主產後往來寒熱惡血不盡方桃仁五兩去皮尖及雙仁吳茱萸二升黃耆當歸芍藥各二兩生薑柴胡去苗百鍊酥各八兩上八味㕮咀四物以酒一斗水二升合煮取三升絞去滓適寒溫先食服一升日三服厚朴湯主產後腹中滿痛惡露不盡方厚朴炙乾薑炮桂心各四兩黃芩芍藥乾地黃茯苓大黃各三兩桃仁去尖皮虻蟲熬去翅足甘草炙各二兩芒硝一兩枳實炙白朮各五兩上一十四味㕮咀以水一斗清酒三升合煮取三升絞去滓下芒硝令烊適寒溫服一升日三一方用梔子十四枚澤蘭湯主婦人產後惡露不盡腹痛不除小腹急痛痛引腰背少氣力方澤蘭生地黃當歸各二兩生薑芍藥各一兩大棗十枚擘甘草一兩半炙上七味切以水九升煮取三升分為三服墮身欲死者服之亦瘥甘草湯主產後余血不盡逆搶心胸手足冷唇乾腹脹短氣甘草炙芍藥桂心各三兩大黃四兩阿膠三兩上五味㕮咀以東流水一斗煮取三升絞去滓納阿膠令烊分為三服一服入腹面即有顏色一日一夜盡此三服即下惡血將養如新產婦也大黃湯治產後惡露不盡大黃當歸生薑牡丹去心芍藥甘草炙各一兩吳茱萸一升上七味㕮咀以水一斗煮取四升分為四服一日令盡極佳加人參二兩名人參大黃湯當歸湯治產後血留下焦不去當歸桂心甘草炙各二兩芎藭芍藥各三兩乾地黃四兩上六味㕮咀以水一斗煮取五升分為五服柴胡湯治產後往來寒熱惡露不盡柴胡去苗生薑各二兩切桃仁五十枚去皮尖當歸芍藥黃耆各三兩吳茱萸二升上七味㕮咀以清酒一斗三升煮取三升先食服一升日三服千金以水煮大黃湯主產後余疾有積血不去腹大短氣不得飲食上衝心胸時時煩憒逆滿手足煩疼胃中結熱大黃黃芩甘草炙各一兩蒲黃半兩大棗三十枚擘上五味㕮咀以水三升煮取一升清朝服至日中當利若下不止進冷粥半升即止若不下與少熱飲自下人羸者半之千金名蒲黃湯有芒硝一兩梔子湯治產後兒生處空留血不盡小腹絞痛梔子三十枚以水一斗煮取六升納當歸芍藥各三兩蜜五合生薑五兩羊脂一兩於梔子汁中煎取二升分為三服日三大黃湯產後血不流方大黃黃芩當歸芍藥芒硝甘草炙各一兩桃仁杏仁各三十枚去皮尖上八味㕮咀以水一斗煮取三升去滓納芒硝令烊分為四服法當下利利若不止作白粥飲一杯暖服去一炊久乃再服生地黃湯治產後三日或四五日腹中余血未盡絞痛強滿氣息不通生地黃五兩生薑三兩大黃細辛甘草炙桂心黃芩茯苓芍藥當歸各一兩半大棗二十枚擘上一十一味㕮咀以水八升煮取二升五合分為三服日三禁生冷等良大黃乾漆湯治新產後有血腹中切痛大黃乾漆熬乾地黃乾薑桂心各一兩上五味㕮咀以水清酒各五升煮取三升去滓溫服一升血當下若不下明日更服一升滿三服病無不瘥麻子酒治產後血不去麻子五升搗以酒一斗漬一宿明旦去滓服一升先食服不瘥復服一升不吐下不得與男子交通一月將養如初產法升麻湯治產後惡物不盡或經一月半歲一歲升麻三兩以酒五升煮取二升分再服當吐下惡物莫怪之極良大黃苦酒治產後子血不盡大黃八銖切以苦酒二升合煮取一升適寒溫服之即血下甚良心痛第五方四首羊肉桂心湯主產後虛冷心痛方羊肉三斤桂心四兩當歸乾薑甘草炙各二兩吳茱萸人參芎藭乾地黃各二兩上九味㕮咀以水一斗煮肉取汁五升去肉納藥煮取二升半分為三服一方有桔梗三兩蜀椒湯主產後心痛此大寒冷所為方蜀椒二合汗去目閉口者當歸半夏洗去滑桂心甘草炙茯苓人參各二兩芍藥三兩蜜一升生薑汁五合上一十味㕮咀以水九升煮椒令沸然後納藥煮取二升半去滓納薑汁及蜜復煎取一升半一服五合漸加至六合盡勿吃冷食佳治產後心痛方一云大岩蜜湯乾地黃當歸獨活芍藥細辛桂心乾薑小草甘草炙各三兩吳茱萸一升上一十味㕮咀以水九升煮取三升分三服千金用蜜五合芍藥湯主產後心痛此大寒冷所為方芍藥桂心各三兩當歸半夏洗去滑茯苓各二兩蜀椒二合汗生薑汁五合蜜一升上八味㕮咀以水七升煮取二升去滓納薑汁及蜜復煎取二升五合一服五合漸加至六合其服藥每相去一炊久再服忌冷食腹痛第六方一十六首乾地黃湯主產後兩脅滿痛兼除百病乾地黃芍藥各二兩生薑五兩當歸蒲黃各三兩桂心六兩大棗二十枚擘甘草炙一兩上八味㕮咀以水一斗煮取二升半分三服芍藥湯主產後腹痛芍藥四兩茯苓三兩人參乾地黃甘草各二兩上五味㕮咀以清酒兼水各六升煮取三升分服日三豬腎湯治產後腹痛豬腎一枚茱萸一升黃耆當歸芎藭人參茯苓乾地黃各二兩生薑切厚朴炙甘草炙各三兩桂心四兩半夏五兩洗去滑上一十三味㕮咀以水二斗煮豬腎令熟取一斗吹去肥膩納藥又以清酒二升煮取三升分為四服日三夜一服又方羊肉一斤半蔥白一斤乾薑當歸桂心各三兩芍藥芎藭乾地黃甘草炙各二兩上九味㕮咀先以水二斗煮肉取一斗去肉納藥煎取三升分為四服一日令盡吳茱萸湯主婦人先有寒冷胸滿痛或心腹刺痛或嘔吐或食少或腫生後益劇或寒或下更劇氣息綿惙欲絕皆主之吳茱萸二兩防風桔梗乾薑乾地黃當歸細辛甘草炙各半兩上八味㕮咀以水四升煮取一升五合分為三服緩中蔥白湯主產後腹痛少氣蔥白當歸人參半夏洗去滑細辛各二兩天門冬去心芍藥乾薑甘草炙各六兩生地黃取汁吳茱萸各一升上一十一味㕮咀以水七升煮取二升一服一升日夜服之令盡羊肉當歸湯主產後腹中心下切痛不能食往來寒熱若中風乏氣力方羊肉三斤去脂當歸二兩黃芩一方用黃耆芎藭防風各一兩一方用人參生薑五兩芍藥甘草炙各三兩上八味㕮咀以水二斗煮肉取一斗出肉納諸藥煎取三升分為三服蒲黃湯主產後余疾胸中少氣腹痛頭疼余血未盡除腹中脹滿欲絕方蒲黃生薑生地黃各五兩芒硝二兩桃仁二十枚去皮尖芎藭桂心各一兩大棗十五枚擘上八味㕮咀以水九升煮取二升五合去滓納芒硝分為三服良驗敗醬湯主產後疾痛引腰腹如錐刀刺方敗醬三兩上一味切以水四升酒二升微火煎取二升適寒溫服七合日三食前服之大良千金有桂心芎藭各一兩半當歸一兩為四味芎藭湯主產後腹痛芎藭二兩女萎五分黃芩前胡桃仁去皮尖桂心各一兩芍藥大黃各一兩半蒲黃五合生地黃切一升半甘草二兩炙當歸三兩上一十二味㕮咀以水一升酒三升合煮取三升分為四服日三夜一服千金有黃耆無黃芩獨活湯主產後腹痛引腰脊拘急方獨活當歸芍藥生薑桂心各三兩大棗一十枚擘甘草二兩炙上七味㕮咀以水八升煮取三升分三服相去如十里久再進之芍藥黃耆湯治產後心腹痛方芍藥四分黃耆三兩白芷桂心生薑甘草炙各二兩大棗十枚擘上七味㕮咀以酒並水各五升合煮取三升空腹服一升日三服千金有人參當歸芎藭地黃茯苓為十二味桃仁芍藥湯治產後疾痛方桃仁半升去尖皮芍藥三兩芎藭當歸乾漆熬桂心甘草炙各二兩上七味㕮咀以水八升煮取三升分為三服服別相去一炊久再服單行茱萸酒治產後腹內疾痛方吳茱萸一升以酒三升漬一宿煎取半升頓服之亦可再服之單行桂酒主產後疾痛及卒心腹痛方桂心三兩切以酒三升煮取二升分為三服單行生牛膝酒主產後腹中甚痛方生牛膝根五兩切以酒五升煮取二升分為二服若用干牛膝須以酒漬之然後可煮虛損第七方一十七首羊肉黃耆湯主產後虛乏當補益方羊肉三升黃耆麥門冬各三兩去心大棗三十枚擘乾地黃茯苓當歸芍藥桂心甘草炙各二兩上一十味㕮咀以水二斗煮肉取一斗去肉納藥煎取三升分為三服大良鹿肉湯主產後虛悶勞損補之方鹿肉四斤乾地黃芍藥茯苓黃耆麥門冬去心甘草各二兩炙芎藭當歸人參各三兩生薑六兩大棗二十枚擘半夏一升洗去滑上一十三味㕮咀以水三斗煮肉取二斗去肉納藥煎取三升分為四服日三夜一服獐骨湯治產後虛乏五勞七傷虛勞不足臟腑冷熱不調方獐骨一具銼遠志去心黃耆芍藥橘皮茯神厚朴炙芎藭甘草炙各三兩當歸乾薑防風獨活各二兩生薑切桂心各四兩上一十五味㕮咀以水三斗煮獐骨取一斗去滓納藥煮取三升分為四服羊肉湯主產後及傷身大虛上氣腹痛兼微風方羊肉二斤無羊肉用獐肉代麥門冬七合去心生地黃五兩大棗十二枚擘黃耆人參獨活桂心茯苓甘草炙各二兩上一十味㕮咀以水二斗煮肉取一斗去肉納藥煮取三升半分為四服日三夜一服千金有乾薑羊肉生地黃湯主產後三日補中理臟強氣力消化血方羊肉二斤芍藥三兩生地黃切二升當歸芎藭人參桂心甘草炙各二兩上八味㕮咀以水二斗煮肉取一斗去肉納藥煎取三升分為四服日三夜一服羊肉杜仲湯治產後腰痛咳嗽方羊肉四斤杜仲炙紫菀桂心當歸白朮各三兩細辛五味子款冬花厚朴炙附子炮去皮萆薢人參芎藭黃耆甘草炙各二兩生薑八兩切大棗三十枚擘上一十八味㕮咀以水二斗煮肉取一斗去肉納藥煎取三升分溫三服當歸建中湯治產後虛羸不足腹中疾痛不止吸吸少氣或若小腹拘急攣痛引腰背不能飲食產後一月日得服四五劑為善令人強壯內補方當歸四兩桂心三兩甘草炙二兩芍藥六兩生薑三兩大棗十二枚擘上六味㕮咀以水一斗煮取三升分為三服一日令盡苦大虛納飴糖六兩作湯成納之於火上暖令飴糖消若無生薑則以乾薑三兩代之若其人去血過多崩傷內衄不止加地黃六兩阿膠二兩合八種作湯成去滓納阿膠若無當歸以芎藭代之內補芎藭湯主婦人產後虛羸及崩傷過多虛竭腹中疾痛芎藭乾地黃各四兩芍藥五兩桂心二兩大棗四十枚擘乾薑上七味㕮咀以水一斗二升煮取三升分為三服若不瘥更作至三劑若有寒苦微下加附子三兩炮主婦人虛羸少氣七傷損絕腹中拘急痛崩傷虛竭面目無色及唾血甚良大補中當歸湯治產後虛損不足腹中拘急或溺血小腹苦痛或從高墮下犯內及金瘡血多內傷男子亦宜服之當歸乾薑續斷桂心各三兩乾地黃六兩芍藥四兩芎藭麥門冬去心白芷甘草炙各二兩大棗四十枚擘吳茱萸一升上一十二味㕮咀以酒一斗漬藥一宿明旦以水八升合煮取五升去滓分溫五服日三夜二服有黃耆入二兩為佳緩中湯主婦人產後腹中拘急及虛滿少氣產後諸虛不足寬中補寒吳茱萸一升乾薑當歸白芷人參甘草炙各二兩麥門冬去心半夏洗去滑各三兩芍藥六兩細辛一兩生地黃一斤取汁上一十一味㕮咀以水一斗煮取三升去滓納地黃汁更上火合煎三兩沸溫服一升日三服若無當歸以芎藭四兩代之大補湯治產後虛不足少氣乏力腹中拘急痛及諸疾痛內崩傷絕虛竭裡急腰及小腹痛當歸乾地黃半夏洗去滑桂心各三兩吳茱萸一升一本無人參麥門冬去心芎藭乾薑甘草炙白芷各二兩芍藥四兩大棗四十枚擘上一十三味㕮咀以水一斗煮取三升分三服當歸芍藥湯治產後虛損逆害飲食方當歸一兩半芍藥人參桂心生薑切甘草炙各一兩乾地黃二兩大棗二十枚擘上八味㕮咀以水七升煮取三升分為三服日三鮑魚湯主產後腹中虛極水道閉絕逆脹咽喉短氣方鮑魚一斤半麻子仁細辛茯苓生薑切五味子各一兩地黃五兩上七味㕮咀以水一斗煮鮑魚如食法取汁七升納藥煎取三升分為三服大有神驗厚朴湯主產後四日之中血氣虛口中乾噓吸方厚朴炙枳實炙生薑各三兩芍藥五味子茯苓前胡各一兩人參半兩大棗二十枚擘上九味㕮咀以水六升煮取二升五合分為三服適寒溫服禁冷物生地黃湯主產後虛損少氣方生地黃人參知母桂心厚朴炙甘草炙各二兩赤小豆三升上七味㕮咀以水二斗五升煮地黃取一斗去滓納藥煎取三升分為三服氣奔湯主婦人奔豚氣積勞臟氣不足胸中煩躁關元以下如懷五千錢狀方厚朴炙當歸細辛芍藥桔梗石膏碎桂心各三兩大黃五兩乾地黃四兩乾薑澤瀉黃芩甘草炙各五兩上一十三味㕮咀以水一斗煮取三升分溫三服服三劑佳千金有吳茱萸無大黃杏仁湯治產後虛氣方杏仁去皮尖雙仁者蘇葉各一升半夏一兩洗生薑十兩桂心四兩人參橘皮麥門冬去心白前各三兩上九味㕮咀以水九升煮取二升五合分三服
