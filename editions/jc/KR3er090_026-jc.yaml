右患右刺左也都患刺兩畔咽喉酸辛灸少衝七壯雀矢大注神門合谷主喉痹心煩腳氣第六法三首論一首初灸風市次伏兔次犢鼻次膝目次三里次上廉次下廉次絕骨凡八穴風市穴令病人起正身平立垂兩手直下舒十指掩著兩髀便點手中指頭髀大筋上灸百壯逐輕重灸之輕者不可減百壯重者一穴五六百壯伏兔穴令病人累夫端坐以病人手夫橫掩膝上夫下旁與曲膝頭齊上旁側夫際當中央是灸百壯亦可五十壯犢鼻穴在膝頭蓋骨上際外角平處以手按之得節解是一法云在膝頭下近外三骨箕踵中動腳以手按之得窟解是灸五十壯膝目穴在膝頭骨下兩旁陷者宛宛中是灸百壯三里穴在膝頭骨節下一夫附脛骨外是一法云在膝頭骨節下三寸人有長短大小當以病人手夫度取灸百壯上廉穴在三里下一夫亦附脛骨外是灸百壯下廉穴在上廉下一夫亦附脛骨外是灸百壯絕骨穴在足外踝上一夫一云四寸是灸百壯凡此諸灸不必一頓灸盡壯數可日日報灸之三日之中令盡壯數為佳凡病一腳灸一腳病兩腳便灸兩腳也凡腳弱病多著兩腳一方云覺腳異便灸三里及絕骨各一處兩腳異者合四穴灸之多少逐病輕重大要雖病輕不可減百壯不瘥速令以次灸之多則佳腳疼三陰交三百壯神良一云灸絕骨最要論曰有人得之不以為事不覺忽然入腹腹腫心熱其氣大上遂至絕命當知微覺有異即須大灸之乃得應手即瘥亦依舊支法存灸之梁丘犢鼻三里上廉下廉解谿太中陽陵泉絕骨崑崙陰陵泉三陰交足太陽復溜然谷湧泉承山束骨等凡一十八穴舊法多灸百會風府五臟六腑俞募頃來灸者悉覺引氣向上慎不得灸以上大忌之又灸足十指奇端去奇一分兩足凡八穴名曰八沖極下氣足十指端名曰氣端日灸三壯其八沖可日灸七壯氣下即止艾炷小作之諸風第七法六十九首論一首肺中風者其人偃臥而胸滿短氣冒悶汗出者肺風之證也視眼以下鼻上兩邊下行至口色白者尚可治速灸肺俞百壯小心減之若色黃者此為肺已傷化為血矣不可復治其人當妄言掇空指地或自拈衣尋縫如此數日死若為急風所中便迷妄恍惚狂言妄話或少氣惙惙或不能言若不速治宿昔而死亦覺便灸肺俞膈俞肝俞數十壯急服續命湯可救也若涎唾止者既灸當與湯也肝中風者但踞坐不得低頭繞兩眼連額微有青者肝風之證也若唇色青面黃尚可治急灸肝俞百壯急服續命湯若色大青黑者此為肝已傷不可復治數日而死心中風者其人但得偃臥不得傾側悶亂冒絕汗出心風之證也若唇正赤尚可治灸心俞百壯急服續命湯若或青或白或黃或黑此為心已壞為水不可復治旬日死一云五六日死脾中風者其人但踞坐而腹滿視身通黃口吐涎汁尚可治灸脾俞百壯急服續命湯目下青手足青不可復治腎中風者其人踞坐腰痛視脅左右若末有黃色如餅粢大尚可治灸腎俞百壯急服續命湯若齒黃赤鬢髮直面土色不可復治大腸中風者臥而腸鳴不止灸大腸俞百壯服續命湯論曰凡風病內外沉浮者內是五臟外是皮膚沉是骨髓浮是血脈若在腠理湯藥所及若在五臟酒醪所至若在血脈針灸所中深在骨髓扁鵲自云不能如何風痱者卒不以言口噤手不遂而強直灸法度病者手小指內岐間至指端為度以置臍上直望心下丹注度上端畢又作兩度續在註上合其下開上取其本度橫置其開上令三合其壯如倒作厶字形也男度右手女度左手嫌不分明故以丹注三處起火各百壯夫眼瞤動口偏喎舌不轉者灸口吻邊橫紋赤白際逐左右隨年壯三報之不瘥更報肝風占候口不能言灸鼻下人中次大椎次肝俞各五十壯心風灸心俞各五十壯脾風灸脾俞各五十壯脾風占候言聲不出或手上下灸手十指頭次灸人中大椎兩耳門前脈去耳門上下行一寸次兩大指節上下六穴各七壯卒中風口喎以葦筒長五寸以一頭刺耳孔中四畔以面密塞勿令泄氣一頭納大豆一顆並艾燒之令燃灸七壯瘥患右灸左患左灸右千金不傳又灸手交脈三壯左灸右右灸左其炷如鼠失橫安之兩頭放火燒之凡卒中風中噤不得開灸頰車二穴穴在耳下八分小近前灸五壯即得語又隨年壯口僻左右灸之治屍厥法凡屍厥如死脈動如故針百會入二分補之灸熨兩脅又針足中指頭去甲如韭葉又針足大指甲下內側去甲三分灸失喑不語法先灸天窗五十壯訖息火乃移灸百會五十壯畢還窗五十壯若初發先灸百會則風氣不得泄內攻五臟當閉伏更失喑也所以先灸天窗次灸百會乃佳一灸五十壯息火泄復灸之視病輕重重者處各三百壯輕者以意一云次灸肩井得二百壯即灸二里三壯若五壯以下氣也鳩尾可灸百壯灸至五十壯暫息火也又法凡一切中風服藥益居者但是風穴皆灸之三壯神良欲除根本必須火艾專恃湯藥則不可瘥灸角弓反張法唇青眼戴角弓反張始覺發動即灸神庭七壯穴在當鼻直上髮際次灸曲差二穴各七壯穴在神庭兩旁各一寸半次灸上關二穴各七壯在耳前上廉起骨陷中一名客主人次灸下關二穴各七壯在耳前動脈下空下廉陷中次灸頰車二穴各七壯穴在前下曲頰端陷中次灸廉泉一穴七壯在當頤直下骨後陷中次灸囟會一穴七壯在神庭上一寸次灸百會一穴七壯在當頂上正中央次灸本神二穴各二壯在耳直上入髮際二分次灸天柱二穴各七壯在項後大筋外入髮際陷中次灸陶道一穴七壯在大椎下間次灸風門二穴各七壯在第二椎下兩旁各一寸半次灸心俞二穴各七壯在第五椎下兩旁各一寸半次灸肝俞二穴各七壯在第九椎下兩旁各一寸半次灸腎俞二穴各七壯在第十四椎下兩旁各一寸半次灸膀胱俞二穴各七壯在第十九椎下兩旁各一寸半次灸曲池二穴各七壯穴在肘外曲頭陷中屈肘取之次灸肩髃二穴各七壯在兩肩頭之中兩骨間陷中次灸支溝二穴各七壯在手腕後二寸兩骨間陷中次灸合谷二穴各七壯大手大指虎口兩骨間陷中次灸間使二穴各七壯在掌後三寸兩筋間次灸陽陵泉二穴各七壯在膝下骨前陷中次灸陽輔二穴各七壯在外踝上絕骨陷中次灸崑崙二穴各七壯在外踝後跟骨上陷中上以前主久風卒風緩急諸風發動不自覺知或心腹脹滿或半身不遂或口噤不言涎唾自出目閉耳聾或舉身冷直或煩悶恍惚喜怒無常凡有風皆灸之神驗鼻交額中一穴針入六分得氣即瀉留三呼瀉五吸不補亦宜灸然不如針此主癲風弓角反張羊鳴大風青風面風如蟲行卒風多睡健忘心中憒憒口噤暗到不識人黃疸急黃八種大風此之一穴皆主之莫不神驗慎酒面生冷醋滑豬魚蕎麥漿水雜灸法凡風灸上星二百壯又前頂二百壯百會一百壯腦戶三百壯風府三百壯凡大風灸百會七壯凡百諸風灸大椎平處兩相二寸三分以病人指寸量之各一百壯治風耳後八分半有穴灸一切風若狂者亦瘥耳門前灸百壯治卒病惡風欲死不言及肉癉不知人灸第五椎名曰臟俞各一百五十壯扁鵲曰凡心風灸心俞各五十壯第五節對心是也肝俞主肝風腹脹食不消化吐血酸削四肢羸露不欲食鼻衄目䀮䀮眉頭脅下痛少腹急灸百壯大腸俞主風腹中雷鳴大腸灌沸腸澼泄痢食不消化少腹絞痛腰脊痛強大小便難不能飲食灸百壯三報之治卒中惡悶熱毒欲死灸足大指橫紋隨年壯若筋急不能行者若內筋急灸內踝上三十壯外筋急灸外踝上三十壯愈若戴睛上插者灸兩目後眥二七壯若不語灸第三椎五百壯若不識人灸季肋頭七壯若眼反口噤腹中切痛灸陰囊下第一橫理十四壯腋門二穴主風灸五十壯亦可九壯治風身重心煩足脛疼灸絕骨百壯在外踝上三寸一云四十又云一十六凡卒中風口噤不開灸機關二穴在耳下八分近前灸五壯即愈一云隨年壯僻者逐左右灸之治頭風搖動灸腦後玉枕中間七壯治猥遐風偏風半身不遂法肩髃主偏風半身不遂熱風頭風刺風手不上頭捉物不得挽弓不開臂冷痠疼無力針入八分留三呼瀉五吸在膊骨頭陷中平手取之偏風不遂可至二百壯過多則臂強慎酒肉五辛熱食漿水又針曲池入七分得氣即瀉然後補之大宜灸日十壯至一百壯止十日更報下少至二百壯又針列缺入三分留三呼瀉五吸亦可灸之日七壯至一百總至三百壯陽池上一夫兩筋間陷中主刺熱風耳聾鳴手不仁冷風手戰偏風半身不遂陽池支溝下一夫覆腕當紋宛宛中亦主或因損後把捉不得針入三分留三呼瀉五吸忌灸商丘在內踝前陷中主偏風癉腳不得履地刺風頭風熱風陰癉針入三分留三呼瀉五吸疾出之忌灸偏風半身不遂腳重熱風疼不得履地針入四分留三呼得氣即瀉疾出針於痕上灸之良七壯灸猥遐風半身不遂法先灸天窗次大門腦後尖骨上一寸次承漿次風池次曲池次手髓孔腕後尖骨頭宛宛中次手陽明大指奇後次腳五指屈兩腳膝腕紋次腳髓孔足外踝後一寸次足陽明拇指奇三寸各灸百壯若有手足患不遂灸百會次本神次肩髃次心俞次手少陽次足外踝下容爪外並依左右百壯面上遊風如蟲行習習然起則頭旋眼暗頭中溝壟起灸天窗次兩肩上一寸當瞳仁次曲眉在兩眉間次手陽明次足陽明各灸二百壯時行法第八法四首初得一日二日但灸心下三處第一去心下一寸各巨闕第二去心下二寸名上管第三去心下三寸名胃管各灸五十壯然或人形小大不同恐寸數有異可以繩度之隨其長短寸數最佳取繩從心骨鳩尾頭少度至臍孔中屈之取半當繩頭名胃管又中屈更為二分從胃管向上度是上管上度取一分是巨闕大人可五十壯小兒可一七二壯隨其年灸以意量之若病者三四日以上宜先灸囟上二十壯以繩度鼻正上盡髮際中屈繩斷去半便從髮際度入發中灸繩頭名天窗又灸兩顳顬又灸風池又灸肝俞百壯余處各二十壯又灸太衝三十壯神驗無比豌肉瘡灸兩手腕研子骨尖上三壯男左女右黃疸第九法一十一首唇里正當承漿邊逼齒斷針三鋥治馬黃黃疸顳顬在眉眼尾中間上下有來去絡脈是針灸之治疸氣溫病夾人中火針治馬黃疸通身並黃語音已不轉者灸錢孔百壯度乳至臍中屈肋頭骨是灸百壯治黃疸夾承漿兩邊各一寸治馬黃急疫灸太衝七壯又云針灸隨便又灸風府熱府肺俞心俞肝俞脾俞腎俞男陰縫拔陰反向上灸治馬黃黃疸若女人玉門頭是穴針灸無在腳跟在白肉後際針灸隨便治馬黃黃疸臂石子頭還取病人手自捉臂從腕中大淵紋向上一夫接白肉際灸七壯治馬黃黃疸黃疸灸第七椎七壯黃汁出瘧病第十法一十三首瘧灸上星及大椎至發時灸滿百壯艾炷如黍火粒俗人不解務大炷也又覺小異灸百會七壯若更發更七壯極難瘥不過三灸又灸風池二穴三壯又灸腎俞百壯又灸三間在虎口第二指節下二寸三年瘧欲發即下火治一切瘧無問處所仰臥以繩量其兩乳間中屈從乳向下灸度頭隨年壯男左女右冶瘧刺足少陰出血愈治諸瘧而脈不見者刺十指間見血血去心已先視身赤如小豆者皆取之瘧日西發者臨泣主之瘧實則腰背痛虛則鼻衄飛揚主之瘧多汗腰痛不能俯仰目如脫項如拔崑崙主之灸一切瘧尺澤主之凡瘧有不可瘥者從未發前灸大椎至發時滿百壯無不瘥
