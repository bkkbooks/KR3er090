皮味苦微溫有毒主暴水癥結積聚生山南平澤赤瓜木味苦寒無毒主水痢風頭身癢生平陸所在有之實味酸冷無毒汁服止水痢沐頭及洗身上瘡癢一名羊梂一名鼠查訶黎勒味苦溫無毒主冷氣心腹脹滿下食生交愛州楓柳皮味辛大熱有毒主風齲齒痛生原州賣子木味甘微溫咸平無毒主折傷血內溜續絶補骨髓止痛安胎生山谷中其葉似柿出劍南邛州大空味辛苦平有小毒主三蟲殺蟣蝨生山谷中取根皮作末油和塗蟣蝨皆死紫真檀味鹹微寒主惡毒風毒椿木葉味苦有毒主洗瘡疥風疽水煮葉汁用之皮主甘𧈟樗木根葉尤良胡椒味辛大溫無毒主下氣溫中去痰除臟腑中風冷生西戎形如鼠李子調食用之味甚辛辣而芳香當不及蜀椒橡實味苦微溫無毒主下痢厚腸胃肥健人其殼為散及煮汁服亦主痢並堪染用一名杼鬥槲櫟皆有鬥以櫟為勝所在山谷中皆有無食子味苦溫無毒主赤白痢腸滑生肌肉出西戎楊櫨木味苦寒有毒主疽瘻惡瘡水煮葉汁洗瘡立瘥生籬垣間一名空疏所在皆有槲若味甘苦平無毒主痔止血療血痢止渴取脈灸用之皮味苦水煎濃汁除蠱毒及瘻俗用甚效人獸部五十六味發皮味苦溫小寒無毒主五癃關格不通利小便水道療小兒癇大人痓仍自還神化合雞子黃煎之消為水療小兒驚熱下痢亂髮微溫主咳嗽五淋大小便不通小兒驚癇止血鼻衄燒之吹內立止人乳汁主補五臟令人肥白悅澤頭垢主淋閉不通人屎寒主療時行大熱狂走解諸毒宜用絶乾者搗末沸湯沃服之人溺療寒熱頭疼溫氣童男者尤良溺白垽療鼻衄湯火灼瘡東向圊廁溺坑中青泥垽療喉痹消癰腫若已有膿即潰龍骨味甘平微寒無毒主心腹鬼疰精物老魅咳逆瀉痢膿血女子漏下癥瘕堅結小兒熱氣驚癇療心腹煩滿四肢痿枯汗出夜臥自驚恚怒伏氣在心下不得喘息腸癰內疽陰蝕止汗縮小便溺血養精神定魂魄安五臟白龍骨療夢寐瀉精小便瀉精齒主小兒大人驚癇癲疾狂走心下結氣不能喘息諸痙殺精物小兒五驚十二癇身熱不可近大人骨間寒熱又殺蠱毒角主驚癇瘛瘲身熱如火腹中堅及熱瀉久服輕身通神明延年生晉地川穀及太山岩水岸土穴中死龍處採無時牛黃味苦平有小毒主驚癇寒熱熱盛狂痓除邪逐鬼療小兒百病諸癇熱口不開大人狂癲又墮胎久服輕身增年令人不忘生晉地平澤於牛得之即陰乾百日使時燥無令見日月光麝香味辛溫無毒主辟惡氣殺鬼精物溫瘧蠱毒癇痓去三蟲療諸凶邪鬼氣中惡心腹暴痛脹急痞滿風毒婦人産難墮胎去面𪒟目中膚翳久服除邪不夢寤魘寐通神仙生中臺川穀及益州雍州山谷春分取之生者益良馬乳止渴牛乳微寒補虛羸止渴羊乳溫補寒冷虛乏酥微寒補五臟利大腸主口瘡熊脂味甘微寒微溫無毒主風痹不仁筋急五臟腹中積聚寒熱羸瘦頭瘍白禿面皯皰食飲吐嘔久服強志不飢輕身長年生雍州山谷十一月取白膠味甘平溫無毒主傷中勞絶腰痛羸瘦補中益氣婦人血閉無子止痛安胎療吐血下血崩中不止四肢痠疼多汗淋露折跌傷損久服輕身延年一名鹿角膠生雲中煮鹿角為之得火良阿膠味甘平微溫無毒主心腹內崩勞極灑灑如瘧狀腰腹痛四肢痠疼女子下血安胎丈夫小腹痛虛勞羸瘦陰氣不足腳痠不能久立養肝氣久服輕身益氣一名敷致膠生東平郡煮牛皮作之出東阿醍醐味甘平無毒主風邪痹氣通潤骨髓可為摩藥性冷利功優於酥生酥中底野迦味辛苦平無毒主百病中惡客忤邪氣心腹積聚出西戎酪味甘酸寒無毒主熱毒止渴解散發利除胸中虛熱身面上熱瘡肌瘡犀角味苦酸鹹寒微寒無毒主百毒蠱疰邪鬼瘴氣殺鉤吻鴆羽蛇毒除邪不迷惑魘寐療傷寒溫疫頭痛寒熱諸毒氣久服輕身駿健生永昌山谷及益州羚羊角味鹹苦寒微寒無毒主明目益氣起陰去惡血注下闢蠱毒惡鬼不祥安心氣常不魘寐療傷寒時氣寒熱熱在肌膚溫風注毒伏在骨間除邪氣驚夢狂越僻謬及食噎不通久服強筋骨輕身利丈夫生石城山川穀及華陰山採無時羖羊角味鹹苦溫微寒無毒主青盲明目殺疥蟲止寒瀉辟惡鬼虎狼止驚悸療百節中結氣風頭痛及蠱毒吐血婦人産後余疾燒之殺鬼魅闢虎狼久服安心益氣輕身生河西川穀取無時勿使中濕濕即有毒羊髓味甘溫無毒主男女傷中陰氣不足利血脈益經氣以酒服之青羊膽主青盲明目羊肺補肺主咳嗽羊心止憂恚膈氣羊腎補腎氣益精髓羊齒主小兒羊癇寒熱三月三日取之羊肉味甘大熱無毒主緩中字乳余疾及頭腦大風汗出虛勞寒冷補中益氣安心止驚羊骨熱主虛勞寒中羸瘦羊屎燔之主小兒瀉痢腸鳴驚癇牛角鰓下閉血瘀血疼痛女人帶下血燔之味苦無毒水牛角療時氣寒熱頭痛髓補中填骨髓久服增年髓味甘溫無毒主安五臟平三焦溫骨髓補中續絶傷益氣止瀉痢消渴以酒服之膽可丸藥膽味苦大寒除心腹熱渴利口焦燥益目精心主虛忘肝主明目腎主補腎氣益精齒主小兒牛癇肉味鹹平無毒主消渴止吐瀉安中益氣養脾胃自死者不良屎寒主水腫惡氣用塗門戶著壁者燔之主鼠瘻惡瘡黃犍牛烏牯牛溺主水腫腹脹腳滿利小便白馬莖味鹹甘平無毒主傷中脈絶陰不起強志益氣長肌肉肥健生子小兒驚癇陰乾百日眼主驚癇腹滿瘧疾懸蹄主驚邪瘛瘲乳難辟惡氣鬼毒蠱疰不祥止衄血內漏齲齒生雲中平澤白馬蹄療婦人瘻下白崩赤馬蹄療婦人赤崩齒主小兒馬癇鬐頭膏主生髮鬐毛主女子崩中赤白心主喜忘肺主寒熱小兒莖痿肉味辛苦冷主除熱下氣長筋強腰脊壯健強志輕身不飢脯療寒熱痿痹屎名馬通微溫主婦人崩中止渴及吐下血鼻衄金瘡止血頭骨主喜眠令人不睡溺味辛微寒主消渴破癥瘕堅積聚男子伏梁積疝婦人瘕疾銅器承飲之牡狗陰莖味鹹平無毒主傷中陰痿不起令強熱大生子除女子帶下十二疾一名狗精六月上伏取陰乾百日膽主明目痂瘍惡瘡心主憂恚氣除邪腦主頭風痹下部𧈟瘡鼻中息齒主癲疾寒熱卒風痱伏日取之頭骨主金瘡止血四腳蹄煮飲之下乳汁白狗血味鹹無毒主癲疾發作肉味鹹酸溫主安五臟補絶傷輕身益氣屎中骨主寒熱小兒驚癇鹿茸味甘酸溫微溫無毒主漏下惡血寒熱驚癇益氣強志生齒不老療虛勞灑灑如瘧羸瘦四肢痠疼腰脊痛小便利瀉精溺血破留血在腹散石淋癰腫骨中熱疽癢骨安胎下氣殺鬼精物不可近陰令痿久服耐老四月五月解角時取陰乾使時燥角味鹹無毒主惡瘡癰腫逐邪惡氣留血在陰中除小腹血急痛腰脊痛折傷惡血益氣七月取髓味甘溫主丈夫女子傷中絶脈筋急痛咳逆以酒和服之良腎平主補腎氣肉溫補中強五臟益氣力生者療口僻割薄之獐骨微溫主虛損瀉精肉溫補益五臟髓益氣力悅澤人面虎骨主除邪惡氣殺鬼疰毒止驚悸主惡瘡鼠瘻頭骨尤良膏主狗齧瘡爪辟惡魅肉主噁心欲嘔益氣力豹肉味酸平無毒主安五臟補絶傷輕身益氣久服利人貍骨味甘溫無毒主風疰尸疰鬼疰毒氣在皮中淫躍如針刺者心腹痛走無常處及鼠瘻惡瘡頭骨尤良肉療諸疰陰莖主月水不通男子陰㿗燒之以東流水服之兔頭骨平無毒主頭眩痛癲疾骨主熱中消渴腦主凍瘡肝主目暗肉味辛平無毒主補中益氣六畜毛蹄甲味鹹平有毒主鬼疰蠱毒寒熱驚癇癲痓狂走駱駝毛尤良鼺鼠主墮胎令産易生山都平谷麋脂味辛溫無毒主癰腫惡瘡死肌寒風濕痹四肢拘緩不收風頭腫氣通腠理柔皮膚不可近陰令痿一名宮脂角味甘無毒主痹止血益氣力生南山山谷及淮海邊十月取豚卵味甘溫無毒主驚癇癩疾鬼疰蠱毒除寒熱賁豚五癃邪氣攣縮一名豚顛陰乾藏之勿令敗懸蹄主五痔伏熱在腸腸癰內蝕豬四足小寒傷撻諸敗瘡下乳汁心主驚邪憂恚腎冷和理腎氣通利膀胱膽主傷寒熱渴肚主補中益氣止渴利齒主小兒驚癇五月五日取鬐膏生髮肪膏主煎諸膏藥解斑蝥芫青毒猳豬肉味酸冷療狂病凡豬肉味苦主閉血脈弱筋骨虛人肌不可久食病人金瘡者尤甚豬屎主寒熱黃疸濕痹鼴鼠味鹹無毒主癰疽諸瘻蝕惡瘡陰𧈟爛瘡在土中行五月取令乾燔之獺肝味甘有毒主鬼疰蠱毒去魚鯁止久嗽燒服之肉療疫氣溫病及牛馬時行病煮屎灌之亦良狐陰莖味甘有毒主女子絶産陰癢小兒陰㿗卵腫五臟及腸味苦微寒有毒主蠱毒寒熱小兒驚癇雄狐屎燒之辟惡在木石上者是貒肉胞膏味甘平無毒主上氣乏氣咳逆酒和三合服之日二又主馬肺病蟲顙等病肉主久水脹不差垂死者作羹臛食之下水大效胞干之湯磨如雞卵許空腹服吐諸蠱毒野豬黃味辛甘無毒主金瘡止血生肉療癲癇水研如棗核日二服效驢屎熬之主尉風腫瘻瘡屎汁主心腹卒痛諸疰忤尿主症癖胃反吐不止牙齒痛水毒䭸驢尿主燥水牝驢尿主濕水一服五合良燥水者畫體成字濕水者不成字乳主小兒熱急黃等多服使痢尾下軸垢主瘧水洗取汁和麵如彈丸二枚作燒餅瘧未發前食一枚至發時食一枚療瘧無久新發無期者豺皮性熱主冷痹腳氣熟之以纏病上即瘥丹雄雞味甘微溫微寒無毒主女人崩中漏下赤白沃補虛溫中止血久傷乏瘡通神殺毒闢不祥頭主殺鬼東門上者尤良白雄雞肉味酸微溫主下氣療狂邪安五臟傷中消渴烏雄雞肉微溫主補中止痛膽微寒主療目不明肌瘡心主五邪血主踒折骨痛及痿痹肪主耳聾腸主遺溺小便數不禁肝及左翅毛起陰冠血主乳難肶胵里黃皮微寒主瀉利利遺溺除熱止煩屎白微寒主消渴傷寒寒熱破石淋及轉筋利小便止遺溺滅瘢痕黑雌雞主風寒濕痹五緩六急安胎血無毒主中惡腹痛及踒折骨節乳難翮羽主下血閉黃雌雞味酸甘平主傷中消渴小便數不禁腸澼瀉利補益五臟續絶傷療勞益氣肋骨主小兒羸瘦食不生肌雞子主除熱火瘡癇痙可作虎魄神物卵白微寒療目熱赤痛除心下伏熱止煩滿咳逆小兒下瀉婦人産難胞衣不出醢漬之一宿療黃疸破大煩熱卵中白皮主久咳結氣得麻黃紫菀和服之立已雞白蠹肥脂生朝鮮平澤白鵝膏主耳卒聾以灌之毛主射工水毒肉平利五臟鶩肪味甘無毒主風虛寒熱白鴨屎名通主殺石藥毒解結縛散蓄熱肉補虛除熱和臟腑利水道雁肪味甘平無毒主風攣拘急偏枯氣不通利久服長毛髮鬚眉益氣不飢輕身耐老一名鶩肪生江南池澤取無時鷓鴣味甘溫無毒主嶺南野葛菌毒生金毒及溫瘴久欲死不可瘥者合毛熬酒漬服之生搗取汁服最良生江南形似母雞鳴云鉤輈格磔者是雉肉味酸微寒無毒主補中益氣力止瀉痢除蟻瘻雀卵味酸溫無毒主下氣男子陰痿不起強之令熱多精有子腦主耳聾頭血主雀盲雄雞屎療目痛決癰癤女子帶下溺不利除疝瘕五月取之良顴骨味甘無毒主鬼蠱諸疰毒五尸心腹疾雄鵲屎味甘寒無毒主石淋消結熱可燒作灰以石投中散解者是雄也鴝鵒肉味甘平無毒主五痔止血炙食或為散飲服之燕屎味辛平有毒主蠱毒鬼疰逐不祥邪氣破五癃利小便生高山平谷孔雀屎微寒主女子帶下小便不利鸕鷀屎一名蜀水花去面黑皯黶痣頭微寒主鯁及噎燒服之鴟頭味鹹平無毒主頭風眩顛倒癇疾
