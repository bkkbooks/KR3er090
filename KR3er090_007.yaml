body:
  text: 卷第七婦人三虛乏第一方十二首柏子仁丸主婦人五勞七傷羸弱瘦削面無顏色飲食減少貌失光澤及產後半身枯悴傷墜斷絕無子令人肥白能久服夫婦不相識神方柏子仁白石英鍾乳乾薑黃耆各二兩澤蘭九分取葉熬藁本蕪荑各三兩芎藭二兩半防風五分蜀椒一兩半去目及閉口者汗人參紫石英石斛赤石脂乾地黃芍藥五味子秦艽肉蓯蓉厚朴炙龍骨防葵細辛獨活杜仲炙白芷茯苓桔梗白朮桂心各一兩當歸甘草炙各七分上三十三味搗篩為末煉蜜和丸如梧子空肚暖酒服十丸不知稍增至三十丸以知為度禁食生魚肥豬肉生冷千金有烏頭無秦艽龍骨防葵茯苓小澤蘭丸治婦人產後虛損補益方澤蘭九分取葉熬蕪荑熬藁本厚朴炙細辛人參柏子仁白朮各三分蜀椒去目閉口者汗白芷乾薑食茱萸防風各一兩石膏二兩桂心半兩當歸芎藭甘草炙各七分一方有芍藥一兩上一十八味搗篩為末煉蜜和丸梧子大溫酒服二十丸漸加至三十丸日三服忌食生魚肥豬肉千金無干姜有茯苓大五石澤蘭丸主婦人產後虛損寒中腹中雷鳴緩急風頭痛寒熱月經不調繞臍惻惻痛或心下石堅逆害飲食手足常冷多夢紛紜身體痹痛榮衛不和虛弱不能動搖方澤蘭九分取葉熬石膏乾薑白石英陽起石各二兩芎藭當歸各七兩人參石斛烏頭炮去皮白朮續斷遠志去心防風各五分紫石英禹餘糧厚朴炙柏子仁乾地黃五味子細辛蜀椒去目閉口者汗龍骨桂心茯苓各一兩半紫菀山茱萸各一兩白芷藁本蕪荑各三兩鍾乳黃耆甘草炙各二兩半上三十三味搗篩為末煉蜜和丸如梧桐子酒服二十丸漸加至三十丸千金無陽起石小五石澤蘭丸主婦人勞冷虛損飲食減少面失光色腹中冷痛月候不調吸吸少氣無力補益溫中方澤蘭九分取葉熬藁本柏子仁厚朴炙白朮各一兩芍藥蜀椒去目閉口者汗山茱萸人參各五分紫石英鍾乳白石英肉蓯蓉礬石燒龍骨桂心各一兩半石膏乾薑陽起石各二兩蕪荑三分熬赤石脂當歸甘草各七分炙上二十三味搗篩為末煉蜜和丸如梧子酒服二十丸加至三十丸日三服大補益當歸丸治產後虛羸不足胸中少氣腹中拘急疼痛或引腰背痛或產後所下過多不止虛竭乏氣腹中痛晝夜不得眠及崩中面目失色唇口乾燥亦主男子傷絕或從高墮下內有所傷之處或損血吐下及金瘡等方當歸芎藭續斷乾薑阿膠炙甘草炙各四兩附子炮去皮白芷吳茱萸白朮各三兩乾地黃十兩桂心二兩赤芍藥二兩上一十三味搗篩為末煉蜜和丸如梧子酒服二十丸日三夜一漸加至五十丸若有真蒲黃可加一升為善白芷丸治婦人產下過多及崩中傷損虛竭少氣面目失色腹中痛方白芷續斷乾薑當歸各三兩附子一兩炮去皮乾地黃五兩阿膠三兩炙上七味搗篩為末煉蜜和丸如梧子酒服二十丸日四五服無當歸用芎藭代之亦可加蒲黃一兩為善無續斷用大薊根代之甘草丸主婦人產後心虛不足虛悸少氣心神不安或若恍恍惚惚不自覺方甘草三兩炙人參澤瀉桂心各一兩大棗五枚遠志去心茯苓麥門冬去心菖蒲乾薑各二兩上一十味搗篩為末煉蜜和丸如大豆許酒服二十丸日四五服夜二服不知稍增若無澤瀉用術代之若胸中冷增乾薑大遠志丸主婦人產後心虛不足心下虛悸志意不安時復憒憒腹中拘急痛夜臥不安胸中吸吸少氣藥內補傷損益氣安志定心主諸虛損方遠志去心茯苓桂心麥門冬去心澤瀉乾薑人參當歸獨活阿膠炙菖蒲甘草炙白朮各三兩乾地黃五兩薯蕷二兩上一十五味搗篩為末煉蜜和丸如梧子空腹溫酒服二十丸日三服不知稍加至三十丸大虛身體冷少津液加鍾乳三兩為善鍾乳益精氣安心鎮志令人顏色美至良人參丸主產後大虛心悸志意不安恍惚不自覺心中畏恐夜不得眠虛煩少氣方人參茯苓麥門冬去心甘草炙各三兩桂心一兩大棗五十枚作膏菖蒲澤瀉薯蕷乾薑各二兩上一十味搗篩為末煉蜜棗膏和丸如梧子大空腹酒下二十丸日三夜一服不知稍增至三十丸若有遠志得二兩納之為善氣絕納當歸獨活各三兩更善此方亦治男子虛心悸不定至良生地黃煎治婦人產後虛羸短氣胸脅逆滿風寒方生地黃八兩茯苓麥門冬各一斤去心桃仁半升去皮尖甘草一尺炙人參三兩石斛桂心紫菀各四兩上九味合搗篩以生地黃汁八升淳清酒八升合調銅器中炭火上納鹿角膠一斤數攪之得一升次納飴三升白蜜三升於銅器中釜湯上煎令調藥成先食服如彈丸一枚日三不知稍加至二丸地黃羊脂煎治產後諸病羸瘦欲令肥白食飲平調方生地黃汁一斗生薑汁白蜜各五升羊脂二斤上四味先煎地黃汁令得五升次納羊脂煎令減半納薑汁復煎令減納蜜著銅器中重湯煎如飴狀取煎如雞子大一枚投溫酒中飲日三服生飲白草汁治產後勞復及腎勞方白草一把上一味搗絞取汁頓服瘥勞復生蟲去滓取汁洗眼中蟲出又屋漏水洗赤蟲出盜汗第二方四首鯉魚湯主婦人體虛流汗不止或眠中盜汗方鯉魚二斤蔥白切一升豉一升乾薑桂心一兩上五味先以水一斗煮魚取六升去魚納諸藥微火煮取二升分再服取微汗即愈竹皮湯治婦人汗血吐血尿血下血竹皮三升乾地黃四兩人參半兩芍藥當歸桔梗桂心各二兩芎藭甘草炙各二兩上九味㕮咀以水七升煮取三升分三服吳茱萸湯治婦人產後虛羸盜汗時澀澀惡寒吳茱萸三兩上一味以清酒三升漬之半日所煮令蟻鼻沸減得二升分服一升日再間日飲豬膏煎治婦人產後體虛寒熱自汗出豬膏生薑汁白蜜各一升清酒五合上四味合煎令調和五上五下膏成隨意以酒服瘥當用炭火上煎下乳第三方一十六首鍾乳湯治婦人乳無汁鍾乳白石脂硝石各一分通草生桔梗各二分上五味㕮咀以水五升煮三上三下餘一升去滓納硝石令烊絞服無多少若小兒不能乳大人嗍之漏蘆湯治婦人乳無汁漏蘆通草各二兩鍾乳一兩黍米一升上四味㕮咀黍米宿漬揩撻取汁三升煮藥三沸去滓飲之日三服鯽魚湯婦人下乳汁鯽魚長七寸豬肪半斤漏蘆鍾乳各二兩上四味㕮咀藥切豬脂魚不須洗清酒一斗二升合煮魚熟藥成去滓適寒溫分五服即乳下良飲其間相去須臾一飲令藥力相及又方通草鍾乳栝蔞實漏蘆各三兩上四味㕮咀以水一斗煮取三升去滓飲一升日三服又方通草鍾乳各四兩上二味切以酒五升漬一宿明旦煮沸去滓服一升日三服夏冷服冬溫服之又方石膏四兩碎以水二升煮三沸稍稍服一日令盡又方栝蔞實一枚青色大者無大者用小者兩枚無青色者黃色者亦好上一味熟搗以白酒一斗煮取四升去滓服一升日三服又方鬼箭五兩上一味切以水六升煮取四升一服八合日三服亦可燒灰水服方寸匕鼠肉臛方治婦人乳無汁鼠肉五兩羊肉六兩獐肉半斤上三味作臛勿令疾者知之鮑魚大麻子羹治婦人產後下乳鮑魚肉三斤麻子仁一升上二味與鹽豉蔥作羹任意食之又方通草鍾乳上二味等分搗篩作面粥服方寸匕日三服百日後可兼養兩兒通草橫心白者是勿取羊桃根色黃者無益又方麥門冬去心鍾乳通草理石上四味等分搗篩空腹酒服方寸匕日三服又方漏蘆三分鍾乳栝蔞根合五分蠐螬三合上四味搗篩先食糖水方寸匕日三服又方栝蔞根三兩鍾乳四兩漏蘆滑石通草各二兩白頭翁一兩上六味搗篩為散酒服方寸匕日再服又方鍾乳通草各五分雲母二兩半屋上敗草二把燒作灰甘草一兩炙上五味搗篩為散食後以溫漏蘆水服方寸匕日三服乳下為度又方麥門冬去心鍾乳通草理石乾地黃土瓜根蠐螬並等分上七味搗篩為散食後酒服方寸匕日三服中風第四方一十一首甘草湯治產後在褥中風背強不能轉動名曰風痓甘草炙乾地黃麥門冬去心前胡黃芩麻黃去節栝蔞根各二升芎藭一兩葛根半斤杏仁五十枚去心皮尖雙仁上一十味㕮咀以水一斗酒五升合煮葛根取八升去滓納諸藥煮取二升分再服一劑不瘥更作之大良千金無前胡羌活湯治產後中風身體痹疼痛羌活防風烏頭炮去皮桂心芍藥乾地黃各三兩防己女萎麻黃去節各一兩葛根半斤生薑各六兩甘草二兩炙上一十二味㕮咀以水九升清酒三升合煮取三升服五合日三夜一服極佳治產後中風時煩方知母石膏碎芍藥甘草炙各二兩半夏一升洗生薑切防風白朮各三兩獨活四兩桂心四兩上一十味㕮咀以水一斗清酒五升合煮取三升分三服獨活湯治產後中風口噤不得言獨活五兩防風秦艽桂心當歸附子炮去皮白朮甘草炙各二兩木防己一兩葛根生薑各三兩上一十一味㕮咀以水一斗二升煮取三升分三服竹葉湯治產後中風發熱面正赤喘氣頭痛淡竹葉葛根各三兩人參一兩防風二兩大附子一枚炮去皮生薑五兩大棗十五枚擘桔梗桂心甘草炙各一兩上一十味㕮咀以水一斗煮取二升半分二服溫覆使汗出頸項強用大附子煎藥揚去沫若嘔者加半夏半升洗防風湯治產後中風裡急短氣防風葛根當歸芍藥人參乾薑甘草炙各二兩獨活五兩上八味㕮咀以水九升煮取三升分為三服治產後魘言鬼語由內虛未定外客風邪所幹方羊心一枚遠志去心芍藥黃芩牡蠣熬防風甘草炙各二兩乾地黃人參各三兩上九味㕮咀以水一斗煮羊心取五升去心納諸藥煎取三升分為三服鹿肉湯治產後風虛頭痛壯熱言語邪僻鹿肉三斤半夏一升洗去滑乾地黃阿膠炙芎藭各二兩芍藥獨活生薑切黃耆黃芩人參甘草炙各三兩桂心二兩秦艽五兩茯神四兩一雲茯苓上一十五味㕮咀以水二斗煮肉得一斗二升去肉下藥煎取三升納膠令烊分四服日三夜一服防風酒治產後中風防風獨活各一斤女萎桂心各二兩茵芋一兩石斛五兩上六味㕮咀以清酒二斗漬三宿初服一合稍加至三四合日三服木防己膏治產後中風木防己半斤茵芋五兩上二味切以苦酒九升漬一宿豬膏四升煎三上三下膏成炙手摩之千遍佳獨活酒治產後中風方獨活一斤桂心三兩秦艽五兩上三味㕮咀以酒一斗五升漬三日飲五合稍加至一升不能飲隨性多少心悸第五方四首治產後忽苦心中衝悸或志意不定恍恍惚惚言語錯謬心虛所致方人參茯苓各三兩茯神四兩大棗三十枚擘生薑八兩芍藥當歸桂心甘草各二兩上九味㕮咀以水一斗煮取三升分服日三治產後忽苦心中衝悸不定志意不安言語誤錯惚惚憒憒不自覺方遠志去心人參麥門冬去心當歸桂心甘草炙各二兩茯苓五兩芍藥一兩生薑六兩大棗二十枚擘上一十味㕮咀以水一斗煮取三升分三服日三羸者分四服產後得此是心虛所致無當歸用芎藭若其人心胸中逆氣則加半夏三兩洗去滑治產後暴苦心悸不定言語謬誤恍恍惚惚心中憒憒此是心虛所致方茯苓五兩芍藥桂心當歸甘草炙各三兩生薑六兩大棗三十枚擘麥門冬去心一升上八味㕮咀以水一斗煮取三升分三服無當歸用芎藭代若苦心不定加人參遠志各二兩若苦煩悶短氣加生竹葉一升先以水一斗三升煮竹葉取一斗納藥若有微風加獨活三兩麻黃二兩桂心二兩用水一斗五升若頸項苦急背中強者加獨活葛根麻黃桂心各三兩生薑八兩以水一斗五升煮取三升半分四服日三夜一服治產後心沖恐悸不定恍恍惚惚不自知覺言語錯誤虛煩短氣志意不定此是心虛所致方遠志去心二兩人參茯神當歸芍藥甘草炙各三兩大棗三十枚擘麥門冬一升去心上八味㕮咀以水一斗煮取三升分三服若苦虛煩短氣者加生淡竹葉一升以水一斗二升煮取一斗乃用諸藥胸中少氣者益甘草一兩為善下痢第六方一十七首阿膠湯治產後下痢阿膠當歸黃柏黃連各一兩陳稟米一升蠟如棋子三枚上六味㕮咀以水八升煮米蟹目沸去米納藥煮取二升去滓納膠蠟令烊分四服一日令盡桂心湯治產後余寒下痢便膿血赤白日數十行腹痛時時下血桂心甘草各二兩白蜜一升乾薑二兩當歸三兩赤石脂十兩綿裹附子一兩炮去皮破上七味㕮咀以水六升煮取三升納蜜再沸分三服日三羊脂湯治產後下痢諸療不斷羊脂五兩當歸乾薑黃柏黃連各三兩上五味㕮咀以水九升煮取三升去滓納脂令烊分三服治產後下痢虛乏羸瘦方黃雌雞一隻冶如食注去臟勿中水赤小豆二升吳茱萸獨活人參黃連甘草各二兩黃耆麥門冬去心當歸各三兩大棗三十枚擘上一十一味㕮咀以水二斗煮雞豆令餘一鬥去雞豆澄清納藥煮取三升分三服雞買成死者勿殺治產後寒熱下痢方鹿肉三斤蔥白一把人參當歸黃芩桂心甘草各一兩芍藥二兩豉一升生薑切乾地黃各三兩上一十一味㕮咀以水二斗煮肉取一斗納諸藥煮取三升分三服當歸湯治產後下痢腹痛當歸龍骨各三兩乾薑白朮各二兩芎藭二兩半熟艾附子炮去皮甘草炙各一兩上八味㕮咀以水六升煮取三升分三服一日令盡甘草湯治產後下痢兼虛極白頭翁加阿膠白頭翁二兩黃連秦皮黃柏各三兩加阿膠甘草各二兩上六味㕮咀以水七升煮取三升去滓納膠令烊分三服鱉甲湯治產後早起中風冷瀉痢及帶下鱉甲如手大炙令黃白頭翁一兩當歸黃連乾薑各二兩黃柏長一尺廣三寸上六味㕮咀以水七升煮取三升分三服千金無白頭翁乾地黃湯治產後下痢乾地黃一兩白頭翁乾薑黃連各一兩蜜蠟方寸阿膠如手掌大一枚上六味㕮咀以水五升煮取二升半去滓納膠蠟令烊分三服相去一炊頃千金無干姜生地黃湯治產後忽著寒熱下痢生地黃五兩黃連桂心甘草各一兩淡竹皮二升大棗二十枚擘赤石脂二兩上七味㕮咀以水一斗煮竹皮取七升去滓納藥煮取二升五合分為三服藍青丸治產後下痢藍青熬鬼臼各一兩半附子炮一兩蜀椒汗一兩半黃連五兩去毛龍骨當歸各三兩黃柏人參茯苓各一兩厚朴炙阿膠炙艾甘草炙各二兩一方用赤石脂四兩上一十四味搗篩為末煉蜜和丸如梧子空腹以飲服二十丸赤石脂丸治產後下痢赤石脂三兩當歸黃連乾薑秦皮白朮甘草炙各二兩蜀椒汗附子各一兩炮去皮上九味搗末煉蜜和丸如梧子大飲服二十丸日三服治產後下痢赤散方赤石脂三兩桂心一兩代赭二兩上三味搗篩為散酒服方寸匕日三夜一服十日當愈治產後下痢黑散方麻黃去節貫眾桂心各一兩乾漆熬細辛各二兩甘草三兩炙上六味搗篩為散麥粥服五指撮日再五日當愈治產後下痢黃散方黃連大黃各二兩黃芩䗪蟲熬乾地黃各一兩上五味搗篩為散酒服方寸匕日三服十日愈千金無大黃治妊娠及產後寒熱下痢方黃柏一斤黃連一升梔子二十枚上三味㕮咀以水五升漬一宿煮三沸服一升一日一夜令盡嘔者加橘皮一把生薑二兩治婦人痢欲痢輒先心痛腹脹滿日夜五六十行方神麯熬石榴皮各八兩黃柏切黃連切烏梅肉艾葉各一升防己二兩附子五兩炮乾薑阿膠各三兩炙上一十味搗篩為末煉蜜和丸如梧桐子大飲服二十丸日三漸加至三十四十丸淋渴第七方一十一首桑螵蛸湯治產後小便數桑螵蛸三十枚炙鹿茸炙黃耆各三兩生薑四兩人參牡蠣熬甘草炙各二兩上七味㕮咀以水六升煮取二升半分三服栝蔞湯治產後小便數兼渴栝蔞根黃連麥門冬去心各二兩桑螵蛸二十枚炙人參生薑切甘草炙各三兩大棗十五枚擘上八味㕮咀以水七升煮取二升半分三服雞肶胵湯治產後小便數雞肶胵二十具雞腸三具洗厚朴炙人參各二兩生薑五兩麻黃四兩去節大棗二十枚擘當歸乾地黃甘草炙各二兩上一十味㕮咀以手一斗煮雞肶胵腸棗子七升去滓內藥煎取三升半分三服治婦人結氣成淋小便引痛上至少腹或時溺血或如豆汁或如膠飴每發欲死食不生肌面目萎黃師所不能療方貝齒四枚燒葵子一升滑石三兩石膏五兩上四味㕮咀以水七升煮取二升去滓納豬肪一合更煎三沸適寒溫分三服病不瘥更合服石葦湯治產後卒淋血淋氣淋石葦去毛黃芩通草各一兩榆皮五兩大棗三十枚擘葵子二升生薑切白朮各三兩一方用芍藥甘草一兩炙上九味㕮咀以水八升煮取二升半分三服葵根湯治產後淋澀葵根切一升一云乾者二兩車前子亂髮燒大黃桂心滑石各一兩通草三兩生薑六兩切上八味㕮咀以水七升煮取二升半分為三服千金有冬瓜汁七合茅根湯治產後淋白茅根一斤桃膠甘草炙各一兩鯉魚齒一百枚擘生薑三兩切人參地麥各二兩瞿麥茯苓各四兩上九味㕮咀以水一斗煮取二升半分三服鼠婦散治產後小便不利鼠婦七枚熬黃酒服之滑石散治產後淋澀滑石五分通草車前子葵子各一兩上四味搗篩為散以醋漿水服方寸匕稍加至二匕竹葉湯治產後虛弱少氣力竹葉人參茯苓甘草炙各一兩大棗十四枚擘麥門冬五兩去心小麥五合生薑切半夏洗各三兩上九味㕮咀以水九升煮竹葉小麥取七升去滓納藥更煮取二升半服五合日三夜一服栝蔞湯治產後渴不止栝蔞根四兩人參麥門冬各三兩去心大棗三十枚擘土瓜根五兩乾地黃甘草炙各二兩上七味㕮咀以水八升煮取二升半分三服
