body:
  text: 卷第九傷寒上論曰傷寒熱病自古有之名賢睿哲多所防禦至於仲景特有神功尋思旨趣莫測其致所以醫人未能鑽仰嘗見太醫療傷寒惟大青知母等諸冷物投之極與仲景本意相反湯藥雖行百無一效傷其如此遂披傷寒大論鳩集要妙以為其方行之以來未有不驗舊法方證意義幽隱乃令近智所迷覽之者造次難悟中庸之士絕而不思故使閭里之中歲至夭枉之痛遠想令人慨然無已今以方證同條比類相附須有檢討倉卒易知夫尋方之大意不過三種一則桂枝二則麻黃三則青龍此之三方凡療傷寒不出之也其柴胡等諸方皆是吐下發汗後不解之事非是正對之法術數未深而天下名賢止而不學誠可悲夫又有僕隸卑下冒犯風寒天行疫癘先被其毒憫之酸心聊述茲意為之救法方雖是舊弘之惟新好古君子嘉其博濟之利物嗤誚焉太陽病用桂枝湯法第一五十七證方五首論曰傷寒與痓病濕病及熱暍相濫故敘而論之太陽病發熱無汗而反惡寒是為剛痓太陽病發熱汗出而不惡寒是為柔痓一云惡寒太陽病發熱其脈沉細是為痓太陽病發其汗因致痓病者身熱足寒頸項強惡寒時頭熱面赤目脈赤獨頭動搖是為痓上件痓狀太陽病而關節疼煩其脈沉緩為中濕病者一身盡疼煩日晡即劇此為風濕汗出所致也濕家之為病一身盡疼發熱而身色似熏黃也濕家之為病其人但頭汗出而背強欲得被覆若下之早即嘁或胸滿小便利舌上如胎此為丹田有熱胸上有寒渴欲飲則不能飲而口燥也濕家下之額上汗出微喘小便利者死下利不止者亦死問曰病風濕相搏身體疼痛法當汗出而解值天陰雨溜下不止師云此可發汗而其病不愈者何故答曰發其汗汗大出者但風氣去濕氣續在是故不愈若治風濕者發其汗微微似欲出汗者則風濕俱去也病人喘頭痛鼻窒而煩其脈大自能飲食腹中獨和無病病在頭中寒濕故鼻窒納藥鼻中即愈上件濕狀太陽中熱暍是也其人汗出惡寒身熱而渴也太陽中暍身熱疼重而脈微弱此以夏月傷冷水水行皮膚中也太陽中暍發熱惡寒身重而疼痛其脈弦細芤遲小便已洗然手足逆冷小有勞熱口前開板齒燥若發其汗惡寒則甚加溫針發熱益甚數下之淋復甚上件暍狀太陽之為病頭項強痛而惡寒太陽病其脈浮太陽病發熱汗出而惡風其脈緩為中風太陽中風發熱而惡寒太陽病三四日不吐下見芤乃汗之夫病有發熱而惡寒者發於陽也不熱而惡寒者發於陰也發於陽者七日愈發於陰者六日愈以陽數七陰數六故也太陽病頭痛至七日以上自愈者其經竟故也若欲作再經者針足陽明使經不傳則愈太陽病欲解時從巳盡未風家表解而不了了者十二日愈太陽中風陽浮而陰濡弱浮者熱自發濡弱者汗自出澀澀惡寒淅淅惡風翕翕發熱鼻鳴乾嘔者桂枝湯主之太陽病發熱汗出此為榮弱衛強故使汗出以救邪風桂枝湯主之太陽病頭痛發熱汗出惡風桂枝湯主之太陽病項背強几几而反汗出惡風桂枝湯主之本論云桂枝加葛根湯太陽病下之其氣上衝可與桂枝湯不沖不可與之太陽病三日已發汗吐下溫針而不解此為壞病桂枝湯復不中與也觀其脈證知犯何逆隨證而治之桂枝湯本為解肌其人脈浮緊發熱無汗不可與也常識此勿令誤也酒客不可與桂枝湯得之則嘔酒客不喜甘故也喘家作桂枝湯加厚朴杏仁佳服桂枝湯吐者其後必吐膿血太陽病初服桂枝湯而反煩不解者當先刺風池風府乃卻與桂枝湯則愈太陽病外證未解其脈浮弱當以汗解宜桂枝湯太陽病下之微喘者表未解故也宜桂枝湯一云麻黃湯太陽病有外證未解不可下之下之為逆解外宜桂枝湯太陽病先發汗不解而下之其脈浮不愈浮為在外而反下之故令不愈今脈浮故在外當解其外則愈宜桂枝湯病常自汗出此為榮氣和衛氣不和故也榮行脈中衛行脈外復發其汗衛和則愈宜桂枝湯病人臟無他病時發熱自汗出而不愈此衛氣不和也先其時發汗愈宜桂枝湯傷寒不大便六七日頭痛有熱與承氣湯其大便反青此為不在裡故在表也當發其汗頭痛者必衄宜桂枝湯傷寒發汗已解半日許復煩其脈浮數可復發其汗宜桂枝湯傷寒醫下之後身體疼痛清便自調急當救表宜桂枝湯太陽病未解其脈陰陽俱停必先振慄汗出而解但陽微者先汗之而解宜桂枝湯太陽病未解熱結膀胱其人如狂其血必自下下者即愈其外未解尚未可攻當先解其外宜桂枝湯傷寒大下後復發汗心下痞惡寒者不可攻痞當先解表宜桂枝湯桂枝湯方桂枝芍藥生薑各二兩切甘草二兩炙大棗十二枚擘上五味㕮咀三味以水七升微火煮取三升去滓溫服一升須臾飲熱粥一升余以助藥力溫覆令汗出一時許益善若不汗再服如前復不汗後服小促其間令半日許三服病重者一日一夜乃瘥當晬時觀之服一劑湯病證猶在當復作服之至有不汗出當服三劑乃解太陽病發其汗遂漏而不止其人惡風小便難四肢微急難以屈伸桂枝加附子湯主之桂枝中加附子一枚炮即是太陽病下之其脈促胸滿者桂枝去芍藥湯主之若微寒者桂枝去芍藥加附子湯主之桂枝去芍藥中加附子一枚即是太陽病得之八九日如瘧發熱而惡寒熱多而寒少其人不嘔清便欲自可一日再三發其脈微緩者為欲愈脈微而惡寒者此為陰陽俱虛不可復吐下發汗也面色反有熱者為未欲解以其不能得汗出身必當癢桂枝麻黃各半湯主之桂枝一兩十六銖芍藥生薑切甘草炙麻黃去節各一兩大棗四枚擘杏仁二十四枚去皮尖兩仁者上七味以水五升先煮麻黃一二沸去上沫納諸藥煮取一升八合去滓溫服六合本云桂枝湯三合麻黃湯三合併為六合頓服服桂枝湯大汗出若脈洪大與桂枝湯其形如瘧一日再發汗出便解宜桂枝二麻黃一湯方桂枝一兩十七銖麻黃十六銖生薑切芍藥各一兩六銖甘草一兩二銖炙大棗五枚擘杏仁十六枚去皮尖兩仁者上七味以水七升煮麻黃一二沸去上沫納諸藥煮取二升去滓溫服一升日再服本云桂枝湯二分麻黃湯一分合為二升分二服今人合為一方太陽病發熱惡寒熱多寒少脈微弱則無陽也不可發汗桂枝二越婢一湯主之方桂枝芍藥甘草炙麻黃去節各十八銖生薑一兩三銖切石膏二十四銖碎大棗四枚擘上七味以水五升先煮麻黃一二沸去上沫納諸藥煮取二升去滓溫服一升本云當裁為越婢湯桂枝合之飲一升今合為一方桂枝湯二分服桂枝湯下之頸項強痛翕翕發熱無汗心下滿微痛小便不利桂枝去桂加茯苓白朮湯主之方茯苓白朮各三兩上於桂枝湯中惟除桂枝一味加此二味為湯服一升小便即利本云桂枝湯今去桂枝加茯苓白朮太陽病用麻黃湯法第二一十六證方四首太陽病或已發熱或未發熱必惡寒體痛嘔逆脈陰陽俱緊為傷寒傷寒一日太陽脈弱至四日太陰脈大傷寒一日太陽受之脈若靜者為不傳頗欲嘔若躁煩脈數急者乃為傳傷寒其二陽證不見此為不傳太陽病頭痛發熱身體疼腰痛骨節疼惡風無汗而喘麻黃湯主之太陽與陽明合病喘而胸滿不可下也宜麻黃湯病十日已去其脈浮細嗜臥此為外解設胸滿脅痛與小柴胡湯浮者麻黃湯主之太陽病脈浮緊無汗而發熱其身疼痛八九日不解其表證仍在此當發其汗服藥微除其人發煩目瞑增劇者必衄衄乃解所以然者陽氣重故也宜麻黃湯脈浮熱數者可發其汗宜麻黃湯傷寒脈浮緊不發其汗因致衄宜麻黃湯脈浮而緊浮則為風緊則為寒風則傷衛寒則傷榮榮衛俱病骨節煩疼可發其汗宜麻黃湯太陽病下之微喘者外未解故也宜麻黃湯一云桂枝湯麻黃湯方麻黃去節三兩桂枝二兩甘草一兩炙杏仁七十枚去皮尖兩仁者上四味以水九升煮麻黃減二升去上沫納諸藥煮取二升半去滓溫服八合覆取微似汗不須啜粥余如桂枝法太陽病項背強几几無汗惡風葛根湯主之方葛根四兩麻黃三兩去節桂枝芍藥甘草炙各二兩生薑三兩切大棗十一枚擘上七味以水一斗煮麻黃葛根減二升去上沫納諸藥煮取三升去滓分溫三服不須與粥取微汗太陽與陽明合病而自利葛根湯主之用上方一云用後葛根黃芩黃連湯不下利但嘔葛根加半夏湯主之葛根湯中加半夏半升洗即是太陽病桂枝證醫反下之遂利不止其脈促表未解喘而汗出宜葛根黃芩黃連湯方葛根半斤甘草二兩炙黃芩黃連各三兩上四味以水八升先煮葛根減二升納諸藥煮取二升去滓分溫再服太陽病用青龍湯法第三四證方二首太陽中風脈浮緊發熱惡寒身體疼痛不汗出而煩大青龍湯主之若脈微弱汗出惡風者不可服之服之則厥筋惕肉瞤此為逆也方麻黃去節六兩桂枝二兩甘草二兩炙杏仁四十枚去皮尖兩仁者生薑三兩切大棗十枚擘石膏如雞子大碎綿裹上七味以水九升先煮麻黃減二升去上沫納諸藥煮取三升去滓溫服一升取微似汗汗出多者溫粉粉之一服汗者勿再服若復服汗出多亡陽逆虛惡風躁不得眠傷寒脈浮緩其身不疼但重乍有輕時無少陰證者可與大青龍湯發之用上方傷寒表不解心下有水氣咳而發熱或渴或利或噎或小便不利少腹滿或喘者小青龍湯主之方麻黃去節三兩芍藥細辛乾薑甘草炙桂枝各三兩五味子半夏各半升洗上八味以水一斗先煮麻黃減二升去上沫納諸藥煮取三升去滓溫服一升渴則去半夏加栝蔞根三兩微利者去麻黃加蕘花一雞子大熬令赤色噎者去麻黃加附子一枚炮小便不利少腹滿去麻黃加茯苓四兩喘者去麻黃加杏仁半升去皮傷寒心下有水氣咳而微喘發熱不渴服湯已而渴者此為寒去為欲解小青龍湯主之用上方太陽病用柴胡湯法第四一十五證方七首血弱氣盡腠理開邪氣因入與正氣相搏在於脅下正邪分爭往來寒熱休作有時嘿嘿不欲食飲臟腑相連其痛必下邪高痛下故使其嘔小柴胡湯主之服柴胡而渴者此為屬陽明以法治之得病六七日脈遲浮弱惡風寒手足溫醫再三下之不能食其人脅下滿痛面目及身黃頸項強小便難與柴胡湯後必下重本渴飲水而嘔柴胡復不中與也食谷者噦傷寒四五日身體熱惡風頸項強脅下滿手足溫而渴小柴胡湯主之傷寒陽脈澀陰脈弦法當腹中急痛先與小建中湯不瘥與小柴胡湯小建中湯見雜療門中傷寒中風有柴胡證但見一證便是不必悉具也凡柴胡湯證而下之柴胡證不罷復與柴胡湯解者必蒸蒸而振卻發熱汗出而解傷寒五六日中風往來寒熱胸脅苦滿嘿嘿不欲飲食心煩喜嘔或胸中煩而不嘔或渴或腹中痛或脅下痞堅或心下悸小便不利或不渴外有微熱或咳小柴胡湯主之柴胡八兩黃芩人參甘草炙生薑各三兩切半夏半升洗大棗十二枚擘上七味以水一斗二升煮取六升去滓再煎溫服一升日三若胸中煩不嘔者去半夏人參加栝蔞實一枚渴者去半夏加人參合前成四兩半腹中痛者去黃芩加芍藥三兩脅下痞堅者去大棗加牡蠣六兩心下悸小便不利者去黃芩加茯苓四兩不渴外有微熱者去人參加桂三兩溫覆微發其汗咳者去人參大棗生薑加五味子半升乾薑二兩傷寒五六日頭汗出微惡寒手足冷心下滿口不欲食大便堅其脈細此為陽微結必有表復有里沉則為病在裡汗出亦為陽微假令純陰結不得有外證悉入在於里此為半在外半在裡脈雖沉緊不得為少陰所以然者陰不得有汗今頭大汗出故知非少陰也可與柴胡湯設不了了者得屎而解用上方傷寒十三日不解胸脅滿而嘔日晡所發潮熱而微利此本當柴胡下之不得利今反利者故知醫以丸藥下之非其治也潮熱者實也先再服小柴胡湯以解其外後以柴胡加芒硝湯主之方柴胡二兩十六銖黃芩人參甘草炙生薑各一兩切半夏一合洗大棗四枚擘芒硝二兩上七味以水四升煮取二升去滓溫分再服以解其外不解更作柴胡加大黃芒硝桑螵蛸湯方上以前七味以水七升下芒硝三合大黃四分桑螵蛸五枚煮取一升半去滓溫服五合微下即愈本云柴胡湯再服以解其外餘二升加芒硝大黃桑螵蛸也傷寒八九日下之胸滿煩驚小便不利譫語一身不可轉側柴胡加龍骨牡蠣湯主之方柴胡四兩黃芩人參生薑切龍骨牡蠣熬桂枝茯苓鉛丹各一兩半大黃二兩半夏一合半洗大棗六枚擘上一十二味以水八升煮取四升納大黃切如棋子大更煮一兩沸去滓溫服一升本云柴胡湯今加龍骨等傷寒六七日發熱微惡寒肢節煩疼微嘔心下支結外證未去者宜柴胡桂枝湯發汗多亡陽狂語者不可下以為可與柴胡桂枝湯和其榮衛以通津液後自愈方柴胡四兩黃芩人參生薑切桂枝芍藥各一兩半半夏二合半洗甘草一兩炙大棗六枚擘上九味以水六升煮取二升去滓溫服一升本云人參湯作如桂枝法加柴胡黃芩復如柴胡法今用人參作半劑傷寒五六日其人已發汗而復下之胸脅滿微結小便不利渴而不嘔但頭汗出往來寒熱而煩此為未解柴胡桂枝幹薑湯主之方柴胡八兩桂枝三兩乾薑二兩栝蔞根四兩黃芩三兩牡蠣二兩熬甘草二兩炙上七味以水一斗二升煮取六升去滓更煎溫服一升日二服初服微煩汗出愈太陽病過經十餘日反再三下之後四五日柴胡證續在先與小柴胡湯嘔止小安其人鬱郁微煩者為未解與大柴胡湯下者止傷寒十餘日邪氣結在裡欲復往來寒熱當與大柴胡湯傷寒發熱汗出不解心中痞堅嘔吐下利者大柴胡湯主之病人表裡無證發熱七八日雖脈浮數可下之宜大柴胡湯方柴胡八兩枳實四枚炙生薑五兩切黃芩三兩芍藥三兩半夏半升洗大棗十二枚擘上七味以水一斗二升煮取六升去滓更煎溫服一升日三服一方加大黃二兩若不加恐不名大柴胡湯太陽病用承氣湯法第五九證方四首發汗後惡寒者虛故也不惡寒但熱者實也當和其胃氣宜小承氣湯太陽病未解其脈陰陽俱停必先振汗出而解但陽微者先汗出而解陰微者先下之而解宜承氣湯一云大柴胡湯傷寒十三日過經而譫語內有熱也當以湯下之小便利者大便當堅而反利其脈調和者知醫以丸藥下之非其治也自利者其脈當微厥今反和者此為內實宜承氣湯太陽病過經十餘日心下溫溫欲吐而胸中痛大便反溏其腹微滿鬱郁微煩先時自極吐下者宜承氣湯二陽並病太陽證罷但發潮熱手足漐漐汗出大便難譫語者下之愈宜承氣湯太陽病三日發其汗不解蒸蒸發熱者調胃承氣湯主之傷寒吐後腹滿者承氣湯主之太陽病吐下發汗後微煩小便數大便因堅可與小承氣湯和之則愈承氣湯方大黃四兩厚朴八兩炙枳實五枚炙芒硝三合上四味以水一斗先煮二味取五升納大黃更煮取二升去滓納芒硝更煎一沸分再服得下者止又方大黃四兩厚朴二兩炙枳實大者三枚炙上三味以水四升煮取一升二合去滓溫分再服初服譫語即止服湯當更衣不爾盡服之又方大黃四兩甘草二兩炙芒硝半兩上三味以水三升煮取一升去滓納芒硝更一沸頓服太陽病不解熱結膀胱其人如狂血自下下者即愈其外不解尚未可攻當先解其外外解少腹急結者乃可攻之宜桃核承氣湯方桃仁五十枚去皮尖大黃四兩桂枝二兩甘草二兩炙芒硝一兩上五味以水七升煮取二升半去滓納芒硝更煎一沸分溫三服太陽病用陷胸湯法第六三十一證方一十六首問曰病有結胸有臟結其狀何如答曰按之痛其脈寸口浮關上自沉為結胸何謂臟結曰如結胸狀飲食如故時下利陽脈浮關上細沉而緊名為臟結舌上白胎滑者為難治臟結者無陽證不往來寒熱其人反靜舌上胎滑者不可攻也夫病發於陽而反下之熱入因作結胸發於陰而反汗之因作痞結胸者下之早故令結胸結胸者其項亦強如柔痓狀下之即和宜大陷胸丸結胸證其脈浮大不可下之下之即死結胸證悉具煩躁者死太陽病脈浮而動數浮則為風數則為熱動則為痛數則為虛頭痛發熱微盜汗出而反惡寒其表未解醫反下之動數則遲頭痛即眩胃中空虛客氣動膈短氣躁煩心中懊憹陽氣內陷心下因堅則為結胸大陷胸湯主之若不結胸但頭汗出其餘無汗齊頸而還小便不利身必發黃傷寒六七日結胸熱實脈沉緊心下痛按之如石堅大陷胸湯主之但結胸無大熱此為水結在胸脅頭微汗出大陷胸湯主之太陽病重發汗而復下之不大便五六日舌上燥而渴日晡如小有潮熱從心下至少腹堅滿而痛不可近大陷胸湯主之若心下滿而堅痛者此為結胸大陷胸湯主之大陷胸丸方大黃八兩葶藶子熬杏仁去皮尖兩仁者芒硝各半升上四味和搗取如彈丸一枚甘遂末一錢匕白蜜一兩水二升合煮取一升溫頓服一宿乃下大陷胸湯方大黃六兩甘遂末一錢匕芒硝一升上三味以水六升先煮大黃取二升去滓納芒硝煎一兩沸納甘遂末分再服得快利止後服小結胸者正在心下按之即痛其脈浮滑小陷胸湯主之黃連一兩半夏半升洗栝蔞實大者一枚上三味以水六升先煮栝蔞取三升去滓納諸藥煮取二升去滓分溫三服太陽病二三日不能臥但欲起者心下必結其脈微弱者此本寒也而反下之利止者必結胸未止者四五日復重下之此為挾熱利太陽少陽並病而反下之結胸心下堅下利不復止水漿不肯下其人必心煩病在陽當以汗解而反以水噀之若灌之其熱卻不得去益煩皮粟起意欲飲水反不渴宜服文蛤散方文蛤五兩上一味搗為散以沸湯五合和服一方寸匕若不瘥與五苓散五苓散方豬苓十八銖去黑皮白朮十八銖澤瀉一兩六銖茯苓十八銖桂枝半兩上五味各為散更於臼中治之白飲和服方寸匕日三服多飲暖水汗出愈寒實結胸無熱證者與三物小白散方桔梗十八銖巴豆六銖去皮心熬赤黑研如脂貝母十八銖上三味搗為散納巴豆更於臼中治之白飲和服強人半錢匕羸者減之病在上則吐在下則利不利進熱粥一杯利不止進冷粥一杯一云冷水一杯身熱皮粟不解欲引衣自覆若以水噀之洗之更益令熱卻不得出當汗而不汗即煩假令汗出已腹中痛與芍藥三兩如上法太陽與少陽並病頭痛或眩冒如結胸心下痞而堅當刺肺俞肝俞大椎第一間慎不可發汗發汗即譫語譫語則脈弦五日譫語不止當刺期門心下但滿而不痛者此為痞半夏瀉心湯主之半夏半升洗黃芩乾薑人參甘草各三兩炙黃連一兩大棗十二枚擘上七味以水一斗煮取六升去滓溫服一升日三服脈浮緊而下之緊反入里則作痞按之自濡但氣痞耳太陽中風吐下嘔逆表解乃可攻之其人漐漐汗出發作有時頭痛心下痞堅滿引脅下嘔即短氣此為表解里未和十棗湯主之方芫花熬甘遂大戟各等分上三味搗為散以水一升五合先煮大棗十枚取八合去棗強人納藥末一錢匕羸人半錢匕溫服平旦服若下少不利者明旦更服加半錢得快下糜粥自養太陽病發其汗遂發熱惡寒復下之則心下痞此表裡俱虛陰陽氣並竭無陽則陰獨復加燒針胸煩面色青黃膚瞤此為難治今色微黃手足溫者愈心下痞按之自濡關上脈浮者大黃黃連瀉心湯主之方大黃二兩黃連一兩上二味以麻沸湯二升漬之須臾去滓分溫再服此方必有黃芩心下痞而復惡寒汗出者附子瀉心湯主之方附子一枚炮別煮取汁大黃二兩黃連黃芩各一兩上四味以麻沸湯二升漬之須臾去滓納附子汁分溫再服本以下之故心下痞與之瀉心其痞不解其人渴而口燥煩小便不利者五苓散主之一方言忍之一日乃愈用上方傷寒汗出解之後胃中不和心下痞堅乾噫食臭脅下有水氣腹中雷鳴而利生薑瀉心湯主之方生薑四兩切半夏半升洗乾薑一兩黃連一兩人參黃芩甘草各三兩炙大棗十二枚擘上八味以水一斗煮取六升去滓溫服一升日三服傷寒中風醫反下之其人下利日數十行穀不化腹中雷鳴心下痞堅而滿乾嘔而煩不能得安醫見心下痞為病不盡復重下之其痞益甚此非結熱但胃中虛客氣上逆故使之堅甘草瀉心湯主之方甘草四兩炙黃芩乾薑各三兩黃連一兩半夏半升洗大棗十二枚擘一方有人參三兩上六味以水一斗煮取六升去滓溫服一升日三服傷寒服湯藥下利不止心下痞堅服瀉心湯復以他藥下之利不止醫以理中與之而利益甚理中治中焦此利在下焦赤石脂禹餘糧湯主之方赤石脂一斤碎太一禹餘糧一斤碎上二味以水六升煮取二升去滓分溫三服若不止當利小便傷寒吐下發汗虛煩脈甚微八九日心下痞堅脅下痛氣上衝喉咽眩冒經脈動惕者久而成痿傷寒發汗吐下解後心下痞堅噫氣不除者旋覆代赭湯主之方旋覆花三兩人參二兩生薑五兩切代赭一兩碎甘草三兩炙半夏半升洗大棗十二枚擘上七味以水一斗煮取六升去滓溫服一升日三服太陽病外證未除而數下之遂挾熱而利不止心下痞堅表裡不解桂枝人參湯主之方桂枝四兩別切甘草四兩炙白朮人參乾薑各二兩上五味以水九升先煮四味取五升去滓納桂更煮取三升去滓溫服一升日再夜一服傷寒大下後復發其汗心下痞惡寒者表未解也不可攻其痞當先解表表解乃攻其痞宜大黃黃連瀉心湯用上方病如桂枝證頭項不強痛脈微浮胸中痞堅氣上衝喉咽不得息此為胸有寒當吐之宜瓜蒂散方瓜蒂熬赤小豆各一分上二味搗為散取半錢匕豉一合湯七合漬之須臾去滓納散湯中和頓服之若不吐稍加之得快吐止諸亡血虛家不可與瓜蒂散太陽病雜療法第七二十證方一十三首中風發熱六七日不解而煩有表裡證渴欲飲水水入而吐此為水逆五苓散主之方見結胸悶中傷寒二三日心中悸而煩者小建中湯主之方桂枝三兩甘草二兩炙芍藥六兩生薑三兩切大棗十一枚擘膠飴一升上六味以水七升煮取三升去滓納飴溫服一升嘔家不可服以甘故也傷寒脈浮而醫以火迫劫之亡陽驚狂臥起不安桂枝去芍藥加蜀漆牡蠣龍骨救逆湯主之方桂枝生薑切蜀漆各三兩洗去腥甘草二兩炙牡蠣五兩熬龍骨四兩大棗十二枚擘上七味以水八升先煮蜀漆減二升納諸藥煮取三升去滓溫服一升一法以水一斗二升煮取五升燒針令其汗針處被寒核起而赤者必發奔豚氣從少腹上衝者灸其核上一壯與桂枝加桂湯方桂枝五兩芍藥生薑各三兩大棗十二枚擘甘草二兩炙上五味以水七升煮取三升去滓溫服一升本云桂枝湯今加桂滿五兩所以加桂者以能瀉奔豚氣也火逆下之因燒針煩躁者桂枝甘草龍骨牡蠣湯主之方桂枝一兩甘草龍骨牡蠣各二兩熬上四味以水五升煮取二升去滓溫服八合日三服傷寒加溫針必驚太陽病六七日出表證續在脈微而沉反不結胸其人發狂者以熱在下焦少腹堅滿小便自利者下血乃愈所以然者以太陽隨經瘀熱在裡故也宜下之以抵當湯太陽病身黃脈沉結少腹堅小便不利者為無血小便自利其人如狂者血證諦也抵當湯主之傷寒有熱少腹滿應小便不利今反利者為有血也當須下之不可余藥宜抵當丸抵當湯方大黃二兩破六片桃仁二十枚去皮尖熬虻蟲去足翅熬水蛭各三十枚熬上四味以水五升煮取三升去滓溫服一升不下更服抵當丸方大黃三兩桃仁二十五枚去皮尖熬虻蟲去足翅熬水蛭各二十枚熬上四味搗分為四丸以水一升煮取一丸取七合服晬時當下不下更服婦人中風發熱惡寒經水適來得七八日熱除而脈遲身涼胸脅下滿如結胸狀譫語此為熱入血室當刺期門隨其虛實而取之婦人中風七八日續得寒熱發作有時經水適斷者此為熱入血室其血必結故使如瘧狀發作有時小柴胡湯主之方見柴胡湯門婦人傷寒發熱經水適來晝日了了暮則譫語如見鬼狀此為熱入血室無犯胃氣及上二焦必當自愈傷寒無大熱口燥渴而煩其背微惡寒白虎湯主之傷寒脈浮發熱無汗其表不解不可與白虎湯渴欲飲水無表證白虎湯主之傷寒脈浮滑此以表有熱里有寒白虎湯主之方知母六兩石膏一斤碎甘草二兩炙粳米六合上四味以水一斗煮米熟湯成去滓溫服一升日三服又方知母六兩石膏一斤碎甘草二兩炙人參三兩粳米六合上五味以水一斗煮米熟湯成去滓溫服一升日三服立夏後至立秋前得用之立秋後不可服春三月病常苦裡冷白虎湯亦不可與之與之即嘔利而腹痛諸亡血及虛家亦不可與白虎湯得之則腹痛而利但當溫之太陽與少陽合病自下利者與黃芩湯若嘔者與黃芩加半夏生薑湯黃芩湯方黃芩三兩芍藥甘草各二兩炙大棗一十二枚擘上四味以水一斗煮取三升去滓溫服一升日再夜一服黃芩加半夏生薑湯方半夏半升洗生薑一兩半切上二味加入前方中即是傷寒胸中有熱胃中有邪氣腹中痛欲嘔吐黃連湯主之方黃連甘草炙乾薑桂枝人參各三兩半夏半升洗大棗十二枚擘上七味以水一斗煮取六升去滓溫分五服晝三夜二服傷寒八九日風濕相搏身體疼煩不能自轉側不嘔不渴下已脈浮而緊桂枝附子湯主之若其人大便堅小便自利朮附子湯主之方桂枝四兩附子三枚炮生薑三兩切大棗十二枚擘甘草二兩炙上五味以水六升煮取二升去滓分溫三服朮附子湯方於前方中去桂加白朮四兩即是一服覺身痹半日許復服之盡其人如冒狀勿怪即是附子術並走皮中逐水氣未得除故使之耳法當加桂四兩以大便堅小便自利故不加桂也風濕相搏骨節疼煩掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣或身微腫甘草附子湯主之方甘草二兩炙附子二枚炮白朮三兩桂枝四兩上四味以水六升煮取三升去滓溫服一升日三服初服得微汗即止能食汗止復煩者將服五合恐一升多者後服六七合愈傷寒脈結代心動悸炙甘草湯主之方甘草四兩炙桂枝生薑各三兩切麥門冬去心半升麻子仁半升人參阿膠各二兩大棗三十枚擘生地黃一斤切上九味以清酒七升水八升煮取三升去滓納膠消烊盡溫服一升日三服陽明病狀第八七十五證方一十一首陽明之為病胃中寒是也問曰病有太陽陽明有正陽陽明有微陽陽明何謂也答曰太陽陽明者脾約是也正陽陽明者胃家實是也微陽明明者發其汗若利其小便胃中燥便難是也問曰何緣得陽明病答曰太陽病發其汗若下之亡其津液胃中乾燥因為陽明不更衣而便難復為陽明病也問曰陽明病外證云何答曰身熱汗出而不惡寒但反惡熱問曰病有得之一日發熱惡寒者何答曰然雖二日惡寒自罷即汗出惡熱也曰惡寒何故自罷答曰陽明處中主土萬物所歸無所復傳故始雖惡寒二日自止是為陽明病太陽初得病時發其汗汗先出復不徹因轉屬陽明病發熱無汗嘔不能食而反汗出濈濈然是為轉在陽明傷寒三日陽明脈大病脈浮而緩手足溫是為系在太陰太陰當發黃小便自利者不能發黃至七八日而堅為屬陽明傷寒傳系陽明者其人濈然後汗出陽明中風口苦咽乾腹滿微喘發熱惡寒脈浮若緊下之則腹滿小便難也陽明病能食為中風不能食為中寒陽明病中寒不能食而小便不利手足然汗出此為欲作堅瘕也必頭堅後溏所以然者胃中冷水穀不別故也陽明病初為欲食之小便反不數大便自調其人骨節疼翕翕如有熱狀奄然發狂然汗出而解此為水不勝穀氣與汗共並堅者即愈陽明病欲解時從申盡戍陽明病不能食下之不解其人不能食攻其熱必噦所以然者胃中虛冷故也其人本虛攻其熱必噦陽明病脈遲食難用飽飽即微煩頭眩者必小便難此欲作谷疸雖下之其腹必滿如故耳所以然者脈遲故也陽明病久久而堅者陽明病當多汗而反無汗其身如蟲行皮中之狀此為久虛故也冬陽明病反無汗但小便利二三日嘔而咳手足若厥者其人頭必痛若不嘔不咳手足不厥者頭不痛冬陽明病但頭眩不惡寒故能食而咳者其人咽必痛若不咳者咽不痛陽明病脈浮而緊其熱必潮發作有時但浮者必盜汗出陽明病無汗小便不利心中懊憹必發黃陽明病被火額上微汗出而小便不利必發黃陽明病口燥但欲漱水不欲咽者必衄陽明病本自汗出醫復重發其汗病已瘥其人微煩不了了此大便堅也必亡津液胃中燥故令其堅當問小便日幾行若本日三四行今日再行者必知大便不久出今為小便數少津液當還入胃中故知必當大便也夫病陽多者熱下之則堅汗出多極發其汗亦堅傷寒嘔多雖有陽明證不可攻也陽明病當心下堅滿不可攻之攻之遂利不止者利止者愈陽明病合色赤不可攻之必發熱色黃者小便不利也陽明病不吐下而煩者可與承氣湯陽明病其脈遲雖汗出不惡寒其體必重短氣腹滿而喘有潮熱如此者其外為解可攻其里手足濈然汗出此為已堅承氣湯主之若汗出多而微惡寒外為未解其熱不潮勿與承氣湯若腹大滿而不大便者可與小承氣湯微和其胃氣勿令至大下陽明病潮熱微堅可與承氣湯不堅勿與之若不大便六七日恐有燥屎欲知之法可與小承氣湯若腹中轉矢氣者此為有燥屎乃可攻之若不轉矢氣者此但頭堅後溏不可攻之攻之必腹脹滿不能食欲飲水者即噦其後發熱者必復堅以小承氣湯和之若不轉矢氣者慎不可攻之夫實則譫語虛則鄭聲鄭聲者重語是也直視譫語喘滿者死下利者亦死陽明病其人多汗津液外出胃中燥大便必堅堅者則譫語承氣湯主之陽明病譫語妄言發潮熱其脈滑疾如此者承氣湯主之因與承氣湯一升腹中轉氣者復與一升如不轉氣者勿與之明日又不大便脈反微澀此為裡虛為難治不得復與承氣湯陽明病譫語有潮熱反不能食者必有燥屎五六枚若能食者但堅耳承氣湯主之陽明病下血而譫語者此為熱入血室但頭汗出者當刺期門隨其實而瀉之濈然汗出者則愈汗出而譫語者有燥屎在胃中此風也過經乃可下之下之若早語言必亂以表虛里實下之則愈宜承氣湯傷寒四五日脈沉而喘滿沉為在裡而反發其汗津液越出大便為難表虛里實久則讝語陽明病下之心中懊憹而煩胃中有燥屎者可攻其人腹微滿頭堅後溏者不可不下之有燥屎者宜承氣湯病者五六日不大便繞臍痛躁煩發作有時此為有燥屎故使不大便也病者煩熱汗出即解復如瘧狀日晡所發者屬陽明脈實者當下之脈浮虛者當發其汗下之宜承氣湯發汗宜桂枝湯方見桂枝湯門大下後六七日不大便煩不解腹滿痛者此有燥屎所以然者本有宿食故也宜承氣湯病者小便不利大便乍難乍易時有微熱怫鬱不能臥有燥屎故也宜承氣湯得病二三日脈浮弱無太陽柴胡證而煩心下堅至四日雖能食以小承氣湯少與微和之令小安至六日與承氣湯一升不大便六七日小便少者雖不大便但頭堅後溏未定成其堅攻之必溏當須小便利定堅乃可攻之宜承氣湯傷寒七八日目中不了了睛不和無表裡證大便難微熱者此為實急下之宜承氣湯陽明病發熱汗多者急下之宜承氣湯發汗不解腹滿痛者急下之宜承氣湯腹滿不減減不足言當下之宜承氣湯陽明與少陽合病而利脈不負者為順滑而數者有宿食宜承氣湯方並見承氣湯門陽明病脈浮緊咽乾口苦腹滿而喘發熱汗出不惡寒反偏惡熱其身體重發汗即躁心中憒憒而反譫語加溫針必怵惕又煩躁不得眠下之胃中空虛客氣動膈心中懊憹舌上苔者梔子湯主之陽明病下之其外有熱手足溫不結胸心中懊憹若飢不能食但頭汗出梔子湯主之方梔子十四枚擘香豉四合綿裹上二味以水四升先煮梔子取二升半納豉煮取一升半去滓分再服溫進一服得快吐止後服三陽合病腹滿身重難以轉側口不仁言語向經譫語遺尿發汗則譫語下之則額上生汗手足厥冷白虎湯主之按諸本皆云向經不敢刊改若渴欲飲水口乾舌燥者白虎湯主之方見雜療中若脈浮發熱渴欲飲水小便不利豬苓湯主之方豬苓去黑皮茯苓澤瀉阿膠滑石碎各一兩上五味以水四升先煮四味取二升去滓納膠烊消溫服七合日三服陽明病汗出多而渴者不可與豬苓湯以汗多胃中燥豬苓湯複利其小便故也胃中虛冷其人不能食者飲水即噦脈浮發熱口乾鼻燥能食者即衄若脈浮遲表熱裡寒下利清穀四逆湯主之方甘草二兩炙乾薑一兩半附子一枚生去皮破八片上三味以水三升煮取一升二合去滓分溫再服強人可大附子一枚乾薑三兩陽明病發潮熱大便溏小便自可而胸脅滿不去小柴胡湯主之陽明病脅下堅滿不大便而嘔舌上苔者可以小柴胡湯上焦得通津液得下胃氣因和身濈然汗出而解陽明中風脈弦浮大而短氣腹都滿脅下及心痛久按之氣不通鼻乾不得汗其人嗜臥一身及目悉黃小便難有潮熱時時噦耳前後腫刺之小瘥外不解病過十日脈續浮與小柴胡湯但浮無餘證與麻黃湯不溺腹滿加噦不治方見柴胡湯門陽明病其脈遲汗出多而微惡寒表為未解可發汗宜桂枝湯陽明病脈浮無汗其人必喘發汗即愈宜麻黃湯方並見上陽明病汗出若發其汗小便自利此為內竭雖堅不可攻當須自欲大便宜蜜煎導而通之若土瓜根豬膽汁皆可以導方蜜七合上一味納銅器中微火煎之稍凝如飴狀攪之勿令焦著欲可丸捻如指許長二寸當熱時急作令頭銳以納穀道中以手急抱欲大便時乃去之又方大豬膽一枚瀉汁和少法醋以灌穀道中如一食頃當大便出宿食惡物已試甚良陽明病發熱而汗出此為熱越不能發黃也但頭汗出其身無有齊頸而還小便不利渴引水漿此為瘀熱在裡身必發黃茵陳湯主之傷寒七八日身黃如橘小便不利其腹微滿茵陳湯主之方茵陳六兩梔子十四枚擘大黃二兩上三味以水一斗二升先煮茵陳減六升納二味煮取三升去滓分溫三服小便當利溺如皂莢沫狀色正赤一宿黃從小便去陽明證其人喜忘必有蓄血所以然者本有久瘀血故令喜忘雖堅大便必黑抵當湯主之病者無表裡證發熱七八日雖脈浮數可下之假令下已脈數不解而合熱消穀喜飢至六七日不大便者有瘀血抵當湯主之若數不解而下不止必挾熱便膿血方見雜療中食谷而嘔者屬陽明茱萸湯主之方吳茱萸一升人參三兩生薑六兩切大棗十二枚擘上四味以水七升煮取二升去滓溫服七合日三服得湯反劇者屬上焦也陽明病寸口緩關上小浮尺中弱其人發熱而汗出復惡寒不嘔但心下痞此為醫下之也若不下其人復不惡寒而渴者為轉屬陽明小便數者大便即堅不更衣十日無所苦也渴欲飲水者但與之當以法救渴宜五苓散方見療痞門脈陽微而汗出少者為自如汗出多者為太過太過者陽絕於內亡津液大便因堅脈浮而芤浮為陽芤為陰浮芤相搏胃氣則生熱其陽則絕趺陽脈浮而澀浮則胃氣強澀則小便數浮澀相搏大便即堅其脾為約麻子仁丸主之方麻子仁二升芍藥枳實炙各八兩大黃一斤厚朴一尺杏仁一升去皮尖兩仁者熬別作脂上六味蜜和丸如梧桐子大飲服十丸日三服漸加以知為度傷寒發其汗則身目為黃所以然者寒濕相搏在裡不解故也傷寒其人發黃梔子柏皮湯主之方梔子十五枚擘甘草黃柏十五分上三味以水四升煮取二升去滓分溫再服傷寒瘀熱在裡身體必黃麻黃連翹赤小豆湯主之方麻黃去節連翹各一兩杏仁三十枚去皮尖赤小豆一升大棗十二枚擘生梓白皮切一斤甘草二兩炙一方生薑二兩切上七味以水一斗煮麻黃一二沸去上沫納諸藥煮取三升去滓溫服一升少陽病狀第九九證少陽之為病口苦咽乾目眩也少陽中風兩耳無所聞目赤胸中滿而煩不可吐下吐下則悸而驚傷寒病脈弦細頭痛而發熱此為屬少陽少陽不可發汗發汗則譫語為屬胃胃和即愈不和煩而悸太陽病不解轉入少陽脅下堅滿乾嘔不能食飲往來寒熱而未吐下其脈沉緊可與小柴胡湯若已吐下發汗溫針譫語柴胡證罷此為壞病知犯何逆以法治之三陽脈浮大上關上但欲寐目合則汗傷寒六七日無大熱其人躁煩此為陽去入陰故也傷寒三日三陽為盡三陰當受其邪其人反能食而不嘔此為三陰不受其邪傷寒三日少陽脈小欲已少陽病欲解時從寅盡辰千金翼云卷第九
