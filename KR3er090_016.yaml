body:
  text: 卷第十六中風上諸酒第一方二十首獨活酒主八風十二痹方獨活石楠各四兩防風三兩茵芋附子去皮烏頭去皮天雄去皮各二兩上七味切以酒二斗浸六日先食服一服半合以知為度牛膝酒主八十三種風著人頭面腫癢眉發隕落手腳拘急不得行步夢與鬼神交通或心煩恐怖百脈自驚轉加羸瘦略出要者不得盡說方牛膝石楠烏頭去皮天雄去皮茵芋各二兩細辛五分上六味切以酒一斗二升浸之春秋五日夏三日冬七日初服半合治風癲宿澼服之即吐下強人日三老小日一不知稍加唯禁房室及豬肉等茵芋酒主新久風體不仁或垂曳或拘急腫或枯焦施連方茵芋狗脊烏頭去皮附子各二兩去皮躑躅天雄去皮各一兩上六味切以酒一斗浸八九日服半合以知為度金牙酒主積年八風五注舉身嚲曳不得轉側行步跛躃不能收攝又暴口噤失音言語不通利四肢脊筋皆急肉痹血脈曲攣掣痱䐔起腫痛流走無常處勞冷積聚少氣或寒或熱三焦脾胃不磨飲澼結實逆害飲食醋咽嘔吐食不生肌醫所不能治者悉主之方金牙燒碎之如粳米大細辛地膚子若無子用莖代之地黃附子去皮防風蜀椒去目閉口者汗茵芋蒴藋根各四兩羌活一斤上一十味切以瓷罌中清酒四斗漬之密泥封勿泄春夏三四宿秋冬六七宿去滓服一合此酒無毒及可小醉不盡一劑病無不愈矣又令人肥健儘自可加諸藥各三兩唯蜀椒五兩用酒如法勿加金牙也此酒勝針灸治三十年諸風嚲曳神驗冷加乾薑四兩一方用升麻四兩人參三兩石斛牛膝五兩又一方用蒺藜四兩黃耆三兩又一方有續斷四兩千金用莽草無茵芋馬灌酒主除風氣通血脈益精氣定六腑明耳目悅澤顏色頭白更黑齒落更生服藥二十日力勢倍六十日誌氣充強八十日能夜書百日致神明房中盈壯如三十時力能引弩有人服藥年七八十有四男三女隴西韓府君筋急兩膝不得屈伸手不得帶衣起居增劇惡風寒冷通身流腫生瘡藍田府君背痛不能立面目萎黃服之二十日身輕目明房室盈壯病在腰膝藥悉主之常山太守方天雄去皮茵芋各三兩蜀椒去目閉口者汗躑躅各一升白蘞三兩烏頭去皮附子去皮乾薑各二兩上八味切以酒三斗漬之春夏五日秋冬七日去滓初服半合為始稍加至三合暴滓為散服方寸匕日三以知為度夏日恐酒酸以油單覆下垂井中近水不酸也千金有桂心商陸為十味芫青酒主百病風邪狂走少腹腫癥瘕霍亂中惡飛屍遁注暴癥傷寒中風濕冷頭痛身重諸病寒熱風虛及頭風服酒當從少起藥發當吐清汁一二升方芫青巴豆去皮心熬斑蝥各三十枚去翅足熬附子去皮躑躅細辛烏頭去皮乾薑桂心蜀椒去目閉口者汗天雄去皮黃芩各一兩上一十二味切以酒一斗漬十日每服半合日二應苦煩悶飲一升水解之以知為度蠻夷酒主久風枯攣三十年著床及諸惡風眉毛墮落方獨活烏頭去皮乾薑地黃礜石燒丹參各一兩白芷三兩蕪荑芫花柏子仁各一兩人參甘遂狼毒蓯蓉蜀椒去目閉口者汗防風細辛礬石燒汁盡牛膝寒水石茯苓金牙燒麻黃去節芍藥當歸附子去皮二兩薯蕷杜仲炙石楠牡蠣熬山茱萸桔梗牡荊子款冬各三兩白朮三分石斛二分桂心一分蘇子一升赤石脂二兩半上四十三味切以酒二斗漬之夏三日春秋六日冬九日一服半合當密室中合藥勿令女人六畜見之二日清齋乃合藥加麥門冬二兩大棗四十枚更佳也千金有芎藭又蠻夷酒主八風十二痹偏枯不隨宿食虛冷五勞七傷及女人產後余疾月水不調方遠志去心礬石燒汁盡各二兩石膏二兩半蜈蚣二枚炙狼毒礜石燒白朮附子去皮半夏洗桂心石楠白石脂續斷龍膽芫花玄參白石英代赭䕡茹石葦去毛天雄去皮寒水石防風桔梗藜蘆卷柏山茱萸細辛烏頭去皮躑躅蜀椒去目閉口者汗秦艽菖蒲白芷各一兩上三十四味切以酒二斗漬四日一服一合日再十日後瀝去滓曝乾搗篩為散酒服方寸匕日再以知為度魯公酒主百病風眩心亂耳聾目瞑淚出鼻不聞香臭口爛生瘡風齒瘰癧喉下生瘡煩熱厥逆上氣胸脅肩髀痛手不上頭不自帶衣腰脊不能俯仰腳痠不仁難以久立八風十二痹五緩六急半身不遂四肢偏枯筋攣不可屈伸賊風咽喉閉塞哽哽不利或如錐刀所刺行人皮膚中無有常處久久不治入人五臟或在心下或在膏肓遊行四肢偏有冷處如風所吹久寒積聚風濕五勞七傷虛損萬病方細辛半兩茵芋烏頭去皮躑躅各五分木防己天雄去皮石斛各一兩柏子仁牛膝山茱萸通草秦艽桂心乾薑乾地黃黃芩一作黃耆茵陳附子去皮瞿麥王蓀一作王不留行杜仲炙澤瀉石楠防風遠志各三分去心上二十五味切以酒五斗漬十日一服一合加至四五合以知為度一方加甘草三分附子酒主大風冷痰澼脹滿諸痹方大附子一枚重二兩者亦云二枚去皮破上一味用酒五升漬之春五日一服一合以痹為度日再服無所不治勿用蛀者陳者非者不瘥病紫石酒主久風虛冷心氣不足或時驚怖方紫石英一斤鍾乳研防風遠志去心桂心各四兩麻黃去節茯苓白朮甘草炙各三兩上九味切以酒三斗漬如上法服四合日三亦可至醉常令有酒氣丹參酒主惡風疼痹不仁惡瘡不瘥無痂鬚眉禿落方丹參前參細辛卷柏天雄去皮秦艽茵芋乾薑牛膝芫花白朮附子去皮代赭續斷防風桔梗䕡茹礬石燒汁盡半夏洗白石脂石楠狼毒桂心菟絲子芍藥龍膽石葦恆山黃連黃芩玄參礜石燒遠志去心紫菀山茱萸乾地黃蘇甘草炙各一兩石膏二兩杏仁二十枚去皮尖雙仁麻黃去節大黃各五分菖蒲一兩半白芷一兩蜈蚣二枚赤頭者炙上四十五味切以酒四斗漬五宿一服半合增至一二合日二以瘥為度杜仲酒主腰腳疼痛不遂風虛方杜仲八兩炙羌活四兩石楠二兩大附子三枚去皮上四味切以酒一斗漬三宿服二合日再杜仲酒主腕傷腰痛方杜仲八兩炙乾地黃四兩當歸烏頭去皮芎藭各二兩上五味切以酒一斗二升漬服之如上法枳茹酒主諸藥不能瘥者方枳茹枳上青皮刮取其末欲至心止得茹五升微火熬去濕氣以酒一斗漬微火暖令得藥味隨性飲之主口僻眼急神驗主緩風急風並佳杜仲酒主風勞虛冷腰腳疼屈弱方杜仲炙乳床各八兩當歸芎藭乾薑附子去皮秦艽石斛桂心各三兩蜀椒去目閉口者汗細辛茵芋天雄去皮各二兩獨活防風各五兩上一十五味切以酒三斗漬五宿一服三合日三一方加紫石英五兩菊花酒主男女風虛寒冷腰背痛食少羸瘦無色噓吸少氣去風冷補不足方菊花杜仲各一斤炙獨活鍾乳研萆薢各八兩茯苓二兩紫石英五兩附子去皮防風黃耆蓯蓉當歸石斛桂心各四兩上一十四味切以酒七斗漬五宿一服二合稍漸加至五合日三千金有乾薑麻子酒主虛勞百病傷寒風濕及女人帶下月水往來不調手足疼痹著床方麻子一石法曲一斗上二味先搗麻子成末以水兩石著釜中蒸麻子極熟炊一斛米頃出去滓隨汁多少如家釀法酒熟取清任性飲之令人肥健黃耆酒主大風虛冷痰澼偏枯腳弱腫滿百病方黃耆獨活山茱萸桂心蜀椒去目閉口者汗白朮牛膝葛根防風芎藭細辛附子去皮甘草炙各三兩大黃一兩乾薑二兩半秦艽當歸烏頭去皮各二兩上一十八味切以酒三斗漬十日一服一合日三稍加至五合夜二服無所忌大虛加蓯蓉二兩葳蕤二兩石斛二兩多忘加菖蒲二兩紫石英二兩心下水加茯苓二兩人參二兩薯蕷三兩服盡復更以酒三斗漬滓不爾可曝乾作散酒服方寸匕日三地黃酒生地黃汁一石煎取五斗冷漬曲發先淘米曝乾欲釀時別煎地黃汁如前法漬米一宿漉干炊釀一如家釀法拌饙亦以余汁酘酘皆然其押出地黃干滓亦和米炊釀之酒熟訖封七日押取溫取一盞常令酒氣相接慎豬魚服之百日肥白疾愈諸散第二方九首論一首九江太守散主男女老少未有不苦風者男子五勞七傷婦人產後余疾五臟六腑諸風皆悉主之方知母人參茯苓各三兩蜀椒半兩汗去目閉口者栝蔞一兩半防風白朮各三兩澤瀉二兩乾薑附子炮去皮桂心各一兩細辛一兩上一十二味搗篩為散以酒服方寸匕日再飲酒常令有酒色勿令大醉也禁房室豬魚生冷無病常服益佳延年益壽輕身明目強筋骨愈折傷吳茱萸散主風跛蹇偏枯半身不遂晝夜呻吟醫所不能治方吳茱萸乾薑白蘞牡桂附子炮去皮薯蕷天雄炮去皮乾漆熬秦艽各半兩狗脊一分防風一兩上一十一味搗篩為散以酒服方寸匕日三服山茱萸散主風跛痹治法如前方山茱萸附子炮去皮薯蕷王蓀牡桂乾地黃乾漆熬秦艽天雄炮去皮白朮各半兩狗脊上一十一味搗篩為散先食酒服方寸匕日三藥走皮膚中淫淫服之一月愈萬金散主頭痛眩亂耳聾兩目淚出鼻不聞香臭口爛惡瘡鼠漏瘰癧喉咽生瘡煩熱咳嗽胸滿腳腫半身偏枯不遂手足筋急緩不能屈伸賊風猥退蜚屍蠱注江南惡氣在人心下或在膏肓遊走四肢針灸不及積聚僻戾五緩六急濕痹女人帶下積聚生產中風男女五勞七傷皆主之方石斛防風巴戟天天雄炮去皮乾地黃石楠遠志去心躑躅烏頭炮去皮乾薑桂心各一兩半蜀椒半升汗去目閉口者汗瞿麥茵陳秦艽茵芋黃耆薔薇獨活細辛牛膝各一兩柏子澤瀉杜仲各半兩炙山茱萸通草甘草各三分上二十七搗篩為散雞未鳴時冷酒服五分匕日三加至一匕人參散主一切諸風方人參當歸各五分天雄炮去皮前胡吳茱萸白朮秦艽烏頭炮去皮細辛各二分附子一兩炮去皮獨活一分防風麻黃去節莽草蜀椒去目閉口者汗桔梗天門冬去心五味子白芷各三兩芎藭一兩上二十味搗篩為散酒服方寸匕日三服中熱者加減服之若卒中風傷寒鼻塞者服訖覆取汗即愈防風散主風所為卒起眩冒不知人四肢不知痛處不能行步或身體偏枯不遂口吐涎沫出手足拘急方防風蜀椒去目閉口者汗麥門冬各一兩去心天雄炮去皮附子炮去皮人參當歸各五分五味子乾薑烏頭炮去皮細辛白朮各三兩柴胡山茱萸莽草麻黃去節桔梗白芷各半兩上一十八味搗篩為散酒服方寸匕日三不知稍增之以知為度八風十二痹散主五勞七傷風入五臟手腳身體沉重或如邪氣時悶汗出又蜚屍遁注相染易或少氣腹滿或皮膚筋痛項骨相牽引無常處或咽中有氣吞之不入吐之不出皆主之方細辛巴戟黃耆礜石燒厚朴炙白蘞桂心黃芩牡荊山茱萸白朮女萎菊花人參天雄炮去皮防風萆薢石斛蜀椒各一兩汗去目閉口者芎藭龍膽芍藥蓯蓉各半兩紫菀附子炮去皮薯蕷五味子各一兩桔梗遠志各二兩半去心上三十四味搗篩為散酒服方寸匕日二稍增至二匕主萬病又八風十二痹散主風痹嘔逆不能飲食者心痹也咳滿腹痛氣逆唾涕白者脾痹也津液唾血腥臭者肝痹也陰痿下濕者痿痹也腹中雷鳴食不消食即氣滿小便數起胃痹也兩膝寒不能行者濕痹也手不能舉腫痛而逆骨痹也煩滿短氣涕唾青黑腎痹出並悉主之方遠志去心黃耆黃芩白蘞附子炮去皮龍膽薯蕷厚朴炙蜀椒各半兩去目及閉口者汗牡荊子天雄炮去皮細辛菊花狗脊山茱萸防風芎藭桂心各三分五味子巴戟天各一兩茯苓芍藥秦艽烏頭炮去皮蕪荑菖蒲葳蕤各一兩上二十七味搗篩為散食後飲服方寸匕日三寧從少起稍漸增之秦王續命大八風散主諸風五緩六急或浮腫噓吸微痹風虛不足並補益臟氣最良其說甚多略取其要方秦艽三兩主風不仁防風二兩去風疼除濕痹附子二兩炮去皮主風濕堅肌骨止痛菖蒲二兩主風濕痹拘急茯苓二兩主安中下氣消水牛膝二兩去脛虛損煩疼填骨髓桔梗二兩主驚悸和腸胃細辛一兩主留飲逐風邪烏頭三兩炮去皮主逐風上氣除邪薯蕷一兩主益氣補五臟芎藭一兩主風寒溫中遠志二兩半去心主益氣力定心志天雄一兩炮主留飲逐風邪石龍芮一兩主風補氣除滿蜀椒一兩去目及閉口者汗主溫中逐風邪石斛二兩主風益氣嗜食白芷一兩主風邪除虛滿龍膽一兩主風腫除風熱白朮一兩主風腫消水氣山茱萸一兩主風邪濕氣桂心一兩主溫筋利血脈除邪氣菊花一兩主風濕補臟益氣女萎一兩主溫中逐風邪厚朴一兩炙主溫中除冷益氣除滿巴戟天一兩主下氣堅肌膚萆薢一兩主風濕止悸痛牡荊子一兩主風益氣無用柏子仁乾漆一兩熬主堅體和少腹肉蓯蓉一兩主虛續傷腰背痛五味子一兩半主益氣除寒熱芍藥一兩止痛散血氣黃芩一兩主除虛熱止痛白礬一兩燒汁盡主除寒熱破積下氣續斷一兩主風虛傷絕白蘞一兩主風益氣力黃耆一兩半主虛羸風邪目黃上三十六味皆新好以破除日合搗篩為散溫清酒和服方寸匕日三服不知稍增之可至二三匕以知為度若苦心悶者飲少冷水禁生魚豬肉菘菜能斷房室百日甚善此方療風消脹滿調和五臟便利六腑男女有患悉可合服常用甚良患心氣不足短氣納人參甘草各一兩若腹痛是腎氣不足納杜仲羊腎各二兩隨病增減論曰此等諸散天下名藥然熱人不可用唯舊冷者大佳諸膏第三方三首蒼梧道士陳元膏主風百病方當歸丹砂各三兩研細辛芎藭二兩附子去皮二十二銖桂心一兩二銖天雄去皮三兩二銖乾薑三兩七銖烏頭去皮三兩七銖雄黃三兩二銖研松脂半斤大醋二升白芷一兩豬肪脂十斤生地黃二斤取汁上一十五味切以地黃汁大醋漬藥一宿豬肪中合煎之十五沸膏成去滓納丹砂等末熟攪無令小兒婦人六畜見之合藥切須禁之有人苦胸脅背痛服之七日所出如雞子汁者二升即愈有人脅下積氣如杯摩藥十五日愈有人苦臍旁氣如手摩之去如瓜中黃穰一升許愈有人患腹切痛時引脅痛數年摩膏下如蟲三十枚愈有女人苦月經內塞無子數年膏摩少腹並服如杏子大一枚十日下崩血二升愈其年有子有患風瘙腫起累累如大豆摩之五日愈有患膝冷痛摩之五日亦愈有患頭項寒熱瘰癧摩之皆愈有患面目黎黑消瘦是心腹中疾服藥下如酒糟者二升愈丹參膏主傷寒時行賊風惡氣在外肢節痛攣不得屈伸項頸咽喉痹塞噤閉入腹則心急腹脹胸中嘔逆藥悉主之病在腹內服之在外摩之緩風不遂濕痹不仁偏枯拘屈口面喎斜耳聾齒痛風頸腫痹腦中風痛石癰結核瘰癧堅腫未潰敷之取消及赤白癮疹諸腫無頭作癰疽者摩之令消風結核在耳後風水遊腫疼痛㿇㿇針之黃汁出時行溫氣服之如棗大一枚小兒以意減之方丹參蒴藋根各四兩秦艽三兩羌活蜀椒汗去目閉口者牛膝烏頭去皮連翹白朮各二兩躑躅菊花莽草各一兩上一十二味切以苦酒五升麻油七升合煎苦酒盡去滓用豬脂煎成膏凡風冷者用酒服熱毒單服齒痛綿沾嚼之赤膏主一切火瘡灸瘡金瘡木石傷損不可瘥者醫所不能療令人憂懼汗無所出以塗上一宿生肌肉即瘥方生地黃汁二升生烏麻脂二兩薰陸香末丁香各二錢匕黃丹四錢蠟如雞子黃二枚上六味先極微火煎地黃汁烏麻脂三分減一乃下丁香薰陸香煎三十沸乃下黃丹次下蠟煎之使消以匙攪之數千回下之停凝用之喎僻第四方四首治心虛寒風半身不遂骨節離緩弱不用便利無度口面喎斜乾薑附子湯方乾薑附子炮去皮各八兩芎藭三兩麻黃去節桂心各四兩上五味㕮咀以水一斗煮取三升分三服三日復進一劑治中風面目相引偏僻牙車急舌不轉方牡蠣熬礬石燒附子生去皮伏龍肝等分上四味搗篩為散以三歲雄雞血和藥敷上預候看勿令太過偏上塗左偏左塗上正則洗去之烏頭膏主賊風身體不遂偏枯口僻及傷寒其身強直方烏頭去皮五兩野葛莽草各一斤上三味切以好酒二斗五升淹漬再宿三日以豬膏五斤煎成膏合藥作東向露灶以葦火煎之以三上三下膏藥成有病者向火摩三千過汗出即愈若觸寒霧露鼻中塞向火膏指頭摩人鼻孔中即愈勿令入口眼治風著人面引口偏著耳牙車急舌不得轉方生地黃汁竹瀝各一升獨活三兩切上三味合煎取一升頓服之即愈心風第五方一十四首茯神湯主五邪氣入人體中見鬼妄語有聽見聞心悸跳動恍惚不定方茯神人參茯苓菖蒲各二兩赤小豆四十枚上五味㕮咀以水一斗煮取二升半分三服人參湯主風邪鬼氣往來發作有時或無時節方人參防風烏頭炮去皮黃芩附子炮去皮遠志去心桔梗秦艽五味子前胡牡蠣熬細辛石膏碎芎藭蜀椒汗去目閉口者牛膝澤瀉桂心山茱萸竹皮衍橘皮桑根白皮各三兩乾薑澤蘭狗脊石楠各半兩白朮一兩半大棗十六枚擘麻黃一兩去節茯苓獨活甘草炙各五分上三十二味㕮咀以水六升酒六升合煮取四升分五服日三夜二服補心湯主奄奄忽忽朝瘥暮劇驚悸心中憧憧胸滿不下食飲陰陽氣衰脾胃不磨不欲聞人聲定志下氣方人參茯苓龍齒炙當歸遠志去心甘草炙各三兩桂心半夏洗各五兩生薑六兩切大棗二十枚擘黃耆四兩枳實炙枳梗茯神各二兩半上一十四味㕮咀以水一斗二升先煮粳米五合令熟去滓納藥煮取四升每服八合日三夜二服鎮心丸主風虛勞冷心氣不足喜忘恐怖神志不定方防風五分甘草二兩半炙乾薑半兩當歸五分澤瀉一兩紫苑半兩茯神二分大黃五分秦艽一兩半菖蒲三兩白朮二兩半桂心三兩白蘞一兩遠志去心二兩附子二兩炮去皮桔梗三分大豆卷四兩薯蕷二兩石膏三兩研茯苓一兩人參五分大棗五十枚擘麥門冬去心五兩上二十三味末之煉蜜和為丸酒服如梧子大十丸日三服加至二十丸續命湯治大風風邪入心心痛達背背痛達心前後痛去來上下或大腹脹滿微痛一寒一熱心中煩悶進退無常面或青或黃皆是房內太過虛損勞傷交會後汗出汗出未除或因把扇或出當風而成勞五俞大傷風因外入下有水因變成邪雖病如此然於飲食無退坐起無異至卒不知是五內受氣故也名曰行屍宜預備此方麻黃六分去節大棗十枚擘桂心防風細辛芎藭甘草炙芍藥人參秦艽獨活黃芩防己附子炮去皮白朮各三分生薑五分上一十六味切以水一斗三升先煮麻黃一沸去上沫納諸藥煮取五升去滓納棗煎取三升分為三服老小久病服五合取汗忌生蔥海藻菘菜生菜豬肉冷水桃李雀肉等鎮心丸治胃氣厥實風邪入臟喜怒愁憂心意不定恍惚喜忘夜不得寐諸邪氣病悉主之方秦艽柏實當歸乾膝熬白蘞杏仁去皮尖雙仁熬芎藭各三分澤瀉一兩乾地黃六分防風人參各四分甘草一兩炙白朮薯蕷茯苓乾薑各二分麥門冬去心二兩前胡四分上一十八味搗下篩煉蜜和為丸如桐子先食飲服十丸日三不知稍增之忌海藻菘菜蕪荑桃李雀肉酢物等定志小丸主心氣不定五臟不足憂悲不樂忽忽遺忘朝瘥暮極狂眩方遠志去心菖蒲各二兩茯苓人參各三兩上四味搗篩為末煉蜜和丸如梧子飲服二丸日三加茯神為茯神丸散服亦佳補心治遺忘方菖蒲遠志去心茯苓人參通草石決明各等分上六味搗篩為散食後水服方寸匕日一服酒亦佳槐實益心智方以十月上辛日令童子於東方採兩斛槐子去不成者新瓦盆貯之以井華水漬之令淹瀸合頭密封七日去黃皮更易新盆仍以水漬之密封二七日去其黑肌擇取色黃鮮者以小盆隨藥多少以密布次其黃夏密布其上以盆合頭密封納暖馬糞中三七日開視結成搗丸如梧子日服三丸大月加三丸小月減三丸先齋二七日乃服三十日有驗百日日行二百里目明視見表裡白髮更黑齒落再生面皺卻展日記千言尋本知末除六十四種風去九漏冷癥癖蟲毒魘魅開心肥健方人參五兩大豬肪八枚上二味搗人參為散豬脂煎取凝每服以人參一分豬脂十分以酒半升和服之一百日骨髓充溢日記千言身體潤澤去熱風冷風頭心風等月服二升半即有大效孔子枕中散方龜甲炙龍骨菖蒲遠志去心各等分上四味為散食後水服方寸匕日三常服不忘鎮心省睡益智方遠志五十兩去心益智子菖蒲各八兩上三味搗篩為散以淳糯米酒服方寸匕一百日有效秘不令人知止睡方龍骨虎骨炙龜甲炙上三味搗篩為散水服方寸匕日二以睡定為止治多睡欲閤眼則先服以止睡方麻黃去節白朮各五兩甘草一兩炙上三味以日中時南向搗篩為散食後以湯服方寸匕日三服風眩第六方二十七首治風眩屋轉眼不得開人參湯方人參防風芍藥黃耆各二兩獨活桂心白朮各三兩當歸麥門冬各一兩去心上九味㕮咀以水一斗煮取三升五合分四服治風眩倒屋轉吐逆惡聞人聲茯神湯方茯神四兩黃耆生薑切遠志各三兩去心附子一枚炮去皮防風五兩人參獨活當歸牡蠣熬蓯蓉白朮甘草炙各二兩上一十三味㕮咀以水一斗二升煮取三升分六服每服五合日三夜三一方無白朮防風散主頭面風在眉間得熱如蟲蟻行或頭眩目中淚出防風五兩天雄炮去皮細辛乾薑烏頭炮去皮硃砂研桂心各三兩莽草茯苓各一兩附子炮去皮人參當歸各二兩上一十二味搗篩為散酒服方寸匕日三服防風散主頭眩惡風吐冷水心悶方防風乾薑各二兩桂心一兩半澤蘭附子炮去皮茯苓人參千金作天雄細辛薯蕷白朮各一兩上一十味搗篩為散酒服方寸匕常令有酒氣醺醺則脫巾帽解發前卻梳頭一百遍復投一升酒便洗手足須臾頭面熱解發以粉粉之快臥便愈可洗頭行步如服寒食散十日愈治頭風方搗葶藶子末以湯淋取汁洗頭良治卒中惡風頭痛方搗生烏頭去皮以醋和塗故布上敷痛上須臾痛止日夜五六敷之防風散主頭面身腫方防風二兩白芷一兩白朮三兩上三味搗篩為散酒服方寸匕日二服小三五七散主頭面風目眩耳聾亦隨病所在兩攻方天雄炮去皮三兩山茱萸薯蕷七兩上三味搗篩為散以酒服五分匕日三不知稍增以知為度大三五七散主口喎目斜耳聾面骨疼風眩痛方天雄炮去皮細辛各三兩山茱萸乾薑各五兩薯蕷防風各七兩上六味搗篩為散以酒服五分匕日再不知稍增以知為度治頭面風眼瞤鼻塞眼暗冷淚方杏仁三升搗末水煮四五沸洗頭冷汗盡三度瘥又方熟煮大豆納飯甕中作漿水日日溫洗頭面發不淨加少面勿用水濯不過十洗治頭中白屑如麩糠方立截楮木作枕六日一易新者沐頭主頭風方五月五日取鹽一升水一升合煮並納三匕蛇床以陳蘆燒之三沸以沐頭訖急結密巾之四五日以水沃之神良又方吳茱萸三升上一味以水五升煮取三升以綿拭髮根良八頂散主三十六種風偏枯不遂方天雄炮去皮山茱萸各一兩半麻黃一兩去節薯蕷二兩細辛石楠牛膝莽草各半兩蜀椒去目閉口者汗白朮烏頭炮去皮桔梗防風甘草炙各四兩上一十四味搗篩為散以酒服方寸匕日三千金有川芎藭獨活附子通草菖蒲為十九味治遍身風方石楠三兩純青黑斑者佳上一味搗篩為散酒服三大豆日三至食時當覺兩鬢如蟲行狀亦如風吹從頭項向壁脊腰腳至膝下骨中痛痛遍即臍下頑風盡止若風愈即能飲酒肥健忌如藥法日一服風痹散主三十年惡風濕痹發禿落癮疹生瘡氣脈不通抓搔不覺痛癢方附子炮去皮乾薑白朮各四兩石斛半兩蜀椒去目一分汗及閉口者天雄炮去皮細辛躑躅白蘞烏頭炮去皮石楠桂心各三分上一十二味搗篩為散酒服五分匕以少羊脯下藥日再勿大飽食飢即更服常令有酒熱先服吐下藥後乃服之以韋袋貯藥勿泄忌冷水房室百日十六卷終
