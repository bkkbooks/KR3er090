body:
  text: 卷第二十六針灸上取孔穴法第一論曰安康公李襲興稱武德中出鎮潞州囑隨徵士甄權以新撰明堂示余余既闇昧未之奇也時有深州刺史成君綽忽患頸腫如數升喉中閉塞水粒不下已三日矣以狀告余余屈權救之針其右手次指之端如食頃氣息即通明日飲啖如故爾後縉紳之士多寫權圖略遍華裔正觀中入為少腑奉敕修明堂與承務郎司馬德逸太醫令謝季卿太常丞甄立言等校定經圖於後以所作呈示甄權曰人有七尺之軀臟腑包其內皮膚絡其外非有聖智孰能辨之者乎吾十有八而志學於醫今年過百歲研綜經方推究孔穴所疑更多矣竊聞尋古人伊尹湯液依用炎農本草扁鵲針灸一準黃帝雷公問難殷勤對揚周密去聖久遠愚人無知道聽途說多有穿鑿起自胸臆至如王遺烏銜之法單行淺近雖得其效偶然即謂神妙且事不師古遠涉必泥夫欲行針者必准軒轅正經用藥者須依神農本草自余名醫別錄益多誤耳余退以甲乙校秦承祖圖有旁庭臟會等一十九穴按六百四十九穴有目無名其角孫景風一十七穴三部針經具存焉然其圖缺漏仍有四十九穴上下倒錯前後易處不合本經所謂失之毫釐差之千里也至如石門關元二穴在帶脈下相去一寸之間針關元主婦人無子針石門則終身絕嗣神庭一穴在於額上刺之主發狂灸之則愈癲疾其道幽隱豈可輕侮之哉人誠知惜命罕通經方抄寫方書專委下吏承誤即錄紕繆轉多近智之徒不見正本逢為經抄以此而言可為深誡今所述針灸孔穴一依甄公明堂圖為定學者可細詳之且夫當今醫者各承一業未能綜練眾方所以救疾多不全濟何哉或有偏功針刺或有偏解灸方或有惟行藥鉺或有專于禁咒故以網羅諸疾有愈於是慨其如此聊以養疾之暇撰錄灸經以貽後嗣其於條例具之醫者意也善於用意即為良醫良醫之道必先診脈處方次即針灸內外相扶病必當愈何則湯藥攻其內針灸攻其外不能如此雖時愈疾茲為偶瘥非醫瘥也又以孔穴難諳非圖莫可雖復經本具述自非碩學之士造次未可卒知所以先述取穴方法云爾仰人面二十六穴第一神庭在髮際直鼻不刺一云入髮際一分曲差夾神庭一寸半在髮際攢行在眉頭陷中睛明在目內眥迎香在禾窌上鼻下孔旁一云在禾髎上一寸素窌在鼻柱端水溝在鼻柱下人中兌端在唇上端齦交在唇內齒上齦縫本神麯差旁一寸半陽白在眉上一寸直瞳子承泣在目下七分直瞳子不炙四白在目下一寸臣窌夾鼻旁八分直瞳子禾窌直鼻孔下夾水溝旁五分地倉夾口旁四分一云在口角一韭葉近下頦隙承漿在頤前下唇之下廉泉在頷下結喉上舌本頭維在額角發本神旁一寸半不灸上關在耳前上廉起骨開口取之上關在客主人下耳前動脈下空下廉合口有穴張口則閉頰車在耳下曲頰端陷中大迎在曲頷前一寸二分骨陷中動脈絲竹空在眉後陷中不灸瞳子窌在目外去眥五分顴窌在面鼽骨下下廉陷中頭上第一行九穴第二上星在顱上直鼻中央入髮際一寸陷容豆囟會在上星後一寸陷中前頂在囟會後一寸半骨陷中百會在前頂後一寸半頂中心後頂在百會後一寸半枕骨上強間在後頂後一寸半腦戶前一寸半腦戶在枕骨上強間後一寸半不灸風府入髮際一寸大筋內宛宛中不灸一云在喑門上一寸喑門在項後髮際宛宛中不灸一云在腦戶下三寸又名啞門頭上第二行六穴第三五處在頭上去上星一寸半承光在五處後一寸不灸一云一寸半通天在承光後一寸半絡卻在通天後一寸半玉枕在絡卻後七分半夾腦戶旁一寸三分起肉枕骨上入髮際三寸天柱夾項後髮際大筋外廉陷中頭上第三行六穴第四臨泣當目上眥直入髮際五分陷中目窗在臨泣後一寸正營在目窗後一寸承錄在正營後一寸腦空在承靈後一寸半夾玉枕骨下陷中風池在顳顬後髮際陷中伏人耳後六穴第五顱息在耳後青脈間瘛脈在耳本雞足青脈不灸完骨在耳後入髮際四分竅陰在完骨上枕骨下翳風在耳後陷中按之引耳中浮白在耳後入髮際一寸此穴在翳風前竅陰後寫時請為用心看伏人脊中第一行十一穴第六大椎在第一椎上陷中陶道在大椎下節間身柱在第三椎下節間神道在第五椎下節間至陽在第七節椎下節間筋縮在第九椎下節間脊中在第十一椎下節間不灸懸樞在第十三椎下節間命門在第十四椎下節間腰俞在第二十一椎下節間長強在脊骶端伏人脊中第二行二十一穴第七大杼在項第一椎下兩旁各一寸半陷中風門熱府在第二椎下兩旁各一寸半肺俞在第三椎下兩旁各一寸半心俞在第五椎下兩旁各一寸半膈俞在第七椎上兩旁各一寸半肝俞在第九椎下兩旁各一寸半膽俞在第十椎下兩旁各一寸半脾俞在第十一椎下兩旁各一寸半胃俞在第十二椎下兩旁各一寸半三焦俞在第十三椎下兩旁各寸半腎俞在第十四椎下兩旁各一寸半大腸俞在第十六椎下兩旁各一寸半小腸俞在第十八椎下兩旁各一寸半膀胱俞在第十九椎下兩旁各一寸半中膂俞在第二十椎下兩旁各一寸半白環俞在第二十一椎下兩旁各一寸半上窌在第一空腰果下一寸夾脊陷中次窌在第二空夾脊陷中中窌在第三空夾脊陷中下窌在第四空夾脊陷中會陽在陰尾骨兩旁伏人脊中第三行十三穴第八附分在第二椎下附項內廉兩旁各三寸魄戶在第三椎下兩旁各三寸神堂在第五椎下兩旁各三寸譩譆在肩膊內廉夾第六椎下兩旁各三寸膈關在第七椎下兩旁各三寸魂門在第九椎下兩旁各三寸陽綱在第十椎下兩旁各三寸意舍在第十一椎下兩旁各三寸胃倉在第十二椎下兩旁各三寸肓門在第十三椎下兩旁各三寸志室在第十四椎下兩旁