body:
  text: 卷第八婦人四崩中第一方三十六首治婦人五崩身體羸瘦咳逆煩滿少氣心下痛面上生瘡腰大痛不可俯仰陰中腫如有瘡之狀毛中癢時痛與子臟相通小便不利常頭眩頸項急痛手足熱氣逆沖急心煩不得臥腹中急痛食不下吞酢噫苦腸鳴漏下赤白黃黑汁大臭如膠汙衣狀熱即下赤寒即下白多飲即下黑多食即下黃多藥即下青喜怒心中常恐一身不可動搖大惡風寒鱉甲散方鱉甲炙乾薑各三分芎藭雲母代赭各一兩烏賊魚骨龍骨伏龍肝白堊蝟皮炙各一分生鯉魚頭桂心白朮各半兩白殭蠶半分上一十四味搗篩為散以淳酒納少蜜服方寸匕日三夜二服久病者十日瘥新病者五日瘥若頭風小腹急加芎藭桂心各一兩佳忌生冷豬雞魚肉治婦人崩中漏下赤白青黑腐臭不可近令人面黑無顏色皮骨相連月經失度往來無常小腹弦急或苦絞痛上至於心兩脅腫脹令人倚坐氣息乏少食不生肌膚腰背疼痛痛連兩腳不能久立但欲得臥神驗大慎火草散方慎火草白石脂鱉甲炙黃連細辛石斛芎藭乾薑芍藥當歸熟艾牡蠣熬禹餘糧各二兩桂心一兩薔薇根皮乾地黃各四兩上一十六味搗篩為散空腹酒服方寸匕日三服稍增至二匕若寒多加附子及椒用椒當汗去目閉口者熱多加知母黃芩加石斛兩倍白多加乾薑白石脂赤多一方云青黑加桂心代赭各二兩治婦人崩中及痢一日夜數十起大命欲死多取諸根煎丸得入腹即活若諸根難悉得者第一取薔薇根令多多乃合之遇有酒以酒服無酒飲服其種種根當得二斛為佳薔薇煎方薔薇根柿根菝葜懸鉤根各一斛上四味皆銼合著釜中以水淹使上餘四五寸水煮使三分減一去滓無大釜稍煮如初法都畢會汁煎如飴可為丸如梧桐子大服十丸日三服伏龍肝湯治婦人崩中去赤白或如豆汁伏龍肝湯方伏龍肝如彈丸大七枚赤石脂桂心艾甘草炙各二兩生地黃切四升生薑二兩上七味㕮咀以水一斗煮取三升分四服日三夜一服熟艾湯治婦人崩中血出不息逆氣虛煩熟艾湯方熟艾一升蟹爪一升淡竹茹一把伏龍肝半斤蒲黃二兩當歸一兩乾地黃芍藥桂心阿膠茯苓各二兩甘草五寸炙上一十二味㕮咀以水一斗九升煮艾取一斗去滓納藥煮取四升納膠令煬盡一服一升一日令盡羸人以意消息之可減五六合地榆湯治婦人崩中漏血不絶地榆湯方地榆根柏葉各八兩蟹爪竹茹各一升漏蘆三兩茯苓一兩蒲黃三合伏龍肝半斤乾薑芍藥當歸桂心甘草炙各二兩上一十三味㕮咀以水一斗五升煮地榆根減三升納諸藥更煮取四升分服日三夜一服甘草芍藥湯治婦人産後崩中去血逆氣蕩心胸生瘡煩熱甘草芍藥湯方甘草炙芍藥當歸人參白朮各一兩橘皮一把大黃半兩上七味㕮咀以水四升煮取二升分再服相去一炊頃櫸柳葉湯治婦人崩中下血櫸柳葉湯方櫸柳葉三斤麥門冬去心乾薑各二兩大棗十枚擘甘草一兩炙上五味㕮咀以水一斗煮櫸柳葉取八升去滓納諸藥又煮取三升分三服薊根酒治婦人暴崩中去血不止薊根酒方大小薊根各一斤切上二味以酒一斗漬五宿服之隨意多少禹餘糧丸治婦人崩中赤白不絶困篤禹餘糧丸方禹餘糧五兩烏賊魚骨三兩白馬蹄十兩炙令黃龍骨三兩鹿茸二兩炙上五味搗篩煉蜜和丸如梧子酒服二十丸日二服不知稍加至三十丸大牛角中人散治婦人積冷崩中去血不止腰背痛四肢沉重虛極大牛角中人散方牛角中人一枚燒防風二兩乾地黃桑耳蒲黃乾薑赤石脂禹餘糧續斷附子炮去皮白朮龍骨礬石燒當歸各三兩人參一兩上一十五味搗篩為散溫酒服方寸匕日三服不知漸加之調中補虛止血方治婦人崩中下血虛羸少力調中補虛止血方澤蘭熬九分蜀椒去目閉口者汗七分代赭藁本桂心細辛乾薑防風各一兩乾地黃牡蠣熬各一兩半柏子仁厚朴炙各三分當歸芎藭甘草炙各七分山茱萸蕪荑各半兩上一十七味搗篩為末煉蜜和丸如梧子空腹酒服十丸日三服漸加至二十丸神效一方用白芷龍骨各三分人參七分為二十味切痛不止方治婦人崩中下血切痛不止方桑耳赤色牡蠣熬令變色各三兩龍骨二兩黃芩芍藥甘草炙各一兩上六味搗篩為散酒服方寸匕日三服稍增以知為度治婦人傷中崩中絶陰使人怠惰不能動作胸脅心腹四肢滿而身寒熱甚溺血桑根煎方桑根白皮細切一斗麻子仁三升淳清酒三斗煮得一斗絞去滓大棗百枚去皮核飴五升阿膠五兩白蜜三升復煎得九升下乾薑末厚朴闊二寸長二尺末蜀椒末三味各一升桂心長一尺二寸甘草八兩糵米末一升乾地黃四兩芍藥六兩玄參五兩丸如彈丸日三枚又方小薊根葉銼虌母各銼十斤上一味以水五斗合釜中煮爛熟去滓納銅器中煎餘四升分四服一日令盡虌字未詳不敢刊正治婦人崩中方白茅根二斤小薊根五斤上二味切以水五斗合煎取四升分稍稍服之丹參酒治婦人崩中去血及産後余病丹參酒方丹參地黃忍冬地榆艾各五斤上五味先燥熟舂之以水漬三宿去滓煮取汁以黍米一斛釀如酒法熟初服四合稍增之神良治婦人崩中去赤白方取倚死竹蛭燒末飲服半方寸匕神良治婦人崩中漏下方取梧桐木長一尺燒作灰搗篩為散以溫酒服方寸匕日三服治婦人白崩中方芎藭二兩乾地黃阿膠赤石脂桂心小薊根各二兩上六味㕮咀以酒六升水四升合煮取三升去滓納膠令煬盡絞去滓分三服千金有伏龍肝如雞子大七枚治婦人白崩中馬通汁方白馬通汁二升乾地黃四兩芎藭阿膠小薊根白石脂桂心各二兩伏龍肝如雞子大七枚上八味㕮咀以酒七升合馬通汁煮取三升去滓納膠令煬盡分三服小牛角䚡散治婦人帶下五賁一曰熱病下血二曰寒熱下血三曰月經未斷為房室即漏血四曰經來舉重傷妊脈下血五曰産後臟開經利五賁之病外實內虛小牛角䚡散方小牛角䚡五枚燒令赤龍骨一兩禹餘糧乾薑當歸各二兩阿膠炙續斷各三兩上七味搗篩為散空腹酒服方寸匕日三服千金有赤小豆鹿茸烏賊魚骨為十味治婦人縵下十二病絶産一曰白帶二曰赤帶三曰經水不利四曰陰胎五曰子臟堅六曰子臟僻七曰陰陽患痛八曰腹強一作內強九曰腹寒十曰五臟閉十一曰五臟痠痛十二曰夢與鬼為夫婦龍骨散方縵下千金作淳下龍骨三兩白殭蠶五枚烏賊魚骨代赭各四兩半夏洗桂心伏龍肝乾薑黃柏各二兩石葦去毛滑石各一兩上一十一味搗篩為散溫酒服方寸匕日三服多白加烏賊魚骨白殭蠶各二兩多赤加代赭五兩小腹寒加黃柏二兩子臟堅加薑桂各二兩各隨疾增之服藥三月有子住藥藥太過多生兩子當審方取藥寡婦童女不可妄服治産後下血不止方菖蒲五兩銼上一味以清酒五升煮取二升分二服阿膠散治婦人下血阿膠散方阿膠八兩炙烏賊魚骨二兩芍藥四兩當歸一兩上四味搗篩為散以蜜溲如麥飯先食以蔥羹汁服方寸匕日三夜一服一方桑耳一兩治諸去血蠱方鹿茸炙當歸各三兩瓜子五合蒲黃五兩上四味搗篩為散酒服方寸匕日三服不知稍增鮑魚湯治婦人漏血崩中鮑魚湯方鮑魚當歸各三兩切阿膠炙四兩艾如雞子大三枚上四味以酒三升水二升合煮取二升五合去滓納膠煬令盡一服八合日三服白堊丸治婦人三十六疾胞中病漏下日不絶白堊丸方邯鄲白堊牡蠣熬禹餘糧白芷烏賊魚骨乾薑龍骨白石脂桂心瞿麥大黃石葦去毛白蘞細辛芍藥黃連附子炮去皮鍾乳茯苓當歸蜀椒汗去目閉口者黃芩甘草炙各半兩上二十三味搗篩為末煉蜜和丸如梧桐子大酒服五丸日二不知漸加至十丸治婦人漏血不止大崩中方龍骨芎藭附子炮去皮芍藥禹餘糧乾薑各三兩赤石脂四兩當歸桂心各一兩甘草五分炙上一十味搗篩為散以溫酒服方寸匕日三服稍加至二匕白多更加赤石脂一兩馬通湯治婦人漏血積月不止馬通湯方赤馬通汁一升取新馬矢絞取汁乾者水浸絞取無赤馬凡馬亦得當歸阿膠炙乾薑各一兩生艾一把書墨半彈丸大上六味㕮咀以水八升清酒二升合煮取三升去滓納馬通汁及膠微火煎取二升適寒溫分再服相去一炊頃飲之馬蹄屑湯治婦人白漏不絶馬蹄屑湯方白馬蹄炙令焦屑赤石脂各五兩禹餘糧烏賊魚骨龍骨牡蠣熬乾地黃當歸各四兩附子三兩炮去皮白殭蠶一兩熬甘草二兩炙上一十一味㕮咀以水一斗六升煮取三升半分四服日三夜一服治婦人漏血不止方乾地黃大黃各六兩芎藭四兩阿膠五兩人參當歸甘草炙各三兩上七味㕮咀以酒一斗水五升合煮取六升去滓納膠煬令盡一服一升日三夜一服馬蹄丸治婦人白漏不絶馬蹄丸方白馬蹄四兩炙令黃烏賊魚骨白殭蠶赤石脂各二兩禹餘糧龍骨各三兩上六味搗篩為末煉蜜和丸如梧子酒服十丸不知漸加至二十丸治婦人漏下慎火草散方慎火草十兩熬令黃當歸鹿茸一作鹿角阿膠炙各四兩龍骨二分上五味搗篩為散先食酒服方寸匕日三服蒲黃散治婦人漏下不止蒲黃散方蒲黃半升鹿茸炙當歸各二兩上三味搗篩為散酒服半方寸匕日三服不知漸加至一方寸匕治婦人胞落不安血漏下相連月水過度往來或多或少小腹急痛上搶心脅脹食不生肌方蟬甲三兩炙禹餘糧乾地黃各六兩蜂房炙蛇皮炙各一兩蝟皮一具炙乾薑防風烏賊魚骨桑螵蛸炙蟅蟲熬甘草炙各二兩上一十二味搗篩為末煉蜜和丸如梧桐子大空腹酒服十丸日三服漸加至二十丸月水不利第二方三十四首治婦人月水不利閉塞絶産十八年服此藥二十八日有子金城太守白薇丸方白薇細辛各五分人參杜蘅半夏洗厚朴炙白殭蠶牡蒙各三分牛膝沙參乾薑各半兩附子炮一兩半秦艽半兩當歸三分蜀椒一兩半去目閉口者汗紫菀三分防風一兩半上一十七味搗篩煉蜜和為丸如梧桐子先食酒服三丸不知稍增至四五丸此藥不用長服覺有身則止崔氏有桔梗丹參各三分治經年月水不利胞中有風冷故須下之大黃朴硝湯方大黃牛膝各五兩代赭乾薑細辛各一兩水蛭熬虻蟲去翅足熬芒硝各二兩桃仁三升去皮尖雙仁者麻子仁五合牡丹皮紫葳一云紫菀各三兩甘草炙三兩朴硝三兩上一十四味㕮咀以水一斗煮取三升去滓納芒硝煬令盡分三服五更即服相去一炊頃自下之後將息勿見風治婦人月水不利小腹堅急大便不通時時見有物下如鼻涕或如雞子白皆胞中風冷也方大黃四兩吳茱萸二升芍藥三兩當歸乾地黃黃芩乾薑芎藭桂心牡丹皮芒硝人參細辛甘草炙各二兩水蛭熬虻蟲各五十枚去翅足熬桃仁五十枚去皮尖黃雌雞一隻治如食法勿令中水上一十八味㕮咀以清酒五升漬藥一炊久又別以水二斗煮雞取一斗去雞下藥合煮取三升絞去滓納芒硝煬盡攪調適寒溫服一升日三服治月水不利小腹痛方牡丹皮當歸芎藭黃芩大黃乾薑人參細辛硝石芍藥桂心甘草炙各二兩水蛭熬虻蟲去翅足熬桃仁各五十枚去皮尖蠐螬十三枚熬乾地黃三兩黃雌雞一隻治如食法上一十八味㕮咀以清酒五升漬一宿別以水二斗煮雞取一斗五升去雞納藥煮取三升去滓納硝石煬令盡適寒溫一服一升日三服治久寒月水不利或多或少方吳茱萸三升生薑一斤桂心一尺大棗二十枚擘桃仁去皮尖五十枚人參芍藥各三兩小麥半夏洗各一升牡丹皮四兩牛膝二兩水蛭熬蟅蟲熬虻蟲去翅足熬甘草炙各一兩上一十五味㕮咀以清酒三升水一斗煮取三升去滓適寒溫服一升日三服不能飲酒者以水代之湯臨欲成乃納諸蟲病人不耐藥