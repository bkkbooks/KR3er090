body:
  text: 卷第五婦人一論曰婦人之病難療比之丈夫十倍費功所以古人別立婦人之方焉是以今方具在四卷一卷泛療婦人三卷專論產後好學者宜細意用心觀之乃得睹其深趣耳婦人求子第一論一首方七首論曰夫人求子者服藥須有次第不得不知其次第者男服七子散女服蕩胞散及坐藥並服紫石門冬丸則無不得效矣不知此者得力鮮焉七子散主丈夫風虛目暗精氣虛衰少無子不足方牡荊子五味子菟絲子車前子菥蓂子石斛薯蕷乾地黃杜仲去皮炙鹿茸炙遠志各二兩附子炮去皮蛇床子芎藭各一兩半山茱萸天雄炮去皮人參茯苓黃耆牛膝各五分桂心二兩半巴戟天三兩肉蓯蓉七分鍾乳二兩無亦得上二十四味搗篩為散酒服方寸匕日二不知加至二匕以知為度忌生冷醋滑豬雞魚蒜油麵不能酒者蜜和丸服亦佳一方加覆盆子二兩行房法一依素女經女人月信斷一日為男二日為女三日為男四日為女以外無子每日午時夜半後行事信生子吉余時生子不吉蕩胞湯主婦人斷緒二三十年及生來無子並數數失子服此皆有子長命無病方朴硝桃仁去皮尖兩仁者熬茯苓牡丹皮大黃各三兩人參桂心芍藥厚朴炙細辛牛膝當歸橘皮各二兩附子一兩半炮去皮虻蟲去翅足熬水蛭各六十枚熬上一十六味㕮咀以酒五升水六升合漬一宿煮取三升分四服日三夜一服每服相去三時辰少時更服如常覆被少取汗汗不出冬月著火籠必下積血及冷赤膿如赤小豆汁本為婦人子宮內有此惡物令然或天陰臍下痛或月水不調為有冷血不受胎若斟酌下盡氣力弱大困不堪更服亦一日二三服即止如大悶不堪可食酢飯冷漿一口即止然恐去惡物不盡不大得藥力若能忍服盡大好一日後仍著導藥千金更有桔梗甘草各二兩坐導藥方皂莢一兩炙去皮子五味子乾薑細辛各三兩葶藶子熬苦瓠各三分千金作山茱萸礬石燒半日大黃戎鹽蜀椒汗當歸各二兩上一十一味搗篩納輕絹袋子中如指許大長三寸盛藥令滿納子門中坐臥任意勿行走急小便時即去之仍易新者一日當下青黃冷汁汁盡止即可幸御自有子若未見病出亦可至十日安之千金無葶藶一本又有砒霜三分著藥後一日乃服紫石天門冬丸紫石天門冬丸紫石英七日研之烏頭炮去皮天門冬各三兩去心烏賊魚骨牛膝各一兩半人參牡丹皮桑寄生乾薑細辛厚朴炙食茱萸續斷各五分薯蕷一兩半柏子仁一兩牡荊子千金作牡蒙禹餘糧紫葳石斛辛夷心卷柏當歸芎藭桂心乾地黃甘草炙各二兩上二十六味搗篩為末煉蜜和丸如梧桐子酒服十丸日三稍加至三十丸慎如藥法白薇丸主久無子或斷緒上熱下冷百病皆療方白薇車前子各三分澤蘭太一餘糧赤石脂細辛人參桃仁去皮尖熬覆盆子麥門冬去心白芷各一兩半紫石英石膏研藁本菴䕡子卷柏各五分蒲黃桂心各二兩半當歸芎藭蛇床子各一兩乾薑蜀椒汗乾地黃各三兩茯苓遠志去心白龍骨各二兩橘皮半兩上二十八味搗篩為末煉蜜和丸如梧桐子酒服十五丸日再增至四十丸以知為度亦可增至五十丸慎豬雞蒜生冷醋滑驢馬等肉覺有娠則止秘之勿妄敷也慶雲散主丈夫陽氣不足不能施化施化無成方覆盆子五味子各二升菟絲子一升白朮熬令色變石斛各三兩天雄一兩炮去皮天門冬九兩去心紫石英二兩桑寄生四兩上九味搗篩為散先食酒服方寸匕日三素不耐冷者去寄生加細辛四兩陽氣不少而無子者去石斛加檳榔十五枚良承澤丸主婦人下焦三十六疾不孕絕產方梅核仁辛夷各一升葛上亭長七枚澤蘭子五合溲疏藁本各一兩上六味搗篩為末煉蜜和丸如大豆先食酒服二丸日三不知稍增之若腹中無積堅者去亭長加通草一兩惡甘者和藥先以苦酒搜散乃納少蜜和為丸婦人積聚第二方一十三首牡蒙丸主男子疝瘕女子血瘕心腹堅積聚產乳余疾小腹堅滿貫臍痛熱中腰背痛小便不利大便難不下食有伏蠱臚脹腫久寒熱胃管有邪氣方牡蒙蓯蓉烏喙炮去皮石膏研藜蘆各三分巴豆六十枚去心皮熬乾薑桂心各二兩半夏五分洗上九味搗篩為末別搗巴豆如膏合諸藥令調和搗至熟以飲服如小豆二丸日三如不相得入少蜜烏頭丸主心腹積聚膈中氣悶脹滿疝瘕內傷瘀血產乳眾病及諸不足方烏頭炮去皮巴豆去心皮熬各半兩人參硝石各一兩大黃二兩戎鹽一兩半苦參黃芩䗪蟲熬半夏洗桂心各三分上一十一味搗篩為末納蜜青牛膽汁拌和搗三千杵丸如梧桐子大宿不食酒服五丸臥須臾當下黃者心腹積也青如粥汁者膈上邪氣也下崩血如腐肉者內傷也赤如血者乳余疾也如蠱刺者蟲也下已必渴渴飲粥飢食蘇糜三日後當溫食食必肥濃四十日平復乾薑丸治婦人瘕結脅肋下疾乾薑一兩半芎藭芍藥各二兩前胡熬乾地黃熬桃仁熬去皮尖兩仁者茯苓各一兩人參當歸各三兩杏仁熬去皮尖兩仁者朴硝蜀椒汗蠐螬熬䗪蟲熬虻蟲去翅足熬水蛭各一合熬上二十六味搗篩為末煉蜜和丸如梧桐子未食以飲服三丸可增至十丸千金用大黃柴胡各二兩無前胡地黃生地黃丸主婦人臍下結堅大如杯升月經不通發熱往來下痢羸瘦此為氣瘕也若生肉症不可瘥未生症者可療方生地黃三十斤搗絞取汁乾漆一斤熬搗節為末上二味相和微火煎令可丸藥成丸如梧桐子食後以酒服五丸千金云服三丸集驗方至七八丸止遼東都尉所上丸主臍下堅癖無所不療恆山巴豆去心皮熬大黃各一分天雄二枚大者炮雚蘆一兩半一方二兩乾薑人參苦參丹參沙參玄參細辛白薇各三分龍膽牡蒙各一兩芍藥附子炮去皮狼牙牛膝茯苓各五分上二十味搗篩為末煉蜜和丸宿勿食酒服五丸日三主大羸瘦而黃月水不調當十五日服之下長蟲或下種種病出二十五日腹中所苦悉愈肌膚充盛五十日萬病除矣斷緒者皆有子也五京丸主婦人腹中積聚九痛七害久寒腰中冷引小腹害食苦下或熱痢得冷便下方乾薑三兩黃芩一兩吳茱萸一升附子炮去皮狼毒當歸牡蠣各二兩熬上七味搗篩為末煉蜜和丸如梧桐子大酒日服五丸加至十丸此出京氏五君故名五京丸久患冷困當服之雞鳴紫丸主婦人腹中癥瘕積聚大黃二兩前胡人參各四兩皂莢炙去皮子藜蘆巴豆去皮心熬礜石煉烏喙炮去皮各半兩代赭五分阿膠一兩半炙桂心一分杏仁去皮尖熬乾薑甘草各三分上一十四味搗篩為末煉蜜和丸雞鳴時飲服一丸如梧桐子日益一丸至五丸止仍從一丸起下白者風也赤者癥瘕也青者疝也黃者心腹病也如白泔爛腐者水也炭皮丸主婦人憂恚心下支滿膈氣腹熱月經不利血氣上搶心欲嘔不可眠懈怠不勤方炭皮芎藭各一分桂心乾薑乾漆熬白朮各一分半蜀椒汗黃芩芍藥土瓜根大黃炙令煙出虻蟲各半兩去翅足熬上一十二味搗篩為末煉蜜為丸如梧桐子飲服五丸日三不知稍增之七氣丸主婦人勞氣食氣胸滿氣吐逆大下氣其病短氣胸脅滿氣結痛小便赤黃頭重方葶藶子熬半夏各一兩洗大黃玄參人參苦參麥門冬去心黃芩乾薑芎藭遠志去心各一兩半硝石一兩瞿麥一兩半上一十三味搗篩為末煉蜜和丸如梧桐子以酒服六丸日一服亦理嘔逆破積聚半夏湯主婦人胸滿心下堅咽中貼貼如有炙腐咽之不下吐之不出方半夏一升洗生薑五兩茯苓厚朴各四兩上四味㕮咀以水六升煮取三升分三服千金有蘇葉二兩厚朴湯主婦人下焦勞冷膀胱腎氣損弱白汁與小便俱出厚朴如手大四寸去皮炙削以酒五升煮兩沸去滓取桂心一尺絹篩納汁中調和宿勿食曉頓服之溫經湯主婦人小腹痛方茯苓六兩芍藥土瓜根各三兩薏苡仁半升上四味㕮咀以酒三升漬一宿曉加三升水煎取二升分再服之大補內黃耆湯主婦人七傷骨髓疼小腹急滿面目黃黑不能食飲並諸虛不足少氣心悸不安方黃耆半夏各三兩洗大棗三十枚乾地黃桂心人參茯苓遠志去心芍藥澤瀉五味子麥門冬去心白朮甘草各二兩炙乾薑四兩上一十六味㕮咀以水一斗半煮取二升一服五合日三夜一婦人乳疾第三方六首治乳堅方當歸芍藥黃耆蒺藜子雞骨附子炮去皮枳實各二兩炙桂心三兩人參薏苡仁各一兩上一十味搗篩為散酒服方寸匕日三服治乳癰始作方大黃楝實芍藥馬蹄炙上四味等分搗篩為散酒服方寸匕取汗出瘥廣濟方云治乳癰大堅硬赤紫色衣不得近痛不可忍經宿乃消排膿散主乳癰方鐵粉細辛芎藭人參防風乾薑黃芩桂心芍藥蓯蓉各一兩當歸甘草炙各五分上一十二味搗篩為散酒服方寸匕日三夜一服加至一匕半服十日膿血出多勿怪是惡物除生魚薄乳癰方生鯽魚長五寸伏龍肝大黃莽草各六兩上四味別搗魚如膏下篩三物更搗令調以生地黃汁和如粥敷腫上日五六夜二三治乳癰初有異則行此湯並將丸補之即愈方麥門冬一升去心黃芩黃耆芍藥茯苓甘草炙通草各二兩桑寄生防風人參各三兩糖八兩大棗十枚上一十二味㕮咀以水一斗煮取三升去滓納糖分四服次服天門冬丸天門冬五兩去心通草黃耆防風乾地黃桑寄生人參各二兩羌活三兩大黃二兩半白芷一兩半升麻一兩半澤蘭茯神天雄炮去皮黃芩枳實炙五味子各一兩上一十七味搗篩為末煉蜜和丸酒服二十丸日二加至三十丸婦人雜病第四方一十三首治婦人斷產方故蠶子布一尺燒一味末酒下終身不復懷孕也治婦人無故尿血方龍骨五兩上一味搗篩為散酒服方寸匕空腹服日三久者二十服愈又方鹿角屑大豆黃卷桂心各一兩上三味搗篩為散空腹酒服方寸匕日三服又方舡故茹為散酒服方寸匕日三服亦主遺尿治婦人遺尿不知出時方白薇芍藥各二兩半上二味搗篩為散酒服方寸匕日三服又方礬石熬牡蠣熬各三兩上二味搗篩為散酒服方寸匕亦治丈夫治妊娠得熱病五六日小便不利熱入五臟方葵子一升榆白皮一把切上二味水五升煮五沸服一升日三服又方葵子茯苓各一兩上二味搗篩為散水服方寸匕日三小便利則止治婦人小便不通方葵子二升朴硝一升上二味以水五升煮取二升分再服治婦人卒不得小便方杏仁七枚熬令變色去皮尖上一味搗篩為散以水服之立下又方紫菀為末井花水服三指撮立通治丈夫婦人轉胞不得小便八九日方滑石一兩碎寒水石一兩碎葵子一升上三味以水一斗煮取五升服一升即利婦人經服硫黃丸忽患頭痛項冷冷歇又心胸煩熱眉骨眼眥癢痛有時生瘡喉中乾燥四肢痛癢方栝蔞根麥門冬去心龍膽各三兩土瓜根八兩大黃二兩杏仁一升去尖皮兩仁熬上六味搗篩為末別搗杏仁如泥煉蜜和丸如梧桐子大飲下十丸日三稍加至二十丸婦人面藥第五論一首方三十九首論曰面脂手膏衣香藻豆仕人貴勝皆是所要然今之醫門極為秘惜不許子弟瀉漏一法至於父子之間亦不傳示然聖人立法欲使家家悉解人人自知豈使愚於天下令至道不行擁蔽聖人之意甚可怪也面脂主面及皴靨黑皯凡是面上之病悉皆主之方丁香十分零陵香桃仁去皮土瓜根白蘞白芨梔子花沉香防風當歸辛夷麝香研芎藭商陸各三兩白芷葳蕤菟絲子甘松香藿香各十五分蜀水花青木香各二兩茯苓十四分木蘭皮藁本白殭蠶各二兩半冬瓜仁四兩鵝脂羊髓各一升半羊腎脂一升豬胰六具清酒五升生豬肪脂三大升上三十二味切以上件挼豬胰汁漬藥一宿於脂中以炭火煎三上三下白芷黃綿濾貯器中以塗面面脂方防風芎藭白芷白殭蠶藁本葳蕤茯苓白蘞細辛土瓜根栝蔞仁桃仁去皮尖蜀水花青木香當歸辛夷各半兩鵝脂一升羊脂腎一升豬脂二升上一十九味細切綿裹酒二升漬一日一夜納脂中急火煎之三上三下然後緩火一夜藥成去滓以寒水石粉半兩納脂中以柳木篦熟攪任用之又方杏仁二升去皮尖白附子三兩密陀僧二兩研如粉生白羊髓二升半真珠十四枚研如粉白蘚皮一兩雞子白七枚胡粉二兩以帛四重裹一石米下蒸之熟下陰乾上八味以清酒二升半先取杏仁盆中研之如膏又下雞子白研二百遍又下羊髓研二百遍搗篩諸藥納之研五百遍至千遍彌佳初研杏仁即少少下酒薄漸漸下使盡藥成以指捻看如脂即可用也草藥絹篩直取細如粉佳又方當歸芎藭細辛各五分蜀水花密陀僧商陸辛夷木蘭皮栝蔞白殭蠶藁本桃花香附子杜蘅鷹屎零陵香葳蕤土瓜根各三分麝香丁香各半兩白朮二兩白芷七分白附子玉屑各一兩鵝脂在合鹿髓一升白蠟四兩豬膏二兩羊髓一升上二十九味細切醋浸密封一宿明曉以豬膏煎三上三下以白芷黃為藥成去滓攪數萬遍令色白敷面慎風日良面膏方杜蘅牡蠣熬一云杜苦防風藁本細辛白附子白芷當歸木蘭皮白朮獨活葳蕤天雄茯苓玉屑各一兩菟絲子防己商陸梔子花橘皮一云橘仁白蘞人參各三兩甘松香青木香藿香零陵香丁香各二兩麝香半兩白犬脂白鵝脂無鵝脂以羊髓代之牛髓各一升羊胰三具上三十二味以水浸膏髓等五日日別再易水又五日日別一易水又十日二日一易水凡二十日止以酒浸一升挼羊胰令消盡去脈乃細切香於磁器中浸之密封一宿曉以諸脂等合煎三上三下以酒水氣盡為候即以綿布絞去滓研之千遍待凝乃止使白如雪每夜塗面晝則洗卻更塗新者十日以後色等桃花外臺有冬瓜仁蘼蕪花無白蘞人參面膏主有䵟𪒟及㾦㿔並皮膚皴劈方防風藁本辛夷芍藥當歸白芷牛膝商陸細辛密陀僧芎藭獨活雞舌香零陵香葳蕤木蘭皮麝香丁香未穿真珠各一兩蕤仁杏仁各二兩去皮尖牛髓五升油一升臘月豬脂三升煉獐鹿腦各一具若無獐鹿羊腦亦得上二十五味先以水浸腦髓使白藿香以上㕮咀如麥片乃於腦髓脂油內煎之三上三下即以綿裹搦去滓乃納麝香及真珠末研之千遍凝即塗面上甚妙今據藥止二十六味後云藿香以上而方中無藿香必脫漏三味也又方香附子十枚大者白芷一兩零陵香二兩茯苓一大兩細切蔓荊油二升無即豬脂代之牛髓羊髓各一斗白蠟八兩麝香半兩上九味切以油髓微火煎五物令色變去滓納麝香研千遍凝每澡豆洗面而塗之面藥方硃砂研雄黃研水銀霜各半兩胡粉二團黃鷹屎一升上五味合和淨洗面夜塗之以一兩藥和麵脂令稠如泥先於夜欲臥時澡豆淨洗面並手干拭以藥塗面厚薄如尋常塗面厚薄乃以指細細熟摩之令藥與肉相入乃臥一上經五日五夜勿洗面止就上作妝即得要不洗面至第六夜洗面塗一如前法滿三度洗更不塗也一如常洗面也其色光淨與未塗時百倍也悅澤面方雄黃研硃砂研白殭蠶各一兩真珠十枚研末上四味並粉末之以面脂和胡粉納藥和攪塗面作妝曉以醋漿水洗面訖乃塗之三十日後如凝脂五十歲人塗之面如弱冠夜常塗之勿絕令面生光方密陀僧研以乳煎之塗面即生光令面白媚好方白附子白芷杜若赤石脂白石脂杏仁去皮尖桃花瓜子牛膝雞矢白葳蕤遠志去心上一十二味各三分搗篩為末以人乳汁一升白蜜一升和空腹服七丸日三服鹿角塗面方鹿角一握芎藭細辛白蘞白朮白附子天門冬去心白芷各二兩杏仁二七枚去皮尖牛乳三升上一十味鹿角先以水漬之百日令軟總納乳中微火煎之令汁竭出角以白練袋盛之余藥勿收至夜取牛乳石上摩鹿角塗面曉以清漿水洗之令老如少一方用酥三也兩急麵皮方大豬蹄一具治如食法水二升清漿水一升不渝釜中煎成膠以洗面又和澡豆夜塗面曉以漿水洗令麵皮急矣治婦人令好顏色方女菀二兩半鉛丹五分上二味搗篩為散酒服一刀圭日再服男十日女二十日知則止黑色皆從大便出色白如雪又方白瓜子五分白楊皮三分桃花一兩上三味搗篩為散以飲服方寸匕日三服三十日面白五十日手足白一云欲白加瓜子欲赤加桃花令人面水白淨澡豆方白蘚皮白殭蠶白附子鷹矢白白芷芎藭白朮青木香一方用藁本甘松香白檀香麝香丁香各三兩桂心六兩瓜子一兩一方用土瓜根杏仁三十枚去皮尖豬胰三具白梅三七枚冬瓜仁五合雞子白七枚面三升上二十味先以豬胰和麵曝令乾然後合諸藥搗篩為散又和白豆屑二升用洗手面十日內色白如雪二十日如凝脂千金有棗三十枚無桂心又方麝香二分豬胰兩具大豆黃卷一升五合桃花一兩菟絲子三兩冬葵子五合一云冬瓜子白附子二兩木蘭皮三兩葳蕤二合梔子花二兩苜蓿一兩上一十一味以水浸豬胰三四度易水血色及浮脂盡乃搗諸味為散和令相得曝搗篩以洗手面面淨光潤而香一方若無前件可得者直取苜蓿香一升土瓜根商陸青木香各一兩合搗為散洗手面大佳澡豆方細辛半兩白朮三分栝蔞二枚土瓜根三分皂莢五挺炙去皮子商陸一兩半冬瓜仁半升雀矢半合菟絲子二合豬胰一具去脂藁本防風白芒白附子茯苓杏仁去皮尖桃仁去皮尖各一兩豆末四升面一升上一十九味搗細篩以麵漿煮豬胰一具令爛取汁和散作餅子曝之令乾更熟搗細羅之以洗手面甚佳又方丁香沉香青木香桃花鍾乳粉真珠玉屑蜀水花木瓜花各三兩柰花梨花紅蓮花李花櫻桃花白蜀葵花旋覆花各四兩麝香一銖上一十七味搗諸花別搗諸香真珠玉屑別研作粉合和大豆末七合研之千遍密貯勿瀉常用洗手面作妝一百日其面如玉光淨潤澤臭氣粉滓皆除咽喉臂膊皆用洗之悉得如意治面皰瘡瘢三十年以上並冷瘡蟲瘢令滅方斑蝥去翅足熬巴豆去心皮熬各三枚胡粉鵝脂金洮沙密陀僧高良薑海蛤各三兩上八味為粉以鵝脂和夜半塗曉以甘草湯洗之治面䵟𪒟方礬石燒硫黃白附子各一兩上三味細研以大醋一盞浸之一宿淨洗面塗之慎風治面皰方白附子青木香麝香由跋細辛各二兩上五味細末水和之塗面日三外臺方無細辛又方木蘭皮五兩取厚者梔子仁六兩上二味為散以蜜漿服方寸匕日三服治面皰甚如麻豆痛癢搔之黃水出及黑色黯黮不可去方冬瓜子柏子仁茯苓冬葵子上四味等分搗篩飲服方寸匕日三服外臺方無冬瓜子白膏主面渣疱疥癰惡瘡方附子十五枚蜀椒一升野葛一尺五寸上三味切醋漬一宿豬膏一斤煎附子黃去滓塗之日三梔子丸治酒渣鼻皰方梔子仁三升芎藭四兩大黃六兩好豉熬三升木蘭皮半斤甘草炙四兩上六味搗篩為末煉蜜和丸如梧桐子以飲服十丸日三服稍加至二十五丸又敷方蒺藜子梔子仁豉各一兩熬木蘭皮半斤一方無上四味為末以醋漿水和之如泥夜塗上日未出時以暖水洗之亦滅瘢痕又方鸕鷀矢一斤上一味搗篩臘月豬脂和如泥夜塗之飛水銀霜方水銀一斤朴硝八兩大醋半斤黃礬十兩錫二十兩成煉二遍者玄精六兩鹽花三斤上七味先煉錫訖又溫水銀令熱乃投錫中又搗玄精黃礬令細以絹篩之又搗錫令碎以鹽花並玄精等合和以醋拌之令濕以鹽花一斤藉底乃布藥令平以朴硝蓋上訖以盆蓋合以鹽灰為泥泥縫固際干之微火三日武火四日凡七日去火一日開之掃取極須勤心守勿令須臾間懈慢大失矣煉粉方胡粉三大升盆中盛水投粉於中熟攪以雞羽水上掃取以舊破雞子十枚去黃瀉白於瓷碗中以粉置其上以瓷碗密蓋之五升米下蒸之乃曝乾研用敷面百倍省面有光滅瘢方衣魚二枚白石脂一分雁屎三分白附子一分白殭蠶半兩上五味為末臘月豬脂和敷慎生冷風日令肌膩滅瘢方丹參羊脂上二味和煎敷之滅瘢神妙又方以蜜塗之佳又方取禹餘糧半夏等分搗末以雞子黃和先以新布拭瘢上令赤以塗之勿見風塗之二十日十年瘢並滅手膏方桃仁杏仁各二十枚去皮尖橘仁一合瓝十枚大棗三十枚辛夷芎藭當歸牛腦羊腦白狗腦各二兩無白狗諸狗亦得上一十一味先以酒漬腦等又別以酒六升煮赤瓝以上藥令沸停冷乃和諸腦等然後碎辛夷三味以綿裹之去棗皮核合納酒中以瓷器貯之五日以後先淨訖取塗手甚光潤而忌近火炙手治手足皴裂血出疼痛方取豬胰著熱酒中以洗之即瘥治冬月冒涉凍凌面目手足瘃壞及始熱疼痛欲瘃方取麥窠煮濃汁熱漬手足兼洗之三五日即度瘥治手足皴凍欲脫方椒芎藭各半兩白芷一分防風一分姜一分作鹽上五味以水四升煎令濃塗洗之三數遍即瘥治凍傷十指欲墮方取馬矢三升煮令麻沸漬冷易之半日愈薰衣浥衣香第六方六首薰衣香方熏陸香八兩藿香覽探各三兩一方無甲香二兩詹糖五兩青桂皮五兩上六味末前件干香中先取硬者黏濕難碎者各別搗或細切㕮咀使如黍粟然後一一薄布於盤上自余別搗亦別布於其上有須篩下者以紗不得木細別煎蜜就盤上以手搜搦令勻然後搗之燥濕必須調適不得過度太燥則難丸太濕則難燒濕則香氣不發燥則煙多煙多則惟有焦臭無復芬芳是故香須復粗細燥濕合度蜜與香相稱火又須微使香與綠煙而共盡浥衣香衣沉香苜蓿香各五兩丁香甘松香藿香青木香艾納香雞舌香雀腦香各一兩麝香半兩白檀香三兩零陵香十兩上一十二味各搗令如黍粟麩糠等物令細末乃和令相得若置衣箱中必須綿裹之不得用紙秋冬猶著盛熱暑之時令香速浥凡諸草香不但須新及時乃佳若欲少作者准此為大率也干香方丁香一兩麝香白檀沉香各半兩零陵香五兩甘松香七兩藿香八兩上七味先搗丁香令碎次搗甘松香合搗訖乃和麝香合和浥衣五香丸並湯主一切腫下氣散毒心痛方丁香藿香零陵香青木香甘松香各三兩桂心白芷當歸香附子檳榔各一兩麝香一銖上一十一味搗篩為末煉蜜和搗千杵丸如梧子大含咽令浸盡日三夜一一日一夜用十二丸當即覺香五日身香十日衣被香忌食五辛其湯法取檳榔以前隨多少皆等分以水微微火上煮一炊久大沸定納麝香末一銖勿去滓澄清服一升凡疔腫口中喉中腳底背甲下癰疽痔漏皆服之其湯不瘥作丸含之數以湯洗之一方有豆蔻無麝香十香丸令人身體百處皆香方沉香麝香白檀香青木香零陵香白芷甘松香藿香細辛芎藭檳榔豆蔻各一兩香附子半兩丁香三分上一十四味搗篩為末煉蜜和綿裹如梧子大日夕含之咽津味盡即止忌五辛香粉方白附子茯苓白朮白芷白蘞白檀各一兩沉香青木香雞舌香零陵香丁香藿香各二兩麝香一分粉英六升上一十四味各細搗篩絹下以取色青黑者乃粗搗紗下貯粉囊中置大合子內以粉覆之密閉七日後取之粉香至盛而色白如本欲為香粉者不問香之之白黑悉以和粉粉雖香而色至黑必須分別用之不可悉和之粉囊以熟帛雙紃作之令身香第七方一十三首香身方甘草五分炙芎藭一兩白芷三分上三味搗篩為散以飲服方寸匕日三服三十日口香四十日身香又方瓜子松根白皮大棗各一兩上三味為散酒服方寸匕日二服百日衣被皆香又方瓜子芎藭藁本當歸杜蘅細辛防風各一分上七味搗篩為散食後以飲服方寸匕日三服五日口香十日身香二十日肉香三十日骨香五十日遠聞香六十日透衣香一方有白芷治諸身體臭方竹葉十兩桃白皮四兩上二味以水一石二斗煮取五斗浴身即香也治諸腋臭方伏龍肝為末和作泥敷之瘥又方牛脂和胡粉三合煎令可丸塗之又方三年苦酒和石灰塗之又方赤銅屑以大醋和銅器中炒令極熱以布裹熨腋下冷則易之瘥又方青木香二兩附子石灰各一兩礬石半兩燒米粉一升上五味搗篩為散如常粉腋良又方馬齒草一束搗碎以蜜和作團紙裹之以泥紙上厚半寸曝乾以火燒熟破取更以少許蜜和仍令熱勿使冷也先以生布揩之然後藥夾腋下令極痛亦忍不能得然後以手巾勒兩臂著身即瘥石灰散方石灰一升青木香楓香熏陸香丁香陽起石各二兩橘皮二兩礬石四兩上八味並熬搗篩為散以綿作袋粗如四指長四寸展使著藥先以布揩令痛夾之也又方石灰五合馬齒草二兩礬石三兩燒甘松香一兩上四味合搗篩先以生布揩病上令黃汁出拭乾以散敷之滿三日瘥永除又方二月社日盜取社家糜饙一團猥地摩腋下三七遍擲著五道頭勿令人知永瘥人知即不效生髮黑髮第八方一十九首治發薄不生方先以醋泔清洗禿處以生布揩令火熱臘月脂並細研鐵生煎三沸塗之日三遍生髮須膏方附子荊實各二兩松葉柏葉各三兩烏雞脂三合上五味㕮咀合盛新瓦瓶中陰乾百日出搗以馬鬐膏和如薄粥塗頭髮如澤法裹絮中無令中風三十日長生髮膏令發速長而黑敷藥時特忌風方烏喙莽草續斷皂莢澤蘭白朮細辛竹葉各一兩防風辛夷各一兩柏葉細切四兩杏仁別搗松葉各三兩豬脂三升上一十四味切先以三年大醋三升漬令一宿納藥脂中煎三上三下膏成去滓塗發及頂上千金有石楠生髮膏主髮鬢禿落不生方升麻薺苨各二兩莽草白芷防風各一兩蜣螂四枚馬鬐脂驢鬐脂雄雞脂一云熊脂豬脂狗脂各五合上十一味藥五味脂取成煎者並切以醋漬一宿曉合煎之沸則停火冷更上一沸停三上三下去滓傅頭以當澤用之三十日生矣又方羊矢灰灌取汁洗之三日一洗不過十洗即生矣治落髮方柏葉切一升附子二兩上二味搗篩豬脂和作三十丸洗髮時即納一丸泔中發不落其藥以布裹密器貯勿令瀉氣長髮方蔓荊子三升大附子三枚上二味㕮咀以酒一斗二升漬之盛瓷瓶中封頭二十日取雞肪煎以塗之澤以汁櫛發十日長一尺勿逼面塗又方麻子仁三升秦椒三升上二味合以泔漬一宿以沐髮長矣又方麻子二升白桐葉一把上二味以米泔汁煮去滓適寒溫沐二十日長矣治發落方石灰三升水拌令濕炒令極焦停冷以絹袋貯之以酒三升漬之密封冬二七日春秋七日取酒溫服一合常令酒氣相接七日落止百日服之終身不落新發生也又方桑白皮一石以水一石煮三沸以沐發三過即止令白髮還黑方隴西白芷旋覆花秦椒各一升桂心一尺上四味搗篩為散以井花水服方寸匕日三服三十日還黑禁房室又方烏麻丸蒸九曝搗末棗膏和丸久服之又方八角附子一枚大酢半升上二味於銅器中煎取兩沸納好礬石大如棋子一枚消盡納脂三兩和令相得下之攪至凝納竹筒中拔白髮以膏塗上即生黑髮發黃方臘月豬膏和羊矢灰蒲灰等分敷之三日一為取黑止又方以醋煮大豆爛去豆煎冷稠塗發又方熊脂塗髮梳之散頭床底伏地一食頃即出形盡當黑用之不過一升染髮方石榴三顆皮葉亦得針沙如棗核許大醋六升水三升和藥合煮得一千沸即熟灰汁洗干染之瓜子散治頭髮早白又主虛勞腦髓空竭胃氣不和諸臟虛絕血氣不足故令人發早白少而算發及憂愁早白遠視䀮䀮風淚出手足煩熱恍惚忘誤連年下痢服之一年後大驗瓜子一升白芷去皮當歸芎藭甘草炙各二兩上五味搗篩為散食後服方寸匕日三酒漿湯飲任性服之一方有松子二兩
