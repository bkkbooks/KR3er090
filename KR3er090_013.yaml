body:
  text: 卷第十三辟穀服茯苓第一方六首服茯苓方茯苓粉五斤白蜜三斤柏脂七斤煉法在後上三味合和丸如梧桐子服十丸飢者增數服之取不飢乃止服吞一丸不復服谷及他果菜也永至休糧飲酒不得但得飲水即欲求升仙者常取杏仁五枚㕮咀以水煮之為湯令沸去滓以服藥亦可和丹砂藥中令赤服之又若卻欲去藥食谷者取硝石葵子等熟治之以粥服方寸匕日一四日內日再服藥去稍稍食谷葵羹太良又方茯苓三斤白蠟二斤大麻油三升松脂三斤上四味微火先煎油三沸納松脂令煬次納蠟蠟煬納茯苓熟攪成丸乃止服如李核大一丸日再一年延年千歲不飢又方茯苓二斤雲母粉二斤天門冬粉二斤羊脂五斤麻油三斤蜜五斤白蠟三斤松脂十斤白者上八味納銅器中微火上煎令相得下火和令凝紫色乃止欲絶谷先作五肉稻糧食五日乃少食三日後丸此藥大如彈丸日三服一日九丸不飢飢則食此止卻百二十日復食九丸卻三歲復食九丸卻十二年復食九丸如此壽無極可兼食棗脯飲水無苦還下藥取硝石一升葵子一升以水三升煮取一升日三服八合亦可一升藥下乃食一合米粥日三三日後日中三合又方茯苓去皮上以淳酒漬令淹密封十日出之如餌可食甚美服方寸匕日三令人肥白除百病不飢渴延年又方茯苓粉五斤白蜜三升上二味漬銅器中瓷器亦得重釜煎之數數攪不停候蜜竭出以鐵臼搗三萬杵日一服三十丸如梧子百日病除二百日可夜書二年後役使鬼神久服神仙辟穀延年千歲方松脂天門冬去心茯苓蠟蜜各一升上五味以酒五升先煎蜜蠟三沸納羊脂三沸納茯苓三沸納天門冬相和服三丸如李子養色還白以杏仁一升納之為良服松柏脂第二方二十首論一首採松脂法常立夏日伐松橫枝指東南者圍二三尺長一尺許即日便倒頓於地以器其下承之脂自流出三四過使以和藥此脂特與生雄黃相宜若堅強者更著酒中火上消之汁出著冷酒中引之乃暖和雄黃衡山松脂膏常以春三月入衡山之陰取不見日月之松脂煉而食之即不召自來服之百日耐寒暑二百日五臟補益服之五年即王母見諸名山所生三百六十五山其可食者獨滿谷陰懷中耳其谷正從衡山嶺直東四百八十里當橫揵正石橫其嶺東北行過其南入谷五十里窮穴有石城白鶴其東方有大石四十餘丈狀如白松松下二丈有小穴可入山有丹砂可食也其南方陰中有大松大三十餘圍有三十餘株不見日月皆可服也取破松脂法以日入時破其陰以取其膏破其陽以取其脂等分食之可以通神靈鑿其陰陽為孔令方寸深五寸還以皮掩其孔無令風入風入不可服也以春夏時取之取之訖封塞勿泄以泥塗之東北行至丹砂穴下有陰泉水可飲之此弘農車君以元封元年入此山食松脂十六年復下居長安東市又在上谷牛頭谷時往來至秦嶺上年常如三十者取松脂法斫取老枯肥松細擘長尺余置甑中蒸之滿甑脂下流入釜中數數接取脂置水中凝之盡更為一日可得數十斤枯節益佳又法取枯肥松細破於釜中煮之其脂自出接取置冷水中凝之引之則成若以五月就木取脂者對刻木之陰面為二三刻刻可得數升秋冬則依煮法取勿煮生松者少脂煉松脂法松脂二十斤為一劑以大釜中著水加甑其上塗際勿泄加茅甑上為藉復加生土茅上厚一寸乃加松脂於上炊以桑薪湯減添水接取停於冷水中凝更蒸之如前法三蒸畢止脂色如白玉狀乃用和藥可以丸菊花茯苓服之每更蒸易土如前法以銅鑼承甑下脂當入鑼中如膠狀下置冷水中凝更蒸欲出銅器於釜中時預置小繩於脂中乃下停於水中凝之復停於炭須臾乃四過皆解乃可舉也盡更添水以意斟酌其火勿太猛常令不絶而已又方治松脂以灰汁煮之瀉置盆水中須臾凝斷取復置灰中煮之如此三反皆易水成矣一法煉松脂十二過易湯不能者五六過亦可服之煉松脂法薄淋桑灰汁以煮脂一二沸接取投冷水中引之凝復更煮凡十過脂則成若強者復以酒中煮三四過則柔矣先食服一兩日三十日不復飢飢更服之一年後夜如白日久服去百病禁一切肉鹹菜魚醬鹽等又方松脂十斤上用桑薪灰汁二石納釜中加甑於上甑中先鋪茅次鋪黃砂土可三寸蒸之脂少間流入釜中寒之凝接取復蒸如前三上更以清水代灰汁復如前三上去水更以陰深水一石五斗煮甘草三斤得一石汁去滓納牛酥二斤加甑釜上復炊如前令脂入甘草汁中凝接取復蒸夕下如此三上即成苦味皆去甘美如飴膏服如彈丸日三久服神仙不死又方好松脂一石石灰汁三石上二味於淨處為灶加大釜斬白茅為藉令可單止以脂納甑中炊之令脂自下入釜盡去甑接取納冷水中以扇扇之兩人引之三十過復蒸如前滿三遍三易灰汁復以白酢漿三石煉之三過三易酢漿也復以酒煉之一過亦如上法訖以微火煎之令如飴狀服之無少長又方松脂二斤半水五升煎之汁黃濁出投冷水中如是百二十上不可以為率四十入湯輒一易湯凡三易湯且成軟如泥其色白乃可用治下茯苓一斤納藥中攪令相得藥成置冷地可丸丸如杏核日吞三丸十日止自不欲飲食當煉松脂無令苦乃用耳又方松脂七斤以桑灰汁一石煮脂三沸接置冷水中凝復煮之凡十遍脂白矣為散三兩分為三服十兩以上不飢飢復服之一年以後夜視目明久服不死論曰煉松脂春夏可為秋冬不可為絶谷治癩第一欲食即勿服亦去三尸粉松脂法松脂十斤丹黍灰汁煮沸接置冷水中二十過即末矣亦可雜雲母粉丸以蜜服之良服松脂法欲絶谷服三兩飢復更服取飢而止可至一斤不絶谷者服食一兩先食須藥力盡乃余食錯者即食不安而吐也久服延年百病除又方松脂十斤松實三斤柏實三斤菊花五升上四味下篩蜜和服如梧子三十丸分為三服一百日以上不復飢服之一年百歲如三十四十者久服壽同天地又方桑寄生蒸之令熟調和以煉松脂大如彈丸日一丸即不飢服法以夏至日取松脂日食一升無食他物飲水自恣令人不飢長服可以終身不食河南少室山有大松取陰處斷之置器中蒸之膏自流出煉出去苦氣白蜜相和食之日一升三日後服如彈丸渴飲水令人不老取無時又方松脂五斤羊脂三斤上二味先煉松脂令消納羊脂日服博棋一枚不飢久服神仙守中方與前別白松脂七斤三遍煉白蠟五斤白蜜三升茯苓粉三斤上三味合蒸一石米頃服如梧子十丸飢復取服日一丸不得食一切物得飲酒不過一合齊戒㕮咀五香以水煮一沸去滓以藥投沸中又欲致神女者取茅根治取汁以和之蒸服之神女至矣又方松脂桑灰煉百遍色正白復納之飴蜜中數反出之服二丸如梧子百日身輕一年玉女來侍取柏脂法五月六日刻其陽二十株株可得半升煉服之欲絶谷者增之至六兩不絶谷者一兩半禁五辛魚肉菜鹽醬治百病久服煉形延年煉脂與煉松脂法同服松柏實第三方一十九首凡採柏子以八月過此零落又喜蠹蟲頓取之又易得也當水中取沉者八月取並房曝乾末服方寸匕稍增至五合或日一升半欲絶谷恣口取飽渴飲水一方柏子服不可過五合凡採松實以七月未開時採之才開口得風便落不可見也松子宜陳者佳絶谷升仙不食法取松實末之服三合日三則無飢渴飲水勿食他物百日身輕日行五百里絶谷升仙服松子法治下篩服方寸匕日三四或日一升半升能多為善二百日以上日行可五百里一法服松子不過三合松子丸松子味甘酸益精補腦久服延年不老百歲以上顏色更少令人身輕悅澤方松子菊花等分以松脂若蜜丸服如梧子十丸日三可至二十丸亦可散服二方寸匕日三功能與前同又方松柏脂及實各等分丸以松脂服之良脂松葉令人不老身生毛皆緑色長一尺體輕氣香還年變白久服以絶谷不飢渴飲水服松葉亦可粥汁服之初服如惡久自便亦可乾末然不及生服服松葉法細切餐之日三合令人不飢又方細切之如粟使極細日服三合四時皆服生葉治百病輕身益氣還白延年又方四時採春東夏南秋西冬北方至治輕身益氣令人耐風寒不病痹延年高子良服柏葉法採無時以葉切置甑中令滿覆盆甑著釜上蒸之三石米頃久久益善蒸訖水淋百餘過訖陰乾若不淋者蒸訖便陰乾服一合後食日三服勢力少稍增從一合始至一升令人長生益氣可辟穀不飢以備厄還山隱無谷昔龐伯寧嚴君平趙德風唐公房等修道佐時也世遭飢運又避世隱峨眉山中飢窮欲死適與仙人高子良五馬都相遭以此告之皆如其言盡共服之卒賴其力皆度厄後以告道士進同得其方遂共記之又方取大盆納柏葉著盆中水漬之一日一易水易水者伏甕出水也如是七日以上若二七日為佳訖覆盆蒸之令氣徹便止曝乾下篩末一石以一斗棗膏溲如作乾飯法服方寸二匕日三以水送不飢飢即服之渴飲水以山居讀誦氣力不衰亦可濟凶年仙人服柏葉減谷方柏葉取近上者但取葉勿雜枝也三十斤為一劑常得好不津器納柏葉於中以東流水漬之使上有三寸以新盆覆上泥封之三七日出陰乾勿令塵入中干便治之下篩以三升小麥淨擇納著柏葉汁中須封五六日乃出陰乾燥復納之封五六日出陰乾令燥磨之下篩又取大豆三升炒令熟取黃磨之下篩合三物攪調相得納葦囊中盛之一服五合用酒水無在日三食飲無妨治萬病病自然消冬不寒顏色悅澤齒脫更生耳目聰明腸實服此食不食無在又方取柏葉三石熟蒸曝乾下篩大麥一升熬令變色細磨之都合和服多少自任亦可作粥服之可稍稍飲酒又方取柏葉二十斤著盆中以東流水漬三七日出曝乾以小麥一斗漬汁三四日出曝乾熬令香柏葉亦然鹽一升亦熬之令黃三味搗下篩以不中水豬膏二斤細切著末中攪復篩之先食服方寸匕日三匕不用食良亦可兼服之又方取陰地柏葉又取陰面皮㕮咀蒸之以釜下湯灌之如是至三陰乾百日下篩大麥末大豆末三味各一斤治服方寸匕日三以絶谷不食除百病延年又方柏葉三石熟煮之出置牛筥中以汰之令水清乃止曝乾以白酒三升溲葉微火蒸之熟一石米頃熄火復曝乾治大麥三升熬令變色細治曝搗葉下篩合麥屑中日服三升以水漿若酒送之止谷療病闢溫癘惡鬼久久可度世又方柏葉十斤以水四斗漬之一宿煮四五沸漉出去汁別以器閣之干以小麥一升漬柏葉汁中一宿出曝燥復納之令汁盡取鹽一升柏葉一升麥一升熬令香合三味末之以脂肪一片合溲酒服方寸匕日三病自消減十日以上便絶谷若乘騎取一升半水飲之可以涉道路不疲休糧散方側柏一斤生烏豆麻子各半升炒上三味搗拌空心冷水服方寸匕酒膏散第四方六首論一首仙方凝靈膏茯苓三十六斤松脂二十四斤松仁十二斤柏子仁十二斤上四味煉之搗篩以白蜜兩石四斗納銅器中微火煎之一日一夜次第下藥攪令相得微微火之七日七夕止可取丸如小棗服七丸日三若欲絶谷頓服取飽即不飢身輕目明老者還少十二年仙矣初精散方茯苓三十六斤松脂二十四斤鍾乳一斤上三味為粉以白蜜五斗攪令相得納垍器中固其口陰乾百日出而粉之一服三方寸匕日三服一劑大佳不同余藥論曰凡欲服大藥當先進此一膏一散然後乃服大藥也五精酒主萬病發白反黑齒落更生方黃精四斤天門冬三斤松葉六斤白朮四斤枸杞五斤上五味皆生者納金中以水三石煮之一日去滓以汁漬曲如家醞法酒熟取清任性飲之一劑長年白朮酒方白朮二十五斤上一味㕮咀以東流水兩石五斗不津器中漬之二十日去滓納汁大盆中夜候流星過時抄己姓名置盆中如是五夜汁當變如血取以漬曲如家醞法酒熟取清任性飲之十日萬病除百日白髮反黑齒落更生面有光澤久服長年枸杞酒方枸杞根一百斤上一味切以東流水四石煮之一日一夕去滓得一石汁漬曲釀之如家醞法酒熟取清置不津器中取乾地黃末一升桂心末一升乾薑末一升商陸根末一升澤瀉末一升椒末一升上六味盛以絹袋納酒中密封口埋入地三尺堅覆上二十日沐浴整衣冠向仙人再拜訖開之其酒當赤如金色平旦空肚服半升為度十日萬病皆愈二十日瘢痕滅惡疾人以一升水和半升酒分五服服之即愈若欲食石者取河中青白石如棗杏仁者二升以水三升煮一沸以此酒半合置中須臾即熟可食靈飛散方雲母粉一斤茯苓八兩鍾乳七兩柏仁七兩桂心七兩人參七兩白朮四兩續斷七兩菊花十五兩乾地黃十二兩上一十味搗篩以生天門冬十九斤取汁溲藥著銅器中蒸之一石二斗黍米下出曝乾搗篩先食服方寸匕日一服三日力倍五日血脈充盛七日身輕十日面色悅澤十五日行及奔馬三十日夜視有光七十日頭髮盡落故齒皆去更取二十匕白蜜和搗二百杵丸如梧子作八十一丸皆映徹如水精珠欲令發齒時生者日服七丸三日即生若發未白不落者且可服散如前法已白者餌藥至七年乃落入山日服七丸則絶谷不飢服雲母第五方三首論一首雲母粉法雲母取上上白澤者細擘以水淨淘漉出蒸之一日一夜下之復更淨淘如前去水令乾率雲母一升鹽三升硝石一斤和雲母搗之一日至暮取少許掌上泯著不見光明為熟出安盆甕中以水漬之令相得經一炊久澄去上清水徐徐去之盡更添水如前凡三十遍易水令淡如水味即漉出其法一如研粉澄取澱然後取雲母澱徐徐坐絹袋中濾著單上曝令乾即成矣雲母味甘平無毒主治死肌中風寒熱如在船車上除邪氣安五臟益子精明目下氣堅肌續絶補中五勞七傷虛損少氣止利久服輕身延年強筋脈填髓滿可以負重經山不乏落齒更生瘢痕消滅光澤人面不老耐寒暑志高可至神仙此非古法近出東海賣鹽女子其女子年三百歲貌同笄女常自負一籠鹽重五百餘斤如斯得效者其數不一可驗神功矣又方雲母擘薄淘淨去水余濕沙盆中研萬萬遍以水淘澄取澱見此法即自保愛修而服之勿泄之勿泄之凡服雲母祕澀不通者以蕪菁菹汁下之即通祕之用雲母粉法熱風汗出心悶水和雲母浴之不過再瘥勞損汗出以粉摩之即定以粳米粥和三方寸匕服之疳濕慝瘡月蝕粳米粥和三方寸匕服之以一錢匕納下部中取瘥止下脫病粳米粥和三方寸匕服之七日慎血食五辛房室重作務赤白積年不瘥服三方寸匕不過一兩即瘥寸白蟲者服一方寸匕不過四服帶下服三方寸匕三五服瘥金瘡一切惡瘡粉塗之至瘥止疽疥癬亦然風癩者服三方寸匕取瘥痔病服三方寸匕慎房室血食油膩淋病服三方寸匕又一切惡瘡粉和豬脂塗之頭瘡禿癬醋酒洗去痂以粉塗之水服三方寸匕百日慎如前論曰凡服粉治百病皆用粳米粥和服之慎房室五辛油膩血食勞作若得雲母水服之一升長年飛仙雲母水主除萬病久服長年神仙方雲母二十斤細擘芒硝十斤露水一石崖蜜二斤上四味先取露水八斗作沸湯分半洮汰雲母再遍漉出以露水二斗溫之納芒硝令消置木器中納雲母訖經三七日出之令燥以水漬之粗皮令軟作袋納雲母袋中急系口兩人揉梴之從寅至午勿住出之密絹篩末余不下者更納袋中揉挻如初篩下總可得五斤以崖蜜和攪令如粥納薄削筒中漆固口埋舍北陰中深六七尺築土令平一百二十日出之皆成水旦溫水一合和雲母一合向東服日三水寒溫自任服十日小便當黃此先除勞氣風也疢也二十日腹中寒癖皆消三十日齲齒除者更生四十日不畏風寒五十日諸病皆愈顏色日少久服不已長年神仙服水第六論一首法七首論曰夫天生五行水德最靈浮天以載地高下無不至潤下為澤升而為云集而為霧降而為雨故水之為用其利博哉可以滌蕩滓穢可以浸潤焦枯尋之莫測其涯望之莫睹其際故含靈受氣非水不生萬物稟形非水不育大則包稟天地細則隨氣方圓聖人方之以為上善余嘗見真人有得水仙者不睹其方武德中龍齊此一卷服水經授余乃披玩不捨晝夜其書多有蠹壞文字頗致殘缺因暇隙尋其義理集成一篇好道君子勤而修之神仙可致焉第一服水法凡服水之法先發廣大心仍救三塗大苦普度法界含生然後安心服之經曰服水以死為期決得不疑然後辦一瓦杯受一升擇取四時王相甲子開除滿之日並與身本命相生之日候天地大時無一雲氣日未出時清淨沐浴服鮮淨衣燒香禮十方諸佛及一切聖賢仙人天真乞大鴻恩乃向東方取水以水置器中候日出地令水與日同時得三杯杯各受一升咒之三遍向日以兩手棒水當心面向正東方並腳而立先叩齒鳴天鼓三通乃以口臨水上密誦咒一三五七遍極微微用力乃細細咽之想三咽在左廂下三咽在右廂下三咽處中央下周而復始但是服即作此法咽水服一杯踟蹰消息徐徐行二十步乃回更服一杯訖更徐徐行四十步乃回更飲一杯復行八十步乃止勿煩多飲亦不得少也常燒衆名香至心念佛凡有所證悟境界一切狀貌不得執著乃真事向人道說此則是初起首服水法杯用桑杯瓦亦得其咒曰乾元亨利正九種吾生日月與吾並吾復不飢復不渴賴得水以自活金木水火土五星之氣六甲之精三真天倉濁云上盈黃父赤子守中無傾急急如律令每服皆用此咒咒之三杯杯各三遍乃細緩緩徐徐服之細服五色水法經曰白黃黑水服法如前唯有青水一法服滿三匕日中思食鬼神遍在身中從人索食當如法與之絶中五穀多食棗栗詐稱鬼親附說人慎勿信之但當以法調和以時及節服赤水方赤向生氣所宜之方三杯三咒抉手心念口言誦偈曰金木水火土五精六腑一切識臟欲服之時專心注下初服之時如似漿氣三七日如甘露味亦當食棗栗一升七日食蟲漸發三尸亦盛思美飲食遍緣一切世間當發善念相續五七日中二食棗栗水方漸強增長顏色怡悅氣力異常更須加口水當漸少日月漸盈膚體汗類漸漸剝落眼目精明亦少睡眠心開意解但如法慎護心若不至誠內連六識外為鬼神侵繞其心念青帝神守護水精五七日腳弱心意不定但當正念重加神司土父神後五臟君名衆邪雜鬼如法而去六七日後獨善解音樂不得禮拜省習誦養氣力勿嗔怒嫉妒勿調氣省睡眠卻鬼咒法咒曰然摩然摩波悉諦蘇若竭狀暗提若夢若想若聰明易解常用此咒法去之服水禁忌法經曰凡服水忌用銅鐵器唯用垍器初起手時忌陰雲大雨大風大霧天地不明皆凶凡服水禁陳米臭豉生冷醋滑椒姜一切衆果悉不得食又不得至喪孝産乳之家五辛之氣亦不得聞一切脂膩血食菜茹悉不得食也凡服水四七日後乍聞琴聲歌嘯悉不得容受資身悅樂音聲博戲皆不得執漸漸通泰以洪大道五色水法皆同於此也世間之法音聲觸五穀觸喪孝觸産婦觸射利觸善友觸惡人名聞觸惡名觸皆當謹慎之服水節度法經曰凡服水七日中漸止醋滑亦漸省食七日滿取棗栗食經二日後乃更服之二七日後食蟲漸發更食棗栗一升三七日後思食更服栗棗二升四七日後食蟲思食欲死腳弱不能行步五七日水力漸盈顏色更好氣力異常六七日中能步不止隨意東西七七日中心解異義耳聞異聲必不得貪著義亦有悲欣慈旨八七日中守倉尸九七日中尸臭自然遠離不樂世間五臟諸病悉得除愈十七日中髓腦衆脈皮膚汗類一切悉愈眼目精明心想分別無事不知千日後中表內外以五臟漸縮漸小衆毒不害人精水神漸來附人七年腸化為筋髓化為骨火不能燒水不能漂居在水中與水同色在水底與地無異居山澤間遠視之者獨如山雷此服黃黑水法用水法井泉清流悉得用之雷字疑服水大例法經曰凡服水以死為期必得無疑信因信果正真其心聞法歡喜不生疑惑又曰凡服水訖男先舉左足向陽左行女先舉右足向陰右行男奇婦偶凡服水法立飲之不得坐飲欲細細而緩不得粗粗而急杯受一升每一服必三杯服輒一回徐行三杯三回若少兼食者杯受一升如是三杯凡服水上行一百三十步中行一百二十步下行六十步水重難得氣力善將其宜而不失其所者一百日水定周年水盈四十年氣二百倍遊形自在高原陸地與水等無差異顏色皎然四十年腸化為筋髓化為骨凡服水八十以下十歲以上皆得服之若小者當加棗栗棗栗法上根者從初七至四七止中根者從初七至八七止下根者從初七至十七乃至十七十二七止後有中下根者一周晬將補乃始休息上利根之人一服如甘露中根之人再服如甘露下根之人四服如甘露極下根者六服如甘露上利根者一服二七日中根者過七日乃至十日下根者服日再服七日又有上利根者延日三倍中利根者延日一倍下利根者才不當日又有上品人修戒定過去業強中品人見在修業強下品人以死為期必得無疑信向三寶中根有三品中上品當聞知此寶法欲長年服大升一石二石即得不死中中品修習其行比智殖業當服此藥廣行誓願中下品少有嫉妒及以惰慢亦具五蓋三毒起罪心因國土荒亂人民饑饉刀兵劫起思服此藥以免下根有三品睡眠無覺想不善音樂亦玩博戲又無聰惠瞪矒不了須人教呵中品人小復遠人下品人居大深山乃得服耳
