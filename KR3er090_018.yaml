body:
  text: 卷第十八雜病上霍亂第一方二十七首理中丸主霍亂臨時方人參白朮乾薑甘草炙各一兩上四味搗篩為末煉蜜和丸如彈丸取湯和一丸服之日十服吐多痢少者取枳實三枚炙四破水三升煮取一升和一丸服之吐少痢多者加乾薑一兩吐痢乾嘔者取半夏半兩洗去滑水二升煮取一升和一丸服之若體疼痛不可堪者水三升煮棗三枚取一升和一丸服之若吐痢大極轉筋者以韭汁洗腹腎從胸至足踝勿逆即止若體冷微汗腹中寒取附子一枚炮去皮四破以水二升煮一升和一丸服吐痢悉止脈不出體猶冷者可服諸湯補之厚朴湯主霍亂面煩方厚朴炙高良薑桂心各三兩上三味㕮咀以水六升煮取二升分再服四順湯主霍亂吐下腹痛手足逆冷方大附子一枚去皮破八片乾薑三兩人參甘草炙各一兩上四味㕮咀三味以水五升煮取一升半分三服治霍亂吐痢嘔逆龍骨湯方龍骨黃連乾薑赤石脂當歸各三兩枳實五枚炙半夏一升洗附子炮去皮破人參桂心甘草炙各二兩上一十一味㕮咀以水九升煮取三升分三服治霍亂困篤不識人方雞蘇一大把上一味以水一斗煮取三升分再服治霍亂轉筋兩臂及腳胸脅諸轉筋並主之方鹽一升五合煮作湯漬洗轉筋上按灸良又方大麻子一升搗以水三升煮取一升盡服之又方香薷一把水煮令極濃服二三升即瘥青木香亦佳治霍亂止吐方丁香十四枚以酒五合煮取二合頓服之用水煮之亦佳治霍亂吐痢心煩不止方豬糞如雞子大一枚為末以沸湯一升和之頓服良不瘥更作又方粱米粉五合水一升半和之如粥頓服須臾即止治霍亂轉筋入腹方雞屎白末以水六合煮取湯服方寸匕治大便不通噦數口譫語方厚朴二兩炙大黃四兩枳實五枚炙上三味㕮咀以水四升煮取一升二合分再服當通不通盡服之竹茹湯主噦方竹茹一升橘皮半夏洗各三兩生薑四兩切紫蘇一兩甘草一兩炙上六味㕮咀以水六升煮取二升半分三服治中風客熱噦方竹茹四兩生米五合上二味以水六升煮米熟服之治嘔噦方蘆根五兩上一味切以水五升煮取三升分三服兼服小兒尿三合良又方飲大豆汁一升止又方常服白羊乳一升治氣厥嘔噦不得息又主霍亂大豉湯方香豉一升半夏洗生薑各二兩切前胡桂心人參甘草炙各一兩上七味㕮咀以水五升煮取二升分三服勿使冷傷寒噦而滿者宜視其前後知在何部不利利之愈噦而不利此湯主之方橘皮一升甘草一尺上二味㕮咀以水五升煮取一升頓服之噦橘皮湯主之方橘皮通草乾薑桂心甘草炙各二兩人參一兩上六味㕮咀以水六升煮取二升分三服小半夏湯主心下痞堅不能飲食胸中喘而嘔噦微寒熱方生薑八兩切以水三升煮取一升半夏五合洗以水五升煮取一升上二味合煎取一升半稍稍服之即止又方橘皮四兩生薑八兩上二味切以水七升煮取二升五合分三服下喉即瘥未瘥更合又方羚羊角屑前胡人參橘皮甘草炙各一兩上五味㕮咀以水六升煮取二升分三服卒噦爪眉頭亦可針此主實噦實噦者醉飽得之虛噦者吐下得之又失血虛後亦得之方炭末蜜和細細嚥少許即瘥又方男噦女人丁壯氣盛者噓其肺俞女子男子噓之痎瘧第二方二首禳法十二首針灸法七首蜀漆丸主痎瘧連年不瘥服三七日定瘥方蜀漆知母白薇地骨皮麥門冬去心升麻各五分恆山一兩半石膏二兩研香豉一合葳蕤烏梅肉鱉甲各一兩炙甘草炙三分上一十三味搗篩為末煉蜜和丸如梧子空腹飲服十丸日再加至二三十丸陵鯉湯主瘧疾江南瘴瘧方陵鯉甲十四枚炙鱉甲一枚炙烏賊魚骨附子炮各一兩去皮恆山三兩上五味㕮咀以酒三升漬一宿未發前稍稍啜之勿絕吐之並塗五心一日斷食過時久乃食肝瘧令人色蒼蒼然太息其狀若死刺足厥陰見血心瘧令人心煩甚欲得清水寒多不甚熱刺足少陰是謂神門脾瘧令人病寒腹中痛熱則腸中鳴鳴已汗出刺足太陰肺瘧令人心寒甚熱間善驚如有見者刺手太陰陽明腎瘧令人悽悽腰脊痛宛轉大便難目眗眗然手足寒刺足太陽少陰胃瘧令人且病寒善飢而不能食支滿腹大刺足陽明太陰橫脈出血黃帝問岐伯曰瘧多方少愈者何岐伯對曰瘧有十二種黃帝曰瘧鬼字何可得聞乎岐伯對曰但得瘧字便愈不得其字百方不愈黃帝曰瘧鬼十二時願聞之岐伯對曰寅時發者獄死鬼所為治之以瘧人著窯上灰火一周不令火滅即瘥卯時發者鞭死鬼所為治之以五白衣燒作灰三指撮著酒中無酒清水服之辰時發者墮木死鬼所為治之令瘧人上木高危處以棘塞木奇間即瘥巳時發者燒死鬼所為治之令瘧人坐師以周匝燃火即瘥午時發者餓死鬼所為治之令瘧人持脂火于田中無人處以火燒脂令香假拾薪去即瘥未時發者溺死鬼所為治之令瘧人臨發時三渡東流水即瘥申時發者自刺死鬼所為治之令瘧人慾發時以刀刺塚上使得姓字咒曰若瘥我與汝拔卻即瘥酉時發者奴婢死鬼所為治之令瘧人碓稍上捧上臥莫令人道姓字即瘥戌時發者自絞死鬼所為治之左索繩緊其手腳腰頭即瘥亥時發者盜死鬼所為治之以刀子一口箭一隻灰一周刀安瘧人腹上其箭橫著底下即瘥子時發者寡婦死鬼所為治之令瘧人脫衣東廂床上臥左手持刀右手持杖打令聲不絕瓦盆盛水著路邊即瘥丑時發者斬死鬼所為治之令瘧人當戶前臥頭東向血流頭下即瘥瘧醫並不能救者方以繩量病人腳圍繞足跟及五指一匝訖截斷繩取所量得繩置項上著反向背上當繩頭處中脊骨上灸三十壯即定候看復惡寒急灸三十壯即定比至過發一炊久候之雖飢勿與食盡日此法神驗男左女右黃疸第三論三首方二十八首針灸二十法論曰凡遇時行熱病多必內瘀著黃但用瓜丁散納鼻中令黃汁出乃愈即於後不復病黃者矣常須用心警候病人四肢身面微似有黃氣須用瓜丁散不得令散漫失候必大危矣特忌酒面犯者死黃疸目黃不除瓜丁散方瓜丁細末如一大豆許納鼻中令病人深吸取入鼻中黃水出瘥凡人無故忽然振寒便發黃皮膚黃麴塵出小便赤少大便時閉氣力無異食飲不妨已服諸湯餘熱不除久黃者苦參散主之方苦參黃連黃柏黃芩大黃瓜丁葶藶熬各一兩上七味搗篩為散飲服方寸匕當大吐吐者日一服不吐者日再亦得下服藥五日知可消息不知可更服之小半夏湯治黃疸小便色不異欲自利腹滿而喘不可除熱熱除必噦噦者半夏一升洗去滑生薑半斤上二味切以水一斗煮取二升分再服一法以水七升煮取一升半黃疸身目皆黃皮肉麴塵出者方茵陳一把切梔子仁二十四枚石膏一斤上三味以水五升煮二味取二升半去滓以猛火燒石膏令赤投湯中沸定服一升覆取汗周身以粉粉之不汗更服黃疸腹滿小便不利而赤自汗出此為表和裡實當下之宜大黃湯方大黃黃柏硝石各四兩梔子十五枚擘上四味㕮咀以水六升煮取二升去滓下硝石煮取一升先食頓服之茵陳湯主時行黃疸結熱面目四肢通黃乾嘔大便不通小便赤黃似柏汁腹痛心煩方茵陳半夏洗各二兩生薑四兩切大黃二兩半芍藥白朮各一兩半梔子擘前胡各三兩枳實炙厚朴炙黃芩甘草炙各一兩上一十二味㕮咀以水四斗煮取九升七合分十服又方黃蒸汁三升頓服即瘥又方蔓荊子五升末服方寸匕日三數日驗又方黃蒸麥面豬矢各一升上三味以水五升漬一宿旦絞去滓服一升覆取汗出大茵陳湯主內實熱盛發黃黃如金色脈浮大滑實緊數者夫發黃者多是酒客勞熱食少胃中熱或濕毒內熱者故黃如金色方茵陳一兩半大黃茯苓前胡白朮各三兩黃柏一兩半梔子仁二十枚黃芩栝蔞枳實炙甘草炙各二兩上一十一味㕮咀以水九升煮取三升分服一升得快下三四日愈治黃疸病病五年以上不瘥但是湯藥服之即瘥瘥已還發者方茵陳二斤淨擇去惡草切之上一味以水二斗煮取五升空腹服一服二升日三夜一隔日更服之取瘥止神驗黃疸變成黑疸醫所不能治方土瓜根搗取汁一升上一味頓服之病當從小便出黃黑等疸方當歸三兩桂心六兩干棗一十七枚去核麥門冬一升去心大黃一兩茵陳黃芩黃耆一本無乾薑茯苓芍藥黃連石膏碎人參甘草炙各二兩上一十五味㕮咀以水一斗煮取三升半分四服赤苓散主黑疸身皮大便皆黑方赤小豆三十枚茯苓六銖切雄黃一銖瓜丁四銖女萎六銖甘草二銖炙上六味以水三升煮豆茯苓取八合搗四味為散和半錢匕服之須臾當吐吐則愈亦主一切黃茵陳丸主黑疸身體黯黑小便澀體重方茵陳一兩甘遂一分當歸蜀椒汗各半兩去目閉口杏仁去皮尖雙仁熬大黃半夏洗各三分葶藶熬茯苓乾薑各一兩枳實㕮咀熬黃白朮熬黃各五分上一十二味搗篩為末煉蜜和丸如梧子大空腹以飲服三丸日三濕阻之為病始得之一身盡疼發熱面色黃黑七八日後壯熱熱在裡有血當下去之如豚肝狀其少腹滿者急下之亦一身盡黃目黃腹滿小便不利方礬石五兩燒滑石五兩研如粉上二味搗篩為散水服方寸匕日三服先食服之便利如血已當汗出愈千金以麥粥汁服風疸小便數或黃或白洒洒惡寒壯熱好睡不欲動方生艾三月三日取一束搗取汁銅器中煎如漆密封之勿令瀉大黃黃連凝水石苦參葶藶子栝蔞各等分熬上六味搗篩為散以艾煎和為丸如梧子先食飲服五丸日三可至二十丸有熱加苦參渴加栝蔞小便澀加葶藶小便多加凝水石小便黃白加黃連大便難加大黃秦椒散主膏疸飲少溺多方秦椒一分汗瓜丁半兩上二味搗篩為散水服方寸匕日三秦王九疸散方胃疸食多喜飲梔子仁主之心疸煩心心中熱茜根主之腎疸唇乾葶藶子主之熬脾疸尿赤出少惕惕恐栝蔞主之膏疸飲少尿多秦椒瓜蒂主之椒汗膏一作肺舌疸渴而數便鍾乳主之肉疸小便白凝水石主之研髓疸目眶深多嗜臥牡蠣澤瀉主之肝疸胃熱飲多水激肝白朮主之上一十一味等分隨病所在加半兩搗篩為散飲服五分匕日三稍稍加至方寸匕論曰夫酒疸其脈浮者先吐之沉弦者先下之酒疸者或無熱靖言了了腹滿欲吐者宜吐之酒疸心中熱欲嘔者宜吐之酒疸必小便不利其候當心中熱足下熱是其候也酒疸下之久久為黑疸目青面黑心中如啖蒜齏大便正黑皮革搔之不仁其脈浮弱雖黑微黃故知之也寒水石散主肉疸飲少小便多白如泔色此病得之從酒方寒水石白石脂栝蔞各五分知母菟絲子桂心各三分上六味搗篩為散麥粥服五分匕日三五日知十日瘥酒疸身黃麴塵出牛膽煎方牛膽一枚大黃八兩芫花一升熬蕘花半升熬瓜丁三兩上五味以酒一升切四味漬之一宿煮減半去滓納牛膽微火煎令可丸丸如大豆服一丸日移六七尺不知更服一丸膈上吐膈下利或不吐利而痊酒疸心中懊憹或痛梔子湯方梔子十四枚擘枳實三枚炙大黃二兩豉半升上四味㕮咀以水六升煮取二升服七合日三茵陳湯主黃疸酒疸身目悉黃方茵陳三兩大黃黃芩黃連各二兩人參半兩梔子仁三七枚甘草一兩炙上七味㕮咀以水一斗煮取三升五合分四服半夏湯主酒癊胸心脹滿肌肉沉重逆害飲食小便赤黃此根本虛勞風冷飲食衝心由脾胃客痰所致方半夏一升洗生薑十兩切黃芩一兩前胡茯苓各三兩當歸茵陳各一兩枳實炙大戟白朮甘草炙各二兩上一十一味㕮咀以水一斗煮取三升分三服宛轉丸凡患黃疸足腫小便赤食少羸瘦方乾地黃石斛白朮各二兩牡蠣熬芍藥芎藭大黃小草甘草炙各三兩上九味搗篩為散煉蜜和丸如梧子飲服四丸日三茯苓丸主患黃疸心下縱橫結堅小便赤是酒疸方茯苓茵陳乾薑各一兩半夏洗杏仁去皮尖雙仁各三分商陸半兩甘遂一分枳實五分炙蜀椒二合汗去目閉口白朮五分切熬令變色上一十味搗篩為末煉蜜和丸如蜱豆三丸以棗湯下之夫患黃疸常須服此若渴欲飲水即服五苓散若妨滿宛轉丸治之五苓散見傷寒中治黃疸小便赤黃方前胡茯苓各一兩半椒目一兩熬附子半分炮去皮茵陳二兩半菖蒲二兩半上六味搗篩為散食以前服一錢匕日三服此劑更參服上二藥黃疸之為病日晡所發熱惡寒少腹急體黃額黑大便黑溏瀉足下熱此為女勞也腹滿者難療方滑石研石膏研各五兩上二味為散麥粥汁服方寸匕日三小便極利瘥灸黃法二十穴第十一椎下俠脊兩邊各一寸半灸脾俞百壯兩手小指端灸手少陰隨年壯手心中灸七壯胃管主身體萎黃灸百壯治十十瘥忌針耳中在耳門孔上橫梁主黃疸上齶入口裡邊在上縫赤白脈上是針三鋥舌下俠舌兩邊針鋥頰裡從口吻邊入往對頰裡去口一寸鋥上齶里正當人中及唇針三分鋥巨闕上管上二穴並七壯狂言浪走者灸之瘥寅門從鼻頭直入髮際度取通繩分為三段繩取一分入髮際當繩頭鋥鋥字未詳不敢刊正脊中椎上七壯屈手大指節里各七壯中管大陵勞宮三里然谷太谿上八穴皆主黃疸論曰黃疸之為病若不急救多致於死所以具述古今湯藥灸鋥方法按據此無不瘥者也有人患之皆昏昧不識好惡與茵陳湯一劑不解亦有惺惺如常身形似金色再服亦然隔兩日一劑其黃不變於後與灸諸穴乃瘥瘡上皆黃水出然此大慎面肉醋魚蒜韭熱食犯之即死吐血第四論三首方三十首論曰凡吐血有三種有內衄有肺疽有傷胃內衄者出血如鼻衄但不從鼻孔出是近心肺間津液出還流入胃中或如豆汁或如䘓血凝停胃中滿悶便吐或去數升乃至一斗得之於勞倦飲食過常所為也肺疽者或飲酒之後悶吐血從吐出或一合半升傷胃者因飲食大飽之後胃中冷則不能消化便煩悶強嘔吐之物與氣共上衝蹙傷裂胃口血色鮮赤腹中絞痛自汗出其脈緊而數者為難治也吐之後體中但奄奄然心中不悶者輒自愈假令煩躁心中悶亂紛紛欲吐顛倒不安醫者又與黃土湯阿膠散益使悶亂卒至不救如此悶者當急吐之吐方瓜蒂半兩杜蘅人參各一分上三味搗篩為散服一錢匕水漿無在得下而已羸者小減之吐去青黃或血二三升無苦生地黃湯主憂恚嘔血煩滿少氣胸中痛方生地黃二斤大棗五十枚擘阿膠炙甘草炙各三兩上四味㕮咀以水六升煮取四升分為四服日三夜一堅中湯主虛勞內傷寒熱頻連吐血方糖三斤芍藥半夏洗生薑各三兩切大棗五十枚擘生地黃一斤上六味㕮咀以水二斗煮取七升分七服日三夜一千金有甘草桂心無地黃治噫止唾血方石膏四兩碎生薑切麻黃去節五味子各二兩小麥一升厚朴炙半夏洗杏仁去皮尖雙仁各三兩上八味㕮咀以水一斗煮麻黃去上沫納諸藥煮取二升五合分再服又方伏龍肝如雞子大兩枚乾薑當歸桂心芍藥白芷阿膠預漬之甘草炙各二兩細辛半兩芎藭一兩生地黃八兩吳茱萸二升上一十二味㕮咀以清酒七升水三升合煮取三升半去滓納膠煎取三升分三服亦治衄血千金名黃土湯主吐血當歸湯主吐血方當歸黃芩各三兩乾薑芍藥阿膠炙各二兩上五味㕮咀以水六升煮取二升分三服日二夜一伏龍肝湯主吐血並衄血方伏龍肝半升乾地黃乾薑牛膝各二兩阿膠炙甘草炙各三兩上六味㕮咀以水一斗煮取三升去滓納膠分三服澤蘭湯主傷中裡急胸脅攣痛頻嘔血時寒時熱小便赤黃此傷於房中者方澤蘭糖各一斤桑白皮三斤根者生薑五兩切麻仁一升人參桂心各三兩遠志二兩去心上八味㕮咀以淳酒一斗五升煮取七升去滓納糖未食服一升日三夜一勿勞動竹茹湯主吐血汗血大小便出血方淡竹茹二升當歸黃芩芎藭甘草炙各半兩人參芍藥桂心白朮各一兩上九味㕮咀以水一斗煮取三升分四服日三夜一治吐血唾血或勞發或因酒發方當歸羚羊角屑乾地黃小薊根柏枝炙阿膠炙乾薑各三兩白芍藥白朮各四兩伏龍肝如雞子研亂髮如雞卵燒竹茹一升蒲黃五合甘草二兩炙上一十四味㕮咀以水二斗煮取五升五合去滓下膠消盡下發灰蒲黃分五服吐血百治不瘥療十十瘥神驗不傳方地黃汁半升大黃生末一方寸匕上二味煎地黃汁三沸納大黃末調和空腹服之日三血即止神良治吐血方服桂心末方寸匕日夜可二十服治身體暴血鼻口耳目九孔皮膚中皆漏血方取新生犢子未食草者有屎曝乾燒末水服方寸匕日四五服立瘥生地黃湯主衄血方生地黃黃芩各一兩柏葉一把阿膠炙甘草炙各二兩上五味㕮咀以水七升煮取三升去滓納膠煎取二升五合分三服又方生地黃三斤切阿膠二兩炙蒲黃六合上三味以水五升煮取三升分三服治鼻口瀝血三升氣欲絕方龍骨細篩一棗核許微以氣吹入鼻中即斷更出者再吹之取瘥止又方細切蔥白搗絞取汁瀝鼻中一棗許即斷慎酒肉五辛熱面生冷等阿膠散主衄血不止方阿膠炙龍骨當歸細辛桂心各一兩蒲黃五合亂髮三兩燒灰上七味搗篩為散先食飲服方寸匕日三服三劑瘥亦可蜜丸酒服伏龍肝湯主鼻衄五臟熱結或吐血衄血方伏龍肝雞子大一枚生地黃一斤切生竹茹一升芍藥當歸黃芩芎藭桂心甘草炙各二兩上九味㕮咀以水一斗三升煮竹茹減三升納藥煮取三升分三服千金無桂心乾地黃丸主失血虛勞胸腹煩滿疼痛血來臟虛不受穀氣嘔逆不用食補中治血方乾地黃三兩厚朴炙乾漆熬枳實炙乾薑防風大黃細辛白朮各一兩前胡一兩半人參茯苓各五分虻蟲去翅足熬䗪蟲熬各十五