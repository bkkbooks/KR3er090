body:
  text: 卷第十九雜病中消渴第一方二十二首葵根湯主一年渴飲一石以上小便利若飲酒渴傷寒渴皆悉主之方霜下葵根皮一握長四寸上一味以水一斗煮取三升分三服取瘥止又方栝蔞根甘草炙各二兩黃連一升上三味㕮咀以水五升煮取二升五合分三服茯苓湯主胃反吐而渴方茯苓八兩澤瀉四兩生薑切桂心白朮各三兩甘草一兩炙上六味㕮咀以水一斗煮小麥三升減三升去麥納諸藥煮取二升五合每服八合日再消渴師所不能治之方生栝蔞九斤去皮細切搗絞汁令盡上好黃連九兩搗絹羅為末上二味以上件汁溲黃連如硬麵細擘日曝令乾搗之絹篩更溲如前日曝搗一依前法往反汁盡曝乾搗篩煉蜜和飲服如梧子十丸日三加至三十丸病愈止百日慎生冷醋滑酒五辛肉面油膩永瘥無生者乾者九斤切以水二斗煎取一斗和之如生者法桑根湯主日飲一石水方桑根白皮切五升入地三尺者良炙令黃黑上一味以水與根亦不限多少煮以味濃為度適寒溫飲之任性多少切慎鹽豬肚丸治消渴方豬肚一枚治如食法黃連五兩栝蔞四兩麥門冬四兩去心知母四兩無以茯神代上五味為散納豬肚中線縫安置甑中蒸之極爛熟接熱木臼中搗可丸若硬加少蜜和丸如梧子飲服三十丸日再漸加至四十五十丸渴即服之葛根丸主消渴方葛根栝蔞各三兩鉛丹二兩附子一兩炮去皮上四味搗篩為末煉蜜和丸如梧子飲服十丸日三服治日飲一石水者春夏減附子大黃丸主消渴小便多大便祕方大黃一斤栝蔞土瓜根各八兩杏仁五合去皮尖雙仁熬上四味破大黃如棋子冷水漬一宿蒸曝乾搗篩為末煉蜜和丸如梧子大以飲服五丸日三以知為度酥蜜煎主消渴方酥一升白蜜三升芒硝二兩上三味合煎欲渴即啜之日六七益氣力神效羊髓煎主消渴口乾濡咽方羊髓二合無即以酥代之白蜜二合甘草一兩炙切上三味以水三升煮甘草取一升去滓納蜜髓煎令如飴含之盡復含酥蜜煎主諸渴方酥一升蜜一升上二味合煎令調和一服二升當令下利藥出明日更服一升後日更服一升即瘥慎酒及諸咸等茯苓煎主諸消渴方茯苓二斤白蜜四升上二味於銅器中重釜煎以兩莖薤白為候黃即煎熟先食服如雞子大日三防己散主消渴肌膚羸瘦或乃轉筋不能自止小便不禁悉主之方木防己一兩栝蔞鉛丹黃連各二兩上四味搗篩為散先食以苦酒一升以水二升合為漿服方寸匕日三服訖當強飲極令盈溢一日再服則憎水當不欲飲也大渴百方療之不瘥方鉛丹胡粉各半兩栝蔞甘草炙各二兩半澤瀉石膏赤石脂白石脂各五分上八味搗篩為散水服方寸匕日三壯人一匕半一年病一日愈二年病二日愈渴甚者夜兩服腹痛者減之丸服亦佳一服十丸傷多則腹痛也治口乾燥方酸棗一升半去核酸石榴子五合末烏梅五十枚去核麥門冬四兩去心茯苓三兩半覆盆子葛根各三兩石蜜四兩桂心一兩六銖栝蔞三兩上一十味搗篩為末煉蜜和丸如酸棗大含之不限時節以口有津液為度忌如藥治三黃丸主男子五勞七傷消渴不生肌肉婦人帶下手足寒熱方巴郡太守奏春三月黃芩四兩大黃三兩黃連四兩夏三月黃芩六兩大黃一兩黃連七兩秋三月黃芩六兩大黃二兩黃連三兩冬三月黃芩三兩大黃五兩黃連二兩上三味隨時合搗為末煉蜜和如大豆飲服五丸日三不知稍增至七丸服一月病愈久服行及奔馬嘗試有驗鉛丹散主消渴方鉛丹二兩栝蔞八兩茯苓甘草炙各一兩半麥門冬八兩去心上五味搗篩為散旦以漿服方寸匕日二膀胱冷小便數多每至夜偏甚方雞腸五具治如食法羊腎一具去脂並干為末赤石脂六兩龍骨三兩蓯蓉四兩黃連五兩桂心二兩上七味搗篩為散酒服方寸匕半日再服五日中可作羊湯炙一劑十日外可作羊肉臛香味如常食飽與之尿煮牡蠣主內消小便數方牡蠣五兩熬上一味以患人尿三升煮取二升分再服治渴利方豆一升醋拌蒸曝乾三拌三曝三蒸熬黃連一斤如金色者上二味搗篩為末煉蜜和丸如梧子飲服三十丸日二稍加至四十丸神驗大病後虛羸不足成渴方取七歲以上五歲以下黃牛新生犢者乳一升以水四升煎取一升適寒溫稍稍飲之不得過多十日服之不住佳一云渴即飲不限多少又方取自死雞大者一枚以三升半白湯捉腳倒細細淋之三七遍拔毛置於湯中毛盡去毛取汁澄清湯即任性飲之飲盡即愈其雞故殺作藥不過七日其病倍發以後百藥不可瘥慎之慎之栝蔞散主消渴延年益壽方栝蔞枸杞根赤石脂茯苓各一兩半天門冬二兩半去心牛膝乾地黃各三兩桂心菊花麥門冬去心菖蒲雲母粉澤瀉卷柏山茱萸遠志去心五加皮杜仲炙瞿麥續斷石斛黃連柏仁石葦去毛忍冬各一兩菟絲車前子蛇床子巴戟天鍾乳研薯蕷甘草炙各五分上三十二味搗篩為散酒服方寸匕日三四亦可丸服十丸日三淋病第二方二十首治血淋熱淋方以韭七莖燒令熱以手熟挼熱掩尿處冷即易之可六七度瘥治熱淋方白茅根四斤上一味切以水一斗五升煮取五升每服一升日三夜二治石淋方車前子二升絹袋貯以水八升煮取三升空腹頓服之須臾當下石子宿勿食服之良又方常煮冬葵根作飲服之石出關格不通方芒硝五兩芍藥四兩杏仁四兩去皮尖雙仁麻子仁三兩枳實一兩炙大黃半斤乾地黃二兩上七味㕮咀以水七升煮取三升分三服一方用烏梅榆白皮各五兩無枳實地黃治淋方車前子一把榆白皮一握亂髮如雞子大燒之取灰上三味以水六升煮取三升分再服又方黃芩四兩上一味㕮咀以水五升煮取二升分三服亦主下血治淋方榆白皮切一升車前子切五升葵子一升滑石八兩通草八兩赤蜜一升上六味㕮咀以水三斗煮取七升去滓下蜜更煎取三升分三服治尿白稠方露蜂房燒灰服方寸匕煮汁服亦佳治小便不通方滑石二兩葵子一兩榆白皮一兩上三味為散濃煮麻子汁一升半取一升以散二方寸匕和服兩服即通治小便不通方納薑黃末如豆許大小便孔中即通又方通草豬苓去皮桑白皮各二兩上三味㕮咀以水六升煮取二升分二服治丈夫女人胞轉不得小便八九日方滑石一斤寒水石一兩碎葵子一升上三味以水一斗煮取五升盡服即利久房散主小便多或不禁方菟絲子二兩蒲黃三兩黃連三兩硝石一兩肉蓯蓉二兩上五味並雞肶胵中黃皮三兩為散飲服方寸匕日三行三四里又服一方用五味子三兩治小便不利膀胱脹水氣流腫方水上浮萍曝乾末服方寸匕日三治小便不禁多日便一二斗或如血方麥門冬八兩去心蒺藜子二兩甘草一兩炙乾薑四兩桂心二兩乾地黃八兩續斷二兩上七味㕮咀以水一斗煮取二升五合分三服又方鹿茸長三寸炙躑躅一升桂心一尺韭子一升附子三枚炮去皮澤瀉三兩上六味為散服五分匕日三稍加至一寸匕漿水服之瘥治大小便不通方當歸三斤大戟一斤牛膝三斤上三味切以水五升煮取二升以大豆五升煎令汁盡豆乾初服三枚以通為度濡臟湯主大小便不通六七日腹中有燥屎寒熱煩迫短氣汗出腹滿方生葛根二斤豬膏二升大黃一兩上三味㕮咀以水七升煮取五升去滓納膏煎取三升澄強人頓服羸人再服霹靂煎方好濃酒一盞鹽一大錢上二味和於鐺內文火煎攪勿住手可丸得就鐺丸如小繭大納肛腸中不過三必通如不通者數盡也神效酒當作蜜水腫第三方二十六首並五不治證凡水腫有五不治一面腫蒼黑是肝敗不治二掌腫無紋理是心敗不治三腹腫無紋理是肺敗不治四陰腫不起是腎敗不治五臍滿腫反者是脾敗不治豬苓散主虛滿通身腫利三焦通水道方豬苓去皮茯苓葶藶熬人參五味子防風澤瀉狼毒玄參乾薑白朮桂心椒目大戟遠志去心甘草炙各半兩女曲三合熬小豆二合蓯蓉二分半上一十九味搗篩為散酒服方寸匕日三夜一老小服一錢匕日三以小便利為度治百病諸荒邪狂走氣痞冷病歷年黃黑大腹水腫小兒丁奚瘧疾經年霍亂中惡蜚尸及暴疾皆悉主之方芫青巴豆去心皮熬斑蝥各三十枚去翅足熬天雄炮去皮乾薑各半兩烏頭炮去皮細辛蜀椒汗去目閉口者附子炮去皮躑躅黃芩桂心各一兩上一十二味細切以絹袋中盛酒一斗漬十日去滓服半合日三以知為度暴滓作散酒服半錢匕日三強人一錢傷寒中溫濕冷頭痛拘急寒熱瘧發頭風皆須服一錢匕厚覆取汗初服當吐清汁三四升許又主心疝婦人無子服之煩悶不堪者飲冷水一升即解蒲黃酒主通身腫此風虛水氣亦主暴腫方蒲黃小豆大豆各一升上三味以酒一斗煮取三升分三服商陸酒主風水腫方取商陸切一升以酒二升漬三宿服一升當下下者減之從半升起日三盡更合服又方取大豆一升以水四升煮取二升去滓納上酒一升合煎取一升隨能杯飲之日三服常令有酒勢茯苓丸主水脹大甄主簿與康公處得效方茯苓白朮椒目各一兩葶藶子一兩半熬桂心三分芒硝澤瀉木防己各五分甘遂三分赤小豆前胡蕘花各半兩熬千金作芫花上一十二味搗篩為末煉蜜和丸如梧子蜜湯服五丸日一稍加以知為度漢防己煮散主水腫上氣方褚澄祕之漢防己澤漆葉石葦去毛桑白皮澤瀉丹參茯苓橘皮白朮各三兩生薑十兩切郁李仁五兩通草一兩上一十二味搗篩為散以水一升七合納四方寸匕煮取八合頓服日二小便利為度第一之水先從面目腫遍一身名曰青水其根在肝大戟主之第二之水先從心腫名曰赤水其根在心葶藶主之第三之水先從腹腫名曰黃水其根在脾甘遂主之第四之水先從腳腫上氣而咳名曰白水其根在肺藁本主之第五之水先從足趺腫名曰黑水其根在腎連翹主之第六之水先從面至足腫名曰玄水其根在膽芫花主之第七之水先從四肢起腹滿大身盡腫名曰風水其根在胃澤漆主之第八之水先四肢小腫其腹腫獨大名曰石水其根在膀胱桑根白皮主之第九之水先從小腸滿名曰果水其根在小腸巴豆主之第十之水乍盛乍虛乍來乍去名曰氣水其根在大腸赤小豆主之上十病皆藥等分與病狀同者則倍之白蜜和先食服一丸如小豆日三欲下病者服三丸弱者當以意節之治宿食流飲寒熱溫病水腫方郁李仁十枚熟研粳米三合研令中斷上二味以水四升合煮取二升頓服此粥日三度作服之人強用十五枚羸者五六枚不知者稍加之以知為度炙鯉魚主腫滿方取鯉魚長一尺五寸以尿漬令沒一宿平旦以木篦從口貫之至尾炙令黃熟去皮宿勿食空腹頓服之不能者再服令盡勿與鹽神方男女新久腫得惡暴風入腹婦人新産上溷清風入臟腹中如馬鞭者噓吸短氣咳嗽一味大豆煎方大豆一斗擇令淨上以水五斗煮之得一斗三升澄清去下濁者納釜中以一斗半美酒納汁中煎取九升宿勿食旦服三升溫覆取汗兩食頃當下去風氣腫減慎風冷十日平復如故除日服之佳若急不可待除日逐急令服合時於清淨無人處令童子一人視之不用六畜婦人見之自度身中腫未盡退更服三升瘥了了者勿服也神驗千金不傳又方楮皮葉一大束上二味切以水一斗煮取五升去滓服之不過三四日面腫乃減雖得瘥常可服之千金楮枝皮葉一大束切煮取汁隨多少釀酒旦服醉為佳後同莨菪丸治水氣腫鼓脹小便不利山連治韋司業得瘥司業侄雲表所送云數用神驗莨菪子一升羖羊肺一具青羊亦佳上二味湯微炸肺即薄切之曝乾搗末以三年大醋浸莨菪子一伏時出之熬令變色熟搗如泥和肺末蜜和搗作丸食後一食久服如梧子四丸麥門冬飲服之日三以喉中干口黏浪語為候數日小便大利即瘥麥門冬飲法麥門冬二十五枚去心粳米二十五粒上二味以大合三合半水煮之米大熟去滓以下丸藥每服常作有人虛肌積年氣上似水病眼似腫而腳不腫方穀楮葉八兩上一味以水一斗煮取六升去滓納米煮粥食如常食勿絶亦以當水煮羹等皆用之秋時多收以擬經冬用其水多少濃淡任人勿拘此方慎蒜面豬雞魚油膩重者三年服之永瘥輕者一年瘥治水腫方葶藶子六兩生用桂心二兩上二味搗篩為末煉蜜和丸如梧子飲服十丸日二慎如前法忌口味麻豆煎主大腹水腫方大麻一石未入窖不鬱挹者赤小豆一石不得一粒雜上二味取新精者仍淨揀擇以水淘曝令乾蒸麻子使熟曝令乾貯淨器中欲服取五升麻子熬之令黃香惟須緩火勿令焦細搗取末以水五升研取汁令盡淨器密貯之明旦欲服今夜以小豆一升淨淘漬之至曉干漉去水以新水煮豆未及好熟即漉出令乾納麻子汁中煮令火爛熟為佳空腹恣意食日三其陳郁麻子益增其病慎勿用之一切水腫皆忌飽食常須少飢後有灸三里絶骨作魚羹法見千金中苦瓠丸主大水頭面遍身大腫滿方苦瓠白穰實捻如大豆粒上一味以麵裹煮一沸空腹吞七枚午後出水一升三四日水自出不止大瘦即瘥三年慎口味苦瓠須好無靨翳者不爾有毒不堪用檳榔丸主水腫方檳榔桂心栝蔞麻黃去節杏仁去皮尖雙仁熬茯苓椒目白朮各三兩附子炮去皮吳茱萸五合厚朴炙乾薑黃耆海藻一本無木防己葶藶熬甘草炙各二兩上一十七味搗篩為末煉白蜜和丸如梧子飲服二丸日三加至四丸不知又加二丸可至十二丸此主老小水腫虛腫大病客腫作喘者用之佳一云忌海藻必恐無此一味風水通身腫欲裂利小便方防風豬苓去皮澤瀉麻黃去節茯苓各四兩黃耆三兩澤漆白朮各五兩杏仁去皮尖雙仁大戟各一升獨活八兩酒一斗大豆二升以水七升煮一升上一十三味㕮咀以豆汁及酒合煮取七升分六七服一日一夜令盡當小便極利為度澤漆根湯主水通身洪腫四肢無堪或從消渴或從黃疸支飲內虛不足榮衛不通血氣不化氣實皮膚中喘息不安腹中響響脹滿眼不得視方澤漆根十兩赤小豆二升茯苓三兩鯉魚一枚重五斤者淨去腸胃生薑八兩切人參麥門冬去心甘草炙各二兩上八味以水一斗七升煮鯉魚豆減七升去之納藥煮取四升五合去滓一服三合日三弱人二合日再服氣下喘止可至四合晬時小便利腫氣減或小溏下若小便大利還從一合始大利便止若無鯉魚鮦魚亦可若水甚不得臥臥不得轉側加澤漆一斤渴加栝蔞二兩咳加紫菀二兩細辛一兩款冬一兩桂心三兩增魚汁二升大豆湯主風水通身大腫眼不得開短氣欲絶或咳嗽方大豆一斗烏頭炮去皮黃耆澤瀉各三兩杏仁一升去皮尖雙仁半夏六兩洗茯苓白朮各五兩生薑七兩切麻黃去節豬苓去皮防風木防己各四兩甘遂甘草炙各二兩酒一升上一十六味以水四斗先煮豆取一斗去豆納藥及酒合煮取七升分七服日四夜三得快利小便為度腫減便住不必盡劑若不得利小便者加生大戟一升葶藶二兩半無不快也萬不失一麻黃湯主風濕水疾身體面目腫不仁而重方麻黃四兩去節甘草二兩炙上二味㕮咀以水五升煮麻黃再沸去沫納甘草煮取三升分三服重覆日移二丈汗出不出更合服之慎護風寒皮水用之良治水腫方以苦瓠穰一枚以水一石煮一炊久去滓煎令可丸服如大豆小便利後作小豆羹乃飲食之又方葶藶五兩熬牽牛子澤瀉昆布洗海藻洗豬苓去皮各三兩上六味末之煉蜜和丸如梧子大飲服十五丸日三石膽丸主足脛腫小便黃胸痛頰車骨筋解開痛方石膽研吳茱萸天雄炮去皮芫花熬柏仁各一分防風蕘花熬杜仲炙各三分菖蒲葶藶熬各一兩菟絲子三合上一十一味搗篩為末煉蜜和為丸如蜱豆以飲服三丸日二痰飲第四方一十四首治痰飲頭痛往來寒熱方常山一兩雲母粉二兩上二味搗篩為散熱湯服一方寸匕吐之止吐不盡更服杜蘅湯主吐百病方杜蘅松蘿各三兩瓜蒂二七枚上三味切以水酒各一升二合漬二宿去滓分再服若服已即吐者止不吐者更服之每服相去如人行十里欲令藥力盡飲一升稀粥便定老小用之亦佳千金云酒一升二合漬二宿蜜煎主寒熱方赤蜜五合常山四兩甘草半兩炙一法二兩上三味㕮咀以水一斗煮取二升去滓納蜜溫服七合吐則止不吐更服七合勿飲冷水又方蜜二合醋八合上二味調和旦頓服須臾猥猥然欲吐摘之若意中不盡明旦更服無毒不大嘔吐其藥安穩蔥白湯主冷熱膈痰發時頭痛悶亂欲吐不得方蔥白二七莖切桃葉一把烏頭炮去皮真珠另研常山甘草炙各半兩上六味㕮咀以酒四升水四升合煮取三升去滓納真珠服一升得吐止松蘿湯主胸中痰積熱皆除之方松蘿二兩烏梅二七枚常山三兩梔子二七枚擘甘草五兩炙一云一兩上五味㕮咀以酒三升漬一宿旦以水三升合煮取二升五合分再服得快吐便止不要頓盡二服也又方松蘿一兩烏梅三七枚常山甘草各二兩炙上四味㕮咀以酒三升漬一宿煮取二升服一升取吐止大五飲丸主五種飲一曰留飲停水在心下二曰澼飲水澼在兩脅下三曰痰飲水在胃中四曰溢飲水溢在膈上五臟間五曰流飲水在腸間動搖有聲夫五飲者皆由飲酒後傷寒飲冷水過多所致方遠志去心苦參藜蘆白朮烏賊骨甘遂大黃石膏半夏洗紫菀桔梗前胡芒硝栝蔞五味子蓯蓉貝母桂心芫花熬當歸人參茯苓芍藥大戟葶藶熬黃芩各一兩附子炮去皮常山厚朴炙細辛薯預甘草炙各三分巴豆三十枚去心皮熬上三十三味搗篩為末煉蜜和丸如梧桐子大酒服三丸日三稍加之以知為度前胡湯主胸中