body:
  text: 序原夫神醫祕術至賾參於道樞寶餌凝靈宏功浹於真畛知關籥玄牡駐歷之效已深轡策天機全生之德為大稽炎農於紀籙資太一而返營魂鏡軒後於遺編事歧伯而宣藥力故能嘗味之績郁騰天壤診體之教播在神寰醫道由是濫觴時義肇基於此亦有志其大者高密問紫文之術先其遠者伯陽流玉册之經擬斯壽於乾坤豈伊難老儔厥齡於龜鶴詎可蠲疴茲乃大道之真以持身抑斯之謂也若其業濟含靈命懸茲乎則有越人徹視於腑臟秦和動達於膏肓仲景候色而驗眉元化刳腸而湔胃斯皆方軌疊迹思韞入神之妙極變探幽精超絶代之巧晉宋方技既其無繼齊梁醫術曾何足云若夫醫道之為言實惟意也固以神存心手之際意析毫芒之裡當其情之所得口不能言數之所在言不能諭然則三部九候乃經絡之樞機氣少神余亦針刺之鈞軸況乎良醫則貴察聲色神工則深究萌芽心考錙銖安假懸衡之驗敏同機駭曾無挂發之淹非天下之至精其孰能與於此是故先王鏤之於玉板往聖藏之以金匱豈不以營疊至道括囊真頤者歟余幼智蔑聞老成無已才非公幹夙嬰沉疾德異士安早纏尪瘵所以志學之歲馳百金而徇經方耄及之年竟三餘而勤藥餌酌華公之録帙異術同窺采葛生之玉函奇方畢綜每以為生者兩儀之大德人者五行之秀氣氣化則人育伊人稟氣而存德合則生成是生曰德而立既知生不再於我人處物為靈可幸蘊靈心闕頤我性源者由檢押神祕幽求今古撰方一部號曰千金可以濟物攝生可以窮微儘性猶恐岱山臨目必昧秋毫之端雷霆在耳或遺玉石之響所以更撰方翼三十卷共成一家之學譬輗軏之相濟運轉無涯等羽翼之交飛摶搖不測矧夫易道深矣孔宣系十翼之辭玄文奧矣陸績增玄翼之説或沿斯義述此方名矣貽厥子孫永為家訓雖未能譬言中庶比潤上池亦足以慕遠測深稽門叩鍵者哉倘經目於君子庶知余之所志焉校正千金翼方後序夫疾病之至急者有三一曰傷寒二曰中風三曰瘡癰是二種者療之不早或治不對病皆死不旋踵孫氏撰千金方其中風瘡癰可謂精至而傷寒一門皆以湯散膏丸類聚成篇疑未得其詳矣又著千金翼三十卷辨論方法見於千金者十五六惟傷寒謂大醫湯藥雖行百無一效乃專取仲景之論以太陽方證比類相附三陰三陽宜忌霍亂髮汗吐下後陰易勞復病為十六篇分上下兩卷亦一時之新意此於千金為輔翼之深者也從而著之論曰傷寒熱病自古有之名賢睿哲多所防禦至於仲景特有神功尋思旨趣莫測其致有以見孫氏尊而神之之心也是二書者表裡相明至纖至悉無不賅備世又傳千金髓者觀其文意殊非孫氏所作乃好事者為之耳王道集外臺祕要方各載所出亦未之見似出於唐之末伐博雅者勿謂其一家書也至於合藥生熟之宜炮炙之制分兩升斗之劑並載千金凡例中此不著云爾
