body:
  text: 卷第十五補益敘虛損論第一論曰凡人不終眉壽或致夭歿者皆由不自愛惜竭情盡意邀名射利聚毒攻神內傷骨髓外敗筋肉血氣將亡經絡便壅皮里空疏惟招蠹疾正氣日衰邪氣日盛不異舉滄波以注爝火頽華嶽而斷涓流語其易也又甚於此然疾之所起生自五勞五勞既用二臟先損心腎受邪腑臟俱病故彭祖論別床異被之戒李耳陳黃精鉤吻之談斯言至矣洪濟實多今具録來由並貫病狀庶智者之察微防未萌之疾也五勞者一曰志勞二曰思勞三曰心勞四曰憂勞五曰疲勞即生六極一曰氣極氣極令人內虛五臟不足外受邪氣多寒濕痹煩滿吐逆驚恐頭痛二曰血極血極令人無色澤恍惚喜忘善驚少氣舌強喉干寒熱不嗜食苦睡眩冒喜瞋三曰筋極筋極令人不能久立喜倦拘攣腹脹四肢筋骨疼痛四曰骨極骨極令人酸削齒不堅勞不能動作厥逆黃疸消渴癰腫疽發膝重疼痛浮腫如水狀五曰精極精極令人無發髮膚枯落悲傷喜忘意氣不行六曰肉極令人發疰如得擊不復得言甚者致死復生七傷者一曰陰寒二曰陰痿三曰裡急四曰精連連而不絶五曰精少囊下濕六曰精清七曰小便苦數臨事不卒名曰七傷七傷為病令人邪氣多正氣少忽忽喜忘而悲傷不樂奪色黧黑飲食不生肌膚色無潤澤發白枯稿牙齒不堅目黃淚出遠視䀮䀮見風淚下咽焦消渴鼻衄唾血喉中介介不利胸中噎塞食飲不下身寒汗出肌肉酸痟四肢沉重不欲動作膝脛苦寒不能遠行上重下輕久立腰背苦痛難以俯仰繞臍急痛飢則心下虛懸唇乾口燥腹裡雷鳴胸背相引痛或時嘔逆不食或時變吐小便赤熱乍數時難或時傷多或如針刺大便堅澀時泄下血身體瘙癢陰下常濕黃汗自出陰痿消小臨事不起精清而少連連獨泄陰端寒冷莖中疼痛小便餘瀝卵腫而大縮入腹中四肢浮腫虛熱煩疼乍熱乍寒臥不安席心如杵舂驚悸失脈呼吸乏短時時惡夢夢與死人共食入冢此由年少早娶用心過差接會汗出臟皆浮滿當風臥濕久醉不醒及墜車落馬僵仆所致也故變生七氣積聚堅牢如杯留在腹內心痛煩悶不能飲食時來時去發作無常寒氣為病則吐逆心滿熱氣為病則恍惚悶亂長如眩冒又復失精喜氣為病則不能疾行不能久立怒氣為病則上氣不可當熱痛上衝心短氣欲死不能喘息憂氣為病則不能苦作臥不安席恚氣為病則聚在心下不能飲食愁氣為病則平居而忘置物還取不記處所四肢浮腫不能舉止五勞六極力乏氣蓄變成寒熱氣疰發作有時受邪為病凡有十二種風風入頭則耳聾風入目則遠視䀮䀮風入肌膚則身體癮疹筋急風入脈則動上下無常風入心則心痛煩滿悸動喜腹䐜脹風入肺則咳逆短氣風入肝則眼視不明目赤淚出發作有時風入脾則脾不磨腸鳴脅滿風入腎則耳鳴而聾腳疼痛腰尻不隨甚者不能飲食入膽則眉間疼痛大小便不利令人疼痹五勞六極七傷七氣積聚變為病者甚則令人得大風緩急濕痹不仁偏枯筋縮四肢拘攣關節隔塞經脈不通便生百病羸瘦短氣令人無子病欲及人便即夭逝勞傷血氣心氣不足所致也若或觸勞風氣則令人角弓反張舉身皆動或眉須頓落惡氣腫起魂氣不足夢與鬼交通或悲哀不止恍惚恐懼不能飲食或進或退痛無常處至此為療不亦難乎十二種風元不足大補養第二論一首方八首論曰病患已成即須勤於藥餌所以立補養之方此方皆是五石三石大寒食丸散等藥自非虛勞成就偏枯著床惟向死近無所控告者乃可用之斯誠可以起死人耳平人無病不可造次著手深宜慎忌張仲景紫石寒食散治傷寒已愈不復方紫石英白石英赤石脂鍾乳煉栝蔞根防風桔梗文蛤鬼臼太一餘糧各二兩半人參乾薑附子炮去皮桂心各一兩上一十四味搗篩為散酒服三方寸匕損益草散常用之佳主男子女人老少虛損及風寒毒冷下痢癖飲咳嗽消穀助老人胃氣可以延年又主霍亂酒服二方寸匕愈又主衆病休息下痢垂命欲死服之便瘥治人最為神驗方人參附子炮去皮各三分乾薑桂心各五分防風一兩半牡蠣熬黃芩細辛各三分桔梗椒去目閉口者汗茯苓秦艽白朮各一兩上一十三味各搗篩為散更稱如分乃合之冶千杵旦以溫酒服方寸匕老人頻服三劑良兼主虛勞草寒食散治心腹脅下支滿邪氣衝上又心胸喘悸不得息腹中漉漉雷鳴吞酸噫生食臭食不消化時泄時閉心腹煩悶不欲聞人聲好獨臥常欲得熱恍惚喜忘心中怵惕如恐怖狀短氣嘔逆腹中防響五臟不調如此邪在於內而作衆病皆生於勞苦若極意於為樂從風寒起治之皆同服此藥旦未食時以淳美酒服二方寸匕不耐者減之去巾帽薄衣力行方鍾乳煉附子炮去皮栝蔞根茯苓牡蠣各一分熬桔梗乾薑人參防風各一兩細辛桂心各五分白朮三兩半上一十二味各搗篩治千杵以酒服之二匕建日服之至破日止周而復始又方説狀所主同前鍾乳煉粉人參茯苓附子炮各三分栝蔞根牡蠣熬細辛各半兩乾薑桂心各五分白朮防風桔梗各一兩上一十二味搗篩為散服之一如前方有冷加椒有熱加黃芩各三分大草烏頭丸主寒冷虛損五十年心腹積聚百病邪氣往來厥逆搶心痹頑羸瘦骨立不能食破積聚方烏頭十五分炮去皮人參五分生薑二兩前胡蜀椒去目閉口者汗黃芩白朮半夏洗黃連吳茱萸龍骨白頭翁乾薑細辛桔梗紫菀芎藭厚朴炙女萎礬石燒桂心甘草炙各一兩上二十二味搗篩為末煉蜜和丸如梧子大酒服十丸日三夜一以知為度草烏頭丸破積聚治積結冷聚陽道弱大便有血婦人産後出血不止方烏頭十五分炮去皮大黃乾薑厚朴炙吳茱萸芍藥前胡芎藭當歸細辛桂心各五分蜀椒三分去目閉口者汗白薇半兩黃芩白朮人參紫菀甘草炙各一兩上一十八味搗篩為末煉蜜和丸如梧子大酒服十丸日三服漸漸加之大理中露宿丸主風勞四十年癖絶冷並主咳逆上氣方人參桂心吳茱萸烏頭炮去皮礬石燒等分上五味搗篩為末煉蜜和丸如梧子大酒服三丸日再以知為度胸奴露宿丸主毒冷方礬石燒桔梗皂莢炙去皮子乾薑附子炮去皮吳茱萸等分上六味搗篩為末煉蜜和丸如梧子大飲服三丸日再稍加以知為度解散發動第三論一首方三十五首與第二十二卷通論曰既得藥力諸疴並遣石忽發動須知解方故次立解散方焉一一依其診候而用之萬不失一夫脈或洪或實或斷絶不足欲似死脈或細數或弦快其所犯非一故也脈無常投醫不能識也熱多則弦快有癖則洪實急痛則斷絶凡寒食藥熱率常如是自無所苦非死候也動從節度則不死矣不從節度則死矣欲服散者宜診脈審正其候爾乃畢愈脈沉數者難發難發當數下之脈浮大者易發也人有服散兩三劑不發者此人脈沉難發發不令人覺藥勢已行不出形於外但以藥治於內欲候知其力人進食多一候也顏色和悅二候也頭面身體瘙癢三候也澀澀惡風四候也厭厭欲寐五候也諸有此證候者皆藥內發五臟但如方法服藥宜數下之內虛自當發也人參湯主散發諸氣逆心腹絞痛不得氣息命在轉燭方人參枳實炙甘草炙各九分栝蔞根乾薑白朮各一兩半上六味㕮咀以水九升煮取三升分三服若短氣者稍稍數服無苦也能如方者佳冬月溫食胸腹熱者便冷食夏月冷食以水服藥冷食過多腹冷者作湯即自解便止鴨通湯主散發熱攻胸背嘔逆煩悶臥輒大睡乘熱覺四肢不快寒熱往來大小便難方白鴨通新者大黃二兩石膏碎知母各一兩豉一升麻黃三兩去節蔥白二七莖梔子仁二七枚黃芩一兩半甘草三分炙上一十味㕮咀以湯一斗二升淋鴨通乃以汁煮藥取三升半去滓然後納豉更煮三沸去豉未食前服一升治氣湯主散家患氣不能食若氣逆方人參茯苓桂心厚朴炙半夏洗甘草炙各一兩麥門冬去心生薑各三兩切大棗二十枚擘上九味㕮咀以水八升煮取二升六合分服七合主散發頭欲裂眼疼欲出惡寒骨肉痛狀如傷寒鼻中清涕出方以香豉五升熬令煙出以酒一斗投之濾取汁任性飲多少欲令小醉便解更飲之取解為度亦主時行寒食散發或口噤不可開腸滿脹急欲決此久坐溫衣生食所為皇甫云口不開去齒下此酒五合熱飲之須臾開能者多飲至醉益佳不能者任性腹脹滿不通導之令下善服散家痰飲心胸客熱悶者吐之方甘草五兩生用上一味㕮咀以酒五升煮取二升半空腹分再服之服別相去如行五六里快吐止主散發黃胸中熱氣悶方胡荽一把切上一味以水七升煮取二升半分再服便愈如不瘥更作亦主通身發黃者濃煮大黃葉令溫自洗漬尤良並主熱毒及胸中毒氣相攻若不盡復煩悶或痛飲如故亦主新熱下痢解散主諸石熱毒方白鴨通五升新者上一味湯一斗漬之澄清候冷飲之任性多少以瘥為度三黃湯主解散發腹痛脹滿卒急方大黃黃連黃芩各三兩上三味㕮咀以水七升煮取三升分為三服一方作丸散發時行兼有客熱下血痢不止而煩者黃連湯方黃連黃柏各四兩梔子十五枚擘阿膠一兩炙乾薑芍藥石榴皮各二兩一方用枳實上七味㕮咀以水一斗煮取三升分三服一方以水六升煮之乳石發頭痛寒熱胸中塞日晡手足煩疼方生麥門冬四兩去心蔥白半斤切豉三升上三味熟湯八升煮取三升分三服散發虛羸不能食飲大便不通調臟腑方麥門冬去心黃芩人參各二兩竹茹一升大棗十四枚擘茯神半夏洗生薑切甘草各三兩炙桂心半兩上一十味㕮咀以水一斗煮取三升分三服散發四肢腫方甘遂一兩木防己茯苓人參白朮各三兩麻黃二兩去節甘草一兩半炙上七味㕮咀以水七升煮取二升八合分三服散發口瘡方龍膽三兩子柏四兩黃連二兩升麻一兩上四味㕮咀以水四升先煮龍膽黃連取二升別取子柏冷水淹浸投湯中令相得絞取汁熱含冷吐瘥止散發如淋熱方葵子三升茯苓大黃通草各三兩蔥白七莖當歸石葦去毛芒硝各二兩桂心一兩上九味㕮咀以水一斗煮葵子取六升去滓納蘊含更煮取三升去滓納芒硝更煮一沸令硝盡分為四服日三夜一散發大便祕澀不通方大黃四兩桃仁三十枚去皮類雙仁碎上二味切以水六升煮取二升分再服又大便不通方生地黃汁五合大黃甘草炙各半兩上三味㕮咀以水三升煮取一升下地黃汁又煮三沸分二服單服硫黃髮為瘡方以大醋和豉研熟如膏以塗瘡上燥輒易之甚食礬石發亦作瘡狀如癤子紫石多發於腹背或著四肢直以酥摩便瘥仍用薺苨湯方薺苨麥門冬各三兩去心乾薑三兩半麻黃去節人參黃芩桔梗甘草炙各二兩上八味㕮咀以水九升煮取三升分三服從旦至晡乃盡日日合服以瘥為度非但礬石凡諸石發皆用此方散發痢血方黃連乾薑各三兩黃芩半兩鹿茸二兩瓜子一升芍藥芎藭生竹皮桂心甘草炙各一兩上一十味以水一斗煮竹皮取八升去滓納藥煮取二升分三服一日盡靳邵大黃丸主寒食散成痰飲澼水氣心痛百節俱腫方一名細丸大黃葶藶熬豉各一兩巴豆去心皮熬杏仁去皮尖雙仁熬各三十枚上五味各搗大黃豉為末別搗巴豆杏仁如脂煉蜜相和令相得又更搗一千杵空腹以飲服如麻子一丸日再不知增至二丸強人服丸如小豆大硝石大丸主男子女人驚厥口乾心下堅羸瘦不能食喜臥墜墮血瘀久咳上氣胸痛足脛不仁而冷少腹滿而痛身重目眩百節疼痛上虛下實又主女人乳余疾帶下五臟散癖伏熱大如碗堅腫在心下胸中津液內結浮腫膝寒蠱毒淫躍苦渴大虛等方硝石十二兩熬之令乾蜀椒一斤二兩去目閉口汗水蛭一百枚熬虻蟲二兩半