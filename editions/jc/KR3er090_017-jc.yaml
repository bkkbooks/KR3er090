body:
  text: 卷第十七中風下中風第一方三十五首灸法二首論四首小續命湯方麻黃去節防己人參桂心黃芩芍藥芎藭杏仁去尖皮兩仁甘草炙各一兩附子炮一枚去皮防風一兩半生薑五兩切上一十二味㕮咀以水一斗先煮麻黃去上沫納諸藥煮取三升分三服有風預備一十劑大續命湯方麻黃八兩去節大杏仁四十枚去皮尖兩仁桂心芎藭各二兩石膏四兩碎黃芩乾薑當歸甘草炙各一兩荊瀝一升上一十味㕮咀以水一斗先煮麻黃去上沫下藥煮取四升下荊瀝煮取三升分四服能言未瘥後服小續命湯又小續命湯方麻黃二兩去節生薑五兩切防風一兩半芍藥白朮人參芎藭一兩附子炮去皮黃芩防己各一兩桂心甘草炙各二兩上一十二味㕮咀以水一斗先煮麻黃去上沫納諸藥煮取三升分三服西州續命湯方麻黃六兩去節石膏四兩碎桂心二兩杏仁三十枚去皮尖雙仁芎藭乾薑黃芩當歸甘草炙各一兩上九味㕮咀以水一斗二升先煮麻黃去上沫下諸藥煮取四升分四服續命湯主久風臥在床起死人神方麻黃去節人參桂心附子炮去皮茯苓各一兩防己防風黃芩各一兩半生薑六兩切半夏五兩洗枳實二兩炙上氣悶者加之甘草一兩炙上一十二味㕮咀以水一斗先煮麻黃取九升去上沫停冷去滓納藥煮取三升分三服若下須半夏去之加芍藥三兩大續命散主八風十二痹偏枯不仁手足拘急疼痛不得伸屈頭眩不能自舉起止顛倒或臥忽驚如墮樹狀盜汗臨事不興婦人帶下無子風入五臟甚者恐怖鬼來收錄或與鬼神交通悲啼哭泣忽忽欲走方烏頭炮去皮防風麻黃去節人參杏仁去皮尖兩仁熬芍藥石膏研乾薑芎藭茯苓黃芩桂心蜀椒去目閉口者汗甘草炙各一兩當歸二兩上一十五味搗篩為散酒服方寸匕日二稍增以知為度排風湯方白蘚皮一雲茯苓白朮芍藥芎藭當歸獨活杏仁去皮尖及雙仁熬防風桂心甘草炙各二兩茯神麻黃去節各三兩生薑四兩切上一十三味㕮咀以水一斗先煮麻黃去上沫納諸藥煮取三升分三服取汗可服兩三劑大排風湯主半身不遂口不能言及諸偏枯方白蘚皮附子炮去皮麻黃去節杏仁去皮尖熬白朮防風葛根獨活防己當歸人參茯神甘草炙各三兩石膏六兩碎桂心二兩白芷一兩上一十六味㕮咀以水一斗七升先煮麻黃取一升半去沫澄清納藥煮取四升分四服日三夜一服又排風湯主諸毒風邪氣所中口噤悶絕不識人身體疼煩面目暴腫手足腫方犀角屑羚羊角屑貝子升麻上四味各一兩別搗成末合和以水二升半納方寸匕煮取一升去滓服五合殺藥者以意加之若腫和雞子敷上日三老小以意增減神良大岩蜜湯主賊風腹中絞痛並飛屍遁注發作無時發則搶心腹脹滿脅下如刀錐刺並主少陰傷寒方梔子十五枚擘乾地黃乾薑細辛當歸青羊脂吳茱萸茯苓芍藥桂心甘草炙各一兩上一十一味㕮咀以水八升煮取三升去滓納羊脂令消分溫三服小岩蜜湯主惡風角弓反張飛屍入腹絞痛悶絕往來有時筋急少陰傷寒口噤不利方雄黃研青羊脂各一兩大黃二兩吳茱萸三兩當歸乾薑芍藥細辛桂心乾地黃甘草炙各一兩上一十一味㕮咀以水二斗煮取六升分六服重者加藥用水三斗煮取九升分十服烏頭湯主八風五屍惡氣遊走心胸流出四肢來往不住短氣欲死方烏頭炮去皮芍藥當歸乾薑桂心細辛乾地黃吳茱萸甘草炙各一兩上九味㕮咀以水七升煮取二升半分三服大八風湯主毒風頑痹嚲曳或手腳不遂身體偏枯或毒弱不任或風入五臟恍恍惚惚多語喜忘有時恐怖或肢節疼痛頭眩煩悶或腰脊強直不得俯仰腹滿不食咳嗽或始遇病時卒倒悶絕即不能語便失喑半身不遂不仁沉重皆由體虛恃少不避風冷所致方烏頭炮去皮黃芩芍藥遠志去心獨活防風芎藭麻黃去節秦艽石斛人參茯苓石膏碎黃耆紫菀各二兩當歸二兩半升麻一兩半大豆兩合五味子五分杏仁四十枚去皮尖雙仁乾薑桂心甘草炙各二兩半上二十三味㕮咀以水一斗三升酒二升合煮取四升強人分四服少力人分五六服深師同芎藭湯主卒中風四肢不仁喜笑不息方芎藭一兩半杏仁二十枚去皮及尖雙仁麻黃去節黃芩桂心當歸石膏碎秦艽乾薑甘草炙各一兩上一十味㕮咀以水九升煮服三升分三服倉公當歸湯主賊風口噤角弓反張身體強直方當歸細辛防風各一兩半獨活三分麻黃二兩半去節附子一枚炮去皮上六味㕮咀以酒八升水四升合煮取四升分四服口不開者挍口下湯一服當開二服小汗三服大汗芎藭湯主風癲引脅痛發作則吐耳中如蟬鳴方芎藭藁本䕡茹各五兩上三味切以淳酒五升納藥煮取三升頓服羸者二服取大汗治風癲狂及百病方大麻子四升上好者上一味以水六升猛火煮令牙生去滓煎取七升旦空肚頓服或不發或多言語勿怪之但使人摩手足須臾即定凡進三劑無不愈令人身輕眾邪皆去防己湯主風歷節四肢痛如錘鍛不可忍者防己茯苓生薑切桂心各四兩烏頭七枚去皮人參三兩白朮六兩甘草三兩炙上八味㕮咀以水一斗煮取二升半服八合日三當熠熠微熱痹勿怪若不覺復更合之以覺乃止凡用烏頭皆去皮熬令黑乃堪用無毒三黃湯主中風手足拘攣百節疼痛煩熱心亂惡寒經日不欲飲食方麻黃五分去節獨活一兩黃芩三分黃耆半兩細辛半兩上五味㕮咀以水五升煮取二升去滓分二服一服小汗兩服大汗心中熱加大黃半兩腹滿加枳實一枚氣逆加人參三分心悸加牡蠣三分渴加栝蔞三分先有寒加八角附子一枚此仲景方神秘不傳黃耆湯主八風十二痹手腳疼痛臟氣不和不能食飲方黃耆當歸桂心甘草炙各三兩白朮烏頭炮去皮芎藭防風乾地黃各二兩生薑四兩切前胡一兩半上一十一味㕮咀以水一斗一升煮取三升半分四服此湯和而補有氣者加半夏四兩白蘞湯主中風痿僻拘攣不可屈伸方白蘞乾薑薏苡仁酸棗牛膝桂心芍藥車前子甘草炙各一升附子三枚炮去皮上一十味㕮咀以酒二斗漬一復時煮三沸服一升日三服扶杖而起不能酒者服五合防己湯主風濕四肢疼痹攣急浮腫方木防己三兩茯苓一兩桑白皮切二升桂心三兩芎藭三兩甘草一兩半炙大棗二十枚擘芍藥二兩麻黃二兩去節上九味㕮咀以水一斗二升煮麻黃減一升納藥煮取三升分三服漸汗出令遍身以粉粉之慎風冷一方茯苓四兩麻黃三兩治三十年風方松葉一斤切以酒一斗煮取二升頓服取汗出佳治一切風虛方常患頭痛欲破者杏仁九升去皮尖兩仁者曝乾上一味搗作末以水九升研濾如作粥法緩火煎令如麻浮上匙取和羹粥酒納一匙服之每食即服不限多少服七日後大汗出二十日後汗止慎風冷豬魚雞蒜大醋一劑後諸風減瘥春夏恐醋少作服之秋九月後煎之此法神妙可深秘之治中風發熱方大戟苦參等分上二味搗篩藥半升以醋漿水一斗煮三沸洗之從上至下立瘥寒乃止小兒三指撮醋漿水四升煮如上法羌活飲治風方羌活三兩茯神薏苡仁用羌活去薏苡仁防風各一兩上三味㕮咀以水三升煮取一升納竹瀝三合煮一沸分再服豬苓煮散主下痢多而小便澀方豬苓茯苓澤瀉黃連白朮各四兩防己羌活黃芩人參防風牛膝升麻屑角屑杏仁去皮尖雙仁熬秦艽穀皮紫菀石斛生薑各三兩切橘皮二兩附子五兩炮去皮桑根白皮六兩上二十三味搗篩為散以水一升半煮五方寸匕取一升頓服日再不能者一服十月後二月末以來可服之論曰人不能用心謹慎遂得風病半身不遂言語不正庶事皆廢此為猥退病得者不出十年宜用此方瘥後仍須將慎不得用未病之前當須絕於思慮省於言語為於無事乃可永愈若還同俗類名利是務財色為心者幸勿苦事醫藥徒勞為療耳宜於此善以意推之凡人忽中生風皆須依此次第用湯即得愈也學者仔細尋思明然可見凡初得風四肢不收心神昏目蒍眼不識人言不出口凡中風多由熱起服藥當順慎酒面羊肉生菜冷食豬魚雞牛馬肉蒜乃可瘥得患即服此竹瀝湯方竹瀝二升生薑汁三合生葛汁一升上三味相和溫暖分三服平旦日晡夜各一服服訖若覺四體有異似好以次進後方麻黃去節防風各一兩半杏仁四十枚去皮尖及雙仁羚羊角二兩屑生薑四兩切生葛汁五合一云地黃汁竹瀝一升石膏六兩綿裹芎藭防己附子炮去皮芍藥黃芩人參桂心甘草炙各一兩上一十六味㕮咀以水七升煮取一半乃下瀝汁煮取二升七合分溫三服五日更服一劑頻進三劑慎如上法漸覺稍損次進後方麻黃去節防風升麻桂心芎藭獨活羚羊角屑各二兩竹瀝二升防己一兩上九味㕮咀以水四升並瀝煮取三升分三服兩日進一劑頻進三劑若手足冷者加生薑五兩白朮二兩若未除次進後方麻黃去節芍藥防風各一兩半羚羊屑屑二兩生薑二兩切附子炮三分去皮石膏二兩碎防己黃芩芎藭白朮人參獨活升麻桂心甘草炙各一兩竹瀝一升上一十七味㕮咀以水八升煮減半下瀝煮取二升半分三服相去如人行十里再服有氣加橘皮牛膝五加皮各一兩若除退訖可常將服後煮散方防風獨活秦艽黃耆芍藥人參茯神白朮芎藭山茱萸薯蕷桂心天門冬去心麥門冬去心厚朴炙升麻丹參羚羊角屑五加皮防己牛膝石斛地骨皮甘草炙各四兩麻黃去節附子炮去皮遠志去心橘皮各三兩生薑二兩切甘菊花薏苡仁各二升石膏研乾地黃各六兩上三十三味搗篩為散每煮以水三升納散三兩煮取一升綿濾去滓頓服之日別一服若覺心下煩熱以竹瀝代水煮之千金有黃芩檳榔藁本杜仲犀角無山茱萸薯蕷甘菊麥門冬附子凡患風人多熱宜服荊瀝方荊瀝竹瀝生薑汁各五合上三味相和溫為一服每日旦服煮散午後當服此荊瀝常作此將息論曰夫得風之時則依此次第療之不可違越若不依此當失機要性命必危防風湯主偏風甄權處治安平公方防風芎藭白朮狗脊萆薢牛膝白芷各一兩薏苡仁葛根杏仁去皮尖兩仁人參羌活各二兩麻黃四兩去節生薑五兩切桂心石膏各三兩碎上一十六味㕮咀以水一斗二升煮取三升分三服服一劑覺好更服一劑一劑一度針之服九劑湯九度針之針風池一穴肩髃一穴曲池一穴文溝一穴五樞一穴陽陵泉一穴巨虛下廉一穴合七穴即瘥仁壽宮備身患腳奉敕針環跳陽陵泉巨虛下廉陽輔即起行大理趙卿患風腰腳不遂不得跪起針上髎二穴環跳二穴陽陵泉二穴巨虛下廉二穴即得跪起治猥退風方蒼耳子五升苗亦得用羊桃切蒴藋切赤小豆各二升半鹽二升上五味以水二石五斗煮取五斗適寒溫納所患腳漬深至絕骨勿過之一度炊五斗米頃出之慎風冷汗從頭出論曰聖人以風是百病之長深為可憂故避風如避矢是以防禦風邪以湯藥針灸蒸熨隨用一法皆能愈疾至於火艾特有奇能雖曰針湯散皆所不及灸為其最要昔者華佗為魏武帝針頭風華佗但針即瘥華佗死後數年魏武帝頭風再發佗當時針訖即灸頭風豈可再發只由不灸其本不除所以學者不得專恃於針及湯藥等望病畢瘥既不苦灸安能拔本塞源是以雖豐藥餌諸療之要在火艾為良初得之時當急下火火下即定比煮湯熟已覺眼明豈非大要其灸法先灸百會次灸風池次灸大椎次灸肩井次灸曲池次灸間使各三壯次灸三里五壯其炷如蒼耳子大必須大實作之其艾又須大熟從此以後日別灸之至隨年壯止凡人稍覺心神不快即須灸此諸穴各三壯不得輕之苟度朝夕以致殞斃戒之哉戒之哉又論曰學者凡將欲療病先須灸前諸穴莫問風與不風皆先灸之此之一法醫之大術宜深體之要中之要無過此術是以常預收三月三日艾擬救急危其五月五日亦好仍不及三月三日者又有卒死之人及中風不得語者皆急灸之夫卒死者是風入五臟為生平風發強忍怕痛不灸忽然卒死謂是何病所以皆必灸之是大要也腳氣第二論一首方二十一首論曰治腳氣順四時若春秋二時宜兼補瀉夏則疾成專須汗利十月以後少用補藥雖小變不越此法治腳氣初發從足起至膝脛腫骨疼者方取胡麻葉切搗蒸薄裹日二易即消若冬月取蒴藋根切搗和糟三分根一分合蒸令熱裹如前法遍身腫小便澀者用麻豆湯主之方大麻二升熬研烏豆一斗以水四半煮取汁一斗半去豆桑白皮切五升上三味以豆汁納藥煮取六升一服一升日二服三日令盡又方烏牛尿一服一升日二腫消止羸瘦者二分尿一分牛乳合煮乳浮結乃服之又方生豬肝一具細切以淡蒜齏食盡不可盡者分再食之治腰腳疼方胡麻子一斗新者上一味熬令香搗篩若不數篩當脂出不下日服一小升日三服盡藥汁一斗即永瘥酒飲羹汁蜜湯皆可服之大下之後而四體虛寒腳中羸弱腰攣痛食飲減少皮肉虛疏石斛酒方生石斛一斤秦艽遠志各五兩去心橘皮白朮各三兩丹參茯神五加皮各六兩桂心四兩牛膝八兩上一十味㕮咀以酒三斗漬七日一服六合稍加至七八合以知為度調利之後未平復間為外風傷腳中痛酸轉為腳氣補虛防風湯方防風石斛杜仲炙前胡各四分薏苡仁半斤秦艽丹參五加皮附子炮去皮橘皮白朮白前各三分防己二分麻仁一升熬取脂上一十四味㕮咀以水一斗二升煮取三升分三服服湯已腳氣仍不止防風丸方防風二兩秦艽二兩石斛二兩丹參一兩薏苡仁三合前胡橘皮杜仲炙附子炮去皮白朮各一兩桂心一兩半麻仁一升熬取脂上一十二味搗篩為末煉蜜和丸如梧子酒服二十丸日二服治腳氣常作谷白皮粥防之法即不發方谷白皮五升切勿取斑者有毒上一味以水一斗煮取七升去滓煮米粥常食之溫腎湯主腰脊膝腳浮腫不遂方茯苓乾薑澤瀉各二兩桂心三兩上四味㕮咀以水六升煮取二升分三服竹瀝湯主兩腳痹弱或轉筋或皮肉脹起如腫而按之不陷心中惡不欲食或患冷氣方甘竹瀝五升葛根防風各二兩麻黃六兩去節升麻五分桂心一兩附子一枚炮去皮秦艽細辛木防己黃芩乾薑白朮甘草炙各一兩上一十四味㕮咀以水七升納甘竹瀝五升合煮取三升分四服取汗千金有茯苓杏仁無白朮大竹瀝湯主卒中惡風口噤不能言四肢嚲緩偏攣急痛風經五臟恍惚喜怒無常手足不遂皆悉主之方甘竹瀝一斗四升人參細辛石膏各一兩碎生薑五兩切烏頭三枚炮去皮防風獨活芍藥黃芩茵芋麻黃去節葛根木防己桂心茯苓甘草炙各二兩芎藭一兩上一十八味㕮咀以竹瀝煮取四升分三服一方以水五升千金有白朮又竹瀝湯主風氣入腹短氣心下煩熱不痛手足煩疼四肢不舉口噤不能言方竹瀝一斗當歸秦艽防風葛根各二兩人參芍藥木防己附子炮去皮細辛茯苓一作茯神通草桂心白朮甘草炙各一兩上一十五味㕮咀以竹瀝漬半日煮取四升分三服不能者四服千金有芎藭生薑黃芩升麻蜀椒麻黃無芍藥防己通草大鱉甲湯主腳弱風毒攣痹氣止皆主之方鱉甲炙防風麻黃去節半夏洗白朮茯苓芍藥杏仁去皮尖雙仁麥門冬去心生薑切人參石膏碎羚羊角屑甘草炙各一兩犀角一分屑雄黃半兩研青木香二兩吳茱萸半升大黃一分半麝香三分薤白十四枚切烏梅貝齒各七枚大棗二十枚擘赤小豆二十四枚上二十五味㕮咀以水二斗煮取四升分四服日二夜一服大投杯湯主腳弱舉體腫滿氣急日夜不得眠方麻黃去節杏仁去皮尖及雙仁桂心黃芩橘皮石膏二兩碎生薑六兩切半夏洗厚朴炙枳實炙各三兩茯苓四兩秦艽一兩半大戟細辛各一兩大棗二十枚擘甘草二兩炙上一十六味㕮咀以水一斗二升煮取四升分五服日三夜二獨活湯主腳氣風疼痹不仁腳中沉重行止不遂氣上方獨活桂心半夏洗各四兩麻黃去節芎藭人參茯苓各二兩八角附子一枚炮去皮大棗十三枚擘防風芍藥當歸黃耆乾薑甘草炙各三兩上一十五味㕮咀以水一斗五升酒二升煮取三升半分為五服硫黃煎主腳弱連屈虛冷方硫黃五兩牛乳五升上二味以水五升合煮及五升硫黃細篩納之煎取三升一服一合不知至三合硫黃散主腳弱大補面熱風虛方硫黃研鍾乳粉防風各五兩乾薑一兩白朮人參蜀椒汗去目及閉者細辛附子炮去皮天雄炮去皮茯苓石斛桂心山茱萸各三分上一十四味搗篩為散旦以熱酒服方寸匕日三加至二匕青丸主腳風皮肉身體諸風方烏頭一兩炮去皮附子三兩炮去皮麻黃四兩去節上三味搗篩為末煉蜜和丸如梧子大酒服五丸日三服硫黃丸主膈痰滯澼逐腳中風水方硫黃五兩上一味細粉以牛乳三升煮令可丸如梧子大曝令乾酒服三十丸日三不知漸加至百丸石硫黃丸主腳風弱胸腹中冷結方石硫黃半兩桂心四兩礜石燒附子炮去皮天雄炮去皮烏頭各二兩炮去皮上六味搗篩為末煉蜜和丸如梧子大空腹酒服五丸日三服癮疹第三方一十六首灸法一首石楠湯主癮疹方石楠乾薑黃芩細辛人參各一兩桂心當歸芎藭各一兩半甘草二兩乾地黃三分食茱萸五分麻黃一兩半去節上一十二味㕮咀以酒三升水六升煮取三升分三服取大汗慎風冷佳又方酪和鹽熱煮摩之手下消又方白芷根葉煎湯洗之治風瘙癮疹煩心悶亂方天雄炮去皮牛膝知母各一兩栝蔞五分白朮二兩人參半兩乾薑細辛桂心各三分防風一兩半上一十味搗篩為散酒服半錢匕日再夜一以知為度稍增至一錢匕治大人小兒風疹方白礬二兩末之上一味以酒三升漬令消拭上愈又方吳茱萸一升上一味以酒五升煮取一升半拭上治風痹癮疹方大豆三升酒六升上二味煮四五沸服一杯日三治風痹癮疹洗湯方蛇床子二升防風生蒺藜各二斤上三味切以水一斗煮取五升以綿拭上日四五度又洗湯方黃連黃芩白朮各二兩戎鹽礬石各半兩細辛二兩芎藭茵芋各一兩上八味切以水一斗煮取三升洗之日三度又洗湯方馬蘭一作馬蘭子蒴藋茺蔚子礬石蒺藜茵芋羊桃根萹蓄各二兩上八味切以醋醬二斗煮取一斗二升納礬石洗之日三度治曝風氣在上表皮作癮疹瘡方煮槐枝葉以洗之灸瘡火瘡亦愈青羊脂膏主風熱赤疹癢搔之逐手作瘡方青羊脂四兩芍藥黃芩黃耆白芷寒水石各一兩竹葉一升切石膏一斤碎白及升麻防風甘草炙各三分上一十二味切先以水一斗煮石膏竹葉取五升合漬諸藥以不中水豬脂二升合煎白芷黃膏成以敷之灸法以一條艾蒿長者以兩手極意尋之著壁立兩手並蒿竿拓著壁伸十指當中指頭以大艾炷灸蒿竿上令蒿竿斷即上灸十指瘥於後重發更依法灸永瘥楓香湯主癮疹方楓香一斤芎藭大黃黃芩當歸人參射干甘草炙各三兩升麻四兩蛇床仁二兩上一十味切以水二斗煮取七升適冷暖分以洗病上日三夜二地榆湯主癮疹發瘡方地榆三兩苦參八兩大黃黃芩各四兩黃連芎藭各二兩甘草六兩炙上七味切以水六斗煮取三斗洗浴之良又方大黃當歸升麻防風芍藥青木香黃芩甘草炙各二兩楓香五兩黃柏芒硝各三兩地黃汁一升上一十二味切以水一斗煮取三升半去滓納芒硝令烊帛拓病上一炊久日四五夜二三主癮疹痛癢良治癮疹痛癢搔之逐手腫方當歸芎藭大戟細辛芍藥附子去皮芫花躑躅椒各一兩莽草半兩上一十味切以苦酒浸藥一宿以豬膏二升半煎三上三下膏成去滓敷病上日三夜一癧瘍第四方一十四首灸法一首治白癜白駁浸淫癧瘍著頸及胸前方大醋於甌底磨硫黃令如泥又以八角附子截一頭使平就甌底重磨硫黃使熟夜臥先布拭病上令熱乃以藥敷之重者三度又方硫黃水銀礬石灶墨上四味等分搗下篩以蔥涕和研之臨臥以敷病上又方石硫黃三兩附子去皮鐵精各一兩上三味並研搗以三年醋和納瓷器中密封七日以醋泔淨洗上拭乾塗之干即塗一兩日慎風炙法五月五日午時灸膝外屈腳當紋頭隨年壯兩處灸一時下火不得轉動治頭項及面上白駁浸淫漸長有似於癬但無瘡方干鰻鱺魚炙脂塗之先洗拭駁上外把刮之令小磣痛拭燥然後以魚脂塗之一塗便愈難者不過三塗之佳又方取生木空中水洗之食頃止又方桂心末唾和敷駁上日三又方白芨一作白蘞當歸附子炮各一兩去皮天雄炮去皮黃芩各一兩乾薑四兩躑躅二升上七味搗篩為散酒服五分匕日三服凡人身有赤疵方常以銀揩令熱不久漸漸消滅瘢痕治疣贅疵痣方雄黃硫黃真珠礬石熬䕡茹巴豆去皮心藜蘆各一兩上七味搗篩為散以漆和令如泥塗貼病上須成瘡及去面上黑子點之即去治皮中紫赤疵痣靨穢方乾漆熬雌黃礬石各三兩雄黃五兩巴豆五十枚去皮炭皮一斤上六味為散以雞子白和塗故帛貼病上日二易之即除九江散主白癜及二百六十種大風方當歸七分石楠一兩半秦艽躑躅菊花乾薑防風麝香雄黃研丹砂研斑蝥各一兩蜀椒去目及閉口者汗連翹知母鬼箭石長生各二兩附子炮去皮王不留行人參鬼臼莽草木防己石斛烏頭炮天雄炮去皮獨活各三兩地膽虻蟲各十枚蜈蚣三枚水蛭一百枚上三十味諸蟲皆去足羽熬炙合搗為散酒服方寸匕日再服其白癜入頭令發白服之百日白髮還黑也芎藭湯主面上及身體風瘙癢方芎藭白朮山茱萸防風羌活枳實各三兩炙麻黃二兩半去節薯蕷四兩蒺藜子生薑各六兩切烏喙炮甘草炙各二兩上一十二味㕮咀以水九升煮取二升七合分三服又洗方蒴藋根蒺藜子景天葉各切二升蛇床子五兩玉屑半兩上五味切以水一斗半煮取一斗稍稍洗身面上日三夜一慎風大黃湯主風瘙腫癢在頭面方大黃芒硝各一兩莽草黃芩各二兩蒺藜子半升上五味切以水七升煮取三升半去滓納芒硝令烊以帛拓腫上數百遍日五夜三勿令近眼一方有黃連
