body:
  text: 卷第四本草下蟲魚部七十一味論一首石蜜味甘平微溫無毒主心腹邪氣諸驚癇痓安五臟諸不足益氣補中止痛解毒除衆病和百藥養脾氣除心煩食飲不下止腸澼肌中疼痛口瘡明耳目久服強志輕身不飢不老延年神仙一名石飴生武都山谷河源山谷及諸山石中色白如膏者良蜜蠟味甘微溫無毒主下痢膿血補中續絶傷金瘡益氣不飢耐老白蠟療久瀉澼後重見白膿補絶傷利小兒久服輕身不飢生武都山谷生於蜜房木石間蜂子味甘平微寒無毒主風頭除蠱毒補虛羸傷中心腹痛大人小兒腹中五蟲口吐出者面目黃久服令人光澤好顏色不老輕身益氣大黃蜂子主心腹脹滿痛乾嘔輕身益氣土蜂子主癰腫嗌痛一名蜚零生武都山谷牡蠣味鹹平微寒無毒主傷寒寒熱溫瘧灑灑驚恚怒氣除拘緩鼠瘻女子帶下赤白除留熱在關節榮衛虛熱去來不定煩滿止汗心痛氣結止渴除老血澀大小腸止大小便療瀉精喉痹咳嗽心脅下痞熱久服強骨節殺邪鬼延年一名蠣蛤一名牡蛤生東海池澤採無時桑螵蛸味鹹甘平無毒主傷中疝瘕陰痿益精生子女子血閉腰痛通五淋利小便水道又療男子虛損五臟氣微夢寐失精遺溺久服益氣養神一名蝕疣生桑枝上螳螂子也二月三月採蒸之當火炙不爾令人瀉海蛤味苦鹹平無毒主咳逆上氣喘息煩滿胸痛寒熱療陰痿一名魁蛤生東海文蛤味鹹平無毒主惡蝕瘡五痔咳逆胸痹腰痛脅急鼠瘻大孔出血崩中漏下生東海表有文取無時魁蛤味甘平無毒主痿痹瀉痢便膿血一名魁陸一名活東生東海正圓兩頭空表有文取無時石決明味鹹平無毒主目障翳痛青盲久服益精輕身生南海秦龜味苦無毒主除濕痹氣身重四肢關節不可動搖生山之陰土中二月八月取龜甲味鹹甘平有毒主漏下赤白破癥瘕痎瘧五痔陰蝕濕痹四肢重弱小兒囟不合頭瘡難燥女子陰瘡及驚恚氣心腹痛不可久立骨中寒熱傷寒勞復或肌體寒熱欲死以作湯良久服輕身不飢益氣資智亦使人能食一名神屋生南海池澤及湖水中採無時勿令中濕中濕即有毒鯉魚膽味苦寒有毒主目熱赤痛青盲明目久服強悍益志氣肉味甘主咳逆上氣黃疸止渴生者主水腫腳滿下氣骨主女子帶下赤白齒主石淋生九江池澤取無時蠡魚味甘寒無毒主濕痹面目浮腫下大水療五痔有瘡者不可食令人瘢白一名銅魚生九江池澤取無時鮑魚味辛臭溫無毒主墜墮腿蹶踠折瘀血血痹在四肢不散者女子崩中血不止勿令中咸鮧魚味甘無毒主百病鱔魚味甘大溫無毒主補中益血療沈唇五月五日取頭骨燒之止痢鯽魚主諸瘡燒以醬汁和塗之或取豬脂煎用又主腸癰頭灰主小兒頭瘡口瘡重舌目翳一名鮒魚合蒪作羹主胃弱不下食作膾主久赤白痢伏翼味鹹平無毒主目瞑癢痛療淋利水道明目夜視有精光久服令人喜樂媚好無憂一名蝙蝠生太山川穀及人家屋間立夏後採陰乾天鼠屎味辛寒無毒主面癰腫皮膚洗洗時痛腹中血氣破寒熱積聚除驚悸去面黑皯一名鼠法一名石肝生合浦山谷十月十二月取蝟皮味苦平無毒主五痔陰蝕下血赤白五色血汁不止陰腫痛引腰背酒煮殺之又療腹痛疝積亦燒為灰酒服之生楚山川穀田野取無時勿使中濕石龍子味鹹寒有小毒主五癃邪結氣破石淋下血利小便利水道一名蜥蜴一名山龍子一名守宮一名石蜴生平陽川穀及荊山山石間五月取著石上令乾露蜂房味苦鹹平有毒主驚癇瘛瘲寒熱邪氣癲疾鬼精蠱毒腸痔火熬之良又療蜂毒毒腫一名蜂腸一名百穿一名蜂𭄰生牂牁山谷七月七日採陰乾樗雞味苦平有小毒主心腹邪氣陰痿益精強志生子好色補中輕身又療腰痛下氣強陰多精不可近目生河內川穀樗樹上七月採曝乾蚱蟬味鹹甘寒無毒主小兒驚癇夜啼癲病寒熱驚悸婦人乳難胞衣不出又墮胎生楊柳上五月採蒸乾之勿令蠹白殭蠶味鹹辛平無毒主小兒驚癇夜啼去三蟲滅黑皯令人面色好男子陰瘍病女子崩中赤白産後余病滅諸瘡瘢痕生潁川平澤四月取自死者勿令中濕中濕有毒不可用木虻味苦平有毒主目赤痛眥傷淚出瘀血血閉寒熱酸𢠹無子一名魂常生漢中川澤五月取蜚虻味苦微寒有毒主逐瘀血破下血積堅痞癥瘕寒熱通利血脈及九竅女子月水不通積聚除賊血在胸腹五臟者及喉痹結塞生江夏川穀五月取腹有血者良蜚蠊味鹹寒有毒主血瘀症堅寒熱破積聚喉咽痹內寒無子通利血脈生晉陽川澤及人家屋間立秋採𧈟蟲味鹹寒有毒主心腹寒熱洗洗血積癥瘕破堅下血閉生子大良一名地鱉一名土鱉生河東川澤及沙中人家牆壁下土中濕處十月取曝乾蠐螬味鹹微溫微寒有毒主惡血血瘀痹氣破折血在脅下堅滿痛月閉目中淫膚青翳白膜療吐血在胸腹不去及破骨踒折血結金瘡內塞産後中寒下乳汁一名蟦蠐一名蜰齊一名勃齊生河內平澤及人家積糞草中取無時反行者良蛞蝓味鹹寒無毒主賊風喎賊軼筋及脫肛驚癇攣縮一名陵蠡一名土蝸一名附蝸生太山池澤及陰地沙石垣下八月採蝸牛味鹹寒主賊風喎僻踠跌大腸下脫肛筋急及驚癇水蛭味鹹苦平微寒有毒主逐惡血瘀血月閉破血瘕積聚無子利水道及墮胎一名跂一名至掌生雷澤池澤五月六月採曝乾鱉甲味鹹平無毒主心腹癥瘕堅積寒熱去痞息肉陰蝕痔惡肉療溫瘧血瘕腰痛小兒脅下堅肉味甘主傷中益氣補不足生丹陽池澤取無時鮀魚甲味辛微溫有毒主心腹癥瘕伏堅積聚寒熱女子崩中下血五色小腹陰中相引痛瘡疥死肌五邪涕泣時驚腰中重痛小兒氣癃皆潰肉主少氣吸吸足不立地生南海池澤取無時烏賊魚骨味鹹微溫無毒主女子漏下赤白經汁血閉陰蝕腫痛寒熱症瘕無子驚氣入腹腹痛環臍陰中寒腫令人有子又止瘡多膿汁不燥肉味酸平主益氣強志生東海池澤取無時蟹味鹹寒有毒主胸中邪氣熱結痛喎僻面腫敗漆燒之致鼠解結散血愈漆瘡養筋益氣爪主破胞墮胎生伊洛池澤諸水中取無時原蠶蛾雄者有小毒主益精氣強陰道交接不倦亦止精屎溫無毒主腸鳴熱中消渴風痹癮疹鰻鱺魚味甘有毒主五痔瘡瘻殺諸蟲鮫魚皮主蠱氣蠱疰方用之即裝刀靶䱜魚皮也紫背主明目去熱毒蝦蟆味辛寒有毒主邪氣破症堅血癰腫陰瘡服之不患熱病療陰蝕疽癘惡瘡猘犬傷瘡能合玉石一名蟾蜍一名鼀又一名去甫一名苦蠪生江湖池澤五月五日取陰乾東行者良蛙味甘寒無毒主小兒赤熱肌瘡臍傷止痛氣不足一名長股生水中取無時牡鼠微溫無毒療踒折續筋骨搗敷之三日一易四足及尾主婦人墮胎易産肉熱無毒主小兒痡露大腹炙食之糞微寒無毒主小兒癇疾大腹時行勞復蚺蛇膽味甘苦寒有小毒主心腹𧈟痛下部𧈟瘡目腫痛膏平有小毒主皮膚風毒婦人産後腹痛余疾蝮蛇膽味苦微寒有毒主𧈟瘡肉釀作酒療癩疾諸瘻心腹痛下結氣除蠱毒其腹中吞鼠有小毒療鼠瘻鯪鯉甲微寒主五邪驚啼悲傷燒之作灰以酒或水和方寸匕療蟻瘻蜘蛛微寒主大人小兒㿉七月七日取其網療喜忘蜻蛉微寒強陰止精石蠶味鹹寒有毒主五癃破石淋墮胎肉解結氣利水道除熱一名沙蝨生江漢池澤蛇蛻味鹹甘平無毒主小兒百二十種驚癇瘛瘲癲疾寒熱腸痔蟲毒蛇癇弄舌搖頭大人五邪言語僻越惡瘡嘔咳明目火熬之良一名石出子衣一名蛇符一名龍子皮一名龍子單衣一名弓皮生荊州川穀及田野五月五日十五日取之良蛇黃主心痛疰忤石淋産難小兒驚癇以水煮研服汁出嶺南蛇腹中得之圓重如錫黃黑青雜色蜈蚣味辛溫有毒主鬼疰蠱毒啖諸蛇蟲魚毒殺鬼物老精溫瘧去三蟲療心腹寒熱積聚墮胎去惡血生大吳川穀江南赤頭足者良馬陸味辛溫有毒主腹中大堅症破積聚息肉惡瘡白禿療寒熱痞結脅下滿一名百足一名馬軸生玄菟川穀蠮螉味辛平無毒主久聾咳逆毒氣出刺出汗療鼻窒其土房主癰腫風頭一名土蜂生熊耳川穀及牂牁或人屋間雀甕味甘平無毒主小兒驚癇寒熱結氣蠱毒鬼疰一名燥舍生漢中採蒸之生樹枝間蛅蟖房也八月取鼠婦味酸溫微寒無毒主氣癃不得小便婦人月閉血瘕癇痓寒熱利水道一名負蟠一名蛜蝛一名蜲𧑓生魏郡平谷及人家地上五月五日取螢火味辛微溫無毒主明目小兒火瘡傷熱氣蠱毒鬼疰通神精一名夜光一名放火一名熠耀一名即照生階地池澤七月七日取陰乾衣魚味鹹溫無毒主婦人疝瘕小便不利小兒中風項強背起摩之又療淋墮胎塗瘡滅瘢一名白魚一名蟫生咸陽平澤白頸蚯蚓味鹹寒大寒無毒主蛇瘕去三蟲伏尸鬼疰蠱毒殺長蟲仍自化為水療傷寒伏熱狂謬大腹黃疸一名土龍生平土三月取陰乾螻蛄味鹹寒無毒主産難出肉中刺潰癰腫下哽噎解毒除惡瘡一名蟪蛄一名天螻一名𧎅生東城平澤夜出者良夏至取曝乾蜣螂味鹹寒有毒主小兒驚癇瘛瘲腹脹寒熱大人癲疾狂易手足端寒肢滿賁豚一名蛣蜣火熬之良生長沙池澤五月五日取蒸藏之臨用當炙勿置水中令人吐斑蝥味辛寒有毒主寒熱鬼疰蠱毒鼠瘻疥癬惡瘡疽蝕死肌破石癃血積傷人肌墮胎一名龍尾生河東川穀八月取陰乾芫青味辛微溫有毒主蠱毒風疰鬼疰墮胎三月取曝乾葛上亭長味辛微溫有毒主蠱毒鬼疰破淋結積聚墮胎七月取曝乾地膽味辛寒有毒主鬼疰寒熱鼠瘻惡瘡死肌破癥瘕墮胎蝕瘡中惡肉鼻中息肉散結氣石淋去子服一刀圭即下一名蚖青一名青蛙生汶山川穀八月取馬刀味辛微寒有毒主漏下赤白寒熱破石淋殺禽獸賊鼠除五臟間熱肌中鼠𪖈止煩滿補中去厥痹利機關用之當煉得水爛人腸又云得水良一名馬蛤生江湖池澤及東海取無時田中螺汁大寒主目熱赤痛止渴貝子味鹹平有毒主目翳鬼疰蠱毒腹痛下血五癃利水道除寒熱溫疰解肌散結熱燒用之良一名貝齒生東海池澤甲香味鹹平無毒主心腹滿痛氣急止痢下淋生南海珂味鹹平無毒主目中翳斷血生肌貝類也大如鰒皮黃黑而骨白以為馬飾生南海採無時論曰鳥獸蟲魚之類凡一百一十六種皆是生命各各自保愛其身與人不殊所以稱近取諸身遠取諸物人自受命即鳥獸自愛固可知也是以須藥者皆須訪覓先死者或市中求之必不可得自殺生以救己命若殺之者非立方之意也慎之慎之果部二十五味豆蔻味辛溫無毒主溫中心腹痛嘔吐去口臭氣生南海葡萄味甘平無毒主筋骨濕痹益氣倍力強志令人肥健耐飢忍風寒久食輕身不老延年可作酒逐水利小便生隴西五原敦煌山谷蓬虆味酸鹹平無毒主安五臟益精氣長陰令堅強志倍力有子又療暴中風身熱大驚久服輕身不老一名覆盆一名陵虆一名陰虆生荊山平澤及冤句覆盆子味甘平無毒主益氣輕身令發不白五月採大棗味甘平無毒主心腹邪氣安中養脾助十二經平胃氣通九竅補少氣少津液身中不足大驚四肢重和百藥補中益氣強力除煩悶療心下懸腸澼久服輕身長年不飢神仙一名干棗一名美棗一名良棗八月採曝乾三歲陳核中人燔之味苦主腹痛邪氣生棗味甘辛多食令人多寒熱羸瘦者不可食葉覆麻黃能令出汗生河東平澤藕實莖味甘平寒無毒主補中養神益氣力除百疾久服輕身耐老不飢延年一名水芝丹一名蓮生汝南池澤八月採雞頭實味甘平無毒主濕痹腰脊膝痛補中除暴疾益精氣強志令耳目聰明久服輕身不飢耐老神仙一名雁喙實一名芡生雷澤池澤八月採芰實味甘平無毒主安中補五臟不飢輕身一名菱栗味鹹溫無毒主益氣