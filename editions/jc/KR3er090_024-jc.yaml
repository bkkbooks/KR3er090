body:
  text: 卷第二十四瘡癰下癰疽發背第一方九首凡發背及癰疽腫已潰未潰方取香豉三升少與水和熟搗成強泥可腫作餅子厚三分已有孔勿覆孔可腫上布豉餅以艾列其上灸之使溫溫熱而已勿令破肉也其熱痛急易之癰疽當便減決得安或一日二日灸之若先有瘡孔孔中汁出即瘥癰腫發背腫並諸毒腫方榆白皮栝蔞各五兩婦人月布洗取汁胡燕窠土獖鼠土各十兩上五味搗和作泥封之一日漸消五日全瘥若壞封四畔瘥諸癰腫無聊賴發背及癰癤已疼痛方蒸糜谷更遞熨之即愈一云薔薇殼更灸熨之癰疽發腹背陰隱處通身有數十癰方取牛糞乾者燒末以雞子白和塗干則易瘥止又方以牡蠣粉大醋和塗即愈占期散主消腫癰疽消膿方木占斯人參乾薑一云乾地黃桂心細辛厚朴炙敗醬防風桔梗栝蔞甘草炙各一兩上一十一味搗篩為散酒服方寸匕藥入咽覺藥流入瘡中若癰疽灸之不能發壞者可服之瘡未壞者去敗醬已發膿者納敗醬服藥日七夜二以多為善若病在下當膿血出此為腸癰也諸病在裡唯服此藥即覺其力痛者即不痛長服治諸瘡及疽痔瘡已潰便早愈醫人不知用此藥發背無有不治者唯服此耳若始覺背上有不好而渴者即勤服之若藥力行覺渴止便消散若雖已壞但日夜服之勿住也服之腫自消散不覺去時欲長服者當去敗醬婦人乳癰宜速服之一方無桂心癰疽潰漏男發背女髮乳及五痔方蝟胃皮燒蜂房燒各一具蜀椒汗乾薑各一兩厚朴一兩半附子炮去皮桂心當歸續斷藁本地榆皮各五分上十一味搗篩為散酒服方寸匕日三加斑蝥七枚益良治骨疽百方治不瘥方可於瘡上以次灸之三日三夜無不愈又方久瘡不愈瘥而復發骨從孔出者名為骨疽取一死烏雌雞淨去肉取骨熬令成灰取三家牛拘木刮取屑三家炊單各一兩皆別熬成灰合導瘡中碎骨當出數十片愈鼠瘻第二論一首方二十一首灸法三首論曰一切癰疽皆是瘡瘻根本所患癰之後膿汁不止得冷即是鼠瘻是以漏方次之大須急救之治鼠瘻方馬齒草五升切檞白皮一斤水煮五升取一升澄清麝香半臍干之研末杏仁半升曲煎令黑搗如粉上四味以瓷器貯之合和以三四重帛密系口病已成瘡者以泔清煎減半洗作貼子塗藥貼著瘡上日三易之若未作瘡如瘰癧子者以艾一升熏黃如棗大乾膝如棗大三味末之和艾作炷灸之三七壯止治諸漏方取新生兒屎一百日以來皆收置密器中五六日取塗瘡孔中又方取鯉魚腸切作五段火上暖之先洗瘡拭乾以腸貼之冷即易之從旦至夜干止覺癢開看蟲出即瘥又方取雞子三顆米下蒸半日出取黃熬令黑先拭瘡汁令乾以藥納瘡孔中不過三度又方以臘月豬脂以紙紝沾取納瘡孔中日五度夜三度風漏及鼠漏方赤小豆白蘞牡蠣熬黃耆上四味等分搗篩為散酒服方寸匕日三蟻漏方取陵鯉甲二七枚燒為末豬膏和敷之又方取半夏一枚屑之以鴨膏和敷之漏方煅鐵屑狗頰連齒骨虎矢鹿角甲半取毛各二兩千金云鹿皮合毛上四味搗篩為散以豬膏和納瘡孔中須臾易之日五六治鼠漏方死鼠一枚中形者亂髮一雞子大上二味以臘月豬膏才得沒之微火煎之鼠發消盡膏成以塗瘡上又以酒服半分許鼠從瘡中出寒熱瘰癧方連翹黃柏黃耆苦芩栝蔞土瓜根芍藥恆山各一兩龍膽二兩貍頭骨一枚炙上九味搗篩為散酒服五分匕日三治身體瘰癧及常有細瘡又口中有瘡薔薇丸方薔薇根黃柏黃耆黃參芍藥苦參白蘞栝蔞防風梔子龍膽鼠李根皮各一兩石龍芮二兩上一十三味搗篩為末煉蜜和丸如梧桐子飲服十丸日三千金無黃柏頸漏搗生商陸根作餅子如大錢厚三分貼漏上以艾灸之餅乾熱則易之可灸三四升艾便瘥一法葶藶子二合豉一升上二味合搗大爛熟作餅子如上以一餅子當孔上貼以艾柱如小指大灸上三壯一易三餅九柱日三隔三日一灸一法凡是一名瘰癧有結核欲作癰癤者以獨顆蒜去兩頭灸之如前法日灸三度瘥一法七月七日日未出時採麻花五月五日取艾等分合作炷灸漏上百壯治瘻方馬齒草陰乾臘月淳麻燭燼上二味等分細篩以臘月豬脂和之先以暖泔清洗瘡拭乾塗之又方槲木皮一尺闊六寸去黑皮細切以水二斗煮取五升去滓納白糖十挺煎取一升分三服以銅器中貯之若吐吐著器中看之又方五月五日午時取馬齒草一石以水一石煮取三斗去滓納白糖十挺煎取九升分三服以銅器貯之若吐吐著器中看之人參散主寒熱瘰癧在頸脈如杏李方人參乾薑白芷甘草各一兩上四味搗篩為散先食飲服方寸匕日三少小半匕以意增加又方貍骨五分炙烏頭七分炮去皮黃柏一兩上三味搗篩為散先食酒服一錢匕日三又方連翹黃連芍藥苦參土瓜根龍膽當歸各半兩上七味搗篩為散先食以溫酒服錢五匕日三稍加至方寸匕千金無當歸有栝蔞恆山為八味又方取桃枝上不落子搗末以大醋和敷之鼠乳方常思根拭去土勿洗以附本系之一日一夜便斷消瘭疽第三方八首瘭疽秘方世所不傳神良無比升麻乾地黃枳實炙各二兩大黃二兩半前胡三分犀角一兩半麝香射干甘草炙各半兩上九味以水九升煮三升分三服以瘥為度不限劑數豬蹄湯主瘭疽諸疽十指頭焮赤痛癢已潰方豬蹄一具治如食法大黃白芷川芎黃芩黃連細辛當歸藁本藜蘆炙一本無莽草甘草各一兩上一十二味以水三斗煮豬蹄取一斗煮藥取五升洗漬瘡搨湯主瘭疽浸淫欲作未成或如桃李核或如雞子赤焮方黃芩黃連大黃當歸芒硝甘草各一兩上六味以水六升煮取三升去滓還鐺中納芒硝一沸貼布帛中以拓腫上數百遍瘭疽浸淫多日漸大方胡粉一分熬黃連䕡茹甘草各二兩上四味搗篩為散以粉上日三瘭疽著手足肩背累累如米起色白刮之汁出愈而復發方黃耆一兩款冬花升麻各一兩赤小豆附子炮去皮苦參各一分上六味搗篩為散酒服半錢匕稍增至一錢匕日三服又方取虎矢白者以馬矢和之曝乾燒灰以粉之又方龍骨胡粉燒滑石各半兩青木香二兩上四味搗篩為散以米粉一升和之稍稍粉之日四五瘭疽方灶室塵灶突中墨灶釜下土各一升上三味以水九升煮三沸取汁以洗瘡日三四度惡核第四論一首方一十三首論曰凡惡核似射工初得無定處多惻惻然痛時有不痛者不痛便不憂不憂則救遲救遲則殺人是以宜早防之此尤忌牛肉雞豬魚驢馬等肉初如粟或如麻子在肉裡而堅似靤長甚速初得多惡寒須臾即短氣取茱萸五合作末水一升和之絞取汁頓服之以滓敷之須臾更服此汁令毒氣散不入腹入腹則致禍切慎之江南毒氣惡核射工暴腫生瘡五香散方甲香薰六香青木香羚羊角丁香犀角鱉甲炙升麻烏鶯黃芩黃柏黃連甘草各四兩吳茱萸三分上一十四味搗篩為末中射工毒及諸毒皆水服方寸匕日三以雞子白和塗腫上干則易之兼以水和少許洗腫上疑少一香野葛膏主射工惡核卒中惡毒方野葛二升巴豆去皮烏頭蜀椒各五分附子丹砂茵芋各一兩雄黃大黃躑躅各二兩上一十味搗篩為散以不中水豬膏十斤煎三上三下去滓納丹砂雄黃末攪至凝以棗核大摩病上勿近眼凡合各膏皆不用六畜婦人小兒見之麻子湯主遍身流腫方麻子五升炊赤小豆三升防風三兩附子炮當歸各一兩上五味先搗麻子令熟以水三斗煮麻子取一斗三升去滓納藥及豆合煮取四升去滓食豆飲汁治惡毒腫或著陰卵或偏著一邊疼急攣痛牽小腹不可忍一宿殺人方取茴香草搗取汁飲一升日三四服滓薄腫上此外國方神驗從永嘉以來用之起死人神效無比凡風勞毒腫疼攣痛或牽引小腹及腰胯痛方取桃仁一升去尖皮兩仁者熬令黑煙出熱研如脂以好酒三升攪令相和一服覆取汗不過兩三度作之瘥若從腳腫向上稍進入腹殺人方取赤小豆一斗以水三斗煮爛出豆以汁漬膝以下日一數日則愈矣若已入腹者不須漬膝但煮豆食之斷一切鹽菜飲食米麵惟只食豆一物渴飲豆汁瘥乃止大麻子赤小豆湯主毒腫無定處或敕澀惡寒或心腹刺痛煩悶者此由毒氣深重也大麻子熬赤小豆各五升生商陸二升薄切之升麻四兩附子炮射干各三兩上六味以水四斗煮諸藥取二斗五升去滓研麻子令破以麻子汁煮豆令極熟去滓可得六七升一服一升一日一夜令盡小便當利即毒除腫減食兼此豆益佳如湯沃雪凡用麻子皆不得用鬱悒者可揀擇用之療腫方狗尿珠一名龍葵取汁敷之拔出根冬用乾者湯漬取汁用之又方取蒼耳燒灰和醋泔澱作泥封之平即塗勿住取拔根出乃止又方取黑牛垢封之又方刮竹箭上取茹作炷灸上二七壯即消矣又方末附子醋和敷上燥即塗又方取生薺苨根汁一合去滓塗不過三度丹疹第五方二十八首治丹毒腫升麻拓湯方升麻漏蘆芒硝各二兩蒴藋根五兩黃芩三兩梔子二十枚上六味切以水一斗煮取七升冷分用漬拓常令濕為佳丹毒方一名天火也肉中忽有赤如朱塗赤色大者如掌劇者遍身亦有痛癢微腫者方赤小豆二升絹下篩雞子白和塗之小干即塗逐手消也復合漏蘆湯以防其內其方如下漏蘆白蘞黃芩白薇枳實炙升麻芍藥麻黃去節甘草炙各二兩大黃二兩上一十味㕮咀以水一斗煮取三升分三服治五色丹俗名油腫若犯者多致死不可輕之方縛母豬枕頭臥即瘥又方牛屎塗干則易之又方雞子白蒲席灰塗之又方搗麻子水和塗之又方煎羊脂摩之青羊尤佳又方赤小豆五合末水和取汁一合服滓塗五心又方以蕓薹菜末雞子和塗之一云蕓薹葉汁服三合滓塗丹上又方榆根皮末雞子和敷之又方燒苦竹葉篩灰和臘月豬脂塗之亦治油腫又方搗蕓薹菜封即瘥止又方搗慎火草封之神良又方鯽魚五枚五寸以上者去鱗熟研硃砂一合搗如泥封病上厚三分干易之瘤病方取獐鹿二肉治如厚脯火炙令熱拓掩瘤上冷更炙拓可四炙四易痛膿便愈不除更炙新肉用之白瘤方先極搔刮以繩縛之即愈又取東向木空中水熱刮瘡上洗之二三遍即愈又方硫黃礬石燒上二味等分末以醋和敷上麻遊腫方以生布一片搵油中布入油出以火燃之持照病上咒曰日出遊遊不知羞脂火燎你頭七遍瘥白遊腫方熟搗生羊脾塗之青白赤遊手近微痛者方大黃蒲黃伏龍肝各二兩上三味以水和如薄粥塗之治赤遊方以鷹矢水和塗之二三瘥又方胡燕巢灰醋和敷之日二三又方冷水射注之又方大黃一兩紫檀一兩豉一合兩上三味搗細篩為末大醋和敷之又方搗慎火草如泥塗之此最大效火遊腫方大黃慎火草和為末塗之又方胡粉一兩和醋一合煎塗之火遊腫流遍身赤色者入腹即死方以生豬肉敷上其肉蟲鳥不食臭惡故也甘濕第六論二首方三十八首論曰夫甘濕之為病也或熱或寒如病虎狀或時下痢或痢則斷或常痢不止無有時節或時睡眠有時思食而氣力漸弱日日羸瘦腹背攣急頭項無力嗜臥食少試法先指琢其脊上兩邊若逐指即起如粟者即是疳病若不起者非是疳也若起者可漸向上琢之若起至頸骨兩邊者即是蟲已入腦矣病難愈矣療十得二終須多灸若未入腦醫之可瘥先以繩拘項向心壓頭令當齊骨下尖處即插著轉繩向背背上當脊骨插頭橫量病人口兩吻頭作定於捉繩頭脊骨上點兩處灸必須細意點處齊平即灸初旦灸二壯滿一七日至第二七日灸二七壯第三七日旦暮灸七壯第四七日目只三壯第五七日日二壯看初灸二三日若灸瘡發膿者易瘥五六日乃發者難瘥唯得食白飯苜蓿苦苣蔓荊菜香漿少許燒鹽瘥後百日乃可得依常食又須灌藥三遍相去五日一灌蔥白一握豉二升蜀椒三合鹽二合上四味又水一斗煮取七升去滓暖灌之取一升乃灌也療疳濕食口齒及下部方飛廉蒿蜀名上一味燒作灰搗篩以兩錢匕著病處甚痛忍之若不痛則非疳也特忌油膩蜜魚有人患疳食口刺痛穿著此得瘥著下部中蟲如馬尾大相續出無數十日後瘥二十日平復又方取五葉紫花草末和杏仁葦花相和吹下部中瘥疳濕方搗五葉紫花草熟先病上拭乾納著病上瘥為限所中疳者絞取汁五合服之日三夜一下部癢如蟲行方真硃砂一銖礬石二分燒芎藭一分上三味搗末綿裹納下部中又方取蝦蟆末兔矢末用之如上法又方以紙裹莨菪根煻火燒熟以蜜塗納下部中一切蟲痔皆愈又方黃連二兩蛇床子半兩黃柏梔子各一兩上四味搗篩為散以臘月豬脂和塗納下部中日再又方大黃黃芩黃耆玄參各一兩丹參三分芍藥半兩吳茱萸五分炒上七味搗篩為散酒服方寸匕日三治疳濕久下痢赤白百療不瘥方兔頭炙狐骨皆臘日採炙葶藶子熬百草五月五日收蛇頭炙蝦蟆炙蜣螂皆五月五日採炙石黛晚蠶蛾熬青礬熬黃礬熬丁香麝香菥蓂灰故緋灰苦參柏皮乾姜角蒿灰丹砂芒硝鐵衣印成鹽救月木蠍蟲矢桂心床中桄木上二十七味等分細研如粉以筒子吹下部日三良千金有倒掛草疳濕下蟲方千金云下黑熏黃硃砂石黛石鹽麝香丁香礬石熬梔子鐵衣莨菪子熬細辛熬土瓜熬乾薑熬蜀椒汗葶藶子熬菖蒲熬蝦蟆乾者熬故靴底炙髑髏骨炙之枯腐者佳新者不任用上一十九味等分搗篩為散以筒子吹藥杏仁大下部中所有患疳瘡悉敷之其丁香麝香皆別細研納藥中合之一方有芥子若病大重者用灌法如下丁香麝香甘草各三分犀角五分上四味細末如粉別以鹽三合蜀椒三合豉二升以水三升煮取一升去滓納諸藥合和分再灌之旦一酉一月蝕惡瘡息肉方硫黃一云雄黃䕡茹斑蝥去足翅熬各一兩上三味搗篩為散以粉瘡上乾者以豬膏和塗日三夜二治疳食人諸處凡是赤白痢久不瘥秘之方五月五日蝦蟆一枚半熬半生作末金銀土堝五分麝香一分人矢灰五分銀硃小豆大上五味細研如粉敷病上即瘥三七日慎食甜物痢者吹下部中凡人口中生瘡久不瘥下至咽喉胸中有三年不瘥者此亦是疳食病宜塗角蒿灰於病上有汁咽之不過一宿瘥又方薔薇根濃煮汁含咽三宿瘥又方大麻子胡麻各一升半並熬令焦赤上二味以三升瓦瓶泥裹上厚一寸待乾納麻子等令滿以四五枚葦管插口中密泥之掘地作灶立瓶灶口中灶底著瓦器承之密填灶孔與地平聚瓶罐四面以系壘之日沒放火燒之至明旦開取脂適寒溫灌下部中一合尋覺咽有藥氣為佳亦不得過多多則傷人隔日一灌重者再三灌止旦起灌至日夕極覺體中之勞勿怪也非惟治疳濕凡百異同瘡疥癬並洗塗之無不瘥一云口含一丸疳食下部生瘡及日月食方麝香乾薑蠹蟲矢葵莖灰礬石各三分燒五月五日蝦蟆一枚炙上六味搗篩為粉以竹管吹下部入納三寸日再又方雚蘆一兩狼牙三兩橘皮萹蓄青葙各半兩上五味准前法用之疳濕方取干羊矢一升以暖水三升漬之一宿絞取矢汁和末石黛一顆納汁中溫之灌下部令藥停腹一食久病乃瘥又急疳食鼻口數日盡欲死方藍澱塗所食上令遍日十度夜四瘥止又方細末沒石子吹下部立瘥又方燒文蛤灰臘月豬脂和塗又方灌白馬尿一升治痛瘡方細楸枝葉水煮稠可丸以竹筒納下部中疳痔漏皆瘥煎楸葉汁數洗之良疳蟲月蝕濕䘌等方臘月兔頭二枚燒五月五日蝦蟆一枚燒青黛一兩地黃葉灰雞子大虎頭八分炙貝齒七枚燒小薊灰雞子大上七味為散綿裹如棗核大納下部中亦筒吹半棗核大成人者井華水旦服五分匕隔日一服論曰凡患濕䘌蟲多是熱病後或久下不上或有客熱結在腹中或遇暑濕涼氣者多生此病病亦有燥䘌不甚泄痢而下部瘡癢不問燥濕久則殺人為病診齒無色舌上盡白甚者滿口有瘡四肢沉重喜眠如此者此為蟲蝕其肛肛爛盡見五臟即死矣治之方黃連生薑各十兩切艾葉八兩苦參四兩上四味㕮咀以水一斗煮取三升為三服日三久者三劑良凡濕䘌欲得冷而苦痢單煮黃連及艾葉苦參之屬皆可單用懊憹散主濕䘌瘡爛殺蟲除熱方雚蘆青葙女青桃仁去皮尖雙仁熬雷丸各三兩萹蓄半兩上六味搗篩為散粥飲服方寸匕日三稍增至二匕酒服亦得濕䘌神方取生薑刮去上皮斷理切之搗極熟取汁一升五合又以水一升五合和合相得旦空腹服之仍刮生薑二枚如指大以楸葉桃葉數重裹之煻火中燒之令極熱納下部須臾若濕盛者頻三日作之無有不瘥陰蝕瘡方蒲黃一升水銀一兩上二味熟研令散以粉瘡上五月六月七月食特忌肥濃慎之者即免此又方肥豬肉三十斤並得陰肉雜用益良以水二石煮取熟訖去肉以湯汁納大盆中以自洗冷即易不過四遍殺九蟲散主寒疝心痛及蟲齧心痛方雚蘆貫眾乾漆各二兩熬狼牙一兩上四味搗篩為散以羊臑和服之一合日三二日下蟲矣治熱心中懊憹方雚蘆二兩半乾膝熬萹蓄各三分上三味搗篩為散粥飲服方寸匕日三治蟲痛方熬乾漆末之蜜和丸如梧子飲服十丸日三又方燒槐木耳灰水服棗大瘥不止飲一盞熱湯立有出蟲有人患心腹脹滿不能食飲至於死有人教取羊子肝搵蒜蒸服之遂轉下五升如粉粥寸寸皆是蟲即瘥此人口中生瘡時人名曰乾疳以此療之得瘥百日內必不得食醬食醬即發常食蒜齏平旦服至日西即下其齏須和調作不同尋常食齏也腸痔第七方三十六首論一首療痔方臘月牛脾一具炙熟食之令盡即瘥又方牛脾一具熟煮空腹食之盡勿與鹽醬等一具不瘥更與一具從旦至未令盡療外痔方麻子四升搗生布袋盛飯下蒸之絞取脂銅盤盛暖之以綿作貼子坐使正當蒸痔孔須臾易之更坐蟲出又方搗萹蓄絞取汁溲麵作餺飥空腹吃日三頓常食良療痔方桑耳切三升水一斗五升煮取三升旦服一斗日三三日服一劑又方桑耳作羹臛調和令美空腹下飯取飽不過三頓瘥又方蝟皮一具熬乾地黃五兩連翹子槐子各三兩當歸乾薑附子炮續斷礬石燒黃耆各一兩上一十味搗篩為末煉蜜丸如梧子飲服十丸日二稍加至三十丸兼主漏又方取生槐白皮十兩熟搗丸如彈丸綿裹納下部中長吃萹蓄菜及煮汁作羹粥食之大佳治下部癢痛純緣腫起內欲生肉突出方大豆三升水七升急火煮取四升槐白皮切六升甘草三兩炙上以大豆汁煮取二升漬故帛薄之冷則易之日三五槐白皮膏主下部癢痛痔瘡方槐白皮五兩赤小豆二合枳實桃仁各五十枚當歸三兩白芷甘草各二兩上七味以成煎豬膏一斤微火煎白芷色黃去滓摩病上兼導下部中療痔方取故鑿由一枚燒作灰以井華水空腹服一分又方取地黃末敷下部日三夜一良又方乾薑芫花蜀椒各一兩半汗豬懸蹄十枚燒附子三枚炮芍藥白薇白蘞大黃牡蠣熬桂心各半兩甘草一兩炙上一十二味搗篩為散酒服方寸匕日二療痔下部出膿血有蟲傍生孔方取槐白皮一擔以水煮令極熟出置木盆內坐其中欲大便狀蟲悉出冷復易之不過二三度又方煮槐根汁洗之又方煮桃根汁洗之諸痔去血過多氣息惙惙不下食或腹痛牽引下部當歸湯當歸乾薑桂心甘草各三兩炙糖八兩牡丹白芷附子炮芍藥人參各二兩乾地黃四兩上一十一味㕮咀以水一斗煮取三升二合去滓納糖令消分為四服諸大去血積日虛乏內補湯方人參續斷白芷芍藥附子炮當歸甘草各三兩炙桂心茯苓乾薑芎藭乾地黃五味子麥門冬去心各三兩大棗二十枚去核上一十五味㕮咀以水一斗煮取四升分四服諸痔下血蒲黃湯方蒲黃一升當歸白芷白石脂各三兩黃連芎藭乾地黃甘草各二兩上八味㕮咀以水一斗煮取三升分三服諸痔去血大虛黃耆湯方黃耆當歸芎藭各三兩龍骨一兩芍藥桂心各四兩糖一斤附子炮去皮甘草各二兩炙上九味㕮咀以水一斗煮取三升二合去滓入糖令消分五服槐子丸主燥濕痔痔有雄雌者主之方槐子吳茱萸根皮乾漆各四兩熬蒺藜三兩秦艽黃芩牡蠣熬雷丸白芷龍骨黃耆桂心丁香青木香八角附子炮去皮各二兩上一十五味搗篩為末煉蜜和丸如梧子飲服二十丸日三服小槐實丸主五痔十年方槐子三斤白糖二斤礬石燒硫黃各一斤龍骨大黃乾漆各十兩熬上七味搗篩四味其礬石及糖並細切納銅器中一石米下蒸之以綿絞取汁以和藥令作丸並手丸之如梧子陰乾酒服二十丸日二稍增至三十丸槐酒主五痔十年不瘥者方槐東南枝細銼一石槐東南根細銼一石槐白皮細銼一石槐子一斗上四味以大釜中安十六斛水煮取五斛澄取清更煎取一石六斗炊兩斛黍米上曲二斗釀之攪令調封泥七日酒熟取清飲適性常令小小醉耳合時更煮滓取汁淘米洗器不得用生水作酒如此藥忌生水故也主痔神方七月七日多采槐子熟搗取汁重綿絞之納銅器中著中庭高門上曝乾之二十日以上煎成如鼠屎大納穀道中日三亦主瘻及百種瘡又方取三具鯉魚腸以火炙令香以綿裹之納穀道中一食頃蟲當出魚腸數數易之盡三枚便瘥又方炙魚腸令香坐上蟲即出又方虎頭骨炙犀角末上二味各末之如雞子大以不中水豬膏和塗之治痔方取八月槐子搗取汁煎作丸塗之又方取熊膽塗之取瘥止但發即塗又方以紙裹小瓜以泥裹三四分煻火埋燒之令大熟經宿勿食使大飢開取承熱任意飽食之覆暖臥一炊久其痔瘥五痔方五月五日收蒼耳莖葉搗為末水服方寸匕日三瘥採時陰乾又方燒羊角䚡末酒服方寸匕日三又方常服蒲黃方寸匕日三良論曰凡人大便有血即是痔病勿得慢之慎干棗油膩豬魚夫患痔在身所服各藥皆不得力徒棄功夫一無所益欲服餌者當斷之乃可服也第一槐子仁丸大有效驗方在前篇中必須事之勿致疑也治脫肛方蒲黃二兩上一味以豬肪和敷肛門上納之日二三愈又方腸出不入生栝蔞取汁豬脂等分湯上溫塗納之瘥又方以鐵精粉上納之每出即粉取瘥止疥癬第八論一首方三十四首灸法一首論曰瘑瘡疥癬之病皆有諸蟲若不速愈三年不瘥便為惡疾何者諸蟲族類極盛藥不能當所以須防之不可輕也凡療疥癬黃耆酒中加烏蛇脯一尺烏頭附子茵芋石楠莽草各等分大秦艽散中加之亦有大效小小疥瘙十六味小秦艽散亦相當千金云小秦艽散中加烏蛇二兩香瀝主燥濕癬及瘑疥百瘡方沉香松節各一斤一方更有柏節松節各一斤上二味破之如指大以布袋盛之令置麻油中半食久出取一口瓷坩穿底令孔大如雞子以松葉一小把藉孔上以坩安著白碗上以黃土泥坩固濟令厚五分以藥納坩中以生炭著藥上使燃其瀝當流入碗中燃盡乃開出坩取汁以敷瘡上日再並治白禿疽惡瘡皆瘥當服小秦艽散即瘥礬石瀝主幹濕癢及惡瘡白禿方礬石硫黃芒硝大鹽各三分松脂六合白糖八兩上六味切諸藥令如指大先取甑蔽仰銅器上納甑中以藥安蔽上以松脂白糖布藥上都訖重以大蔽覆之炊五升米藥汁流入器中其汁密覆之臨用小溫塗瘡上日再治癬秘方搗羊蹄根分以白蜜和之刮瘡四邊令傷先以蜜和者敷之如炊一石米頃拭去更以三年大醋和塗之以敷癬上燥便瘥若刮瘡處不傷即不瘥治久疥癬方丹砂雄黃雌黃各一兩䕡茹三兩亂髮一兩洗淨松脂白蠟各一兩巴豆十四枚去皮豬膏二斤上九味先煎發令消盡納松脂蠟等三上三下去滓末䕡茹石藥等納中更煎一沸止敷之三數度瘥治久癬不瘥方細研水銀霜如粉和臘月豬膏先以泔清洗瘡拭乾塗之一塗即瘥後時重發更塗即永瘥妙塗時大須薄慎勿厚又方水銀礬石燒蛇床子黃連上四味各一兩臘月豬膏七合和攪不見水銀為熟敷之治一切無問幼小諸瘡上方加漆頭䕡茹一兩治諸瘡癬療不瘥方水銀一斤豬膏臘月者五斤上二味以鐵器中壘灶馬通火七日七夜勿住火炊之停冷取豬膏去水銀不妨別用以膏塗一切諸瘡無不應手即瘥又方牸牛尿一升羊蹄根切五升上二味納羊蹄漬一宿日曝之干則納尿中漬一宿尿盡止搗作末塗諸瘡癬上和豬脂用更精又方諸瘙疥皆單用水銀豬膏研令極細塗之又方取生烏頭十枚切煮取汁洗之即瘥治癬方淨洗瘡取醬瓣尿和塗之瘥止又方水銀蕪荑末上二味酥和塗之即瘥又方正日中午時灸病處影上三姓灸之咒曰癬中蟲毛茸茸若欲療待日中又方取酥墨塗之凡諸瘡癬初生時或始痛癢即以種種單方救之或嚼鹽塗之妙又方取鯉魚鮓糂之又方取薑黃塗之又方取牛李子塗之治癬方取黃蒿穗作末粉敷之日三夜二一切濕癬並瘥又方取八月八日日出時令病人正當東向戶長跪平舉兩手持戶兩邊取肩頭小垂際骨解宛宛中灸之兩火俱下各三壯若七壯十日愈又方搗刺薊汁服之又方服地黃汁佳又方服驢尿良又方燒蛇皮一具酒服良又方搗莨菪蜜和封之良又方熱拓煎餅不限多少日一遍薄之良又方酢煎艾塗之瘥又方搗羊蹄根和乳塗之又方大醋和雄黃粉先以新布拭之令癬傷敷之妙治瘑疥百瘡經年不瘥方楝實一升地榆根五兩桃皮五兩苦參五兩上四味以水一斗煮取五升稍溫洗之日一度治瘑疥濕瘡浸淫日痛癢不可堪搔之黃水汁出瘥復發方取羊蹄根勿令婦女小兒貓犬見之淨去土細切熟熬以大醋和淨洗敷瘡上一時間以冷水洗之日一敷凡方中用羊蹄根皆以日未出前採者佳又方作羊蹄根散癢時搔汁出以粉上又以生根揩之神驗療渴利後發瘡坐處瘡疥及疵癬方薔薇根三兩石龍芮三兩苦參二兩黃耆二兩黃連二兩芍藥三兩雀李根三兩黃柏三兩黃芩三兩當歸一兩續斷一兩栝蔞四兩大黃一兩上一十三味搗篩煉蜜和以飲服之丸如梧子大一服十五丸日三加至三十丸瘡瘥乃止所是癰疽皆須服之千金云薔薇飲服之又方赤小豆一升熬納酢中如此七遍人參二兩甘草二兩炙瞿麥二兩白蘞二兩當歸二兩黃芩二兩豬苓二兩防風一兩黃耆三兩薏苡仁三兩升麻四兩上一十二味搗為散飲服方寸匕日三夜一治疥疽諸瘡方水銀胡粉各一兩黃連二兩黃柏七分礬石三分燒附子三分蛇床子半兩苦參一兩上八味下篩六種水銀胡粉別以豬脂研令水銀滅不見乃以豬膏合研令調如泥以敷瘡上日三夜一代指第九方六首治代指遞腫方以毛雜黃土作泥泥指上令厚五分納煻灰中令熱可忍之泥干即易之不過數反即瘥又方單煮地榆作湯漬之半日便愈治代指方麻沸湯納指其中即愈又方先刺去膿炙鮓魚皮令溫以纏指周匝痛止愈治指疼欲脫方取豬脂和薑末稍令熱納指甲中食頃即瘥治指掣痛方取醬清和蜜任多少溫塗之即愈濕熱瘡第十方三十四首治濕熱諸惡瘡方狼牙五兩芍藥五兩大黃三兩白芷五兩黃柏五兩丹參五兩上六味切以水四升煮取一升半以洗之日三度治濕熱瘡多汁粉散方芎藭大黃白蘞芍藥黃連槐皮龍骨各一兩上七味搗篩為散以粉瘡上日三度又洗之方茵芋三兩石楠三兩莽草三兩蛇床子二兩躑躅二兩礬石二兩上六味切以水一斗煮取五升洗瘡日再治惡瘡三年不瘥方巴豆去皮甘草上二味等分細下為散先別煮甘草湯洗瘡訖以藥敷之先從四面起向中心日三夜一治惡瘡似火爛洗湯方取白馬矢曝乾以水和煮十沸絞取汁洗之極佳治惡瘡十年不瘥似癩者方蛇脫皮一枚上一味燒之末下篩以豬脂和敷之良又方苦瓠上一味㕮咀煮取汁洗瘡日三度洗煎以洗癬甚良須先以泔清洗瘡也治諸惡瘡烏頭膏方烏頭雄黃雌黃芎藭升麻各半兩亂髮如雞子大一枚松脂如雞子大一枚防己三分黃連半兩上一十三味切以豬膏三升急煎令亂髮消盡去滓停小冷以真珠二錢匕投中攪令相得以敷之凡用膏皆令先溫酢泔清洗瘡拭乾乃敷之訖以赤石脂黃連散粉之此治諸惡瘡皆瘥梔子湯主表裡俱熱三焦熱實身體生瘡或發即大小便不利方芒硝二兩大黃四兩梔子仁七枚擘黃芩三兩知母二兩甘草二兩炙上六味㕮咀以水五升煮減半下大黃煮取一升八合絞去滓納芒硝分為三服又方礬石燒蠟松脂亂髮上四味各半兩豬脂四兩煎之令發焦納礬石令消納松脂次納蠟去滓先刮洗瘡以塗之日再三不痛久瘡時愈新瘡遲愈癢瘡頭禿皆即愈生髮此膏勝飛黃膏及諸名藥治諸瘡久不瘥並療六畜方棗膏三斤上一味以水三斗煮取一斗五升數洗取瘥為度治身瘡及頭瘡不止方以菖蒲末敷之日三夜一治濕熱瘡惡瘡洗湯方槐子二升蛇床子一兩黃連五兩當歸芍藥黃柏各三兩上六味切以水三斗煮取一斗五升去滓以洗瘡日三度治濕熱瘡方生地榆二斤上一味以水三斗煮取一斗五升以洗瘡日三度烏膏主種種諸瘡治不愈方水銀一兩黃連一兩經墨半兩上三味末之以不中水豬脂和敷之不過三四度愈神效欲多任人惟不治金瘡其藥惟須熟研惡瘡黃水出流方燒故鞍屜氈灰和臘月豬脂封塗又方藜蘆巴豆上二味等分燒灰和臘月豬脂封塗又方松脂灰薰陸香各五分生地黃汁五合白羊脂二分石鹽半兩亂髮灰半兩上六味以豬脂一升煎取五合納地黃汁煎成膏去滓貼之日再瘥止治惡瘡瘑瘡方杏仁去皮巴豆各二兩去皮藜蘆黃連各一兩水銀一錢許上五味以青羊脂和研水銀令滅先以鹽湯洗之去上痂敷瘡日二時氣病後得風生瘡疼癢搔之黃汁出方皂莢炙烏頭礬石各三兩黃連一升牡蠣四兩藜蘆桂心各一兩六銖上七味切以水一斗煮取七升去滓先搔瘡令血出溫洗瘡緩浸良久佳卒患發熱瘡方取炭長二尺者二枚燒令赤置地中以水二升灌之取地上汁洗瘡即瘥瘡中惡肉出方取烏梅二七顆燒作灰敷瘡中其瘡中惡肉乃盡矣治惡瘡方取白芨煮汁洗瘡訖敷膏膏用桑東向枝作末以臘月豬膏和敷之亦主狗瘡初大痛一宿即愈瘡初患似癤後破無痂疼痛難忍名曰豬喙瘡方燒豬鼻作灰敷之瘥反花瘡方煎柳葉為煎塗之瘥又方燒馬齒草灰敷之又方燒鹽末灰敷之又方以蜘蛛幕裹之王不留行湯主白禿及頭面久瘡去蟲止痛方王不留行五兩桃東南枝五兩茱萸根皮五兩蛇床子三升牡荊三升苦竹葉切三斗蒺藜三升大麻仁一升上八味以水二斗煮取一斗洗瘡日再並治疽及月蝕瘡爛治白禿方三月三日桃花開者陰乾柏子赤桑根上三味為末豬脂和先以灰汁淨洗禿處拭乾塗之又方細柳枝一握水銀皂莢炙上三味以醋煎如餳塗之松脂膏主白禿及癰疽百瘡方木蘭闌皮一兩礬石杜蘅雄黃附子大黃石楠秦艽真米苦參水銀各二兩松脂六兩上一十二味以醋漬一宿豬膏一斤半煎之侯附子黃去滓乃納礬石雄黃水銀更著火煮三沸還濕地待凝以敷瘡瘥又方以牛肉作五味脯炙令香及熱拓瘡上不過三四度即瘥治頭瘡腫方燒杏仁令黑磨塗復取束柴葛蔓及乾魚頭燒灰和薰黃臘月豬脂塗之
