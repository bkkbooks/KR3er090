body:
  text: 卷第十傷寒下太陰病狀第一八證方二首太陰之為病腹滿吐食不下下之益甚時腹自痛胸下堅結太陰病脈浮可發其汗太陰中風四肢煩疼陽微陰澀而長為欲愈太陰病欲解時從亥盡醜自利不渴者屬太陰其臟有寒故也當溫之宜四逆輩傷寒脈浮而緩手足溫是為系在太陰太陰當發黃小便自利利者不能發黃至七八日雖煩暴利十餘行必自止所以自止者脾家實腐穢當去故也本太陽病醫反下之因腹滿時痛為屬太陰桂枝加芍藥湯主之其實痛加大黃湯主之方桂枝三兩芍藥六兩生薑三兩切甘草二兩炙大棗十二枚擘上五味以水七升煮取三升去滓分溫三服加大黃湯方大黃二兩上於前方中加此大黃二兩即是人無陽證脈弱其人續自便利設當行大黃芍藥者減之其人胃氣弱易動故也少陰病狀第二四十五證方一十六首少陰之為病脈微細但欲寐少陰病欲吐而不煩但欲寐五六日自利而渴者屬少陰虛故引水自救小便白者少陰病形悉具其人小便白者下焦虛寒不能制溲故白也夫病其脈陰陽俱緊而反汗出為陽屬少陰法當咽痛而復吐利少陰病咳而下利譫語是為被火氣劫故也小便必難為強責少陰汗也少陰病脈細沉數病在裡不可發其汗少陰病脈微不可發其汗無陽故也陽已虛尺中弱澀者復不可下之少陰病脈緊者至七八日下利其脈暴微手足反溫其脈緊反去此為欲解雖煩下利必自愈少陰病下利若利止惡寒而蜷手足溫者可治少陰病惡寒而蜷時自煩欲去其衣被可治少陰中風其脈陽微陰浮為欲愈少陰病欲解時從子盡寅少陰病八九日而一身手足盡熱熱在膀胱必便血少陰病其人吐利手足不逆反發熱不死脈不足者灸其少陰七壯少陰病但厥無汗強發之必動血未知從何道出或從口鼻目出是為下厥上竭為難治少陰病惡寒蜷而利手足逆者不治少陰病下利止而眩時時自冒者死少陰病其人吐利躁逆者死少陰病四逆惡寒而蜷其脈不至其人不煩而躁者死少陰病六七日其息高者死少陰病脈微細沉但欲臥汗出不煩自欲吐至五六日自利復煩躁不得臥寐者死少陰病始得之反發熱脈反沉者麻黃細辛附子湯主之方麻黃二兩去節細辛二兩附子一枚炮去皮破八片上三味以水二斗先煮麻黃減一升去上沫納諸藥煮取三升去滓溫服一升少陰病得之二三日麻黃附子甘草湯微發汗以二三日無證故微發汗方麻黃二兩去節附子一枚炮去皮破八片甘草二兩炙上三味以水七升先煮麻黃一二沸去上沫納諸藥煮取二升半去滓溫服八合少陰病得之二三日以上心中煩不得臥者黃連阿膠湯主之方黃連四兩黃芩一兩芍藥二兩雞子黃二枚阿膠三挺上五味以水六升先煮三味取二升去滓納膠煬盡納雞子黃攪令相得溫服七合日三服少陰病得之一二日口中和其背中惡寒者當灸之附子湯主之少陰病身體痛手足寒骨節痛脈沉者附子湯主之方附子二枚炮去皮破八片茯苓三兩人參二兩白朮四兩芍藥三兩上五味以水八升煮取三升去滓分溫三服少陰病下利便膿血桃花湯主之少陰病二三日至四五日腹痛小便下利不止而便膿血者以桃花湯主之方赤石脂一斤一半肉一半末乾薑一兩粳米一升上三味以水七升煮米熟湯成去滓溫取七合納赤石脂末一方寸匕一服止余勿服少陰病下利便膿血者可刺少陰病吐利手足逆煩躁欲死者茱萸湯主之方見陽明門少陰病下利咽痛胸滿心煩豬膚湯主之方豬膚一斤上一味以水一斗煮取五升去滓納白蜜一升白粉五合熬香和令相得溫分六服少陰病二三日咽痛者可與甘草湯不瘥可與桔梗湯方甘草上一味以水三升煮取一升半去滓溫服七合日再服桔梗湯方桔梗一大枚甘草二兩上二味以水三升煮取一升去滓分溫再服少陰病咽中傷生瘡不能語言聲不出苦酒湯主之方雞子一枚去黃納好上苦酒於殼中半夏洗破如棗核十四枚上二味納半夏著苦酒中以雞子殼置刀環中安火上令三沸去滓少少含咽之不瘥更作三劑愈少陰病咽中痛半夏散及湯主之方半夏洗桂枝甘草炙上三味等分各異搗合治之白飲和服方寸匕日三服若不能散服者以水一升煎七沸納散兩方寸匕更煮三沸下火令小冷少少含咽之半夏有毒不當散服少陰病下利白通湯主之方附子一枚生去皮破八片乾薑一兩蔥白四莖上三味以水三升煮取一升去滓分溫再服少陰病下利脈微服白通湯利不止厥逆無脈干煩者白通加豬膽汁湯主之方豬膽汁一合人尿五合上二味納前湯中和令相得溫分再服若無膽亦可用服湯脈暴出者死微續者生少陰病二三日不已至四五日腹痛小便不利四肢沉重疼痛而利此為有水氣其人或咳或小便不利或下利或嘔玄武湯主之方茯苓芍藥生薑各三兩切白朮二兩附子一枚炮去皮破八片上五味以水八升煮取三升去滓溫服七合咳者加五味子半升細辛一兩乾薑一兩小便自利者去茯苓下利者去芍藥加乾薑二兩嘔者去附子加生薑足前為半斤利不止便膿血者宜桃花湯少陰病下利清穀裡寒外熱手足厥逆脈微欲絶身反惡寒其人面赤或腹痛或乾嘔或咽痛或下利止而脈不出通脈四逆湯主之方甘草二兩炙附子大者一枚生去皮破八片乾薑三兩強人可四兩上三味以水三升煮取一升二合去滓分溫再服其脈即出者愈面赤者加蔥白九莖腹痛者去蔥加芍藥二兩嘔者加生薑二兩咽痛者去芍藥加桔梗一兩利止脈不出者去桔梗加人參二兩病皆與方相應者乃加減服之少陰病四逆其人或咳或悸或小便不利或腹中痛或瀉利下重四逆散主之方甘草炙枳實炙柴胡芍藥各十分上四味搗為散白飲和服方寸匕日三服咳者加五味子乾薑各五分兼主利悸者加桂枝五分小便不利者加茯苓五分腹中痛者加附子一枚炮瀉利下重者先以水五升煮薤白三升取三升去滓以散三方寸匕納湯中煮取一升半分溫再服少陰病下利六七日咳而嘔渴心煩不得眠豬苓湯主之方見陽明門少陰病得之二三日口燥咽乾急下之宜承氣湯少陰病利清水色青者心下必痛口乾燥者可下之宜承氣湯一云大柴胡少陰病六七日腹滿不大便者急下之宜承氣湯方見承氣湯中少陰病其脈沉者當溫之宜四逆湯少陰病其人飲食入則吐心中溫溫欲吐復不能吐始得之手足寒脈弦遲此胸中實不可下也當遂吐之若膈上有寒飲乾嘔者不可吐當溫之宜四逆湯方見陽明門少陰病下利脈微澀者即嘔汗者必數更衣反少當溫其上灸之一云灸厥陰五十壯厥陰病狀第三五十六證方七首厥陰之為病消渴氣上撞心中疼熱飢而不欲食甚者則欲吐蛔下之不肯止厥陰中風其脈微浮為欲愈不浮為未愈厥陰病欲解時從醜盡卯厥陰病渴欲飲水者與水飲之即愈諸四逆厥者不可下之虛家亦然傷寒先厥後發熱而利者必止見厥復利傷寒始發熱六日厥反九日而下利厥利當不能食今反能食恐為除中食之黍餅不發熱者知胃氣尚在必愈恐暴熱來出而復去也後日脈之其熱續在期之旦日夜半愈所以然者本發熱六日厥反九日復發熱三日並前六日亦為九日與厥相應故期之旦日夜半愈後三日脈之數其熱不罷此為熱氣有餘必發癰膿傷寒脈遲六七日而反與黃芩湯徹其熱脈遲為寒與黃芩湯復除其熱腹中冷當不能食今反能食此為除中必死傷寒先發厥熱下利必自止而反汗出咽中強痛其喉為痹發熱無汗而利必自止便膿血便膿血者其喉不痹傷寒一二日至四五日厥者必發熱前厥者後必熱厥深熱亦深厥微熱亦微厥應下之而發其汗者口傷爛赤凡厥者陰陽氣不相順接便為厥厥者手足逆者是傷寒病厥五日熱亦五日設六日當復厥不厥者自愈厥不過五日以熱五日故知自愈傷寒脈微而厥至七八日膚冷其人躁無安時此為臟寒蛔上入其膈蛔厥者其人當吐蛔令病者靜而復時煩此為臟寒蛔上入其膈故煩須臾復止得食而嘔又煩者蛔聞食臭必出其人常自吐蛔蛔厥者烏梅丸主之方烏梅三百枚細辛六兩乾薑十兩黃連十六兩當歸四兩蜀椒四兩附子六兩炮桂枝六兩人參六兩黃柏六兩上一十味異搗合治之以苦酒漬烏梅一宿去核蒸之五斗米下搗成泥和諸藥令相得臼中與蜜杵千下丸如梧桐子大先食飲服十丸日三服少少加至二十丸禁生冷滑物臭食等傷寒熱少微厥稍頭寒默默不欲食煩躁數日小便利色白者熱除也得食其病為愈若厥而嘔胸脅煩滿其後必便血稍頭一作指頭病者手足厥冷言我不結胸少腹滿按之痛此冷結在膀胱關元也傷寒發熱四日厥反三日復發熱四日厥少熱多其病當愈四日至六七日不除必便膿血傷寒厥四日熱反三日復厥五日其病為進寒多熱少陽氣退故為進傷寒六七日其脈數手足厥煩躁陰厥不還者死傷寒下利厥逆躁不能臥者死傷寒發熱下利至厥不止者死傷寒六七日不利便發熱而利其人汗出不止者死有陰無陽故也傷寒五六日不結胸腹濡脈虛復厥者不可下之下之亡血死傷寒發熱而厥七日下利者為難治傷寒脈促手足厥逆者可灸之傷寒脈滑而厥者其表有熱白虎湯主之表熱見里方見難療中手足厥寒脈為之細絶當歸四逆湯主之方當歸三兩桂心三兩細辛三兩芍藥三兩甘草二兩炙通草二兩大棗二十五枚擘上七味以水八升煮取三升去滓溫服一升日三服若其人有寒當歸四逆加吳茱萸生薑湯主之方吳茱萸二兩生薑八兩切上前方中加此二味以水四升清酒四升和煮取三升去滓分溫四服大汗出熱不去拘急四肢疼若下利厥而惡寒四逆湯主之大汗出若火下利而厥四逆湯主之方並見陽明門病者手足逆冷脈乍緊者邪結在胸中心下滿而煩飢不能食病在胸中當吐之宜瓜蒂散方見療痞中傷寒厥而心下悸先治其水當與茯苓甘草湯卻治其厥不爾其水入胃必利茯苓甘草湯主之方茯苓二兩甘草炙一兩桂枝二兩生薑三兩上四味以水四升煮取二升去滓分溫三服傷寒六七日其人大下後脈沉遲手足厥逆下部脈不至咽喉不利唾膿血瀉利不止為難治麻黃升麻湯主之方麻黃去節二兩半知母十八銖葳蕤十八銖黃芩十八銖升麻一兩六銖當歸一兩六銖芍藥桂枝石膏碎綿裹乾薑白朮茯苓麥門冬甘草炙各六銖上一十四味以水一斗先煮麻黃二沸去上沫納諸藥煮取三升去滓分溫三服一炊間當汗出愈傷寒四五日腹中痛若轉氣下趣少腹為欲自利傷寒本自寒下醫復吐之而寒格更逆吐食入即出乾薑黃芩黃連人參湯主之方乾薑黃芩黃連人參各三兩上四味以水六升煮取二升去滓分溫再服下利有微熱其人渴脈弱者自愈下利脈數若微發熱汗出者自愈設脈復緊為未解下利手足厥無脈灸之不溫反微喘者死少陰負趺陽者為順下利脈反浮數尺中自澀其人必清膿血下利清穀不可攻其表汗出必脹滿下利脈沉弦者下重其脈大者為未止脈微弱數者為欲自止雖發熱不死下利脈沉而遲其人面少赤身有微熱下利清穀必鬱冒汗出而解其人微厥所以然者其面戴陽下虛故也下利脈反數而渴者今自愈設不瘥必清膿血有熱故也下利後脈絶手足厥晬時脈還手足溫者生不還者死傷寒下利日十餘行其人脈反實者死下利清穀裡寒外熱汗出而厥通脈四逆湯主之方見少陰門熱利下重白頭翁湯主之下利欲飲水者為有熱白頭翁湯主之方白頭翁二兩黃柏三兩黃連三兩秦皮三兩上四味以水七升煮取二升去滓溫服一升不瘥更服下利腹滿身體疼痛先溫其里乃攻其表溫里宜四逆湯攻表宜桂枝湯方並見上下利而譫語為有燥屎小承氣湯主之方見承氣門下利後更煩按其心下濡者為虛煩也梔子湯主之方見陽明門嘔家有癰膿不可治嘔膿儘自愈嘔而發熱小柴胡湯主之方見柴胡門嘔而脈弱小便復利身有微熱見厥難治四逆湯主之方見上乾嘔吐涎沫而復頭痛吳茱萸湯主之方見陽明門傷寒大吐下之極虛復極汗者其人外氣怫鬱復與其水以發其汗因得噦所以然者胃中寒冷故也傷寒噦而滿者視其前後知何部不利利之則愈傷寒宜忌第四十五章忌發汗第一少陰病脈細沉數病在裡忌發其汗脈浮而緊法當身體疼痛當以汗解假令尺中脈遲者忌發其汗何以知然此為榮氣不足血氣微少故也少陰病脈微忌發其汗無陽故也咽中閉塞忌發其汗發其汗即吐血氣微絶逆冷厥忌發其汗發其汗即聲亂咽嘶舌萎太陽病發熱惡寒寒多熱少脈微弱則無陽也忌復發其汗咽喉乾燥者忌發其汗亡血家忌攻其表汗出則寒栗而振衄家忌攻其表汗出必額上促急汗家重發其汗必恍惚心亂小便已陰疼淋家忌發其汗發其汗必便血瘡家雖身疼痛忌攻其表汗出則痓冬時忌發其汗發其汗必吐利口中爛生瘡咳而小便利若失小便忌攻其表汗則厥逆冷太陽病發其汗因致痓宜發汗第二大法春夏宜發汗凡發汗欲令手足皆周澀澀一時間益佳不欲流離若病不解當重發汗汗多則亡陽陽虛不得重發汗也凡服湯藥發汗中病便止不必盡劑也凡云宜發汗而無湯者丸散亦可用然不如湯藥也凡脈浮者病在外宜發其汗太陽病脈浮而數者宜發其汗陽明病脈浮虛者宜發其汗陽明病其脈遲汗出多而微惡寒者表為未解宜發其汗太陰病脈浮宜發其汗太陽中風陽浮而陰濡弱浮者熱自發濡溺者汗自出澀澀惡寒淅淅惡風翕翕發熱鼻鳴乾嘔桂枝湯主之太陽頭痛發熱身體疼腰痛骨節疼痛惡風無汗而喘麻黃湯主之太陽中風脈浮緊發熱惡寒身體疼痛不汗出而煩躁大青龍湯主之少陰病得之二三日麻黃附子甘草湯微發汗忌吐第三太陽病惡寒而發熱今自汗出反不惡寒而發熱關上脈細而數此吐之過也少陰病其人飲食入則吐心中溫溫欲吐復不能吐始得之手足寒脈弦運若膈上有寒飲乾嘔忌吐當溫之諸四逆病厥忌吐虛家亦然宜吐第四大法春宜吐凡服吐湯中病便止不必盡劑也病如桂枝證其頭項不強痛寸口脈浮胸中痞堅上撞咽喉不得息此為有寒宜吐之病胸上諸實胸中鬱郁而痛不能食欲使人按之而反有涎唾下利日十餘行其脈反遲寸口微滑此宜吐之利即止少陰病其人飲食入則吐心中溫溫欲吐復不能吐宜吐之病者手足逆冷脈乍緊邪結在胸中心下滿而煩飢不能食病在胸中宜吐之宿食在上管宜吐之忌下第五咽中閉塞忌下下之則上輕下重水漿不下諸外實忌下下之皆發微熱亡脈則厥諸虛忌下下之則渴引水易愈惡水者劇脈數者忌下下之必煩利不止尺中弱澀者復忌下脈浮大醫反下之此為大逆太陽證不罷忌下下之為逆結胸證其脈浮大忌下下之即死太陽與陽明合病喘而胸滿者忌下太陽與少陽合病心下痞堅頸項強而眩忌下凡四逆病厥者忌下虛家亦然病欲吐者忌下病有外證未解忌下下之為逆少陰病食入即吐心中溫溫欲死復不能吐始得之手足寒脈弦遲此胸中實忌下傷寒五六日不結胸腹濡脈虛復厥者忌下下之亡血則死宜下第六大法秋宜下凡宜下以湯勝丸散凡服湯下中病則止不必盡三服陽明病發熱汗多者急下之少陰病得之二三日口燥咽乾者急下之少陰病五六日腹滿不大便者急下之少陰病下利清水色青者心下必痛口乾者宜下之下利三部脈皆浮按其心下堅者宜下之下利脈遲而滑者實也利未欲止宜下之陽明與少陽合病利而脈不負者為順脈數而滑者有宿食宜下之問曰人病有宿食何以別之答曰寸口脈浮大按之反澀尺中亦微而澀故知有宿食宜下之下利不欲食者有宿食宜下之下利瘥至其時復發此為病不盡宜復下之凡病腹中滿痛者為寒宜下之腹滿不減減不足言宜下之傷寒六七日目中不了了睛不和無表裡證大便難微熱者此為實急下之脈雙弦而遲心下堅脈大而緊者陽中有陰宜下之傷寒有熱而少腹滿應小便不利今反利此為血宜下之病者煩熱汗出即解復如瘧日晡所發者屬陽明脈實者當下之宜溫第七大法冬宜服溫熱藥師曰病發熱頭痛脈反沉若不瘥身體更疼痛當救其里宜溫藥四逆湯下利腹脹滿身體疼痛先溫其里宜四逆湯下利脈遲緊為痛未欲止宜溫之下利脈浮大者此為虛以強下之故也宜溫之與水必噦少陰病下利脈微澀嘔者宜溫之自利不渴者屬太陰其臟有寒故也宜溫之少陰病其人飲食入則吐心中溫溫欲吐復不能吐始得之手足寒脈弦遲若膈上有寒飲乾嘔宜溫之少陰病脈沉者宜急溫之下利欲食者宜就溫之忌火第八傷寒加火針必驚傷寒脈浮而醫反以火迫劫之亡陽必驚狂臥起不安傷寒其脈不弦緊而弱弱者必渴被火必譫語太陽病以火熏之不得汗其人必躁到經不解必清血陽明病被火額上微汗出而小便不利必發黃少陰病咳而下利譫語是為被火氣劫故也小便必難為強責少陰汗也宜火第九凡下利穀道中痛宜炙枳實若熬鹽等尉之忌灸第十微數之脈慎不可灸因火為邪則為煩逆脈浮當以汗解而反灸之邪無從去因火而盛病從腰以下必重而痹此為火逆脈浮熱甚而反灸之此為實實以虛治因火而動咽燥必唾血宜灸第十一少陰病一二日口中和其背惡寒宜灸之少陰病吐利手足逆而脈不足灸其少陰七壯少陰病下利脈微澀者即嘔汗者必數更衣反少者宜溫其上灸之一云灸厥陰五十壯下利手足厥無脈灸之主厥厥陰是也灸不溫反微喘者死傷寒六七日其脈微手足厥煩躁灸其厥陰厥不還者死脈促手足厥者宜灸之忌刺第十二大怒無刺新內無刺大勞無刺大醉無刺大飽無刺大渴無刺大驚無刺無刺熇熇之熱無刺淥淥之汗無刺渾渾之脈無刺病與脈相逆者上工刺未生其次刺未盛其次刺其衰工逆此者是謂伐形宜刺第十三太陽病頭痛至七日自當愈其經竟故也若欲作再經者宜刺足陽明使經不傳則愈太陽病初服桂枝湯而反煩不解宜先刺風池風府乃卻與桂枝湯則愈傷寒腹滿而譫語寸口脈浮而緊者此為肝乘脾名曰縱宜刺期門傷寒發熱澀澀惡寒其人大渴欲飲酨漿者其腹必滿而自汗出小便利其病欲解此為肝乘肺名曰橫宜刺期門陽明病下血而譫語此為熱入血室但頭汗出者刺期門隨其實而瀉之太陽與少陽合病心下痞堅頸項強而眩宜刺大椎肺俞肝俞勿下之婦人傷寒懷身腹滿不得小便加從腰以下重如有水氣狀懷身七月太陰當養不養此心氣實宜刺瀉勞宮及關元小便利則愈傷寒喉痹刺手少陰穴在腕當小指後動脈是也針入三分補之少陰病下利便膿血者宜刺忌水第十四發汗後飲水多者必喘以水灌之亦喘下利其脈浮大此為虛以強下之故也設脈浮革因爾腸鳴當溫之與水必噦太陽病小便利者為水多心下必悸宜水第十五太陽病發汗後若大汗出胃中乾燥煩不得眠其人欲飲水當稍飲之令胃氣和則愈厥陰渴欲飲水與飲之即愈嘔而吐膈上者必思煮餅急思水者與五苓散飲之水亦得也發汗吐下後病狀第五三十證方一十五首發汗後水藥不得入口為逆未持脈時病人手叉自冒心師因教試令咳而不即咳者此必兩耳無所聞也所以然者重發其汗虛故也發汗後身熱又重發其汗胃中虛冷必反吐也大下後發汗其人小便不利此亡津液勿治其小便利必自愈病人脈數數為熱當消穀引食而反吐者以醫發其汗陽氣微膈氣虛脈則為數數為客熱不能消穀胃中虛冷故吐也病者有寒復發其汗胃中冷必吐蛔一云吐逆發汗後重發其汗亡陽譫語其脈反和者不死服桂枝湯汗出大煩渴不解若脈洪大與白虎湯方見雜療中發汗後身體疼痛其脈沉遲桂枝加芍藥生薑人參湯主之方桂枝三兩芍藥四兩生薑四兩切甘草二兩炙大棗十二枚擘人參三兩上六味以水一斗二升煮取三升去滓溫服一升本云桂枝湯令加芍藥生薑人參太陽病發其汗而不解其人發熱心下悸頭眩身瞤而動振振欲劈地者玄武湯主之方見少陰門發汗後其人臍下悸欲作奔豚茯苓桂枝甘草大棗湯主之方茯苓半斤桂枝四兩甘草一兩炙大棗十五枚擘上四味以水一斗先煮茯苓減二升納諸藥煮取三升去滓溫服一升日三服發汗過多以後其人叉手自冒心心下悸而欲得按之桂枝甘草湯主之方桂枝四兩甘草二兩炙上二味以水三升煮取一升去滓頓服即愈發汗脈浮而數復煩者五苓散主之方見結胸門中發汗後腹脹滿厚朴生薑半夏甘草人參湯主之方厚朴半斤炙生薑半斤切半夏半升洗甘草二兩炙人參一兩上五味以水一斗煮取三升去滓溫服一升日三服發其汗不解而反惡寒者虛故也芍藥甘草附子湯主之方芍藥甘草各三兩炙附子一枚炮去皮破六片上三味以水三升煮取一升二合去滓分溫三服不惡寒但熱者實也當和其胃氣宜小承氣湯方見承氣湯門一云調胃承氣湯傷寒脈浮自汗出小便數頗覆微惡寒而腳攣急反與桂枝欲攻其表得之便厥咽乾煩躁吐逆當作甘草乾薑湯以復其陽厥愈足溫更作芍藥甘草湯與之其腳即伸而胃氣不和可與承氣湯重發汗復加燒針者四逆湯主之甘草乾薑湯方甘草四兩炙乾薑二兩上二味以水三升煮取一升去滓分溫再服芍藥甘草湯方芍藥甘草炙各四兩上二味以水三升煮取一升半去滓分溫再服凡病若發汗若吐若下若亡血無津液而陰陽自和者必自愈傷寒吐下發汗後心下逆滿氣上撞胸起即頭眩其脈沉緊發汗即動經身為振搖茯苓桂枝白朮甘草湯主之方茯苓四兩桂枝三兩白朮甘草炙各二兩上四味以水六升煮取六升去滓分溫三服發汗吐下以後不解煩躁茯苓四逆湯主之方茯苓四兩人參一兩甘草二兩炙乾薑一兩半附子一枚生去皮破八片上五味以水五升煮取二升去滓溫服七合日三服發汗吐下後虛煩不得眠劇者反復顛倒心中懊憹梔子湯主之若少氣梔子甘草湯主之若嘔者梔子生薑湯主之梔子湯方見陽明門梔子甘草湯方於梔子湯中加甘草二兩即是梔子生薑湯方於梔子湯中加生薑五兩即是傷寒下後煩而腹滿臥起不安梔子厚朴湯主之方梔子十四枚擘厚朴四兩炙枳實四枚炙上三味以水三升半煮取一升半去滓分二服溫進一服快吐止後服下以後發其汗必振寒又其脈微細所以然者內外俱虛故也發汗若下之煩熱胸中窒者屬梔子湯證下以後復發其汗者則晝日煩躁不眠夜而安靜不嘔不渴而無表證其脈沉微身無大熱屬附子乾薑湯方附子一枚生去皮破八片乾薑一兩上二味以水三升煮取一升去滓頓服即安太陽病先下而不愈因復發其汗表裡俱虛其人因冒冒家當汗出自愈所以然者汗出表和故也表和故下之傷寒醫以丸藥大下後身熱不去微煩梔子乾薑湯主之方梔子十四枚擘乾薑二兩上二味以水三升半煮取一升半去滓分二服溫進一服得快吐止後服脈浮數法當汗出而愈而下之則身體重心悸者不可發其汗當自汗出而解所以然者尺中脈微此裡虛須表裡實津液自和自汗出愈發汗以後不可行桂枝湯汗出而喘無大熱與麻黃杏子石膏甘草湯麻黃四兩去節杏仁五十枚去皮尖石膏半斤碎甘草二兩炙上四味以水七升先煮麻黃一二沸去上沫納諸藥煮取三升去滓溫服一升本云黃耳杯傷寒吐下後七八日不解熱結在裡表裡俱熱時時惡風大渴舌上乾燥而煩欲飲水數升白虎湯主之方見雜療中傷寒吐下後未解不大便五六日至十餘日其人日晡所發潮熱不惡寒猶如見鬼神之狀劇者發則不識人循衣妄掇怵惕不安微喘直視脈弦者生澀者死微者但發熱譫語與承氣湯若下者勿復服大下後口燥者裡虛故也霍亂病狀第六一十證方三首問曰病有霍亂者何也答曰嘔吐而利此為霍亂問曰病有發熱頭痛身體疼痛惡寒而復吐利當屬何病答曰當為霍亂霍亂吐下利止復更發熱也傷寒其脈微澀本是霍亂今是傷寒卻四五日至陰經上轉入陰當利本素嘔下利者不治若其人即欲大便但反失氣而不利者是為屬陽明必堅十二日愈所以然者經竟故也下利後當堅堅能食者愈今反不能食到後經中頗能食復一經能食過之一日當愈若不愈不屬陽明也惡寒脈微而復利利止必亡血四逆加人參湯主之方四逆湯中加人參一兩即是霍亂而頭痛發熱身體疼痛熱多欲飲水五苓散主之寒多不用水者理中湯主之方五苓散見結胸門人參乾薑甘草炙白朮各三兩上四味以水八升煮取三升去滓溫服一升日三服臍上築者為腎氣動去朮加桂四兩吐多者去朮加生薑三兩下利多者復用術悸者加茯苓二兩渴者加朮至四兩半腹中痛者加人參至四兩半寒者加乾薑至四兩半腹滿者去朮加附子一枚服藥後如食頃飲熱粥一升微自溫暖勿發揭衣被一方蜜和丸如雞黃許大以沸湯數合和一丸研碎溫服日三夜二腹中未熱益至三四丸然不及湯吐利止而身體痛不休當消息和解其外宜桂枝湯小和之吐利汗出發熱惡寒四肢拘急手足厥四逆湯主之既吐且利小便復利而大汗出下利清穀裡寒外熱脈微欲絶四逆湯主之吐已下斷汗出而厥四肢不解脈微欲絶通脈四逆加豬膽湯主之方於通脈四逆湯中加豬膽汁半合即是服之其脈即出無豬膽以羊膽代之吐利發汗其人脈平而小煩此新虛不勝穀氣故也陰易病已後勞復第七七證一方四首附方六首傷寒陰易之為病身體重少氣少腹裡急或引陰中拘攣熱上衝胸頭重不欲舉眼中生花痂胞赤膝脛拘急燒褌散主之方婦人里褌近隱處燒灰上一味水和服方寸匕日三小便即利陰頭微腫此為愈大病已後勞復枳實梔子湯主之方枳實三枚炙豉一升綿裹梔子十四枚擘上三味以酢漿七升先煎取四升次納二味煮取二升納豉煮五六沸去滓分溫再服若有宿食納大黃如博棋子大五六枚服之愈傷寒瘥已後更發熱小柴胡湯主之脈浮者以汗解之脈沉實一作緊者以下解之大病以後腰以下有水氣牡蠣澤瀉散主之方牡蠣熬澤瀉蜀漆洗商陸葶藶熬海藻洗栝蔞根各等分上七味搗為散飲服方寸匕日三服小便即利傷寒解後虛羸少氣氣逆欲吐竹葉石膏湯主之方竹葉二把半夏半升洗麥門冬一升去心甘草炙人參各二兩石膏一斤碎粳米半升上七味以水一斗煮取六升去滓納粳米熟湯成溫服一升日三服大病以後其人喜唾久久不了胸上有寒當溫之宜理中丸病人脈已解而日暮微煩者以病新瘥人強與谷脾胃氣尚弱不能消穀故令微煩損谷即愈雜方附華他曰時病瘥後七日內酒肉五辛油麵生冷醋滑房室皆斷之永瘥書生丁季受殺鬼丸方虎頭骨炙丹砂真珠雄黃雌黃鬼臼曾青女青皂莢去皮子炙桔梗蕪荑白芷芎藭白朮鬼箭削取皮羽鬼督郵藜蘆菖蒲以上各二兩上一十八味搗篩蜜和如彈丸大帶之男左女右劉次卿彈鬼丸方雄黃丹砂各二兩石膏四兩烏頭鼠負各一兩上五味以正月建除日執厭日亦得搗為散白蠟五兩銅器中火上消之下藥攪令凝丸如楝實以赤谷裹一丸男左女右肘後帶之度瘴散方麻黃去節升麻附子炮去皮白朮各一兩細辛乾薑防己防風桂心烏頭炮去皮蜀椒汗桔梗各二兩上一十二味搗篩為散密貯之山中所在有瘴氣之處旦空腹飲服一錢匕覆取汗病重稍加之老君神明白散方白朮附子炮去皮各二兩桔梗細辛各一兩烏頭炮去皮四兩上五味粗搗篩絳囊盛帶之所居閭里皆無病若有得疫者溫酒朝一方寸匕覆取汗得吐即瘥或經三四日者以三方寸匕納五升水中煮令沸分溫三服太一流金散方雄黃三兩雌黃羖羊角各二兩礬石一兩燒令汁盡鬼箭削取皮羽一兩半上五味搗篩為散以細密帛裹之作三角絳囊盛一兩帶心前並挂門閣窗牖上若逢大疫之年以朔旦平明時以青布裹一刀圭中庭燒之有病者亦燒熏之若遭毒螫者以唾塗之務成子熒火丸主闢疾病惡氣百鬼虎狼蛇虺蜂蠆諸毒五兵白刃盜賊凶害昔冠軍將軍武威太守劉子南從尹公受得此方以永平十二年於北界與虜戰敗績士卒略盡子南被圍矢下如雨未至子南馬數尺矢輒墮地虜以為神人乃解圍而去子南以方教子及諸兄弟為將者皆未嘗被傷纍世祕之漢末青牛道士得之以傳安定皇甫隆隆以傳魏武帝乃稍有人得之故一名冠軍丸一名武威丸方熒火鬼箭削取皮羽蒺藜各一兩雄黃雌黃礬石各二兩燒汁盡羖羊角鍛灶灰鐵錘柄入鐵處燒焦各一兩半上九味搗篩為散以雞子黃並丹雄雞冠一具和之如杏仁大作三角絳囊盛五丸帶左臂若從軍繫腰中勿離身若家挂戶上甚闢盜賊絶止也
