二十五味搗篩為末煉蜜和丸空腹酒下如梧子大十丸日三稍加至三十丸附子丸主胸膈中寒溫不和心下宛宛痛逆害飲食氣滿噓吸乾噫吞酸胸背中冷兩脅急痛腹中有冷水抑抑作聲繞臍痛頭眩滿悶身體羸瘦方附子炮去皮人參各二兩芎藭半兩乾薑二兩半礜石一兩煉皂莢炙去皮子半夏洗桂心礬石各五分燒吳茱萸茯苓黃芩各三分當歸細辛蜀椒汗去目閉口者芍藥各一兩麥門冬去心甘草炙各一兩半上一十八味搗篩為末煉蜜和丸如梧子未食酒服二丸日三人參丸主百病三蟲疝瘕成魚鱉蝦蟆令人面目枯無潤澤精寒勞瘦方人參龍膽杏仁去皮尖及雙仁熬礜石各二兩煉曾青三分黃石脂一兩上六味搗篩為末餳和為丸如梧子飲服二丸日三亦可作散服一刀圭服藥二日白蟲下十日長蟲下有蟲皆相隨下耐藥者二十日乃下乾薑丸主胃中冷不能食或食已不消方乾薑十兩赤石脂六兩上二味搗篩為末煉蜜和丸如梧子服十丸日三稍加至三十丸服不限食前食後八等散主消穀下氣神驗方白朮厚朴炙人參茯苓吳茱萸陳曲麥糵芎藭各三兩上八味搗篩為散食後酒服方寸匕日二服治虛勞冷飲食不消勞倦噫氣脹滿憂恚不解人參散方人參茯苓陳曲厚朴炙麥糵白朮吳茱萸各二兩檳榔八枚上八味搗篩為散食後酒服方寸匕日二服麻豆散主脾氣僻弱不下食服此以當食方大麻子三升熬香末大豆黃末一升上二味和飲服一合日四五任性多少乾薑散主不食心意冥然不憶食方乾薑干豉神麯蜀椒汗去目閉口者大麥糵上五味各一升搗篩為散食後酒服方寸匕日三以食為度論曰凡人食生冷雜物或寒時衣薄當風食不消化或夜食冷臥心腹脹滿煩急或連日不瘥者燒地令熱以席布上厚覆取汗便愈其地沃水去大熱又坐臥於上一月日永瘥凡食過飽煩悶但欲臥腹脹熬曲末令香酒服一方寸匕日五六服大麥糵益佳雜療第八方法一百二十首鐵屑炒使極熱投酒中飲之療賊風痙又裹以尉腋療狐臭有驗石灰療金瘡止血大效若五月五日采蘩蔞葛葉鹿活草槲葉芍藥地黃葉蒼耳青蒿葉合搗石灰為團如雞卵曝乾末以療瘡生肌大神驗桑薪灰療黑子疣贅用煮小豆下水腫青蒿灰燒蒿作之柃灰燒木葉作之並堪蝕惡肉東壁土摩干濕癬極有效茺蔚莖搗敷疔腫服汁使疔腫毒內消又下子死腹中主産後血脹悶諸毒腫丹油等腫取汁如豆滴耳中主聤耳中虺蛇毒敷之良莎草根名香附子大下氣除胸腹中熱艾主下血衄血膿血痢水煮及丸散任用草蒿生挼敷金瘡大止血生肉止疼痛良羊桃取根煮以洗風癢及諸瘡腫羊蹄主赤白雜痢又療蠱毒蚤休醋磨療癰腫蛇毒苧根安胎貼熱丹毒腫漚苧汁主消渴萆麻葉油塗炙熱尉囟上止衄尤驗甘焦根搗汁服主産後血脹悶敷腫去熱毒松花名松黃拂取酒服輕身療病勝皮葉及脂松取枝燒其上下承取汁名㶆主牛馬瘡疥柏枝節煮以釀酒主風痹歷節燒取㶆療瘑疥及癩瘡良牡荊葉主久痢霍亂轉筋血淋下部瘡濕䘌薄腳主腳氣腫滿其根水煮服主心風頭風肢體諸風解肌發汗槐八月斷大枝使生嫩葉煮汁釀酒療大風痿痹槐耳主五痔心痛婦人陰中瘡痛枝炮尉止蠍毒檳榔仁主腹脹生搗末服利水穀道敷瘡生肌肉止痛燒為灰主口吻白瘡桑椹主消渴葉水煎取濃汁除腳氣水腫利大小腸鼠李木皮主諸瘡寒熱毒痹子採取日乾丸蒸酒漬服二合日再通下血及碎肉除疝瘕積冷氣大良杉材水煮汁浸捋腳氣滿服之療心腹脹痛出惡氣櫸皮煮汁以療水及斷痢取嫩葉挼貼火爛瘡有效莢蒾煮枝汁和作粥甚美以飼小兒殺蛔蟲藥子主破血止痢消腫除蠱疰蛇毒柳木枝及木中蟲屑枝皮主痰熱淋可為吐湯煮洗風腫癢煮含主齒痛木中蟲屑可為浴湯主風瘙癢癮疹大效梓口皮主吐逆胃反去三蟲小兒熱瘡身頭熱煩蝕瘡湯洗之並封敷嫩葉主爛瘡枳椇苗藤切以酒浸服或以釀酒去風冷症癖亂髮灰療轉胞小便不通赤白痢哽噎鼻衄癰腫狐尿刺尸疰下腫骨癰雜瘡人乳取首生男乳療目赤痛多淚解獨肝牛肉毒合豉濃汁服之神效又和雀屎去目赤胬肉人屎主諸毒猝惡熱黃悶欲死者新者最效須與水和服之其乾者燒之煙絶水漬飲汁傷寒熱毒水漬飲彌善破疔腫開以新者封之一日根爛尿主猝血攻心被打內有瘀血煎服一升又主症積滿腹諸藥不瘥者服之皆下血片塊二十日即出也亦主久嗽上氣失聲溺垽白燒研末主緊唇瘡溺坑中竹木主小兒齒不生正旦刮塗之即生熊膽療時氣熱盛變為黃疸暑月久痢疳䘌心痛注忤腦療諸聾血療小兒客忤脂長髮令黑悅澤人面酒煉服之瘥風痹羊膽療疳濕時行熱熛疽瘡和醋服之良羊肺療渴止小便數並小豆葉煮食之羊腎合脂為羹療勞利甚效蒜薤食脂一升療癥瘕羊屎煮湯下灌療大人小兒腹中諸疾疳濕大小便不通燒之熏鼻主中惡心腹刺痛熏瘡療諸瘡中毒痔瘻等骨蒸彌良羊肝療肝風虛熱目赤暗無所見生子肝七枚神效療頭風眩瘦疾小兒驚癇骨療同血主女人中風血虛悶産後血暈悶欲絶者生飲一升即活牛鼻中木卷療小兒癇草卷燒之為屑主小兒鼻下瘡耳中垢主蛇傷惡或毒臍中毛主小兒久不行白牛懸蹄主婦人崩中漏下赤白屎主霍亂屎中豆主小兒癇婦人産難特牛莖主婦人漏下赤白無子烏牛膽主明目及甘濕以釀槐子服之腦主消渴風眩齒主小兒驚癇尿主消渴黃疸水腫腳氣小便不通馬毛主小兒驚癇白馬眼主小兒魃母帶之屎中粟主金瘡小兒客忤寒熱不能食絆繩主小兒癇並煮洗之狗骨灰主下痢生肌敷馬瘡烏狗血主産難橫生血上搶心下頷骨主小兒諸癇陰卵主婦人十二疾為灰服之毛主産難白狗屎主疔瘡水絞汁服主諸毒不可入口者鹿頭主消渴筋主勞損續絶骨主虛勞可為酒主風補虛髓脂主癰腫死肌溫中四肢不隨風頭通腠理角主貓鬼中惡心腹疰痛血主狂犬傷鼻衄折傷陰痿補虛止腰痛齒主留血氣鼠瘻心腹痛虎屎主惡瘡眼睛主癲屎中骨為屑主火瘡牙主丈夫陰瘡及疽瘻鼻主癲疾小兒驚癇貍屎灰主寒熱鬼瘧發無期度者極驗家貍亦好一名貓也兔皮毛合燒為灰酒服主産難後衣不出及余血搶心欲死者頭皮主鬼疰毒氣在皮中如針刺者又主鼠瘻膏主耳聾駱駝毛蹄甲主婦人赤白帶下最善豬耳中垢主蛇傷豬腦主風眩腦鳴及凍瘡血主奔豚暴氣中風頭眩淋瀝乳汁主小兒驚癇病乳頭亦同發汗十二月上亥日取肪脂納新瓦器中埋亥地百日主癰疽膒脂一升著雞子十四枚更良獺四足皮主手足腫瘃狐肉及腸作臛食之主疥瘡久不瘥者腸主牛疫燒灰和水灌之白雞距及腦主産難燒灰酒服之腦主小兒驚癇鵝毛主小兒驚癇極者又燒灰主噎鴨肪主水腫血主解諸毒肉主小兒驚癇頭主水腫通利小便雁喉下白毛療小兒癇有效鷹屎灰酒服方寸匕主惡酒勿使飲人知雀屎以蜜和為丸飲服主症癖久痼冷病或和少乾薑服之大肥悅人胡燕卵主水腫肉出痔蟲越燕屎亦療痔殺蟲去目翳蝙蝠屎灰酒服方寸匕主子死腹中腦主女子面皰服之令人不忘也龜取以釀酒主大風緩急四肢拘攣或久癱緩不收攝皆瘥鯉魚骨主陰蝕哽不出血主小兒丹腫及瘡皮主丹癮疹腦主諸癇腸主小兒肌瘡蠡魚腸及肝主久敗瘡中蟲諸魚灰並主哽噎干鱔頭主消渴食不消去冷氣除痞疹其穿魚繩主竹木屑入目不出穿鮑魚繩亦主眯目去刺煮汁洗之露蜂房亂髮蛇皮三味合燒灰酒服方寸匕日二主諸惡疽附骨癰根在臟腑歷節腫出疔腫惡脈諸毒皆瘥又水煮露蜂房一服五合汁下乳石熱毒壅悶服之小便中即下石末大效水煮洗狐刺療服之瘡上氣赤白痢尿失禁蟬殼主小兒癇女人生子不出灰服之主久痢蚱蟬主小兒癇絶不能言白殭蠶末之封疔腫根當自出極效鱉頭燒灰主小兒諸疾又主産後陰脫下墜尸疰心腹痛鰻鱺魚膏療耳中有蟲痛者蝦蟆腦主明目療青盲蛇屎療痔瘻器中養取之皮灰療疔腫惡瘡骨疽蛻皮主身癢瘑疥癬等蜘蛛療小兒大腹丁奚三年不能行者又主蛇毒溫瘧霍亂止嘔逆蚯蚓鹽沾為汁療耳聾屎封狂犬傷毒出犬毛神效蜣螂搗為丸塞下部引痔蟲出盡永瘥蜆殼陳久者療反胃及失精田中螺殼療口疰心腹痛又主失精水漬飲汁止渴棗葉揩熱癤瘡良藕主熱渴散血生肌久服令人心歡栗嚼生者塗瘡上療筋骨斷碎疼痛腫瘀血其皮名扶搗為散蜜和塗肉令急縮毛殼療火丹毒腫飼孩兒令齒不生木白皮水煮汁主溪毒櫻桃葉搗敷蛇毒絞取汁服防蛇毒內攻梅根療風痹出土者殺人梅實利筋脈去痹枇杷葉主咳逆不下食火柿主殺毒療金瘡火瘡主肉止痛軟柿熟柿解酒熱毒止口乾壓胸間熱烏芋一名慈菰主百毒産後血悶攻心欲死産難衣不出搗汁服一升桃膠主下石淋破血中惡疰忤花主下惡氣消腫滿利大小腸梨削貼湯火瘡不爛止痛易瘥又主熱嗽止渴葉主霍亂吐痢不止煮汁服之赤莧主赤痢又主射工沙蝨馬莧一名馬齒草主諸腫瘻疣目搗揩之飲汁主反胃諸淋金瘡血流破血症癖小兒尤良用汁洗緊唇面皰馬汗射工毒塗之瘥蔓荊子療黃疸利小便水煮五升取濃汁服主癥瘕積聚少飲汁主霍亂心腹脹末服主目暗白芥子主射工及疰氣發無常處丸服之或搗為沫醋和塗之隨手有驗苜蓿莖葉平根寒主熱病煩滿目黃赤小便黃酒疸搗取汁服一升令吐利即愈水蓼主被蛇傷搗敷之絞取汁服止蛇毒入腹心悶者又水煮漬腳捋之消腳氣腫胡蔥主諸惡或狐屎刺毒山溪中沙蝨射工等毒煮汁浸或搗敷大效白蘘荷根主諸惡瘡殺蠱毒根心三稻麥芒入目中不出以汁注目中即出雞蘇主吐血衄血下氣消穀大效苦瓠瓤主水腫石淋吐呀嗽囊結疰蠱痰飲或服之過分令人吐利不止宜以黍穰灰汁解之又煮汁漬陰療小便不通胡麻生嚼塗小兒頭瘡及浸淫惡瘡大效小豆葉名藿止小便數去煩熱大麥面平胃止渴消食療脹小麥面止痢平胃主小兒癇消食痔又有女曲黃蒸女曲完小麥為之一名䴷黃蒸磨小麥為之一名黃衣並消食止瀉痢下胎破冷血粟米泔汁主霍亂猝熱心煩渴飲數升立瘥臭泔止消渴良米麥粆主寒中除熱渴解煩消石氣蒸米麥熬靡作之一名糗也白英鬼目草也蔓生葉似王瓜小長而五丫實丸若龍葵子生青熟紫黑煮汁飲解勞地膚子搗絞取汁主赤白痢洗眼去熱暗雀盲澀痛其苗灰主痢亦善防風叉頭者令人發狂叉尾者發痼疾子似胡荽子而大調調食用之香而療風更佳石龍芻主療蛔蟲及不消食絡石生陰濕處蔓延繞木石側冬夏常青十月子黑而圓名石龍藤療産後血結又主蝮蛇瘡絞汁洗之服汁亦去蛇毒心悶金瘡封之立瘥千歲虆莖大如碗汁味甘子味甘酸似葡萄其莖主噦逆大善傷寒後嘔噦更良天名精鹿活草也主破血生肌止渴利小便殺三蟲除諸毒疔瘡瘻痔金瘡內射身癢癮疹不止者揩之立已葛根末主狂犬傷人並飲其汁燒葛燒灰水服方寸匕止喉痹苦參十月採子服如槐子法久服輕身不老明目有效蒼耳三月以後七月以前刈取日乾為散夏月水服冬酒服主大風癲癇頭風濕痹毒在骨髓日二服丸服二三十丸散服一二匕服滿百日病當出如瘑疥或癢汁出或斑駁甲錯皮起後乃皮落肌如凝脂令人省睡除諸毒螫殺甘濕䘌久服益氣耳目聰明輕身強志主腰膝中風毒尤良亦主猘狗毒菅花主衄血吐血灸瘡王蓀主金瘡破血生肌肉止痛赤白痢補虛益氣除腳氣爵床療血脹下氣又主杖瘡汁塗立瘥蜀羊泉俗名漆姑葉主小兒驚惡實根主牙齒疼痛勞瘧腳緩弱風毒癰疽咳嗽傷肺肺癰疝瘕積血又主諸風癥瘕冷氣子吞一枚出癰疽頭榆仁醬利大小便蕪荑醬殺三蟲凡山中石上草中多有蛭食人血入肉中浸淫起方用灸斷其道即瘥又方常以臘月豬脂和鹽塗腳及足指間足趺上並鞋上則不著人用術法薑黃生蜀中者真土蕃詐中國人云療萬病一個一段價買之不可得後人知是薑黃更不改將入來凡薑黃不得嚼嚼之損齒療一切腫初覺刮取末和水塗之數度瘥難産刮取一個作末和水服之即生酒亦得産後腹中不淨刮取末水和服之愈馬胞轉剖取末筒吹半大豆許耳鼻中即通此藥末滿月孕婦勿令見好落娠慎之貯薑黃法以袋盛置白米大小麥中袋中著少許米懸乾燥處勿令雞犬女人見之造麋鹿二角膠法二月九月為上時取新角連臺骨者上細銼大盆中浸一宿即淘汰使極淨待澄去下惡濁汁取上清水還浸一宿又淘汰如前澄法下惡濁取汁浸三宿澄取清水並所漬骨角微微火煮大率角屑一石水三石去角澄取清汁煎水盡至五升許出貯銅器中湯上煎之三日三夜如糖出置盤上待凝以竹刀割為薄片於淨布上曝乾成也其煮角者更細銼之加水一倍煮成至三四升納銅器中重湯煎如前法服法炙膠使極黃沸搗篩為散每膠一斤末以大附子二兩炮又一法取惟大者去皮細切炙令黃勝炮旦空腹酒服方寸匕日再稍稍加至二匕不可過二匕補五臟六腑虛羸瘦極陳者為上殺烏三建法烏頭二月採天雄附子側子並八月採春宜早秋宜晚採得淨去鬚毛其莖留二分先以大木桶納酢泔三斛酒糟七升攪之經三日後用次法一如次第遂至法畢上以粟米一升淨淘搗作粉以烏頭安桶中厚三寸布令平即摻米粉令遍復加烏頭如前法又加米粉如次第遂至滿桶去口三寸即止然後取糟汁去桶中一畔下又沒烏頭二寸以物蓋之九月即八九日若十月即經十日候桶中汁上頭衣作紫色遍即出烏頭以刀刮截看里許白黃脈斷即熟且看衣紫色即熟不須致疑即取白茅曝一日得蔫即得不得太乾於廠屋底乾地上布茅厚五寸漉出烏頭令乾以布茅上勿令相重其上令布茅厚五寸四邊閉塞以茅令密經再宿三日從一邊卻茅看之若衣勻斑斑然即好若著白斑又更覆一宿以衣足為限即徐徐去上茅更經一宿安徐取於廠下薄上布勿令相重經二十一日後捻出日中曝之三日即成也又法烏頭四月收天雄附子側子八月收上先煎水作生熟湯治附子如前方法內著湯中密封勿瀉經半日出取自灰裛數易灰使干日曝之其米粥及糟曲等法並不及此法服鹽藥法無藥州土則須服之大益成州鹽官第一次綿州封井次鹽州富因井次益州貴平井上四井鹽可服之上法服先以大豆許鹽置口中勿咽之須臾津液滿口令近齒以方寸匕鹽納口中和津液一時咽之日一服凡瘧新患者一服得快利即愈百日以上者五服瘥若一月服之終身不發諸下痢初患一兩服即瘥赤白久痢經年者一七二七服瘥諸心腹痛癥結宿澼積聚吐逆食不化者一年以上二三十年不過三月服之其痢及諸病皆愈初服時痢益極者勿怪之也諸氣滿喘逆不能食者一服即散日服之則根本皆除天氣熱疾頭痛目眩四肢煩熱者一服得吐利瘥諸頭面皮膚百節皆風一月服之瘥若初服十日內眉間益悶勿怪諸痰飲咳逆不能食息者一服瘥諸虛勞傷損骨節疼痛起止失聲者二七日服之少氣乏力面無顏色十日服之能三十日服佳也常以平日空腹服之率以三匕為節須得吐利者須一度多服三匕以上令人大吐利終不傷人若覺煩熱數數飲冷水若至他方異域不伏水土到即服之得一升百事不懼鹽能補虛去冷熱若有宿食不消變成霍亂一服即瘥
