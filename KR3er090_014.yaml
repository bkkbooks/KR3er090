body:
  text: 卷第十四退居論曰人生一世甚於過隙役役隨物相視俱盡不亦哀乎就中養衛得理必免夭橫之酷若知進而不知退知得而不知喪嗜欲煎其內權位牽其外其於過分內熱之損胡可勝言況乎身滅覆宗之禍不絶於世哉念撰退居養志七篇庶無禍敗夭橫之事若延年長生則存乎別録高人君子宜審思之擇地第一山林深遠固是佳境獨往則多阻數人則喧雜必在人野相近心遠地偏背山臨水氣候高爽土地良沃泉水清美如此得十畝平坦處便可構居若有人功可至二十畝更不得廣廣則營為關心或似産業尤為煩也若得左右映帶岡阜形勝最為上地地勢好亦居者安非他望也締創第二看地形向背擇取好處立一正屋三間內後牽其前梁稍長柱令稍高椽上著棧棧訖上著三四寸泥泥令平待乾即以瓦蓋之四面築牆不然塹壘務令厚密泥飾如法須斷風隙拆縫門窗依常法開後門若無瓦草蓋令厚二尺則冬溫夏涼於簷前西間作一格子房以待客客至引坐勿令入寢室及見藥房恐外來者有穢氣損人壞藥故也若院外置一客位最佳堂後立屋兩間每間為一房修泥一準正堂門令牢固一房著藥藥房更造一立匱高腳為之天陰霧氣匱下安少火若江北則不須火也一房著藥器地上安厚板板上安之著地土氣恐損正屋東去屋十步造屋三間修飾準上二間作廚北頭一間作庫庫內東牆施一棚兩層高八尺長一丈闊四尺以安食物必不近正屋近正屋則恐煙氣及人兼慮火燭尤宜防慎於廚東作屋二間弟子家人寢處於正屋西北立屋二間通之前作格子充料理曬曝藥物以籬院隔之又於正屋後三十步外立屋二間椽梁長壯柱高間闊以安藥爐更以籬院隔之外人不可至也西屋之南立屋一間引簷中隔著門安功德充念誦入靜之處中門外水作一池可半畝余深三尺水常令滿種禾呈糸荷菱芡繞池岸種甘菊既堪採食兼可悅目怡間也服藥第三人非金石況犯寒熱霧露既不調理必生疾癘常宜服藥闢外氣和臟腑也平居服五補七宣丸鍾乳丸量其性冷熱虛實自求好方常服其紅雪三黃丸青木香丸理中丸神明膏陳元膏春初水解散天行茵陳丸散皆宜先貯之以防疾發忽有卒急不備難求臘日合一劑烏膏楸葉膏以防癰瘡等若能服食尤是高人世有偶學合煉又非真好或身嬰朝紱心迫名利如此等輩亦何足言今退居之人豈望不死羽化之事但免外物逼切庶幾全其天年然小小金石事又須間解神精丹防危救急所不可缺耳伏火丹砂保精養魂尤宜長服伏火石硫黃救腳氣除冷癖理腰膝能食有力小還丹愈疾去風伏火磁石明目堅骨火煉白石英紫石英療結滯氣塊強力堅骨伏火水銀壓熱鎮心金銀膏養精神去邪氣此等方藥固宜留心功力各依本草其餘丹火以冀神助非可卒致有心者亦宜精懇倘遇其真飲食第四身在田野尤宜備贍須識罪福之事不可為食損命所有資身在藥菜而已料理如法殊益於人枸杞甘菊朮牛膝苜蓿商陸白蒿五加服石者不宜吃商陸以上藥三月以前苗嫩時採食之或煮或蒸或炒或䔲悉用土蘇咸豉汁加米等色為之下飯甚良蔓荊作蒸最佳不斷五辛者春秋嫩韭四時採薤甚益曲雖雍熱甚益氣力但不可多食致令悶憒料理有法節而食之百沸餺飥蒸餅及糕索餅起面等法在食經中白粳米白粱黃粱青粱米常須貯積支料一年炊飯煮粥亦各有法並在食經中緑豆紫蘇烏麻亦須宜貯俱能下氣其餘豉醬之徒食之所要皆須貯蓄若肉食者必不得害物命但以錢買猶愈於殺第一戒慎勿殺若得肉必須新鮮似有氣息則不宜食爛臟損氣切須慎之戒之料理法在食經中食後將息法平旦點心飯訖即自以熱手摩腹出門庭行五六十步消息之中食後還以熱手摩腹行一二百步緩緩行勿令氣急行訖還床偃臥四展手足勿睡頃之氣定便起正坐吃五六顆煎棗啜半升以下人參茯苓甘草等飲覺似少熱即吃麥門冬竹葉茅根等飲量性將理食飽不得急行及飢不得大語遠喚人嗔喜臥睡覺食散後隨其事業不得勞心勞力覺肚空即須索食不得忍飢必不得食生硬黏滑等物多致霍亂秋冬間暖裹腹腹中微似不安即服厚朴生薑等飲如此將息必無橫疾養性第五雞鳴時起就臥中導引導引訖櫛漱即巾巾後正坐量時候寒溫吃點心飯若粥等若服藥者先飯食服吃藥酒消息訖入靜燒香靜念不服氣者亦可念誦洗雪心源息其煩慮良久事訖即出徐徐步庭院間散氣地濕即勿行但屋下東西步令氣散家事付與兒子不得關心所營退居去家百里五十里但時知平安而已應緣居所要並令子弟支料頓送勿令數數往來憒鬧也一物不得在意營之平居不得嗔不得大語大叫大用力飲酒至醉併為大忌四時氣候和暢之日量其時節寒溫出門行三里二里及三百二百步為佳量力行但勿令氣乏氣喘而已親故鄰里來相訪問攜手出遊百步或坐量力宜談笑簡約其趣才得歡適不可過度耳人性非合道者焉能無悶悶則何以遣之還須蓄數百卷書易老莊子等悶來閲之殊勝悶坐衣服但粗縵可禦寒暑而已第一勤洗浣以香沾之身數沐浴務令潔淨則神安道勝也浴法具養生經中所將左右供使之人或得清淨弟子精選小心少過謙謹者自然事間無物相惱令人氣和心平也凡人不能絶嗔得無理之人易生嗔喜妨人道性種造藥第六種枸杞法揀好地熟斸加糞訖然後逐長開壠深七八寸令寬乃取枸杞連莖銼長四寸許以草為索慢束束如羹碗許大於壠中立種之每束相去一尺下束訖別調爛牛糞稀如麵糊灌束子上令滿減則更灌然後以肥土擁之滿訖土上更加熟牛糞然後灌水不久即生乃如剪韭法從一頭起首割之得半畝料理如法可供數人其割時與地面平高留則無葉深剪即傷根割仍避熱及雨中但早朝為佳又法但作束子作坑方一尺深於束子三寸即下束子訖著好糞滿坑填之以水澆糞下即更著糞填以不減為度令糞上束子一二寸即得生後極肥數鋤擁每月加一糞尤佳又法但畦中種子如種菜法上糞下水當年雖瘦二年以後悉肥勿令長苗即不堪食如食不盡即剪作乾菜以備冬中常使如此從春及秋其苗不絶取甘州者為真葉厚大者是有刺葉小者是白棘不堪服食慎之又法枸杞子於水盆挼令散訖曝乾斸地作畦畦中去卻五寸土作壠縛草作木茖八以臂長短即以泥塗木茖八上令遍以安壠中即以子布泥上一面令稀稠得所以細土蓋上令遍又以爛牛糞蓋子上令遍又布土一重令與畦平待苗出時時澆溉及堪採即如剪韭法更不要煮煉每種用二月初一年但五度剪不可過此也凡枸杞生西南郡谷中及甘州者其子味過於蒲桃今蘭州西去鄴城靈州九原並多根莖尤大種百合法上好肥地加糞熟斸訖春中取根大者擘取瓣於畦中種如蒜法五寸一瓣種之直作行又加糞灌水苗出即鋤四邊絶令無草春後看稀稠得所稠處更別移亦得畦中干即灌水三年後甚大如芋然取食之又取子種亦得或一年以後二年以來始生甚遲不如種瓣種牛膝法秋間收子至春種如種菜法上加糞水溉苗出堪採即如剪菜法常須多留子秋中種亦好其收根者別留子取三畝肥地熟耕更以長鍬深掘取其土虛長也土平訖然下子荒即耘草旱則溉至秋子成高刈取莖收其子九月末間還用長鍬深掘取根如法料理種合歡法萱草也移根畦中稀種一年自稠春剪苗食如枸杞夏秋不堪食種車前子法收子春中取土地加糞熟斸水溉剪取如上法此物宿根但耘灌而已可數歲也種黃精法擇取葉參差者是真取根擘破稀種一年以後極稠種子亦得其苗甚香美堪吃種牛蒡法取子畦中種種時乘雨即生若有水不要候雨也地須加糞灼然肥者旱即澆水剪如上法菜中之尤吉但多種食苗及根並益人種商陸法又取根紫色者白色者良赤及黃色者有毒根擘破畦中作行種種子亦得根苗並堪食色紫者味尤佳更勝白者淨洗熟蒸不用灰汁煮煉並無毒尤下諸藥服丹砂乳石等人不宜服種五加法取根深掘肥地二尺埋一根令沒舊痕甚易活苗生從一頭剪取每剪訖鋤土擁之種甘菊法移根最佳若少時折取苗乘雨中濕種便活一年之後子落遍地長服者及冬中收子剪如韭法種苜蓿法老圃多解但肥地令熟作壠種之極益人還須從一頭剪每一剪加糞鋤土擁之種蓮子法又八月九月取堅黑子瓦上磨尖頭直令皮薄取墐土作熟泥封如三指大長二寸使蒂頭兼重令磨須尖泥欲干時擲置池中重頭向下自能周正薄皮上易生數日即出不磨者卒不可生種藕法春初掘取根三節無損處種入深泥令到硬土當年有花種青蘘法即胡麻苗也取八稜者畦中如菜法種之苗生採食秋間依此法種之甚滑美種地黃法十二月耕地至正月可止三四遍細耙訖然後作溝溝闊一尺兩溝作一畦畦闊四尺其畦微高而平硬甚不受雨水苗未生間得水即爛畦中又撥作溝溝深三寸取地黃切長二寸種於溝中訖即以熟土蓋之其土可厚三寸以上每種一畝用根五十斤蓋土訖即取經冬爛穰草覆之候稍牙出以火燒其草令燒去其苗再生者葉肥茂根葉益壯自春至秋凡五六遍耘不得用鋤八月堪採根至冬尤佳至時不採其根大盛春二月當宜出之若秋採訖至春不須更種其種生者猶得三四年但採訖耙之明年𧂭耘而已參驗古法此為最良按本草二月八月採殊未窮物性也八月殘葉猶在葉中精力未盡歸根二月新葉已生根中精氣已滋於葉不如正月九月採殊妙又與蒸曝相宜古人云二月八月非為種者將謂野生當須見苗耳若食其葉但露散後摘取旁葉勿損中心正葉甚益人勝諸菜造牛膝法八月中長鍬掘取根水中浸一宿密置篩中手挼去上皮齊頭曝令稍干屈令直即作束子又曝令極干此看端正若自用者不須去皮但洗令淨便曝殊有氣力造干黃精法九月末掘取根揀取肥大者去目熟蒸微曝乾又蒸曝乾食之如蜜可停造生乾地黃法地黃一百斤揀擇肥好者六十斤有須者去之然後淨洗漉干曝三數日令微皺乃取揀退四十斤者淨洗漉干於柏木臼中熟搗絞取汁汁如盡以酒投之更搗絞即引得余汁盡用拌前六十斤乾者於日中曝乾如天陰即於通風處薄攤之夜亦如此以干為限此法比市中者氣力數倍頓取汁恐損隨日搗絞用令當日盡佳造熟乾地黃法斤數揀擇一一準生法浸訖候好晴日便早蒸之即曝於日中夜置汁中以物蓋之明朝又蒸古法九遍止今但看汁盡色黑熟蒸三五遍亦得每造皆須春秋二時正月九月緣冷寒氣方可宿浸二月八月拌而蒸之不可宿浸也地黃汁經宿恐醋不如日日搗取汁用凡曝藥皆須以床架上置薄罩等以通風氣不然日氣微弱則地氣止津也於漆盤中曝最好罩多汗又損汁藕粉法取粗藕不限多少灼然淨洗截斷浸三宿數換水看灼然淨訖漉出碓中碎搗絞取汁重搗絞取濃汁盡為限即以密布濾粗惡物澄去清水如稠難澄以水攪之然後澄看水清即瀉去一如造米粉法雞頭粉取新熟者去皮熟搗實如上法菱角粉去皮如上法葛根粉去皮如上法開胃口止煩熱也蒺藜粉搗去上皮簸取實如上法此粉去風輕身茯苓粉銼如彈子以水浸去赤汁如上法栝蔞根粉去皮如上法種樹法須望前種十五日後種少實種杏法杏熟時並肉核埋糞中凡薄地不生生且不茂至春生後即移實地栽之不移即實小味苦樹下一歲不須耕耕之即肥而無實也種竹法欲移竹先掘坑令寬下水調細土作泥如稀煎餅泥即掘竹須四面鑿斷大作土科連根以繩周下抨舁之勿令動著竹動則損根多不活掘訖舁入坑泥中令泥周匝總滿如泥少更添土著水以物勻攪令實其竹根入坑不得埋過本根若竹稍長者以木深埋入土架縛之恐風搖動即死種樹亦如此竹無時樹須十二月以後三月以前宜去根尺五寸留栽來年便生筍泥坑種動搖必不活種梔子法臘月折取枝長一尺五寸以來先鑿坑一尺闊五寸取枝屈下拗處如球杖卻向上令有葉處坑向上坑口出五寸一邊約著土實訖即下肥土實築灼然堅訖自然必活二年間即有子作籬法於地四畦掘坑深二尺闊二尺坑中熟斸酸棗熟時多收取子坑中概種之生後護惜勿令損一年後高三尺間去惡者一尺以下留一莖稀稠行伍端直來春剝去橫枝留距不留距恐瘡大至冬凍損剝訖編作笆籬隨宜夾縛務令緩舒明年更編高七尺便定種榆柳並同法木槿木芙蓉更堪看種枳法秋收取枳實破作四片於陰地熟斸加糞即稠種之至春生隔一冬高一尺然後移栽每一尺種一栽至高五尺以物編之甚可觀也雜忌第七屋宇宅院成後不因崩損輒有修造及妄動土二尺以下即有土氣慎之為佳初造屋成恐有土木氣待泥干後於庭中醮祭訖然後擇良日入居居後明日燒香結界發願願心不退轉早悟道法成功德藥無敗壞結界如後平旦以清水漱口從東南方左轉誦言緊沙迦羅又到西南角言你自受殃又從東南角言緊沙迦羅又到西南角言你自受殃一一如是滿七遍盜賊皆便息心不能為害矣或入山野亦宜作此法或在道路逢小賊作障難即定心作降伏之意咒言緊沙迦羅緊沙迦羅一氣盡為度亦自壞散也此法祕妙是釋門深祕可以救護衆生大慈悲故不用令孝子弋獵魚捕之人入宅不用輒大叫喚每栽樹木量其便利不須等間漫種無益柴炭等並年支不用每日令人出入門巷惟務寂然論曰看此論豈惟極助生靈亦足以誡於貪榮之士無敗禍之釁庶忠義烈士味之而知止足矣
