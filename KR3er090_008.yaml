各半兩桃仁一百枚去皮尖雙仁熬蟅蟲熬牡丹皮各二兩乾薑六兩葶藶子五合熬令紫色上一十四味搗篩為末別搗桃仁杏仁如泥煉蜜和為丸如梧桐子大空腹酒服七丸日三服不知稍增之此方與前七熬丸同多三味治腰腹痛月水不通利方當歸四兩芎藭人參牡蠣熬土瓜根水蛭熬各二兩虻蟲去翅足熬丹砂研烏頭炮去皮乾漆熬各一兩桃仁五十枚去皮尖兩仁熬別搗如泥上一十一味搗篩為末煉蜜和丸如梧桐子大空腹酒服三丸日三服治月閉不通不欲飲食方大黃一斤柴胡芒硝各五兩牡蠣熬一兩葶藶子二兩熬令紫色別搗芎藭二兩半乾薑三兩蜀椒汗一十兩去目及閉口者茯苓三兩半杏仁五合熬別搗如膏虻蟲熬去翅足水蛭熬各半兩桃仁七十枚去皮尖雙仁熬別搗如膏上一十三味搗篩為末和前件葶藶桃仁杏仁等脂煉蜜和為丸如梧桐子大飲服七丸日再亦與七熬丸同多二味治月水不通六七年或腫滿氣逆腹脹癥瘕服此方數有神效大虻蟲丸方虻蟲四百枚去翅足熬水蛭三百枚熬蠐螬一升熬乾地黃牡丹皮乾漆熬土瓜根芍藥牛膝桂心各四兩黃芩牡蒙桃仁熬去皮尖雙仁各三兩茯苓海藻各五兩葶藶五合熬令紫色吳茱萸二兩上一十七味搗篩為末別搗桃仁葶藶如脂煉蜜和為丸如梧桐子大酒服七丸日三服千金有芒硝人參治月水不通閉塞方牛膝一斤麻子仁三升蒸之土瓜三兩桃仁二升熬去皮尖雙仁上四味以酒一斗五升漬五宿一服五合漸增至一升日一服多飲益佳治婦人産後風冷留血不去停結月水閉塞方菴䕡子桃仁去皮尖雙仁熬麻子仁碎各二升上三味以酒三斗合煮至二斗一服五合日三服稍加至一升佳治月水閉不通結瘕腹大如䝁短氣欲死虎杖煎方虎杖一百斤去頭腦洗去土曝燥切土瓜根汁牛膝汁各二斗上三味以水一斛漬虎杖一宿明旦煎餘二鬥納土瓜牛膝汁攪令調於湯器中煎使如飴糖酒服一合日二夜一服當下若病去但令服盡治帶下月經閉不通方大黃六升朴硝五兩桃仁去皮尖及雙仁虻蟲去翅足各一升並熬上四味搗篩為末別搗桃仁如膏以淳苦酒四升以銅鐺著火上煎減一升納藥三校之又減一升納朴硝煎如錫可止丸如雞子投一升美酒中當宿不食服之至日西下或如豆汁或如雞肝凝血蝦蟆子或如膏此是病下也菖蒲湯治月水不通陰中腫痛菖蒲湯方菖蒲當歸各二兩蔥白切小一升吳茱萸阿膠熬各一兩上五味㕮咀以水九升煮取三升納膠煬令盡分為三服損傷第三方七首治婦人因其夫陰陽過度玉門疼痛小便不通白玉湯方白玉二兩半白朮澤瀉各二兩肉蓯蓉當歸各五兩上五味㕮咀先以一斗煮玉五十沸去玉納藥煎取二升分三服每服相去一炊頃治婦人傷丈夫苦頭痛欲嘔心悶桑白皮湯方桑白皮半兩乾薑一纍桂心五寸大棗二十枚擘上四味㕮咀以水二大升煮取八合分二服千金云以酒一斗煮三四沸去滓分溫服之適衣無令汗出治婦人嫁痛單行方大黃三分上一味切以好酒一升煮十沸頓服治婦人小戶嫁痛連日方芍藥半兩生薑切甘草炙各三分桂心一分上四味㕮咀以酒二升煮三沸去滓適寒溫分服治婦人小戶嫁痛單行方牛膝五兩上一味切以酒三升煮再沸去滓分三服治婦人小戶嫁痛方烏賊魚骨二枚上一味燒成屑以酒服方寸匕日三服立瘥治婦人妊身為夫所動欲死單行竹瀝汁方取淡竹斷兩頭節留中節以火燒中央以器承兩頭得汁飲之立瘥
