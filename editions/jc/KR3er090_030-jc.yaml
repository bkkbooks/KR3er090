body:
  text: 卷第三十禁經下禁金瘡第十二禁金瘡法咒曰吾被百箭療無一瘡一人挽弓萬人驚張一箭破於千陣此禁亦是難當急急如律令又法正月一日日未出時取四壁下土和酒井花水向東三拜云言受神禁願大神如是四方各禮訖口含酒水四方悉噀至日中還復如此七日之中鮮潔齋戒不得惡言出口禁金瘡即定法元閉氣噓三遍呵氣七遍唾之曰日出東方惠惠皇皇上告天公下告地皇地皇夫人教我禁瘡吾行步不良與刀相逢斷皮續皮斷肉續肉斷筋續筋斷骨續骨皮皮相著肉肉相當筋筋相連骨骨相承今會百藥不如神師一唾止痛再唾愈瘡北斗七星教我禁瘡南斗六星使瘡不疼不痛不風不膿北斗三臺轉星證來急急如律令唾瘡法日出東方育育陽陽上白天公下白地王地王有女教我唾瘡皮皮相養肉肉相當令瘡不疼不痛不風不膿連筋續骨肌生肉實急急如律令用王氣唾瘡良便有驗神吉禁血不止法三七遍日出東方乍赤乍黃南鬥主瘡此鬥主血一唾斷血再唾愈瘡青衣怒士卻血千里急急如律令禁瘡斷血法某甲不良某甲不慎為刀筋木石所傷上告天公下告地皇地皇夫人教我禁瘡一唾止血再唾合瘡兩皮相連兩骨相當新瘡莫痛故瘡莫膿急急如律令禁金瘡法吾是天師之子為師之所使執天有綱執地有紀一百二十禁咒吾以受之吾禁此瘡金血須止吾與天地同體令瘡合急急如律令唾百種瘡法神師所唾口為雷門唾為霹靂雷公主陰霹靂主陽殘賊結氣唾下消亡急急如律令禁唾惡瘡毒法先閉氣三通神師受告大道最良咒曰百藥之長不如吾之膏唾吾仰天唾殺飛鳥唾南山之木木為之折唾北山之石石為之裂唾北方之水水為之竭唾百蟲之毒毒自消滅唾百瘡之毒生肌斷血連筋續骨肌生肉實扁鵲盧醫教我禁方三唾何瘡不愈何毒不去天音神師今在汝處急急如律令禁水洗瘡法先左營目三周開目視瘡中閉氣一息欲止然後禁之無弱無強為某所傷清血無流濁血無往一青一黃一柔一剛皮皮相值脈脈相當南方止血北方止瘡東流海水寒熱如湯朝令淹露暮令復故醫王扁鵲藥術有神還喪車起死人不膿不痛知道為真知水為神急急如律令禁漆著人法漆翼丹盈漆翼丹盈丹為兄漆為弟汝不漆杯以盂乃漆人肌膚刀來割汝斧來伐汝汝不疾去鹹鹽苦醋唾殺汝急急如律令禁漆著人法三七遍一云燒故漆器當著漆急唾之赤非非漆賢丈夫著車移丙丁使者收攝之不得著人體不得著人皮急急如律令一云妄移移漆賢丈夫著車系以盂何由得著人皮膚保辜保辜收攝漆賢丈夫急急如律令禁火燭瘡法浮陽浮陽火燒東壁東壁窮爛上付河伯還付壬癸火精毒滅入地千里急急如律令禁蠱毒第十三咒蠱毒文毒父龍盤推毒母龍盤脂毒孫無度毒子龍盤牙若是蛆蛛蜣螂還汝本鄉蝦蟆蛇蜥還汝槽櫪今日甲乙蠱毒須出今日甲寅蠱毒不神今日丙丁蠱毒不行今日丙午還著本主雖然不死腰脊僂拒急急如律令禁蠱毒法取一赤雄雞淳色者左手持雞右手持刀來至病人戶前去屋溜三步便三聲門尉戶丞某甲病蠱當令速出急急如律令以雞頭柱病人口中三遍畢以苦酒二合刺雞冠上血納苦酒中便與病人服之愈咒魘及解法天無梁地無柱魘蠱我者還著本主一更魘蠱不能行一午魘蠱不能語太山昂昂逐殺魅光魅翁死魅母亡魘蠱大小驅將入鑊湯急急如律令又咒曰食鬼將軍摩牙利齒不食餘味只食魅鬼魅鬼九千九萬戶少一不足下符來取魅鬼速還本主不歸本主反縛送與急急如律令又有將軍字屈丘牙形俞持兜鉾出門入戶遠地遊捉得魅鬼便斫頭又有一神字窮奇頭如破筐發強相口如羅披惡神祗不食五穀食魅皮朝食一千暮食九百一口不足使來便索急急如律令禁五蟲時氣悉用此九真鬥光道氣並行大寒小熱當從內出最巨夷憂除烈水火之光宅中凶殃大神丈人入某身形恍惚無常大道正教真道常行邪氣急滅手下急急如律令又法咒曰東方青帝魘人鬼南方赤帝魘人鬼西方白帝魘人鬼北方黑帝魘人鬼中央黃帝魘人鬼魘公字阿強魘母字阿防有人魘我者還令著本鄉誦魘二七鬼走出誦魘三九魘鬼還向本主走若當不走吾語北斗急急如律令禁遁注第十四禁注法吾從天南來至北食鹽三斛飲水萬千經江量海手捉丘山口含百毒心懷蚰蜒唾天須轉唾地陷穿唾石碎裂唾火滅煙唾鬼即死唾水竭淵東方之注自名醫入人體中注心根神師咒注注滅門南方之注自名青入人體中注百脈神師咒注注即易西方之注自名搖入人體中注脊腰神師咒注注即消北方之注自名雌入人體中注心脾神師咒注注即移中央之注自名雌入人體中注十指神師咒注注即死四方之注盡已亡惟我五臟永安強急急如律令禁注出血法三七遍急噀之東方之注自名羊入人體中主腹腸神師咒注注即亡南方之注自名狗入人體中主心口神師咒注注即走西方之注自名雞入人體中主心臍神師咒注注即迷北方之注自名魚入人體中主六腑神師咒注注即無中央之注自名雉入人體中主心裡神師咒注注自死謹告病人身中諸注殃若在心腹及胸腸或在四肢並中央謹告四方諸關節急送血殃三焦關元下部膀胱若有若無不出者亡速去百年毒神符欲居汝處急急如律令又法注父張注母楊注兄靖注弟強注姊姖注妹姜知汝姓字得汝宮商何不遠去住何所望前出封侯後出斫頭前出與賞後出與杖汝今不去住何所望急急如律令又禁注法東方青帝食青急之注南方赤帝食赤色之注西方白帝食白色之注北方黑帝食黑色之注中央黃帝食黃色之注五帝之神食十二注北斗七星食一百二十注或食土公注或食土母注或食土子注或食土婦注或食土孫注或食土孫婦注或食生人注或食死人注或食飛屍遁注大注消小注滅急急如律令又禁注法三七遍東方青注南方赤注西方白注北方黑注中央黃注五方五注何不速去雷公霹靂欲居汝處吾唾山山崩唾石石裂唾火火滅唾水水竭吾唾五毒逐口消滅急急如律令咒註文吾是太山之子今為太山所使口如天門不可柱張唾如毒藥氣如秋霜當吾者死值吾者亡五注之鬼速出速去不得留藏急急如律令此咒當晨朝日初出時遣病人淨洗手面向東方至心禮太山訖更以水洗手至心合掌正西立師當在東正當病人面向南立以此咒之七遍便愈若不愈者明晨更如是咒之不過三朝無不愈者禁唾飛屍入腹急切痛法請天上飛龍窮奇白虎眼如明星腹如建鼓齊功叩齒主食惡鬼入食飛屍出食殃魅人生於天吞氣受道身形之中非汝所處形中五部各有所主肝為青龍肺為白虎心為朱雀腎為玄武脾為中府主御四方上有真人赤城童子下有咸池青腰玉女各守部界不得留住方名道人教來治汝頭則法天身法北斗手為魁剛口為金斧主授六甲直神輔汝何鬼不出何屍不走急急如律令按摩卒中注忤魍魎法配陰脈十三陽脈十五二十八脈隨手上下一脈一通知汝有苦男祥婦祥客死不葬骸骨消散流離道旁驚恐馳走責人酒漿南山有一人名窮奇不食五穀但食鬼皮朝食鬼父暮食鬼母食正欲壯復索鬼子急急如律令禁邪病第十五凡鬼邪著人或啼或哭或嗔或笑或歌或詠稱先亡姓字令人癲狂有此狀者名曰鬼邪唯須伏鬼遣之乃瘥治之法正發時使兩人捻左手鬼門鬼市兩人捻右手如左手法鬼門者掌中心是鬼市者腕後厭處是伸五指努手力則厭處是腕後者大指根兩筋中間是一捻之後不得動動鬼出去不得伏鬼又不得太急若太急則捻人力盡力盡即手動手動即鬼出亦不得太緩若太緩復不能制鬼惟須以意消息令緩急得所復使兩人投棕子刺兩肩井中緩急如鬼門鬼市法以鬼伏為限若不伏稍稍急刺若鬼伏即稍輕刺之若病人是丈夫肥壯者則急刺之量人之強弱消息以意若棕尖利以布物裹之勿令人傷亦須誦咒必臣伏如狀貌中有似伏狀不復相罵不情求道叩頭求去遣一人捉咒師自問鬼之姓名住何州縣鄉里年幾貫屬伴侶幾人又問來意有所須為何事來一依病人口筆寫之若其臣伏叩頭求去不敢更住者且停刺肩井等依其所須備覓發遣之須食與食須金銀車馬即採畫人馬像金銀彩帛隨其形貌悉盡作之絹帛以白紙作金以梔子染之若是遠來之鬼須給過所者亦即給之即日早發遣或待後發遣亦得送鬼之時須桃符一板長七寸闊三指綜綖一條長七寸以朱書板上著年號月朔日子鬼之鄉里姓名年幾從人頭數告五道大神河伯將軍上件鬼某甲等在我家中作如此罪過捉獲正身所索之物並已具給發遣速出去不得久停不得久住急急如律令炬火禁邪法去百鬼斷萬邪敕粉火治邪亦可以按摩病人若欲斷邪鬼以敕粉火以一炬火著戶外令病人住外又師捉一炬火作禹步燒粉令病人越火入戶還床以曏者一炬送大門外道上去門百步棄之勿反顧師取一盆水著病人戶限內以大刀橫上亦可燃燈置病人屋內令晝夜不滅至病瘥師捉火炬燎病人身上隨多少治病咒曰粉良天火赫赫天火奕奕千邪萬惡見火者避急急如律令咒水噴病人法先取淨水一器咒三吸氣閉目存鬼神怒五氣擊之咒曰持清持濁持正持水所為物無不消化怒石石裂怒木木折邪不干正危不入身大道流行攝錄邪精神祗所怒玉石皆化何病不愈何災不斷速出速出急急如律令咒水治百病法先取淨水以器盛之十咒曰太一之水祖且良舉水向口續神光大腸通膀胱盪滌五臟入胞囊脾腎太倉耳目皆明百病除瘥邪精消亡急急如律令興之遍身然後用之禁惡獸虎狼第十六夫草野山林行見惡蟲但閉右目以左目營之三匝鬼神見之伏而頭脅著地也禁虎入山法吾登行五獄前置辟邪六駮後從麒麟獅子揚聲哮吼野獸猛虎聞吾來聲伏地不語若不避吾檄蟲殺汝急急如律令敕禁虎法天一太一李耳伯陽教我行符壓伏虎狼垂頭塞耳伏匿道旁藏身縮氣疾走千里舅氏之子不得中傷急急如律令禁蛇毒第十七三月三日夜向北燒香閉氣誦滿三七遍咒曰日出東方赫赫煌煌報你蛇蟲遠逃深藏你若不藏鸛鵲步剛食你蛇頭吞汝入腸大蛇死小蛇亡急急如律令禁蛇法押蛇頭咒曰寅加卯寅加卯三遍即愈若欲發蛇毒押蛇尾倒誦之卯加寅卯加寅蛇毒即發劇一注螫石相押左手自余皆同又法庚寅卯庚寅卯三遍即愈若欲令發云卯寅庚卯寅庚即發又法辰生巳辰生巳蛇毒即止三遍即愈欲令發者云巳生辰巳生辰即發禁蛇法一名蛇二名蟾三名腹居近野澤南山腹蛇公青蛇母黑蛇公字麒麟蛇母字接肋犀牛角麝香牙鸛鵲嘴野豬牙啄蛇腹腹熟啄蛇頭頭爛蜈蚣頭鴆鳥羽飛走鳴喚何不急攝汝毒還汝本鄉江南畔急急如律令禁蛇斂毒法暉暉堂堂日沒亭光姿擢之節唾蛇萬方蛇公字蚰蜒蛇母字彌勒汝從江南來江北言汝何失準則汝當速斂毒若不收毒吾有鴆鳥舌野豬牙蜈蚣頭何沙吾集要藥破汝速出速出斂毒還家急急如律令一法器朱書此符左手把之閉氣唾禁捻目向王為之吾一唾開天門再唾諸黃泉天下有惡毒皆來歸吾前吾今捉你一唾得千千急急如律令山鵲蛇山蚱山青蛇澤青蛇馬蛇蛟黑似晰蜴上六種螫人不死令人殘病咒曰吾有一切之禁山海傾崩九種惡毒原出南廂令渡江北專欲相傷吾受百神之禁惡毒原出南邊今來江北截路傷人吾一禁在後你速攝毒受命千年急急如律令白朔蛇蒿脊蛇赤蛇黃蛇水蛇青蛇上六種咬人不傷直禁即瘥子蛇尺八蛇土蠟蛇沙蝨毒到蛇白蜴蛇罔蛇蟒蛇上八種蛇人著者須藥治咒曰道邊一木百尺無枝鳳凰嘴如絲速去速去吾不知急急如律令禁蠍蜂第十八禁𧔣法捻蛇目閉氣向王為之蠕𧔣神祗八節九枝兄字大節弟字蠍兒公字腐屋草母字爛蒿枝但自攝斂汝毒不出去何為急急如律令咒蠍法蹀蹀移移八節九枝公字腐草母字蒿枝緣他籬落螫他婦兒何不收毒欲往何為山雞戴勝食汝四肢頭破尾折伏地莫移急急如律令一雲山雞頭戴勝角拉爾腰斷不得動尾云云又曰蠍蜂毒止速收你尾河伯將軍鐵鉗銅指押你腰斷不得動尾急急如律令禁毒蠍螫人法先二日齋戒正朝一日日未出時淨澡浴洗手北堂東頭下誦之三七遍咒曰天有八節地有九枝一非草木二非蒿枝上他床上傷他婦兒速去速去戴勝來追不痛不疼不腫不膿急急如律令禁蜂毒捻蜂目左營目閉氣向王為之東方青毒還東方南方赤毒還南方西方白毒還西方北方黑毒還北方中央黃毒還中央黃蜂揚揚黑蜂奕奕王有小女嫁與何伯吾有銅掌鐵指押汝便死汝是小蟲何不速去毒陰吾曰大鳥翅三千八萬里不得張口汝應是死急急如律令禁蜂毒法捻蜂目左營目向王閉氣為之兄弟三人走出野大兄名蝮南山上下中兄名蛇走田野小弟名蜂看屋梁堅如瓦熱如火二七唾毒當墮急急如律令禁惡蠔螫人毒法蛆似蜂著山叢蠔似蝺著山腹老蠔蚑緣木枝兄弟五人吾都知攝汝五毒莫令移汝不攝毒滅汝族急急如律令禁惡蠔文一云狐尿刺傷人腫當急閉氣治唾之即愈一七不愈三七遍日出東方乍赤乍黃瓜熟離蔓椹熟離桑東家齧人狗西家好婦娘咒此小蟲雄狐毒死雌狐毒亡急急如律令禁狗鼠第十九咒曰日出東方何堂堂狗不名狗名大黃皇帝遣汝時令齧猴與鼠不令汝齧人傷若齧人傷白虎吞入汝腸急急如律令一云不令汝齧人傷爛汝齒腐汝牙自不去虎啖汝云云禁狗毒法犬牙狗齒天父李子教我唾汝毒出乃止皇帝之神食汝腦髓白虎之精食汝之形唾汝二七狗毒便出急急如律令以氣噓呵之捻狗目左營目向王為之禁狗令不咬人法捻狗目向王閉氣七息七禁之令不咬人吾口如天門不可枉張舌如拔劍唾如秋霜北斗照耀列宿天蒼畢集聲氣正其發揚牽牛持形織女侍旁此之小狗咒之滅亡天狗地狗何反不走欲傷我者牙折口啞急急如律令一法下文不同今不取又法取西廂屋檐下土搗末絹羅之和大苦酒漬作團如雞子於瘡上摩之咒曰東方木為折南方火為滅西方金為缺北方水為竭中央土為絕吾太上府逢西母教我禁者語我神方東句枝西句枝庶民狂狗咬我天公兒急出急出汝若不出莫使我怒吾能唾山崩唾石裂唾火滅唾海竭速出速出急急如律令如此三咒擘泥中見隨狗毛色有驗又取灶中黃土與水和作泥丸如雞子大摩瘡上隨犬毛色毒隨而出擘破泥丸明視之瘡痛則又以一盆水寫屋上以器盛取以洗瘡余水破落地則和為泥封瘡上擘中必風犬毛色瘡不疾痛也禁狗文咒曰汝是小犬惡獸之餘為物有幸得與人居汝命如泥土精空虛吾以西方白虎咬汝頭汝毒急收急急如律令凡向人家先以腳踏門右咒曰主人某甲家門丞戶尉籬落諸神主人有狗黃白不分師來莫瞋師去莫驚急急如律令禁狗不吠人法黃狗子養你遣防賊捕鼠你何以齧他東家童男西家童女吾請黃帝灶君震宮社土付與南山黃斑北山黑虎左腳踏汝頭右腳踏汝肚向暮必來咬殺食汝狼在汝前虎在汝後三家井底黃土塞汝口吾禁你四腳蜷不得走右擲不得左擲搦草吾來上床汝亦莫驚吾出十里汝亦莫起急急如律令禁鼠令出法桃枝一枚茅草索一條咒曰天皇地皇卯酉相當天皇教我壓鼠群侶聚集一處地皇教我壓鼠群侶聚集一處速出速出莫畏貓犬莫畏咒咀汝是貓之仇又非猛獸之侶東無明南無明西無明北無明教我壓鼠失魂精群陽相將南一作西目失明呼喚盡集在於中庭急急如律令作此法時於室中淨掃地穴前遍掃之桃枝以茅草索結杖中腹以三個穴立呼之矣初越集鼠法初越時以香湯浴身灑室中及庭前地訖用三盆三家漿粉以刀子橫著盆上以灰匝之以筆一管去盆三尺著地所有穴前皆安灰廣一尺上作子字一云穴上紫字乃咒曰北斗三臺招搖所錄天李目形必歸所屬寄食附人寄穴我屋胡為楊時飲食欲熟急敕鼠王召集眷屬大鼠小鼠並須來食側立單行洗盪心垢伏罪勿走汝父小奚汝母幽方汝兄阿特汝弟阿當汝妹僕姜室家相將歸化坐旁固告敕汝莫以舊為常急急如律令又去鼠法鼠必慄兜牛必慄兜蛾蛾必慄兜犯犯必慄兜母名必慄兜三喚神來赴欲闢之法悉在華上勿得東西解放鼠法日東向曠二里西向曠二里闢方八里此廣闊耐停止雞零星牽至廳雞零祿牽至獄汝等此中行勿得與人相牽觸當斷汝手足急急如律令禁鼠耗並食蠶法咒曰天生萬蟲鼠最不良食人五穀啖人蠶桑腹白背黑毛短尾長跳高三尺自稱土公之王今差黃頭奴子三百個貓兒五千頭舍上穴中之鼠此之妖精咒之立死隨禁破滅伏地不起急急如律令越百怪法乾坤定位陰陽化成門丞戶尉侍從交交二十八宿黑白赤青千殃萬怪急收汝形吾知汝姓吾知汝名急須屏跡不得久停違即斬殺萬不得生急急如律令又咒曰日出東方赤如紫陽百怪妄起損害忠良吾口咒之闢除凶殃怪聞我咒速去他方禍去福來萬惡潛藏急急如律令護身禁法第二十咒曰諾諾左帶三星右帶三牢天翻地覆九道皆塞使汝失心從此迷惑以東為西以南為北人追我者終不可得明星北斗卻閉千里六甲反張不避禍殃乘七追我折其轅軸乘馬追我掩其兩目步行追我腫其兩足揚兵追我刀反自伏明星北斗卻敵萬里追我者亡追我者死牽牛織女化為江海急急如律令又法太一神人曰凡欲遠行避難若為惡人迫逐危厄之中出門禹步三咒乃去可以消災追我者迷惑五道旋轉到還惡人欲來侵己者逆而卻之咒曰東方青毒南方赤毒西方白毒北方黑毒中央黃毒五毒之氣今有某甲無道欲來侵吾披太一神符歷行四海乘風駕雲使有限會某甲懷惡逆之心殘賊忠良不肯休止吾毒之氣併力收攝付與地官莫令某甲復懷噁心賊害之意應時了命言切千二百等急急如律令若逢怨家惡人法先卻三步捻生人喉又以足大指躡地咒曰北斗神君來滅惡人斬截冤家某甲頭送上天門急急如太上老君魁剛律令又法惡人欲來侵害者先閉氣三噓竊咒勿令人聞咒曰頭戴朱雀足履玄武左佩青龍右佩白虎吾來到處百惡悉走吾有天丁力士椎殺惡鬼遠迸千里急急如律令自防身禁咒法咄某甲左青龍蓋章甲寅右白虎監兵甲申頭上朱雀陵光甲午足下玄武執明甲子脾為貴子中央甲辰甲戌急急如律令上此一法凡是學人常以旦夕暗誦令熟莫使聲出若有縣官口舌軍陣危險厄難之處四方興功起土殃禍之氣或入他邦未習水土及時行疫癘但以晨夜數數存念誦之勿忘若弔喪問病臨屍凶禍之家入門一步誦一遍出門三步誦二遍皆先叩齒三通並捻鬼目又法凡行山澤晨夜恐怖之處使人鬼惡總不相忤咒曰人皆濁我獨清人皆去我獨停人皆極我獨丁人皆枯我獨榮人皆破我獨成天長地久我與並依文昌遊心星登太玄星紫庭飲甘露食陽精佩日月體安寧乘三鳳駕羽英堅藏擇九天仙公以赴刑急急如律令被人所禁解之法先捻生人喉咒曰煒煒煌煌天有九柱地有九梁北斗七星為我除殃青龍在前白虎在後青龍飲汝血白虎咬汝喉頭破腦裂汝死不擇日急急如律令被人禁卻解之法噴之行頭及天公亦是吾師坐頭及天公亦是吾師眠臥及天公亦是吾師卻看天師欲作禁吾解千禁萬惡若有禁吾反自著急急如律令禁令家和法南無伽帝伽帝膩伽帝收溜避南無阿乾陀羅呵彌陀羅灌陀沙婆呵上此法能令家內不孝子不順婦女皆孝順用法取一把土咒三七遍置家大門下又咒一把置中門下又咒一把置堂門下又咒一把撒在井中又咒一把置灶額上如是七日內外自然和順但使行禁人精心咒之又凡人行處不安穩疑有恐怖之事即以氣之便以拒禁咒之曰急令辟惡鬼除制不祥眾邪消盡魍魎逃亡神符宣流以知天惡當我者死值我者亡急急如律令又法唾三十六鬼大鬼打頭破作七分如阿梨樹枝沙呵凡行經神廟及斷虎狼咒吾為天地祭酒當為天地頭戴日月身佩北斗急急如律令禁惡人鬼火法咒曰吾是元皇之孫太上之子口含聖真神氣付與東西百鬼隨吾驅使吾東向一唾九木折南向一唾八火滅西向一唾金剛缺北向一唾流水絕道氣流布隨吾所說急急如律令禁賊盜第二十一夫欲出行先畫地為壇房中六尺庭中六尺野外六十步置十二辰位身居甲地自呼名某乙今欲出往某處征討時神保佑於我吉昌三言乾大呼青龍下咒曰六甲九章天圓地方四時五行青赤白黃太一為師日月為光禹前開道尤闢兵青龍俠舉白虎承衡熒惑先引闢除不祥北斗誅罰除凶去殃五神導我周遊八方當我者死向我者亡欲惡我者先受其殃吾受北斗之孫今日出行乘青龍出天門入地戶遊陰中履華蓋去寇賊矛盾刀戟戟弩見我摧伏莫取當御急急如律令禁賊法唾此惡賊欲來狂圖某甲者或從東方青帝來或從南方赤帝來或從西方白帝來或從北方軒帝來或從中央黃帝來欲來傷害人者令其作事莫成拔刀自刺拔箭自射吾於四道開通盜賊伏匿五兵摧折蜂蛇莫動大尾闢側百步莫令相傷吾禁五方惡賊伏吾手下不得浪行急急如律令咒童子令說鬼姓字第二十二太上老君禁神三呼三吸以取其真東方青帝木中精南方赤帝朱雀形西方白帝白虎神北方黑帝乘船行中央黃帝黃龍聲吾有其禁知天神蓋不自發身歸誠日南施禁火精日北施禁五帝動經吾三禁莫敢不來神道神名鬼道鬼字蠱道蟲蠱魅道魅字偷道偷名賊道賊字高山騰蛇下山騰蛇高山之崎下山之峻或在天上或在人間河伯將軍五道修羅十二神將登明君天魁君傳送君小吉君勝光君太一君天罡君大沖君功曹君大吉君速送速送汝名不得久停急急如律令禹山天仇九九山使靈國三三符國法王國籙國二鬼一本如此上前件取清水半升以刀子攪之誦此咒三七遍與小兒飲之朱書前件錄於小兒膊一作膝下少時召鬼並來小兒自見一一問之即道所作病所作鬼抄取姓名發遣如治癲法與過所遣之如上說也度符啟請神言曰先上香咒筆曰以筆指口鳴六鼓謹請東方青帝老君來下纏吾筆謹請南方赤帝老君來下纏吾筆謹請西方白帝老君來下纏吾筆謹請北方黑帝老君來下纏吾筆謹請中央黃帝老君來下纏吾筆指天天傾指地地寧指鬼鬼死指人人生急急一如太上老君律令請五方水度符言曰謹請東方青龍真氣入吾水中謹請南方赤龍真氣入吾水中謹請西方白龍真氣入吾水中謹請北方黑龍真氣入吾水中謹請中央黃龍真氣入吾水中謹請五方五龍真氣入吾水中吾水非常之水煮桃作湯吾刀非常之刀七星俠旁吾口非常之口內含魁罡水在江中名曰江水水在井中名曰井水水在吾碗中名曰清淨神水水在吾口中名曰太上老君解穢之水吾水噀山山崩噀地地裂噀人人生噀鬼鬼滅急急如律令灑水言噓系天師陽平等二十四化真氣臣某弟子自稱道號某獄真人某先生以今月今日今時奉為某家弟子度某符隨符言之神符度咒曰日出東方光躍表裡行符敕水出於老子老子行符從吾所使東九夷從符行南八蠻從符起西六戎捉鬼軍北五狄破鬼營中三秦從符所攝急急收錄一鬼不去斬付北嶽天有三皇地有五黑某所行符自有法則非當吾真當符者死值符者亡一鬼不去斬付魁剛急急如律令又曰符主東方術折南方火滅西方金缺北方水渴中央土裂符主天清地裂人生鬼滅急急如律令噀水三口度神符主符啟請謹請虛無直符直事三十六人從吾符行謹請太清直符直事今歲直符直事今月今日今時直符直事各三十六人從吾符行保其家弟子三災度脫急急如律令噀水三口又曰天圓地方六律六章神符燒香災厄消亡符到奉行急急如律令禁經上下兩卷二十二篇其間辭語鄙野蓋出欲傳思邈切於救人實錄其文不加刪潤今具有云庶成一家之書
