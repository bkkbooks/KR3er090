body:
  text: 卷第二十二飛煉飛煉研煮鍾乳及和草藥服療第一方六首煉鍾乳法鍾乳無問厚薄但令顏色明淨光澤者即堪入煉惟黃赤二色不堪用一斤置金銀器中可鎮心益氣無者用瓷器亦得大鐺中著水置乳器於水令沒煮之常令如魚眼沸水減更添若薄乳三日三夜若雁齒及厚肥乳管者七日七夜俟乳色變黃白即熟如疑生更煮滿十日為佳煮訖出金銀器其鐺內水盡黃濁棄之勿令人服若服此水便戟人咽喉傷人肝肺令人頭疼又令人下利有犯者啖豬肉即止棄此黃汁更著清水還納上件乳器煮之半日許出之其水猶清不變即止乳無毒矣研鍾乳法取所煉鍾乳於瓷器中用玉錘搗令碎著水研之水盡更添常令如稀泔狀乳細者皆浮在上塵者沉在下復繞錘研之易碎滿五日狀如乳汁至七八日其乳放白光非常可愛取少許置臂上拭之狀如捻書中白魚滑自然白光出便以水澆之不隨水落便熟若得水而落者即生更須研之以不落為度熟澄取曝乾丸散任意服之崔尚書乳煎鍾乳主治積冷上氣坐臥不得並療風虛勞損腰腳弱補益充悅強氣力方鍾乳三兩上一味研如面以夾帛練袋盛稍寬容緊繫頭納牛乳一大升中煎之三分減一分即好去袋空飲乳汁不能頓服分為再服亦得若再服即取晚間食消時服之如能頓服即平旦盡之不吐不利若稍虛冷人即微下少鴨溏亦無所苦明旦又以一大升牛乳準前煎之依法餌之其袋子每煎訖即以少許冷水濯之不然氣不通泄如此三十度以上四十度以下即力盡其袋中滓和麵飼母雞取其生子食亦好不然用浸藥酒亦得若有欲服白石英並依此法若患冷人即用酒煎患熱人即用水煎之若用水及酒例須減半乃好若用牛乳三分減一分補益虛損無以加之永不發動忌食陳久敗物不可啖熱面豬魚蒜等服鍾乳酒方鍾乳三兩取成煉上者上一味以無灰新熟清美酒一斗於不津器中相和密封閉冬七日夏三日空腹溫服三合日再漸加之以知為度十五六日可盡將息節食忌如前怯草鍾乳丸方曹公方主五勞七傷損肺氣急主療丈夫衰老陽氣絶手足冷心中少氣髓虛腰疼腳痹身煩口乾不能食服之安五臟補腸胃能息萬病下氣消食長肌和中方鍾乳二兩別研令細菟絲子一兩酒浸一宿別搗石斛一兩吳茱萸半兩上四味別搗篩為末煉蜜丸如梧子空腹服七丸日再服之訖行數百步溫清酒三合飲之復行二三百步口胸內熱熱如定即食乾飯豆醬過一日食如常暖將息不得聞見尸穢等氣亦不用食粗臭陳惡食初服七日不可為房事過七日後任性然亦不宜傷多服過半劑覺有效即相續服三劑終身更無所患多房者加雄蛾三十枚若失精者加蓯蓉三兩服軟生乳方此乳名為甲乳此乳力減者倍服之永不發其乳長半寸以來水浮者上研依法令極細即於倉米飯下蒸之飯熟即止任意服多少一無禁忌服乳者更石得服余石當令人卻致不和飛煉研煮五石及和草藥服療第二方二十一首論一首服白石英方白石英上者無問多少上一味先以絹袋盛於七升米飯下甑中蒸四五遍然後細搗以密絹篩之用玉槌研令細入肉者澄取清水飛取更以白練袋盛急縫麵裹飯中蒸三遍取豬脂一斤水浸十日日兩度易水赤脈盡則休剝去薄膜微火煉出以白石英末和之攪令相入和酒服一匙日二服其飛石水收取用煮粳米粥任性吃酒多少每須覺有酒氣為佳燒白石英方白石英一大兩上以坩土鍋子盛石蓋頭炭火燒之先取一瓷器貯二升無灰酒燒石令赤即投酒中待冷任酒性多少飲之好石可三兩度乃棄之安庭中即云吃十兩令人年七十氣力可共三二十時無別白石英和金銀人參煮服方白石英五大兩金十大兩上熟者生者毒銀四大兩人參二大兩全用上四味取一鐵釜淨洗即下前藥於釜中先下水三大升立一杖釜中令至底水所浸著處即刻記至更下水二大斗七升水通前計三大斗煎之如魚眼沸漸減之杖所刻處即停火急取濕土置釜底取其汁貯以不津器中金銀石等漉出收取其人參隨藥汁細細吃之其汁每朝空腹服三大合至暮服二大合每服之後隨性飲多少酒使藥氣行欲作食餌亦任忌倉米停滯陳臭之食自外百無所忌石英和磁石浸酒服方白石英五大兩澤州者磁石五大兩無毛連針多者十兩亦得上二味各別搗令碎各用兩重帛練袋盛之以好酒一斗置不津器中挂藥浸經六七日以後每日飲三兩杯常令體中微有酒氣欲加牛膝丹參杜仲生地黃吳茱萸黃耆等藥者各自量冷熱及所患並隨所有者加之仍隨所加有忌者即禁之余百無忌中年以後則鬚髮變黑腰疼耳聾悉瘥其酒三五日後即漸添一二升常令瓶滿所加草藥疑力盡者任換之經三四個月疑石力稍微者即更出搗碎還以袋盛經半年後即棄之準前更合煮石英服方石英五大兩澤州者上一味打碎如小豆蕎麥許大去細末更於水中淘洗令淨重帛練袋盛之以繩系頭取五大升清水於不津鐵鐺中煮之煮時石袋不用著鐺底恐沙石煎壞先以一杖橫鐺口挂石袋著杖上去底二三分許煮取一升汁置碗中經宿澄取清平旦空腹頓服之若以此汁煮稀粥服之亦佳每服後可行三五百步並飲三兩盞清酒又依前煮經二十度者石即無力可以布裹之埋於南牆下深三尺滿百日又堪用依前服之然終不如新者服地黃石英酒作丸補益方神祕生地黃十大斤十月採者細切石英五大兩無灰清酒二斗上以坩土鍋盛石英燒令極赤納著酒中去石以地黃納酒中浸之經三日出之曝乾復納酒中以酒盡為度唯留一升許汁搗地黃為末以一升殘酒和末作丸熟搗為佳日二服任食以意消息極押熱補益百無禁忌亦不發動祕之心腑矣地黃取肥大者佳牛乳煮石英服方石英三大兩澤州者牛乳一大升水三大斗上先下牛乳於鐺中即以生密絹四重作袋盛石英系頭下著乳中即勿令袋著底以杖則之為記訖然後下水以炭火涓涓煎之水盡乳在還以前杖則之至刻即休出石袋以水濯之其乳以綿濾之令暖調適每朝空腹細細服之若患冷氣宜加八顆蓽茇和煎之大善或以乳煮粥吃亦佳如是經二十日服即停大補益身心服者乃自知之紫石湯主心虛驚悸寒熱百病令人肥健方紫石英白石英各十兩乾薑赤石脂白石脂各三十兩上五味皆完用石英等各取一兩石脂等三味各取三兩以水三十升微火煎取二升宿物食分為四服日三夜一服至午時乃可食日日依前稱取以昨日滓仍置新藥中其煮乃至藥盡常然水數一準新藥水藥皆盡訖常添水煮滓服之滿四十日止忌酒肉藥水皆大稱鬥取汁亦大升服湯訖即行住坐臥令藥力遍身百脈中行若患大冷者春秋各四十九日服之冷疾退盡極須澄清服之論曰此湯補虛除固冷莫過於此但能用之有如反掌恐後學者謂是常方輕而侮之若一劑得瘥則止若傷多者令人太熱復須冷藥押之宜審用之未可輕也石英汁作薑豉服方白石英二大兩肥豬肉三斤上以水八升煮石英取五升量煮豬肉得爛熟為度取豬肉汁下蔥豉切肉作薑豉食之一劑可六七日吃令盡二兩石英三度煮之第一度全用第二度中破第三度搗碎煮之每煮皆用帛練袋盛之石經三煮即換新者二月以前八月以後皆可作之豬肚煮石英服方白石英末以絹袋重盛縫卻口生地黃切生薑細切人參末各二大兩豬肚一具淨料理如食法豉一抄羊肉半斤細切蔥白七莖細切新粳米一合蜀椒四十九顆去目閉口者上一十味藥並石英袋納著豬肚中急系口勿使泄氣及水入以水二斗煮取八升即停以藥肚著盤上使冷然後破之如熱破恐汁流出先出石袋訖取煮肚汁將作羹服之每年三度服每服石英依舊余藥換之分數一依初法每服隔一兩日不用食木耳竹筍又人年四十以下服二大兩年四十五十乃至六十以上加二兩常用四月以後服之者以石性重服經兩月後石力若發即接入秋氣石力下入五臟腰腎得力終無發理也石英飼牡牛取乳服方白石英大三斤以上亦得上一味搗篩細研經三兩日研了取一牡牛十歲以上養犢者唯瘦甚佳每日稱一大兩石末和銼豆與服經七日即得取乳每日空腹熱服一升余者作粥任意食之百無所忌以五月上旬起大良如急要亦不待時節終無發也其牛糞糞地隨意種菜還供服乳人吃之亦佳石英糞地種菜食方白石英五大斤以下亦可上一味搗研末如前取糞地種枸杞牛膝豆菜等食之大益人煉白石英方白石英五小兩為一劑取上黨無瑕者佳上一味搗石英使碎著研藥鉢中以水浸石濕遍不須多著水即研令細如粉訖更著水使石上厚半寸許攪之使渾澄定瀉澄水於一淨器中余粗者乃更細研之還以水如前法以細為限最下者即是惡石不堪用棄之總了又更一遍飛之了可著日中及物藉之安熱灰上即干每以酒服二匕許酒能使石不用和余藥服白石英粉方白石英任多少瑩淨者上研飛石如前成粉訖嘗之不磣捻之入肉者為細不然不堪服以四兩為一劑取好白蜜和之分為二十一丸曝乾帛練袋盛之每先食三五匙粳米粥即含咽一丸令消細末以嗽口咽之服訖須倍二十日將息不得食臭穢在長安日依此法至春初頭痛額角如裂即服兩棗許紫雪立止耆婆大士治人五臟六腑內萬病及補益長年不老方紫石英研一兩日白茯苓麥門冬去心防風芍藥甘草炙各七兩上六味治擇搗篩為散麥門冬搗令如飴和散更搗千杵又納少許蜜更搗一千杵令可丸如梧子酒服七丸日二服服之一年萬病皆愈二年骨髓滿實三年筋化為骨肉變為筋身輕目明除風去冷闢鬼神良服之不絶則壽年千歲不老不衰而致神仙然服忌慎須持五戒十善行慈悲心救護一切乃可長生此等六藥應六時合陽養陰常須服之已有疾病者依檢六味之藥即合服之檢勘諸經此六味之藥相生如母子和也服之久久在人腹耳五石腎氣丸治諸虛勞亦與前同治方白石英紫石英鍾乳各十大分赤石脂禹餘糧各二兩半薯蕷遠志去心細辛茯苓菟絲子酒浸一宿蓯蓉附子炮去皮乾地黃乾薑桂心各五分海蛤白朮各七分石斛一兩半五味子山茱萸人參續斷杜仲炙澤瀉蛇床子桔梗牛膝天門冬去心鹿耳酒浸炙當歸各三分甘草半兩炙上三十一味搗篩為末煉蜜和丸如梧子大服五丸日二服稍加至三十丸以酒下佳五石烏丸治男子五勞七傷諸積冷十二風痹骨節沉重四肢不舉食飲減少羸瘦骨立面目焦黑時時或腹內雷鳴膀胱當滿或下青黃經時不止婦人産後惡血不盡腹內堅強諸勞少氣百病間發或時陰腫或即脫肛及下出疼痛方鍾乳研煉紫石英研煉白石英研煉石硫黃研各二兩半黃芩白薇白朮各三分礬石二兩燒乾地黃七分芍藥附子炮各一兩去皮烏頭十五枚炮去皮吳茱萸二兩半蜀椒去目閉口者汗人參細辛白石脂赤石脂山茱萸天雄炮去皮芎藭麥門冬去心前胡半夏洗龍骨桂心各五分遠志十五枚去心茯苓黃連當歸紫菀禹餘糧雲母粉甘草炙各一兩半上三十四味搗篩為末煉蜜和丸如梧子大酒服十丸日三不知增之可至二十丸以心熱為知力也三石腎氣丸鍾乳白石英赤石脂禹餘糧海蛤並研煉各二兩半乾地黃石斛白朮各一兩半桔梗五味子寄生山茱萸杜仲炙牛膝澤瀉天門冬去心蛇床子當歸各三兩人參薯蕷遠志去心細辛菟絲子酒浸茯苓蓯蓉附子炮各一兩去皮乾薑桂心各五兩甘草半兩炙鹿茸二兩炙上三十味搗篩為末煉蜜和更搗二千杵丸如梧子酒服十五丸稍加至三十丸日二忌如藥法五石更生散治男子五勞七傷虛羸著床醫不能治服此無不愈唯久病者服之其年少不識事不可妄服之明於治理能得藥適可服之年三十勿服或腎冷脫肛陰腫服之尤妙方紫石英白石英赤石脂鍾乳石硫黃海蛤並研防風栝蔞各二兩半白朮七分人參三兩桔梗細辛乾薑桂心各五分附子炮三分去皮上一十五味搗篩為散酒服方寸匕日二中間節量以意裁之萬無不起熱煩悶可冷水洗面及手足身體亦可渾身洗若熱欲去石硫黃赤石脂即名三石更生一方言是寒食散方出何侯一兩分作三薄日移一丈再服二丈又服五石護命散治虛勞百病羸瘦咳逆短氣骨間有熱四肢煩疼或腸鳴腹中絞痛大小便不利尿色赤黃積時繞臍切痛急眼眩冒悶惡寒風痹食飲不消消渴嘔逆胸中脅下滿氣不得息周體浮腫痹重不得屈伸唇口青手足逆齒牙疼産婦中風及大腸寒年老目暗惡風頭著巾帽厚衣對火腰脊痛百病皆治不可悉記甚良能久服則氣力強壯延年益壽方紫石英取紫色頭如樗蒲者上白石英取如箭鏇者上鍾乳極白乳色者上石硫黃取干黃色燒有灰者赤石脂海蛤栝蔞各二兩半乾薑白朮各一兩半人參桔梗細辛各五分防風黑附子炮去皮桂心各三分上一十五味皆取真新好者各異搗篩已乃出散重二兩為一劑分三薄淨溫淳酒服一薄日移一丈再服一薄如此三薄盡須臾以寒水洗手足藥力行者痹便自脫衣冷水極浴藥力盡行周體涼了心意開明所患即瘥羸困著床皆不終日愈矣人有強弱有耐藥若人羸弱者可先小食乃服藥若人強不須食也有至三劑藥不行者若病人有宿澼宜先服硝石大黃丸下之乃可服散服藥之後宜牽勞若羸著床不能行者扶起行之常當寒食寒臥寒衣能極寒益善若寒藥未發者不可浴也浴則矜寒使藥噤不發令人顫抖當溫酒飲之起跳踴春摩出力溫乃浴解則止勿過多也又當數令食無晝夜一日可六七食若失食飲亦令人寒從食則溫矣若老小上氣及産婦臥不能起頭不去巾帽厚衣對火者服藥之後便去衣巾將冷如法勿疑虛人易治與此藥相宜實人勿服也此藥雖良令人氣力兼倍然其難將適大要在善將息節度專心候按不可失意當絶人事唯久病著床醫所不治患厭病精意者乃可服耳小病不能自勞者必廢失節度慎勿服之若傷寒大下後乃可服之便極飲冷水若産婦中風身體強痛不得動搖者便溫酒服一劑因以冷水浴取瘥已浴之後身有小痹便以寒水浴使周遍初得小冷當小惡得水之後自當快之當數食飲酒於意復悄悄不可快者當復冷水浴以病甚者水略不去體也若病偏在一處偏煩偏熱偏冷偏痹及眩心腹滿者便以冷水逐洗於水下即可矣如此盡晝夜洗藥力盡乃止凡服此藥不令人吐也病痛皆自冷若膈上滿欲吐者便餺少冷食即安矣服藥之後大便當變於常或小青黑色此藥功耳勿怪之若大溫欲吐不可禁者當吐不可令人極也明旦當更服若洗浴晚者藥必失勢不行則冷不可強也凡洗浴太早則藥噤寒太晚則吐亂不可失適寒則出力乃溫洗吐則速令洗冷食若以飢為寒者食自溫常當將冷不可熱向火若誤更衣臥即為逆凡服此藥食皆須冷唯酒令熱自從或一月而解或二十日而解之當飲酒令體中薰薰不絶當以淳酒若飲薄酒及白酒令人變亂若病症瘕者要當先下乃可服藥耳三石散主風勞青冷補益諸病悉治之方紫石英鍾乳白石英並研各五分白朮三兩半防風桂心各一兩半牡蠣半兩熬桔梗一兩細辛茯苓人參附子去皮栝蔞蜀椒汗去目杜仲炙乾薑各三兩上一十六味搗五千杵酒服方寸匕日三行百步更生散治男子女人宿寒虛羸胸脅逆滿手足煩熱四肢不仁食飲損少身體疾病乍寒乍熱極者著床四五十年服衆藥不瘥此治萬病無不愈者悉主之方鍾乳白石英海蛤各研赤石脂防風栝蔞各二兩半乾薑白朮各一兩半桔梗細辛各五分人參附子炮去皮桂心各三分上一十三味皆須新好州土者搗篩為散囊盛四兩為八薄溫酒和服一薄須臾起行隨力所往還欲坐臥隨意著衣乃臥適體中所便食時乃冷不得熱食只得大冷忌食豬肉羹臛湯麵不得房室諸禁忌之物皆不得食服藥後二十日復飲熱食及房室可漸隨意唯服藥時不得耳若頭面中憒憒者散發風中梳百餘遍一日三飲五合酒訖日下晡渴便飲酒啖脯飯常令體中薰薰有酒勢手足煩熱可冷水洗之加硫黃即邵靳散也服諸石藥及寒食散已違失節度發病療之法合四十五條第三論三首論曰服石丸散及酒亦有單服異石者既見未即有效謂不得藥力至後發動之日都不自疑是石不青作石法將息乃作異治多致其患略述將息節度法如後一或頭痛欲裂者由熱食作癖故也急下之即瘥二或惡食臭如死物氣由溫食作癖故也急下之下不瘥仍速冷食強行瘥三或兩目欲脫者由犯熱在肝故也急下之自止四或咽中痛鼻塞清涕出者由衣厚近火故也但脫衣當風取冷石尉咽顙即止不須洗之五或腰痛欲折者由衣厚體溫故也宜水洗石尉六或大便難腹中堅如盤蛇由犯溫積久有干糞不去故也宜消酥蜜膏適寒溫調服一二升津潤腹中即下若不可更下乃止七或頭眩矒欲蹶者由衣厚犯熱故也宜針頭冷水洗即止八或淋下不得小便者由坐久下溫乘騎下熱入膀胱故也但冷食飲冷水洗尉以冷石三兩度即止若不止可下之不下殺人九或腳疼欲折者由久坐下溫故也宜臥單床行役冷水洗止十或患寒頭掉不自支任者由食少藥氣行於肌膚五臟失守百脈搖動與正氣競故也乃強飲熱酒以和其脈強食冷飯以定其臟強行動以調其關節強洗以宣其壅滯酒行沖遍關機調柔則了了心明也十一或腹脹欲死者由久坐下熱衣溫失食失洗不行故也宜冷水洗當風取冷即瘥亦宜冷食十二或失氣不可禁止者由犯熱不時洗故也但冷洗之即瘥十三或心痛如刺者由應食而不食應洗而不洗寒熱相擊氣結不通聚在心中故也宜任性但飲熱酒令酒勢得行氣息通達氣得已行以冷水淹布手巾著所苦處溫復易之須臾自解仍速冷食能多為善諸痛之中心痛最惡急宜速救之唯熱酒為善起沉滯於血脈之中故當任力自溫更以冷水洗即止十四或遺糞不自覺者由下溫熱氣上入胃腹故也冷水洗即止十五或氣絶口噤不得開者由冷熱交競故也病者不自知當須旁人救之要以熱酒灌之咽中寒盛酒入必還出但頻灌出復納乃至半日許得酒下瘥不下必死十六或食便吐出不得安住者由癖故也急下之不下殺人十七或小便稠數者由熱食及啖諸熱物餅果肉之屬故也宜以冷水洗浴少服梔子湯瘥十八或下部臭爛者由坐薦厚下熱故也坐冷水中即止十九或耳鳴如風聲又有汁出者由自勞出力過度房室不節氣上奔耳故也但數數冷食禁房室即瘥二十或目痛如刺者由熱入胃肝奔眼故也但數數冷食清旦以小便洗之三日即止二十一或口中傷爛舌強而燥不得食味者由食少穀氣不足藥氣積在胃管中故也以梔子湯三劑即止二十二或腳指間生瘡者由著履襪太溫故也當履冷地冷水洗之即止二十三或手足偏痛諸骨節解身體發癰及瘡結核者由寢處久不自移徙暴熱偏並聚在一處故也若堅結極痛甚者癰發若覺便以冷水洗之冷石尉之飲熱酒散極熱數日以冷水洗不絶乃瘥洗之無限要瘥為期若乃不瘥取磨刀石如手許大燒令赤以投苦酒中石自裂細搗以冷水和塗之日二三止二十四或嗜臥不能自覺者由久坐熱悶故也急起冷水洗冷食自瘥二十五或夜不得眠者由食少熱在內故也服梔子湯冷食止二十六或飲酒不解食不得下乍寒乍熱不洗便熱洗之復又寒甚者數十日輕者數日晝夜不得寢息愁悲恚怒驚悚恐懼恍惚忘誤者由犯溫積久寢處失節食熱作癖內實使熱與藥並行寒熱交競故也雖以洗救之終不解也昔皇甫氏曾如此對食垂涕援刀欲自刳未及得施賴叔親見迫事不得行退而自思乃努力強食飲冷水洗即止禍不成矣當困時舉家親知莫能救解賴三兄士元披方得三黃湯令服大便下即瘥自此常以救以急也二十七或脫衣便寒著衣便熱者由脫著之間無適故也當小寒便著小熱便脫又洗之則醒勿忍不依此者便發病也二十八或兩腋下爛由兩臂相近故也以物隔之冷水洗之冷石尉之止二十九或嘔逆咽中傷損清血出者由臥溫食熱故也飲冷水冷石尉咽即止三十或鼻中有氣如斷雞子臭者由熱衣溫食故也但脫衣冷食冷水洗即止三十一或齒齦腫唇爛牙疼頰噤者由犯熱不時解故也但當對風張口使冷水入咽顙冷漱口三度叩齒三十六通止三十二或遍體患腫痛不能自轉徙者由久停久息久不飲酒藥氣沉在皮膚之內血脈不通故也但飲熱酒冷水洗自勞行瘥若極不能自行使人扶強行令肢節調柔乃止雖行又不得令過過則失度熱復洗之要者酒為佳三十三或目暗無所見者由飲食熱居處太溫故也但冷食冷人洗脫衣目自明也三十四或下痢如寒中者由食飲犯熱所致故也人多疑是卒疾又滯癖作者皆由犯熱所為慎勿疑也速脫衣冷食飲熱酒即瘥三十五或百節痠疼者由厚衣被溫故也但臥單床薄被著單故衣瘥雖冬寒常須散發受風冷石尉若犯此悶者但緩衣帶冷浴勿忍病而畏浴也三十六或兢戰惡寒或發熱如溫瘧者由失食忍飢失洗不行又由食臭穢故也急冷食冷水洗之數行止三十七或關節強直不可屈伸者由厚衣坐久停息不煩勞藥氣不散漸侵筋血故也當任力自溫便以冷水洗飲熱灑瘥令行動出力使勞發熱非厚衣近火又仍不遍則失度熱復洗之三十八或患食冷不可下者由久食冷口中不知味故也當作白糜酒和酥熱食一兩度若熱悶者還冷食飲止三十九或傷寒溫瘧者由犯熱故也亦可以常藥治之無咎但勿服熱藥傷寒瘧藥皆除熱破癖不與寒食相妨可通服也四十或藥發輒尸臥不識人者由熱氣盛食少不充邪忤正性故也但飲熱酒冷食冷水洗自勤勞以水淹布蓋頭溫易之仍自勞瘥四十一或肌肉堅如木石不可屈伸者由食熱臥溫作癖久而不下五臟隔閉血脈不通故也但下須冷食冷飲冷水洗自勞行瘥四十二或四肢面目皆浮腫者由食溫久不自勞藥與正氣相隔故也但飲熱酒冷飯自勞行洗浴止四十三或身肉痛楚移轉不在一處如似遊風者由犯熱故也非是風宜冷水洗冷石尉即止四十四或寒熱纍日張口吐舌眼視高睛不與人相當日用水百餘石洗澆不解者由不能自勞行飲冷酒食熱故也譬如暍人心下更寒以冷水救之愈劇者氣結成冰得熱尉飲則冰消氣通暍人乃解藥氣聚心乃更寒戰宜急飲熱酒令四肢通暢然後以冷食冷水洗之即止四十五或臂腳偏偏急痛由久坐臥溫處不移徙熱入腹附骨故也當以冷水淹布巾以搏之溫即易之不過三日止上凡服石之人有病要先以解石法消息之若不效者始可用余方救之前所列凡四十五條原是服石丸散違失節度發病由狀亦有消息得瘥者今之世人多有單服鍾乳礬石桃花石紫石亦有僉和草藥服之此等雖非五石亦是五石之例至於將息慎忌禁發動病由消息損益亦同例人既見單石而不稱意乃便輕之唯以大散乃至發動乃致困危其服單石者理宜將息若違犯禁忌但看病狀與上微同者依前法消息必定痊除論曰服石發動將息事雖衆多指的而言者要當違人理反常性可依易者將息所謂六反七急八不可三無疑言六反者重衣更寒一反飢則生臭二反極則自勞三反溫則滯痢四反飲食欲寒五反腫瘡水洗六反言七急者當洗勿失時一急當食勿飢二急酒必清淳熱三急衣溫便脫四急食必須冷五急食不患多六急臥必底薄七急言八不可者冬寒欲火一不可飲食欲熱二不可當疹自疑三不可畏避風濕四不可極不欲行五不可飲食畏多六不可居貪厚席七不可所欲縱意八不可言三無疑者務違常理一無疑委心棄本二無疑寢處必寒三無疑上凡服之人若能依此六反七急八不可三無疑者雖不得終蠲此疾復常無病可以清旦暮之暴也解石及寒食散並下石第四論一首方六十九首論曰凡是五石散先名寒食散者言此散宜寒食冷水洗取寒唯酒欲清熱飲之不爾即百病生焉服寒食散但冷將息即是解藥熱實大盛熱服三黃湯也治石發動上氣熱實不解心腹滿小便赤大便赤大便不利痞逆沖胸口中焦燥目赤方大黃一兩黃連黃芩芒硝甘草炙各二兩上五味㕮咀以水五升煮取二升半再服凡用大黃芒硝臨湯熟納之治石發熱舊小三黃湯殺石熱勝前方除實不及前方大黃二兩一方一兩黃芩二兩一方一兩梔子十四枚擘豉三升綿裹上四味㕮咀以水六升先煎藥數沸後納豉煮取二升分二服取瘥止治熱殺石氣下去實兼發汗解肌中風熱氣湯方大黃三兩黃芩二兩梔子十四枚擘豉一升綿裹麻黃去節甘草炙各二兩上六味㕮咀以水九升煮麻黃去上沫納諸藥煮取四升納豉三沸分三服得下止治虛石發內有客熱胸中痞外有風濕不解肌中急攣黃芩湯方黃芩二兩梔子十四枚擘蔥白一握豉一升綿裹上四味㕮咀以水七升煮豉三沸去滓納諸藥煮取三升分二服不止更為之治虛勞下焦有熱骨節疼痛肌急內痞小便不利大便數而少吸吸口燥少氣折石熱湯方大麻五合去皮豉二升綿裹上二味研麻子碎以水四升合煮取一升五合分三服服三劑即止大黃湯治石發煩熱脹滿身生瘡年月深久治不瘥者石虛熱生瘡方大黃三兩麥門冬一兩去心梔子十四枚擘黃芩芒硝甘草炙各二兩上六味㕮咀以水七升煮取二升五合分為五服得下止治石發熱熱結生腫堅起始作腫宜下之升麻湯方升麻枳實炙芍藥大黃各二兩當歸黃芩各一兩上六味㕮咀以水八升煮取二升分三服得下腫消止熱甚倍加黃芩一方有甘草一兩治石發熱盛變作癰腫初欲成急治之方石燕子七枚上一味以水三大升煮之取二升數用淋洗之以瘥為度治石發頭痛胸脹滿或寒或熱手足冷或口噤或口爛生瘡乾燥惡聞食氣前胡湯方前胡芍藥黃芩大黃甘草炙各二兩大棗二十枚擘上六味㕮咀以水八升煮取二升五合分三服若心脅堅滿加茯苓三兩胸滿塞加枳實一大兩炙連吐胸中冷不飲食加生薑三兩胃虛口燥加麥門冬三兩去心凡欲加藥者則加水一升治石發身如火燒靳邵黃芩湯方黃芩枳實炙各二兩梔子十四枚擘栝蔞厚朴炙芍藥甘草炙各一兩上七味㕮咀以水七升煮取二升五合分三服治石毒或十年二十年三十年而發者或慓慓如寒或飲食或不欲食若服紫石英發青者熱悶惛惛喜臥起止無氣力或寒皆腑氣所生臟氣不和礬石發熱者燥而戰石硫黃髮熱者鬱郁如熱極者身並破裂華他薺苨湯方薺苨四兩茯苓一兩蔓荊子一升芍藥人參藍子黃芩甘草炙各一兩上八味㕮咀以水一升煮蔓荊子取八升去滓納諸藥煮取二升五合分三服若虛弱者倍人參減黃芩若氣上倍茯芩加薺苨一兩外臺祕要黃芩芍藥各二兩無人參治桃花石發即心噤身壯熱頭痛覺者清酒飲之隨多少酒熱行即瘥亦可服大麥麨不解服此麥奴湯方大麥麨見第十七卷中大麥奴葉是陰乾麥門冬去心各四兩桂心三兩蔥白八莖勿使葉人參一兩甘草炙二兩上六味㕮咀以水八升煮取三升去滓分溫三服若無麥奴以麥三升淨淘洗先煮使熟去滓添水滿八升然後納諸藥煮取三升分三服治一切雜石發動方麥門冬去心人參各三兩甘草一兩炙上三味搗篩為末煉蜜和丸如彈丸一服三丸忌如前法治心胸肝熱方人參黃芩各二兩梔子一枚擘麥門冬去心桂心甘草炙各一兩上六味切以水六升煮取二升分三服治熱折石皇甫梔子湯方梔子十四枚擘黃芩二兩半豉一升綿裹上三味㕮咀以水六升煮取三升去滓納豉煮取二升分二服治石發煩熱脹滿身體生瘡年月久遠者兼治諸藥乳石發動方麻黃去節甘草炙各一兩上二味㕮咀以水二升煮取半升納清酒五合煎取軟一升其患者先須火邊炙令熱徹欲汗因即熱服之令盡溫覆臥須臾大汗出即瘥治一切石熱發方但飲淳美熱清酒冷食自勞冷洗瘥治乳石痢及常服壓石方取好豉炒令黃香待冷搗篩心未熟更炒待冷還搗若心熟皮即焦苦所以須再炒日別空腹再服二大匙以冷水服之佳治石痢方淡煮真好茶汁服二三升重者三服輕者一二服即瘥解散石發動諸藥不治單服酒豉方清美酒一升好豉五合綿裹上二味和煮三五沸熱飲一升使盡大良治一切石發單方搗生冬瓜汁三升分為三服治雜石發單方煮蔥白汁服亦解單煮枸杞白皮汁服亦解單煮胡荽汁服亦解冬煮根飲之單煮薺苨汁飲亦解解散熱渴最良方蔥白不過一斤胡荽薺苨枸杞不越半斤皆單煮取汁飲之又單煮犬肉汁服解大散良豬膏湯解大散方豬膏一兩煬之豉一升綿裹上二味以水三升煮豉取汁一升納豬膏服七合日三服石人飲宜清冷不宜熱熱即氣壅痞石唯酒一種須熱也若為食倉米臭肉動乳者必須蔥豉湯細細服之可立五六度即瘥若食飲損者於蔥豉湯中納當歸一兩煮之去滓分溫三服便瘥仍未除者可作後蘆根湯服之方蘆根地榆五加皮各一兩上三味㕮咀以水三升煮取一升去滓一服即瘥此湯力快小疴者不須服之若得四時節氣冷熱不調動乳者皆是寒熱所致其狀似瘧久久不療令人損命縱服諸藥必終不瘥必須作生熟湯以浴之方以大器盛湯若大熱投少冷水即入湯中坐勿動須臾百節開寒熱之氣皆從毛孔中出變作流汗若心中熱悶者還服少許熱湯即定良久乃出湯便厚衣覆蓋臥豁然覺醒平復如患大重者不進三二度即瘥人參湯解散數發動煩悶嘔逆人參白朮栝蔞甘草炙各二兩黃芩一兩上五味㕮咀以水七升煮取二升去滓分為三服溫溫服治服石及散發背癰疽方取烏豆二升水六升煮令稀稠薄餳量減取三大合匙抄細細納患人口中審聽腹中作聲如欲利即停須臾必利利後即瘥忌熱食陳臭等治石氣發身體微腫面上瘡出方紫雪湯成下黃芩各二兩葳蕤升麻各一兩半梔子十枚擘犀角屑甘草炙各一兩上七味㕮咀以水五升煮取一升八合絞去滓納紫雪分溫三服每服如人行六七里又服利三行為度仍用後方塗瘡忌熱面豬肉海藻等治石熱面上生瘡方取寒水石以冷水於白瓷缶中研令汁濃將塗瘡干即點之勿令停治諸石發動口乾寒熱似鬼神病方麥門冬五兩去心大黃苦參各等分葳蕤梔子擘五加皮黃芩生犀屑芍藥升麻各一兩大青甘草炙各三分上一十二味搗篩為末煉蜜和丸如梧子每食訖少時以蜜水服十四丸漸稍加至二十丸以意加減忌諸熱食及海藻豬魚炙肉蒜面等治石等毒發熱困苦方脂成煉蔥白切各五合芒硝一兩豉一兩半上四味以水二升煮蔥豉取一升五合絞去滓下豬脂芒硝分溫三服每服如人行三四里進一服快利為度忌熱面炙肉蒜黏食陳臭等物麻黃湯治石發困不可解者方麻黃二兩去節梔子十四枚擘香豉一升甘草一兩炙上四味㕮咀以酒五升漬一宿加水二升煮取三升一合分三服忌如藥法又方大黃別浸黃芩甘草各二兩炙上三味㕮咀以水五升煮取二升分溫服治金石發熱及諸熱朴硝丸方朴硝成煉者一斤上一味研令成粉以白蜜和調作丸如梧子每食訖以蜜水服三十丸服金石經年以來覺身中少熱即以丸壓之每至夜欲臥時服三十丸或至四十丸取胸膈涼冷為度此用之極有效若有時患及發者即取一大匙粉和水服之空腹服之得一兩行利即瘥如不利加服之以利為度凡朴硝取不著風者黃者殺人赤者傷人白者為佳又方是藥冷熱俱治押石主大祕澀凡朴硝煮葵子汁和服一大兩半有芒鋭者亦療暴赤眼用水服孩子量之治女子先因月經不通研生石服即今見患胸脅熱沖頭面腰胯冷極宜服此方茯苓葳蕤大黃別浸生薑各二兩大棗七枚擘石膏六兩碎綿裹芍藥黃芩人參芒硝甘草炙各二兩上一十一味切以水一斗煮取二升八合去滓分三服每服相去如人行十里又進之快利五行以來病即瘥忌生冷熱面豬魚蒜等治石發動心胸熱毒葳蕤湯方葳蕤黃芩乾薑生薑各二兩切豉一大合綿裹芍藥升麻黃連柴胡各二兩梔子七枚擘石膏八兩碎芒硝四兩上一十二味㕮咀以水一斗五升先煮石膏減一升次下諸藥煮取二升八合去滓下芒硝攪令散分溫三服每服相去如人行十里進之利五六行當自止忌如前治石發熱困苦宜下石方露蜂房一升炙上一味切以水三升煮取一升一服五六合日二服石從小便下如細沙盡停無所忌又下石方葳蕤升麻薺苨人參各七兩大黃三兩黃芩葛根紫草各八兩犀角十一兩屑梔子二七枚擘芒硝二兩銀屑四兩研豬脂十三兩臘月者露蜂房十兩玄參甘草炙各四兩上一十六味切以無灰酒八斗漬經十日其豬脂用酒一升煎煉取三兩脂與銀屑和研納藥中每日空腹服之量力多少忌熱面炙肉海藻蒜等治發背竹葉黃耆湯方淡竹葉黃芩前胡生薑各四兩切芍藥三兩小麥三升黃耆茯苓枳實炙麥門冬去心梔子各三兩擘大棗十四枚擘芎藭知母乾地黃人參石膏升麻甘草炙各二兩上一十九味㕮咀以水一斗六升先煮竹葉小麥取一斗二升去竹葉麥納諸藥煮取四升一服一升日三夜一治男子癰始欲發背不甚往來寒熱竹葉黃耆湯方淡竹葉小麥各三升黃耆升麻乾地黃芍藥當歸通草知母各三兩大棗十八枚擘黃芩一兩半生薑五兩切茯苓芎藭前胡枳實炙麥門冬去心甘草炙各二兩上一十八味㕮咀以水一斗七升先煮竹葉小麥取一斗二升去滓納諸藥煮取四升分溫五服日三夜二忌如藥法治癰發背諸客熱腫始作竹葉湯方淡竹葉小麥各三升生薑六兩切大棗十四枚擘茯苓麥門冬去心枳實炙芍藥人參各二兩黃耆前胡乾地黃升麻射干黃芩芎藭甘草炙各三兩上一十七味㕮咀以水一斗七升先煮竹葉小麥取一斗二升去滓納諸藥煮取四升分五服若熱盛祕澀不通者加大黃二兩已下勿加也治患大熱體盛發癰或在於背或在陰處生地黃湯方生地黃八兩竹葉三升小麥二升栝蔞四兩大黃五兩人參當歸各一兩黃耆黃芩通草升麻芍藥前胡茯苓甘草炙各二兩上一十五味㕮咀以水二升煮竹葉小麥取一斗二升去滓納諸藥煮取四升分四服日三夜一不愈常服治發背黃耆湯方黃耆黃芩麥門冬去心遠志各二兩去心大棗二十枚擘人參芎藭乾地黃芍藥當歸各一兩生薑五兩切桑螵蛸十四枚炙雞肶胵二具上一十三味㕮咀以水一斗先煮雞肶胵令熟可食去之納諸藥更煮取四升五合分服九合日三夜一治發背黃耆湯方黃耆麥門冬去心芍藥黃芩人參甘草炙各三兩石膏碎當歸各二兩半夏四兩洗生薑五兩切生地黃半斤大棗三十枚擘淡竹葉切二升上一十三味㕮咀以水一斗先煮竹葉取九升去竹葉納諸藥更煮取三升分四服如人行二十里又服良久進粥消又進消息甘草炙各一兩上一十三味㕮咀以水一斗五升先煮竹葉令減五升去竹葉納諸藥煮取三升五合分四服日三夜一治癰腫發背竹葉湯方竹葉切五升小麥生薑五兩切桂心一兩半大棗二十枚擘芍藥乾地黃各三兩茯苓升麻當歸甘草炙各二兩上一十一味㕮咀以水一斗七升煮小麥竹葉取一斗一升去竹葉納諸藥煮取三升五合分四服如人行七八里再服治男子發背肋結塊氣或經一月苦寒熱枳實湯方枳實炙芍藥乾地黃前胡黃芩通草各三兩知母芎藭細辛茯苓黃耆人參甘草炙各二兩上一十三味㕮咀以水一斗一升煮取三升五合去滓分四服治發背虛熱大盛腫熱侵進不住內補湯方乾地黃四兩升麻當歸人參各一兩生薑五兩切麥門冬去心芍藥各三兩大棗二十枚擘遠志去心茯苓大黃黃芩黃耆各二兩上一十三味㕮咀以水一斗三升煮取五升去滓分為五服生地黃湯治發背方生地黃八兩黃耆黃芩茯苓各三兩大棗二十枚擘芎藭一兩淡竹葉二升切芍藥人參當歸通草甘草炙各二兩上一十二味㕮咀以水三斗先煮竹葉取一斗五升去滓納諸藥煮取四升去滓分五服治發背癰已服生地黃湯取利後服此方黃耆芍藥乾地黃栝蔞各三兩小麥一升黃芩柴胡麥門冬去心遠志去心升麻各二兩當歸一兩淡竹葉切四升大棗十四枚擘上一十三味㕮咀以水一斗八升先煮竹葉小麥取一斗去滓納諸藥煮取三升去滓分三服日三治癰癤近肺俞此多虛故不宜用大黃若欲得下但其間數服此方黃芩前胡栝蔞芍藥麥門冬去心知母各三兩乾地黃四兩淡竹葉三升黃耆升麻甘草炙各二兩上一十二味㕮咀以水一斗八升先煮竹葉小麥取一斗去滓納諸藥煮取四升去滓分為四服日三夜一治背脊癰癤舉身壯熱已行薄貼此方數用有驗連翹湯方連翹漏蘆射干白蘞升麻梔子擘芍藥羚羊角屑黃芩各三兩生地黃八兩寒水石五兩碎甘草二兩炙上一十二味㕮咀以水一斗煮取四升去滓分四服治大虛客熱發背上苦牽痛微有腫腫氣來去黃耆湯方黃耆乾薑當歸桂心各二兩大棗二十枚擘麥門冬去心芍藥各三兩半夏四兩洗生薑五兩切人參芎藭甘草炙各一兩上一十二味㕮咀以水一斗二升煮取四升去滓分五服日三夜二治癰發背及在諸處竹葉黃耆湯方竹葉切四升黃耆芍藥各三兩當歸一兩大黃一兩半升麻黃芩前胡知母麥門冬去心甘草炙各二兩上一十一味㕮咀以水一斗七升煮竹葉取九升去滓下諸藥煮取二升八合分三服利兩三行佳也治癰發背內補芍藥湯方芍藥乾地黃桂心各二兩當歸三兩生薑四兩切黃耆五兩茯苓三兩人參麥門冬去心甘草炙各一兩上一十味㕮咀以水一斗煮取三升分三服治發背腫即驗前胡建中湯方前胡三兩生薑切茯苓黃芩各五兩桂心一兩人參一兩半當歸芍藥半夏湯洗三十遍甘草炙各二兩上一十一味㕮咀以水一斗煮取四升分四服治癰發背漏蘆湯方漏蘆白蘞黃芩芍藥枳實炙白薇甘草炙各二兩大黃別浸麻黃去節升麻各三兩上一十味㕮咀以水一斗先煮麻黃去上沫然後下諸藥煮取三升分三服治男子背上歲腫時覺牽痛內補黃耆湯方黃耆當歸各二兩乾地黃麥門冬各三兩生薑五兩切大棗十四枚擘芍藥芎藭人參甘草炙各一兩上一十味㕮咀以水一斗煮取三升五合分服七合日三治發背黃耆湯方黃耆乾地黃茯苓各四兩大棗十五枚擘芍藥三兩生薑二兩切當歸二兩半人參甘草炙各一兩半上九味㕮咀以水一斗二升煮取四升分四服日三夜一加黃芩二兩佳治癰瘡發背芍藥甘草湯方芍藥乾地黃黃耆各三兩甘草炙一兩半人參一兩茯苓麥門冬去心生薑各二兩切上八味㕮咀以水八升煮取二升五合分三服治毒腫發背黃耆湯方黃耆白蘞玄參黃芩大黃甘草炙各三兩竹葉切一升上七味㕮咀以水九升煮取三升分三取一日令盡忌豬肉治癰腫始覺即令消其腫五色併為發背痛欲死腫上加炙不瘥腹內虛悶麥門冬湯方麥門冬去心二兩升麻葛根各三兩丁香一兩半零陵香藿香各一兩上六味㕮咀以水七升煮取二升五合分三服治發背初欲作腫及癰便服此方大黃別浸黃芩甘草炙各三兩升麻二兩梔子一百枚取仁上五味㕮咀以水九升煮取三升五合去滓分三服得快下數行利便止不下更作治發背腫如杏核雞子青木香湯方青木香麻黃去節各二兩升麻三兩上三味㕮咀以水六升煮取二升去滓分三服一日令盡暖臥取微汗避風以粉粉身治癰發背升麻湯方升麻三兩上一味㕮咀以水三升煮取一升分三服昔何道靜母在建安夜得發背至曉半臂黑上熱如火噓吸煩悶時無三兩升麻唯一兩以水三升煮得一升如上法一服覺如小寬再服熱瘥乃得眠至暮服盡轉佳明日視背色還復遂愈也
